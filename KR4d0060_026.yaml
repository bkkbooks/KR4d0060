body:
  text: 范太史集卷二十六宋范祖禹撰奏議論邪正劄子元祐八年十一月十六日崇政殿進呈奉旨留中臣伏見熙寧之初王安石呂惠卿等造立新法先言天不足畏衆不足從祖宗不足法使朝廷不懼災異不恤衆言悉變更祖宗舊政多引小人以誤先帝勳舊之臣屏棄不用忠正之士相繼引去又啓導先帝用兵開邉結怨外域至熙寧七八年間天下愁苦百姓流離幸賴先帝聖明覺悟再罷安石兩逐惠卿終元豐之世不復召用而所引小人已布滿中外不可復去如蔡確連起大獄王韶開邉熙河章惇開邉湖南沈起引惹交賊冦陷三州朝廷討伐前後死傷二十萬呂惠卿沈括俞充李稷种諤等興造西事死傷者又二十萬先帝悔悼親諭輔臣曰安南西師死傷皆不下二十萬朝廷不得不任其咎又言呂惠卿可誅元豐之末吳居厚行鐵冶之法于京東王子京行茶法于福建蹇周輔行鹽法于江西李稷陸師閔李元輔行茶法市易于西川劉定教保甲于河北此諸路之民皆愁苦嗟怨比屋思亂當此之時人心懍懍朝夕不保幸賴陛下與先太皇太后蚤從衆言悉罷新法修復舊政天下之民如解倒垂九年之中海內晏安事理無疑明如日月外至戎狄無不咸賴唯是向來所逐小人日夜伺候今日事變妄意陛下不以修改法度為是如使小人得至朝廷必進姦言上以惑誤陛下次以傾害善人下以脅持羣臣萬一陛下過聽而小人復用豈唯正人不敢立朝臣恐宋室自此陵遲不復振矣臣每思元豐之末人心已離不意朝廷復有今日所以不避萬死為陛下明言之伏望陛下常以社稷為念深懲小人傾危國家明諭執政大臣凡向來所逐除已死亡外存者屏廢永不復用則海內無不安枕矣取進止論宦官劄子同上臣聞書曰與治同道罔不興與亂同事罔不亡漢有天下四百年唐有天下三百年及其亡也皆由宦官相去五百餘年如循一軌蓋與亂同事未有不亡者也漢自元帝任用石顯委以政事殺蕭望之周堪而廢劉向等漢之基業壞于元帝東漢鄧后臨朝中官用事手握王爵口含天憲順帝以後五侯専朝桓帝靈帝之時十常侍擅天下子弟親黨割剝百姓毒流四海附之者寵及三族違之者滅及五宗大考黨獄夷戮天下名士于是黃巾賊起朝野崩離及袁紹誅宦官獻帝奔播困餓而曹操因之以篡漢唐自明皇使高力士省決章奏宦官始盛李林甫楊國忠等皆因力士以進唐亡之禍基于開元肅宗任李輔國末年寢疾輔國以兵劫遷明皇于西內殺張皇后及二王明皇以幽崩肅宗以駭沒貴為天子上不保其父中不保其身下不保其妻子由用輔國一人而已代宗用程元振功臣畏讒吐蕃冦陷京師播遷于陜德宗用宦官分領神䇿禁兵其後天子由其所立唐室終以此亡憲宗服金丹躁忿為陳洪志所弒敬宗為劉克明所弒文宗欲討憲宗之賊謀泄仇士良殺四宰相及朝臣滅其族流血成渠朝廷半空文宗憂憤以至于沒武宗以後皆由宦官所立僖宗呼田令孜為父天下大亂黃巢賊起播遷于蜀又幸興元楊復恭自稱定䇿國老呼昭宗為負心門生天子劉季述等廢昭宗于東內韓全誨等劫昭宗幸鳯翔于是崔裔誅中官而朱全忠劫遷昭宗遂弒之因以篡唐觀漢唐亡國之禍其酷如此後之人主豈可不以為刻肌刻骨之戒哉太宗時王繼恩有平蜀之功中書欲除宣徽使太宗曰朕讀前代書史不欲宦官預政事宣徽使執政之漸也宰相懇言繼恩有大功非此不足為賞太宗切責宰相等乃命學士别立宣政使之目以授繼恩布衣韓拱辰詣檢院上言繼恩功大賞薄太宗大怒以拱辰妖言惑衆杖脊黥靣配流崖州太宗可謂深鑒前古而塞禍亂之源矣英宗服藥任守忠往來交搆兩宫致慈聖太后與英宗不相悅言者劾奏其罪貶蘄州安置盡逐其黨然後慈聖英宗母子如初宫省清肅至熙寧元豐間內臣之中李憲王中正宋用臣三人者最為魁傑憲總兵熙河兼領三路中正總兵河東兼領四路其權勢震動內外自陜以西人不敢斥言憲名中正口敕募兵州郡不敢違師徒凍餓奔潰死亡最甚憲陳再舉之䇿以誘夏賊致永樂陷沒在熙河僭擬不法用臣興土木之役無時休息𣙜舟船置堆垜網市井之微利奪細民之衣食専事刻剝為國斂怨此三人者雖加誅戮未足以謝萬姓朝廷止從寬典量加廢黜唯憲獨死中正用臣猶存陛下近召內臣十人續又召數人而李憲王中正之子皆在其中又除押班二人帶御器械一人中外無不駭愕既而聞二人以執政言其有過先罷三人以舍人繳詞頭且輟然前來指揮首違故事又李憲王中正之子既得入侍則中正用臣亦將進用人心不得不憂故臣敢極言之陛下與太皇太后同聽政之初外逐蔡確章惇呂惠卿等及羣小人故朝廷肅清內逐李憲王中正宋用臣等及羣小人故宮禁肅清內外皆無凶人故天下安靜臣歷觀近古內外肅清未有如今日也祖宗法度所以維持後世不可輕變陛下奈何先自壞之陛下所以享南靣之尊蒙巳成之業四方萬里奔走而聽命者以朝廷公正天下心服也陛下何不慎守法度規矩增修德政使過于垂簾之時然後不失天下之望今未及進一賢行一善先驟用中官如此之盛四方聞之必以為政出宮掖無復綱紀如衰季之世豈不大失人心哉夫人心一失欲復收之甚難陛下若作一二事使中外悅服四方竦動則他日所為有順流之易人心先信故也若作一二事使中外憂疑四方解體他日雖有美意人已不信在前豈得便心服乎如此而望德業之光名譽之隆非臣之所知也今中官止是陛下左右給事使令臣雖至愚亦知其必未有害政之事然欲治外者必先治內欲治逺者必先治近是以明王慎選左右壬人堯舜畏之佞人孔子逺之恐其有損而不自覺也昔唐之時仇士良教其黨曰天子不可令間常宜以奢靡娛其耳目使日新月盛無暇更及他事則吾輩可以得志慎勿使之讀書親近儒生彼見前代興亡心知憂懼則吾輩疏斥矣士良以此固其權寵故能専恣二十餘年夫漢唐之事當今必無然以先帝天資英睿聖學髙明可謂不世出之主而內外為小人所誤外興師旅內興百役先帝未嘗享太平之樂終以憂勤損夀凡不便民之事皆羣小所為而使先帝受天下之謗臣嘗痛之故不願陛下復近小人蓋以此也陛下誠能聽臣之言悉追罷除用內臣指揮未到者别與差遣已入者復授外官則中外之人稱誦聖德萬口一詞以為至美乃可以解衆庶之惑洗陛下之謗此如反掌之易何難而不為哉自聞近日兩次指揮以來外議洶洶皆云大臣不能爭執陷陛下于過舉臺諫之臣又皆畏避中人莫敢一言但恐陛下未之知耳若使知之必不為也臣侍經筵八年日望一日歲望一歲期陛下為令德之主惟恐有纎毫之失故不避違拂聖意數進苦切之言陛下每留睿聽以臣愚直見知臣亦不量微力竊以獻納自任今兹事體實繫朝政汙隆人情去就臣義均休戚榮辱不忍默默坐視敢冒萬死而獻其忠唯陛下裁察取進止論曹誦劄子臣伏見樞密副都承旨曹誦權馬軍司事候姚麟回日依舊雖非正授止是暫權然于事理有二不可祖宗制兵之法天下之兵本于樞密有發兵之權而無握兵之重京師之兵總于三帥有握兵之重而無發兵之權上下相維不得専制此所以百三十餘年無兵變也自唐室衰季以及五代樞密之權偏重動為國患由手握禁旅又得興發也今副都承旨為樞密屬官權任管軍是本兵之地又得握兵合而為一非祖宗制兵之意其不可一也自英宗以來不用外戚管軍蓋以管軍之臣止有三人而外戚素非將領又無勳勞止緣恩澤遂為統帥豈得將士心服哉神宗時曹佾雖為中書令封郡王止奉朝請而已今陛下初聽政而開外戚管軍之漸示人以私非所以為後法其不可二也臣無言責然備位侍從國家事有未便無所不當言與其言之于大不若言之于小言之于著不若言之于微伏以先太皇太后九年之中內外無毫髮之私天下未嘗有間言陛下總覽庶政四海方屬耳目臣之愚誠不欲使有識之人指某事不善曰此先太皇太后時無之今陛下有之思某事善曰此先太皇太后時有之今陛下無之所以拳拳而不能已也伏望聖慈特降指揮改正庶不違祖宗故事取進止辭潤筆劄子十二月十五日臣先奉敕撰故魏王墓志已具進呈今月十四日懷州防禦使孝詒與臣書送潤筆銀二百兩絹三百匹臣誤膺詔委撰述志銘翰墨微勤乃其職業豈可緣公輒受饋遺伏望聖慈特降指揮令孝詒寢罷臣無任懇切之至取進止論宣押知舉官劄子臣伏見祖宗時差知貢舉官常以晝日入省近歲每宣召知舉官至閣門須等候其餘官作一番押入或已昏晚則受敕于宮城門外往往夜深方入試院元豐八年孫覺同知舉臣為點檢官親見覺宿于東華門外衛士榻上天將曉方隔門受敕而去臣竊惟朝廷差侍從近臣兩省以上官知貢舉及同知舉委以進退天下多士其體不輕而近世陵遲至此恐非所以觀示四方為國光華也臣欲乞自今宣知貢舉官到閣門三人已上令便受敕先次差內臣一人押入乞下禮部施行取進止論點檢試卷官劄子臣竊見禮部貢舉差點檢試卷官二十人自來久例點檢官先考校書鑿等第送知舉官然後知舉官再考定去留髙下點檢官自入試院未謄録到卷子以前及將卷子送知舉官以後别無職事止是中間考校及候知舉官考畢然後分定合格卷子點檢雜犯故前後空間之日常多考試點檢之日常少而知舉官以夜繼晝力猶不給臣愚欲乞將點檢官二十人分屬知舉官每員各得屬官五人使之相通考校去留髙下可以共議如此則不獨任一人之見又得稍均勞逸必更精審乞下禮部相度施行取進止乞試院差官治雜事劄子臣竊見祖宗時知貢舉官止以出題校藝為職専意掄選天下之士間得竒偉絶異之才由其用心精一也承平日久舉人寖多比歲以來法令益密知舉官受接詞狀兼知雜事日力常若不給為之者無不告勞非復如曩時之優裕也夫承平之世政事所宜從容況選賢取士朝廷必慎擇其人付以文柄今乃疲弊于吏事如此恐非設貢舉之意也臣愚欲乞每遇貢舉别差禮部郎官一員専治雜事凡詞狀之類委知舉官判送檢法施行庶使知舉官専意于考校以副陛下求賢之意取進止上殿論試院事劄子九年三月二十四日三知舉院對垂拱殿臣等伏覩省試舉人尚書禮部貢舉一案文書吏人並隨過貢院知舉官所治乃是禮部侍郎官之職事務繁冗有妨考校臣等欲乞今後省試差禮部郎官一員専治雜務令知舉官得専意考校又考試刑法舉人準例差官十四人員數過多亦妨本寺治事臣等詢問可以減半據今舉就試人數只合差官七人欲乞今後減半差官若就試人增減數多即所差官亦隨數增減其専治牒親戚官止令考試刑法官一員兼領並乞下禮部施行取進止畏天劄子同日留對臣伏見今月一日日食不盡如鈎見者駭懼以為數十年來日食之異未有如此之甚者也臣聞日食者隂侵陽臣侵君也自古隂盛陽微小人浸長虧損人君之明則謫見于天日為之食陛下初御前殿聽政月朔之日皇天見異以警聖心雖言語丁寧不過于此矣陛下所宜恐懼修省以答天戒深思變異之來殆由人事有以感致之務在安靜以寧人心夫天人之際相去不逺應如影響不可不畏能應之以德則災變而為福異變而為祥不能應之以德則重違天意何由消弭臣恐邪人佞臣欲寬陛下聖慮或言日食自有定數又云天道逺而難知此乃小人誤國之言非聖人畏天之意也惟陛下留神省察臣不勝灼怛憂國之至取進止恤民劄子臣伏見陛下即位以來惻怛愛民出于誠心一有災傷則遣使賑救倉廩府庫無所愛惜十年之間凡兩出內庫錢十萬緡以賜京師寒凍之民祖宗之時唯是蠲放欠負未聞賜錢如此之多陛下德澤深厚乃古聖帝明王之用心也然而天災流行民食猶難臣訪聞河北諸郡聚飢民所在以數萬若今歲夏秋更一不熟不知國力何以繼之臣願陛下更與執政大臣圖救民之術朝廷政事宜務安靜無所作為専聽于民左右從之未有民安而國不安民和而天不應者也陛下養民如子視民如傷今民方飢困尤當以安之為急唯陛下深留聖思以固邦本天下幸甚取進止薦講讀官劄子臣自居講職竊謂天子當博求天下賢才置之左右以備顧問禆益聖學追觀祖宗之時講筵之臣多由舊官薦引故臣每思得人聞逹天聽然無因而言懼為煩瀆或涉親舊言則有嫌今臣巳三奏乞外任將去講職肝鬲所懷不敢不吐露于陛下臣之愚見可充講讀者具列如後讀官王存蘇軾趙彥若鄭雍講官程頥孔武仲呂希哲呂大臨吳師仁右王存端方厚重素有人望前已執政若使之進讀足以重經筵之選蘇軾文章為天下第一其名亞于司馬光但忌嫉之者多此在陛下主張而用之耳趙彥若父師民以經行淳懿久侍仁宗書筵彥若德性類其先人博學多聞詳練故事去年為其子得罪其情可亮非有大過不宜久棄鄭雍自為中書舍人臣嘗言其可備講讀雍自居言職風望愈髙今讀官猶有闕員此四人者實允衆論程頥本末臣别具劄子論列孔武仲學問該洽講説明白仁宗時賈昌朝曽公亮皆以知制誥兼講職今武仲若以中書舍人兼職自如故事呂希哲是司空公著之子公著嘗言此子不欺暗室其人經術履行識者皆謂可備勸講今巳五十四歲但希哲是臣妻兄故臣久不敢稱薦今將去朝廷竊謂言之可以無嫌更乞陛下詢問大臣參考其人呂大臨是大防之弟修身好學行如古人臣雖不熟識然知之甚久亦以宰相之弟故不敢言陛下素知臣不附執政又臣巳乞外任故不自疑望陛下記其姓名以備它日選用吳師仁自為布衣以行誼稱于士大夫元祐初朝廷特召為學官衆論皆謂師仁宜入侍經筵臣前後已三薦師仁更乞采于衆論臣誠狂愚惟陛下裁赦無任震懼之至取進止二臣伏見元祐之初陛下召程頥對便殿自布衣除通直郎充崇政殿説書天下之士皆謂得人雖真宗之待种放亦不過此也孔子曰舉逸民天下之人歸心焉夫舉一人而天下莫不歸心者何哉為善于幽隱者知其必不廢也陛下用頥實為希濶之美事而才及歲餘即以人言罷之頥之經術行誼天下共知司馬光呂公著皆與頥相知二十餘年然後舉之此二人者非為欺罔以誤聖聽也頥在經筵切于皇帝陛下進學故其講説語常繁多頥草茅之人一旦入朝與人相接不為關防未習朝廷事體迂踈則固有之而言者謂頥大佞大邪貪黷請求奔走交結又謂頥欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也蓋當時臺諌官王巖叟朱光庭賈易皆素推服頥之經行故不知者指以為頥黨頥匹夫也有何權勢動人而能傾大臣役臺諫自古處士入朝無有不被謗毁蓋處士本不求仕進能輕富貴公卿大夫自以已不能如此故無不稱重將謂處士入朝必有過人之能致太平之術故其責望常重至于不賢者則直以處士為矯詐為沽激為釣名又處士多不次得美官故其憎嫉之多是以自古處士入朝未有無謗毁也陛下慎擇經筵之官如頥之賢乃足以輔導聖學至如臣輩叨備講職實非敢望頥也臣久欲為頥一言懷之纍年猶豫不果使頥受誣罔之謗于公正之朝臣每思之不無愧也今臣已乞去職若復召頥勸講必有補聖明臣雖終老在外無所憾矣取進止朝辭論恤刑劄子紹聖元年閏四月二日垂拱殿臣竊以先王欽恤庶獄務在于寬刑期無刑蓋非得已國家一祖五宗以聖繼聖以仁繼仁哀矜于民率用中典此所以祈天永命垂百三十年太平之本也臣伏觀陛下聖性仁厚有堯舜成康之質比聞有司奏獄多務從寬臣願陛下長守此意操之勿失有勸陛下嚴刑峻法以威肅四方者宜拒而勿聽陛下為民父母海內皆赤子也人君之勢其尊如天其不測如神誰敢不畏何患威之不立而必嚴刑以肅之惟陛下聖意専主于寬仁如天地之㴠養萬物則刑罰庶可清省矣臣久侍經幄無所禆補今將逺違左右思所以助陛下施隂德益福祚結人心者莫先于此故不敢不言伏望陛下深留聖心天下幸甚取進止范太史集卷二十六

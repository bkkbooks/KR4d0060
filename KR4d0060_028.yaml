body:
  text: 范太史集巻二十八宋范祖禹撰翰林詞草賜翰林學士承㫖蘇軾乞郡不允詔元祐六年七月二十二日省所劄子奏近者四次上章乞除一郡至今未䝉指揮伏望早賜施行事具悉卿文學為時宗工名譽為國重器剛直之節足以消沮羣邪仁勇之謀足以折衝萬里召自藩守入長禁塗譬如猛虎之處山林祥麟之在郊藪豈惟獻納之益實有榮懐之光而書筵未開坐席不煖奏封屢上引疾力辭中外所觀進退豈易且用賢則如轉石非朕所聞玉音而有遐心亦卿之戒姑安厥位深體至懐所請宜不允賜新除宣徽南院使檢校太傅依前太子太保致仕張方平辭免恩命不許詔二十四日卿逮事仁宗蚤服近僚被遇先朝進司大政眷惟舊徳乆謝塵紛加徽省之隆名示里居之優寵矧安車就第嘗參置使之華今行馬在門尚有乞言之禮兹為懋典毋或過辭所請宜不許又不允詔朕惟五帝憲老三王乞言尚齒之風逹扵天下尊賢之禮簡在王庭以卿㤀正服勞耄期稱道眷言夢寐想見儀刑領使内徽惟卿舊秩魯侯多祉以介于夀臧考父益恭尚勤于循走勉服休命毋為固辭所請宜不允西嶽開啓祈雨道塲青詞二十九日伏以自陜以西失時不雨旱苖將槁粒食且囏惟神嶽之配天主油雲之䧏澤載馳使傳申飭祠宫祇薦精誠仰祈休應俾三農之望歲無爽于西成庶八蜡之記方益欽于明祀撫問資政殿學士知永興軍李清臣口宣卿早陪機政出守价藩時屬商秋宜綏吉履特加問賚以示眷懐今差入内内侍省内東頭供奉官張稹傳宣撫問兼賜卿茶一銀合想宜知悉賜外任臣寮進奉坤成節功徳疏詔敕書覽所進奉坤成節功徳疏一軸銀軸頭事具悉節紀誕辰慶均率土集真乘之妙教演寳梵之洪音式將臣子之誠同罄人天之祝眷惟忠恪良用嘆嘉賜太師文彦慱辭免温溪心馬不允詔八月五日省所奏伏䝉詔書温溪心欲以馬一匹送與卿巳敕邉吏答賜所直其馬今以賜卿臣恐有異故常特啓新例伏望特寢巳行之命事具悉種𦍑獻誠屬我大老雖異康侯蕃庶晝日三接以彰裴度勲徳名聞四夷兹豈故常奚煩謙避所請宜不允賜宰相呂大防辭免弟大臨除秘書省正字不允詔省所劄子奏伏覩敕命除弟大臨充秘書省正字弟巳兩次辭免未䝉開允緣臣冒居重位逺方傳聞必以臣私扵其親不能為國求士伏望特許辭免事具悉古之賢相簡拔人才内不避親外不避怨心若權衡之設物無輕重之私此朕所望扵卿卿宜自任以此大臨學行之美士夫所稱進職書林非緣親授勿為嫌避宜體眷懐所請宜不允賜新除樞宻直學士提舉萬夀觀趙彦若辭免乞齊州一任不允詔七日卿再世淳徳一時名臣以學行侍經帷以文章登翰苑比攬奏封之引咎聊從易地以示恩尚不遑寜力祈外補免冠席藳知卿省過之深加膝墜淵非朕遇臣之意往服成命毋為固辭所請宜不允賜交阯南平王李乾徳敕書敕南平王乾徳省所差人進奉馴象五頭象鈎五柄装象銅鐸連鐵索五副朱装纒象藤五副事具悉卿世奉聲教鎮守封陲逺自海邦來修貢職載惟忠恪良用嘆嘉今特賜卿國信物等交付差來使副李延恩等具如别錄至可領也賜外任臣僚進奉坤成節馬詔敕書覽所進奉坤成節馬一匹事具悉誕彌紀節萬國傾心方貢在庭諸閑收駿眷言恭恪良用嘆嘉召翰林學士范百祿入院口宣卿學問淵博文章粹純訪對西清復竚謀猶之益延登中禁還追典誥之風宜服寵嘉以副眷遇今差待詔秦訓就第召卿入院充學士想宜知悉賜新除翰林學士兼侍讀范百祿辭免恩命不許詔卿以學行陪經席以文章登禁林京邑劇繁已聞治效承明嚴近方竚嘉謀再入之榮公議惟允率由舊服奚以辭為所請宜不許不允詔卿在英祖之時以直言奉大對當神考之世以正論居諌垣逮朕纂承参華侍從進陪經席入直禁林眷言浩穰之勞方竚論思之益祇率舊職毋為過辭所請宜不允賜寳文閣直學士新除權知開封府李彦純辭免不允詔卿出守全蜀有中和宣布之風入貳冡卿有銓綜公平之美眷言郡國之首實難尹正之才特擢老成庶從民譽往欽厥職毋費扵辭所請宜不允賜新除天章閣待制守吏部侍郎趙君錫辭免不允詔卿有潁封人之純孝可移扵君以正考父之滋恭不懈扵位御史執法天官亞卿圖任實均服寵惟舊仍兼華扵延閣尚虚竚扵嘉謀其往欽承毋為固避所請宜不允就驛賜交州進奉人使朝辭御筵口宣十一日汝等來貢闕庭言歸藩服特賜賔筵之餞載嘉王事之勤示我惠慈慰爾行役今差入内内侍省東頭供奉官李稷臣賜汝等御筵想宜知悉賜夏國主生日禮物詔詔夏國主世修藩職聿來䞇幣之儀日紀誕生乃眷忠誠之美爰加慶賜用示渥恩益介夀康永綏福祉今差供備庫副使安侖賜生日禮物具如别錄至可領也賜夏國主中冬時服詔詔夏國主眷彼西土世為外臣述職以時旅庭有實方屬戒寒之候爰頒旌禮之衣宜服寵嘉益懐忠恪今差内殿承制閤門祗候劉程賜中冬時服具如别錄至可領也賜同樞宻院事韓忠彦生日詔十二日惟乃顯考功格皇天篤生良臣翊我樞近用錫祉福以昭寵光今賜卿生日羊酒米麫等具如别錄至可領也醴泉觀感通等殿疎漏翻修奏告青詞十七日伏以瑶闕琳宫奉威神之來下震風凌雨宜棟宇之載嚴有司庀工揆日衹事敢伸昭告庶妥明靈賜新授龍圖閣學士知潁州蘇軾辭免賜銀不允詔二十日省所劄子奏辭免撰及書上清儲祥宫碑賜銀一千兩不敢祇受事具悉作宫于東降監在下克成先帝之事奉答皇天之休宜得宗工發揚鴻烈非卿文翰莫造精微過魏徴之九成兼世南之五絶勒之金石炳若日星爰有匪頒用昭眷奨義所當受禮無費辭所請宜不允賜中大夫新除試御史中丞鄭雍辭免不允詔朝有正色之士則精神足以折衝國有司直之臣則讒說不能殄行風憲之長綱紀所持必得清忠乃稱骨鯁卿自居諫省即以直聞今求其人莫若考實斷自朕志無以易卿表正羣司公論所屬勉思報稱無或過辭所請宜不允賜張方平再辭免恩命不許詔昔元老壯猷遂興周室四臣為輔實定漢邦卿望重累朝名髙四海雖君子戒之在得而盛王未有遺年宜視輔臣之崇仍兼帝傅之重豈特鄉閭之寵乃惟邦國之光其勉欽承毋煩固避所請宜不許又不允詔祖宗之臣遺我後嗣朕宅丕后圖任舊人顧瞻在廷㒺或耆夀詢謀黄髪尚有望焉養桓榮扵辟廱雖存其禮延管寜扵東序莫致其人加使徽猷視儀近輔矧由舊服何足多辭所請宜不允賜皇弟武成軍節度使祁國公偲生日禮物口宣卿常棣聮華孟侯啓國當仲秋之令序紀彌月之嘉辰宜有匪頒用綏福祉西嶽開啓謝雨道塲青詞伏以千里亢陽三農失望是用精意祈于有神山川出雲休應如答槁苖復起比屋咸蘇祇案真科用伸美報仰慿靈貺尚有豐年又朱表闗輔之間旱暵為虐焦勞西顧夙夜不寜神享其誠天降之澤勃然嘉榖粒此烝民庶修蠲潔之儀上答髙明之施閏八月旦日景靈宫起居宣祖皇帝至神宗皇帝表伏以少昊司秋歴官紀閏居王門而吿朔瞻原廟以寜神恭惟某諡號皇帝陟配在天詒謀垂世功光簡册如日月之照臨慶佑基圗與乾坤而乆大永惟感慕曷究名言起居昭憲皇太后慈聖光獻皇后表伏以歴正仲秋月更閏朔瞻閟宫之有侐侔厚地以無疆恭惟某諡號皇后徳並姜任功髙馬鄧流徽音扵億載返真馭扵九霄時律徂遷孝思永結閏八月旦日諸陵起居仁宗英宗神宗表伏以秋成萬物閏正四時履霜露而惨悽瞻原陵而感慕恭惟某諡號皇帝紹天立極流澤庇民蔵弓劒扵橋山㳺衣冠扵原廟寤言興念哀結増深永昭陵起居慈聖光獻皇后表伏以璇樞紀候適屬扵閏秋園寢寜神載更扵月朔恭惟某諡號皇后登翊二聖覆育羣生功冠古以無儔神在天而逾逺永言瞻慕彌切悃悰閏八月望日景靈宫起居宣祖皇帝至神宗皇帝表伏以天序後秋正四時而閏定月行在望想七廟之神㳺恭惟某諡號皇帝徳厚流光仁深澤逺天開千歲之統民畏百年之威對越如存孝思㒺極起居昭憲皇后至慈聖光獻皇后表伏以中秋歲閏瞻斗建扵兩辰先寢時思悵月行扵幾望恭惟某諡號皇后道光彤史訓紀東朝覩禕服以如存仰飈輪之益逺永懐慈範増結深誠就驛賜于闐國進奉人進發御筵口宣閏八月十六日汝等逺服化風來修貢職眷言行役及此旋歸宴勞有加渥恩斯厚今差入内内侍省内侍髙班史平一賜汝等御筵想宜知悉賜宣徽南院使檢校司空充中太一宫使馮京再上表乞致仕不許仍斷來章詔卿昔在先朝再登近弼讜言正論具載册書乆均逸扵侯藩宜協輔扵王室豈敢煩以官職蓋將備扵諮謀徳齒天下之逹尊愷悌神明之所勞矧卿年雖耆艾身則康彊宜體至懐難徇來請所請宜不許仍斷來章不允詔股肱舊臣與國同體耆老俊徳惟民所瞻尚頼謀猷俾朝朔望雖蚤知止足欲追老氏之訓言而尊禮夀祺庶及周家之忠厚勉留輔朕毋或憚煩所請宜不允賜馮京乞致仕不允詔十七日省所劄子奏陳乞致仕事具悉古之大夫有不得謝尊賢貴老三代所同惟我祖宗優禮耆哲著扵史册前後相望卿以直道事君乃心王室是以先帝召自西蜀入長近樞逮朕纂承眷求舊徳從容經幄方覿儀形班扵羣公足以重國遽欲引去義所未安其體至懷勉綏厥位所請宜不允賜張方平辭免恩命允詔省所劄子奏伏奉詔書以臣三上表辭免恩命不允仍斷來章竊以宣徽使為待材用之宅臣既退老多年今非復任用之人虚受無名伏望特垂降鍳庶扵朝廷大公之體粗有補扵涓埃事具悉朕夙寤思賢眷求耆徳徽猷置使循用舊章卿身退而志愈謙年髙而節彌厲以祁奚請老之乆有衛武自儆之防力抗奏封深陳至意載嘉素守是用曲從足以敦厚邦風垂榮史牒益綏夀嘏庸副眷懐所請宜允賜資政殿學士新除守吏部尚書王存赴闕詔十九日卿夙陪機政丞轄中臺再易麾符蕃宣近服天官之長人望所同其趣造朝毋乆虚位已除卿守吏部尚書詔書到日卿可依條交割公事訖乘遞馬疾速發來赴闕賜馮京再乞致仕不允詔老成之徳重扵典刑是以先王尊禮不聽其去卿自還朝闕纔歴三時耆俊在廷中外所望遽欲謝事人其謂何卿雖至誠在朕未可體兹諄諭勿復有云所請宜不允合祭天地詔朕聞五帝不相沿樂三王不相襲禮世有損益因時制宜惟我祖宗嚴奉郊廟當遣官攝事皆考合扵前文唯奠玉親祠自裁成扵大禮每以三歲對越二儀咸秩百神大賚四海迄先帝元豐之末講方丘特祭之儀葢將補一代之闕容振百王之墜典朕惟菲徳嗣守丕基列聖已行謹當遵奉先朝未舉懼不克堪是以昔歲仲冬竭誠大祀神祇饗答祖考燕寜前詔有司再加集議猶欲資度諸儒之論稽参六藝之文然理既不疑則事無可議斷自朕志協于僉言祇率舊章永為成式今後南郊合祭天地依元祐七年例施行仍罷禮部集官詳議賜溪峒知龍賜州彭允宗等進奉賀坤成節溪布敕書覽所進奉賀坤成節溪布一十五疋事具悉汝世守遐域心在本朝爰屬夀辰逺修貢職永言恭順良用嘆嘉賜彭允宗等進奉賀端午節溪布敕書省所進奉賀端午節溪布一十五疋事具悉汝地居邉陲世服聲教時屬盛炎之月逺輸任土之儀言念忠勤不㤀嘉奬趙州賜大遼賀坤成節大使茶藥詔卿祇役使華㑹朝慶節眷言勤瘁特有匪頒宜體渥恩無憚煩暑今差入内内侍省内東頭供奉官江洙往趙州賜卿茶藥具如别録至可領也趙州賜大遼賀坤成節副使茶藥詔卿介紹展儀星言在道時方畏暑行靡憚勞併有恩頒用彰眷遇今差入内内侍省内東頭供奉官江洙往趙州賜卿茶藥具如别録至可領也趙州賜大遼賀坤成節使副茶藥口宣卿等逺奉鄰歡來修慶禮適當炎燠言念勤勞頒賚惟優眷恩斯厚今差入内内侍省内東頭供奉官江洙賜卿等茶藥想宜知悉賜尚書左丞梁燾乞退不許批答輔弼之臣與國同體進退之際海内所瞻卿正色直言歴踐臺省沈謀逺慮乃心朝廷是以擢自禁嚴入陪廟論曾未朞歲方觀猷為乃以宿疢時作抗章去位此非吾所望也所請宜不許不允批答昔舜有五臣而天下治周有十亂同心同徳朕日勤典學上嘉先王惟股肱之臣共圗庶政虞周之盛葢有望焉卿服在近僚進陪輔朕歴日未乆遽以疾辭夫心平氣和何恙不已姑安厥位無或多云所請宜不允賜梁燾乞退不允批答口宣卿丞轄中臺輔政未乆乃以疾吿形扵奏封尚當勉留以副眷倚今差入内内侍省内東頭供奉官王綬賜卿乞退不允批答想宜知悉賜梁燾第二表乞退不允斷來章批答昔汲黯多病臥治淮陽魏徵乆疾参議朝政朕以漢武帝之待汲黯不如唐太宗之用魏徵卿雖足疾未宜云也所請宜不允仍斷來章不許批答詩曰無競維人四方其訓之今闕政猶多恊氣未應民力凋敝羌戎不庭方與衆賢共圗至治而卿引疾求去豈其時乎所請宜不許賜梁燾第三表乞退不允斷來章批答口宣卿疊抗封章懇辭機政難徇來請宜體至懐方賜告休竚聞藥喜今差入内内侍省内東頭供奉官李永言賜卿乞外郡不允斷來章批答想宜知悉賜梁燾乞除東北一郡不許詔省所劄子奏實以素有足疾比來發動殊甚雖漸獲安愈而未能趨拜乞除授東北一郡事具悉人君勞扵求賢佚扵任人進之惟艱則退之豈易朕嘉與疑丞輔弼若昔大猷方將恭巳以仰成豈可引身而亟去姑務安養體兹至懐所請宜不許不允詔卿廸簡在庭圗任共政雖難進易退乃事君之常而有始無終亦用賢之戒矧遄聞損疾之喜加有賜告之優其康乃心以輔予治所請宜不允范太史集巻二十八

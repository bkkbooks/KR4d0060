body:
  text: 范太史集巻二十宋范祖禹撰奏議論立后上太皇太后疏元祐五年十一月十九日臣伏奉詔㫖皇帝納后六禮令翰林學士御史中丞兩省給舍與禮部太常寺官同共詳議臣竊伏思此國家大事萬世之始福祚所係風化所先自古聖王重之今陛下宜先知者有四不可不慎也臣謹稽之上古參之後世為陛下悉數而詳言之一曰族姓二曰女徳三曰隆禮四曰博議所謂族姓者臣聞古之帝王所與為昏姻者必大國諸侯先聖王之後勲賢之裔不然則甥舅之國也不以微賤上敵至尊故其福祚盛大子孫蕃昌昔者黄帝娶扵西陵之女是為嫘祖嫘祖為黄帝正妃其子孫皆有天下五帝三王皆黄帝之後也髙辛娶陳鋒氏之女是生帝堯虞舜娶帝堯之二女釐降扵媯汭遂有天下大禹娶扵塗山是生夏啟天下歸之子孫享國四百七十餘年成湯娶扵有莘氏子孫有天下六百餘年周之先祖后稷生扵姜嫄世有賢妃太王娶太姜是生王季王季娶太任是生文王文王娶太姒其禮尤盛大雅歌之曰文王初載天作之合言文王之初有識天已生賢女為之配也又曰大邦有子俔天之妹文定厥祥親迎扵渭造舟為梁不顯其光自古昏禮未有如文王之盛也太姜炎帝之後也太任太昊之後也太姒大禹之後也太姒生十子武王周公皆聖人也其餘皆為顯諸矦周之子孫徧扵天下太姒之徳也詩人美文王之聖本由太任其詩曰思齊太任文王之母思媚周姜京室之婦太姒嗣徽音則百斯男又曰刑于寡妻至于兄弟以御于家邦言文王之化自家及國以正天下也周南關雎后妃之徳人倫之始風化天下皆美太任太姒也武王亦娶扵姜是生成王周有天下三十餘世八百餘年其基本葢由此也故族姓不可不貴所謂女徳者臣聞禮本夫婦詩始后妃治亂因之興亡繫焉三代之興皆有賢妃其亡也皆有孽女夏之興也以塗山其亡也以末喜商之興也以有娀其亡也以妲已周之興也以姜嫄其亡也以褒姒此皆聖賢所紀詩書所載垂之後世以為永鍳者也秦漢以後昏姻多不正無足取法惟後漢顯宗明徳馬后唐太宗文徳長孫后憲宗懿安郭后皆有后徳出扵勲賢之家其餘敗亂足以為戒而已恭惟本朝太祖皇帝以來家道正而人倫明歴世皆有聖后内徳之助自三代以來未有如本朝家法也皇帝聖徳明茂睿質純粹天監在下必生聖女以佑皇家惟陛下逺觀上古近監後世上思天地宗廟之奉下為萬世子孫之計選卜窈窕以母儀萬國表正六宫非有徳孰可以當之然閨門之徳不可著見必視其世族觀其祖考察其家風參以庶事亦可知也昔漢之初大臣議欲立髙帝子齊王皆曰王母家駟鈞惡戾虎而冠者也代王母家薄氏君子長者乃立代王是為文帝文帝為漢之賢主亦由其母家仁善也故女徳不可不先所謂隆禮者臣聞天子之與后猶天之與地日之與月隂之與陽相須而後成者也禮曰天子聽男教后聽女順天子理陽道后治隂徳教順成俗内外和順國家理治此之謂盛徳又曰天子修男教父道也后修女順母道也孔子對魯哀公曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也是故君子興敬為親捨敬是遺也弗愛不親弗敬不正愛與敬其政之本與哀公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎又曰天地不合萬物不生大昏萬世之嗣也君何謂巳重焉葢深非之也孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與禮又曰元冕齋戒鬼神隂陽也將以為社稷主為先祖後其可以不致敬乎又曰敬而親之先王之所以得天下也今臣與衆官討論講議皆約先王之禮參酌其宜不為過隆願陛下勿以為疑進言者必曰天子至尊無敵扵天下不當行夫婦之禮而荀卿有言天子無妻告人無匹也如此則是周公之典孔子之言皆不可信而荀卿之言可信也臣謹案禮冠昏唯有士禮而無天子諸侯之禮故三代以來准以士禮推而上之為天子諸侯之禮葢以成人之與夫婦自天子至扵士則一也臣竊聞親王宗室之間娶妻殊無齊體之禮敬而親之之義天下豈有獨尊而無偶配者哉至扵鄙慝之禮或雜苖獠之俗或習委巷之風下自士族上流宫禁有渉扵此者願陛下一切屏絶之以正基本以先天下故禮不可不隆所謂博議者臣聞古者天子聘后上公逆之諸侯主之故春秋書祭公來遂逆王后于紀夫國有大事大臣不容不預聞也昔慈聖光獻之立也吕夷簡定其議故其詔曰覽上宰之敷言其册曰宗公鼎臣誦言扵朝先是茶商陳氏女亦預選擇王曾宋綬皆以為言大臣繼有言者遂罷陳氏仁宗所以為聖者能從衆也進言者必曰此陛下家事非外人所能預自古誤人主者多由此言也天子以四海為家中外之事孰非陛下家事大臣無不可預之事亦無不當預之人且陛下用一執政進一近臣必欲協天下人望况立皇后以母天下乎臣恐陛下一日降詔云立某氏為皇后則大臣雖有所見亦難乎論議矣今陛下之所選擇莫若出其姓氏宣問大臣若聖志既定而衆議僉同則卜筮協從鬼神其依天人之意無不同矣故議不可不博臣幸備勸講其職在以帝王之事禆益聖徳故敢獻其所聞臣之愚誠惟中宫正位之後四海之内室家相慶則宗社之福也狂瞽之言惟陛下留聽干冒宸嚴臣無任惶懼俟罪之至封還觧鹽専置使狀六年七月十三日準中書省録黄尚書省送到白劄子勘㑹陜西制置觧鹽司元専設官總領後來方令轉運使一員兼管是致職務不専有害鈔法契勘茶事司河北糴便司巳罷轉運司兼領七月八日得畫三省同奉聖㫖依舊差官専充制置觧鹽使更不令轉運使副兼領者右臣伏見仁宗慶歴中以范宗傑為制置觧鹽使行禁㩁法公私大受其弊扵是范祥請變鹽法至八年乃以祥為陜西提㸃刑獄兼制置觧鹽事盡革宗傑之弊課入亦増祥初建議當時論者争以為非而韓琦包拯等皆以祥法為便請乆任祥以専其事乃擢祥為陜西轉運使及李三代祥官課遂損嘉祐中張方平包拯請復用祥祥之鹽法至今稱之及祥卒薛向繼其後祥與向皆號為能言利豐財之臣然皆以提轉兼領祥之再使雖嘗専領後卒歸之轉運司由此觀之鹽事修舉在扵得人不在置使也今誠得如祥向者而主之亦何必専若不得人雖専無益自仁宗嘉祐以來不置此使已數十年今一旦復之設官置吏别為一司公私先有勞費權輕則不足以動州縣重則是又増一監司州縣承禀不無煩擾又提轉之外别置使者以主財利無不好相侵奪各求自便此人情之常也神宗熈寧中留意馬政置監牧使數年而罷又置提舉常平司官陛下即位而罷蓋監司之外又置使則為冗長事理不安故不能乆且治道貴扵簡便綱領尤不欲衆多也東南海鹽不為不多然提刑司亦兼鹽事觧池鹽在陜西轉運司止一事爾若須置使則東南鹽亦當設官矣若每事専設官則轉運司遂無所用尚何以主錢穀為職哉茶事司本起扵李杞劉佐陸師閔之徒征利而為之議者皆以為非朝廷以熈河邉用不得巳而存之此不足為法也夫觧鹽利害非臣所知止以祖宗之舊及事理言之恐不必専設官今陜西有都轉運使轉運使副判官提㸃刑獄皆可以隨資序用人若選擇知鹽事者一人為監司使之兼領亦豈敢不舉職若任轉運司扵鈔法有害則提刑司兼領亦范祥故事理増監司一員猶愈扵别置使之煩也古者利不百不變常朝廷方欲省官惜費茍無大利害則不若且如其故便臣愚竊謂作事謀始所宜慎重故未敢行下伏望聖慈更與大臣詳酌所有録黄謹具封還伏候勅㫖封還臣寮論浙西賑濟事狀二十四日準中書省録黄臣僚上言竊聞浙西州軍近以災傷朝廷選差轉運副使岑象求運判楊瓌寳仍賜米百萬斛錢二十餘萬緡俾救其患州縣自亦依條發倉廩作粥飯救濟行將少蘇矣細民習為驕虚以少為多其弊已乆欲乞明詔本路監司并州縣詳具災傷貧分數賑貸行遣次第各行申奏徐考其虚實而懲責其尤甚者候勅㫖又臣僚上言訪聞兩浙水災惟蘇湖秀三州為甚外常杭二郡絶為輕小其三州之地亦有髙下不等今傳言者或謂水災至大無可種之田或謂髙田無水下田水退有可種之處以謂本因風駕海水江湖壅遏加之雨多遂有漲涌之患風退水落此患自弭可以種作人言異同如此誠不可以不察乞下本路鈐轄轉運提刑及蘇湖等五州令各開具逐州水災所及凡幾縣幾村有無漂蕩廬舍溺死人口及髙田無水與水退可耕之地各約若干並令指實申奏不得相關稍渉謬妄即乞重行降黜兼朝廷近日别遣使者支撥斛㪷一百萬見錢度牒約計二十萬貫不為不多若見今未種今秋無穫則向去乏食賑濟之期甚為長逺所差去官當相度事體措置凡此皆繫官吏能否而一有失當其害非輕乞令賑濟官司凡措置稍大事件並申取朝廷指揮其急切不可待報者雖許一靣施行亦須便具畫一奏知所貴朝廷察其中否緩急未便可以救止候勅㫖七月二十二日三省同奉聖㫖並依奏者右臣謹案唐代宗大歴中霜雨損稼渭南縣令獨稱縣境不損遣御史案實損三千餘頃帝嘆息乆之曰縣令字人之官不損猶應言損何不仁如是乎貶渭南令為南浦尉徳宗正元中江淮大水宰相陸贄請遣使賑恤帝曰聞所損殊少即議優恤恐生姦欺䞇上奏曰流俗之弊多徇諂諛揣所悦意即侈其言度所惡聞則小其事制備失所常病扵斯又曰所費者財用所收者人心茍不失人何憂乏用乃遣使宣撫水灾憲宗元和中南方旱饑遣使賑卹將行帝戒之曰朕宫中用帛一匹皆籍其數唯賙救百姓則不計費卿輩當體此意七年又謂宰相曰卿輩屢言淮浙去歲水旱近有御史自彼還言不至為灾事竟如何李絳對曰臣按淮南浙東奏狀皆云水旱人多流亡求設法招撫其意似恐朝廷罪之者豈肯無灾而妄言有灾邪此蓋御史欲為奸諛以悦上意耳願得其主名案致扵法帝曰卿言是也國以人為本聞其有灾當亟救之豈可尚復疑之邪朕適者不思而言耳命速蠲其租賦古之人君聞有灾害唯責人不言其救灾唯恐人惜費又恐不及扵事陸贄李絳賢相也亦専信守臣奏報惡言者之小其事以緩君心之憂也今國家建都扵汴實就漕挽東南之利京師億萬之口所食贍軍養民皆出扵二浙此乃國之根本豈可不思其所從來今陛下一方之赤子嗷嗷然有倒垂之急如嬰兒之絶乳其死可立而待也方呼天赴訴開口待哺以延朝夕之命為之父母者忍惜力而不救乎臣竊詳臣僚所言朝廷巳賜米百萬錢二十餘萬州縣亦自依條發倉廩作粥飯救濟人行將少蘇矣臣竊以作粥救饑最出下䇿夫民已至相聚食粥則疾疫將起饑困已甚死者必衆此乃災傷之極正當憂慮豈得便為少蘇又言細民習為驕虚以少為多其弊已乆臣竊謂常年小有旱澇披訴災傷僥倖之民或容有此今浙西災害甚大民已流散乞食廹扵死亡方且疑其習為驕虚而不之信何其忍哉又言乞詔監司州縣詳具災傷分數賑貸行遣次第各行申奏而懲責其尤甚者臣竊謂朝廷以侍從之臣為一路鈐轄又選差監司以往行未及境未及設施朝廷既不憑信鈐轄司之言又戒約監司州縣如此臣恐官吏束手不能有所施為上下觀望各求茍免夫奏災傷分數過實賑濟用物稍廣此乃過之小者正當濶畧不問以救人命若因此懲責一人則自今官司必以為戒將坐視百姓之死而不救矣又臣僚言人言異同不可不察乞下鈐轄提轉及蘇湖等五州各令開具逐州水災所及凡幾縣幾村有無漂蕩廬舍溺死人口及髙田無水與水退可耕之地各約若干並令指實申奏不得相關稍渉謬妄乞重行降黜臣伏見近日浙西申奏自今年正月大雨至六月太湖泛溢蘇湖秀等州城市並遭水浸田不布種廬舍漂蕩民棄田賣牛散走乞食臣謂朝廷聞此當令官司如救焚拯溺猶恐不及今若降此指揮逐縣逐村須遣人抄劄廬舍人口田土數目饑荒之際此等行遣必為煩擾一事不實即憂及罰闔境皆死未必獲罪如此則賑濟却為閒慢百姓愈無救矣又言近日别遣使者支撥斛斗百萬見錢度牒約二十萬不為不多若見今未種今秋無穫則向去賑濟之期甚逺所差去官當相度事體措置一有失當其害非輕今所差去官與時蹔遣使不同若向去賑濟期日長逺此乃本司職事在彼自當任責當且委以措置不須約束免有疑惑觀望臣竊以今水潦方降秋田殊未有望審如臣僚所言今秋無穫本路必更奏請朝廷亦當接續應副則前日所賜未足為多况斛斗止令出糶官不損直常平倉本無給散之法唯廣惠倉許賑濟不足方許通支常平放税及五分處仍不得過所限之數兩倍浙西鈐轄司近方奏乞不限石斗尚未降朝㫖又奏夏田原未放税以此觀之官司守法止有賑救不及之事必無過當之理臣僚又言乞令賑濟官司措置稍大事件並申取朝廷指揮其急切不可待報者雖許一靣施行亦須便具畫一奏知所貴朝廷察其中否緩急未便可以救止臣伏見英宗時臣叔祖鎮出知陳州辭日英宗宣諭陳州累年災傷卿到彼悉心賑撫臣鎮至州方值春種即發常平倉貸民種粮提刑司奏劾官吏詔釋不問陳州至京不數日可以往返然猶不先奏而行恐不及扵事也神宗時西京大水遣郎官一人御藥院内侍一人賑恤多方救濟北京亦然朝廷未嘗先為條約以防之也今兩浙在二千里外事稍大者若須申奏比及得報即已後時雖急切許一靣施行若官司畏避事無大小一皆奏請不敢専行則此法豈不為害臣伏覩浙西鈐轄轉運司前後申奏累年災傷今歲大水以至結罪保明奏乞斛斗度牒又云父老言四十年無此水災近奏蘇州饑民死者日有五七百人饑疫更甚扵熈寧時又湖州奏貧人入城死者相繼遺棄男女官為收養據此則災傷輕重亦可知矣今詳臣僚所言大意唯以朝廷所賜錢斛不少恐災傷不至如所奏故欲考察虚實懲責謬妄然臣之愚慮竊謂朝廷已賜錢斛百二十萬徳深澤厚又選監司以往免更臨遣専使今監司方出國門錢斛纔至本路即降此指揮約束百姓必謂朝廷重惜錢斛輕棄人命百二十萬已厭其多將來乏食日逺復何所望所吝者財物所失者人心況本路有鈐轄司轉運提刑司發運司互相監臨而轉運司主財不欲多費故祖宗以來賑濟委提刑司葢恐轉運司惜物也監司州縣有凶年饑饉皆不得巳而上聞亦豈肯扵無災之地賑不饑之民耗散倉廩坐失租税以取不辦之責哉今唯當戒飭官司多為方畧存活人命寛其約束責以成效庶幾餘民早獲安堵唯是給散無法枉耗官廩賑救不及貧弱出糶反利兼并措置乖方所宜約束然此乃監司使者之事朝廷亦難遥為處畫也若監司得人此弊自少誠使有之則人言相傳亦豈可揜臺諌足以風聞彈奏朝廷足以考察案劾未為晚也今先降此指揮徒能牽制撓亂其所為耳伏望聖慈以逺方生靈性命為念無以官司賑濟過甚為憂其臣僚所言伏乞更不施行所有錄黄謹具封還伏候勅㫖范太史集巻二十

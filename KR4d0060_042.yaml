body:
  text: 范太史集巻四十二宋范祖禹撰墓誌銘安康郡太夫人胡氏墓誌銘夫人胡氏故寳文閣待制通議大夫彭城開國錢公諱暄之配也其先居婺州之永康曾祖瀫大理寺丞祖承師尚書吏部郎中贈禮部侍郎父賁右班殿直母朱氏夫人幼失所怙世父尚書公則愛其容徳有異親鞠育之尚書為三司使徙家開封遂為開封人彭城公吳越忠懿王之孫英國文僖公之子少以文學有聲塲屋間英國夫人尤所鍾愛慎擇昏姻聞夫人之賢遂委聘焉錢氏宗族盛大夫人入門内外莫不贊賀從姑入見仁宗面賜冠帔彭城公陞朝封文安縣君夫人孝於姑順於夫和於娣姒待上下親疏皆適其宜性寛裕凝重雖燕必荘未嘗有疾言遽色閨庭自肅彭城公不殖財産累官列卿而家甚清約夫人能安之稱家之有無以遇親賔教諸子有法度故皆謹飭自立熈寧中仁宗女周國大長公主將下嫁神宗擇主壻欲得士之敏秀而文者夫人之子景臻在選中帝見其名氏曰此大勲之後忠孝之家當無以踰矣召見大悦即詔以景臻尚主擢彭城公少府監進封夫人同安郡君入謝禁中帝勞問甚渥顧謂近侍曰温厚若此宜其有令子也再錫命服彭城公出守南陽夫人入辭帝見所進名猶稱郡君詔封永嘉郡夫人是日三宫幸後苑因留侍宴在鄧得風痺疾大長公主遽入面請遣其子景升省疾詔乘驛以往彭城公還朝賜第於苑城之北與主第相望初神宗詔陳國長公主等行見舅姑禮及大長公主出降中書請如故事帝曰大長公主朕宫中每見必拜雖皇太后亦敘姑嫂之儀不可與朕諸妹等也宜依兗國公主之禮然大長公主天性孝恭每見夫人親執婦道㫖甘温凊唯恐不至夫人春秋既髙恬愉安養十有餘年嵗時家人獻夀綵服戲膝下孫曾滿前未始以貴盛自驕嘗謂人曰吾何以致之此自錢氏徳澤長逺爾吾敢忘平昔乎今上祀明堂加安康郡太夫人夫人篤信釋氏晩年深究性理惡殺生類未嘗鮮食将終方晝寝忽謂左右當掖我興正坐奄然而化時元祐五年十二月丁巳享年七十有六上與太皇太后皇太后遣内嬪臨奠賜白金千兩皇太妃淑妃亦問卹相繼大長公主為姑行服哭臨如禮太皇太后聞之遣使賜縞帛二百疋子男十二人景杰成都府温江尉早卒景畧右朝奉郎景歴右奉議郎先夫人而亡景升右朝散郎景棻右宣徳郎景孺保静軍節度推官景勲復州玉沙縣令景規集慶軍節度推官景臻隨州觀察使駙馬都尉景振右班殿直景持景特皆右承務郎女二人長適朝散大夫少府少監吕希績次亡孫男女四十四人忱右騏驥副使及次男宜春郡主及次女皇家所自出也恢前汝州司理參軍愷博皆右班殿直懌潞州司理參軍悌潁昌府法曹參軍㥠陳州司理參軍愉太廟齋郎忭慎愭皆假承務郎懈忻恦惕恜惲􅀈悟㦢未仕二未名女適宗室右衛率府副率令珂次適右班殿直夏大章次適宗室右千牛衛将軍令珪餘在室曾孫男女六人彭城公以元豐八年薨葬開封府祥符縣魏陵鄉諸孤將以夫人捐館之明年二月辛卯合祔以少府少監吕君之狀問銘於太史氏不惟紀夫人之懿行亦所以見本朝家法之正也銘曰胡本姚氏帝舜之胄爰及太姬實啓厥後錢以吳越入為帝臣毓慶蕃昌世惟有人忠懿之孫文僖之子夫人宜家並受多祉仁宗天屬神考擇配夫人有子以賢克對夫列近侍啓封大邦赫奕寵榮一世之光夀考令終歸從皇辟魏陵之原閟此幽刻左中散大夫守少府監吕公墓誌銘公諱希道字景純其先自太原副留守始為河東人由文穆公而下三相五尹遂家開封世族冠天下曾祖䝉亨大理寺丞贈太師中書令兼尚書令魏國公祖夷簡守太尉致仕贈太師中書令兼尚書令秦國公諡文靖公配饗仁宗廟庭考公綽翰林侍讀學士贈司徒曾祖妣李氏祖妣馬氏妣上官氏封魏秦英三國太夫人公為兒童時已端愿不妄言動文靖公參國政奏授守校書郎遇郊禮将復奏遷官公方七嵗固辭請及族人之未仕者文靖公由是竒之慶厯六年獻所為文二十巻召試學士院賜進士出身司徒出鎮永興秦鳳皆以書寫機密侍行入判登聞鼓院宗室女之子例得官無嫡庶辨公上疏請殺庶子官爵至今以為定法通判揚州大姓湯氏訟閲十二年不決部刺史檄責州將患之公曰世豈有不可窮竟事實耶請不問洗先治吏果得情鞫吏受財數百千黥吏止訟三司使邵必以解池嵗課久負慎擇守奏公知州事陜西轉運使張靖言薛向鹽法非是詔委近臣同三司考究漫生鹽嵗約增二十餘萬緍靖以為非實移公案驗公曰漫生鹽歲實若以為鈔即溢鈔分布諸路害鹽法如此雖無漫生可也議者以公言為然始解人不知向學公毁淫祠及寺無舊額者百餘處取其材廣學宫士得居處講習即學為公立生祠知和州郡境有麻湖瀕江二十里環湖田數千頃無畜泄之備雨久則田皆陷澤中為一方患甚鉅公疏河通江介湖中為溝港雨暴注則瀉諸江因溝港通運舟逹城中數千頃皆為良田歲収三百餘萬斛朝廷優賞其功熈寧六年初行免役法有司欲過取羨錢公召諸邑令使量民力為入額一定無所増損使者謂公措置不當奏劾以他事竟釋罪而朝廷以公所定役法推之一路為式神宗方講修馬政置河南北監牧二使樞宻使陳公升之薦公權領其事朝廷素知公遂任為河南監牧使公建議川茶色帛蕃部資以為急用卭蜀茶歲出不勝計積久賤即棄之内帑縑帛新壓故不時泄且壞請以西川上供銀易茶帛漬損者變緋緑轉致塞下以易蕃馬詔即行之併廢原武淇水兩監嵗省錢二萬緍民佃牧地四千五百餘頃得租六萬斛以助買馬朝廷方委公馬政而獻言者以冗占牧地民兵請一切廢監公言兵馬錢穀國之要務兵闕可招錢榖可斂馬廢不可旦夕得唐初因隋馬三千匹命張萬嵗領牧事麟徳中孳數至七萬六千置八使領監跨蘭渭秦原四州之地猶為狭隘國馬之盛獨稱有唐而緩急有備今兩監牧地止二萬頃比唐十不及一臣承乏領使國馬大事不敢避萬死盡言書上建議者慚沮不敢辨乃捃公以報孳息不實卒廢監公亦還朝神宗察公言直釋其罪公初以奏課對神宗諭以言者欲於沙苑牧羊計綱入京公言此細務臣不敢煩天聴上曰有唐故事公曰唐都雍去沙苑近今京師非比也條其利害凡費緍錢數萬神宗釋然納之為開封府推官民有相詈激語近訕上無悖慢情尹及同僚皆欲以指斥抵法公力爭請上聞神宗果笑曰小人無知灼非本情釋之府中皆嘆伏廨火延燒比屋坐左遷監南京糧料院數月朝廷察其非辜遷知滁州又知汝州權發遣三司都勾院除知澶州辭日上諭公以河徙欲鎮安百姓執政進擬從官朕選用卿公至澶以治績稱秩滿再任河朔保甲白晝持梃公為盜教隊廵檢和徳挾提舉司勢因縁枉法掠聚貨賄監司隠忍不敢詰公一日發其贓狀僚屬皆惶恐公即獨奏其事捕徳下獄提舉官聞之馳驛至澶取保甲囚盡釋之公曰山可移獄不可變既窮治取其首領於刼掠處斬之餘皆配𨽻澶人感泣朝廷亦命他路監司審其獄皆實重貶徳自是與提舉司益不協保甲有犯法者諸邑稍加懲治則必反中以他事公檄諸邑保甲犯法有疑必送州至則悉論如法提舉官怒欲劾公其同僚以公詞直不敢書乃已元豐五年夏河東注靈平埽一夕潰岸幾決公曰此正前日之曹村也事不可再即馳至河上自督役河得無虞先是河決小吳南直靈平下埽甚急當嵗有水患乃請開大吳口導河循西山北流論者以為得禹之舊迹自是曹村無水患矣轉運判官張適上河朔鹽利以助邊計詔推行之公曰祖宗手詔在北門地多斥鹵民所衣食故通鹽不禁河朔之人可安不可擾適深恨怒初澶河未徙南北城相望河貫其内故并河為禁地河既徙而北流人往来退灘未有禁有盗十餘人刼掠他州縣夜道退灘適因奏强賊由城中過法當案責守臣遂罷還朝今上即位朝廷亦悟公無罪除知湖州吳興六邑出役錢七萬七百餘緍而募直止四萬二千其餘為羡公首請蠲除書上適與詳定所議合即施行之徙知亳州淮南饑仍嵗大雪民凍餓濵於溝壑公至即請出常平倉粟賑救民有壞屋以㸑公不俟聞發官芻賤鬻之公上言朝廷以孤幼財産盡録以寄官俟長而給之此仁聖惠䘏之至也今之諸路監司不能上體朝廷意往往假貸藉以為他用民有終身垂白不能得者請立法母輒貸用入為少府監元祐六年三月乙丑寝疾終於京師興寧坊之第享年六十七公性寛厚平居沈静端黙雖子弟不見其喜愠熈寧元豐中士急於進取公雍容其間安分隨所適而樂遇事有不可必力爭及元祐之初吏治寛平公雅量自如亦不改其故常為十郡皆有惠政去而人思之有文集二十巻其官自祕書省校書郎五遷為太常博士又七遷至太常少卿易朝議大夫中散大夫左中散大夫娶虞部郎中王珣瑜之女累封華原郡君先公五年亡子男九人之問朝奉郎延問宣徳郎君問通直郎昭問宣徳郎榮問河南府左軍廵判官徽問真州六合縣主簿舜問泗州司理參軍芻問假承務郎次不及名延問先亡女四人長次皆適宣義郎張埴次適通直郎王博古次適宣義郎張卿佐孫男十人時中早亡有中守中剛中並假承務郎和中惇中並亡民中適中餘未名孫女十人其年六月壬寅諸孤奉公之喪葬鄭州管城縣懷忠鄉神崧里司徒公墓之右華原夫人合祔前葬以太學博士許君之彦狀来謁銘謹諾而銘曰温温吕公惇徳有容奕世不顯公奮自躬有惠於州有勞於使惟帝知之乃命以事屢進屢已不見色詞如川之渟人莫撓之謂公不逹公事四世開國中都正卿是位謂公不夀亦既耆老公多孫子福禄是保懐忠之原神崧之宅嗚呼吕公兹謂不沒夀昌縣太君王氏墓誌銘夫人王氏曾祖繼華贈太師中書令尚書令陳國公祖兼著作佐郎贈太師中書令尚書令魯國公父子融尚書兵部侍郎致仕其先青州益都人夫人伯父沂國文正公曾相仁宗徙京師今為開封人夫人幼聰悟妣張夫人卒哀毁如成人事繼母張夫人至孝張夫人愛之如所生十九歸於尚書職方員外郎贈左正議大夫張公仲莊張公太府卿居業之孫祁國文孝公觀之子夫人逮事太府奉舅姑盡婦道文孝立朝居家細行必謹有漢萬石君之風夫人動循法度文孝嘉之曰有婦如此吾家無慮矣文孝公薨不月而姑河南夫人亦捐館夫人毁瘠幾不能勝治喪事以禮睦族人以恩族人之貧者出奩具以周其急撫諸姪如已子由是内外皆尊敬之嘉祐中正議守劒州還卒於京師二子皆未冠夫人畢力襄大事嚴治家庭性仁愛寛厚待子孫遇婢妾無大聲色而閫内自肅平居服飾質素歲時祭祀常先諸婦視牲滌濯雖老不懈凡家事無改于舊率如正議時初文孝将薨召夫人屬以後事夫人奉遺訓斯須不忘教子必以禮義嘗曰文孝以徳行起家清白之訓以屬于余子孫當勉以繼之勿使人謂家風衰于祖考則為孝矣少好内教老而彌篤晨起具服焚香誦佛書視外物翛然元祐六年七月庚申寝疾卒于京師武成坊之第側身而沒神識不亂享年六十有七以正議封夀昌縣君以子進封太君二子曰保㣲右朝奉大夫太府寺丞曰保衡大理評事早卒四女長適右朝奉郎吕昌文次適右宣徳郎王价餘幼亡孫男二人山凡女二人長適右承事郎吳某次適進士趙希旦其年闕月闕葬河南府闕縣闕鄉闕里闕祔正議之墓銘曰夫人之生徳禮之門歸于令族仁孝之昆爰初盥饋夙夜勤止乃薦蘋藻以奉永祀為婦為母皆可矜式視其子孫足以知徳傳家之訓在後承之詔于幽壤系此銘詩朝奉郎郭君墓誌銘君諱子皋字徳臣其先京兆人廣明之亂六世祖御史中丞甫從僖宗入蜀弟及為廣都令遂家焉曾祖漢平祖仁渥贈職方員外郎父輔尚書工部郎中梓州路轉運使累贈光禄大夫母徐氏贈天興縣太君君以光禄廕補太廟齋郎好學屬文嘗薦于有司初任成都府新繁主簿丁内艱服除調成都犀浦主簿卭州大邑主簿陜州司理參軍舉者十有四人改衛尉寺丞知卭州大邑縣縣北與蜀州晉原接境每嵗二邑之民鳩工為堰決渠溉田晉原㨿上流有餘則注之他江以邀邑民得重賂乃不為病謂之買水人素苦之君至均以夫井斷木為平以限水廣深多寡自木為準目曰水平由是大邑之水不買而足號曰郭公平舉監成都交子務紙幣之設本與錢相權至是大壊價賤不售法幾為廢君講究其病錢幣復稱官民利之先是交子務以二年為任監司奏留君半嵗遂著令以二年半為任舉者三十人知昌州遷太子中舍易階通直郎瀘卒譙青因博戲殺人獄五徙輒變監司委君一訊而折以具獄讞竟獲免死於是一路獄之難決者多以委焉徙知劒州官軍討瀘夷道出劒闗戍闗卒數十人輒亡從軍以幸戰功及師還主將悉捕送郡有司以為禁卒逋亡踰月當死君曰離戍從軍非亡命也止罰而釋之郡當兩山間民架竹為茅屋依山而居故多火災君教民易以瓦官為陶瓦貸貧民不費而革自是無火患遷奉議郎知利州今天子即位覃恩遷承議郎以疾請便郡歸成都遷朝奉郎元祐二年四月十日卒于家享年五十有五君居家孝友族人有貧不能葬者君出家資市地具喪以葬居官忠信明習法令精于吏治務在愛民不以勢利易其守以是所居可紀所去見思娶石氏中大夫洵直之女封闕縣君六子曰㻞蜀州江原主簿曰瑜太醫局丞曰瑀曰璉皆業進士曰瓛曰某早亡四女長適進士陳叔逹次適進士史折其二亡孫男六人女一人以六年闕月闕葬于鄉里君早有退居之志嘗曰仕為郎其可已矣及病乞致仕命下而卒銘曰郭氏自唐從狩于蜀世有令人以暨光禄恂恂使君孝友篤誠有惠在人不隕厥聲爵位豈多岳牧方試夀老豈多耆耋未至如彼泉流既深既長慶在後人子孫其昌范太史集巻四十二

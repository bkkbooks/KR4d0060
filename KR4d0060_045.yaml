body:
  text: 范太史集巻四十五宋范祖禹撰皇族墓誌銘保州防禦使贈崇信軍節度使房國公墓誌銘公諱仲洽字景和曾祖魏王元佐太宗之子祖允升平陽郡王考宗回崇信軍節度觀察留後漢東郡公妣李氏隴西郡君公幼聰敏謹重不妄語笑初賜名授太子右内率府副率歴右監門率府率右千牛衛将軍求師擇友専精於詩書積十餘年或勸其就試於有司公曰讀書學古足以治吾身而已安可干國之賞耶改右監門衛大将軍領昌州刺史漢東捐館居喪哭泣幾失明遷均州團練使丁母憂號毁聞者傷之乞守墳百日宗正以例不許公遣長子士瞻以状詣丞相府力請朝廷憫其懇切從之遂為定制宗室守墳自公始於是伏處墓次布衣蔬食至卒哭則形體殆無人色咸稱其孝制詔曰銜恤既久善喪有聞今上即位遷右金吾衛大将軍開州防禦使改領保州刺史本州防禦使元祐七年十月十四日卒年五十有三遺命薄葬贈崇信軍節度使房國公公天資儉約無聲樂玩好家多藏書手不釋巻雖居私室必歛袵正席内外肅然無敢犯者奉朝請四十餘年未嘗有小失娶王氏封和政郡君贈中書令秦王審琦之曽孫先公九年卒和政事舅姑以孝聞嘗割股愈姑之疾論者以配公之徳為宜四男一早亡曰士瞻右内率府副率曰士慡曰士䡮皆左班殿直十女三早亡長適左班殿直劉建中次適左侍禁劉佃次適承務郎樊彦和次適田珣次適焦元叔次適范陶皆三班奉職餘在室孫男四人女一人九年二月已酉𦵏河南永安縣銘曰翼翼房公率履自躬一其初終惟孝惟恭稽其徳行宗室曾閔子孫不忘萬石之謹右金吾衛大将軍原州防禦使墓誌銘公諱世復字希靜曾祖徳芳楚康惠王祖惟能集慶軍節度觀察留後南康郡公父從贄鄧州觀察使南陽侯母㑹稽郡夫人康氏所生母陸氏封安福縣太君初賜名授太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍衡州刺史右羽林大将軍吉州團練使坐罪非自犯奪官二等未幾還一等官又數年復舊官遷右金吾衛大将軍原州防禦使公性剛嚴治家整肅事親孝事長順發言質直無少阿曲留意圖史通尚書大義仁宗嘗賜御書十二軸有忠孝世復字希靜七字公嘗集三聖宸筆草字兩進於上寵賚金帛元祐二年十月葬安福君往来墓次冒寒感疾明年四月八日卒年五十有四娶姚氏右千牛衛上将軍宗望之女封河東縣君十二男曰令匹太子右内率府副率曰令逭贈徐州觀察使曰令介太子右内率府副率皆卒曰令涔右侍禁曰令宁左班殿直監常州鹽税七人皆未賜名而卒女十五人長適右侍禁郭譯次適東頭供奉官姚彦輔次適奉職張敦皆卒次適内殿承制陳仲立次適故右侍禁劉俁次適前舒州桐城縣主簿張祁次適三班奉職史厚躬次適奉職耿之常六人在室而亡一人幼在室孫男六人曰子讜三班奉職次皆幼孫女七人長適奉職袁弼次皆幼九年二月已酉葬河南永安縣銘曰仁皇手札以寵宗親公得之多禮異羣臣惟其忠孝行本諸身右監門衛大将軍贈眉州防禦使追封通義侯墓誌銘侯諱仲科字師哲魯恭靖王元份之曾孫信安僖簡王允寧之孫韓榮思王宗諤之第八子母韓國夫人馮氏所生母仁和縣太君閻氏初賜名授右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍侯少好學通五經専治尚書以喪服未嘗一試孝敬友悌性寛厚樂施予侍韓王夫人疾衣不解帶者各踰旬浹居喪致哀如禮所生母卒以毁得疾元祐五年四月二十八日卒年三十有二娶劉氏皇城使永吉之女也封嘉興縣君二男曰士泚曰士陴皆左班殿直女一人幼九年二月已酉葬河南永安縣銘曰振振宗子孝敬友悌刻意藝文曾未一試從祔九原永齎此志右金吾衛大将軍慶州防禦使墓誌銘公諱令苕字曼叔曾祖惟忠贈彰化軍節度觀察留後舒國公祖從藹贈武勝軍節度觀察留後韓國公父世本贈武寧軍節度觀察留後彭城郡公母張氏安定縣君初賜名補率府副率累遷鳳州團練使慶州防禦使卒於元祐七年五月二十一日年四十有四公性聰敏好學博通羣書喜為詩不尚華采初葬彭城公有司穿壙于隂穴既畢而公知之累表請改卜朝廷以既定不可易特置角堠以識其名母夫人疾藥必親嘗而後進居喪毁瘠表乞廬墓遂感疾而終娶吳氏封永福縣君九男曰子筌率府副率曰子隆右班殿直曰子遵三班奉職曰子遡子適未仕餘皆夭十女太和縣令吳罕右班殿直張永錫右班殿直陳頵三班借職李縝三班奉職吳披其壻也二在室三早亡孫女三人二早夭九年二月已酉𦵏河南永安縣銘曰生於軒冕樂在名教君子之行維民則傚系此銘詩以彰純孝右武衛大将軍吉州團練使墓誌銘侯諱令瞿字思聖彰化軍節度使舒國公惟忠之曾孫定州觀察使博陵侯從質之孫右屯衛大将軍世鎮之子母長安縣君周氏初賜名補率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍和州刺史吉州團練使元祐四年四月九日卒於昭化坊私第年三十有八侯幼時事母以孝聞好學博通經史善為歌詩工筆札宗室碑刻多請侯書娶郭氏封太康縣君一男曰子完三班奉職三女適三班奉職梁允明三班借職張克侁故進士王舜欽九年二月已酉𦵏河南永安縣銘曰昔漢東平為善以顯惟侯克孝文藝勉勉弗克庸顯喪此邦彦右武衛大将軍秀州團練使墓誌銘侯諱令巍字君則彰化軍節度使舒國公惟忠之曽孫萊州防禦使東萊侯從恪之孫武寧軍節度觀察留後魯國公世規之子母涇陽縣君和氏初賜名補太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍澤州刺史秀州團練使初魯公譽望為宗室一時之冠處身正家悉有法度每聞昕鼓必先至學館族人無敢後者英宗建宫學取以為法侯克紹先徳敦厚荘謹不妄言笑好讀書篤志於學性尚儉素居處茍安而已治家以嚴中外敬憚子孫在側雖閒燕必正立拱手平居終日容貌端肅魯公薨執喪哀毁元豐中兩乞試以朞服不得就元祐六年十二月二十七日卒年四十有三娶劉氏封永泰縣君五男曰子綏右班殿直曰子絳三班奉職曰子維曰子縝曰子綽九女左班殿直李球張濟右班殿直王澈左班殿直孟滋太廟齋郎王子充其壻也孟氏女早卒四在室孫女一人九年二月已酉葬河南永安縣銘曰翼翼魯公宗室之冠思古僖侯興學自泮廣陵嗣音亦廣徳心弗試而隕流風可欽左朝請郎通判亳州軍州事墓誌銘君諱令懇字懇之冀康孝王惟吉之曾孫楚國僖安公守巽之孫濵州防禦使贈開府儀同三司敦惠公世該之子母南陽縣君李氏繼曰夀昌縣君李氏初賜名令始補太子右内率府副率歴右監門率府率試換朝請大夫太子中允監北京糧料院改太常丞監在京倉官制行改奉議郎遷承議郎丁開府憂服除監進奏院改今名今上登極轉朝奉郎簽書鎮海軍判官遷朝散郎通判亳州轉左朝請郎君㓜不戲弄長嗜書力學不倦每厭宫邸思有所效用其材神宗之初許宗室補外官得召試學士院換文資初至北京人謂宗子長於富貴必不事事君清慎廉勤過於寒素監司交薦之丁開府憂既除喪家財一毫不取或以為言君曰吾不忍父母殁而與兄弟競財也歴官十五年所居見稱性無他好雖在職未嘗廢書歴代史皆手抄精筆札工篆籀善為尺牘而恬於勢利未嘗謁公卿之門人或勸之君曰富貴儻有不假妄求命若止此求之何益聞者賢之元祐七年二月二十八日卒於亳州官舍年四十有一娶田氏贈太師中書令欽祚之孫女封秀容縣君二男曰子意業進士次早夭四女長適成安主簿滑延年一在室二早亡九年二月已酉𦵏河南永安縣銘曰祖宗以来不假名器公族異材終老不試先帝稽古試以吏事君以文學始逾强仕命不可延亦遂其志左班殿直墓誌銘君諱士幅字信之鎮江節度使郇國公允成之曽孫容州觀察使宗儒之孫右監門衛大将軍坊州刺史仲午之子母福昌縣君王氏以父䕃補右班殿直改左班少渉學頗能詩性有巧思監相州臨漳鹽酒税勤於吏職未幾課増羡元祐八年六月七日卒年二十有五娶王氏二男一女皆幼九年二月巳酉𦵏河南永安縣銘曰吏事惟勤縁飾以文夀雖不遐亦克有聞左班殿直墓誌銘君諱令泌集慶軍節度觀察留後惟能之曾孫保静軍節度使同中書門下平章事遂寧郡王從古之孫右監門衛大将軍嘉州刺史世設之子母永嘉縣君程氏初賜名補授右班殿直改左班補外任監郾城酒税元祐六年六月七日卒於官年二十娶田氏九年二月已酉葬河南永安縣銘曰振振王孫試吏以勤既冠而隕未克有聞右侍禁妻王氏墓誌銘君王氏開封人曾祖亮洛苑使祖察西頭供奉官父復供備庫副使母夀安縣君趙氏君既笄適宗室右侍禁令組元祐元年七月二十五日卒年十八君資性柔明服勤婦道善於女工不妄笑語檢身以禮居家以儉事上接下為人所稱二男曰子權次未名闕女幼九年二月已酉葬河南永安縣銘曰宜其家室惟儉以勤年則不永婦徳有聞安化軍節度使榮國公妻馮翊縣君郭氏墓誌銘夫人郭氏曾祖密贈保順軍節度使祖守信贈右監門衛将軍考琮贈左領軍衛将軍夫人年十六適安化軍節度使榮國安恪公仲玘封馮翊縣君事舅姑晨昏有常節接夫相敬如賔榮公薨罄其資装盡禮以𦵏撫育諸子隆于慈愛而其情均一子士泞将赴官亳州夫人與之訣曰吾不復見汝矣左右皆怪之不一月而感疾元祐二年五月十八日卒年五十有四五男曰士仡早卒贈右屯衛将軍曰士歸右武衛大将軍嘉州刺史曰士簮右武衛大将軍端州刺史曰士彫右監門率府率卒曰士泞右侍禁三女長適東頭供奉官田良彦次適右班殿直唐振次適假承務郎周諲孫男五人曰不疑右監門率府率曰不佞未仕曰不晦曰不厭皆三班奉職次未名孫女十人九年二月已酉𦵏河南永安縣銘曰為婦孝敬為母慈愛子孫詵詵福禄未艾宜享眉夀養不可待華州觀察使妻永福縣君郭氏墓誌銘君郭氏唐尚父子儀之後曽祖守信贈太傅祖世隆贈太子少師父承顔贈左清道率府率年二十適華州觀察使仲寂入門而娣姒皆喜受饋而舅姑交慶觀察捐館守孀育孤凡二十年左右媵侍常假以顔色内外親戚不覺有薄厚御僕使治居第皆有條理宗族稱之多取法焉元祐五年六月二十五日卒年四十有五五男長早卒曰士衆右監門率府率卒贈左領軍曰士編右監門衛大将軍榮州刺史以力學登科第曰士斚士俛皆右侍禁居官有稱皆君之善教云五女長適左侍禁王植次適節度推官王璋次幼亡次適左班殿直霍祥卒次適假承務郎陳敏求孫男四人曰不匿曰不虚皆三班奉職餘未仕孫女八人長適三班借職朱輔國餘皆幼九年二月已酉𦵏河南永安縣銘曰尚父在唐功格于天覃延厥後其慶綿綿歸於公族宜其家室為父為母皆可矜式右監門衛大将軍妻長安縣君蔚氏墓誌銘君蔚氏曾祖興四廂都虞候贈太師祖昭敏殿前都指揮使贈太師中書令考保用東染院副使贈左領軍上将軍君幼喪父母萬年縣君李氏攜之改嫁宋氏既笄歸監門衛大将軍贈懐州防禦使河内侯仲謙封長安縣君河内侯好學構閣於邸中以藏書君助而成之聞别院樂聲則曰淫哇之音吾家不可有也河内侯卒君教諸子専以經史斥出服御華靡敦尚儉素以至終身元祐二年七月二十三日卒年五十男六人曰士見右監門率府率卒曰士奄右監門衛大将軍次早亡曰士域右内率府副率卒次二人早亡六女長適西頭供奉官彭珪次適左侍禁曹希仲次早亡次適河清主簿楊元振次適順陽縣尉任綽次適莒縣尉夏琦孫男六人曰不傲三班奉職曰不忮曰不求卒曰不撓曰不屈曰不妄卒孫女二人皆早夭九年二月己酉𦵏河南永安縣銘曰助夫藏書惡鄰好樂以此治家勤儉素樸思古賢淑九原可作右監門衛大将軍妻長夀縣君李氏墓誌銘君李氏開封人曾祖繼隆贈太師尚書令楚國公祖昭亮贈太師尚書令崇國公考惟賞右騏驥副使母曹氏譙郡君君幼孤鞠於兄嫂性和静處於閨室雖婣戚罕獲見自恨幼失怙恃每時節忌日哀號不食家人稱其孝年二十歸右監門衛大将軍仲戭奉其姑榮國夫人盡婦道居夫室未嘗厲聲宗族疏戚交譽其美元祐二年十月二十六日卒年二十有四一男曰士位右班殿直七女皆幼九年二月已酉𦵏河南永安縣銘曰顯顯令族作配宜家孝敬淑慎夀考弗遐太子右監門率府率妻張氏墓誌銘君張氏浚儀人曾祖堯封贈太師祖化基觀察使考守素國子博士君幼孤養于伯父左藏庫使守誠伯母宜春縣主性孝謹伯父母愛之過於已女年十八歸太子右監門率府率仲璑事舅姑盡禮與家人上下雍睦率府好學君常勉之治家有法服用節儉女工不矜巧婦容不尚侈居則嚴整淡如也元祐八年五月十四日卒年二十有七四男曰士泍士滫皆右班殿直二未賜名五女四尚幼第二女早夭九年二月已酉𦵏河南永安縣銘曰婦有四徳持以靜専宜享遐夀云胡不延右武衛大将軍康州團練使妻安平縣君江氏墓誌銘君江氏開封人曾祖文溥儀鸞副使祖規揚州司理參軍父惟善西頭供奉官年十六歸右武衛大将軍康州團練使士競封安平縣君與康州皆好佛書悟空理緝室異處外世事屏紛華以清靜為樂及疾家人出珠璣錦繡之服将為斂具君却之易以常服乃受元祐五年六月八日卒年三十有六二男曰不溢曰不匱皆右班殿直二女長適進士李絳次幼九年二月已酉𦵏河南永安縣銘曰婦道専静亦克盡性屬纊弗華其終以正右監門衛大将軍吉州刺史妻安福縣君王氏墓誌銘君王氏開封人曾祖承休贈左金吾衛上将軍祖世範左驍衛將軍父克敦内殿承制母杜氏永和縣君年十五歸青州觀察使仲覽之子士戴為介婦與其姒協力治内事奉舅姑孝敬接姻族柔順待夫以禮而敦睦御妾以嚴而不忌奉身以約而不華元祐五年十二月七日卒年二十有八五男曰不倦早卒曰不􅀈三班奉職曰不損曰不俅曰不作皆幼二女長在室次早夭九年二月已酉葬河南永安縣銘曰宜其宗家惟孝以勤弗克夀考婦徳有聞右武衛大将軍榮州刺史妻大寧縣君花氏墓誌銘君花氏開封人父永安左班殿直君年十八適右武衛大将軍榮州刺史令羣為繼室封大寧縣君事舅姑孝謹奉祭祀嚴敬接族人以睦為繼母以慈宗室稱焉元祐八年五月十日卒年二十有七五男曰子建三班奉職卒曰子延三班奉職次早夭曰子佐曰子某七女皆在室九年二月巳酉葬河南永安縣銘曰為婦孝敬為母均一是惟可銘以賁幽室范太史集巻四十五

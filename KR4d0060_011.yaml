body:
  text: 范太史集巻十一宋范祖禹撰表西京謝上表以下代文潞公偃藩全魏獲解兵符分正成周復司宫鑰祗荷寵渥伏切兢營伏念臣被遇三朝秉均二府任極代天之重才無經國之能辱體貌之兼隆竭涓埃而何補頃從踐土往鎮北門俾總䕶於將壇遂七周於星紀自越從心之嵗累輸乞骨之誠叠奉宸章莫迴睿聴比膺召節入對邇顔奉陪宗祀之儀克謹駿奔之職忽奉告庭之命復乖謝事之期進秩上公居留西土拜封章而懇避祈印節以並還靡收絶等之恩終莅撫封之政此蓋伏遇皇帝陛下至仁守位大徳記功責實衆賢深矜舊物改容加禮將申勸於臣鄰佚老示慈許漸還於里舍曲全終始尚委蕃宣臣敢不上體眷懐乃心王室勉企壮猷之效粗修述職之勤冀畢餘年仰酬洪造謝加食邑實封表慈仁圗舊慶典䇿勲祗服寵私交深榮悸伏念臣早塵異選進履亨衢誤膺仁祖之知擢處冡司之任洪惟英考命自帝庭仰當付畀之心俯協謳歌之望登儲有請實為輔相之宜衛社竭勞敢期爵賞之報荷皇明之燭隠頒天詔以褒功仍稽進律之文亟發吿庭之號節旄並建井賦兼増幸獲遂於懇辭猶曲加於麗澤此蓋伏遇皇帝陛下懋昭明徳祗遹詒謀永懐追孝於前文故特眷求於舊物功慙丙吉増大博陽之封寵越韓侯奄開北國之土誓竭糜捐之節仰酬覆育之仁謝男安道授承事郎表公朝懋賞私室叨榮懇避無從感抃兹極伏念臣早塵列爵幸克有家服采先朝備位上宰奉詢謀於大議同登翊於元儲何圗神聖之知荐被褒嘉之典甄收弱息齒預周行篤前勲而不忘慙舊徳之可食此葢伏遇皇帝陛下睿明稽古信厚記功俯覃及㓜之恩敷錫馭臣之福賞延於世既祗服於寵私仕教之忠誓共期於報塞謝賜詩序表宸眷俯臨天言誕布拜受之始服寵若驚臣聞昔者帝舜作歌申勅天命推功臣下爰及股肱臯陶拜手颺言其事周之成王諸侯助祭遣之於廟亦歌臣工列於詩書著為典訓而未有褒優黄髪甄敘舊勲昭神祖之明述文考之志然則聖作之美獨冠古今必得鴻儒碩學之臣序而紀之天㫖示慈輔臣奉命復頒温詔賜以表恩榮遇之極曠古莫比顧臣無狀何以克堪此葢伏遇皇帝陛下神質天縱聖學日躋制作參於造化惠澤涵於動植以臣被遇三朝服勞四紀簡在扆宁録其涓埃體貌過隆宴犒加等親紆睿藻寵其行役竊惟聖哲之言夐越風雅當傳示永久與天無極今序述之作又所以宣昭發揚譬如日月之光捧以卿雲之氣璧琮之采薦以繅藉之輝葢將聳勸於後来豈獨照臨於私室謹當刻之金石傳之子孫對揚洪休焜燿朽質非常之寳居有神物之䕶持不世之恩誓畢微生而報效進御製詩碑狀睿藻惟新鐫功甫畢非特一時之寵乃為萬世之傳在臣之榮何以過此伏惟皇帝陛下聰明文思齊聖廣淵言成典謨體備風雅雖天文下照萬物咸覩方冊所載億祀不刋然臣受藏寳章負荷聖訓唯刻金石可圗永久末學淺陋無能敷述䝉被恩光不勝感遇謹為之記附於其下詔書詩序别刋琬琰凡為二碑立之私室家廟之右御書閣下榮及祖考傳之子孫顧兹異渥曷以報稱唯殫忠力仰答鴻造其刋石摹本謹隨狀上進留司慰太皇太后小祥表伏審今月二十日慈聖光獻太皇太后小祥者坤儀永謝天序不停奄及諱辰俯臨祥祭伏惟皇帝陛下孝誠罔極聖感難居瞻風木以興悲嘆隙駒之倐過練冠始御勉遵禮制之文廟祏猶新哀薦時思之享凡在臣庶同切憂惶臣等伏限官守不獲奔詣闕庭無任云云乞致仕第一表黄髪殘年過忝公圭之貴成周京邑猶司宫鑰之嚴仰祈從欲之仁俯遂乞身之請伏念臣頃居朔部累貢需章雖備列於危悰尚莫迴於宸聴寵禄既極筋骸益衰将耄及以無堪顧職思而難勉况聖朝念老賢相辭榮如臣之年謝事已久輒復闕於前懇冀獲保於餘生伏望皇帝陛下深軫睿慈恫矜舊物全其終始許以歸休庶偃息於故廬少優游於聖日未就溝壑敢忘朝廷謝遣中使賜詔不允表使軺傳命宸檢頒恩荷異寵之眷存撫微躬而榮懼引年有請顧未遂於私誠佚老推慈冀終迴於睿聴誓竭衰殘之力仰酬覆幬之仁乞致仕第二表危衷上列髙聴未迴仍頒深厚之訓言重荷褒優之寵數敢再殫於愚懇冀終奉於俞音伏念臣猥以薄材謬當大任備將相踰於三紀竊名器冠於羣臣仕以易農望豈及此内自循省實已滿盈爰從累嵗以来荐有乞骸之請宸聰屢瀆私志莫從既久越於常期復将加於耄齒犬馬之力雖戀於主恩乾坤之仁宜息於老物伏望皇帝陛下曲迴睿睠俯徇微誠閔其蒲栁之衰賜以桑榆之景俾還印紱退處田廬上以全君父始終之恩下以安人臣止足之分帝閽延首得請是期謝遣中使賜詔不允表王人逺降天詔俯頒如瞻咫尺之威仰戴便蕃之寵禮加舊物猶曲示於縶維日廹殘年顧難勝於强力重煩使節親諭徳音惟銜雨露之私更竭涓埃之報乞致仕第三表連年請老已屢瀆於宸聰累詔申恩尚未從於私欲荷寵章之至厚循愚分以難安敢冒重誅復殫危懇竊以華實既落物性必歸其根筋力或衰聖人不及以禮兹乃天道亦惟人常伏念臣學以入官固有致君之意出適逢世本無經國之能分珪爵不為不多被眷遇不為不久形神弊竭齒髪凋殘數年以加八十斯至難勉從於官政當退伏於里居伏望皇帝陛下洪造天垂至明日照念其周旋四紀出入三朝雖無補於毫分嘗服勤於夙夜閔兹篤老賜以殘骸則臣永荷生成之恩猶圗隕越之報謝遣中使賜詔不允斷来章表訓言深厚渙發於嚴宸使傳光華俯臨於蔀室仍昭異渥俾絶来辭荷睿㫖之丁寧撫愚悰而震悸然人臣之義退豈忘於盡忠君父之恩老或容其謝事雖居畎畝猶在朝廷顧衰朽以無堪復滿盈之是懼分當知止久已過期終冀哀矜曲從誠請頻煩詔諭感極涕零唯誓糜捐仰酬覆育第四劄子謝遣中使賜詔不允斷來章表四馳使節叠奉詔書仍煩聖言復斷来請君父之恩過厚人臣之分難安仰天聴之至髙懼物誠之多瀆恭承寳訓永鏤丹衷顧潦倒於桑榆久涵濡於雨露誓知止足可質神明冀終閔於衰殘幸早垂於俞允唯竭已疲之力少酬下逮之仁慰慈聖光獻太皇太后大祥表恩厚者其服重故極於至隆痛甚者其愈遲故久而後釋中月而禫告民有終伏惟皇帝陛下取法二儀宅憂三祀考先王之制禮服天下之通䘮誠孝兼隆情文備至感嵗時之變易履霜露而慘悽奄及祥除益深哀慕臣限守留鑰不獲奔詣闕庭云云又慰皇太后表真馭不留慈顔永逺祥除奄及禫祭俯臨伏惟皇太后殿下孝感難居哀誠罔極奉宗祧之先祀思文母之徽音禮制有終喪期無過宸闈追慕率土同哀臣限守留鑰不獲祗詣宫庭云云又留司慰表徽音如在追仙馭以無從中制有期遵聖經而俯就伏惟皇帝陛下典禮象乎天地至行格乎神明哀慕廓然孝誠顒若日月遄邁驚嵗律之再周霜露荐臻惻宸哀而増感臣等限以官守不獲奔詣闕廷無任云云謝賜生日禮物表至仁垂眷多物分頒荷寵若驚撫躬無措伏念臣材非秀世業昧經邦夙備位於冡司寖躋榮於極品沐雲天之澤踰分無涯依日月之光歴年斯久未遂歸休之志猶塵居守之榮迨此周星蔑聞報政適屬始生之日復叨行慶之私此蓋伏遇皇帝陛下厚禮優賢寳慈御極深眷股肱之舊曲加體貌之隆俯記微生特推異數篚盈賁帛器備精金仍蕃錫馬之恩曷逭維鵜之刺纘戎于祖慙山甫之將明受祉既多俾魯侯之燕喜載循瑣質若蹈深淵敢不俯竭精忠仰祗休寵庶效糜捐之節用酬覆育之仁賀鄜延路奏米脂川大㨗表神武有征鋪敦河右王旅無敵震叠海隅亟奏膚功大屈羣醜臣聞苖民弗率舜帝所以徂征昆夷不賓文王所以肆伐蠢兹羌虜盗彼朔方恭惟皇帝陛下稽謀自天受命于祖式遏亂畧爰整六師如飛如翰始維揚于我武于疆于理將即敘於西戎告㨗九重騰歡萬㝢臣限守留鑰阻預慶班瞻望闕庭無任云云賀瀘州奏破蕩乞第巢穴班師表鬼方負險王旅濯征燀以天威渙如氷釋伏惟皇帝陛下誕敷文徳載纘武功撫荒服以来王冒海隅而率俾蠢爾小醜敢扞大邦爰興采芑之師式舉渡瀘之役殱其種落靖我封疆臣限守留都阻陪慶列再乞致仕第一表四月十六日請老連年詞情既竭賜詔盈篋恩禮過隆敢冒慈宸重列丹懇伏念臣自塵守鑰載越周星愈廹頺光猶居重任力不能而當止耄将及以奚為臣之所以事君必知進退之分上之所以待下貴全終始之宜俾其佚休是謂仁厚伏望皇帝陛下大明委照洪造曲成深軫衰遲特垂開可庶託乾坤之施尚延犬馬之年偃息以觀太平優游以樂終嵗雖在畎畝敢忘朝廷謝遣中使賜詔不允表使驛載馳有光於原隰詔凾捧對如邇於威顔顧衰朽以無堪尚采收而不棄恩榮斯過志願未從重辱王人逺傳天詔誓竭涓埃之力仰酬雨露之私乞致仕第二表五月四日臣近上封章願還印綬詔書俯諭天聴未回雖大君之命當從而匹夫之志難奪期於俞允敢避瀆煩臣竊以七十致事著於禮經臣今行年七十有七昔伊尹告歸于亳周公退老於豐伊周聖賢老亦謝事况臣何人敢竊髙位貪重禄而不知止乎雖聖主慈仁篤厚優寵老臣後世其謂臣何又國朝以来宰相致仕者不可悉數未聞有如臣之年而不得謝者豈先朝薄於雅故之臣乎乃所以厚之也伏望皇帝陛下閔臣衰篤察臣懇誠賜以殘年遂其夙志使之含哺鼓腹行歌放言為華胥之民樂堯舜之世豈獨臣之幸亦足見國家忠厚安佚老者之至於斯也陛下幸而許之臣不勝大願無任祈天俟命激切屏營之至謝遣中使賜詔不允斷章表星使俯臨天言荐降恩惟求舊特昭示於優隆志切引年尚未俞於悃愊顧循殘槁䝉被眷存雖殫螻蟻之微誠曷報丘山之大賜乞致仕第三表二十四日臣近以囊封繼上綈檢重頒雖荷渥恩未諧懇請罔避再三之瀆深懷隕越之憂庶動聴卑必期報可伏念臣受材頑薄逢世明昌甫越壮年亟躋近列任隆二府久親日月之光位冠三階何補乾坤之徳自叩閽請老覲闕輸誠獲解兵符復更宫鑰俾從優佚許漸歸休瞻依松楸息偃蓬蓽非不知萬鍾厚禄保之足以豐家極品崇資居之惟當報國其如形神弊竭心識耗昏生亦有涯老當知止矧屬朔方用武隴右開疆使傳之所往來川塗之所交㑹惟是劇繁之地必資彊敏之才使臣旅力方剛勤勞敢憚深憂曠怠上累保全伏况陛下旰食九重勵精庶政憲章前古董正治官百度惟新衆材並用將責實效以趨懋功尤非老者惰偷之時鄙夫尸素之日固當自省何待人言伏惟皇帝陛下光被四遐仁育羣品曲迴照鑒深軫睿慈念臣自及從心請無虚嵗特加衰老許以乞身歸印紱於有司納節旄於故府優游畎畝歌詠唐虞仰戀聖時貪延暮齒庶未填於溝壑獲退老於丘園臣之至情實盡於此無任祈天俟命激切屏營之至謝遣中使賜詔不允斷来章表奏牘剖誠屢干天聴封軺繼軌三錫宸章仍煩諄誨之言俾絶後来之請荷寵榮之甚渥循涯分以難安疲駑無堪雖切君軒之戀倦飛欲息唯求枝木之依重辱使華親傳睿㫖冀竭餘生之力仰酬鴻造之仁第四劄子六月十五日臣近以頻上封章屢塵日月聖恩優厚眷遇曲私叠馳使軺累賜詔札雖古有勲勞於國寵數或未之聞况臣無禆補於朝耄昏何以當克下拜隕越伏思震惶臣位極三公年垂八十苟有毫分之益敢遺力於聖時既加齒髪之衰願休老於私室伏望陛下天地父母哀而許之臣縁詔㫖令斷来表不敢復具章奏以煩聖聰直布懇誠仰祈報可無任惶恐俟命之至謝四遣中使賜詔不允表忱辭屢貢深瀆穆清温詔俯頒重煩謨訓祗服自天之寵曲加如地之容惟眷禮之過優顧懇祈之未遂遺簮不棄尚䝉取采之至仁駑馬已疲曷報生成之大施賀生皇子表帝庭敷佑天屬挺生告慶中宸騰歡萬㝢伏惟皇帝陛下䖍膺駿命寅御寳圖丕承五聖之烈光誕受三靈之景貺宜本支之蕃衍昭福祚之熾昌獻祝堯封覩聖人之多子作歌周室緜𤓰瓞於無疆宗社降休人祗共喜臣限司宫鑰阻覲闕廷無任瞻天望聖歡呼抃蹈激切屏營之至謝男及甫授吏部員外郎表天官之屬人爵是司選授惟難寵擢非次伏念臣男及甫早䝉慶澤獲齒仕途移孝為忠粗服義方之訓聞詩及禮每虞牆面之譏已塵東觀之榮敢覬中臺之職伏遇皇帝陛下更新百度登進羣材體芃棫之能官過巻阿之求士顧惟孤族簡在清衷黄髪無堪久玷上公之隆器愚息何算驟叨選部之華資仰銜延世之恩益勵教忠之志儻析薪而克荷庶横草以效勤賀皇子哲宗舊名進封延安郡王表八月敷誥大庭推恩上嗣兹為盛典允屬昌辰臣聞周徳昭天茂本支于百世漢邦稽古建藩輔於諸侯所以對揚祖考之休並倚親賢之助伏惟皇帝陛下穆清居位濬哲在躬命式九圍光被四表重熈累洽纘隆列聖之基燕翼詒謀誕受多男之慶帝庭錫祉天序飛榮仰尊宗廟之靈宜疏茅社之寵啓封河右逺荒西旅之區維翰皇家永固丕天之祚瑞發之象歡震華戎凡在有生率同大賚臣外司留鑰阻預慶班瞻望闕庭無任云云賀皇躬痊復曲赦畿内表九月十五日勿藥有喜自天降康宗社殊休生靈大慶伏惟皇帝陛下儲精蠖濩受命穆清祖述憲章日慎萬微之慮欽明文思大凝庶績之熈乙夜觀書昧爽待旦夀域既勤於躋俗大庭微闕於怡神旋清明而復初宜福禄之亶厚中天發號幽圄霑恩乾健離明光於海表雲行雨施恵此京師戴湯后之寛仁歌周王之夀考臣逺違法扆外守别都徒傾就日之誠阻預奉觴之禮與萬物而鼓舞同四海之歡欣謝賜生日禮物表清衷俯記慶賚曲加祗服寵章伏増愧汗伏念臣賦材無取竊幸何多生遘亨期久塵顯仕秉鈞宰府曽無寅亮之功守鑰留都蔑有保釐之效榮階已極治績無聞適當生育之辰復荷便蕃之澤此蓋伏遇皇帝陛下仁惟求舊道在寳慈推馭福之至恩示改容之異禮惟衣在笥錫馬既蕃仍加器幣之珍并厚龍光之渥設弧于左劬勞之感増深拜賜於庭咫尺之威下矚顧循朽質荐被鴻休惟竭涓埃之勤仰酬雨露之施賀生皇子表乙鳥祠禖天垂景貺維熊占夢神告嘉祥伏惟皇帝陛下濬哲在躬慈仁守位保兆民而如子與萬物以為春宜膺帝祉之休自協螽斯之慶邦家響祐海㝢同歡臣外守留都阻趨宸闕無任云云謝奨諭表伏䝉聖慈以臣開濬漕河了當特降敕書奨諭者明緡俯逮華衮過榮祗荷寵私伏増愧汗伏念臣智非周物材不兼人謬居申畫之司曽乏保釐之效惟成周之帝宅有清洛之天津而漕運多囏舟航靡逹考諸圖牒因其故道之存相彼郊畿實有通川之便得請於上不日而成為利雖多奏功殊寡伏遇皇帝陛下至明日照大徳天臨考實記勞不遺於微小首公成務深簡於穆清眷言溝洫之勤亦被贊書之奨顧兹毫末豈稱褒嘉敢忘夙夜之忠仰答聖神之遇賀景靈宫奉安祖宗神御禮畢表十一月即真仙之境茂對鴻禧考列聖之宫肇稱休享靈心宴喜熈事備成書軌所臻人祗交慶伏惟皇帝陛下睿文天縱聖孝日躋至誠感於神明馨徳格于上下眷殊庭之毖祀仰真䕃之炳靈思覲祖宗之烈光裁成祼獻之縟禮采漢家原廟之制放唐室太清之文闢琳殿以崇隆合睟容而妥侑載涓吉日祗奉嚴禋儲精垂思極齋明而合莫産祥降嘏昭福祚之無疆發大號於中天霈鴻恩於寰㝢億兆䝉祉蠢息懐仁臣外守别都親逢華旦阻預鳬趨之列徒傾岳抃之誠又賀皇太后表殊庭展采原廟落成真馭来迎嘉祥紛委伏惟皇太后殿下母臨宸極婦事宗祧首風化於二南教孝恭於四海顧瞻先寝祗奉神游載嚴翬翟之儀將潔蘋藻之薦闢上真之琳闕合列聖之睟容允協帝心用成邦禮宜三靈之降祉享萬夀以無疆臣久荷國恩幸逢聖旦無任云云范太史集巻十一

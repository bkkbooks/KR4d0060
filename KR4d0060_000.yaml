body:
  text: 范太史集目録别集類二宋巻一詩巻二詩巻三詩巻四表狀劄子巻五表狀劄子巻六表狀劄子巻七表巻八表状巻九表巻十表狀牋功徳疏右語附巻十一表巻十二表笏記附巻十三奏議卷十四奏議巻十五奏議巻十六奏議巻十七奏議巻十八奏議巻十九奏議巻二十奏議巻二十一奏議巻二十二奏議巻二十三奏議卷二十四奏議巻二十五奏議卷二十六奏議巻二十七進故事巻二十八翰林詞草巻二十九翰林詞草巻三十翰林詞草巻三十一翰林詞草巻三十二翰林詞草卷三十三翰林詞草樂語附巻三十四啓狀卷三十五賦論策問卷三十六記序銘書傳巻三十七青詞祭告文哀詞誄文巻三十八墓誌銘巻三十九墓誌銘巻四十墓誌銘巻四十一墓誌神道碑銘卷四十二墓誌銘卷四十三墓誌銘卷四十四墓誌銘巻四十五皇族墓誌銘卷四十六皇族墓誌銘巻四十七皇族墓誌銘巻四十八皇族墓誌銘卷四十九皇族墓誌銘卷五十皇族墓誌銘巻五十一皇族墓誌銘巻五十二皇族墓誌銘巻五十三皇族追封記石記巻五十四皇族石記巻五十五手記臣等謹案范太史集五十五巻宋范祖禹撰祖禹字淳甫華陽人嘉祐八年登進士甲科從司馬光修通鑑書成薦為秘書省正字厯官龍圖閣學士知陜州為言者所誣謫徙賓化而卒事蹟具宋史本傳所著帝學及唐鑑諸書已别著録其文集世有兩本一本僅十八巻乃明程敏政從秘閣借閱因為摘鈔以行世實非全書此本五十五巻與宋史藝文志馬端臨經籍考所載卷目相符盖猶宋時舊帙也祖禹平生論諫不下數十萬言其在邇英守經據正號講官第一史臣稱其開陳治道區别邪正辨釋事宜平易明白洞見底藴故本傳載所上䟽至十五六篇而集中章奏尤多類皆湛深經術練達事務深有禆於獻納其中偶涉偏執者如合祭天地一事祖禹謂分祭之禮自漢以來不能舉行又謂一年再郊此必不能且夏至之日尤未易行同時蘇軾等据周禮以分祭為是而祖禹與顧臨堅持之後卒從祖禹之議盖其君習於宴安而議者遂為遷就之論誠不免於賢者之過然其大端伉直持論切當要自無愧於醇儒當時以賈誼陸贄比之說者不以為溢美云乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

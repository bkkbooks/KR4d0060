body:
  text: 范太史集巻十二宋范祖禹撰表笏記附元豐六年賀正表以下代文潞公伏以厯啓初正禮陳元㑹萬方畢賀億祉來同伏惟皇帝陛下道冠百王化敷四表體乾坤之覆育品物不遺並日月之照臨光明下濟春陽開泰寳祚延休臣服在具寮歡同率土仰北辰而拱極效中嶽以獻觴謝賜元豐六年厯日表温詔俯臨逺猷誕告嵗將更始厯乃惟新伏惟皇帝陛下觀象九乾宣精百度致中和而育物納仁夀以躋民紀以日星申飭羲和之職頒于方國大同正朔之文臣祇守藩條奉宣時訓承休于下拜賜為榮賀魏國長公主出降表帝乙歸妹以貴而有行王姬穠華下嫁而成徳人倫之始邦國所興伏惟皇帝陛下色養慈闈恩均懿戚隆天枝而制禮厚民俗以興仁啓魏國之大封築魯邦之外館愛風所被率土同歡臣叨預列藩恭聞盛禮欣愉馳戀實切愚誠臣限守留鑰不獲奔詣闕庭臣無任云云乞致仕第一表四月十三日臣竊以量能而授任者人君之綱也陳力而處位者臣子之常也能不勝任則上不可以强使力不稱位則下不可以苟居故既老則君必賜之休不能則臣當告而止君臣之際所以全始終之義養亷恥之風也輒殫悃愊上瀆冕旒伏念臣累年以來拜疏請老稠叠之懇備簡聖明陛下每降異恩未從所請嵗復一嵗益加耄昬譬如日薄西山駸駸向暮俄頃可待餘光幾何重惟遭遇累朝無補聖化髙位重禄四十餘年過則生災滿將招損豈可鐘鳴漏盡行不知休違禮經進退之文老氏止足之戒强顔於世臣獨何心伏望皇帝陛下深惻睿衷曲迴宸聴閔臣篤老賜以殘年臣之許國義均休戚雖居畎畆區區之忠猶在朝廷也惟陛下幸察謝遣中使賜詔不允表恩輝下曯使節俯臨載跪啓於詔函若親瞻於法扆仰天威之咫尺荷聖訓之丁寧黄髮無堪尚縻留而不棄皦日可鑒庶懇願之獲從誓畢餘生少酬洪覆第二表請老於朝歴年既乆復煩詔㫖未賜允俞雖父命子聴當勉以順承而人欲天從必祈於迴照再三之瀆隕越無從臣竊以禮之實者無外矯言之切者無飾詞今臣年齒逾邁而懇請益堅陛下眷意愈隆而寵數彌厚臣雖糜隕詎可報投况臣與國家義均一體非敢仰慕前哲以辭榮肥遯為髙苟有益於朝廷豈愛其犬馬之力且進而不知退者易之明戒老而必致事者禮之大經陛下縦矜而憐之未忍棄去而臣受禄已過其量引年乆越其期竊意四方之人備聞累嵗之請必以臣貪為誚不以臣退為疑在於聖明何所虧損俾臣冒處實有愧懐今雖免於公言後必玷於良史伏望皇帝陛下察由衷之至懇推佚老之深仁聴解藩垣許還印紱少優㳺於聖日遂偃息於田廬乃心之忠惟在王室謝遣中使賜詔不允表輶軒入里温詔自天荷睿眷之優隆紆聖言之訓告載循衰髦彌積兢榮未俯徇於懇祈仍曲加於寵數重煩使指親諭徳音唯竭涓埃之誠仰酬雨露之施第三表從心之年已過其八乞身之請復至於三敢罄竭於愚誠期終迴於睿聴臣竊以自昔髙賢辭禄哲士遺榮或掛冠於都門或稱疾於家第無强勉以承命必勇果於退身故疏廣乞骸即日不起魏舒告老舉朝莫知未有如臣累數十章歴八九載未動凝旒之慮每紆賜札之榮中外久聞衆庶共悉聖主之恩已極老臣之分難安不有人言寧無鬼責伏望皇帝陛下穆清垂聴惻隠推慈曲成始終俾遂休佚豈敢慕逰松子退傲羲皇堯野黎民冀獲壤歌之樂虞庠庶老猶霑恵養之仁雖居畎畆之中敢忘天地之施謝遣中使賜詔不允斷來章表宸暉下燭使驛載馳囊奏屢聞瀝懇誠之切至綈封三賜荷眷禮之優隆仍煩謨訓之言俾斷來章之請恩榮所被啓處不遑益堅匪石之心庶動惟天之聴誓殫晚節圖報鴻私第四劄子臣近以屢抗封章仰干旒扆頻䝉賜札未聴引年伏念臣改領居留已涉三載連乞歸老于今九年豈惟罄竭於愚誠亦已多煩於睿訓况臣衰篤上簡聖明加疾疢之災生在筋力而禮廢朝夕貪於餘景視聴異於曩時豈可强整殘骸猶尸厚祿伏望皇帝陛下垂乾坤之覆育迴日月之照臨降鑒丹誠閔勞黄髮俯伏以俟俞允是期情迫於中志守不奪賀皇子佖授山南東道節度使封儀國公表帝庭敷命天屬啓封書軌所臻人祗同慶伏惟皇帝陛下紹休景祚登治太寧忠厚以布淳風吉蠲以修明祀三靈眷祐多子儲祥爰卜休辰併推異數建旄南土錫爵上公特疏茅土之封遂荒江漢之域親賢並建蕃屏維强盛典昭融羣生鼓舞臣外司宫鑰阻覲宸庭仰麟趾之實蕃詠鳬藻而載躍賀上仁宗英宗皇帝徽號表尊嚴祖考昭假神明祇薦隆名顯揚徽冊照臨所被鼔舞相歡伏惟皇帝陛下天縦睿文日躋聖孝纉戎下武駿恵先猷䖍宗廟之威靈荷皇穹之顧諟薦勲二后教愛萬方丕顯丕承揚文武之謨烈不嚴不肅觀政教之治成盛典欽崇含靈慶悦臣屬居藩守阻預班趨瞻望闕庭無任云云又賀皇太后表二聖在天威靈降格太宫奉册功烈誕章慶始宸闈歡同海㝢伏惟皇太后殿下孝嚴宗廟徳庇生民恭儉以奉先猷吉蠲以薦明祀形容盛美遹駿鴻名對揚丕顯之休昭示彌文之典教風所被黎姓咸欣臣屬西洛之居留阻東朝之慶覲無任云云賀四后升祔表七月十二日孝章皇后淑徳皇后孝惠皇后章懐皇后徳厚者其流光禮盛者其文縟登于先后對越宗祧鉅典欽崇溥天欣慶伏惟皇帝陛下䖍膺駿命肅奉精禋纂隆列聖之基秩禮百王之典本生民而尊祖廣大孝以寧神有侐閟宫載嚴於祼獻於穆清廟升合于烝嘗報重徳于坤儀刑愛風于海宇含生之品知教之隆臣外守留都阻陪慶列無任云云又賀皇太后表徽音如在容典惟新四室奉祠萬方均慶伏惟皇太后殿下宣慈母道效法坤儀薦明徳之馨香達至誠於上下瞻閟宫而侐祀嚴先后之赫靈升合宗祧増隆孝治臣限守留鑰阻預宮庭無任云云賀冬至表伏以黄鍾應候南日迴躔陽徳初升剛道浸長惟一人之有慶底萬福以攸同伏惟皇帝陛下乾健統臨離明廣照茂對時而育物大報本以事天升燎泰壇達精禋於上帝迎釐宣室冒丕祉於羣生適當亞嵗之辰永固如山之夀臣謬塵近列親際昌期無任云云賀皇子佶授鎮寧軍節度使封寧國公表宸闈錫祉天序升榮盛典惟行羣生胥慶伏惟皇帝陛下荷天眷佑濟世純熈下武繼文丕承五聖之烈詒謀燕翼誕受多男之祥爰卜休辰特推異數建旄近屏永壯於王畿畫壤大邦用加於公衮洪枝擢秀磐石維强臣限守留都阻陪慶列無任云云賀南郊禮畢表祗見昊穹即郊丘而展采誕敷大號罄海㝢以均禧書軌所臻人祗同慶伏惟皇帝陛下欽明稽古䖍鞏臨民馨徳升聞至仁丕冒損益百王之典緝熈列聖之文練日候時御羣龍而順動配天尊祖薦騂犢以昭誠上帝居歆百神受職福祥分委禮樂備成然後迴御中天之闈大覃率土之惠巽風鼓舞兑澤沖融塞休氣於九清動歡聲於萬域肖翹之品茂遂惟均臣外守留都獲班寛詔竊慶逄辰之幸阻修肆覲之儀臣無任云云謝賜生日禮物表宸眷俯臨天休茂對祗荷光寵伏切兢惶臣竊以朝廷優禮近僚垂記生日特加慶賜以表渥恩示我至仁降之遐福臣久備将相無補聖明受恩累朝拜賜三紀爰從壮嵗以及耄期豈無他人預被此賜惟臣無状竊幸居多器服每陳於私庭幣馬常出於天府子孫銜命閭里生光仰惟便蕃何以報稱此盖伏遇皇帝陛下仁如天覆惠浹陽春紀其載育之辰厚以下流之澤日月之照雖㒺間於幽遐雨露所私尚生榮於枯朽誓殫㣲力少答深慈謝男及甫賜緋表臣某言得臣男及甫報今月九日以職事随本曹長官於垂拱殿奏事䝉聖恩特賜臣男及甫緋章服并詢及老臣者文陛對揚清光俯照曲迴天睿特錫身章仍紆顧問之私重示記存之㫖伏以臣男及甫早䝉朝選獲預郎曹曾無報稱之能遽被褒嘉之寵惟慈宸之念老俾弱息之増榮親奉邇顔載承温語此盖伏遇皇帝陛下勵精政治申飭官常收一介之微臣及二宗之末品赤芾不稱知席寵之有因黄髮猶詢見在心之所簡衰悰感慰私室光輝共誓糜捐仰酬覆育賀正表伏以天地交泰品物維新日月相推嵗時更始伏惟皇帝陛下穆清居位濬哲在躬體皇穹覆育之仁順青帝發生之徳三靈薦祉萬夀膺期臣獲齒近班親逢華旦無任云云辭免轉太師充兩鎮節度使致仕表乞身之請屢凟於清衷賜几之榮曲加於舊物推恩絶等曠世罕儔命出非常義難虚受伏念臣素惟頑薄仰㑹亨嘉無數器以兼人唯一心而許國秉均二府被遇三朝曽無補於明時已過貪於厚禄雖誓畢生而永報顧當陳力以無堪自及從心之年累伸乞骨之懇愚誠備竭宸聴莫迴九載于茲四方具委天矜民而從欲聖念老以俾休豈圗進秩維師兼榮二鎮益封井賦命作册書詔示殊恩併加槁質矧乃出綸溢美褒衮過優眷禮備於始終龍光照乎今古幸䝉得謝敢玷懋官伏望皇帝陛下特迴睿思俯鑒精懇聴輟已行之命免貽非據之災重念臣位冠三公年垂八十載循涯分深戒滿盈豈宜叨極品以歸田擁雙旌而就第非惟濫處實懼疾顛願守舊官祗承明命寳藏謨訓榮示子孫言則由衷恩期報可所䝉聖恩除臣守太師及兩鎮之命乞賜寝罷止令臣守本官致仕仍乞貼麻處分臣無任云云第二表君恩佚老身則至榮天寵殊常義難苟黙不遑啓處敢避瀆煩臣竊以帝師之官人爵最極為臣及此自古㡬希矧乃並建節旄兼領方鎮惟懿親而可授非列辟之敢當伏念臣已忝上公甫周三載今雖退老詎可復加徃者懇避殊榮嘗䝉矜允誓堅晚節敢易初心况臣常戒滿盈素知止足公槐亢極之位豈有屢遷将鉞駢聮之名無容虚受方當謝事曷可冒榮匪惟興朝野之譏實懼獲神明之譴伏望皇帝陛下清衷日照洪造天垂俯鑒精誠特追異數俾守舊秩即安故廬則臣永荷始終之恩猶圗隕越之報第三表臣近以告歸得請霈澤過優繼上封章仰祈旒扆乞收異渥祗守舊官載錫詔函未奉俞㫖䖍瞻寵答荐被華褒忝冒益深震惶無所臣竊以乞骨而歸田里乃人臣之始終安車以示子孫實儒者之榮幸固已上還於印紱豈宜濫假於器名唯當解其所處之官致其所職之事方且追隨野老祝頌堯封而乃寵以袞衣繡裳加之虎符犀節在丘園而曷稱豈蓬蓽之所施一已非宜二焉安可况臣常守止足之戒實懼滿溢之尤殊異之恩崇隆之禮敢以死請誓於懇辭伏望皇帝陛下昭鑒危衷特垂可報重久虚之職秩寢不世之龍光俾拙分之少安庶餘生之未促如以臣既諧請老必欲推恩即乞止授維師之官聴辭兩鎮之命過貪榮遇深負靦顔宸睠下臨恐違天而有咎精誠必照恃簡帝之在心期於獲従守不可奪謝辭免兩鎮節度批答不允表天言俯諭宸檢載頒命出非常未從於報罷恩加無状益愧於便蕃誓竭精衷仰囘睿聴冀慈仁之矜允俾耄齒之保全庶畢桑榆之年少酬天地之施辭免冊命表吕望維師勉奉承於休命史佚作冊曷仰稱於隆榮輒瀝悃悰重祈俞允伏念臣妨賢茲久告老獲従荷神聖之誤恩陟宗公之極品末容懇避終愧冒居儻煩法扆之臨軒復受明庭之備禮匪惟僣越實懼顛隮伏望皇帝陛下俯徇物誠特迴天聴罷涓辰之故事停賜冊之盛儀庶安止足之心免招過溢之咎謝授守太師致仕表再加兩鎮五拜三公為臣有終舉世莫比雖獲辭於将鉞猶袛寵於帝師受命以還撫躬無措伏念臣早塵顯仕徒罄樸忠乏經世之逺謀屬代天之重任仁祖恭黙守道垂拱責成委秉洪鈞再登上宰英皇纂嗣聖政始初召自外藩入長衡弼陛下大明出震盛徳承祧協同神人翊載日月極三朝之榮遇冠羣后之邇聮及茲休退之辰重被褒嘉之典惟是父師之位首乎天秩之崇官惟其人君豈虚授唐虞之際一二蔑聞夏商之間闕遺靡記周則公旦繼乎吕望畢命出於康王漢唐以來職位多闕雖或器名之假匪由勲徳而居國朝唯趙普以佐命元臣太宗特優禮舊相其後乆虚此職垂及百年夫何老臣乃忝異數此盖伏遇皇帝陛下至仁勤施洪造曲成總攬英髦不遺耉老委容輝於蔀室哀盡力於壯途特全始終俾遂休佚極臣鄰之位號隆體貌之寵光撃壤而歌将優㳺於卒嵗循牆而走唯俯僂以益恭雖居畎畝之中誓答乾坤之施謝遣男吏部員外郎及甫賜誥命并傳聖㫖宣諭表嘉命自天殊恩不世師垣進秩里第居榮俾愚息之言歸備皇華而出使奉将宸澤親諭徳音恭承謨訓之撫存若對威顔之咫尺誓畢桑榆之景仰酬雨露之私謝遣使賜詔許入覲表王人逺降天詔俯頒眷惟耉老之臣入謝龍光之渥重辱訓辭之厚特紆召節之嚴言不宿家仍載馳於使傳行無俟駕将趨造於宸庭瞻周道以忘勞望堯雲而孔邇笏記䝉恩特授臣守太師致仕依前開府儀同三司河東節度使太原尹加食邑實封者進秩師垣歸榮里第禮全終始恩許佚休顧慙衰槁之姿備極褒嘉之寵謹當身居畎畝心在朝廷庶畢餘生上酬洪造謝男貽慶等轉官表恩容謝事退老家庭賞異及勞霈霑子姓莫遑懇避唯切兢榮伏念臣早遇聖時乆妨賢路過被不貲之寵每懐知足之誠而位即臣隣方還印紱慶流宗族並襲簮裳静言忝冒之多敢有干祈之請雖愚誠之備列終睿澤之靡迴典謁未能亟擢陞於近職析薪克荷咸甄叙於榮階此盖伏遇皇帝陛下明與日升仁如天覆眷秉均之舊物推延世之隆恩俾私室之光輝示本朝之信厚生馭其福既祗服於寵休仕教之忠誓共圗於報塞范太史集巻十二

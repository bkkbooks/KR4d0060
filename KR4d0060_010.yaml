body:
  text: 范太史集巻十宋范祖禹撰表狀牋功徳疏右語附求退第一表以下代文潞公竊以不能者止葢量力以效忠有疾則辭豈愛身而避事輒殫悃愊上冒髙明伏念臣學古迂疎受材淺薄惟不欺而行已敢有志於濟時徒以辱先朝過聴之知荷陛下非常之眷越從散地擢處近司雖智力之已窮諒毫分之無補屬嬰衰病累渉旬時沈綿幾及於膏肓羸瘠僅存於皮骨桑榆向暮藥物難瘳未知朝謁之何期唯恐顛隮之無日千鍾賦禄豈髙卧而可當三事列居非養痾之所處夙宵興念惕厲匪寧何待人言固當自省伏望皇帝陛下仁深惻隱明燭幽微曲成萬物之宜不奪匹夫之守使其全進退之義察其無矯激之心早賜允俞俾遂安養伏乞除臣宫觀差遣一任下情上逹必冀於感通人欲天從誓期於得請二忱辭仰請初冀於必從温詔報聞敢煩於曲諭荷并容之至廣増危懼以彌深再瀝由衷仰祈垂鑒伏念臣少而志學出則事君豈徒干禄以代耕顧已委身而許國竊欲粗行其志庶幾有補於時在畎畝以無忘矧廟堂之或處自陪機政思竭愚忠葢欲知無不為期於死而後已儻非疹疾敢就便安䝉賜吿之恩已將彌月在具瞻之位曷可瘝官久處公居坐尸厚禄豈敢慕名而自潔葢惟揣分以難安伏望皇帝陛下感動至仁哀矜舊物迴大明之久照察一介之微誠賜以殘年全其素守使得上還重任退即散僚則臣永荷生成之恩猶圗隕越之報三疾難自力蓋將止於不能聴未及卑尚莫從其所欲敢避再三之瀆終期開可之私臣伏自學古以入官常欲捐軀而報國在下位猶将竭力備輔臣豈敢憚為所惜者難際之時所處者可行之地初心未遂羸疾已侵强力外殫疲神内竭革膚日削食飲至微顧此形骸已臨溝壑况復眷存特厚禮貌加隆累降侍醫頻煩詔使垂天地大生之徳軫父母惟疾之憂展轉伏思戰兢無所非不欲力圗報塞勉就痊除而勿藥難期造朝曷日所以懇祈引避實不遑寧伏望皇帝陛下深諒至誠曲加大惠察臣力小而任重閔臣福過而災生處以閒官俾安拙分肉骨之賜沒身敢忘俞允為期屏伏以俟再求退第一表竊以論道經邦惟人乃可以勝其任陳力就列不能曷可以强其為輒瀝愚誠上干天聴伏念臣久安散地寖廹頺齡猥以薄才遽當大任伏遇陛下恭黙思道垂拱仰成圖庶政之惟囏登衆賢而共濟臣􅊀位上宰總率羣司而嬰疾三時卧家累月虧君臣之至敬損著定之常儀每自省循不遑啓處威顔咫尺莫伸下拜之勤病骨支離猶貪攘臂之禄復以足瘍為梗歩履益艱賜告滋多在公幾廢不惟非養疾之所亦恐違責任之宜豈可瘝官猶將卒嵗伏望皇帝陛下曲垂昭鑒深惻至仁閔枯枿之逢春榮華無幾哀疲駑之盡力驅䇿何堪特解近司俾安散秩儻未填於溝壑猶圗報於毫分二囊封有請恭布悃誠綸㫖載頒曲垂訓諭荷眷存之至厚増惕厲以彌深敢避瀆煩必祈開可臣伏以君為元首臣作股肱休戚所均逸勤胥共既委身而許國敢避事而貪生况臣親逢難際之時道在可行之地豈不欲久安禄位益勉事功而力不逮心事將違願嬰纒多病困阨百罹舊痏未平新瘍復潰形骸若是溝壑可虞豈可猶居三吏之崇徒竊千鍾之廩廟堂之上乃處病夫軒冕之榮仍加槁質實恐累國誠非愛身伏望皇帝陛下洪造曲成至明委照闕俾全進退之宜特示始終之賜上還相印退即里居則臣永荷更生之恩敢忘九殞之報三臣以久嬰沈疾累貢危誠闕頻煩睿㫖尚閟俞音義不遑安言非獲已臣竊以上宰之任大君是毗師長百僚儀刑近列巨川舟楫將濟艱危大厦棟梁豈容撓弱當靖共於夙夜以帥正於朝廷而臣受命以来半居病告造朝之際每損國容復歸卧家又已踰月革膚益削喘息僅存儻勉强以能支必疲羸之愈甚内則萬目所視外則四夷所聞豈可尚備冡司猶尸重禄邇者合宫蕆事百執駿奔既免侍祠又違宿衛端居公館阻受釐宣室之朝近望闕庭有卧病周南之滯今明禋已事率土䝉禧是愚臣可去之秋况拙疾無瘳之日敢祈避位庶免曠官伏望皇帝陛下深諒至誠曲加大惠察臣力小而任重閔臣福過而災生使之弛負擔於秉鈞專精神於救藥退安散地以盡餘齡瀝懇叩閽期於得請賀太皇太后受册表報功文母奉冊東朝書軌所臻人祗交慶伏惟太皇太后陛下天臨萬國坤載羣生濟皇業之囏難佑聖圗於久大號令之動淵黙而雷聲徳澤之流雲行而雨施幽遐鼓舞跂喙涵濡惟時盛典之行曷稱難名之烈至乃預抑徽稱之請退避外朝之居躬大禹之勞謙體文王之寅畏爰諏榖旦率籲歡心百辟造庭九奏備樂載揚丕冊祗上鴻名同傾就日之瞻共祝後天之祉騰頌聲於四表翔休氣於九清賀皇太后受冊表涓選休辰誕揚鴻冊書文所暨岳抃攸同伏惟皇太后殿下儷極先朝母儀萬國禕衣揄狄奉宗廟之烝嘗巻耳葛覃首周南之風化布宣隂教保定皇家莫隆帝母之尊爰備天秩之禮羣后在位六樂充庭祗率歡心奉將容典體坤元而同久與聖祚以無疆臣近望宸闈親逢華旦賀皇帝表秉圭正宁發冊明庭三殿講儀萬方知孝伏惟皇帝陛下穆清居位濬哲在躬聖敬日躋聰明天憲露門親學惟先五典之從温室問安豈止三牲之養奉東朝之慈訓揚文母之徽音徳教始於愛親神明察其事地容臺秩禮筮史涓辰弁冕在庭笙鏞備樂金螭玉檢發揮帝典之文揄狄禕衣炳煥軒宫之耀詠大明於周雅稽貴母於魯經凡在羣生率同大慶賀皇太妃牋展儀中禁發册外朝盛典惟行羣臣共慶伏惟皇太妃塞淵秉徳柔順承天輔佐先朝勤勞内治附寳啓軒皇之運姜嫄興周室之基誕育聖明纂承謨烈爰膺萬乘之養實冠四妃之尊涓選休辰奉揚顯冊堯門協慶軒耀増輝賀太陽不虧表伏覩今月一日太陽當食不食者此日而食方克謹於明威先天不違遂仰銷於變眚伏惟皇帝陛下䖍恭正事赫奕凝圖茂馨徳以感神建大中而順帝當正陽之告朔有太史之奏占減膳法宫霈恩海㝢誠心所格精祲自通是以靈雨夕流清風旦發三辰澄煥萬物昭蘇光明不虧夷夏咸覩昔者商宗祗畏享國百年宋景憂勤退星三舍穹髙鑒徳今古同符臣親覩殊祥限守留鑰莫由慶覲徒切歡呼謝賜六典表伏蒙聖慈特賜臣六典一部者上聖有作百度惟新稽古建官任人立政將憲章於周典爰考正於唐文眷惟當世之宜必視後王之法頒於列位延及守藩俾私室之受藏仰慈宸之訓廸披觀敢怠紬繹知榮慰坼殿櫕表元豐三年二月伏審今月三日大行太皇太后坼殿櫕者大事請期西階啓殯慈顔寖逺真馭不留恭惟皇帝陛下號慕難居孝思罔極凡在臣庶同切憂惶伏望少抑睿懐俯遵經制上嚴宗廟下庇生民臣夙奉春宫逺司留鑰阻趨慰列倍切常情慰發引表伏審今月二十日大行太皇太后靈駕發引者鳳翣啓行龍輴肅駕適臨祖載尤切攀號恭惟皇帝陛下孝性自天哀情過禮痛真游之不返瞻内寝以如存中外之心追慕同切臣阻陪班慰但極涕零留司慰發引表伏承今月二十日大行太皇太后靈駕奄及發引恭惟皇帝陛下攀號摧咽聖情難居臣等伏限官守不獲奔赴闕庭無任隕越之至又留司慰皇太后表伏審今月二十日大行太皇太后靈駕奄及發引恭惟皇太后殿下攀慕摧咽聖情難居臣等伏限官守不獲奔詣宫庭無任殞越之至靈駕至西京慰皇后牋伏覩今月日大行太皇太后靈駕已至西京境内者恭惟皇后殿下逺違鳳闕祗䕶龍輴俯臨洛宅之郊即次橋山之邑追攀罔極哀慕難任臣居守封畿奔迎道路無任悲殞之至又留司慰牋伏覩今月日大行太皇太后靈駕已至西京境内者恭惟皇后殿下躬御雲軿逺䕶仙蹕將奉安於昭寝爰俯次於洛郊哀慕惟深孝誠罔極臣等恪居官守迎奉道涂無任悲殞之至靈駕到陵慰皇后牋伏覩今月日大行太皇太后靈駕已至永昭陵下宫伏惟皇后殿下配位宸極嚴事宗祧祗率六宫逺䕶仙駕奉安甫邇哀慕難居臣以職事奔赴山陵無任悲殞之至又留司慰牋伏覩今月日大行太皇太后靈駕已至永昭陵下宫伏惟皇后殿下逺違椒掖嚴奉梓宫上體聖懐倍深哀慕臣等各以職事祗赴山陵無任悲殞之至進皇后禮物狀具銜臣某某物右謹隨狀上進冒瀆尊嚴臣無任惶懼激切之至謹進謝皇后回賜狀具銜臣某右臣伏䝉皇后殿下特遣中使賜臣某物若干臣無任感荷激切之至謹具狀奏謝以聞謹奏慰掩皇堂表伏覩今月十日永昭陵奉安慈聖光獻太皇太后梓宫禮畢者橋山既祔永追先帝之游蒼野不還深結溥天之痛伏惟皇帝陛下深居恭黙西顧哀號想真馭以如疑慨慈闈之杳隔臣駿奔陵寝祗奉典司慰覲無由憂惶徒切又留司慰表伏覩今月十日永昭陵奉安慈聖光獻太皇太后梓宫禮畢恭惟皇帝陛下攀慕摧咽聖情難居臣等伏限官守不獲奔赴闕庭無任隕越之至留司慰皇太后表伏覩今月十日永昭陵奉安慈聖光獻太皇太后梓宫禮畢恭惟皇太后殿下攀慕摧咽聖情難居臣等伏限官守不獲奔詣闕庭無任隕越之至掩皇堂畢慰皇后牋伏覩今月十日永昭陵奉安慈聖光獻太皇太后梓宫禮畢伏惟皇后殿下奉先盡禮送往増哀大事甫終孝誠備至臣以職事祗從行宫無任隕越之至又留司慰牋伏覩今月十日永昭陵奉安慈聖光獻太皇太后梓宫禮畢伏惟皇后殿下哀深送往號慕難居臣等各以職事陪從行宫無任悲隕之至慰祔廟表三月伏審今月十九日慈聖光獻太皇太后神主祔廟禮畢者金輅徐還玉衣長掩從昭陵之劒履合清廟之樽彞恭惟皇帝陛下聖感難居孝思罔極音容永逺虚朝夕之問安饗祀有嚴惟春秋之匪懈伏願順禮之變節哀以時調䕶清躬導迎協氣仰副神祗之望俯安億兆之心臣居守都畿馳情軒闥阻伸慰覲徒切憂思又留司慰表伏審今月十九日嚴奉慈聖光獻太皇太后神主升祔清廟禮畢恭惟皇帝陛下攀慕摧咽聖情難居臣某等伏限官守不獲奔赴闕庭無任隕越之至慰皇太后表伏審今月十九日嚴奉慈聖光獻太皇太后神主升祔清廟禮畢恭惟皇太后殿下攀慕摧咽聖情難居臣等伏限官守不獲奔詣宫庭無任隕越之至同天節功徳疏右語右伏以朱火司辰薫風育物月紀正陽之徳天開甲觀之祥罄海宇以傾心望帝宸而獻祝恭集祗園之侣並翻貝葉之文慿覺力之雄深薦福田之廣大伏冀乾坤長久等睿筭以無疆日月照臨與皇明而不息永居大寳丕冒羣生留司賀同天節表伏以炎帝執衡時司大夏斗樞繞電天發殊祥當元聖之挺生叶千齡之盛際鴻明繼照景祚無疆罄率土以傾心效華封而獻祝恭惟皇帝陛下誠明天縱濬哲日躋丕承五聖之基翕受三靈之貺惟正陽之紀月乃甲觀之誕辰玉帛㑹朝梯航納貢臣等謬塵通籍分守留都就日望雲阻預在庭之列後天絙月徒傾祝夀之誠同天節功徳疏右語伏以帝出膺期虹流紀節茂對當千之運於昭時萬之祥敢率懽悰仰依覺䕃誦金言之祕宻瞻玉相之妙嚴總集勝因䖍申久禱伏冀夀山髙聳長居當極之尊慧日增光永庇含生之品叢欣萃祝倍萬常倫留司百官謝賜冬衣表伏䝉聖慈各賜冬衣者清風戒候方秋律之正中賁帛表恩俾冬裘之預備顧惟虚受實切靦顔恭惟皇帝陛下洪覆萬方寵綏黎姓垂裳而聴海内之治求衣而念天下之寒申敕有司時頒列位出大盈之委積均麗澤以霑流豈曰無衣詎有秦人之賦何以卒嵗皆同豳國之歌惟誓捐軀以圖報效留司賀明堂禮畢表伏審今月二十二日明堂禮畢者展采合宫薦徳馨於上帝因嚴聖考廣孝治於多方大事熈成鴻恩普被書文所混岳抃欣同恭惟皇帝陛下則效乾坤憲章古昔神化覃於無外至治格於太寧規恢五聖之基誕受三靈之貺若祗舊典亟蕆上儀涓吉季秋戒期百執吿䖍清廟肆饗總章籩豆苾芬薦四時之和氣玉帛奔走同萬國之歡心坐宣室以延釐御端闈而霈澤騰頌聲於海㝢塞休氣於穹旻凡在萌生率均茂遂臣等獲班寛詔幸覿昌辰屬拘掌鑰之嚴阻預稱觴之末范太史集巻十

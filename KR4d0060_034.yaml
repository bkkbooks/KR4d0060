body:
  text: 范太史集卷三十四宋范祖禹撰啓狀回知洺州張朝奉賀啓右某近奉命書進升左史寵靈非次惕厲靡容力抗封章願收綸綍方旁求於俊彥宜不假於器名祿勝已則近貪聲過情而有恥荷聖神之回聽察孤賤之由衷乾坤之仁曲垂於從欲日月之照下逮於容光獲寢過恩還祇舊職豈謂伏蒙知郡朝奉至誠樂善厚義敦風初傳命於置郵遽占書於記室逺詒慶問仰服勞謙拜貺尤深銘藏無斁下情不任感荷之至回陜西都運葉待制謝啓伏審光奉命書近升法從付兵民之大計總關陜之奧區慶典惟行僉言允協恭惟某官天資強敏行表方嚴以才猷結主知以儒雅飭吏事優遊餘刃揮發壯圖朝廷倚之以豐財士論期之於亮采仲山將命曽無吐茹之私孟博登車漫有澄清之志暫擁旄於方面俄易節於外臺吏自不欺服劉晏精明之智軍無絶餉推蕭何轉漕之功上寬顧憂時所資仰未遑修慶遽辱貽書瞻令德以惟勤奉謙光而載惕其於感頌曷罄敷宣回喬學士謝啓伏審祇膺宸綍進直書林伏惟慶慰竊以人文化成莫先於典籍古訓是式實賴於賢才恭惟祖宗以來尤重館閣之設詳延天下方聞之士討論上世帝王之書所以昭雲漢之文章盛乾坤之德業凡居是職即踐清途自非卓有異能曷稱妙選恭以侍講學士瑚璉妙器杞梓天材漸遊夏之淵源兼卿雲之華藻景行推於鄉黨清名聳於縉紳領袖一時蓍龜後學宗藩朱邸久賴於敷經䒦閣蓬山復留於校籍大任兹始輿論所歸側聞褒升尤切忭蹈未馳慶牘先枉謝緘載研蕰藻之文益仰謙沖之德誦言無斁永光篋笥之藏佩服殊深更甚瓊瑰之賜制拘出謁禮阻造門謹奉啓陳賀兼謝回孫舍人謝啓伏審光膺宸綍進直掖垣伏惟慶慰竊以內史之贊宰司邇臣之與國論兹任尤重得人為難詔見王者之心詞鼓天下之動賞罰號令之所自出典謨訓誥於是乎成發諸朝廷沛若江河之決書之方策炳若日星之垂自非傑異之才曷稱光華之選恭以中書舍人行成坊表學造淵源蚤以方聞入奉大對忠言切於利行直節見於當官出處歸潔其身夷險不易其操逮夫訪落倚以繩愆霜簡所加朝紳自肅諫垣鯁議深沃清衷蜀宇宣風久勞外使繇螭塗之近列陟綸閣之清班黼藻訓詞方發揮於賢業謀謨王體實參贊於鴻猷公論所歸柄任兹始欽聞成命竊慶登賢未遑剡牘之儀先辱貽書之貺感誦無斁敷述奚殫回顔舍人謝啓伏審祇膺帝制進直綸闈伏惟慶慰竊以內史之贊宰司邇臣之與國論兹任尤重得人為難詔見王者之心詞鼓天下之動賞罰號令之所自出典謨訓誥於是乎成發諸朝廷沛若江河之決書之方册炳若日星之垂自非潤色之才曷副光華之選恭惟中書舍人行為坊表學造淵源蚤由直道之行進被先朝之遇宣風使部有仲山之將明分職郎曹見公孫之潤飾論經王府載筆闕廷益隆當寧之知顯奉試言之召越從左史序進西垣矧令養賢而及萬民籲俊以尊上帝欲圖庶政之人實賴近侍之良惟出入起居罔不欽故左右前後無非正交修后德時亮天工延登哲人協慰公論益觀逺業光輔鴻猷某久以庸虛幸同陪侍欽聞成命竊忭私懷辱貺長言過形謙德感頌激切不任下情回館職謝啓伏審祇奉宸綍進直書林伏惟慶慰竊以人文化成莫先於典籍古訓是式實賴於賢才恭惟祖宗以來尤重館閣之設詳延天下方聞之士討論上世帝王之書所以昭雲漢之文章盛乾坤之德業厯觀前哲皆踐此塗自非問望之隆曷副髙華之選恭惟學士幾深藴識德性存誠由孔孟之門墻入淵騫之壼奧居今之世與古為徒宜進登於天朝久退避於公府上庠講道師表儒紳庶子治官典司宗籍逮兹德舉允協僉諧東觀校讎尚有留賢之嘆西清顧問行膺側席之求欽聞褒升尤切喜忭特紆傾蓋重辱貽書仰謙眷之過隆拜嘉貽而已厚制拘出謁禮阻造門感悚之深不任下懇回孔舍人謝啓伏審祇膺帝制進直綸闈伏惟慶慰竊以內史之贊宰司邇臣之與國論兹任尤重得人為難詔見王者之心詞鼓天下之動賞罰號令之所自出典謨訓誥於是乎成發諸朝廷沛若江河之決書之方册粲若日星之垂自非潤色之才曷副光華之選恭惟中書舍人系承聖裔學號儒宗實有力於斯文屢先鳴於多士令德中積英聲四馳册府著書虞庠教胄經帷勸講罔非堯舜之談詞掖代言式是商周之體越從左史序進西垣矧今養賢而及萬民籲俊以尊上帝欲圖庶政之人實賴近臣之良惟出入起居罔不欽故左右前後無非正交修后德時亮天工延登哲人協慰公論益光逺業久輔鴻猷某久以庸虛幸聫陪侍忝預交遊之末獲聞風義之詳昔參賜第之榮今遂同朝之願欽聆成命竊忭私懷辱貺長言過形謙德感頌激切不任下情回陳舍人謝啓伏審祗膺帝制進直綸闈伏惟慶慰竊以內史之贊宰司邇臣之與國論兹任尤重得人為難詔見王者之心詞鼓天下之動賞罰號令之所自出典謨訓誥於是乎成發諸朝廷沛若江河之決書之方册粲若日星之垂自非潤色之才曷副光華之選恭惟中書舍人才通倫類學造淵源懿文為吾道之表儀髙行乃諸儒之凖的先鳴多士獨擅英聲布武青雲久淹髙步初慶郎曹而分職旋聞柱史以記言侍咫尺之天威雖膺妙選出絲綸之帝制乃副僉言矧今養賢而及萬民籲俊以尊上帝欲圖庶政之人實賴近侍之良惟出入起居罔不欽故左右前後無非正交修后德時亮天工延登哲人協慰公論益觀逺業光輔鴻猷某久以庸虛幸聫陪侍忝預交遊之末獲聞風義之詳昔參賜第之榮今遂同朝之願欽聆成命竊忭私懷辱賜長言過形謙德感頌激切不任下情回知郡周承議賀啓比者叨奉命書進升講席固辭弗獲居寵惟憂伏念某學古迂疏受才譾薄誤參華於法從遽召直於禁林祇率舊章懇祈散秩初謂一麾而出守終膺三接之延登執帙經帷特復久虛之職紬書史觀俾成傳信之文顧省衰疲詎勝眷委此蓋某官至誠樂善厚義敦風過有奬成乃容冒處曲垂慶問益仰謙勤感誦所深喻言奚悉回賀翰林學士狀比者祇奉綸言進升禁直久玷露門之講復塵浴殿之班蓋奬飾之有初致寵光之誤及特紆慶問深切感悰謝訪及狀伏蒙尊慈特垂寵訪拙疾為梗造謁未遑感悚之深不任下懇回知全州王左藏賀冬啓永州伏以書雲紀瑞測日迎長是為建子之正宜享自天之佑伏惟某官膺時納慶與國均休阻修賔謁之儀特辱音書之貺感頌之切敷述奚宣回知道州秦承議賀冬啓上同伏惟某官懿文博古厚德庇民聊敷政於方州佇告猷於宸扆逢時之吉受祉無疆下同前回縣令以下賀冬狀亞歲令辰特煩慶問感佩之至但切下情回鄰州通判啓賔州謫居湘浦已仰髙風逺徙邊州復鄰治境伏窮閻而念咎通記室以不遑豈意謙光復垂書問載披華藻如佩芬蘭伏惟通判宣德世濟忠嘉天資明哲孝友施政愷悌宜民出二名藩久洽聞於輿頌入朝宸扆行峻被於寵章厚義所臨瞻言尤切永惟銘感曷罄敘陳納采啓夙仰慶閎願修嘉好某第二子溫朴愚粗立日訓義方賢女令淑有聞尚勤姆教已協宜家之卜敢先納采之儀欣幸所深喻言奚悉代資政公回司馬諫議言定狀某啓積善之家有慶正卿之世其昌特紆用雁之儀奚取食魴之美第五十三姪孫女未間姆教尚在沖年令姪承務蚤服義方已親外傅遽示問名之禮俾修合姓之歡嘉命所臨固辭弗獲愧無以喻言不能宣代富公回豫章郡王狀伏念退老田廬久違朝闕沐雲天之澤幸偃息於太和仰邦族之仁徒詠歌於信厚惟筋骸之難勉致箋問之靡通逖想光儀坐馳勞素屬園陵之展事承騶馳之在途緬惟跋履之勤倍協保綏之妙恭以大王慶源鍾粹景行推髙懷德惟寧用強於周道為善最樂有美乎漢風分寶玉以隆恩錫脤膰而異禮表儀藩后屏翰天朝實資夾輔之賢永底變雍之盛敢圖謙眷俯逮衰殘特垂貺於緘縢頓生輝於蔀室其於銘荷曷罄敷宣代王宣徽北京謝兩府啓比者祇膺中詔再鎮北門撫全魏之封畿總元戎之節制偃藩之始思職為憂伏念某官閥雖深事功匪立視秩二府久塵徽省之班厯守三都屢掌帝宫之籥間祈安逸越去近嚴爰領使於殊庭幸息勞於私館屬合宫之蕆事祗召節以陪祠肆覲威顔具瞻衡弼俄奉中天之命復叨朔部之行言念衰遲豈勝寄委此蓋某官斟酌元化登翼大猷率同羣后之心光輔一人之治顧惟舊物嘗預僉諧特於户牖之間曲加甄藻之賜致兹樗散被乃帝俞敢不寅亮敦誠勤勞宣力庶禆毫髮仰答壞陶代司馬公回趙龍圖啓伏審祗膺宸渥榮總藩條還內閣之禁嚴委中軍之節制淵衷所簡僉議允諧恭以經略龍圗敏智為資公忠秉節出逢亨會自結眷知領使外臺逺邇想聞其風績臨戎極塞朝廷倚賴其籌謀屬王旅之徂征驅傳車而西邁勤勞夙夜經畫始終惟隴右之故區乃關中之外屏往宣廟略必得珍才果膺推轂之行復峻登壇之拜折衝禦侮從容樽俎之間柔逺安邊弭息烽燧之警欽聞成命方切欣悰猶稽慶問之儀遽辱華箋之貺興言感忭曷罄敷陳與集賢相公啓以下代文潞公伏自一别光儀十踰稔嵗仰熒煌之星座久曠音書荷坱圠之化鈞屢分符竹屬因山而蕆事承整駕以在塗載惟跋履之勤懋協保綏之勝恭以某官中和秉德密勿告猷發揮經濟之文登翊昌明之運天工時亮帝載惟熙闕品物無不茂遂自宫闈之遏密及龜筮之告期特輟宰司逺護仙駕萬方同軌共嚴聖后之喪三事登車實總橋山之禮某留司管籥祗奉陵園夙夜惟勤雖殫於拙力期會所迫實懼於闕供仰繫庇賴之私獲免曠瘝之咎將候迎於公衮增系望於心扃更冀上為廟朝精調寢餗云云岐王嘉王先狀伏以聖后賔天因山制禮賢王扈蹕整駕在塗仰惟跋厯之勞仍盡哀摧之感神明所佑寢餗惟和某居守都畿祇事陵邑阻伸慰覲苐切瞻馳曹侍中先狀伏以聖后賔天橋山卜壤特倚戚藩之重逺陪仙蹕之儀恭惟夙駕之勤仍盡哀號之感即諧展慰預切馳誠山陵集賢相公伏以聖后賔天橋山卜壤特委宰司之重逺陪仙馭之儀跋履封圻勤勞夙夜神明佑助寢餗康和仰惟哀慕之餘無爽節宣之勝即諧參覲預切瞻依禮儀使以下先狀伏以聖后賔天橋山卜壤特委侍臣之重逺陪仙馭之儀即遂披承預深瞻跂回隨靈駕皇親先狀伏審肅駕行軒逺護仙蹕俯臨近甸特枉緘縢感佩之私不任下悃謝兩府啓比者祇奉渙恩俾司洛宅解北門之管鑰畫西土之封畿荷寵惟優偃藩兹佚伏念某久塵上衮素乏異能出入三朝勤勞四紀自避繁於樞府旋改鎮於魏都再奉命書七更歲籥引年甚懇陳力無堪纍叩天閽未回宸聽屬合宫之蕆事趨召節以陪祠肆覲威顔具瞻衡弼期盡還於印紱獲歸老於田廬不圖寵進上公禮優羣后莫容謝事猶委分符任隆周召之勳庸榮極甫申之褒賞帝宫居守私室就安此蓋某官登翼大猷斟酌元化勤收舊物廣厚羣倫秉國論以僉諧贊上心之簡在致兹衰朽叨被恩榮惟修屏翰之勤庶答陶鎔之賜感銘至切敷敘奚殫謝章參政啓近奉詔書特賜詩序眷恩隆厚麗藻鋪宣君都臣俞戴若太山之重聖作明述寵踰華衮之褒參政太中藴嘉謀猷有大手筆親膺睿旨渙發英詞臯陶揚言乃贊襄於舜帝吉甫作誦實歸美於宣王載觀敘事之工益慶逢辰之極刋之琬琰永為不朽之光飾以青黃俯愧無庸之質感佩之切不任下情與兩制啓某近膺召節入侍祠宫宸眷曲加便蕃渥澤逢辰之幸衰朽極榮伏蒙軒車訪臨垂慰欣企奉别如昨瞻懷實勞欲丐雅章以寵行色少煩藻思永為蔀室之光也附答布懇幸惟悉察不宣謝兩制寄詩别啓伏蒙英私垂貺佳什寵賁衰質發揮榮遇言贈之美穆如清風誦詠于再感服無斁當令琰刻永為家寶奉啓述謝一二不宣答蔡參政别啓伏蒙寵示先公太師志文發揮潛德薦慰幽壤論撰之美光於無窮積善餘慶信為不誣顯親掦名何以尚此眷私之厚雅故不遺循覽再三感服無斁敘謝之懇言不能宣謝史館王相公别啓昨蒙聖恩賜詩寵行繼以上宰賡歌盛作二府諸公併紆雅製固已焜耀為榮無窮今復蒙送示兩制館閣羣賢之詩文采相輝增諸琰刻遂使私室上有聖神雲漢之章次有舉朝公卿大夫清風之誦求之近古蓋所未聞此豈獨衰朽之光亦足以見邦國風化之厚也茍非上恩隆異深眷優禮同德協贊上承下率為之寵數殊於等倫何以致兹盛事乎幸甚幸甚奉啓敘謝言不能宣謝執政啓向緣謝事入覲威顔特辱撝謙俯臨僻陋玉津賜宴瓊林寵行同醉堯觴共飽周德聖作物覩兩承天漢之章君都臣俞疊委宗工之製卿雲比爛華衮垂褒臯陶賡歌蓋奉惟幾之命吉甫作誦皆貽孔碩之詩焜耀歸塗輝光蔀室永惟榮幸實罕比倫仰宸眷之曲私見邦風之篤厚言旋里閈方逺台閎感戀增深銘藏至切與兩府賀冬狀伏以書雲紀瑞測日迎長挺萬物之幽萌亞三朝之元會恭惟某官氣鍾英粹道契亨嘉師尹庶工式協具瞻之望燮和元化宣膺助順之祥阻伸慶謁之儀徒切傾依之懇曹郡王某官慶承勳閥望重戚藩兼馬鄧之寵榮大許申之土宇升陽介祉並國延休歡頌所叢名言罔既元資政某官懿文華國令望端朝夙推職衮之功日奉經帷之對升陽屆序視履延祥慶頌所深名言罔既賀樞密孫知院啓伏審奉膺廷誥進長天樞伏惟慶慰恭以某官沈正秉彛惠和迪哲登于廊廟益隆當寧之知委以鈞衡遂冠本兵之任阻修慶謁苐切歡悰賀樞密吕正議啓伏審祇膺明誥進位中樞伏惟慶慰恭以某官問望端朝誠明體國經綸之學已參翊於洪機啓沃之忠更倚毗於近輔欽聞嘉命深切歡悰賀樞密韓太中啓伏審祇奉命書進登樞府伏惟慶慰恭以某官時推問望世濟忠純簡在上心久贊襄於機政擢居近輔爰登翊於聖謀聞命以還歡言豈敘賀都承旨張客省啓伏審祇奉制恩總承樞管伏惟慶慰恭以某官通才成務敏誠造微密勿帝猷久司於宣納彌綸機政進二於疑丞欣忭所深名言豈敘回熙州苖團練謝啓伏審祇膺溫綍就領價藩撫隴右之故封分閫外之隆寄折衝禦侮久欽名將之風柔逺安邊遂總中軍之政威懷殊俗宣布上仁承協嘉時已臨盛府遽貽芳訊備識沖規感佩所深喻言奚既賀北京王太尉啓伏審光膺綸綍寵建旌旄進登上將之壇再領留都之鑰帝心妙簡輿論均歡恭以留守太尉夙冠時英遍參法從奧學本乎經濟賢業發於盛明出入三朝蕃宣四國撫封畿於全魏壯屏翰於神都樽爼折衝方倚老成之碩畫詩書謀帥乃揚休命於外廷懋典傳聞欣悰交切阻修慶謁倍積瞻馳回謝北京王太尉啓近者伏審留守太尉顯奉命書榮分將鉞敢圖謙眷首墜緘縢國朝革五季之弊風重三軍之節制元戎之寄必屬名儒舊德之求乃登上將矧踐揚之滋久惟問望之素隆僉謀所諧寵拜宜渥鎮魏都之巨屏護朔野之列城幕府初開藩閫增重遽煩記室逺示書筠感忭交深喻言奚既賀王太尉啓伏審光膺帝制進陟將壇榮擁節旄再司宫鑰伏惟慶慰恭以留守太尉英名髙世碩望端朝遍參法從之華升翊大猷之美清衷妙簡僉議攸歸全魏撫封方倚安邊之略中軍制閫爰加授鉞之崇開府云初偃藩增重欽聞誕告實切歡悰阻伸望履之儀苐極瞻風之素回熙州趙龍圖啓比審祇膺宸渥榮總藩條伏惟慶慰經略龍圖夙以才升自結主眷外臺領使風采著聞極塞臨戎方略屢上復峻齋壇之拜還登內閣之華佇觀逺猷益對來寵方開幕府首墜書筠感忭所深喻言奚既賀韓樞密知院啓伏審奉膺廷誥正位天樞伏惟慶慰恭以某官世濟純忠時歸碩望延登廊廟益隆當寧之知進秉鈞衡遂冠本兵之任壯邦家之柱石宣帷幄之籌謀翊贊聖明鎮服中外阻修慶謁苐切歡悰賀安副樞啓伏審祇膺帝制進位天樞伏惟慶慰恭以某官沉正秉彛惠和迪哲訏謨足以經逺厚德足以鎮浮法從參華宣忠勞於內外地官領計隆問望於弼諧允當夢卜之求升贊璿璣之政淵衷妙簡輿論僉諧阻伸慶謁之儀苐切瞻依之至賀留守韓相公啓伏審光膺帝制榮鎮洛師伏惟慶慰恭以某官厚德明謨純誠亮節再登上宰協贊太平領使殊庭聳具瞻於四海陪祠泰畤祇顯相於一人寵建節旄出司宫鑰眷求元輔分正成周先十乘以啓行冠諸侯而述職某乞身得謝交政預榮將覿髙風倍欣勞素謝兩府狀祇奉命書獲解宫鑰恩容就第寵冠在廷雖辭兼鎮之隆尚忝維師之拜搢紳聳嘆閭里光榮竊念某被遇三朝服勞纍紀迭居二府厯拜五闕駢圭組以褒崇慙鼎彛之勳伐自縱心而請老無虛歲以告歸荷異禮之眷留示至仁之厚賜賜詔盈几軺軒接塗以及耄期始諧夙志天惟從欲俯矜一物之誠相亦有終遂繼前人之美極臣鄰之榮遇實今古之罕倫此蓋某官登翊皇猷布昭元化人惟求舊義不忘勞紆廊廟之矢謨贊聖神之軫慮閔其衰篤許遂佚休猥以華顛膺兹殊渥方棲僻陋退屏塵紛荷德至深誦言奚既謝外任前兩府啓某官左右王家緝熙帝載夙贊鈞衡之化嘗紆廊廟之言致此衰遲獲遂休佚復膺殊渥不廢舊勞感幸所深喻言奚既兩制某官勵翼帝猷參華法從允諧僉論交贊清衷以下同曹郡王某官望重藩垣地兼勳戚贊襄上德柔惠邦風以下同北京王太尉某官望重本朝任隆羣后敦風兹久樂善有初以下同回謝孫觀文啓祇奉制函俯從懇請恩容就第寵冠在廷伏念某被遇三朝服勞纍紀久塵上衮無補鴻猷早聞知止之風備竭告歸之懇上仁篤厚眷禮縻留已寖迫於耄期始聽還於官政惟寵光之絶異非涯分之可安此蓋某官左右王家緝熙帝載夙冠鈞衡之任嘗紆廊廟之言致此衰遲獲全終始方力辭於天寵將退託於里居幸謝塵紛即安休佚鄰封密邇慶問先臨仰懷求舊之私益見敦風之美永惟感佩曷罄敷宣范太史集卷三十四

body:
  text: 范太史集巻十六宋范祖禹撰奏議乞罷韓忠彦劄子七月二十六日臣伏見韓嘉彦巳宣制授駙馬都尉其兄忠彦執政祖宗以來無此故事陛下動遵成憲懋建大公豈可使後世􅊚戚預政自今日始夫祖宗舊典君臣當共守之而不可隳也伏乞罷忠彦政事以為後法取進止二八月臣伏見韓忠彦弟嘉彦巳授駙馬都尉忠彦執政非祖宗故事陛下方以大公至正率先天下豈可首變累朝舊典開􅊚戚預政之端伏乞早罷忠彦政事以為後世之法取進止論樞宻院闕官劄子十二日臣竊見樞宻院闕官陛下選用執政臣不當預然臣忝備耳目之任有所聞見不敢不盡若但避嫌疑形迹恐非陛下所以任臣之意謹具開列如後一臣扵六月十六日上殿面論中外未見有可相之人在外唯有馮京聞其病損亦有女嫁蔡確臣言如此非謂京便不可用也但欲陛下知而察之耳文彦博亦與蔡確為昬姻吳充亦與王安石為親家趣向各異何嘗相黨若趣向皆同雖不為親自是黨也馮京在神宗朝為参知政事與王安石論議常不合先帝知京中立亦甚倚之其後與吕惠卿同執政又多不協遂為惠卿所傾因鄭俠獄罷京政事天下為之不平及王安石與吕惠卿為仇敵惠卿繳進安石私書其一紙云勿令齊年知京與安石同歲故安石謂之齊年先帝因此知京不欺故安石再罷相之日即召京扵成都府知樞宻院其後京疾病廢忘以此罷去即無他過聞京精神不至虧損陛下如欲知子細只須遣一使至北京觀之可用與不可用不難見也京乆在宻院經歴事多仁宗朝翰林學士存者唯京一人今人才難得若復以京知樞宻公論必皆允愜又得一前輩老成之人與後進者相参後進者亦必有所畏忌京年垂七十必不為欺宻院止藉其謀慮知識宜得老成之人臣與京素無恩分止是京初作執政臣守官京師隨例旅見後來臣一向在西京修書京過西京臣亦止與賔客一見此外更不相接今之所言採之公論謂宜如此非獨臣一人以為然也京與王安石吕惠卿論議不合多書於時政記今修入神宗實録可以考騐一趙禼守邉治軍素有威畧深知兵法善揣敵情熈寧之初先帝一見禼即知其有將帥才驟加拔擢委以西邉之事今巳二十年中間討伐安南雖無大功然處置南事多禼之力故先帝雖貶禼官使知桂州乆不得還葢藉其鎮遏故也今禼乆在延州扵國實有勤勞陛下若寘在樞宻則所照管者不獨鄜延一路西北二邉及蠻夷之事皆可訪問廟堂謀慮動繫天下安危豈比鄜延一路也臣竊料朝廷以守延州者難其人故未用禼臣愚以為若使禼自擇一人可代巳者必須得人禼是臣叔母之兄叔母巳亡有此親嫌若果用禼臣自當引避今不敢以親之故不言扵陛下臣僚中熟知邉事實未有如禼者右取進止明堂劄子九月七日臣伏見明堂大禮巳在散齋恭惟仁宗皇帝若稽古典斷以聖意自皇祐二年始制明堂之禮先詔有司乗輿服御務從簡儉無枉勞費御撰樂曲舞名服靴袍御崇政殿閱試雅樂如行禮之次又扵禁中靴袍親書明堂及明堂之門二榜將近祀日霖雨不止仁宗禁中齋禱極扵恭䖍應禱開霽天日清潤風和氣協祀前之夕即罷警嚴仁宗毎詣神座行禮畢鞠躬却行須盡褥位方改歩移嚮以示肅恭之至又令侍臣徧諭獻官及進徹爼豆悉安徐謹嚴無怠遽失恭質明禮畢比之他時行禮加數刻之緩御樓宣赦畢降詔中書門下止絶請託應内降恩澤及原减罪犯者不得施行仁宗欽崇禋祀布昭明徳傳之萬世大畧如此英宗神宗聖孝遵承皆極嚴敬今陛下嗣位五載再舉宗祀上帝顧饗神考配侑國之大事莫重扵此惟陛下内盡誠敬法則祖宗則神天降祉羣生䝉福夫齋者所以致其精明之徳孔子之所慎者齋齋必有専一精潔之誠乃可以交扵神明禮之言齋曰心不茍慮必依扵道手足不苟動必依扵禮古之君子其齋如此齋三日必見其所祭者誠之至也夫唯致齋肅恭然後動容周旋無不中禮書曰皇天無親克敬惟親鬼神無常享享扵克誠夫皇天惟親至敬鬼神惟享至誠天人之交相去不逺惟誠與敬可以感通陛下躬行扵上則百官有司莫敢不衹肅扵下經曰聖人之徳無以加扵孝惟陛下䖍恭祀事以教天下之孝使羣臣萬國瞻望盛徳休光臣不勝拳拳之愚取進止上殿論法度劄子十八日臣竊以朝廷治道必歸扵一祖宗創業傳之萬世造立法度皆因衆人之智積日累月講磨而成非獨出一人之意取一時之便而已累聖相承百三十年比之前代治安最為長乆其法有巳成之效此可信而不疑也然行之既乆則其間不能無弊熈寧之初先帝勵精求治思致太平稍欲更革弊事以光大祖宗之業而王安石用意過當獨任私智悉排衆論吕惠卿曽布之徒欲以改法進身一切變易祖宗舊政至今天下以為不便前後臣僚論之已詳不待臣言而知也自魏晋以後官名不正國家承平日乆未遑制作元豐中先帝置局講求此誠一代大典然有司亦失先帝本意一切遵用唐之六典夫唐六典雖修成書然未嘗行之一日今一一依之故自三省以下無不繁冗重複迂滯不如昔之簡便臣恭聞先帝巳厭官制之煩但未及修完不幸早棄天下今二聖垂拱循守成規除去弊事十巳七八海内安靖巳有成效今臣之愚竊謂朝廷既以王安石之法為非唯當修復祖宗舊政則天下無事伏望陛下明諭大臣凡所措置變改悉遵故常無得出意扵新舊之間别立一法自官制兵制將法民事有未便者更加修完祖宗時所無而今所有其可行者存之不可者去之祖宗時所有而今所無可復者復之如官制正名則如先帝之規事實則仍祖宗之舊其他可以類推如此則上可以存祖宗經乆之法成先帝制作之意下亦便扵當今之宜庶使法度不至數變紀綱不寖隳壊取進止論囘河狀二十八日右臣伏見元豐四年五月河決小呉六月三日神宗皇帝詔㫖更不修閉決口至十二月又宣諭輔臣曰以道治水無違其性其詔書及聖語巳書扵實録謹節錄進呈恭惟先帝聰明睿智窮神燭理不出九重而洞知河之利害斷以聖意如親臨覩雖神禹復生亦不過此所以終先帝之世人莫敢輕議河行大吳今已九年自元豐八年以來議者乃有異同朝廷疑惑故前遣李常馮宗道後又遣臣叔百祿趙君錫案視皆言無可塞之理即用北流為便士大夫亦言不可塞者十有九可謂衆矣昔堯之時洪水㴞天堯咨四岳誰可治水者四岳皆薦鯀堯知鯀不可用曰吁咈哉方命圯族言其為人狠戾必不能順五行之性也四岳皆曰試之堯乃命鯀治水九載而功不成夫堯既知鯀不可用然而勉從四岳者何也稽扵衆捨巳從人也雖勉從四岳然鯀治水果無成功卒如堯之言夫以堯之聖知鯀不可用然猶捨巳以從人而况執政大臣出一言而欲天下莫之敢違乎夫河為四瀆之宗萬水所㑹自大禹患其難治然禹所以能治之者順水之性而已漢武帝時河決瓠子使汲黯鄭當時興人徒塞之輒復壊武帝好神仙時方憂河決方士言曰黄金可成而河決可塞不死之藥可得仙人可致也此四者皆武帝所欲而不能得故方士以此說之至以塞決河比求神仙及長生其難可知也自是以後二十餘年不復塞武帝既封禪廵祭山川因祠太山還至瓠子自臨決河沈白馬玉璧令羣臣從官自將軍以下皆負薪填決河帝悼功之不成作瓠子之歌乃卒塞之名曰宣防其難亦至矣昨朝廷使李偉分導大河入孫村口歸故道以觧下流之患遂命偉専管勾疏導二股河臣竊詳李偉止因開沙河直隄第三舖口放漲水入孫村口强名之為二股水落當復如故其理必難乆行就使大河能成二股則東西兩流占地愈多所備益廣隄防之費自倍先朝亦嘗為二股而終不成者河之大勢必歸扵一故也而李偉因此乃欲以塞宗城決口及移深州之費囘奪大河復歸故道希合執政無所忌憚敢肆大言以罔朝廷朝廷更不博謀扵衆即依偉奏置都提舉修河司亦未嘗審問吳安持可與不可即令與范子竒同提舉安持既開直隄第四舖口而第七舖危急觀安持奏自八月八日救䕶至二十八日日數不為不多用梢草等百萬物料不為不豐調急夫至六七千人力不為不至官吏自夜逹旦不為不勤埽緷愈危隨即墊去甚扵漏巵何時窮巳終不能守而直隄自潰決百餘歩今纔開一舖而河勢變移人意巳不能測功役巳不為小安持所奏巳執兩端將來閉塞北流何止萬倍扵此若其無成豈肯任責又聞范子竒爭言河不可囘朝廷已令分析昨謝卿材奏乞兼領河事制置一年必使國用不加費民力不加勞河清住招物料住買水行地中冀不決溢河灘之地漸可耕墾自來春府界京東不銷調夫亦免科出夫錢又乞赴闕禀議河事自河決以來監司未嘗肻任咎責獨卿材所奏如此朝廷何不且試之一年若其無成顯行黜責如此則誰不盡力孰敢妄言而尚書省批令先具措置利害聞奏不令赴闕昨先移卿材河東及復置修河司而改用范子竒意謂子竒必不敢違耳然子竒亦明言不可者豈固欲違朝廷哉子竒乆任河北必亦知其可與不可也臣竊見去年初遣二使之時大臣方且力爭或曰可塞或曰不可今言不可者巳罷免所以廟堂無異議之人止用一李偉之言暴然復興此役用物料發急夫調兵已不為少凡河役一起則公私遂空將來聚十萬兵夫不唯窮困河北一路生靈京東京西亦皆震擾人民離散盗賊並興國之大憂或在扵此今河去北京止十五餘里若進馬頭廹蹙河水則其勢不可測知脱有踈虞北京將何以捍禦當此之時雖誅李偉軰不足以謝天下生靈陛下悔之何及夫河不可塞在理甚明稽之帝堯則當從衆驗之神禹則當順下質之先帝詔書具存陛下昨欲遣使之時先巳降詔恐人有觀望之意復追改之此乃陛下以大公為心無所専主不輕河事慎之至也及二使還奏大臣論議猶不能一獨陛下聖意主張遂罷修河司數路之人方稍休息中外無不以為至當今纔歴三時復為囘河之役先帝既以為不可陛下又以為不可而執政耻其前言之失必欲遂非不復顧天下之安危生民之休戚妄舉大役輕動大衆河本無事而人强擾之臣不知執政以何為詞必以北流有決溢之害也夫夏秋之際百川皆漲非獨大河河中河陽兩山之間猶時有決溢况扵河北河出平地無所扼束而北流隄防未理水性趨下安得全不為患也今秋水潦多扵常年如昨潁昌水入城郭陳蔡亦有水災豈由河不復故道乎熈寜中河決曹村東南注鉅野與漢武帝時瓠子正同河決而南不可不塞故大興人徒塞之然曹村之役人力巳無所施一夕河自退背靈平乃成故議者以為天助非人功也祖宗時王楚横壠商胡皆不可塞非不欲塞也勢不可廻也先帝知其如此及河決而北遂不復閉蓋幸其北去無南決逼近都邑之患而河薄西山稍近禹之故道李垂孫民先嘗欲導河使之北流當時議者但以功費太大力不能為而已今河自行其地此乃天意非人事也夫河者天地之氣氣之所向誰能禦之今東行故道巳髙借使能以人力開之至海終不能使水自下升髙自大禹以來未聞用人功開土渠而引大河行其中者今不以人意順水而法使水隨人意此乃鯀陻洪水汩陳五行之失也元豐中范子淵為武濟之役欲横絶大河費國財害人命不可勝計京西之人恨不食子淵之肉及其敗事姦臣黨庇止奪一官陛下嗣位方加貶責今欲塞北流與子淵何以異校其勞費與其為害又非武濟之比也夫水官欲興河役正如邉臣欲生邉事官員使臣利扵功賞俸給吏胥主典利扵官物浩大得為姦倖豪民利扵貴售梢草瀕河之人利扵聚衆營為凡言囘河之利者率皆此輩非為國家計也且以國家今日事力何如漢武帝與先帝之時以漢武帝之䧺材先帝之神武皆以塞河為難而今日執政容易為之此臣所不敢信也假使有可囘之理可塞之勢方今國用虚乏民力困敝朝廷唯宜安静猶當省費息民况必無可囘之理乎又有言北流之害者或曰淤塘濼或曰河入北界則失中國之險此皆私憂過計也塘水不依原法已乆非緣河決而後淤淺今河入界河日益深濶東流幾二百里乃入扵海昔以界河為阻今以大河為限其為天險豈有過扵此者乎漢武帝時齊人延年上書請案圖書觀地形令水工開大河上嶺出之匈奴東注之海可以省隄防備塞士卒轉輸匈奴侵盜覆軍殺將暴骨原野之患天下常備匈奴而不憂百越者以其水絶壤斷也此功一成萬世大利武帝壯之詔報曰延年計議甚深然河乃大禹所道也聖人作事為萬世功通扵神明恐難改更夫延年猶欲決河以灌匈奴武帝以其非禹跡故不為也今設使河入北界此乃天送禍扵契丹也彼河入百里則失百里之地入二百里則失二百里之地河之所在國之災也何利扵我而必欲專之議者又以為恐敵渡河入冦此又私憂過計也今河上流自西夏經北敵乃入中國自古未有匈奴以舟師入冦者也況其居下流乎若北敵能以舟檝與中國校勝此則書契以來未之聞也假使東流成功北流退為平陸臣不知朝廷能聚兵扵北境浚塘水而修界河乎凡以北朝為說者皆以妄言恐朝廷望陛下拒絶勿聽而已自古欲舉大事動大衆必先盡天下之言不惡異同之論使人人各伸所見而後利害是非出焉至扵治河必委忠實可信之人其論議必斷以經術非專用貪利邀功之人也漢武帝使汲黯鄭當時塞瓠子猶復壊成帝時平當以經明禹貢使行河領河隄今乃欲望大禹之功扵王孝先李偉之徒不亦難乎陛下凡兩遣使行河執政皆不以為信而獨信一李偉輕犯大河與討伐西北二邊無異其費無有限極國財民命委扵洪流比之邊事尤不可計而朝廷晏然為之此臣之所大惑也臣愚伏望陛下明諭大臣博采羣言息意囘河勿輕動衆無以有限之財力生民之性命填不測之巨壑勿為無窮之役興無涯之費以狥一言之失而望必不可成之功罷都提舉修河司散遣官吏兵夫以弭將然之患其北流決溢隨宜救䕶委外都水使者自來春為始亟理隄防仍速行相度修閉諸處決口臣自聞復置修河司指揮即欲建言緣臣叔百禄嘗被使指言出臣口理亦有嫌是以躊躇至扵閲月今中外訩訩皆言不便臣有言責當陛下耳目之任若避嫌緘嘿坐觀國事有誤則臣之罪大矣陛下亦何頼焉是以冒昧竭盡其誠唯陛下深察臣無任懇悃激切之至范太史集巻十六

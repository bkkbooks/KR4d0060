body:
  text: 范太史集卷四十九宋范祖禹撰皇族墓志銘左武衛大將軍貴州刺史妻渤海縣君髙氏墓志銘夫人髙氏曾祖瓊贈太師尚書令中書令韓武烈王祖繼和贈左金吾衛上將軍父遵武文思副使母李氏夫人以元祐八年八月歸宗室右武衛大將軍貴州刺史子騫十二月癸亥卒年二十有三夫人性惇惠在父母家柔靜而和巧于女工善筆札既嫁事舅姑如父母相夫以正而順誨子以義而慈貴州前夫人男女十八人夫人鞠育一如已出雖處室未易寒暑及卒男女號慕哀毁一如喪親妣焉五男曰伯應曰伯膺曰伯廣皆三班奉職曰伯慶曰伯廑五女在室九年二月已酉葬河南永安縣銘曰夫人之歸鳴雁始旦宛其沒矣嵗律方晏有子十人愛母無間右監門衛大將軍贈蘄州防禦使蘄春侯妻長夀縣君杜氏墓志銘夫人杜氏曾祖彥鈞贈安化軍節度使祖贊皇城使父宗旦歸宗室故蘄春侯子買封長夀縣君性慧巧善治家事舅姑孝接親族和雖媵妾遇之必以禮居侯家儉若寒素之族衣服不喜華侈厭逐遊觀之樂侯以賢稱于宗室夫人有內助焉侯卒夫人居喪如禮不飲酒茹葷元祐八年六月庚申卒年二十有九三男曰伯璵早卒二人幼三女在室九年二月已酉葬河南永安縣銘曰杜氏之先世出陶唐嬪于宗子佩玉鏘鏘蚤世而隕令問不忘三班奉職妻安氏墓志銘君安氏開封人曾祖靖贈太子右內率府副率祖居簡供備庫副使父巽左班殿直母馬氏歸宗室三班奉職子瓔君在家孝于親順于長巧于女工及適趙氏事舅如父母奉夫如長上內外親屬無不得其歡心平居下氣怡聲未嘗忤物宗族每娶婦輒指為法式奉職官深州君內治家事祭祀賓客必竭其力或捐脂澤奩具以佐賙急故奉職入官未幾衆翕然稱之元祐八年十二月十八日卒年二十有五一男一女皆幼九年二月已酉葬河南永安縣銘曰婦無攸遂是職中饋克相其夫以濟外事宜夀而夭永齎厥志贈開府儀同三司昌國公妻同安郡君安氏墓志銘夫人安氏京師人曾祖解州防禦使習祖左侍禁懷正父東頭供奉官承祐母李氏年十七歸宗室昌國公仲騑事舅姑謹肅治家有法待內外親屬無貴賤長幼一以禮雖遇婢妾亦未嘗大聲色故無不得其歡心故和義郡夫人昌公之繼母也夫人奉之愈加敬順未嘗以纖介致異昌公事繼母亦以孝聞人以為有內助焉既而公先夫人捐館夫人執舅姑及公之喪哀毁盡禮戒子孫必以慈儉為稱首子孫服其教訓循以為法纍封同安郡君元祐七年四月壬午卒年五十有六九男曰士感右武衛大將軍渭州刺史曰士齒右內率府副率曰士趨左班殿直曰士勿右班殿直曰士頒右班殿直卒四人早夭女二十人適左侍禁劉鈜供備庫副使張從厚西頭供奉官葛世明承務郎劉公佐三班奉職王審方二人幼十三人皆早卒孫男五人不求三班奉職不愚右班殿直不惑三班奉職二人幼孫女三人二早夭一人在室九年二月已酉葬河南永安縣銘曰澗溪沼沚潢汙行潦筐筥錡釡蘋蘩蕰藻夫人是職公侯之宫著為壼則繼彼國風右侍禁妻張氏墓志銘君張氏世京師人曾祖玉贈中書令兼尚書令祖耆贈太師中書令兼尚書令父舉一左藏庫使母任氏封永安縣君君天資勤儉志于女工父母愛之歸宗室右侍禁士普嵗時祠享饋奠必盡恭敬禮如事生宗族稱焉奉姑孝謹治家和柔從夫官於汜水元祐四年七月壬申卒於官舍年二十有四一女幼九年二月已酉葬河南永安縣銘曰惟張氏遭遇獻后仁祖之世寵祿盛大子孫衆多昏姻公族宜矣降年不永其命也夫右班殿直妻陳氏墓志銘君陳氏閬州人曾祖省華贈太師尚書令兼中書令秦國公祖堯佐相仁宗贈太師中書令兼尚書令鄭國文惠公父象古右宣德郎母陸氏繼母鄭氏君幼頴悟長而端麗巧于女功奉順母教未嘗有違母有所怒君在傍必移而為喜其言如不出諸口家人未嘗聞笑語之聲適宗室右班殿直子明冀王之後也以孝敬為舅姑所愛族人莫不宜之元祐七年三月丙申卒年二十三二女皆幼九年二月已酉葬河南永安縣銘曰有媯之後國為陳氏鄭公文孫來嫁宗子方華而隕如彼桃李右武衛大將軍贈華封觀察使追封華隂侯墓志銘侯諱仲遄字行可魏恭獻王元佐之曾孫平陽懿恭王允升之孫武寧軍節度觀察留後彭城郡公宗厚之子母王氏同安郡君繼曰曹氏夀安郡君初賜名補太子右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍原州刺史風儀秀偉神氣惇實幼不好弄讀論語孟子通大義既長服膺儒術覃思經典英宗患宗室不學增教官立課式俾日試月考由小學升大學簡不率教者損俸以懲之侯夙夜勤勵率常中選神宗以經術取士侯治易及周禮大宗正以名聞兩試祕閣不中第遂不復舉遍讀歷代史氏諸子百家之書間為歌詩雜著以見志神宗大興太學教養多士侯以宗室不可無學圖立宗子學立升進法條上之會西師興不報天子朝饗太廟侯以司尊相灌鬯禮成因論周官尊彞作上中下三篇奏之屢欲試吏事齟齬不得施乃絶意于仕教二子力學試有司中選元豐二年魏邸災侯力負所蓄經史以出室無了遺徙居京城之西北隅門無車馬之迹與兄弟和樂闢軒於序南手植叢竹作篠軒記以志焉日以詩酒自娛初與教官侯溥逰甚欵密溥死纍年因過其墓作詩以弔之又與進士劉克敦為布衣交克敦死哭之於墓為哀詞十章宗室稱其善交元祐二年正月已巳卒年三十有七娶劉氏封永康縣君六男曰士宇以文學中選為左承議郎曰士淝試亦中格為侍禁曰士洋殿直曰士嶟曰士隆曰士巵皆殿直五女長適殿直張燾次適借職髙秩三尚幼孫男女十六人九年二月已酉葬河南永安縣銘曰英宗勸學侯入鼓篋神宗造士侯出挾䇿雍雍在宫肅肅在廟公子信厚邦國之教前右監門衛大將軍墓志銘君諱令騂太尉中書令冀王惟吉之曾孫陳州觀察使淮陽侯守約之孫鎮江軍觀察留後北海郡公世靜之子母襄陽郡太君張氏繼母夀光縣君慕容氏元祐五年十月癸丑卒年二十有九娶徐氏永寧縣君五男一女九年二月已酉葬河南永安縣銘曰厥祖考惟公侯厚其終掩諸幽左班殿直妻翟氏墓志銘君翟氏開封人曾祖藏之內殿崇班閣門祗候祖儀供備庫副使父元弼西頭供奉官母皇伯彭城郡公宗厚之女君幼喪母鞠于父性至孝卓然有立父命主閨門之事家人裕如也及長適母兄故華隂侯仲遄之子左班殿直士隆事姑謹而敬治家嚴而理相其夫以正而順中外族人稱之元祐八年十二月壬申卒年十有六一女曰馮奴九年二月巳酉葬河南永安縣銘曰君出自趙歸為宗婦才華而隕何夙不莫右監門衛大將軍贈博州防禦使博平侯墓志銘侯諱令岏字子固贈昭信軍節度使英國公惟憲之曾孫贈金州觀察使新興侯從郁之孫贈洺州防禦使廣平侯世芬之子初賜名補太子右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍元祐四年五月甲申卒年二十有八侯幼而老成及長篤學治詩書襁褓喪父所生母劉氏適人侯及冠始知之訪求無所不至俸入罄其所有慶弔人事皆絶期以知存沒而後已元祐三年得其母迎入宫晨昏定省竭力致養乃有生意寢食始自安宗族稱孝娶張氏封夀安縣君三男曰子確三班奉職二人并女皆幼九年二月已酉葬河南永安縣銘曰昔唐德宗亂失其母轍迹四海沒身弗覩惟侯克孝終得其親凱風寒泉今有令人三班奉職墓志銘君諱子皓字商老贈萊州防禦使東萊侯從恪之曾孫贈武寧軍節度觀察留後魯國公世規之孫右武衛大將軍貴州刺史令卞之子嫡母樂平縣君徐氏所生母王氏初授三班奉職幼不妄言笑既長能自擇所守有老成人之志燕居端肅如見大賔與人交必求勝已者事父母以幾微而諫亦無少忤其意接親族和順而有禮義內外莫不敬愛之十嵗能為詩往往有驚人之句六經諸子百家無不該覽每旦未冠櫛手已執卷夜分猶聞書聲父欲室之闕登一第以為親榮誓不娶也篤志于學過勤得疾事親素謹雖病未嘗去側父母屢遣終不易其志也元祐七年正月癸丑卒年二十所為詩賦雜文十五卷藏于家九年二月已酉葬河南永安縣銘曰英英公子被文華兮少而強學樂無家兮天畀之才生有涯兮既冠而字命不遐兮左班殿直妻李氏墓志銘君李氏開封人曾祖惟寶贈左驍衛大將軍祖宗旦西京左藏庫副使父豫右侍禁母柴氏年十八歸左班殿直士鐃事舅姑孝敬嫁之明年姑病扶侍躬承湯藥灼臂祈請數日而愈元祐六年六月辛亥卒年二十有一一男一女皆幼九年二月已酉葬河南永安縣銘曰婦道內夫家外父母家唯事舅姑孝斯可已矣降年不永其命矣夫右屯衛大將軍妻康氏墓志銘君康氏京師人曾祖琪左內率府率祖公元左侍禁閣門祗候父德濟供備庫副使母長安縣君王氏適左屯衛大將軍仲瞞不逮事舅事姑以孝聞元祐二年五月丙子卒年三十有四三男曰士宰曰士遃曰士唪並左班殿直女二人皆幼九年二月巳酉葬河南永安縣銘曰凡婦之行宜莫如孝姑慈而從古之善教子孫繩繩永有則效左奉議郎妻旌德縣君彭氏墓志銘君彭氏京師人曾祖睿武昌軍節度使贈中書令祖再問右千牛衛上將軍父崇一左藏庫副使母安福縣君折氏年十八歸右內率府副率令珦君幼聰慧端靜精于女功嵗時為竒巧纖麗以獻中外尊親而自服用甚質歸率府事舅姑勤敬所居隘狹幾不容足鄰舍未嘗聞人聲率府以千牛將軍大宗正與教官偕薦補外官召試祕書省換授奉議郎監滑州倉草場君治內益清儉雅尚清素有儒者風元祐六年二月丙辰卒于官舍年二十有八四男三早亡幼曰子砥三女皆幼九年二月已酉葬河南永安縣銘曰逺矣彭氏大邦之後歸于公族宗子之秀克成其家不享眉夀右屯衛大將軍妻安樂縣君陳氏墓志銘夫人陳氏其先泉州人自曾祖寧逺軍節度使文顗始居京師今為開封人祖緩大理評事考承德東頭供奉官夫人幼警悟未笄適右屯衛大將軍世侹事舅姑孝謹撫育子孫下逮媵御莫敢不肅而皆得其歡心內外親族貧乏者必賙恤之親疏輕重各稱其情人無間言屯衛在宗子中號為家法可稱者夫人內助預有力焉元祐四年六月乙卯卒七男曰令休右金吾衛大將軍成州防禦使曰令族右武衛大將軍髙州團練使餘皆卒女適內殿承制楊應善孫男女二十有三人曾孫男女七人九年二月已酉葬河南永安縣銘曰帝舜之後胡公國氏在齊為田苗裔實繁夫人宜家內外雍肅以有子孫顯于公族右千牛衛將軍贈左屯衛大將軍墓志銘公諱令緻字景照贈彰化軍節度使舒國公惟忠之曾孫贈宣州觀察使宣城侯從謹之孫貴州防禦使世怙之子母大寧郡君邢氏初賜名授右內率府副率歷右監門率府率右千牛衛將軍公幼不好弄舉止嚴重長治書易遍觀先儒及近世名家義説擇其善者從之其餘誦習不務博而貴精非終帙非嘗越視他書論語孟子荀掦諸書皆能諷誦學李白歌詩沈傳師字書平居靜掃一室文史筆硯列置後前正坐或竟日素樂施與或以貧乏告則視其戚疏緩急而厚薄先後之甚者不暇請于父兄或解衣乞之無難色性篤孝視父母色少有不悅未嘗安寢已而見喜容必命酒自慶元祐二年得疾大寧郡君素鍾念每來視公必自力冠櫛而興若無所苦者囑兄弟以儉葬十一月壬申卒年二十有五娶張氏二女在室九年二月已酉葬河南永安縣銘曰事親色難子夏所聞力行有餘篤志典墳施不獲報早隕厥身右武衛大將軍慶州刺史妻德安縣君王氏墓志銘君王氏髙祖承衍尚秦國大長公主贈尚書令鄭王曾祖世隆贈尚書令祖克明昭州團練使父誨文思副使君生于富貴天資淑懿長適右武衛大將軍慶州刺史世劬事舅姑盡婦道治閨門以禮法奉祭祀敬而嚴恤惸獨惠而均元祐四年十一月壬午卒年三十有九六男曰令夤左班殿直次早亡曰令澶左班殿直曰令愩曰令竿皆右班殿直次未賜名八女長適右班殿直季珣次適三班奉職楊訓二早亡餘在室九年二月巳酉葬河南永安縣銘曰詩歌碩人宗族盛大惟君之貴赫奕內外雖不眉夀亦顯不晦右侍禁墓志銘君諱士爚字明叔濮安懿王之曾孫廣陵郡王宗誼之孫英國公仲論之子母建安郡君杜氏五嵗授右班殿直濮王二王夫人祔園廟轉左車遷右侍禁少秀頴好學性純孝英公薨哀毁感疾而卒年二十實元祐四年十一月已酉娶髙氏闕祖闕在大夫之姪九年二月已酉葬河南永安縣銘曰子野毁卒春秋哀之雖不勝喪君子懷之左班殿直妻李氏墓志銘君李氏曾祖繼隆贈太師尚書令兼中書令楚國公祖昭亮贈太師尚書令兼中書令追封崇國公父惟賞贈右驍衛將軍母曹氏沂王之孫女年十五適淮康軍留後沂國公之子右班殿直士澧君聰慧而安靜幼喪其母深處房闥兄弟罕見其面既嫁事舅淮康孝敬衣服飲食不務華侈見其夫好學則有喜色欲罄所有以助之元祐三年十二月癸酉卒年十有六九年二月已酉葬河南永安縣銘曰父母后族舅夫天屬其新孔嘉其究何促右武衛大將軍賀州刺史妻長夀縣君劉氏墓志銘君劉氏開封人曾祖知信贈太師中書令祖承嗣皇城使資州刺史父永夀三班奉職君柔順寡言好施惡殺承上御下動循法則族人皆樂其有純德諸子雖幼切于求師以教之常語其夫以子孫不立為衣冠之恥年十五適右武衛大將軍賀州刺史士薦封長夀縣君元祐三年十月甲午卒年二十有九二男曰不侮三班奉職次幼三女長適李偉餘皆幼九年二月已酉葬河南永安縣銘曰不榮世祿以教其子賢母之行宜賁彤史贈曹州觀察使妻安康縣君王氏墓志銘夫人王氏開封人曾祖漢忠保靜軍節度使贈司空祖闕政睂州防禦使贈司徒父道恭慶州團練使贈明州觀察使夫人幼端慧不為嬉戲既笄柔間婉淑事父母孝敬年十八歸宗室贈曹州觀察使濟隂侯世統封安康縣君入見坤儀殿慈聖光獻皇后顧問家世夫人言母永嘉郡太君李氏章懿皇后之姪也慈聖勞問久之夫人性溫靜衣服飲食約而不華喜賙中外之貧者事姑如母友娣姒如同氣敬夫如賔主左右給侍未嘗見其喜愠之色而皆得其歡心濟隂侯病且卒夫人悲泣感疾敕諸子曰爾曹幼孤宜力學治身以無忘先王之訓則吾雖死目且瞑矣諸子恭慎能如其教嫠居十餘年元祐八年五月癸未卒年五十男五人曰令香右千牛衛將軍曰令傪內殿崇班次早卒曰令礿左班殿直曰令㒜右班殿直三女長早卒次適潘乘次適王僅皆三班奉職孫男闕人子䞈三班借職餘皆幼孫女五人九年二月已酉葬河南永安縣銘曰顯以世族嬪於宗室守義而教實惟母德子孫詵詵先訓是則范太史集卷四十九

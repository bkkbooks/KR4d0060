body:
  text: 范太史集卷五十五宋范祖禹撰手記傅堯俞欽之蘇軾元祐五年正月乞召還蘇轍子由趙彥若元考司馬康公休元祐三年薦講官除侍講王巖叟彥霖朱光庭公掞吳安詩傳正賈易明叔元祐四年兩省同舉御史除殿中劉安世器之吕陶元鈞吕大忠進伯吕火臨張舜民藝叟李周純之楊國寶應之元祐六年閏八月二十七日舉御史楊瓌寶器之謝卿材仲適游師雄景叔常安民希古王汾彥祖姚勔輝中張耒文潛朝補之無咎劉唐老夀臣廖正一明略郝闢之希孟吳立禮張舉子厚闕志趣髙潔詞學清贍甲科登第二十餘年侍親終飬屏居不仕安恬之節臣實不如曾孝純元祐五年十月二十八日薦館閣孫賁錢世雄元祐五年八月舉升陟時權進奏院户部檢法官宋大章樂京已卒丁騭公默吳師仁坦求舉元祐五年四月一日三免講乞擢用前此十科講讀邵伯溫子文杜敏求拙翁元祐四年舉臺閣清要升劉敦夫元祐四年舉著述科龔史彥和馮如晦叔明馮山允南陳鵬圖南趙伋思誠張康國饒州教授改官官徐鐸榜及第元祐七年薦學章元弼䝉之子年公肅紀常極稱其有文學官七再薦元祐五年薦馬涓朱紱鄭倞周行已師正叔秦覯能文程遵彥杭簽嘗言子瞻極稱其才云溫公亦知之而口未蘇堅衮子子瞻稱之如程韓純彥好學有文申公嘗欲除館職侯臨邵光子瞻稱之已卒韓宗直公掞稱之王普王當李楚懷州人能文范致明應制舉能文范致虛元祐三年及第文甚豪賀鑄班行有文朱勃遜之元祐六閏八月二十七日與公掞同舉御史王浹能詩賦杜常詩學王奎永興通判回方識十久在陜西言邊事甚詳言元祐二年秋西人數萬㸃集半年方起至鎮戎城下五日而去本無意入冦乃梁沁布欲姑以此舉觀人情也三家共一駝載乾糧人甚苦之既無所得自後未易㸃集沁布更以恩結人心又欲立功以服國人年方三十二涇原之寇先殺烽子故無斥堠邊吏亦不知六年六月三日鎮戎之役官軍聚城中不出並聽張之練節制帥臣無所施為李由頤云沁布保護嗣子乃夏之伊霍觀其所為無篡奪之形趙竦平吕梁百步洪之險善治財賦元祐七年舉公私俱便樂舉李潛元祐六年舉臺閣清要張瓛游冠卿雍鈞蘇嘉元祐七年舉升擢清要石嗣慶李格潛之子敦極稱之孫諤元祐七年舉臺閣陳沂元祐七年舉升擢楊宗惠敦夫劉處厚敦夫唐夫極稱之趙令畤潁簽已子瞻字之曰德麟作字說并書來盛稱之云薦館閣宇文邦彥傅耆楊阜王渙之張東元祐八年舉著述商倚劉羲仲尹材處初元祐四年舉獻納科卒張雲卿伯紀元祐八年薦學官陳師錫伯修秦觀少遊陳軒元輿坡舉自代孔武仲彥常應昭緯蘇昞周尹正孺卒李由頤養正朱光裔公逺陳元直叔正陳元紘張重子威吳儔陳瓘瑩中李百祿祐父榮輯子雍元祐八年薦學官陳恢宋匪躬履中宋景年遐叔家彬中孺元祐六年舉臺閣石景略蔡肇天啓元祐六年舉臺閣李格非李徹擇之韓宗質王實仲弓王寧幼安徐鐸振父游酢元祐五年舉著述科田述古明之李豸方叔張庭堅廣安人盛僑司業稱之李純中師中弟李徹言正叔嘗責堯夫不與換官鮮于綽大受祝康法家孫覽傳師程之才程之元德孺程之邵懿父髙士英子容范子竒中濟劉昱晦叔喬執中希聖謝綬喬云論議似從二程淮南發運司趙㞦景仁元祐五年十月與兩省同薦御史范純禮夷叟舉自代趙澤元祐四年兩省同舉御史郭晙已卒劉當時叔鄭富紹庭德先田子諒丁綖邃翁陳陔孫安永弟長社宰宣德有能政蘇京羅適張升卿與張宗諤同以茶法勒停文勛徐君平久從荆公學當國時不隨子由稱其文字李曼修儒有吏才元祐六年薦獻納宇文昌齡伯修安鼎元祐四年兩省同舉御史趙君錫無愧鄭穆閎中元祐五年正月備經筵鄭雍公肅元祐五年正月備經筵李栝元祐五年知洋州回始識石亘毛漸知髙郵軍復三十六堰朱京楊畏子安傅傳師傳正弟原明稱之李君卿考課第一未奬張安上能吏也劉渙公濟元祐五年七月薦博士李傳同上薦張景仁同上薦朝無咎稱之除教授張咸元祐五年七月乞免舉應制司馬槱元祐五年八月舉賢良謝良佐公掞正叔皆稱之元祐六年舉著述暢大隱虞䇿元祐五年十月與兩省同舉御史自湖南運判除監察裴綸元祐五年除御史辭不就郭知章陳祥道用之所精禮學元元祐五年十月二十八日劄乞行其進禮書祐七年四月二日又薦乞復為禮言豐稷澤夫彭汝礪器資潘興嗣朝說之作揚雄别傳有史才又六薦著述科李常同年襲弟廷珍稱其文與李傅相上下吳儀傳正姪極稱其文許奉世堯夫薦經行特就殿試注孝經扈充元祐六年舉升擢清要􅀈于之武元祐六年舉臺閣清要周鍔廉彥許彥處中教元祐七年舉臺閣元祐七年十二月舉宫司馬庭直孺王任叔重元祐七年舉著述李晰卭人能文元祐八年薦學官朝將之元祐八年薦學官孫協元祐八年薦學舉劉逵焦蹈榜第二人李瑺紀常稱其能文虞芮喬希聖舉賢良極稱之王誼王發劉器之舉賢良子瞻稱其文舒煥吳默范太史集卷五十五

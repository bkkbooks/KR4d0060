body:
  text: 范太史集卷三十三宋范祖禹撰翰林詞草樂語附大行太皇太后山陵掩皇堂祭奠祝文九年二月七日八荒同軌䖍奉夫事敬卜兹日將掩幽宫復土戒期終天永慕尚饗皇后謝賜御筵表本妾言伏䝉聖恩特賜御筵者先后賔天壽原復土八荒同軌萬旅獻功仰聖孝之感通獲神休之佑助屬當陪扈莫展勤勞曲頒燕犒之私祇荷惠慈之厚顧無少補深切愧懷皇后謝皇太后賜茶藥及傳宣撫問表本妾言某人至伏蒙聖慈特賜妾茶若干藥若干及傳宣撫問者西陵先逺屬當扈駕之行長樂問安實切違顔之戀睿懷所軫慈訓曲加仍頒茗劑之珍以慰道塗之念欽承撫諭仰戴恩私皇后謝皇帝傳宣撫問表本妾言某人至伏䝉聖恩傳宣撫問者寢陵修祔莫展於勤勞道路安行屬當於陪扈荷睿懷之仁厚頒溫詔以丁寧仰戴恩私益深感惻皇后謝皇太后傳宣撫問表本妾言某人至伏䝉聖慈傳宣撫問者祇扈靈輿敢憚勤於次舍近違禁掖徒結戀於晨昏特軫慈仁曲加勞問仰荷寵綏之眷彌深感惻之情皇后謝皇太妃問候箋本妾言某人至特賜問候者祇扈靈輴暫違禁閣上體聖神之仁孝居忘道路之馳驅特軫溫慈曲加勞問仰眷存之至厚懷感惻以增深皇后謝皇太妃送茶藥箋本祇護行輴敢憚勤於道路暫違中禁實結戀於晨昏上軫慈懷逺傳溫旨屬春陽之在候頒珍劑以養和戴荷所深名言罔既大行太皇太后山陵下事掩皇堂訖於隧道陵治地為方壇上設五方五帝神位座鎮謝墓法祝文伏以因山制禮爰始鳩功復土告成迄終大事惟神敷佑于役罔囏祗祓精誠肅陳明薦尚祈來顧申錫永寧尚饗大行太皇太后山陵掩皇堂訖九虞祭祝文第一七日伏以光靈在天體魄降地惟哀顯相夙夜不寧䖍遵典禮祇薦祫事謹以制幣柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊哀薦祫事尚饗第二八日伏以送形而往既襄大事迎精而返惟極孝思敬以柔日哀薦虞事第三九日伏以其返如疑若有求而弗得以虞易奠惟至痛之無窮明薦吉蠲神保是格第四十日伏以真馭賔天主車在道日修虞事于以寧神瞻慕哀恫罔有終極第五十一日伏以成壙而虞日接於祔翟車近止將次都畿嘉薦普淖惟以爰侑賜山陵陵使吕大防茶藥兼傳宣撫問詔敇大防先后在天新宫復土惟時冡相總率羣司恤典備成還車載道服勞大事興念不忘宜有匪頒用昭眷禮今差使臣沿路賜卿茶藥具如别録至可領也賜徐王髙密郡王宗晟安定郡王世準觀察使仲先世雄仲當仲損仲覽團練使孝騫茶藥詔敕書敕徐王躬侍靈輴徂安吉竁哀恫罔極行役載勤宜有匪頒用昭親睦賜駙馬郭獻卿錢景臻王師約張敦禮曹詩王詵韓嘉彥都大管勾張茂則防禦使吕真刺史孟在光祿卿韓宗師衛尉卿趙令鑠少府監陳絃內侍省都知劉有方茶藥詔敕書敕師約肅護靈輴奄終吉窆屬陽和之紀月祇行役以在塗宜有匪頒用昭眷渥賜禮儀使李清臣鹵簿使胡宗愈儀仗使李之純橋道使錢協茶藥詔敕清臣躬護靈遊奄終吉窆眷使車之勤役陪虞輅以言旋宜有匪頒以為慰勞賜山陵諸司使副右司郎中承議郎以上內殿承制崇班通直郎入內供奉官陳衍等茶藥并傳宣撫問敕書敇吳靖方因山修祔復土告成乃眷臣工服勞夙夜特加頒賚以示恩私今差使臣沿路賜汝臘面茶七斤縳子茶七斤藥物一銀合合重三十兩至可領也賜知河南府安燾茶藥詔敇安燾因山蕆事復土畢功眷密幄之舊臣守别都之留鑰典司陵邑陪扈輼輿宜有匪頒以慰勤勩西路祔葬皇親賜故魏王新婦談國夫人王氏以下茶藥并傳宣撫問詔敇書敇故魏王新婦談國夫人王氏躬護靈輿往安吉竁屬陽和之紀月銜哀疚以在塗特有寵頒用昭眷禮今差使臣沿路賜茶藥具如别録至可領也賜感德軍節度使同知大宗正事兼西路祔葬敦睦宗室宗景以下茶藥詔敇宗景以下喪期先逺祔禮告成時屬暄和眷惟勤勩特加珍錫用示渥恩今差使臣沿路各賜卿等茶藥具如别録至可領也賜西路祔葬皇親監護葬使左朝散大夫守太常少卿盛陶以下并祔葬魏王鄧國蔡國長公主管勾等使臣茶藥并沿路傳宣撫問敇書敇盛陶以下肅駕使轓躬臨原兆涉塗良苦庀事尤勤宜推勞賜之恩用示眷存之意今差使臣沿路賜汝臘面茶五斤縳子茶五斤藥物一銀合合重二十兩內祔葬鄧國蔡國長公主允弼新婦等管勾列端張禹稱竇鐸修墳宋良臣諸司張祜各賜臘面茶二斤縳子茶二斤藥物一銀合合重一十兩沿路香火張師逸李綬并袝葬故魏王沿路香火續燾各賜臘面茶一斤縳子茶一斤藥物一銀合合重五兩至可領也賜西路祔葬皇親敦睦宗室感德軍節度使同判大宗正事宗景以下并監護葬使左朝散大夫太常少卿盛陶以下茶藥口宣有敇卿汝等爰協吉期克襄大事陽和在候夙夜良勤宜有匪頒以為慰勞今差入內內侍省內西頭供奉官劉友端賜卿汝等茶藥兼傳宣撫問想宜知悉虞主回京雙調四曲導引一曲思齊文母盛德對皇天演寶祚千年卿雲復旦治功全厭人世登仙龍輿忽掩三川綵仗屬車旋維清象舞告英宣入詩頌歌絃六州一曲太平功擁佑帝堯聰歌九德偃五戎寰海被祥風車書萬里丈軌同自南北西東耕田鑿井戲垂髫華髮躋仁壽域變時雍大明方天中棄養東朝苦匆匆玉座如存永隔慈容恨難窮崇慶空颷輪仙馭無蹤超宇宙駕雲龍禕翟掩軒宫柏城王氣長鬱葱溫洛照寒嵩光靈在上徽音流千古昭如日月麗層穹太任家邦隆彤史青編永垂鴻清廟笙鏞奏假欽崇十二時一曲轉招搖厚陵回望雙闕起岧嶤曉日麗譙金爵上干霄風雨闋夜宫閉不重朝奉鸞鑣漸遙玉京知何處飛英銜恤亂絮纒悲春路迢迢縹眇哀音發龍笳鳯簫光景同慘淡度巖邑指河橋馬蕭蕭絡繹皇軺拂天容衛江海上寒潮萬國魂銷追昔御東朝開鈿扇垂珠箔侍璫貂寶香燒散飄手開仁燾域神孫髙拱崑崙渤澥玉燭方調一旦宫車晚旋歸泬寥九載初如夢次功得瓊瑤虞神歌一曲駕玉龍設初虞祭終前旌舉天回洛水路轉嵩峯瞻寥廓煙霏沖融杳無蹤震地鼓吹悲雄誰何羽衛重拂雲旗幟眩青紅來漸來清塵灑道修職百神恭回首蒼茫霧雨吹風掩泉宫闕寰畿入山川改容鼓鐘臨近次千官望拜涕淚衡從人如堵晨光葱朧闕穹隆馳道禁水相通當年逰幸空皇儀事畢泣重瞳哀未窮巍巍餘烈輝映簡編中億萬斯年覆載同功虞主祔廟日中吕導引一曲延和幄座臨御九年中往事已成空皇基固覆盂四海本自太任功九虞初畢下西宫廟祏與天崇周家盛卜年卜世萬祀永無窮撫問鄜延路臣寮口宣卿汝等夙以材能並膺選寄外勤邊要久效官成式厚眷存俾加勞問今差入內內侍省內東頭供奉官陳嘉言傳宣撫問想宜知悉賜新除寶文閣直學士知成都府韓宗道辭免不允詔朕惟全蜀之寄實難其人卿以才猷歷位省府矧乃祖叔父世守西南卿在先朝亦嘗奉使于兹三世出牧一方必能宣布中和惠綏逺俗則朕無西顧之慮豈不休哉褒加寵名厥惟常典其趣祇命無或固辭所請宜不允賜資政殿學士守吏部尚書胡宗愈辭免兼侍讀不允詔朕邇英訪道十年于兹方當博延儒臣總覽載籍卿純誠懿學直諒有餘進讀于前渴聞嘉論勉膺新命無或重辭所請宜不允徐王改封冀王制周尊公旦倚為四輔之師漢重王蒼位處三公之上及我仁祖加禮荆王顧惟冲人敢後叔父誕敷明命播告治廷皇叔永興鳯翔等軍節度管內觀察處置等使守太尉開府儀同三司雍州牧兼鳯翔牧上柱國徐王食邑一萬四千五百户食實封四千九百户賜詔書不名皓禀訓英皇同氣神考仁義根於天性孝友冠於人倫昔在先朝蚤膺異數逮宣后九年之政無愛子一豪之私追惟崇慶之功罔極昊天之報方畢太宫之祔饗莫先尊屬之褒嘉是用登拜師垣仍聫使節徹彼徐土受闕冀方內奬皇家外綏侯服進陪多賦衍食真封於戲並建親賢實為社稷之衛益强藩屏用承祖考之休往膺典冊之光永介壽祺之祉式昭令德無愧前人可特授守太師依前開府儀同三司雍州牧兼鳯翔牧賜詔書不名充永興鳯翔等軍節度管內觀察處置等使改封冀王加食邑實封賜新除守太師冀王劄子奏辭免不允詔敕冀王省所劄子奏辭免恩命事具悉朕永懷先后圖報無窮地近屬尊莫如叔父宜有異數以先列藩遽攬奏封力形謙避雖深嘉嘆難徇懇誠所請宜不允賜冀王再上劄子辭免不允詔朕以上公錫命莫若帝師之尊北土啓封莫如冀國之大非豫叔父孰冠宗藩其勉欽承勿庸遜避所請宜不允閣門賜冀王告口宣卿親賢莫二屏翰所尊進秩帝師改封王國其承寵典以副眷懷今賜卿告想宜知悉賜冀王三上劄子奏辭免不允詔卿秉德謙沖神明所相為善最樂宜得仁者之壽損疾有喜當聞勿藥之瘳褒崇懿親兹率舊典朕命不易其可以辭所請宜不允賜安武軍節度使河東經略安撫使兼知太原府韓縝再上表并劄子奏陳乞致仕不允詔卿出入將相勤勞四朝古之大夫有不得謝況於股肱之舊方膺蕃屏之寄志氣克壯卧護有餘宜深體於眷懷其無拘於禮制請宜不允賜永興鳯翔等軍官吏等示諭敕書敇永興軍官吏軍人僧道百姓等朕以皓地親叔父位冠宗盟追惟文母之深慈乃眷賢王之令德方畢升祔宜先寵褒進秩維師增榮舊鎮大啓冀土永為宋藩想聞渙號之頒益洽周邦之喜今特授皓守太師依前開府儀同三司雍州牧鳯翔牧賜詔書不名充永興鳯翔等軍節度管內觀察處置等使改封冀王加食邑七百户食實封三百户勳如故故兹示諭想宜知悉將士等各得平安好參佐官吏僧道耆壽百姓等並存問之遣書指不多及冀王皓布政榜應永興軍管內官吏軍人僧道百姓等兹者奉膺制命進位公師無改旌麾更分茅社奄受冀土作蕃皇家顧有列於內朝莫獲臨於賜履惟兹多政厥有故常爰咨文武之良深體聖神之寄務農重本先教後刑實倉廪以賑貧窮修戎兵以遏冦虐庶成仁壽之俗上寬宵旰之憂將校在和緇黃式化道雖云逺心不謂遐諸有尊親亦附存問改元御札朕荷皇穹之眷命守列聖之丕基十年于兹四海用人日聽外朝之治躬勤萬物之微眇若涉淵未知所濟顧念祗承上帝誕保受民惟駿惠於先猷以纘隆於下武乃稽仁祖之成憲思大文考之烈光其因盛夏之辰載新元統之號庶導迎於景貺用敷錫於羣黎宜改元祐九年為紹聖元年布告多方咸體朕意故兹札示想宜知悉坤成節教坊致語八年臣聞後天申祝已稱內殿之觴湛露示恩爰有外朝之燕使幣致北鄰之聘星躔開南極之祥㑹芾充庭慶千載濶希之遇舞童成佾奉一時交際之歡恭惟皇帝陛下膺受正符統臨神器昭哉嗣服承六聖之鴻休大矣孝熙盡三宫之至養恭惟太皇太后陛下執思齊之道御假樂之時用楫濟川始仰成於傅說斷鼇立極俄追配於媧皇天地得以清寧草木遂其零茂食既充於四釜歌亦備於九功肆及誕辰具陳樂闋童冠紫袴稍依慶善之文容寶鑑露囊盡斥開元之侈事臣猥居法部叨𨽻奉常冒瀆天聰敢獻口號口號綵仗含風縹眇間神孫當寧燕千官太隂入夢祥初發中嶽聞呼老更難諸夏豐年生詔令兩儀和氣入吹彈下臣拜獻坤成樂長奉千秋萬嵗歡勾合曲賔筵初秩觴行露酎之醇樂節克諧技奏鈞天之妙雲龍在望魚藻恃時上奉宸歡教坊合曲勾小兒隊御香成蓋宫漏穿花霓裳羽衣方聽妙音之舉瑶環瑜珥忽逄稚子之逰申以宫商教坊小兒入隊隊名浴沂童子詠獻壽老人星問小兒悸帶並趨抗霓旌而布武髧髦相顧應畫鼓以分行宜露悃誠雍容敷奏小兒致語臣聞南北通觀必有豆觴之盛君臣飾喜亦資磬管之和矧千秋載誕之期當萬寶惟成之始所以命大師而奏雅延百辟以釃醇恭惟皇帝陛下至道生知英能天縱日御金華而講藝間臨璧水以崇儒奠玉郊丘獲神祇之昭答薦祧祖廟䝉祖考之歆安逰幸闕然㑹朝勤止辰不動而星拱天何言而物生遂追釗誦之隆皆自姜任之訓乃修故事以樂嘉時臣等猥以弱齡值兹華旦躬緣薄技旅進廣除未敢自專伏候進止勾雜劇慶均天壤可無燕衎之私樂備古今斯有俳優之戲仰祈天笑雜劇來歟放小兒隊音容秀整被服鮮華干羽初陳來謁舜階之下風雲既闋却歸沛邑之中再拜天墀相將好去勾女童隊寶階三道取化國於逡巡力士五丁獻仙山於咫尺中有驂鸞之侣來呈舞鳯之工鐘律方諧兩軍女童入隊隊名九重開舞地一氣結歌雲問女童翩若鵷鸞來自風塵之表璀然珠玉隨生謦咳之間詞令必多雍容敷奏女童致語妾聞昔嵗誕彌浴致九龍之瑞兹辰飲御舞騰百馬之豪蓋以下伸臣子歸報之心上奉祖宗舉行之事藹頌聲而並作鬱協氣以橫流恭惟皇帝陛下育德淵微收功敏妙殆致邦刑之措數膺年穀之穰露效甘滋近在禁嚴之地蠶呈異繭自成組織之文至於三韓獻金匱之書五嶺貢炎洲之布貺符既至氛沴自銷比置酒於未央實廣恩於長信妾等家居京甸籍占梨園間雅奏之發揚謹成班列瞻睟容之懌穆願奉歡愈未敢自專伏候進止勾雜劇仰瞻魏闕橫佳氣之鬱葱申命優臣示湛恩之汪濊少停舞袂雜劇來歟放女童隊綴行孌娩步節虛徐璧月瓊枝暫相輝於宫闕朝雲暮雨盍各返於山川再拜天階相將好去范太史集卷三十三

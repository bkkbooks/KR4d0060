body:
  text: 范太史集卷三十五宋范祖禹撰賦寅畏以饗福賦祇畏天道能饗隆福御試天道昭顯聖心肅祇欲興隆而饗福乃寅畏以承時深慎清衷以上當於帝眷誕膺純祉能永固於邦基若夫究精祲之所由勤夙宵而當畏何修而臻治道何飾而致休氣唯天為大每懷懼而敢寧唯聖為能宜擁祥而不既欽若元后簡於上天日月星辰有順而有盩風雨寒暑或應而或愆是必建大中而茂對圖至治以周旋動以至誠仰德威而自懼介之純嘏享宗祉以長延則知萬幾非逸豫而為四海在憂勤而保宜軫慮於當極以延禧於有昊惕焉若厲惟應以實而不以文善則降祥蓋親有德而饗有道豈不以助順者惟天之理降福者乃人之能無其畏則心或怠有其畏則德乃興五事交修惴如臨於淵谷萬靈來助固若保於岡陵噫位豈不尊志非自廣災常懼於未至福乃來於無象所以文王小心而事帝多祉常懷髙宗見異以飭身百年常饗若然則寶命增永蘿圖浸隆謹天戒以當國延帝休而在躬用能薦享郊丘答純禧之所自躋民壽域傳徽號於無窮大哉建功所以永年宜人所以受祿應如律吕之動報逾影響之速夫知天之仁愛人君寅畏者饗其福天子龍袞賦天子龍衮文以為貴錫慶院試德至尊者其服稱禮甚盛者唯君全作龍袞以昭物表聖人之御天繪以文章既盡飾身之美闕其變化斯為取象之先稽若禮經富哉天子內之尊也必有以副其外表之著也蓋有以彰其裏乃衣龍章以昭德美始惟制法考古象而逺觀終乃修容飭帝躬而光被若夫祭以嚴備服而示恭采交華於五色衣炳象於羣龍助國體之輝赫壯天威之肅雍有降有升固異三公之服或飛或躍蓋尊萬乘之容觀其驤首君躬存身帝衮若翔雲之初矯如在天而益逺珮玉焉以節其行步冕旒焉以增其赫烜絢采章之十二其制昭昭賁儀禮之三千厥容宛宛豈不以至廣大者函夏極崇髙者聖君不尊不顯何以一於衆不美不飾何以大其勳是必以多為貴有放而文下視華蟲豈攀鱗之可及旁開繡黼疑奮翼以相分上不可以降而卑下不可以僣而擬四靈之瑞唯王者之應六衣之用唯人君而已宜乎尊衮冕以陳之案禮圖而得以是故舜帝明而作服制所由興周人取以登山文為之始則知大而化者聖之謂化而神者龍之為服之身而益顯稱其德以攸宜彼交以為旗間日星而並麗章而作韍配山火以猶卑又曷若服以昭明文惟經緯矯如奔翥之狀蔚若騰陵之氣故曰衣者身之章其斯以知天子之貴論成敗之機在察言論御試天下之事已成而後知其是已敗而後知其非此衆人之智也聖人觀成敗於未然之前而知成敗於已然之後不慮之於行事之始而慮之於聽言之時以為凡事之機出於此也天下非一日而成亦非一日而敗也故古人有一言可以興邦而亦可以廢者雖其言未必如是然而興廢之所由也今夫有以仁義之言說於人主而人主知其所謂仁義而行之則凡事莫不成於仁義然而仁義必久而效不可一日而成也知其不可一日而成而遂不行則天下之事亦不成也惟能久而行至於成則是由於察言之善也今夫有以佞邪之言說於人主而人主不察於佞邪之言而從之則凡事莫不敗於佞邪然而佞邪必久而效亦非一日而敗也知其非一日而敗而試為之則天下之事終亦必敗則是由於察言之不善也然而成敗之效不可不察也昔舜之時天下可謂大治矣然而君都臣俞其相戒則曰罔遊于逸罔淫于樂又曰無怠無荒夫舜固無逸樂怠荒之事也然而必以為戒者防其所由也舜不以其言為過而從之是以無逸樂怠荒之事而所以成也堯之時咨天下之可登庸者放齊曰朱也可堯曰吁嚚訟可乎夫堯之心欲求天下之聖賢而付之以天下之事而放齊以朋比舉朱堯不以其言為是而卒不用故終無敗事向使從其一言之舉而用則天下之事幾何而不敗哉是以書稱堯曰聰明文思而稱舜曰濬哲文明以能察成敗於未然也然而言有似是而非者則人主何以知之曰唯至正能辨天下之邪唯至靜能制天下之動聖人必先深其思慮廣其聰明虗巳以來直言考古以鑒成敗是以言之一入乎耳而事之利害計之得失昭然已在其前獨觀萬化之原而修之廟堂之上豈待於巳然之後乃為慮哉然則成敗之機在察言信矣中庸論五首聖人之道必始於小而後至於大必始於微而後至於顯其始也入乎毫末而不足以為小其至也塞乎天地而不足以為大此道之所以難言也中庸者聖人言性之書也出於孔子而傳於子思其為言也精微其為道也閎深嘗試言之記曰君子戒慎乎其所不睹恐懼乎其所不聞君子之道盡於此而巳乎是不然君子於其不睹不聞之間出處語默無愧乎吾心然後於其可睹可聞之間動靜周旋無愧乎天下故君子之道必始於慎其獨也人之不睹也如其欲睹之也人之不聞也如其欲聞之也此非有所難雖匹夫匹婦而可知也始於修身而終於治人至於治天下國家可以育萬物而配天地則雖聖人有所不知也故曰君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人有所不知焉夫婦之不肖可以能行焉及其至也雖聖人有所不能焉又曰君子之道造端乎夫婦及其至也察乎天地此所謂始於小而後至於大始於微而後至於顯也天下之所甚易莫若衆人之所能者也其所甚難莫若聖人之所不能者也以衆人之所能而教人是使易之而不勉也以聖人之所不能而教人是使難之而不為也聖人既曰難行之又曰易行之既曰易知之又曰難知之易者所以喻於人難者所以喻於巳蓋誘於人者不可以不易責於巳者不可以不難也始於易終於難而不可以過乎中是故謂之中庸開之以易使天下可得而入也嚴之以難使天下不得而輕也制之以中使天下不得而過也夫中庸有衆人之所易行者焉有聖人之所難行者焉有聖人與衆人之所同行者焉子曰人皆曰豫智驅而納諸罟獲陷阱之中而莫之知辟也人皆曰豫智擇乎中庸而不能期月守也言中庸之易而人不守也天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也言中庸之難而人鮮能也道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也言中庸之不可過中也口之於味也酸鹹甘苦有偏好其一者是不知味之人焉唯其五味均齊而得其節然後適於口而和於心君子之於道也亦然不可以過亦不可以不及故曰人莫不飲食也鮮能知味也中庸之大略也中庸者言性之書也既舉其略矣而未及乎性也夫誠者聖人之性也誠之者賢人之性也聖人生而知之者故其性自內而出自內而出者得之天而不恃乎人賢人學而知之者也故其性自外而入自外而入者得之人而後至於天故曰誠者天之道誠之者人之道也又曰自誠明謂之性自明誠謂之教誠者所以成性也明者所以求誠也誠者不勉而中不思而得從容中道者聖人之性也誠之者擇善而固執之者賢人之明也目之視乎色耳之聽乎聲鼻之别乎臭口之識乎味此四者有諸內而無待於外聖人之性猶此也譽之則勸非之則沮順之則喜逆之則怒此四者動乎外而應之於內賢人之性猶此也聖人先得於誠而有明者也賢人先得於眀而後至誠者也夫中庸所以使賢者學為聖人也故欲誠者莫若眀用眀者莫若知夫所謂知者何也致其知也故曰致知在格物又曰物格知至物至而後有知也知然後好惡形焉有知而後有好惡也君子則好善而惡惡小人則好惡而惡善此君子小人之所以分也夫眀者有善未嘗不知焉有不善未嘗不知焉擇其善者而執之其不善者而拂之昭昭乎知所以為善知所以為不善此所謂眀也此謂致知也是知之至也知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平此大學之道賢人所以學而成聖者也子曰回之為人也擇乎中庸得一善則拳拳服膺又曰有不善未嘗不知知之未嘗復行夫顔子豈無不善哉惟能知而不行也故曰欲誠者莫若眀用眀者莫若知致知者是所以學為聖人之端也聖人之治天下未嘗不以誠也誠者存乎其心不可得而見之故其說曰惟天下之至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣夫性者何也仁義是也聖人以為仁義者生於吾之性而不生於外是故用之以誠仁焉而必出於誠義焉而必出於誠不誠於仁則人不親不誠於義則事不成誠仁者不施而親誠義者不為而成誠在內者形於外是所以貴誠也是故不賞而人勸不怒而人威不動而人化不言而人喻此所謂盡其性也是故為人子者誠於孝為人臣者誠於忠為人弟者誠於恭舉天下之性莫不誠於為善此所謂盡人之性也是故天地為之誠化日月為之誠明四時為之誠行風雨為之誠節草木為之茂鳥獸為之蕃凡在天地之間者莫不安其性命此所謂與天地參也聖人有其德有其時有其位而行其道堯舜禹湯文武周公是也有其德無其時無其位而言其道孔子是也是故欲觀賢人之道聖人是也欲觀聖人之道天地是也天不言而四時行焉地不動而萬物生焉天地所以不言而人喻不動而物成者何也誠之至也聖人所以無為而天下治亦誠之至也故天者髙之積也地者厚之積也聖人者誠之積也天積於髙及其逺則人不能知也地積於厚及其廣則人不能窮也聖人積於誠及其神則人不能測也髙不積不足以為天厚不積不足以為地誠不積不足以為聖人聖人者明並乎日月德配乎天地惟積於誠也聖人之德既與天地參然而孜孜焉常有不巳之心記曰不勉而中不思而得從容中道此聖人之性也其行之也蓋未嘗不勉不思而終身以為不足夫聖人之所不可及者其在此乎昔者堯舜之為君思天下有一夫不獲其所則其心恥之有一物不得其養則其心憂之夫恥之憂之者何也恐其德之有所不至也聖人之德固無所不至矣然而常以不至為心故仁矣而曰未足以為仁義矣而曰未足以為義是以有一物不被其澤者聖人之恥也其責已也如此其待人也則不然夫人或生而知之或學而知之或困而知之此三者之異衆人之所知也聖人必曰及其知之一也或安而行之或利而行之或勉强而行之此三者之異亦衆人之所知也聖人必曰及其成功一也此所以引天下之不肖者而為賢也生而知者不可以人人而求也有學而能知者焉有困而能知者焉則與夫不學者異矣是故進而一之於聖使天下皆曰困而知者亦可以為聖而聖亦與我同類如此則孰不欲知聖人之道此所以為教也安而行者亦不可以人人而求也有利而能行者焉有勉强而能行者焉則與夫不能勉强者有間矣是故進而一之於聖使天下皆曰勉强而行者亦可以為聖而聖亦與我同類如此則孰不欲行聖人之道此所以為教也聖人所以待人者如此而其責巳者未嘗不重也子曰何事於仁必也聖乎堯舜其猶病諸又曰舜好問而好察邇言隱惡而揚善執其兩端用其中於民夫其仁足以博施濟衆而猶以為病此其所以責已也好問而好察邇言隱惡而揚善此其所以待人也夫其責巳也則為善而不足其待人也則恐其不得為君子二者皆出於其性推之以治天下聖人之道未嘗有過於此者也夫子亦何為哉知所以責巳知所以待人則雖欲為堯舜而無難也聖人不以已能而責天下之人故擇其近於中庸者而行之曰忠恕忠恕者所以為中庸也何謂忠曰推巳之心之謂忠何謂恕曰如巳之心之謂恕夫聖人者天下一人而已矣衆人之所不能為也以聖人之所能而責衆人是率天下而為一人之行也記曰聖人之制行也不以已使民有所勸勉愧恥以行其言故不為人之所不能不行人之所不及動則思天下之可法言則思天下之可道要以使人皆可以為善此所謂忠也巳所不欲勿施於人人常欲為君子而不欲為小人此天下之情也以巳欲為君子之心而使人皆得為君子以已不欲為小人之心而使人皆不為小人此所謂恕也仁義禮智四端之用未有不由於忠恕之道而可行也仁者過乎仁聖人不以為能也義者過乎義聖人不以為行也禮者過乎禮聖人不以為教也智者過乎智聖人不以為法也仁義禮智非獨以善一人也必使天下皆可以行之不惟使天下皆可以行之又將使後之人皆可以繼之如是而後可以為中庸之道此所以貴乎忠恕也故曰忠恕違道不逺而曾子曰夫子之道忠恕蓋堯舜三王之治天下與夫孔子六經之道莫不由於忠恕也若夫以己能而責天下之人此老莊所以肆其放蕩虛空之論而不能自反也聖人者為天下而言者也故巳可用而人亦可行老莊者為一人而言者也故巳獨可言而人不可用是欲以一人之私論而率天下以行之也其意曰治身者曷不為我之等貴賤齊生死治天下者曷不為太古之為無為事無事是以言之而不可行也聖人之言其自為也過少而為人也過多老莊之言其自為也過多而為人也過少此其所以異也老莊之說如此而好之者或以為治性之書是不然夫治性者莫如中庸而亂性者莫如老莊故學中庸以治其性則性可得而見也學老莊以亂其性則性不可得而反也惟不惑乎老莊之言則可與由中庸以入於堯舜之道也策問省試策問二首問古之士與君言言使臣與人臣言言事君與幼者言言孝悌與居官者言言忠信自童子以至於成人自灑掃應對以入於道德學不凌節教不躐等有非其所問而問者鄉先生君子不以告也譬如拱把之桐梓長之養之至於成材無不適於用如其未至而曰至未能而曰能則是賊夫人之子非先王長育之意也蓋孔子之教曰文行忠信興于詩立于禮成于樂孟子曰謹庠序之教申之以孝悌之義其所教者皆以眀人倫也以孔子之聖四十而始不惑五十而知天命雖曰知之猶罕言之性與天道自子貢不得而聞况其下者乎近世學士大夫自信至篤自處甚髙或未從師友而言天人之際未多識前言往行而窮性命之理其弊浮虛而無實鍥薄而不敦雖然十室之邑必有忠信天下之大豈無豪傑不待文王而興者然聖人之教必為中人設也比年以來朝廷患之詔禁申韓莊列之學流風寖息而猶未絶夫申韓本於老而李斯出於荀卿學者失其淵源承其末流將無所不至故秦之治文具而無惻隱之實晋之俗浮華而無禮法之防天下靡然卒至大亂此學者之罪不可以不戒也子大夫以文行舉於鄉羣至於有司且登進於朝廷風俗之媺惡政事之得失將於此乎在必有中正之論以救斯弊其悉陳之問二帝三王之道亦惟仁義而已矣孔子傳之詩書所述為萬世法其要不過曰稽古法天修身親親舉賢而用之其言甚易知則宜其事甚易行然自三代以還後世之治終莫能及焉由漢至於有唐其間明君賢臣為不少矣其治曾不得庶幾於古何耶豈其學者論卑而不足以有明歟抑其時君不能勉而行之歟昔孟子非堯舜之道不敢陳於王前與王言未嘗不以王道如其不可行豈徒為空言哉以區區之齊五十里之滕孟子猶欲勉之以王况不為齊滕者乎夫道之不明也學者不講之過也既明矣而不行者在上者之過也古之學者講而明之所以待在上者舉而行之四代養士於學校蓋以此也子大夫學於此久矣其茂眀之范太史集卷三十五

body:
  text: 范太史集卷三十七宋范祖禹撰青詞代文潞公交歲設醮青詞伏以上天敷佑雖髙而聽卑大道無為至虛而善應惟誠可逹有感必通適臨交歲之期欽奉祈祥之典輒申精懇仰叩上真伏念臣幸以微生獲逢嘉運入登上宰出涖齊壇久塵三事之榮復玷上公之秩寵祿已踰於涯分勤勞無補於涓埃矧加告老之年未遂遺榮之志懼害盈之有咎恐非據之生災每夙夜之自思若氷淵之俯蹈敢忘齊祓祇事薰修伏望玉闕宸君璿穹真聖特回靈眷俯徇愚誠永綏耆艾之躬申錫康寧之祉一門之內均慶善以䝉休四序之間常安和而迪吉又伏以元皇布氣羣物流形太昊司春四時更始凡居覆載皆荷亨嘉適臨交歲之辰敢用祈祥之典輒殫精懇仰叩上真伏念臣幸禀微生夙蒙休運被三朝之眷遇塵上衮之尊榮曾無補於明時顧久尸於厚祿頽光將迫告老未從恐貽非據之災自取疾顛之咎是以䖍依道妙祗按仙儀伏望金闕宸君璇穹衆聖曲垂昭鑒大降鴻私保兹衰晚之齡錫以康寧之福冀終身之佚樂壽考維祺俾闔宇之靖安子孫逢吉仰髙明之臨下期志願之弗違祭告文河南府祭太皇太后文維年月日具官臣某敢昭告於大行太皇太后臣聞坤厚之德所以配乾元關雎之風所以始王化自昔三代之盛暨於兩漢之興皆繄內助之賢以啓後人之慶恭惟睿德光越前聞篤生王家進儷宸極輔佐仁祖表正宫闈保佑英皇統臨天㝢勉徇聽朝之請旋申復辟之文仁覆萬方功流億祀懷生之品被澤無窮皇帝出震乘乾自家刑國問安內寢侍膳東朝極四海之尊榮盡兩宫之孝養而穹旻降禍軒曜淪輝颷駕上賔日御遄闕山陵備禮儀衛啓行臣分職留都奉嚴復土駿奔道路祇率典司敢薦薄儀用伸微懇謹具牲酒之奠瞻望靈駕臣無任攀號殞越之至伏惟尚饗百官祭文恭惟聖宋受命祖宗垂統重熙纍洽與天無極實賴內有淑德之助輯寧家邦伏惟太皇太后誕生勳族陟配仁祖母儀萬國表正六宫翊奉英宗越升明兩遭家多難稱制從宜罔踐外朝亟復明辟逮夫皇帝嗣膺寶厯尊奉祖闈率四海之歡心極兩宫之孝養宜錫丕祉壽如岡陵奄違聖日闕哀纒宸極痛結海內今山陵備禮容衛届涂臣等服在具寮留司洛邑駿奔夙夜不遑啓處敢薦薄禮用昭精誠伏惟尚饗提轉祭文昔者虞美皇英罔顯詒謀之慶周稱任姒不聞戡難之功厯觀載籍之所傳未有擅名之能備恭惟太皇太后自家鍾慶惟聖定祥體柔明而配天本靜專以法地若其教風之所成就德業之所維持子孫繼聖以相承社稷再安於獨運儀刑天下表正人倫享至養於兩宫視太平者四紀宸闈淵默宜受祜於無窮仙駕徊翔俄御風而莫返人神懷痛夷夏遏音將祔因山之安爰臨同軌之㑹臣等任聫部按職預駿奔覩容衛以增哀奉牲牢而述事伏惟尚饗河南府祭濮王夫人文維年月日具官某謹致祭於濮安懿王夫人惟靈生自茂族克配賢王柔範令儀四德式備輔佐君子有夙夜之勤嚴事先祖有齊潔之志奉采蘩之職成鵲巢之風子孫衆多福祿光大宜家之義流慶無疆自奄違王國日月既逺今得吉卜歸祔寢園轜車在涂爰及封境敢具薄禮靈其鑒之尚饗百官祭文風姓之後國於任城胙土命氏其源蓋逺惟靈圓精挺質方祇禀秀柔儀令範歸于王家輔佐君子祗勤夙夜嚴恭內事精一其德自先帝之世疏恩啓封奄違聖時日月悠逺既得吉卜克祔寢園轜車在涂爰及封境恭致薄奠靈其鑒之尚饗提轉祭文自昔聖賢之所由興邦家之所以御雖本身修實資內助懿厥碩人夙欽師傅惟濮定祥起家是据輯睦內外式安且譽王有蒸嘗蘋蘩是具王有嘉賓豆籩孔庶如何不淑奄先朝露嵗月其逝音徽如故背平臺以即逺遡寢園而將祔旐晚飄風松深隱霧盛禮惟稱新阡是固某等任列外臺職當陪赴祇薦薄奠惟誠之寓尚饗又濮惟大國宗室之尊宜有令德為之內助惟靈生禀慶善歸于王家輔佐君子祇勤婦職協睦宗族罔或時怨宜降年有永受福無疆而鳴玉早閟光儀杳逺播美彤管流芳舊宫嵗時既易宅兆未卜今屬盛禮從祔園次銘旌所届逺道有輝某等職在封圻敢薦薄奠尚饗祭叔母宇文氏文維元豐七年嵗次甲子正月辛丑朔二十日姪左奉議郎同編修資治通鑑某謹備時羞清酌之奠致祭於縣君叔母宇文氏之靈有唐之季中原荼毒宇文及范自秦徙蜀厯世昏姻著于邦族惟我叔母我之自出王姑之子先祖之孫歸我叔父嫓德賢明為婦孝恭為母慈愛子孫既多福祿未艾宜享眉壽始盛終全如何不弔遽奪其年嗚呼昔我先妣實維冢婦同事舅姑惟存叔母今也則亡靡瞻靡顧羇孤之感每懷其故宿官於洛久去庭宇屬纊踰時乃始聞訃殯不哭帷葬不走墓哀恫未怠日月如騖寓奠祥薦寫其衷素尚饗祭司馬文正公文維元祐元年歲次柔兆攝提格九月丙辰朔二十五日庚辰門生具官范某謹以深衣肴酌之奠敬祭於太師溫國公之靈嗚呼賢哲之生得天粹精伊尹之任伯夷之清惟公兼之以集厥成孝悌之性感於神明立於朝廷乃見大節莫堅金石莫明日月金鑠石毁日昃月闕公之忠誠確不可奪山有時而裂谷有時而竭玉有時而折斧有時而缺公之義烈直不可屈是故三公之位不能貴萬鍾之祿不能富公貴以德公富以義公所自有非由外致天下之士聞公之風貪者廉懦者有立志其流波之所激餘風之所被千世之下猶將興起充塞天地外格夷狄無有逺邇愛戴如一三尺之童服公忠實跂行喙息被公德澤進以天下退以天下凡民休戚繫公用舍爰立作相六合鼓舞如熱得濯如飢得哺曰明明天子聖后惟母子育我黎民卑兹哲輔盡瘁憂勤不知有身終食之間不忘愛君假寐之頃亦常在民遑恤其病以至於殁孰有如公以身殉國某自為布衣辱公之知教誨成就義兼父師昔聞於公生欲不欺死欲不愧奉以周旋其敢失墜從公在洛十有三年忝命還都公入陶甄謂别復合如形影然公今喪歸乃始長乖流慟何及終天永懷昔者子貢築室於場嗟今不能撫已隕傷薄奠矢辭公乎不亡尚饗又祭文正公文元祐二年正月闕日門生范某敬以清酌時羞之奠祭於太師溫國文正公惟公靜也嶽立動也川騖宅道之奧操治之具舉而措之事不愆素朞年而定忽失其據二聖軫悼萬民思慕愈久愈深惟誠之著峴首墮淚蜀人野祭方之今日曽未足紀某蚤以諸生辱公之知從公半世以及長辭日月其逝宅兆已卜義當奔走千里赴哭官守有常又義不得公之風烈在於天下一話一言為法來者有狀有銘有贈有諡顧惟小子復何述矣猶當執筆傳公行事詳記實書以待良史寓奠告公鑒此精意尚饗為范相祭鮮于修撰文嗚呼子駿居今之世志古之道白首好學耽玩易老見於事業發為文章治民則惠執義則强柔亦不茹剛亦不吐邪則吾仇正則吾與余昔使蜀封部實鄰聞其風聲愛慕其人同分西臺晚益相親茂林修竹美景良辰杯盤草具笑語天真通家之好往事空陳年將從心乃補衮職拳拳朴忠侃侃正色病不克施終古遺直告滿三月退卧淮陽凶訃遽來我心隕傷歸於其邱實邇吾鄉涕灑秋風酹此一觴尚饗祭韓獻肅公文維元祐三年六月十日具位范某謹以清酌時羞之奠致祭於太傅康國獻肅公之靈某登公之門幾三十載將老書局遇公洛川公言於朝為之引重雖大鈞之宰不責報於一物而知已之賜敢自同於衆人今公永歸不預祖奠感念疇昔實疚於懷敬薦菲薄將其誠意尚饗祭吕正獻公文維元祐四年嵗次已巳二月壬寅朔二十六日丁卯壻修實録檢討官承議郎祕書省著作郎兼侍講上騎都尉賜緋魚袋范某謹以清酌庶羞之奠恭祭於太師申公丈人之靈嗚呼去聖已逺道學不明中庸至德民鮮能久過與不及其失之均惟公體被中和性涵純粹天降大任先覺斯民真宰不言化育萬物巨浸無際并包百川從容廟堂不見聲色虛一而靜漠然無心二聖恭已四方奠枕非夫深造自得尚友淵騫謨明弼諧思齊稷契何以居今之世如見古人極深研幾宅道之妙經濟之用乃其緒餘公今云亡梁木實壞邦國殄瘁何痛如之某辱知於公實自早歲取其迂拙遂齒昏姻知已義重踰於親愛儀刑師表靡所瞻依追惟訓言流慟何已敬致薄奠惟公鑒之尚饗又祭正獻公文維元祐四年五月庚午朔十四日癸未壻具位某謹以清酌時羞之奠恭祭於太師申國正獻公嗚呼自公之殁才厯旬時邦家失其蓍蔡善人喪其宗主緬懷風烈猶有典刑二聖追思衆賢景慕尚式周公之訓共守蕭相之規庶幾有成永底于治日月逾逺宅兆卜期某官守有常義不得往西望引領為天下慟寓此薄奠惟公鑒之尚饗奠申國夫人文維元祐四年歲次已巳五月庚午朔十四日癸未壻具位某謹以素饌清茶之奠昭告於申國夫人恭惟天生淑德作配大賢教成於家助及於國而探賾道妙超出物表死生之際不纍其心通儒哲士未能及此某昔受室於潁得拜夫人退居洛陽實同淡泊音容杳逺十有七年今從申公永宅𤣥壤不克躬奠慘結於懷寓此薄禮展其精意尚饗祭蜀公文嗚呼昔先考大夫與公親雖父子義實朋友並遊太學同年登科某自為兒童居公膝下撫育教誨均於所生不幸早孤公實哀念及夫既冠再至京師猥以藝文隨例求舉公一見稱奬延譽於公卿之間從仕以來教之忠義屏居洛邑十有三年公每肩輿凡五六至奉侍几杖嘗聞訓言惟公實為門內知已前年承事傾喪惟公是憂上恩賜告省公于許齎詔勞問簡于聖心豈期踰年公遽薨殞平昔誨語跬步敢忘追惟慈顔邈不復覩今復䝉恩豫告奔赴葬期奠此一觴心焉如割嗚呼哀哉尚饗祭從叔承事文嗚呼叔之文章其取科第如俯拾芥而仕不登于館閣叔之才能其處繁劇如新發硎而任不至于公卿天惟豫之聰明而不畀之壽考平生所有百未一施某與叔相從實自幼少日來月往凡四十年譬如期松柏於九霄望驊騮以千里中道而止命也奈何嗚呼叔之隕喪忠文八十上恩豫告來省來哭今也不幸忠文大故復䝉賜告送喪即路一慟而訣薦此薄具尚饗祭從叔主簿文某至和之初越來京師叔在襁褓茂質日舒嘉祐之末再來赴舉叔始總角從師受書風姿粹美如玉之瑜熙寧元豐侍行入洛文章論議煒煜卓犖如蘭之茁以至馥郁如麟之育以見頭角如何不淑早世隕落三十年間如夢一昔嗚呼親則叔尊年則姪老誰謂中年反哭妙少人生一世孰為永久譬如共行一塗至有先後其間修短竟亦何有惟其不亡是謂不朽尚饗祭從叔母靳氏文惟忠文公與夫人先君有場屋之舊歲寒不改重以昏姻一為布衣一仕貴顯鄉曲士論以為美談夫人以令善持家以雍和配德舅姑稱孝宗族具宜而降年不永早世隕喪音容幽翳今踰十年筮日先逺即安宅兆敬薦薄禮用伸至誠尚饗祭司馬諫議文維元祐五年歲次庚午十一月辛酉朔六日丙寅成都范某謹以清酌時羞之奠致祭於亡友公休諫議之靈嗚呼某昨與公休同講無逸今講書畢一篇之義已録上之公休進對請讀孟子今則有詔講孟子矣此二書者公休遺意也公休雖沒巳陳之說復備上覽所請之書日講帝前沒而言行其何所恨降生不永命也奈何此天下所共哀傷不獨朋友之痛也平生出處無不同之一朝暌隔葬不及送寓此薄薦孰知我悲嗚呼哀哉尚饗祭趙端明文維元祐六年歲次辛未閏八月丁巳朔日左朝散郎試給事中兼侍講充實録修撰兼國史院修撰輕車都尉賜紫金魚袋范某謹令弟䕫州司理參軍祖哲恭祭於端明殿學士贈右光祿大夫趙公之靈惟公學於先王道備文武先帝識拔曰豫方虎出入西鄙垂二十年南伐交址奏功於天西師有征罙入其阻公曰不然卒如公慮帝趣起公往固吾圉士卧於邊農遊於畝二聖倚公隱如長城季路一言獷俗不盟元祐之初公求解去我實責公追先帝遇勞于王事以死繼之炳炳公心惟天實知公之云亡朝野震驚羌使慟哭夷落失聲羊公罷市諸葛野祭昔聞其語今見其事嗚呼人之生世於何其久惟德與名可以不朽惟公知我義實執友寓此奠觴以告公柩尚饗祭從叔母文維元祐十年歲次壬申三月甲寅朔十二日乙丑具位范某謹以羊一豕一清酒香燭之奠致祭於縣君叔母程氏之靈惟靈生於相門令德淑哲作配君子逮事皇舅惟忠文公一世師表邱園退老垂二十年實賴冡婦庀其家事祭祀賔客率禮不違撫育諸孤均愛如一宜享眉壽而不永年從袝皇姑爰及逺日敬致薄奠惟靈鑒之尚饗告文正公廟文維元祐七年歲次𤣥黓涒灘二月甲寅朔二十日門人范某謹用清酒香燭䖍告於溫國文正公昔孔子作春秋絶筆三年而沒至漢而春秋始用太史公作史記既厯三世其書始行揚子雲作太𤣥後二百歲而𤣥始興古之聖賢作經著書期於後世不必親睹其行於世也子雲有言聖人愈鈍而後利衆人愈利而後鈍不其然歟資治之書凡十六代一千三百六十二年可謂逺矣厯英祖至神考二世十九年而成可謂久矣公之精力盡於此書可謂至矣元祐之初有詔刻板摹印今已奏御頒及公卿而公父子皆不及見也此書藏於帝室副在名山今又立於學官與六籍並行天下之士聞公之名則想公之風讀公之書則見公之志千載之下其猶存也古者富貴而名磨滅者不可勝紀惟立德立言可以不朽為公相者當時則用沒則已焉去不旋踵而後之人易其所為者多矣惟公沒既久而人思益深其政在朝廷以為準的其書在學者以為宗師公其可無憾矣今天子遣使以印本賜公家某與成此書故敢告終事於公之廟室惟昭鑒之尚饗告先妣文維元祐七年嵗次壬申十月庚戌朔長子翰林侍講學士左朝散郎國史院修撰兼修國史輕車都尉髙平縣開國男食邑三百户某敢昭告於先妣髙平郡太君某奉七月癸巳詔書登進講職褒贈之典逹於淵泉啓封髙平錫命在第祗服官次無由奉將天澤謹遣弟姪展禮致誠伏惟昭鑒膺兹寵渥謹告祭妹文維元祐七年歲次壬申十月庚戌朔九日戊午兄某以清酌時羞之奠祭於亡妹仙源縣君之靈慶厯戊子大江之南惟汝初生後我八年夙喪先妣汝始總角先君鍾愛懷抱鞠育兄弟不夭早皆孤苦我來京師汝侍祖母季父是依既長有歸水陸萬里從官東西惟汝德性幽閒令淑孝事舅姑睦於姻族我昔在洛汝惟兩川自我不見幾二十年免喪東來慰我顔色汝無間言以為我戚東逰吳越道喪其子憂結於中繼之以死嗟我兄弟白首未虧今汝先我孰知我悲惟汝之夫清介特立將護汝柩返於鄉邑念汝藁殯旅魂飄揚告别終天酹此一觴嗚呼哀哉尚饗祭從弟文維元祐七年歲次壬申闕月朔日兄某遣姪㳂致祭於亡弟五郎之靈嗚呼昔我先祖教訓諸孫早聞詩禮惟我弟昆叔父又官有才未試病厄其生半塗而逝流風餘澤宜在後人如何不淑壽止中身古之盛時兄不哭弟今也忽焉驚心隕涕死生隔濶道阻且長何以寫哀寓此奠觴嗚呼哀哉尚饗祭叔母文維元祐九年歲次甲戌閏四月辛未朔日姪翰林學士左朝奉大夫知制誥兼侍講史院修撰兼知院事兼修國史上輕車都尉賜紫金魚袋某謹以衣一襲羊一豕一清酌庶羞之奠致祭於叔母壽安縣君之靈楊氏范氏世為昏姻夫人之歸逮事祖妣配德仲父溫慈惠和垂四十年內外尊仰福祿壽考子孫衆多克昌其家以仕以學有一於此孰不願然况於兼之其可無憾某一去桑梓二紀半生繫官於朝屢上歸懇願莫之遂忽焉永違瞻望西門捫膺隕涕寓此薄奠明靈鑒之尚饗陜府謁諸廟文維元祐九年嵗次甲戌閏四月朔日具官某敢昭告於某神昔先王疆理天下陜在侯衛之服周召分主諸侯以此為中由周以來千有餘歲流風遺俗猶有存者守土之政視他郡國為難某待罪從官天子命以撫字陜人惟神有廟於此能使風雨時若稼穡豐登民無札瘥盜賊不作豈惟太守得以塞責此邦之人亦將有牲牷黍稷馨香芬苾以歌舞神惠豈不休哉尚饗謁先師文惟夫子以道為萬世師自京師至於郡縣皆有廟貌自天子至於守令皆北面祀事昔門人有言生民以來未之有也其在兹乎某受命守邦未遑寧舍謁欵廟學式遵故常不敢贊天之髙譽日之明惟潔誠以告尚饗祭文正公墓文維紹聖元年歲次戊戌七月庚子朔門人龍圖閣學士左朝奉大夫前知陜州軍府事范某謹以香幣時羞之奠昭告於太師溫國文正公道有至公德不以力衆所同然天不可易古之聖哲以衆為師衆不我祕亦不我欺匪力可致惟誠之為伯夷之清柳下之潔三尺之童莫不心悅如彼白日幽必見之又如雷霆隱必聞之惟公之名溥被四海本其一心罔有內外著之簡册發為事功加於生民澤浸無窮公初為相夷狄咸喜公沒於府海濱來祭厯考前世名德之宰三代以來蓋未之有某自昔從公十有七載今守是邦嵗月其邁入敬公里遺烈如在近望公墓不獲展拜寫誠於文薦此清酹尚饗祭資政文維紹聖元年嵗次甲戌七月庚子朔九日辛未姪龍圖閣學士左朝奉大夫提舉亳州明道宫某謹以衣一襲羊一豕一清酌庶羞之奠敬祭於留守資政六叔之靈昔在太尉是生五子先公為長公於弟季皇祐進士治平賢良直言于廷大對洋洋神宗知人登公諫府匪躬正色終以職去元豐之末擢記言動上之嗣服光華侍從乃二天官乃長禁林入輔大政同德一心士夫所望方倚以相出偃藩垣奄忽以喪某爰自幼少學於公所先公訓言視爾季父公在近班姪後叔前並侍帷幄講讀相先公入中書繼踵玉堂引嫌獲避士以為光公去政府姪忝再命公三改藩姪亦告病東洛西陜同日除書謂當參省鄰壤而居不圖凶災乃以訃來㑹喪於洛肝隕心摧惟公事業光照簡策炳若星漢終古不殁偃師新阡商亳故都卜兆云吉日月其徂祇命祠宫言趨畿邑復道洛師適及葬日往來三月痛毒於懷寫情不文維以告哀嗚呼哀哉尚饗哀詞明道先生哀詞元豐八年六月十五日卒先生為人清明端潔內直外方其學本於誠意正心以聖賢之道可以必至勇於力行不為空文其在朝廷與道行止主於忠信不崇虛名其為政視民如子慘怛教愛出於至誠建利除害所欲必得故先生所至民賴之如父母去久而思之不忘先生嘗言縣之政可逹于天下一邑者天下之式也先生以親老求為閒官居洛陽殆十年與弟伊川先生講學於家化行鄉黨家貧蔬食或不繼而事親務養其志賙贍族人必盡其力士之從學者不絶於館有不逺千里而至者先生於經不務解析為枝辭要其用在已而明於知天其教人曰非孔子之道不可學也蓋自孟子沒而中庸之學不傳後世之士不循其本而用心於末故不可與入堯舜之道先生以獨智自得去聖人千有餘歲發其關鍵直覩堂奧一天地之理盡事物之變故其貌肅而氣和志定而言厲望之可畏即之可親叩之者無窮從容以應之其出愈新真學者之師也成就人才於時為多雖久在朝廷而人常以其出處為時之通塞既除宗正丞天下日望先生入朝以為且大用及聞其亡上自公卿下至閭巷士民莫不哀之曰時之不幸也其命也夫誄文康節先生誄文維熙寧十年七月癸丑安樂先生卒洛陽士大夫皆來哭弔且歸賻門人治喪天子下詔贈先生著作郎其年十月丁酉葬於伊闕之南嗚呼哀哉乃作誄曰邵居北土命姓于燕康公之後邈矣其綿皇之家初乃遷衡漳以及先生其道大光中和之發在於明哲之性之美之才之傑不激不厲不異不同亦坦而莊亦和而恭其幽惟顯其外惟中少也志壯始强於學聖亦我同彼惟先覺直趨其奧力取其卓鶴鳴于皋鴻漸于陸厥聲載振于彼淇澳幅員之大目所未窺博覽遐觀以為吾資徜徉四方遵海而歸爰自帝邱遷宅中土考卜澗瀍周公之宇隂陽所和可以逰處初無一廛莫蔽風雨顔子陋巷原憲環堵云何不樂惟孔之苦推測天地元化之祖旁羅日月貫穿今古爰暨草木昆蟲之微細入毫末大包九圍探賾索隱極深研幾筆之於書皇極是統以充其氣以養其勇富貴不降威武不竦豈無爵位孰可致之亦有軒冕孰能榮之不雕其朴不耀其奇玉韞于山珠藏于淵豫章偃蹇蔽日參天莫得而用其材乃全昔之隱者或遇衰世遁跡山林其流以敝先生之隱其道彌昭唐虞之際於以逍遙龜龍遊沼鱗鳯在郊豈必陳力乃光於朝先生之化被於鄉黨無有逺邇聞風趨嚮來見來請各滿其望今也則亡孰為師長嗚呼哀哉死喪之威有生所畏疇昔臨之精爽不二委命待終漠然而寐惟其一心俯仰不愧明明我后有命自天錫之好爵賁于重泉庶幾來者景行其賢嗚呼哀哉先生之殁自秋徂冬不聞其聲不覩其容去此故庭就彼新宫人誰不殁名則無窮惟其令德有始有終作此哀誄播其流風嗚呼哀哉尚饗范太史集卷三十七

body:
  text: 范太史集巻三十二宋范祖禹撰翰林詞草崇慶宫為大行太皇太后正旦設水陸道塲齋文九年伏以飇馭賔天望珠𥜗而永逺星杓紀嵗驚玉厯之更新履濡露以摧心依真乘而追福崇嚴清供蠲潔至誠仰祈妙覺之慈升濟仙㳺之路謹言賜大遼賀正旦使副正月一日慰畢就驛御筵口宣卿等踐脩乆好來㑹元正已將命於外朝宜肆筵於公館昭予眷厚慰乃忠勤今差某官某賜卿等御筵兼差某官某押伴想宜知悉賜大遼賀正旦使副正月一日慰畢就驛酒果口宣卿等展幣執圭巳勤使事盈樽實篚加錫時珍用示誠懐兹為眷禮今差某官某賜卿等酒果想宜知悉正月五日賜不宴御筵口宣卿等青陽肇節華隰講儀適當撤樂之辰就錫示慈之燕勿辭既醉當體至恩今差某官某賜卿等御筵兼差某官某押伴想宜知悉正月五日賜不宴酒果口宣卿等驂騑在館不㤀啓處之勤觴豆燕賔爰有芳甘之錫式將厚意宜服渥㤙今差某官某賜卿等酒果想宜知悉六日就驛賜大遼賀正旦使副朝辭訖御筵口宣卿等來修聘事已上謁辭惟信宿之少留將旋歸而言邁宜頒燕衎用示恩勤今差某官某賜卿等御筵兼差某官某押伴想宜知悉賜朝辭訖歸驛酒果口宣卿等奉辭文陛歸整華驂豈無置醴之優宜有加籩之厚特頒芳㫖用助燕私今差某官某賜卿等酒果想宜知悉相州賜大遼賀正旦使副回程御筵口宣卿等抗旜歸路弭節近藩涉卉木之載榮念山川之云逺宜頒飲御以慰賔勞今差某官某賜卿等御筵想宜知悉瀛洲賜大遼賀正旦使副回程御筵口宣卿等聘圭復命使節闕闗眷言行役之勤用錫燕私之厚少留歸馭當醉湛恩今差某官某賜卿等御筵想宜知悉皇帝回大遼賀正旦書正月闕日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天祐皇帝闕下歳厯更端導春陽之發育鄰邦繼好馳使乘以皇華厚幣展儀信書致問永惟㪟睦苐切感悰今泰州觀察使蕭禮等回謹奉書陳謝不次謹白賜五臺山十寺僧正省奇等進奉功德疏奬諭敕書省所進奉興龍節并新正功德疏事具悉誕辰頌壽元嵗祈祥誠修禁苑之儀疏上彤廷之貢覽其勤悃良用嘆嘉今賜省奇等紫僧衣一對絹二十疋故兹奬諭想宜知悉賜知樞宻院事韓忠彦乞降黜不允詔朕聞先王作罰兄弟無相及之罪嘉彦之責卿何所疑當體至懐復于而位所請宜不允賜知樞宻院事韓忠彦待罪不允批答卿元勲之後登翊近樞厯年于兹一節匪懈嘉彦以卿同氣為國懿親戚實自貽罪無相及抗章引咎深用憮然當體眷懐勉綏厥位所請宜不允賜尚書右丞鄭雍生日詔日底營室月維孟春篤生良臣作我右輔用錫爾祉俾壽而臧今賜卿生日羊酒米麪等具如别録至可領也故蔡國長公主奉先禅院啓攅於攅堂前開啓資薦道塲齋文伏以娥皇慧質夙為降渚之㳺善逝法身普現隨方之應爰因啓窆追薦往生覬慿妙覺之慈永濟超升之路謹言故魏王拆攅祭文維元祐九年歳次甲戌正月癸酉朔十日壬午皇帝遣某官某致祭于故魏王之靈維靈英宗愛子神考友弟惟予李父敢㤀尊禮龜筮言吉菆塗告啓心焉孔疚侑以肴醴尚饗故魏王興靈前一夕夜祭文先后上賔賢王從祔祖宗之原鞏洛之路靈輴嚴駕卹典告具致此遣奠展予誠素尚饗故魏王大葬前一夕夜祭文惟靈秉德宗藩夾輔帝室自我不見于今七年從祔原陵即安宅兆逺日之夕饋奠有儀尚饗故魏王下事祭文昔周成王追念叔父俾其子孫世祀于魯在漢章帝感思東平處存人亡哀不勝情今予季父永歸窀穸奠以送之義兼古昔尚饗故鄧國蔡國長公主拆攅祭文惟靈寳婺儲精璿源毓慶降年不永卜日有期爰啓菆塗將歸宅兆侑以奠禮展予至情尚饗故鄧國蔡國長公主興靈前一夕夜祭文惟靈淑質㓜成穠華夙隕將從先后往祔西陵明發啓行奠觴以訣尚饗故鄧國蔡國長公主大葬前一夕夜祭文惟靈王姬之美未成肅雝帝妹之貴永違元吉厚陵從祔日月告期爰稽舊章是用尹祭尚饗故鄧國蔡國長公主下事祭文金粟之原神皇是宅蒼梧之野帝子所遊永閟幽宫酹觴告訣尚饗故貴妃苖氏充儀陳氏拆攅祭文爰命太史考卜吉辰乃啓菆塗即安宅兆式陳饋奠以示哀榮尚饗故貴妃苖氏充儀陳氏下事前一日祭文六月逺日惟良䘏典告備將以明發適於幽宫魂而有知歆此遣奠尚饗故貴妃苖氏充儀陳氏下事祭文七月爰備禮儀厚終襄事載寧體魄永固萬年酹此奠觴惟以妥侑尚饗崇慶殿開啓大行太皇太后發引前二日道塲齋文伏以慈顔永逺真馭不留大事請期西階啓殯仰憑覺力追奉靈㳺涓祓禁塗祇陳法㑹庶集無邊之妙善以資不測之至神謹言大行太皇太后靈駕發引皇太后日奉起居表正月十七日龍輴取道鳯翣戒行萬旅畢從百神來䕶恭惟大行太皇太后厚德載物至仁代天正座臨朝已致九年之治佳城卜兆遽臨七月之期攀慕無從哀摧罔極十八日幽宫恊吉已占龜洛之都靈駕祖行寖逺鳯城之地恭惟大行太皇太后憂勤祖業燕翼孫謀成化始基方詠周詩之雅流隂易度忍聞楚挽之悲引望光靈苐深悲隕十九日路指漢陵巳隔旌旟之望風回魏闕空聞笳吹之聲恭惟大行太皇太后德參二儀功冠千古聖如文母實隆周室之基化若華胥俄返軒臺之馭追攀何及隕涕無窮二十日金旌風轉畫翣星陳想六列之徐驅度三川而益逺恭惟大行太皇太后接統千載臨朝九年日月之照無私乾坤之功不有方專美于彤史遽上賔于白雲緬想行輿尚陳哀牘二十一日曉日深沈掩衣冠於東殿春風惨愴咽簫鼓於西畿恭惟大行太皇太后德茂塗莘功髙任姒神罔恫怨家用平康每懐勤政之憂未盡恤民之樂想安神駕惟極哀悰二十二日輼車夙駕縞駟宵征悼日月之難居望山川之易逺恭惟大行太皇太后儉追太古誠感至神瑞滿寰中俄列羽仙之馭澤流方外豈惟椒殿之悲瞻想光靈益增悲涕二十三日秘殿垂帷尚想衣紳之侍靈輿載路莫諧羽衛之陪恭惟大行太皇太后知下勤勞躋民仁壽懐巻耳之深念有比屋之可封方隆正始之基遽起送終之禮違離寖乆摧殞兼深二十四日六綍在塗正遥北闕八神陪扈將次西陵恭惟大行太皇太后天覆無私坤載至静慈容可想悲深瀍水之涯真馭莫回望極嵩峰之表尚馳哀訴莫盡孝思二十五日黼帷玉座奄棄東朝縞駟金車已臨西洛恭惟大行太皇太后作配英祖載誕神宗象耕鳥耘將祔蒼梧之野龍盤鳯翥永從金粟之原瞻望無窮悲號何極大行太皇太后靈駕至陵所未掩壙已前皇太后日奉起居表二十六日日月遄邁山川正遥緬惟車駕之行少駐寢陵之地恭惟大行太皇太后疇咨前代啓廸後人神器既安遽返賔天之御幽堂未掩猶瞻儷極之輝即逺難攀馳誠曷既二十七日挽紼駐行屬車觧馭已就因山之制將申揜隧之儀恭惟大行太皇太后德配姜任仁行堯舜始被六宫之教逺繼國風終流四表之光實增帝典尚馳誠悃少述哀悰二十八日自違祖載已即壽原雖亡道路之虞苐結几筵之戀恭惟大行太皇太后公恕統下法令合人攀號非特於六宫哀慕實同於萬國興言摧愴豈易敷陳二十九日去景易流悵金車之至止違顔已逺瞻玉座以如存恭惟大行太皇太后治國以家視民如子時臻奠枕方同萬國之歡禮就因山遽起九原之恨將臨引竁苐切摧心三十日神明所宅扈蹕固嚴倐驚晦朔之更愈結晨昏之慕恭惟大行太皇太后博施濟衆不廢困窮發政施仁必先鰥寡宜享恤民之樂遽臨復土之期緬想無窮哀號罔極二月一日桃華肇節籩鮪薦新將臨引竁之期彌切對時之感恭惟大行太皇太后仁被草木信及豚魚動植何知自遂勾萌之理音容永隔惟深哀疚之懐瞻望如疑誦言曷既二日厚陵木拱正瞻儷極之儀慈殿雲垂尚想問安之禮恭惟大行太皇太后籲俊尊帝養賢及民永隆千載之基奄棄萬方之養將臨成壙苐切摧心三日宫陵在望月律更端屬蕆事於橋山苐纒哀於彤禁恭惟大行太皇太后體坤持載並日照臨盛治難名方受宜民之福流隂易失遽臨襄事之期攀嚮無從悲摧何巳四日天序宻移春陽載淑將畢送終之禮莫申報本之誠恭惟大行太皇太后圗治憂勤檢身恭儉疎繒大練化巳被於宫闈丹旐素帷悲莫陪於陵寢興言追慕豈易名言五日諏辰恊吉復土有期正纒同軌之哀愈切中闈之慕恭惟大行太皇太后明並日月德合乾坤朝無險詖之私壽有憂勤之損永違大養罔極哀悰六日雲遶橋陵遽就因山之制星陳羽葆將臨成壙之期恭惟大行太皇太后逮事仁皇嗣音慈后増光洪業率由舊章方措世於泰寧遽興悲於先逺追攀何及隕涕無從七日宫禁纒哀巳極違顔之恨寢陵蕆事遽當掩隧之辰恭惟大行太皇太后脩已安人對時育物珠𥜗永閟與厚地以皆安蘭殿增悲悵昊天之罔極尚申省問罔喻哀恫大行太皇太后神帛回程皇太后日奉起居表本八日皇堂云揜絳闕初成屬祫事之戒期回祥車而載路恭惟宣仁聖烈太皇太后治登九載仁覆羣生龍馭上賔悼廞衣之永祕玉容如在佇黼座以來寧瞻望尚遥悲摧無喻九日大暮無晨莫展寢門之問青陽在候言瞻吉仗之回恭惟宣仁聖烈太皇太后擁佑聖孫奉答天命乾儀既判難名太極之功雨澤既施莫見還雲之跡反虞將至哀牘奚殫十日因山云畢載主以歸欽承六翟之來已次一圻之近恭惟宣仁聖烈太皇太后以思齊之德垂燕翼之謀真馭既安永隔壽原之逺慈容可想少安祕殿之嚴惟劇哀恫尚祈降鑒十一日九虞將至萬旅畢還望悠逺於漢陵瞻光華於魏闕恭惟宣仁聖烈太皇太后功流社稷德洽民人故物尚存永結中闈之慕神㳺如在將升清廟之嚴哀戀徘徊精爽飛越永厚陵下宫告遷奉安英宗皇帝并大行太皇太后御容道塲齋文伏以聖德在天攀號罔極佛乘應物㣲妙難思涓祓閟庭具嚴法㑹覬慿神貺升濟靈㳺謹言大行太皇太后陵所前一日夜祭奠祝文龜筮協從禮儀既備將以明發遷坐新宫瞻望哀號終天罔極尚饗大行太皇太后陵所遷奠祝文伏以真馭在天壽原卜宅揆此吉日適於英祖惟哀顯相敬用吉遷尚饗永厚陵上宫開啓大行太皇太后掩皇堂道塲齋文伏以金粟壽原徽音永閟玉毫光相慧力長存即蒼野之陵宫啓祇園之法㑹庶慿妙善少答慈恩升濟靈㳺頓超覺路謹言范太史集巻三十二

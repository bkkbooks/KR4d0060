body:
  text: 范太史集巻十四宋范祖禹撰奏議乞罷開樂宴劄子六月二十一日臣伏見今月一日以後羣臣累拜表請聴樂所請愈數而批答愈緩以此見太皇太后陛下皇帝陛下仁心孝性深逺無窮發於至誠有所未忍今已批答允許臣竊恐有司請置宴開樂不敢不先言之臣愚以為居䘮則行䘮禮在吉則行吉禮除䘮之後如遇吉禮即可聴樂不當特置一宴以開樂為名君子之於䘮服以為至痛之極不得已而除之若以開樂故特設宴則賜除服而慶賀非君子不得已而除之之意也臣伏請雖至七月其開樂宴亦更不作唯因事則聴樂庶合先王禮意取進止貼黄如以臣言為然乞候有司奏請只作聖㫖指揮論農事劄子七月十日臣近䝉賜告蹔至許昌竊見畿内已苦雨潦詢之村民皆云鄉村安静公私少事無呼召煩擾唯是年嵗未得豐熟不旱則水民嘗艱食夏麥既薄或全不收秋苖雖茂唯憂澇損臣竊惟陛下哀矜百姓賑恤鰥寡徳澤所及可謂至厚然猶和氣未應隂陽隔并欲修政事以應之願陛下推其心而已矣夫天道不逺在君心所以感之人君愛民則天亦愛人君愛民者在知其勞苦而恤其困窮天下之人至勞苦而常困窮者農民是也周公作無逸戒成王以先知稼穡之囏難又言商之逸王不知稼穡之囏難不聞小人之勞唯躭樂之從夫稼穡之囏難與小人之勞人君不可以不知天生時而地生財自一粒一縷以上皆出於民力然後人得而用人臣之禄受之於君故不可不報君人君之奉取之於民故不可不愛民天子者合天下之力而共尊養之凡宫室車馬服食器用無非取於天下皆百姓之膏血也其作之也甚勞其成之也甚難安而享之不可不思其所從來思其所從來則愛之而有不忍費財之心憂之而有不忍勞民之心以此之心行此之政而天下不安者未之有也天下之大生民之衆唯繫於一人之心君心静則天下静君心不静則天下亦不静朝廷唯躬儉節用無所營為常恐煩百姓則天下安息先王豈能人人而食之人人而衣之哉推其仁心修其仁政以及天下則所被者廣矣臣願陛下當食則思天下有飢而不得食者當衣則思天下有寒而不得衣者凡於每事莫不皆然唯推至誠以召和氣庶㡬皇天報應降豐年之祥使百姓家給人足則太平矣昔漢昭帝耕於鉤盾弄田其事至微史臣書之盖以昭帝欲知稼穡之囏難與周公戒成王之意同也周世宗留心農事嘗刻木為耕夫蠶婦置之殿庭欲見之而不忘國朝祖宗以來尤重農穡太宗嘗謂近臣曰耕耘之夫最可矜閔春蠶既登併功紡績而繒帛不及其身田禾大稔充其腹者不過疏糲若風雨􅆾候稼穡不登将如之何真宗於内殿植稻麥臨觀刈穫欲知田畆之勞至今遵之惟陛下深留意於農政而常以保恵小民為先則天下幸甚取進止乞留無逸孝經圗劄子臣竊以無逸者周公之至戒孝經者孔子之大訓陛下嗣守祖宗鴻業方以孝治天下二書所宜朝夕觀省以益聖徳昔仁宗皇帝初建邇英閣即書無逸於屏間其後嵗久而敝又命知制誥蔡襄書之仁宗曰朕不欲背聖人之言乃置之左右又諭侍讀學士丁度取孝經之天子孝治聖治廣要道四章對為右圗命侍讀學士王沐書之又命學士承㫖王拱辰為二圗序亦令襄書之仁宗尊崇經訓如此陛下宜以為法今邇英閣止書圗序於屏間而無逸孝經二圗不復張列臣欲乞指揮所司檢尋如舊圗尚在乞置之左右如已不存即乞特命侍臣善書者書之其蔡襄所書圗序從來置在御坐之後昨因修展邇英閣方徹去却書於屛間此圖乃祖宗舊物臣竊惜之伏乞依舊張掛三圗並列如仁宗朝故事以彰陛下欽明稽古仰遵先烈之意取進止貼黄邇英閣兩壁見有前代帝王事跡畫圗如置到無逸孝經二圗只乞重上張掛别不換動即無所妨十月二十九日上此奏十一月一日邇英進講三圗皆張掛無逸孝經仁宗朝舊圗王沐書無逸蔡襄書孝經此云襄書無逸沐書孝經乃據實録之誤兩朝寳訓與實録不同據圗則寳訓是也乞不限人數收養貧民劄子十二月二十日臣伏見陛下以今冬大寒異於常年聖心憂軫救恤小民無所不至近又出禁中錢十萬貫以賜貧民此誠博施濟衆堯舜之仁也禮記曰財聚則人散財散則人聚臣知此財一散而人心皆聚於朝廷矣古之聖人未有不矜恤孤窮者堯命舜舜命禹皆以四海困窮為託書稱不虐無告不廢困窮惟帝堯能之盖置而不恤則是虐之矣棄而不養則是廢之矣伊尹稱湯曰先王子恵困窮周公曰文王懐保小民恵鮮鰥寡孟子曰文王發政施仁必先鰥寡孤獨夫聖人養天下之民使貧者不至失所則不貧者自安是故古者為政必先恤困窮之民國朝祖宗以來恵恤孤貧仁政非一每遇大雨雪則放公私房錢以至糶米賣炭散錢死者則賜錢瘞埋恵及存歿近日朝廷無不舉行而又發内帑之錢降非常之恩徳澤之厚無以加矣陛下勤恤小民如此而臣忝在左右竊思有可以少補聖政之萬一者忍黙而不言哉古者鰥寡孤獨廢疾皆有養既養之則不至於凍餒而死朝廷自嘉祐以前諸路有廣惠倉以救恤孤貧京師有東西福田院以收養老㓜廢疾至嘉祐八年十二月又増置城南北福田共為四院此乃古之遺法也然毎院止以三百人為額臣竊以為京師之衆孤窮者不止千二百人又朝廷每遇大冬盛寒則臨時降㫖救恤雖仁恩溥博然民已凍餒死損者衆夫救饑於未饑之時先為之法則人不至於飢死救寒於未寒之時預為之備則人不至於凍死今每嵗收養與臨時救濟二者等為費用不若多養之為善也臣愚以為宜於四福田院増盖官屋以處貧民不限人數並依舊法收養委左右廂提舉使臣每至冬月多設方畧救濟或給米豆設糜粥不必専散見錢其使臣存活到人數書為課績量與酬奨死損多者亦立殿罰如四廂使臣提舉難徧即委吏部臨時更選差使臣四貟相兼提舉量與添給仍理為重難短使存活死損殿最亦依四廂使臣法其天下廣惠倉竊慮州縣不以為急乞更申明成法每嵗以時舉行委逐路監司丁寧行下所屬州縣及因廵歴案視或於逐州别差官㸃檢使知朝廷掛意令官吏用心振恤須要實惠及貧民不得輕易以為末事畿内諸縣亦乞令擘畫官屋依京師收養無令逺者聚於都下重立條禁以絶主掌支散之人減刻之弊如此則物不虚費而所活益多矣國家冨有四海每嵗用係省錢一二萬緡於租賦之入無異海水之一勺而饑窮之人日得食錢之資升合之米則不死矣此乃為國者所當用王政之所先也况朝廷幸不惜費唯更増修舊法推廣祖宗仁政以副陛下慘怛愛民之意夫何難哉臣竊惟陛下近日所行萬萬於此而臣之所陳事乃至㣲然古之聖人莫不以此為先務所以拯生民之性命其法不可不備也如臣言稍有可采伏乞詳酌施行取進止貼黄臣竊見四福田院條制逐院每年特與僧一名紫衣行者三人剃度推恩至厚而所養人數不多今若増添人其恩澤亦乞詳酌立定分數每存活若干人即與剃度一名如死損及若干人即減剃度一名所貴各務存養人命進經書要言劄子三年四月臣近於邇英閣進講嘗指陳尚書要切之語望陛下因習筆札書之以置座右臣退而伏思古之人君雖在閒燕之中出入起居必存儆戒左右前後動有箴規所以正心修身自彊於徳以舜之聖而益戒之曰㒺失法度罔逰于逸㒺淫于樂禹戒之曰無若丹朱傲湯有盤銘武王於席之四端為銘於几杖為銘於衣帶為銘於履屨為銘於觴豆為銘於户牖為銘舜湯武王其自修如此而况於後世之君乎今陛下纂承累聖日勤問學若於翰墨之際不出聖人之經略舉要言以為明鑒置之左右朝夕觀省與夫舜禹之戒湯武之銘其揆一也臣職在勸講無補毫分茍有愚見不敢不盡謹節畧尚書孝經論語切要之語訓戒之言得二百一十九事以備聖札所冀陛下手書之目觀之心存之庶可以少助進徳之萬一臣不勝拳拳之愚干冒宸嚴臣無任惶懼之至進古文孝經説劄子八月二十日臣伏覩國史章獻明肅太后嘗命侍讀宋綬擇前代文字可以資孝養補政治者以備仁宗觀覽臣職勸講雖不足以跂望前人之髣髴然區區忠益敢不盡愚竊以聖人之行莫先於孝書莫先於孝經孝經有古文有今文今文即唐明皇所注十八章古文凡二十二章由漢以來唯孔安國馬融為之傳自餘諸儒多疑之故學者罕習仁宗朝司馬光在館閣為古文指解一巻表上之臣竊考二書雖不同者無㡬然古文實得其正故嘗妄以所見又為之説非敢好異尚同庶因聖言少闗省覽伏惟陛下方以孝治天下此乃羣經之首萬行之宗儻留聖心則天下幸甚其古文孝經説謹繕冩為一册上進干冒宸嚴臣無任惶懼之至勸學劄子二十二日臣不侍經席已踰兩月陛下深居閒燕聖學日勤然臣等無由罄竭愚短補助萬一昔唐憲宗不對學士兩月李絳奏曰為臣等竊禄偷安之計則便矣其如陛下何今臣之愚竊欲陛下以學為急故敢畧陳一二惟陛下留聽臣聞孔子曰學如不及猶恐失之揚雄曰學之為王者事其已久矣堯舜禹湯文武汲汲孔子皇皇其已久矣夫學者所以學治天下王者之事也故自堯舜禹湯文武之君皆汲汲於學仲尼雖聖亦皇皇有所不暇此聖人所以不可及也後世繼體守文之君生而驕逸不能務學忘其祖宗之艱難累世之勤勞徒見天下無事以為禍亂無從而生或荒躭于酒或盤于逰畋或窮奢極侈或輕用民力諂䛕日親忠正日疎人心離貳遂亡其國其所行之迹後世視以為戒自古以來治日常少亂日常多推原其本由人君不學故也天下治亂皆繫於人君之心君心正則朝廷萬事無不正故天地順而嘉應降隂陽和而風雨時古者三公太師太傅太保論道經邦燮理隂陽無他術焉唯正君心而已保保其身體傅傅其徳義師道之教訓皆所以正君心也如欲心正未有不由稽古好學而能致也臣竊考之前世揆之當今恭惟本朝累聖相承百有餘年四方無虞中外底寜動植之類䝉被涵養徳澤深厚逺過前世皆由以道徳仁義文治天下人主無不好學故也太祖皇帝以神武定四方創業垂統日不暇給然而晚年尤好讀書嘗曰宰相須用讀書人陛下試思太祖此言宰相既用讀書人則自餘執政侍從之臣臺諫之職必皆文學之士然後可用外至州縣亦必由進士出身乃可委以親民刑獄之任是朝廷之士皆不可以無學也然則天子豈可以獨不知學乎太宗嘗謂近臣曰人君當澹然無欲形見於外則姦佞無自而入朕年老無他欲但喜讀書用鑒古今成敗耳真宗之時益修太宗之業仁宗在位四十二年問學未嘗少廢今邇英講讀乃仁祖之成規也英宗神宗皆遵守仁宗之法稽古好學陛下所知不幸先帝早棄四海累聖已成之業任大守重傳付陛下陛下嗣位於今四年幸賴太皇太后以至仁盛徳母臨天下陛下垂拱無為海内晏然當今之務莫如學問之為急也陛下今日學與不學繫天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子皆欣慕願立於朝以直道事陛下輔助徳業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴而專權利矣君子專於為義小人專於為利君子之得位欲行其所學也小人之得位将濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人進學莫不在於年少之時陛下聖質日長龍徳進升數年之後雖欲勤於學問恐不得如今日之專也臣竊為陛下惜此日月願以學為急則天下幸甚論語記聖人言行之要修身治國之道無不在焉尚書言帝王政事人君之軌範也論語雖已講畢望陛下更加詳熟尚書未講者亦望陛下先熟其文臣等以次講解及之則陛下聖意已先有得矣臣不勝拳拳之愚薦講官劄子十一月十七日臣伏聞仁宗天聖初嘗詔天下訪求講説之士今陛下方嚮學問宜博選正人置之左右臣誠愚陋承乏於此大懼無以少補聰明茍有所知不敢不言臣伏見前校書郎司馬康年三十九篤志好學行如古人資性端方克肖其父臣昔與司馬光修資治通鑑康為本局檢閲文字與之相接近十五年備覩其人操守如一尤長於講説使之執經必能稱職質於公論皆以為宜臣竊以光之忠直簡在聖心如康之賢陛下必自拔擢今臣止言其所長伏望陛下知察而巳取進止貼黄臣聞先朝舊置講官四貟今孫覺在寛假臣與顔復輪講委是闕官臣與司馬光相知衆所共悉今之所言非敢私於知巳輒薦其子實以康之學行可備勸講臣受陛下厚恩唯欲得人以助聖學故不敢畏避嫌疑宻入此奏伏乞留中特自聖意處分二十二日司馬康除侍講進尚書説命講義劄子四年正月七日同崇政殿説書顔復上臣等近進講尚書説命竊以為君治天下國家欽天稽古修身務學任賢立政至言要道備在此書誠能法之可為堯舜昔太宗皇帝嘗曰尚書主言治世之道説命最備特詔孫奭講此三篇伏望陛下詳覽深思必有啓迪聖學之益臣等雖罄竭謏聞講解於前謹輒記録所言編寫成册以備尋繹或賜顧問庶幾少助聰明之萬一其説命講義三册謹具上進取進止㸃論語劄子臣等昨進講論語伏見舊本㸃句差誤不少臣等雖逐受改正尚未能盡竊慮御前見用本亦有誤㸃欲乞降付講筵所臣等參詳改正進入以備温覽取進止貼黄或乞下國子監别取一本㸃定進呈取聖㫖范太史集巻十四

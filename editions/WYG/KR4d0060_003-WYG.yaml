body:
  text: 范太史集巻三宋范祖禹撰詩和張芸叟左司被賜資治通鑑六世承平有史臣班固稱六世史臣謂司馬遷紬書東洛布成均網羅遺佚三千載採擷精華十九春天作冠篇墳典大上思稽古憲章新烏臺御史辭讐校頭白空餘汗簡人芸叟同校定以執憲先罷送鄭閎中待制提舉洞霄宫成均祭酒出儲胥嘆息東門祖二疏顧我言非韓吏部多公節似孔尚書諸生共惜陽城去三徑重開蒋詡居琳館遥瞻霄漢外秋風一鶴上空虗和吕原明上清宫落成炎厯儲祥億萬年宫成四海共熈然玊虚真境朝羣帝金闕泠風下列仙初日翠華来照耀半天碧瓦欲飛騫已瞻聖孝勤三殿有司定儀本命殿遣官分獻是日有㫖親獻三本命殿更寫歡聲入五絃送李邠州文昌冠劒輟名卿書殿丹青得老成曉日旌旗熊虎動秋郊組練雪霜明邠郊風教農桑國秦帝山河屏翰城竹馬兒童應借問使君攬轡舊澄清和門下相公從駕視學堯天雲漢炳文章親學嚴師款上庠萬乘及門先降輦諸生望日儼成行三雍盛典遵前訓千古元龜鍳逸王儒服觀光真幸㑹為容深愧魯髙堂興龍節傳法院譯經御筵誕聖千年日祈祥億刼尊祕言翻貝葉勝事集祗園寳葢天香住銀璫詔語温曾無了義學空愧酌堯樽送文周翰出守陜郊維師謝公衮稷契仰髙躅公子睠庭闈西郊作侯牧飄颻丹穴鳳燦爛文昌宿雅望冠朝端妙年分陜服綵衣照洛水紅斾驅崤谷荆山連太華翠氣堆羣玉長河從天来㢠斡巻坤軸東奔觸砥柱北向摧平陸壯哉山河固屛翰神明隩秦人亦勞止生氣日已蹙兵戈困瘡痍賦斂苦敲朴使君得召父庶可飽饘粥耕桑徧南畆禮義興比屋門前長安道日夕撃征轂念昔西徂東經過厭結束爾来卧巖谷十載歸天禄猶如閉樊籠恨未隨鴻鵠隠几思故山側身望喬木何時拂塵衣假道西走蜀駐馬問甘棠歌謡聴淳俗守嵗嵗逐更籌盡春隨斗柄廻和風先傍栁薄雪暗驚梅坐對燈花結歡吹酒蟻開莫嗟華髪短且喜一年来和吕子進元夕何處元宵好天街第一坊九重金闕外萬夀綵山旁扈蹕凝祥島十四日迎鑾資善堂十五日帝城燈火滿歸坐若禪房原明官閒以余兼職良苦作詩見勞次韻二首忘言象外已無求應物環中自不憂匠石旁觀傷手斲尚應皮裏有陽秋右原明野性從来麋鹿逰强加冠服秪為憂何時放出樊籠去定似飛鴻上九秋右言志送秦主簿赴仁和我思適吳越懐古意如何太伯振髙風仲雍揚清波緒餘有季子飢食玉山禾山水發竒秀古来英俊多秦君淮海彦文鋒雄太阿早依蘓揚州匠手為礲磨光芒侵星斗氣象奔江河青衫拾科第試邑佐絃歌春水生南國扁舟浮緑羅方将剖蚌璞焜燿隨與和我病久廢詩緬思眄庭柯徬徨戀紫闥嵗月屢蹉跎㸔君登朝廷奏頌助猗那為我謝蘇公先歸待江沱和錢穆父尚書蒋潁叔侍郎從駕景靈宫二首紫嵩清洛映重闉紫嵩清洛西都二館舊隠荒蕪白髪新麋鹿未能馴野性鸞凰何敢望前塵分班拜舞趨文陛扈蹕賡歌紀慶辰共助成王朝太室慙非史佚奉明禋寝廟威神挾正元天興殿左右門名曰正元初晨天仗下端門寒生碧瓦氣䓤鬱日麗琱輿景晏温霜露感時知世逺星辰拱極見君尊自憐多病思歸客唯有山川役夢魂子瞻尚書恵㴠星硯月石風林屏作歌以送之賦十二韻以謝端溪千仞㴠明星虢山木古藏隂靈蘇公贈我此二寳使我坐卧瞻雲屏我觀天地間有物皆流形或從清空入幽谷中夜隕石翻堦蓂齊諧志怪不能狀欲說但恐同優伶公逰浙江探禹穴長嘯宇宙臨滄溟手攀天河弄星月醉落大筆還㣲醒故分星月入我室光照窗户風生庭長林偃絶壁晚色寒青𡨕似聞洪濤巻萬木直榦不折當風霆𤣥雲欲落雪夜久孤燈熒報贈愧無青玊案苦吟徒使鬼神聴送蒋潁叔赴熈州詩書謀帥得豪英去擁洮河十萬兵舒巻風雲為號令笑談樽爼是功名胡塵不近彈筝峽漢月長懸細栁營莫謂安邉無上䇿農桑千里見昇平和王都尉押髙麗人燕射北園天上星弧日射狼副車衣袂得餘香朔雲曽落雙鵰羽遼海将歸萬里航酒灔堯觴賓已醉春廻漢苑漏初長何郎拜舞恩波渥花簇金鞍道路光謝子瞻尚書恵墨端溪硯二首禹平洪流錫𤣥圭班于羣神朝㑹稽遼東飛煙過滄海徂徠古氣臨天齊丹砂化出黄金鼎雄麝焚身何噬臍魚膠清堅豈易致燕支山北隨佩觿雙龍蛇蟠戲缺月吳軍破甲光水犀黒雲如輪起端溪揮灑倐忽奔鯨鯢先生海内文章伯窮年蒿目憂黔黎玉堂新製自心巧想見星象躔寳奎落毫無脛走珠玉雨雹霽止垂虹蜺陋儒窮經脣欲腐石室汗簡空沈迷眼昬畫紙僅成字何異月闇投玻瓈唯當藏作篋中寳併荷蓑笠歸鋤犂右墨端溪清㝠幾千尺𤣥潭噴雲嘘紫石層空飛溜瀉珠璣大古隂崖摧霹靂翦裁巖屏作風字琢磨水鏡成月魄似聞松上颼颼聲一洗塵埃傾七澤先生毎思窮禹穴東叱天吳掛帆席山祗水若獻幽寳贈我不啻千金璧玉堂金井汲寒泉坐視青天浸虚碧豈知来從海嶠外鳥道穿雲下絶壁嗟我本是山中人慙無詞藻對卿客鄉人子雲思竒苦終老漢庭長執㦸至今舊宅有墨池何怪著書𤣥尚白行當提攜返敝廬更廣牢愁弔遺迹右端溪硯初到玉堂舊廬風雨暗柴荆丘壑元無紱冕情一紀周南陪太史八年書殿厠桓榮陳編豈待傷麟止藻思那能倚馬成空愧朱衣華髪吏玉堂三世見題名院有老吏嘗引接叔祖忠文公叔父資政今又引接入院翰林寓直雨冷絺衣初覺單清秋寓直玉堂寒濛濛宿霧昏鳷鵲獵獵光風轉蕙蘭蘚積書筠塵不落雲生硯水墨無乾十年曽向伊川卧長憶閒中夢寐安夜直聞御溝聲銀河秋瀉月明中雲巻風吹下碧空終夕玉堂魂夢冷蜀江聲繞水晶宫送陳元輿侍御赴廬江憶昔仁皇憑玉几延和春晝神龍起赭袍黄􅏛放諸生却下紅簾半天裏君為第二驚衆人愧我非才居後塵題名桂籍皆年少有似鶴鴻毛羽新爾来四朝三十載相逢何怪容顔改昭陵拱木鬱參天麟閣名臣幾人在侍從同登白玉除毎思夙昔夢華胥君今出作八州牧千里旌旗引舳艫淮陽卧治豈當久宣室夜召終非踈下車先表崔節婦助我汗簡成新書包孝肅公崔節婦居廬江八月十一日夜玉堂對月銀雲櫛櫛王堂明奩鏡初開六合驚天巻纎毫光不隔風收萬籟夜無聲蓬萊想像皆雲氣宫殿虚無盡水精一夕夢飛雙劒外已疑身到雪山清送七主簿赴龍水山行水逶迤鬱屈如盤龍縁谿夾修竹被嶺多長松懸門倚巖石終日對青峰初仕昔為宰讀書過三冬忘機狎鷗鳥勸稼親老農訟庭可羅雀銅印蒼蘚封爾来三十年夢想幽人蹤風塵京洛間邑子或相逢晩歲上玉堂天門深九重緬思寒潭碧一洗我心胸送子西南歸恨無羽翼從為我謝邦人今愧白髪容和子瞻尚書儀曹北軒種栝蘇公滄洲趣日夕懐山隂公堂植珍木寄夢天姥岑亭亭碧玉榦氣象俯喬林雷霆已難拔霜雪何敢侵蒼皮巻鱗甲細葉抽鋒鍼稍出珊瑚枝中含笙磬音鸞鳯待棲息詎肯容凡禽西風蕩積雨畏日方流金潭潭宗伯府窈窕巖谷深北窗卧羲皇笑語合朋簮蒼生望安石出處本無心萬象入毫端四溟納胸襟文房爼豆列武庫矛㦸森甘棠愛召伯勿使螻蟻尋世俗多貴逺豈知古猶今他年老東山應記梁父吟吏部彭侍郎召㑹馮少師園亭即席賦詩門生猶記鑿龍登載酒東堂命友朋終日清談陪几杖赤松况是坐禪僧多病多病心牢落驚秋髩颯然風乾桐葉地雨冷菊花天舊隠荒江漢新居俯澗瀍西都長夢想何日賦歸田成都西都也九日寄諸弟白髪宜新酒黄花似去年懐歸雙劒路極望九秋天喬木西山外觚稜北斗邉遥知行樂處藥市隠真仙闕綵斾藍輿訪隠扃雲松雪竹想儀形函關應望真人氣傅野今無處士星猶憶九臯聞鶴唳徒勞雙目送鴻𠖇将迴俗駕頻搔首深愧山文舊勒銘永州作京華驛候逺楚越山川分心馳桂江水夢繞蒼梧雲夕與木石居朝逰麋鹿羣聖治踰繩契皇明軼華勲炎陬暨海表休氣塞無垠羇臣此幽縶何以答恩勤御製太皇太后挽詞四首任姒基王迹塗莘首化風徳超千古上治定九年中日月無私照乾坤不宰功寧神登太室永佑宋無窮定䇿元豐末勞謙聖烈光外家深自抑俊徳盡明揚恭儉隆三世寛仁覆萬方功成身不處仙駕白雲鄉天祐周邦世世仁篤生文母濟斯民嗣徽慈后光宗祖配極英皇育聖神崇慶垂衣寧寳座延和負扆翊沖人長言永慕遵遺訓要在齊家與正身八荒同軌夀原成雨露俄悲嵗律更曉日曈曨開鳳翣春風縹緲轉龍旌晨朝尚想趨金殿颷馭難留返玉京寳冊形容雖四字誰知盛徳莫能名臣奉御寳批撰挽詞四首進入内兩首七言兩首五言謹依聖㫖撰進古今詩體多以五言在前伏乞裁酌太皇太后挽詞二首誕保天基命光開帝永圗軒星臨斗極堯日上雲衢美化形風雅成功入典謨羣生何以報損夀濟寰區授几咨元老垂帷攬衆賢舜功成二十周士得三千徳澤流終古規摹遺億年寧唯照彤史石室爛青編又三首九載扶皇業三朝賴母儀成乾功不有並日照無私天上軒星暗人間薤露悲君王自仁孝舊典奉元龜治道初無事齊家與正身練繒躬至儉行葦被深仁受册辭隆禮為霖屬老臣太平遺徳在白首泣堯民能助君成聖惟知諫必從徽音推二后盛治見三宗虚扆翔丹鳳仙輴駕玉龍凄凉厚陵路墓木拱髙峰王岐公挽詞三首景運光華際洪鈞十六年文明憲前古禮樂被敷天有美經邦業無成載物權易曰地道無成而代有終君臣時契㑹俯仰逐流川乘雲仙馭逺出震帝圗新百辟瞻元宰繁機仗老臣中天扶日月拱極失星辰終始先朝遇勤勞至沒身王儉風流相岐公博贍資唐相杜祐封岐公敷文成國典亮采作官師劒佩空黄閤音容想赤墀元臣葬禮盛簫吹朔風悲王開府挽詞三首聖厯當千運天庭第一人榮光親日月優寵極臣鄰賈馬推先進䕫龍接後塵藩垣賴耆徳宣力至終身康寧五福備出入四朝安劒佩逼台室旌旄登将壇天池将浴鳳雲漢擬驂鸞縹緲凌霞意今成逝水嘆連帥諸侯長維師列爵隆儀刑憲萬國眷禮視三公白日年華盡浮雲世事空九原伊洛上松柏自悲風司馬温公挽詞五首伊吕為時耦夷齊得聖清精忠貫日月至行格神明㣲物霑仁澤窮荒服徳名須知千載後瞻仰重嵩衡文母扶皇運成王紹慶基蕭公翼左右裴相繫安危共恨登庸晩俄成殄瘁悲旂常紀勲業長與日星垂上相經綸日羣生化育中初開仁夀域重立太平功海㝢還淳俗朝廷復古風英靈在王室應佑宋無窮盡瘁憂民瘼孤忠簡聖心忘身甘首疾報國競分隂天奪楊公速人思召伯深秋風咽笳鼓行路泣成霖自昔龍門峻叨䝉國士知紬書陪太史問學仰宗師一紀依林壑千秋隔履綦餘生愧簮紱無路送靈輀韓獻肅公挽詞三首孝友天生徳公忠世象賢八元推亮采四海入陶甄枌社棠隂老槐庭棣萼聨諮詢賴黄髪零落已重泉舜禹勤勞治臯䕫翊贊功秉鈞瞻上宰憲老佚三公夀考登耆耋哀榮備始終凄凉潁川路簫鼓愬南風東閣開無倦西園宴不疲蒼生望安石多士美當時功業歸青史音容閟繐帷烏衣門巷在過客有餘悲李朝議挽詞二首美行商山老髙年渭水翁政留循吏跡家有古人風操几門庭在安車里巷空子孫皆孝養餘慶自無窮解組紅塵外忘機白日遲煙霞隨歩武松竹想風姿沇水流清範盤山厚福基鄉人應配社猶恨不期頥鮮于諌議挽詞二首西蜀文章老中朝侍從臣諫垣風烈在書殿寵光新宣室虚前席清漳嘆病身致君才未展青史迹空陳白首方登用忠規溢皂囊仲山違衮職汲黯卧淮陽墓劒知誰掛人琴竟兩亡猶思挺直操松柏凛秋霜哭司馬公休昔在西都日趨庭見伯魚金華同勸講石室共紬書鮑叔深知我顔淵實喪予衰年哭心友忍復望靈車中書侍郎傅公挽詞巖野為霖後千年復有人累朝推鯁直二聖倚經綸盡瘁憂民色孤忠許國身徐公徳不變可使俗還淳洛社瞻賢躅書筵繼老成公昔免講改侍讀祖禹承乏是職聲容陪夙昔論議想平生節與盤山峻名隨沇水清草堂空舊隠松月為誰明常大夫挽詞禮樂追先哲文名動搢紳忠勤白首節恵愛逺州民石室詩書在天衢日月深九原何所憾有子嗣芳塵王承事挽詞井絡西南奥今無處士星天真養恬漠世累絶塵㝠松菊陶公徑詩書孔氏庭傳家清訓在潛徳繼先銘先生考官教蜀郡忠文公為銘范太史集巻三

body:
  text: 范太史集巻五十宋范祖禹撰皇族墓誌銘右金吾大将軍濰州刺史充本州防禦使贈安化軍節度觀察留後追封髙密郡公墓誌銘公諱令教字景脩曾祖惟忠彰化軍節度使舒國公祖從質定州觀察使博陵侯考世京徐州觀察使彭城侯母臨安郡夫人張氏初賜名補右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍環州刺史左武衛大將軍成州團練使右金吾衛大将軍濰州防禦使公少聰敏善屬文通五經諸子百家無所不觀蓄書數萬巻美風儀洞曉音律好讀晉史慕嵇叔夜阮嗣宗之為人閒居座右多植修竹每援絃賦詩超然有遺世之志然尊賢樂施常若不及奉身端潔治家簡儉元祐五年四月庚子薨臨終戒諸子以不能終養為恨年四十有四著詩書大義十卷歌詩集十巻娶郭氏故參知政事䞇之曾孫封徳安縣君先公一年卒九男曰右監門衛大将軍子雲曰右班殿直子思曰三班奉職子㤗曰子才餘皆幼女十人長適右侍禁向子平次適右班殿直錢岵餘在室九年二月已酉𦵏河南永安縣銘曰博陵之孫彭城之子敏而好學世濟其美振振信厚時如麟趾安化軍節度觀察畱後髙密郡公妻徳安縣君郭氏墓誌銘夫人郭氏曾祖䞇中書令襄國文懿公祖紹昇光禄卿父肅之母陳氏夫人適安化軍節度觀察畱後髙密郡公令教性静専愿順歴三十年其終如初門中無愠色無怨言治家有常法其飲食器皿雖不豐侈而必精以㫖其衣無故新澣濯縫紉而必潔以完其語言周旋容止進退必從容以和元祐四年三月壬午卒年四十有四九男曰子雲右監門衛大将軍曰子思右班殿直曰子泰三班奉職曰子才餘幼九女長適右侍禁向子平次適右班殿直錢岵餘在室九年二月已酉𦵏河南永安縣銘曰易在中饋婦無外事詩美鵲巢徳如鳲鳩起家而有可配公侯夫人宜之是以似之秀州刺史充本州防禦使贈保寧軍節度使追封昌國公墓誌銘公諱世享字公夀太祖四世孫也曾祖徳昭越懿王祖惟忠贈彰化軍節度使舒國公父從謹贈宣州觀察使宣城侯嫡母薛氏髙平郡夫人育母張氏以公貴封寧國縣太君初賜名補太子右内率府副率歴右監門率府率右千牛衛將軍右監門衛大將軍右武衛大將軍逹州刺史右羽林軍大将軍文州團練使沂州防禦使今上即位遷秀州防禦使公幼樸茂不羣宣城愛之九歲喪父號毁如成人長嗜學治詩書論語孟子通大義熈寧中學官薦公明經可召試㑹有制宗室不許舉而許自列公不欲蘄進然為學不已間為詩以自樂躬訓子弟督責嚴甚故家庭遵尚禮義肄習學業為宗藩所矜式精于書札善射藝性孝友敦睦輕財喜施事髙平夫人盡禮寧國君初喪英宗遣内人奠慰自是宗子育母死内人致奠自公始居心喪晨夕定省憂戚未嘗見于色容恐失君母之意退就異宫則哀苦備極以訖喪期故髙平愛之如已出髙平之喪哀毁過制遣子姪上表願守菆至卒哭詔許之及葬在道稍遇險阻必躬自扶匶仁宗山陵仲兄均州防禦使世祥從𦵏子幼穉未能任事著令許命婦送𦵏㑹其妻病不能往公四上奏請行詔特從之其後許弟䕶𦵏自公始燕居大書積隂徳三字揭之座隅其撫養教督濟贍族屬之孤遺唯恐不至凡衣食之用凶嘉之費皆仰給焉故人丁淳之女失身于人公以財購出之又辦資裝擇良家子嫁之族人有疑事必咨公公為處畫如已事無不中節善與人交久而益厚喜賔客多蓄名書畫筆硯紙墨遇朋友親舊把酒相樂推誠無間故士多稱愛之元祐元年二月癸亥卒年四十有七病革遺命教戒諸子託後事于弟貴州防禦使世恬或勉以饘粥藥劑可愈公曰死生命也其逃乎訃聞天子賻䘏甚厚贈保寧軍節度使追封昌國公諡曰良恭娶錢氏封金城縣君吳越王之後供奉官隆祐之女先公二十六年卒十三男曰令禠右武衛大将軍文州團練使次未名而夭曰令誑曰令咺並右侍禁曰令精曰令薿曰令諧曰令龔並左班殿直曰令橡曰令柱並右班殿直一未名而夭十六女其壻奉議郎胡仔右侍禁張宗桀三班奉職馬綖右班殿直郭永璋承務郎李大中三班奉職董臬吕執中李塾向慤劉蒙三人在室餘夭適郭氏吕氏者皆卒孫男十六人子琦三班奉職卒子琬子琳早卒子玓右班殿直子玕三班奉職餘皆幼孫女八人曾孫男女各一人九年二月已酉𦵏河南永安縣銘曰翼翼昌公孝友温恭簡于帝衷善積厥躬其生也榮其没也令公多子孫天錫之慶右武衛大将軍處州刺史妻夀光縣君王氏墓誌銘君王氏曾祖貽永贈尚書令兼中書令祖道卿贈右領軍衛上将軍考彭年左藏庫使妣李氏崇徳縣君年十六適右武衛大将軍處州刺史士健事姑盡禮温恭朝夕無少懈勤于家事凡十七年如一元祐七年九月戊子卒年三十有二六女一早卒九年二月已酉𦵏河南永安縣銘曰有崧維嶽有洛維川永固其藏於萬千年右千牛衛将軍妻永和縣君張氏墓誌銘君張氏其先河東人徙居開封曾祖延貴贈左衛上将軍祖宗益工部郎中贈朝請大夫考修逺奉議郎母夀昌縣君趙氏君純粹燕婉淑慎温恭未笄適右千牛衛将軍仲醻封永和縣君性樂詩書尤喜屬文元祐五年三月丁卯卒年三十有二十一子曰士燕曰士㬭皆左班殿直曰士􅀈曰士代曰士􅀢皆右班殿直次二未名其四未名而夭一女在室九年二月巳酉𦵏河南永安縣銘曰張氏自晉歸于本朝昏姻天屬令問宣昭其華早落其實椒聊右武衛大将軍榮州團練使贈徐州觀察使彭城侯墓誌銘侯諱仲雪字潔巳韓恭懿王元偓之曾孫相孝定王允弼之孫彰信軍節度觀察留後北海郡公宗制之子母文安縣君柴氏初賜名授太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍瀛州刺史榮州刺史榮州團練使侯性夷淡嗜學至㤀寒暑北海公藏書萬巻教育諸子侯以通經一試于有司不中選遂不復舉為詩多警句日飲斗酒不以家事屑意事母以孝聞與諸弟友愛居喪哀毁至性過人元祐八年八月已丑卒年四十有一娶宋氏朝請大夫惠國之女封永昌縣君五男曰士壁左班殿直曰士溔右班殿直餘未名六女其壻池州司理參軍劉寔右班殿直潘禀餘幼侯月受奉錢十萬一妻一妾而處室没之日家無餘財九年二月巳酉𦵏河南永安縣銘曰孝定賢王北海好書侯克承之亦有名譽在後之人無忘厥初右侍禁墓誌銘公諱令緄字景武贈彰化軍節度使舒國公惟忠之曾孫宣州觀察使宣城侯從謹之孫今貴州防禦使世恬之子母大寧郡君邢氏所生石氏初賜名授右班殿直遷左班殿直右侍禁幼好學誦書日數千言長而治易博通先儒及近世名家義說喜唐人詩諷誦不廢寝食燕語必及之故宗族朋友皆樂與之游性復好施人以急見抵解衣與之家雖屢空晏如也年二十始調監富國倉門在官専以賦詩自遣既罷吏惜其去遮留終日乃得歸授京西廵轄馬逓鋪未赴元祐五年四月丁酉卒年二十有五娶王氏一男三女皆幼九年二月已酉𦵏河南永安縣銘曰孔惡飽食博奕猶賢況于言詩樂以窮年道未之思夫何逺焉贈左領軍衛将軍墓誌銘君諱士覯字公㑹贈鎮江軍節度使郇國公允成之曾孫贈武寧軍節度觀察留後宗嚴之孫原州防禦使仲防之子母齊安郡君石氏初賜名授右内率府副率遷右監門率府率性醇素敦謹事親竭力奉已務儉元祐二年七月已巳卒年二十贈左領軍衛将軍娶張氏西京左藏庫副使禹錫之女三男長未名而夭曰不珪三班借職曰不璪未仕一女在室九年二月已酉𦵏河南永安縣銘曰厚於親薄于已為人子能如是全而歸可無媿右屯衛大将軍妻平原縣君張氏墓誌銘君張氏曾祖受益贈贊善大夫祖文炳殿中丞考用荘左班殿直歸右屯衛大将軍令講屯衛羣從及諸父姑姊當執婦禮以見者數十人君待以和敬一無間言屯衛捐館既除喪君尚少父以其無子欲更嫁之君泣以死自誓不許元祐元年正月乙巳卒年二十有八生一女失之九年二月已酉𦵏河南永安縣銘曰共姜守義衛作柏舟如君之節乃宜公侯無愧死者往從之逰右屯衛大将軍妻崇徳縣君張氏墓誌銘君張氏父道周左侍禁適右屯衛大将軍令箋封崇徳縣君君夙喪父事母以孝聞既歸不及其舅事姑如事母族人稱焉屯衛兄弟四人最處幼君常勉以悌由是親愛益篤屯衛卒君嫠居不樂其生元祐元年宫中火驚而感疾十二月庚申卒年三十男二人曰子賡三班奉職次男及一女皆幼九年二月已酉𦵏河南永安縣銘曰伯姬火死諸侯畏宋君以駭隕亦惟義重凡婦之節沒而為用左班殿直妻杜氏墓誌銘君杜氏曾祖正已蓬州録事參軍祖宗敏贈太子左清道率府副率父士言樞密院兵房副承㫖年十九適康州刺史仲弓之子左班殿直士㻓君幼聰敏性質婉麗巧於女功父母愛之求昏得公族事舅姑盡孝閨門肅然元祐八年三月壬辰卒年二十有三一男三歲矣九年二月已酉𦵏河南永安縣銘曰杜氏后族派别流長嫁于宗支㒺克夀臧銘以昭之俾後不忘右監門衛大将軍威州刺史贈徐州觀察使彭城侯墓誌銘侯諱令逭字歸聖集慶軍節度觀察畱後南康郡公惟能之曾孫鄧州觀察使南陽侯從贄之孫保寧軍節度觀察留後東陽郡公世復之子初賜名補太子右内率府副率歴右監門率府率右千牛衛将軍坐罪非自犯奪一官未幾復舊秩遷右監門衛大将軍威州刺史侯性和裕未嘗失色于人力學好古熟漢唐史書善音律多畜古器以為玩侍東陽公疾冠帶不去體居喪致毁事母盡孝元祐四年七月辛卯卒年三十有二娶永和縣君姚氏文思副使公綽之女繼室永嘉縣君王氏内殿崇班悔之女二男曰子讜三班奉職次尚幼七女長適三班奉職袁弼餘皆在室九年二月已酉𦵏河南永安縣銘曰君子之行不見聲色疇克能之惟侯可則右監門衛大将軍贈博州防禦使追封北平侯墓誌銘侯諱令史字仲揚冀王惟吉之曾孫廬州觀察使廬江侯守度之孫建武軍節度使嘉國公世括之子母彭城縣君劉氏長樂郡君髙氏初賜名補太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大將軍侯秀頴刻意于學無聲色狗馬之好宗族稱其孝友元祐元年八月庚子卒年二十有八娶張氏封永康縣君二男曰子欽右班殿直次二人及一女皆幼九年二月已酉𦵏河南永安縣銘曰善積于身宗族信之不永厥年亦未克施左班殿直墓誌銘君諱子建贈保寧軍節度使楚國安僖公崇信之曾孫贈同州觀察使馮翊侯世登之孫右武衛大将軍榮州刺史令羣之子母秀容縣君髙氏以父䕃補三班借職改奉職幼有成人之志不妄言笑從師受學樂讀書喜筆札日誦數百言元祐七年六月辛未卒年十有三九年二月已酉𦵏河南永安縣銘曰揚氏童烏育而不苖懿懿宗子亦隕瓊瑶右監門衛大将軍嘉州刺史妻永夀縣君程氏墓誌銘君程氏曾祖坦贈太師中書令兼尚書令祖戡宣徽南院使武安軍節度使贈太師中書令兼尚書令父莘文思使君幼端謹沈厚精于女功不喜華飾年十七歸遂寧郡王之子右監門衛大将軍嘉州刺史世設承上接下不失其宜侍姑疾夫婦衣不解帶宗族稱之性儉約治内嚴肅而能寛恕教諸子以孝友諸女以禮法元豐中封永喜縣君賜霞帔服元祐三年十月庚辰卒年三十有七六男曰令泌左班殿直卒曰令諓曰令悺曰令詋曰令玓並左班殿直曰令茨右班殿直六女長適三班奉職王誨次適三班奉職韓端仁次適三班奉職宋克先次在室餘早夭九年二月已酉葬河南永安縣銘曰程氏近世執政之門教于公壼以適宗藩鵲巢之風麟趾之配宜家有慶在其後裔内殿崇班贈左領軍衛将軍墓誌銘君諱士㬈字和叔平陽郡王允升之曾孫滕王宗旦之孫右屯衛大将軍仲寅之子初賜名令瑋補太子右内率府副率本唐州防禦使世滋之子也元豐初出繼屯衛改今名以學官薦換右職補外任改授西頭供奉官監夀州酒税未赴權勾當翰林司遷東頭供奉官内殿崇班磁州兵馬都監元祐四年四月已巳卒于官年二十有七君幼誦詩書嘉議論與之交者無不愛其材歴官處繁劇强敏有餘薦之者十餘人初赴夀春請對得上殿論當時利害數事神宗嘉之下其章有司面諭令過郊禮而行乃命權翰林司娶張氏二男皆幼一女在室九年二月已酉葬河南永安縣銘曰神宗定宗子補外官之法故凡有一善必奨之所以長育其才也聖意豈不逺哉左侍禁妻范氏墓誌銘君范氏京師人曾祖守斌贈左司禦率府率祖文玉内殿崇班父滋累舉進士隱居自適君既笄歸于郢州防禦使越國公之子左侍禁子閔性質温粹儀度端雅喜習筆札尤嗜書史事舅姑勤孝姑愛之如已女中外宗族一無間言元祐四年五月癸未卒年二十有三三男曰伯度次早夭曰伯庠一女九年二月已酉葬河南永安縣銘曰范本祁氏陶唐之裔嬪于宗子令儀婉懿宜其家人弗克永世范太史集巻五十

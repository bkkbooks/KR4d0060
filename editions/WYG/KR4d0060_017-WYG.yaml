body:
  text: 范太史集巻十七宋范祖禹撰奏議乞罷囘河劄子元祐五年十月五日臣竊聞巳有㫖除臣試給事中臣䝉陛下擢任言職未有毫分禆補今遽䝉遷擢實懐愧懼雖捐軀隕首無以上報然臣有愚懇不敢不陳臣自九月以來聞朝廷復置修河司實見人情訩訩不安皆言囘河不便臣因經筵每與傅堯俞相見講求利害皆以為此事至大不可不言至二十八日臣方進入文字今纔數日聞堯俞改授吏部尚書臣除左省之職臣非不知給事中職髙而責輕諫議大夫班下而責重人情誰不以升進為榮以免憂責為喜然臣竊以囘河之役最為當今大患又聞差使臣五十九員往五十九州剗刷差兵赴役又差内臣大使臣四員團結興發次第如此天下豈不騷動且河北百姓未嘗吿訴乞朝廷囘河而無故興此大役逆天地之埋易山川之位以國財民命填無窮之壑而取不測之憂此實安危所繫臣豈敢不力争夫河不可囘臣論之已詳朝廷若以臣言為然即乞罷囘河之役以免河北將來倒垂之急息數十州困擾之患臣願以一身救數路生民之命雖死無憾若河不可不囘以臣言為不然則當顯行黜責不當却得優遷此乃執政大臣欲以美職塞臣等之口使人貪利而不言耳朝廷若使執政得以官職誘人則畏威者無不鉗口貪利者亦皆結舌天下利害之實人主何由得知此非陛下之福也恭惟大皇太后陛下方垂簾聽斷皇帝陛下未親政事正當明目逹聰之時而大臣乃以陛下官爵為蔽言之具臣雖至愚所不敢當臣若黽勉就職是與執政同為欺君若陛下一日覺悟以臣為如何人也伏望陛下詰問大臣臣所引先帝詔書可用與不可用陛下昨降罷修河司指揮可行與不可行今來復置修河司是與不是中外人言便與不便然後考核臣言之是非若臣言是乞賜施行若臣言非乞加黜責免至叨冒恩命再三辭避煩瀆天聽臣無任懇激之至取進止又乞罷囘河劄子七日臣聞周靈王之時榖洛鬬将毁王宫太子晉諫以為不可夫榖洛二水小川也王宫天子所居也小川水鬬而妨王宫太子晉猶深陳禍福之戒言川不可壅壅必有禍以其違天地之性也今大河豈榖洛之比又無王宫之害以何理而欲塞之也六國之時鄰敵相傾則勸人以動衆役民韓聞秦之好興事欲疲之無令東伐乃使水工鄭國為間以説秦令鑿涇水為渠溉田夫以一渠猶能疲秦使無東伐今囘河之役不知幾渠而自困民力自竭國用又多殺人命有不可勝言之害此乃西北二虜所幸也是以臣與傅堯俞極言論列實以河北數路生民休戚國家安危朝廷輕重所繫天地血脈巳北向九年必非人力所能遏絶今之河流方稍復大禹舊迹入界河趨海初無壅底萬壑所聚其來逺大必無可囘之理自古亦無容易塞河之事欲望陛下與執政大臣考臣等言之是非若臣等所言為是即乞以數路生民為念以國家安危輕重為急速賜指揮停罷修河今將大冬盛寒宜早降徳澤免生民飢凍死亡正李偉等欺罔之罪如以臣等言為不然方册中語皆不可信而河有必囘之理不扵他處決溢為州縣大患不至苦虐數路兵民力役以致逃亡起為羣盜及不至火急收買數千萬物料致非時斬伐林木殘害天地之所生科擾州縣鄉村坊郭人民鞭笞枷錮星火督責致百姓驚搔流離之苦又免枉費國家不貲之計以致公私匱乏倉庫空竭内則姦狡窺伺别致生事外則四夷傳聞萌心作過但令大臣保得必無上件數事囘河必有成功則臣言顯為謬妄豈可但隱忍而巳須當正臣等所言不當之罪黜責以勵後來乃可以示朝廷典法今不試驗臣等所言是否以救朝廷過舉而章奏纔下未及累日即䝉優加美遷臣不知大臣此謀為國耶為身耶若為國則當公天下之言盡河事之利害不當以官職姑息使人不言若為身則是唯欲人之同巳而不欲人之異巳豈唯國事不當如此為大臣身計亦未為得也人臣官愈進則當憂國愈深寵益加則當愛君愈切臣若聞命遂緘嘿不言不唯臣心實有所愧有識之士必指臣為貪利無恥忘國不忠之人伏望聖慈宣問大臣等所言回河是否如上所陳數件事理必有必無别白是非明辨可否使如臣輩不得緘嘿取進止貼黄昨開第三第四鋪而第七鋪潰決已非人意所料恐將來閉塞必有不測之患乞罷河役狀十一月六日臣所領工房伏見朝廷應副修河司所司如支河隂汜水等處綱米五萬石及差裝卸兵士二千人洛口䧺武埽鍬手各三百人支在京箔塲蘆蕟四萬領修役兵營寨之類日有行下文字臣昨為諫官極論回河不便未䝉施行今河役不息功費漸大恐修河司須索不止扵此朝廷若不罷河役則無不應副之理門下亦無由不行下臣稽之扵古考之扵今質之中外人言竊謂此功必不可成恐雖應副枉費國財民力有害無利謹具所聞見回河不便畫一如後一水性趨下自祖宗以來河決以次向西此則地勢東髙西下其理不疑商胡故道已行三十餘年隄防日増如築垣居水淤填積乆其地必髙此不待見而可知今北流千餘里欲使復為平陸故道千餘里欲使復為洪流恐非人力之所能也一四瀆者天地所以節宣其氣如人之血脈不可壅遏今北流巳九年豈非天意有定就不趨海乃是地形順便今來回河上違天意下逆地理騷動數路幾半天下枉害兵民性命空竭公私財力投之洪流不知紀極非徒無益更取患害巳上是河不可回之理一北流水行地中已是見成河道只須修立隄防便為永乆之利若歲歲増修一尺一寸皆是所得不為枉費東流已廢九年聞故隄穿穴一萬餘處陵谷遷變況於埽岸人力所為今若修完便同創置恐非人功國力所能供億譬如朽爛水槽多年不使一旦盛水豈不疎漏況水之性必不捨下就髙設使能以人力蹙向故道必為大患一北流毎年不免決溢自是隄防未理水政不修埽岸怯薄全無備禦當夏秋之際小川猶漲自古未有無患之河豈可因漲水噎凌決潰便欲全河回改設使能回向東不知可保無決溢之患否一南宫上下埽連年決潰皆緣隄岸卑薄深冬噎凌衝破臣不知去冬以來曽與不曽増葺隄防如其不然則今冬噎凌之際豈可保其無虞訪聞北流西隄自信都以南三百里許一例卑薄昨南宫埽止髙二尺濶五尺瀕河長老無不寒心又官中累年不調春夫埽岸使臣皆有免責罰指揮河清兵士為修河司諸處抽使所存無幾水政如此豈得為河不為患及有決潰則歸咎北流便欲回河豈為實論一議者謂北流横絶御河失漕運之利及西山諸水壅蹙為患且大河向北自可漕運何必御河西山諸水自上古以來有之非獨今日大禹舊迹循西山而行與今北流正相符合西山諸水入河無疑但築隄防空留西山水道使之入河何為不可一李偉元奏欲以閉宗城決口及遷深州之費回奪大河夫宗城決口雖大必不至費一千八百萬物料竊意元初檢計官故作情弊大數檢計意欲朝廷見其費大不若用以回河然後李偉却索此數自謂能了朝廷若遣可信之人别行檢計的確合用物料當見欺㒺且塞全河與宗城一決口大小不同可坐而知臣竊計一千八百萬物料塞宗城則必多塞北流則不足李偉必是且索此數將來一千八百萬必了不得朝廷既已興工不可中輟必須接續應副大抵興事之人無不如此范子淵武濟之役巳用此計及至敗事又無窮須索朝廷知其不可方罷而子淵猶以此藉口歸過朝廷以為不應副非是功不成今李偉與子淵正同而河役浩大又非武濟之比奈何信偉此言一熈寧初巳議移深州至今不能移者人情重遷故也今欲回河雖免深州之患而不顧北京可乎昨沙河第七鋪潰決已逼北京可為寒心今欲移一深州二十年猶不能也況北京之大豈比深州將來河不可測萬一北京被患如何可移一李偉稱北流破放省税近一百萬臣以為此是隄防未理水政不修今若理隄防修水政則河不決溢不占民田河灘可耕省税可復而又東流故道多為膏壤彌數百里皆出省税今為失税而欲回河不知先費用幾百料税一閉塞北流蹙水既髙則上流必深諸處隄埽豈可不慮大抵河患常出入人意外如昨來開第三第四而第七鋪決將來閉合未知為患所在豈可保上流諸埽必無決溢一昨吳安持奏第七鋪危急調過急夫七千人而役兵不在其數用梢芟一百餘萬聞其實數不止扵此下七緷埽皆被吹墊勢如漏巵經二十日用功終扵棄捨任其決潰此乃救䕶積年壯隄上一決口猶不能為力而況兩㟁漸進馬頭扵急流巨浪中旋下梢草客土欲合龍門此必不可為明矣一北流雖有決溢乃是天災非人所為瀕河之民雖被水害然亦有填淤肥羙及漁採之利不聞失業愁苦之嘆今回河向東若有潰決乃是引河水以灌注州縣百姓豈得不歸怨扵朝廷譬如天火人火天火自是災孽人火必有歸咎且自古未有無患之河利多害少即不須改作今北流實有大利豈可以有小害便妨大計一塘濼淤淺非因河決所致熈寧中先帝以塘水多堙廢嘗遣監司以廵歴為名案行檢視此乃積年不修然先帝亦未遑疏濬也且朝廷與契丹通好幾及百年豈是塘水能限敵兵乃朝廷恩信深結其心毎歲饋遺金帛敵貪厚利所以不動若其棄好背盟何路不可入冦豈塘濼所能捍禦朝廷亦何嘗恃此以為險固一河入界河幾二百里乃入海此最為天險實中國大利議者曽不計此乃憂河入北界若入北界當扵初決時一直北注不應却東入海又西隄屢決水還北流此可知向北地形髙仰設使河入北界乃是契丹之災況必無此理一竊聞欲用沙囊以合龍門自古唯韓信用沙囊壅濉水以敗楚兵未聞大河可用沙囊壅合此與范子淵用鐵龍爪濬河無異河水所向土山亦摧豈有布袋盛沙土可禦洪流也一臣見傅堯俞言有人自河北來言北京地無横草石炭非常踊貴此乃九月中所聞未知今更如何聞往年六塔河役民間費錢五百文方了納梢草一束審如此則生靈何辜朝廷聞之豈得不動心也一近依修河司所請降朝㫖下河北轉運司并修河司曉諭州縣民户向去别無科配物料臣竊恐此止是空文物料不出扵民何從而得興動大役豈有不騷擾者但恐朝廷雖降此指揮民間困苦亦無由盡知如役兵死未免只作逃亡申報民夫死則官中更不知數此尤可哀憫也一修東流故道是一大役閉塞北流又一大役此二大役其害已不可勝言非民力所能堪今西戎未欵服萬一更有邉事將何以枝梧一天聖初朝廷遣参知政事魯宗道往滑州相度塞河口功料其後欲塞商河亦下學士院集兩省臺議官議先朝慎重河事如此今倚仗一李偉即興舉大事臣前上言士大夫言不可塞者十有九今采扵中外之論無小無大皆言不可非止十有九而已自古未有違衆作事而能成功者也一修河司奏打量第四鋪已下至孫村口大河水靣即目髙如孫村口二丈五尺九寸者臣聞前年顧臨謝卿材王孝先唐義問陳祐之張景先等衆官講議躬親相視據孫勍等開㙭井筒衆定得有二丈一尺有餘取引不過難以還復故道後來再遣使案視與前所驗無異今修河司所奏巳是河水伏槽之時猶髙二丈五尺已上則昨來夏秋之際漲水必更倍髙何以回奪不過且京師去北京不逺河水深淺地形髙下皆可案驗而二年之間前後所定如此不同豈可不考核虚實坐受欺㒺就使孫村口實為低下要是東行故道大勢已髙流河不快所以就下昔漢成帝時河決平原遣王延世塞之杜欽説大將軍王鳳言延世前受楊焉術以塞河而蔽匿不言不若遣焉與延世雜作延世與焉必相破壊深論便宜更相難極足以分别是非擇其善者而從之鳳如欽言奏遣焉等作治六月乃成古者欲舉大事故欲人為異同反覆詰難至扵窮極然後利害可見朝廷擇而從之昨謝卿材以議不合先罷范子奇至河北纔兩月又以異議罷而専信李偉偏説此中外所以未服也一臣案歐陽修言慶歴中横壠之水自下流先淤是時修為河北轉運使海口巳淤一百四十餘里其後下流既梗乃扵商胡口決據此則先是上流不快上流乃決小吳之決恐亦無異商胡今修河司専閉塞北流而不管故道可行與不可行海口快與不快若海口出泄不快將如之何今只打量孫村口髙下便望成功亦恐利害未盡一李偉稱北流河道動濶三五十里至七八十里然大河行流謂之一􅀈一迭豈能必使之攤平徧滿故每𦂳溜走移或東或西所向即決葢無隄防扼束之弊者臣觀古人唯不欲與水争地故逺為隄防使㳺波寛緩而不廹正以隄防扼束為水之害則多決溢若兩隄相去數十里其河自有中流豈有攤平徧滿之理水退則人皆種麥比及水至麥巳倍收且先帝宣諭唯欲遷州縣以避水而李偉乃欲以隄防束水不唯極非先帝聖意亦正與古人治河相反巳上是河不可回及不須回之事右臣竊以論議之臣止言其理至扵知河事者則言其事今其理巳極為不可而其事又如前之所陳先帝所謂以道治水者言其理而已至扵以人事治水乃後世之弊先帝之所不取也昔堯知鯀不可使治水然而四岳請試鯀者豈固欲違堯意而害天下哉葢當時治水之人未有以易鯀而鯀必執其説以為水可堙塞而治故也仁宗時李仲昌欲塞商胡復横壠歐陽修極言不可執政不聽修而聽仲昌仲昌終以敗事得罪以仁宗之明豈不知修可信而仲昌功必無成然而用仲昌者亦堯試鯀之意也熈寧初張鞏宋昌言欲塞二股河北流神宗遣司馬光等往案視光亦極言不可而鞏等急扵有功纔塞而復決汎濫大名恩徳滄永静五州軍之境以神宗之明豈不知光可信而鞏等功必無成然而用鞏等者亦堯試鯀之意也夫前事不逺後事之師方今四方無虞西北宴然年穀稍稔民力稍紓若更休養數年庶幾有太平之望唯息河役則中外無復一事豈可試一李偉必待如鯀及仲昌而後止也臣考之方册自古壅塞川瀆必有禍敗共工隳髙堙卑以致滅亡鯀堙洪水上帝震怒績用弗成殛扵羽山周靈王欲壅榖洛太子晉深陳禍福以共鯀為戒梁武帝伐魏作浮山堰壅淮水以灌夀陽窮竭境内之力以争一州四月堰成而九月堰壊緣淮城戍村落十餘萬口皆漂入海怨毒盈扵逺邇古今以為無道今塞北流與堰淮何異且梁武以灌敵國今乃自困吾民而河之大又不比淮以此較之尤為不可凡論河役正如邉事搢紳之儒則言和戎介胄之士則言征伐今問儒者必欲息民若問水官必欲興事欲塞河者是用兵之說也欲不塞者是息兵之説也彼水官之欲興役如將士但知攻戰而已朝廷豈可不審擇利害而興天下大役止以為此輩進身之資臣今雖無言責而有官守職在出納通逹上下之情聞見如此不敢不言伏望陛下與大臣平章若審如衆論有害無利即乞早罷河役以幸天下以福生民其修河司兵夫物料可就用修塞諸處決口委外都水使者漸理北流隄防如此則數路人心必安此乃管仲相齊桓公轉禍為福之計也臣言狂愚伏乞少賜裁擇范太史集巻十七

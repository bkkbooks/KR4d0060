body:
  text: 范太史集巻二十一宋范祖禹撰奏議再封還觧鹽置使狀元祐六年七月二十七日準中書省關差官専充制置觧鹽使錄黄三省同奉聖㫖依前降指揮行下者右臣竊以置官不如議法議法不如擇人法者人之所為也官者法之所行也故事之利害擇人為先茍不得人雖有良法亦無所施或反為害雖改置官司無益也仁宗時范祥獻鹽法慶歴四年遣祥與陜西轉運使議其事至八年乃以祥為提㸃刑獄使推行之言者争以為不便皇祐二年遣包拯往視之還言便三年又召祥與三司官議乃擢祥轉運使至和中罷至嘉祐三年張方平包拯請復用祥乃以為制置使自初獻議至此十五年方委以總領其慎重如此之至也葢祥有已試之效故不使兼他職以盡其能此乃先得其人而設官也自祥卒後皆轉運使副兼之熈寧二年以觧鹽判官李師錫為轉運判官自此不除觧鹽判官以永興軍通判兼之今朝廷以轉運司職務不専有害鈔法故欲専置使臣不知鈔法有害是人壊之邪是法壊邪若人壊之也則當懲治其人其人不可别擇任人而已若法壊也則當講求范祥之法修復之而巳臣謹案國史祥之鹽法後人不能易小有増損人輒不便今不考究其法而改置官司官司雖改而法弊猶存則與不改何異若去其法弊而又得人則雖在轉運司亦可也若轉運司侵奪鹽利則重其法禁誰敢違之豈必改易官司哉祖宗時或以提轉兼領或専置使或置判官皆有故事但自嘉祐八年以後不専置使今一旦復之先有勞費故不可不慎重臣竊觀前世承平治道無不簡易而清静唯是唐明皇天寳亂政廣置使名利出百孔朝廷近年増置官司稍多亦不乆而罷今若増監司一員以主之猶愈扵别置使之煩臣前奏已言之矣閔子騫曰仍舊貫如之何何必改作孔子貴其言蓋為治者不尚煩也諸葛亮偏霸之相猶出教曰事有不至至扵十返來相啓告今兹之舉臣之愚見竊謂未安伏望聖慈更賜詳酌謹再具封還伏候勅㫖貼黄檢㑹李師錫以前不見曽除判官蓋判官亦不常置貼黄竊謂觧鹽一司事務必不多故祖宗朝置使時少不置時多自轉運司兼領巳數十年不聞闕事今别置一使則事權不可輕小必與提轉畧均乃可以統攝州縣所主者止是觧鹽一事鈔法利害又未必繫此故臣以為先有勞費封還納后儀制狀八月四日準中書省録黄三省樞宻院奏臣僚議到納后六禮文字今同共看詳擬定逐項合行儀制五禮命使今欲以都亭驛權為皇后行第發冊命使其日皇帝服通天冠絳紗袍御文徳殿奉迎命使皇帝臨軒與册禮使副同日遣皇后入内皇帝服通天冠絳紗袍御福寧殿右臣竊以都亭驛常為遼使館舍今納皇后以母天下而先居之扵遼使之館恐非所以觀示四方為正始之道也臣愚欲乞詳酌以舊尚書省權為行第又發册奉迎命使及皇后入内皇帝皆服通天冠絳紗袍臣謹案古昏禮用冕服無他服之文通天冠絳紗袍本以代古皮弁之服唐開元禮國朝開寳通禮亦皆服袞冕今發册與奉迎同日將以為天地宗廟社稷之主繼先聖之後其可以不致隆乎伏請皇帝臨軒發册命使奉迎及皇后入内並服袞冕以重大昏之禮伏望聖慈更下三省樞宻院參酌庶扵國體為便合扵先王經禮之意所有録黄未敢行下謹具封還伏候勅㫖貼黄議者或謂昨來發太皇太后册寳止服通天冠絳紗袍今納皇后服冕有踰尊之嫌臣謹案冕服祭服也弁服齋服也故南郊致齋服通天冠綘紗袍祭之日乃服袞冕冕服所以交神非所以事親也昏禮將以為天地宗廟社稷之主有鬼神隂陽之義故服祭服與事親之禮不同即無踰尊之嫌臣與鄧温伯等議狀已備論之今服通天冠絳紗袍扵禮無所據臣竊惜聖朝講明一代大典而扵先王之禮無據則未足為法也伏乞更賜詳酌乞進帝學劄子十四日臣以史職侍經筵嘗采集前世帝王學問及記國朝祖宗講讀故事為書八巻名曰帝學可以上助睿覽今已繕寫畢伏望聖慈許令進入取進止進帝學劄子臣先奏撰成帝學一書今奉御寳批進入其書八巻共八册為一幞謹具上進申門下省乞罷瀘州置梓䕫路鈐轄司狀十八日準樞宻院録白皇城使果州刺史梓䕫路鈐轄管勾瀘南沿邉安撫司兼知瀘州張克明元祐三年十二月二十七日再任巳過滿近差下王克平未曾赴任左藏庫使成都府利州路鈐轄王惟純八月十四日奉聖㫖就差王惟純充梓䕫路鈐轄管勾瀘南安撫司公事兼知瀘州替張克明過滿闕右某檢㑹梓䕫路鈐轄元置在遂州元豐中因蠻賊乞弟作過用兵討捕初移鈐轄司扵資州又移扵瀘州皆取一時應副近便即非經乆之制後來蠻事寧息因仍至今不改伏詳祖宗時置鈐轄司扵遂州本以形勢控制兩川非専為戎瀘邉事而梓䕫路鈐轄司轉運使亦得通管與成都府利州路鈐轄不同自瀘州置鈐轄司以來以兩路兵權付一武臣沿邉支郡反節制數十州末大本小邉州偏重事理不順且以西北言之如髙陽之䧺州定州之安肅軍渭州之鎮戎軍慶州之環州皆帥府在内邉州在外今瀘州扵東川路若比䧺州安肅鎮戎環州亦須𨽻屬帥府豈可令一武臣専制更無同領之人況戎瀘邉事至小豈得與西北同日而語哉并檢㑹元祐元年十一月因臣僚上言乞依舊移鈐轄司在遂州朝廷下梓䕫路鈐轄司與梓州路轉運等司同相度轉運提刑司尋具相度梓䕫路鈐轄司依舊移歸遂州委是經乆利便樞宻院奉聖㫖令鈐轄司且依舊在瀘州更候三五年邉事一向定貼奏取指揮自降聖㫖將及六年更無邉事已是一向定貼今因張克明交替欲乞檢㑹前降指揮其新差官更不令帶梓䕫路鈐轄如瀘州須留兵屯守止存留沿邉安撫一司其梓䕫路鈐轄依舊移歸遂州措置事件並依祖宗時故事所貴西南乆逺安便謹具申門下省伏乞詳酌施行伏候指揮乞復邇英閣記注劄子二十一日經筵官同入臣等伏見景祐三年因崇政殿説書賈昌朝奏請詔修邇英延義二閣記注今陛下嚮學稽古間日一御經筵雖史官在前言動必記然講讀之事未有専一纂録臣等欲乞復修邇英閣記注如仁宗朝故事取進止奏乞罷瀘州梓䕫路鈐轄司狀二十六日右臣近準樞宻院録白梓䕫路鈐轄管勾瀘南沿邉安撫司兼知瀘州張克明再任過滿奉聖㫖就差成都府利州路鈐轄王惟純替張克明臣檢㑹梓䕫路鈐轄原置在遂州元豐中因蠻賊作過用兵討捕初移鈐轄司扵資州又移扵瀘州後來邉事寧息當却移歸遂州并檢㑹元祐元年十一月先降聖㫖更候三五年邉事一向定貼奏取指揮今已六年合檢舉取㫖遂具狀申門下省乞詳酌施行并録白送樞宻院續準樞宻院批所差王惟純等巳得聖㫖所有移瀘州鈐轄司歸遂州見别具契勘施行臣伏見河北陜西唯是安撫經畧司専委帥臣至扵馬歩軍都總管即有副總管成都府利州兩路鈐轄亦有兩鈐轄為之副貳今梓䕫路鈐轄及沿邊安撫兩司専委一武臣既不𨽻屬帥府又無别官同領當用兵之際或有從權扵無事之時則為偏重伏詳祖宗朝置鈐轄司扵遂州葢以西南逺方外接蠻夷内則戍兵客土相雜或姦人窺伺大盗竊發淳化咸平中葢嘗如此是故兩川各置兵馬鈐轄司鎮守互相牽制夷事緩急照應逺近適中并檢㑹梓䕫路鈐轄司舊制揀選蠻馬編配罪人並與轉運司同管勾唯是戎瀘夷事則引用皇祐四年樞宻院劄子令轉運司相度事牒赴鈐轄將兵討除外應干軍馬事件鈐轄司一靣行遣措置至熈寧七年察訪熊本奏請應干戎瀘夷事並要梓州路轉運司梓䕫鈐轄司同管勾竊詳先朝制置梓䕫路鈐轄與成都府利州路不同東川既非帥府而鈐轄須在遂州故稍輕其權任主者不一今以瀘州節制兩路以一武臣専領兩司諸路邉州未有此比況瀘南蠻賊作過本因羅茍夷争不償骨價事至細微都監王宣恥不預打誓遂出兵與乞弟接戰邀功以至敗沒朝廷用兵誅討兩川為之騷然自林廣蕩平巢穴諸夷畏懾一向安貼梓䕫鈐轄理當復舊欲乞檢㑹元祐元年十一月先降聖㫖早行措置所有轉運司通管或依皇祐舊法或從熈寧近制乞朝廷更賜詳酌其瀘州止存留沿邉安撫一司梓州路轉運司官須常置使副一員遂州知州選差及任滿升擢並如祖宗朝故事所貴兵權不輕付與西南乆逺安便乞下三省樞宻院并檢㑹前後臣僚所奏及臣前狀施行謹録奏聞貼黄臣竊聞瀘州自置鈐轄司以來官員使臣酬奬供給例加優厚武臣知州素無綱紀是以彼州官吏唯恐鈐轄司復歸遂州檢㑹元祐元年朝廷已下梓䕫路鈐轄司與梓州路轉運司同相度轉運提刑司尋具相度鈐轄司依舊移歸遂州委是經乆利便臣竊謂事理明白無疑欲乞更不再下本路相度只從朝廷措置若瀘州存留沿邉安撫一司令𨽻屬鈐轄司又不减戍兵亦足以防遏夷冦不為無備封還差道士陳景元校道書事狀閏八月八日準中書省録黄節文秘書監王欽臣等乞差真靖太師陳景元校黄本道書每月支錢五貫文三省同奉聖㫖令秘書省具道書目錄付陳景元據目錄扵道蔵取索先校定成本供秘書省委本省官對校餘依所申者右臣竊惟祖宗置三館秘閣以待天下賢材公卿侍從皆由此出不専為聚書設校理校勘之職亦非専為校書也六經之書不可不尊孔氏之道不可不明至扵諸子百家神仙道釋葢以備篇籍廣異聞以示藏書之富無所不有本非有益扵治道也嘉祐中増置編校之官繕寫黄本自此書籍益廣充牣四館朽蠧相仍居其中者固未能周覽而徧校也今又使道士陳景元校道書臣愚竊所未諭議者必曰漢成帝時劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技今使道士枝道書亦其比也臣竊以為不然漢之時以竹簡寫書在天下者至少非秘府不能備非如後世以紙傳寫流布天下所在皆有也劉向總校羣書非一人之力所能獨了故又用任宏等三人然兵書數術方技皆為有用非異端之學也任宏等亦非異教之人也今館閣羣聚天下賢才宜有殫見洽聞之士博極羣書乃使陳景元先取道藏之書校定成本供秘書省委本省官對校皆取正扵景元不亦輕朝廷之體羞當世之士乎又道書除老子莊列已立扵學宫其餘多虛誕不經儒者所不道天下名山宫觀自有道藏館閣所藏唯備數可矣不必使方外之士讎校以崇長異學也漢武帝時董仲舒對䇿以為諸不在六藝之科孔子之術者皆絶其道勿使並進武帝感其言遂罷黜百家表章六經今館閣之書下至稗官小説街談巷語道聽塗説之所造者無所不有既使景元校道書則他日僧校釋書醫官校醫書隂陽卜相之人校技術其餘各委本色皆可用此為例豈祖宗設館閣之意哉夫聖王作事必防其微命出扵上不可不慎昔熈寧中王韶開拓熈河王安石使其門僧智縁隨韶誘説木征時人號為安撫大師今館職之外巳置校黄本官又扵黄本之外有校書道士天下之人必謂之編校大師事雖至微實損國體其秘書省所請乞更不施行謹具封還伏候勅㫖論宋用臣叙官狀準中書省錄黄三省同奉聖㫖宋用臣叙遥郡刺史者右臣竊以宋用臣變亂溝洫開掘縱横欺㒺朝廷錐刀聚斂凡所建置莫非害民大興土木無時休息乂以饋遺交通執政陛下嗣位纔及旬月用臣所領一切停罷京城之人無不歡呼鼓舞用臣所用縣官財物有司終不能詰其多少之數隱盗出沒皆不可知此乃國之大賊民之大蠧所宜流竄遐荒以謝萬姓陛下初政止用寛典特從降黜已移宫觀使之安便今叙復遥郡刺史則團練防禦使將來皆以歲月次第還之何以懲戒姦宄之人伏望聖慈原其罪惡情理難恕永不收叙所有錄黄謹具封還伏候勅㫖貼黄臣謹案唐徳宗之末用宗室嗣道王李實為京兆尹聚斂刻剥順宗即位不踰月貶通州長史市人争懷瓦礫欲擊之後以赦令内移死扵虢州不聞復官今用臣何人貶黜數年復領遥郡恐失中外所望舉監察御史狀二十七日準尚書省劄子奉聖㫖令給事中舉監察御史貳員聞奏者右臣等伏見秘書省校書郎楊國寳京西路轉運判官朱勃皆有文學履行操守堅正今保舉各勘充監察御史任使若不如所舉臣等甘伏朝典薦章元弼劄子十月臣伏見前虢州知録事參軍章元弼學問該洽詞章富贍自元祐三年舉賢良方正召試以丁憂不赴昨䝉特召又以病不克試為人清苦専意扵學伏望聖慈特除元弼太學或諸州教授一官不唯表率士人亦使元弼因得為學成就其才以待任使取進止范太史集巻二十一

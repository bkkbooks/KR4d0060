body:
  text: 范太史集巻六宋范祖禹撰表狀劄子笏記附辭免翰林侍講學士狀十七日右臣準閤門報已降告敕除臣翰林侍講學士兼修國史者聞命震恐無所容措臣竊以侍講學士之職始於真宗所以延登耆儒尊尚經術自神考更定班制止以侍從兼官元豐以來久虚學士之選恭惟先帝神功聖徳在太史金匱石室之藏今将繼五朝之書成一代之典考之故事多委輔臣伏念臣以樸學侍經帷以薄才居史觀徒積嵗月訖無勞能間引親嫌懇辭禁職願從外補少養沈痾乃䝉假以寵名付之事任大懼無以報塞唯速悔尤方今獻臣宗工在位服采必有傑俊可當選掄伏望聖慈改授賢才庶協公議所有告敕不敢祗受謝翰林侍講學士表七月臣某言伏䝉聖恩以臣辭避翰林學士恩命特授翰林侍講學士兼修國史尋具陳免伏奉詔書不允者辭其可辭敢忘故事受其可受祗服新恩中謝洪惟真宗初置講職問學常勤於日昃論經或至於夜分以啓廸於後人俾監觀於成憲先帝更新治職止命兼官雖因革之制不同而經緯之文則一惟熈寧元豐之成烈有金匱石室之舊聞丕顯帝謨尚資史筆追觀列聖之典多委四輔之臣夫何一介之㣲膺此二任之重此葢伏遇皇帝陛下欽明文思齊聖廣淵如日方中法天不息謂二帝三王之道當窮極於髙深一祖四宗之書已光昭於永久惟念終於典學聿追孝於前文以臣夙侍書筵叨塵史觀曲加寵數用示眷留昔魯繆公之於子思亟饋鼎肉燕昭王之於郭隗改築金臺二子者或以無人乎側而不能安或欲致士於逺而先為始如臣陋學敢望古人非懐人爵之可榮竊喜聖心之不倦謝太皇太后表三請鄉邦莫遂告歸之懇四辭禁職獲伸引避之文成命曲廻明綸再降省循非稱震悸交深臣竊以在昔文武之興本由任姒之聖繩其祖武詒厥孫謀教誨之勤詩書所述恭惟睿徳光越前聞大公如天地之無私至明如日月之必照保佑元聖躋登泰寧思出入起居罔不欽故左右前後惟其正篤先朝之成烈有太史之陳編申敕司存俾加論次如臣淺陋曷副選掄此葢伏遇太皇太后陛下丕冒羣生答揚列聖以正君心為定天下之本以守國典為固後嗣之基惟廸前人之光以成昭子之法兼收末學俾贊大猷重念臣病骨支離壯心消落周南一紀已期終老於巖林書殿七年竊覬歸榮於桑梓分安閒散廼寘髙華臣敢不勉企前修益堅晩節庶圗薄效仰答至仁笏記臣伏䝉聖恩特授翰林侍講學士兼修國史者侍言經幄特升嚴近之班汗簡史闈俾綴緝熈之典此蓋伏遇皇帝陛下道法堯舜孝承祖宗永言若昔之猷仰對在天之烈夫何重任猥屬非才當勉竭於衰疲庶少酬於造化又執秩經帷奉邇英之典學紬書史觀揚神考之烈光顧臣何人獲預兹選此蓋伏遇太皇太后陛下坤元至正天造無私積思六經日進聖神之徳垂鴻千嵗眷言簡册之文永肩報國之忠益勵致身之節謝賜對衣金帶鞍馬表臣某言伏蒙聖慈特賜衣一對金腰帶一條金鍍銀鞍一副馬一匹者錫六命之章仰勤司服加三接之禮進視康侯循已無堪在顔有靦伏念臣布韋筮仕徒歩入官經術空踈謝桓榮之稽古史才淺陋慙倚相之讀書驟升清切之班復被便蕃之澤犧尊所棄飾以青黄芻狗已陳加之文繡此葢伏遇皇帝陛下籲俊尊帝養賢及民藩飾羣臣寵綏四海徳必稱服愧無君子之容負以乘車當戒小人之㓂謝太皇太后表華林勸講益親咫尺之威文陛對揚更被龍光之渥省躬非稱拜手若驚伏念臣寛褐一夫疲駑十駕衣緼袍而不恥每欲書紳馭欵段以言歸敢蘄乘駟豈意艸茅之質併䝉車服之華此葢伏遇太皇太后陛下章物采以納民重爵禄以勸士既錫之福又昭其文同緇衣之好賢授之館粲異白駒之食藿加以縶維誓竭忠勤仰酬眷禮進神宗皇帝御筆文字表六年十月四日臣某等言先奉聖㫖編修神宗皇帝御筆文字今已了畢者出而為詔見王者之深心言則成文表聖人之能事著為軌範屬在繼承恭惟神宗皇帝天縱聖文神資睿斷體虞舜之大智躬夏禹之克勤經緯萬機焦勞百慮自朝至昃而不遑暇食昧爽待旦以啓廸後人號令惟行若風雷之鼓舞指麾所定如日月之照臨惟門下省審之司實王命出納之地欽承聖畫洞察物情謨訓具存真逰已逺恭惟太皇太后陛下皇帝陛下並明御極濬哲在躬遹追燕翼之謀仰對丕承之烈将觀成式以起治功申敕司存俾加紬次編之簡冊用資乙夜之觀列於圗書永為大訓之寳臣等謬居職業幸預討論迄奏成篇愧無薄效其御筆十巻目録一巻計十一冊謹具進呈辭賜茶合狀八年二月十日右臣伏蒙聖慈以臣進神宗皇帝御批真筆特降中使賜臣茶一銀合者伏縁三省同進先帝宸筆臣以門下後省舊職亦預上殿所進止是七件在臣殊無絲髪之勞今兹隨例受賜實慙面目伏望聖慈許臣回納庶安分守則臣䝉被睿恩過於拜賜多矣二十六日右臣近奏乞回納賜到茶一銀合準尚書省劄子奉聖㫖不許辭免者臣前後受賜未嘗敢辭今所進神宗皇帝真筆不唯文字至少與中書尚書省不同兼以實無微勞是以不敢避煩瀆之罪伏望聖慈除本省主行吏人支賜外特降指揮許臣回納辭免翰林學士兼侍講學士狀四月二日右臣準閤門報已降告命特授臣翰林學士兼侍講學士知制誥者臣以樸學久侍經帷前䝉誤恩擢處禁職既以親嫌引避天造曲成特修廢官俾專講勸先帝大典付之論撰兼此二任懼不克堪而曾未朞嵗復承人乏顧慙淺陋每簡聖明重念臣早衰多病心力減耗使之執經述史尚可勉彊至於詞翰實非所工誠不足以塵汙玉堂之禁重兼金華之職矧今儒學之英布列中外可備此選不無其人伏望皇帝陛下察臣懇誠特回睿聴追還成命俾安舊職亦所以全覆其短不違所長庶殫薄力少圗報效所有告命未敢祗受二六日右臣近具奏辭免翰林學士兼侍講學士恩命伏䝉降詔書不允者仰煩睿㫖訓諭丁寧内省庸虚伏深震畏輒瀝愚懇再瀆天聴臣伏見仁宗之初孫奭為侍讀學士凡七年乃兼龍圗閣學士又三年以本職出知兖州馮京避親除侍讀學士後為翰林學士不兼侍讀神宗之初司馬光吕公著皆以翰林學士兼侍講初不兼學士之職臣叔祖鎮事仁宗英宗再入翰林治平中以侍讀學士出知陳州神宗召還復為翰林學士亦止兼侍讀不帶學士臣於去嵗䝉除禁職聖恩許避親嫌改授侍講學士今䝉復申前命遂兼舊職是臣因避親嫌不一朞嵗得兩學士在臣之分夫豈敢安朝廷如不許臣辭免新命又以臣久在經筵仍令兼職即乞依舊例止兼侍講不帶學士則於職事無改而不違典故少安分守庶免罪戾貪冒天寵臣無任慙懼激切屏營之至謝宣召入院表右臣今月日翰林待詔秦訓至臣所居奉聖㫖召臣入院充學士者使節光華誤被以旌之召臣衣顛倒豈容俟駕之行閭里生榮搢紳動色臣竊以謀猷入告於内是謂論思號令罔有不臧實繄文翰自唐世始命名此職及聖朝尤慎擇其人宜得宗工進為治表如臣者學雖為已才不逮人蚤塵儒館之逰久備書筵之訪徒勤夙夜無補涓埃五嵗乞骸固已慙於疏廣九年入侍何敢望於桓榮間引親嫌獲辭禁職復膺前命殊匪初心此蓋伏遇皇帝陛下天縱聖神日躋睿智徳剛健而篤實學緝熈于光明登進衆賢兼收一介俾陳薄力以助鴻猷臣敢不䇿勵疲駑激昂忠義苟可益國其敢愛身謝太皇太后表王人将命天詔頒恩望宸極以拜嘉即私庭而示寵省循非稱傴僂若驚臣竊以正王者之心慎在左右鼓天下之動繫乎文詞唯兹翰墨之林實首論思之地仰膺異選宜得偉人如臣者經術不明藝文無取金華勸講獲親日月之光石室紬書俾述乾坤之業曾蔑聞於績效乃罙入於禁嚴此葢伏遇太皇太后陛下洪覆無私大明旁燭急堯舜之先務哲在知人躬任姒之思齊寧於多士况臣一門叔姪三世後先起下國之孤生受累朝之殊遇負荷豈勝於山嶽糜捐何啻於毫毛臣敢不彌激儒衷益堅素守誓不渝於終始庶少答於生成笏記臣䝉恩特授翰林學士知制誥者敷言經幄無禆典學之勤視草詞林實玷右文之選避命弗獲居寵惟憂此葢皇帝陛下慮憲祖宗面稽堯舜克囏厥后無競惟人思廣攬於羣才故曲收於末學唯當盡瘁以答殊私又西學侍經無入神之精義北門掌誥非華國之懿文祗荷寵靈交深愧汗此葢太皇太后陛下照臨區㝢擁佑聖神官不及私人惟求舊無菅蒯之或棄同茅茹以並升冀竭微誠仰酬鴻造謝賜對衣金帶鞍馬表臣伏䝉聖慈以臣入院特賜衣一對金腰帶一條并魚袋金鍍銀鞍轡馬一匹者司服頒衣以儀辨等飛龍出駿凡賞眂功顧惟何人亦預此賜伏念臣文采不足以自表學問不足以有行軒冕之来實惟絶意文繡之美不願施身已叨儒者之極榮復備邇臣之異數此蓋伏遇皇帝陛下慎司名器訓廸臣工以為都士之容宜有常而不貳君子之乘欲既閑而且馳故於侍從之聨特加蕃庶之錫書紳自儆惟敬慎於威儀希驥為心當載加於鞭䇿謝太皇太后表使軺趣召入居文翰之司宸扆對揚薦被龍光之渥省躬非稱拜手若驚伏念臣短淺凡材顓愚樸學謬塵法從誤簡聖知驟膺識拔之私復荷便蕃之錫此葢伏遇太皇太后陛下坤元廣載兊澤旁流道在寶慈人無易物重金飾帶特頒上禇之珍錯綵成韀仍輟内閑之駿仰愧崇賢之禮難逃致㓂之譏惟勉勵於疲駑庶少酬於覆露舉自代狀十八日右臣蒙恩授前件職合舉官自代伏覩國史編修官著作郎集賢校理國史院檢討張耒文章瑰瑋論議閎博必能發揮典誥為國光華臣實不如今舉自代謝勑設表二十四日享有加籩雖循故事與之禮食以示優恩恵浹賔筵榮生官次伏念臣挈瓶小智挾筴陋儒蓬蓽桑樞進處玉堂之禁藜藿糲食驟加雕爼之珍於臣無饋肉亟拜之勤而人有既醉太平之行此葢伏遇皇帝陛下重禄勸士大烹養賢稽虞書膏飫之文從周家忠厚之禮食呦鹿於苹野俾得盡心觴鶢鶋於魯門愧非所養唯當夙夜圗報恩私乞郡劄子一九年三月二十五日臣輒瀝誠懇仰干睿聴退省僭瀆無所逃罪臣自熈寧之初受詔修書先帝末年擢寘儒館陛下嗣位寖加簡拔經筵史館倂兼二任遂塵禁近竭力無補而不離文字之職二十五年兩目昏闇幾於失明早衰多病心力損耗自元祐五年任給事中日乞知襄州一次六年七年又累乞知梓州一任皆不䝉開可臣實何人誤被眷知固當盡死以圗報稱而臣目疾愈甚衰病日加實懼精力不逮瘝官廢職雖填溝壑無以塞責重念臣自入仕以来未嘗歴官州郡今筋力疲憊未敢逺乞近鄉差遣伏望聖慈特除臣京西一郡俾之展力自效因得休養羸疾儻未即死則臣之報國猶有日也伏祈天恩特賜矜允臣無任惶懼激切之至二臣昨日因上殿面陳至懇伏蒙聖諭不須入文字臣受陛下殊常之知雖隕身喪元未足為報固當䖍遵詔㫖靖共職事然臣竊伏自念入侍經席於今九年自元祐以来侍從之臣得在陛下左右無如臣之久者豈可貪冒天寵處之晏然夙夕傍徨不能自已是敢干犯嚴憲剖列私誠伏望聖慈終賜保全特除臣外任一次臣無任恐懼俟命之至三四月五日臣近上奏乞除京西一郡伏䝉聖慈特降詔書不允捧讀震懼無地自容輒復傾竭愚懇干瀆天聴臣伏見仁宗乾興之初孫奭入侍經筵至天聖九年出知兖州祖宗之時侍從出入葢示優容非以在外為踈也今陛下聖哲天縱輝光日新而臣至愚無奭經術自初入侍今九年矣羸薾多病心神衰耗目視昏闇日甚一日是以不勝螻蟻之誠徼幸大恩特許外任俾效薄力因得少遂休養庶幾所疾不至沈痼未即填委溝壑猶當麋軀隕首仰酬天地之造伏望陛下曲廻睿聴早降俞㫖臣無任懇切俟命之至四九日臣近兩具奏乞外任準尚書省劄子奉聖㫖依前降詔書不允者再三為瀆罪不容誅仰恃寛仁亮其誠實伏念臣先於元祐五年八月兩具奏乞京西一郡又奏乞知襄州一次六年三月兩奏乞知梓州一次七年五月六月四奏乞知梓州三奏乞京西一郡然則懇請補外乃臣素心非始於今日也伏望聖慈察臣螻蟻之誠憫臣犬馬之疾累煩宸聴為罪已多曲垂天恩早賜俞允除臣京西一郡臣無任惶懼激切俟命之至謝除龍圗閣學士知陜州表紹聖元年四月北扉入直已竊玷於華塗内閣延登復謬塵於近列付以民社處之藩維祗荷寵私伏増震懼伏念臣受材謭薄逢世休明學不足以造微文莫能於行逺徒以久陪勸講誤被眷知訖無横草之勞素有負薪之疾剡章屢上請郡以行詞禁嚴凝獲解論思之職河圗祕䆳猶叨侍從之班仰惟天地之仁難圖螻蟻之報此葢伏遇皇帝陛下欽明稽古睿智如神廻日月之光幽深必照廓山海之度細大兼容憫駑力之已疲施鴻恩而下濟臣敢不激昂晩節砥礪初心益誓麋捐仰酬覆育謝對衣金帶鞍馬表伏蒙聖慈特賜臣衣一對金腰帶一條金鍍銀鞍一副馬一匹者延閣升華搢紳以為榮遇明廷拜賜車服加於罔功伏念臣寛褐陋儒衡門賤士仰際亨嘉之㑹獲親咫尺之威累塵侍從之班重被便蕃之澤此葢伏遇皇帝陛下寵綏四海藩飾羣臣爵賞所以勸能恩禮欲其稱事臣敢不省身知愧彌堅報上之忠執䇿忘勞益勵首公之節笏記臣伏䝉聖恩特授臣龍圗閣學士知陜州軍州事者伏念臣蚤縁樸學久侍清光誤被聖知累塵法從獲避北門之直復躋内閣之班此葢皇帝陛下大徳兼容至明委照察丹衷之有素垂洪造以曲成誓竭疲駑仰圗報稱陜州謝到任表伏奉告命差臣知陜州軍州事於今月二十六日到任上訖對揚扆宁方違逺於清光分職藩維已布宣於寛詔伏念臣蚤縁末學誤被眷知經幄九年無發明於古訓史闈十載獲紀述於神功非堯舜不言竊慕責難之義惟祖宗是憲仰禆求助之明日月之光螢爝何補乾坤之徳繪畫難工廹衰疾之交侵瀝懇誠而屢瀆獲解近嚴之職猶塵侍從之班惟陜服之舊邦有召公之餘化西當蜀道東邇洛郊稍即便安良為優幸此葢伏遇皇帝陛下欽文稽古濬哲在躬育徳新其輝光典學念於終始謂臣久備顧問每傾竭於肺肝深簡睿明實照知其悃愊曲從所欲用示至公臣敢不上體宸慈俯求民瘼庶有承宣之效少寛宵旰之憂國史院取索實録草沓奏狀六月二十三日今月二十三日準尚書省劄子檢㑹提舉修實録吕大防劄子奏臣昨奉敕提舉修撰神宗皇帝實録今已成書竊聞舊例所修實録草沓史官各收一本照證今来本院所修實録草沓合依舊例又縁别無公案見得欲望聖慈特許依例除定本外将見在草沓各分一本與見在提舉修撰官以備照證外餘依前降指揮焚毁取進止黄貼子稱如䝉賜允委不傳寫漏泄元祐六年十月十二日奉聖㫖依奏六月十八日三省同奉聖㫖令范祖禹将所得草沓限當日如法封角差得力人管押逓舖轉送赴修國史院送納如有傳寫到别本亦同封角送納或轉寫與他人即令自陳如輒隱留當重行貶責者右臣尋依準尚書省劄子内聖㫖指揮将所得草沓并事目共二百一十沓並於當日如法封角共計五籠差職員十将各一人管押逓舖轉送赴修國史院送納去訖外即無傳寫到别本及不曽轉寫與他人委是詣實謹録奏聞并申尚書省照㑹及申國史院乞依數交割訖公文回示貼黄草沓外有官簿五冊係是院例檢閲實録文字亦同分到不敢隠留今并送納合具奏知開封府界居住報應國史院取㑹文字狀今月二十七日準尚書省劄子龍圗閣學士左朝奉大夫范祖禹已降敕命差提舉亳州明道宫左朝奉郎充集賢校理黄庭堅已降敕命差管勾亳州明道宫六月十八日三省同奉聖㫖各於開封府界居住就近報應國史院取㑹文字右臣尋依準前項聖㫖指揮已交割本州公事與通判管勾訖見赴發前去開封府界居住聴候指揮報應國史院文字次謹録奏聞永州謝表二年三月臣某言臣於正月五日準告責授武安軍節度副使永州安置尋於七日起離開封府界於今月二十五日至永州公參訖者罪惡盈積重於丘山仁聖寛容厚侔天地伏讀訓戒感極涕零伏念臣鄙野陋儒荒唐末學往承人乏進備官聨紬太史金匱石室之書紀先帝成功盛徳之事才不稱職罪豈容誅無以仰述對天之休共成垂世之典實由愚闇自速顛隮宜正典刑難逃顯戮尚䝉全貸投畀幽遐此葢伏遇皇帝陛下法唐堯之至仁體虞舜之大智以好生為徳故刑罰必主於輕以不忍為心故昆蟲亦保其命特屈士師之議弗加蕭斧之誅禹下車而泣辜湯開網而祝獸重念臣禀生素弱賦命多竒疾病有年死亡無日今兹越洞庭重湖之國鄰桂嶺炎瘴之鄉形魄雖存喘息殆盡敢不刳心念咎刻骨銜恩螻蟻至微誓答乾坤之施犬馬雖斃永懐帷蓋之仁賀州謝表三年十月臣某言臣先䝉責授武安軍節度副使永州安置準告責授昭州别駕賀州安置臣已謝恩祗受即起發赴貶所於十月十七日到賀州公參訖者竄投湘浦痛省咎諐流放炎荒尚寛誅殛仰荷全貸伏切涕零伏念臣賦性至愚受恩過溢頃居近職嘗有瞽言不慎發於樞機宜即刑於鈇鉞聖心惻隠訖至累年天造㴠容難遏公論由臣迷罔失道狂惑妄行自災厥身以陷大戾百生何補萬死猶輕伏遇皇帝陛下天地施生日月臨照躬蹈堯舜心存禹湯推文王葬骨之仁軫仲尼埋犬之惠雖當殄戮猶或哀矜賜以餘生屏之裔土已投身於魑魅之域将淪骨於瘴癘之鄉儻及泉而有知猶結草以圗報范太史集巻六

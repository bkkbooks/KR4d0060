body:
  text: 范太史集巻四十六宋范祖禹撰皇族墓誌銘左承議郎妻崇徳縣君宋氏墓誌銘君宋氏七世祖太子太師蔡國公彦筠有功于五代時退老及國初為開封人曾祖文質贈左屯衛將軍祖世寧西頭供奉官考良肱左侍禁君年十八適太子右監門率府率令時賜霞帔服率府少孤貧力學欲以立名君喜悉捐簮珥縏帨易書史輔成其志元豐初禁士子㳺宗室甚率府表乞就學外第宗老大人皆不欲率府不敢違君力勸之乃得出諸常與往来者厚具待之客不知其貧未幾疾革聞大宗正方審察率府文藝上朝廷謂宗人曰延吾數日聞召命足矣卒年二十有一實元豐八年十二月二十日既卒率府召試祕書省中等換授通直郎賜五品服今為左承議郎光禄寺丞追封崇徳縣君君性静慧喜翰墨博誦浮屠書戒家人不殺生物初羣居族人㑹廟中有以侈服相尚者君曰新婦家故薄今奉孀姑縫衣裳外不敢及其他也由是尊老皆敬之教諸女諸婦必以君為言侍姑夀光太夫人四年恭恪無間言一男曰志女元阿秀後君一年卒元祐九年二月已酉葬河南永安縣銘曰樂羊斷織勉夫以學聞君之風死者可作如彼稽田勤而弗獲左班殿直妻王氏墓誌銘君王氏父徳用杭州助教母張氏年十六適左班殿直士屹性柔淑奉舅姑惟勤能睦其族人精于音律女工之事元祐五年三月十五日卒年一十九男早夭九年二月已酉葬河南永安縣銘曰作嬪于宗孝敬睦婣云何不淑早隕厥身左班殿直妻魏氏墓誌銘君魏氏曾祖杲贈左驍衛大將軍祖處約贈左金吾衛上將軍父孝祥左藏庫副使母趙氏平原縣君君既笄適宗屬左班殿直士穠元祐八年五月二十九日卒年二十四一女始三嵗矣九年二月巳酉葬河南永安縣銘曰懿彼魏姜柔静順専胡嗇其夀陪祔新阡右千牛衛將軍妻王氏墓誌銘君王氏開封人曾祖士安祖諫左班殿直父益試将作監主簿母張氏歸右千牛衛将軍令劭賜霞帔服性温恭節儉奉身不華主中饋戒殺生物元祐二年七月三日卒年二十有二一男一女皆幼九年二月已酉𦵏河南永安縣銘曰作嬪宗家約禮無華心不違仁夀胡弗遐右武衛大將軍賀州刺史墓誌銘侯諱世資字承之越懿王徳昭之曾孫舒國公惟忠之孫楚國安僖公從信第三十四子母孫氏贈富陽郡君所生母王氏贈永寧縣太君初賜名補太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍賀州刺史侯少聰慧長而敏學長於詩書英宗選置諸宫學官立大小學限以年能記誦試合格者始遷太學得預聴書時多以大宗正司之試為囏故雖年長者往往多在小學侯尚幼首應格於是宗室勸勵執經者衆矣神宗選宗子執事太廟衆皆憚讀冊侯獨以選攝太祝寝疾誡其子曰吾雖無竒節亦自省無大過汝曹慎勿以富貴自驕元祐七年三月十二日卒年四十有一初娶李氏振武軍節度使璋之女封仁和縣君再娶賈氏供備庫使世京之女封崇徳縣君七男曰令錯曰令黌皆右班殿直曰令弮左班殿直曰令紓右班殿直三人未名五女三人早卒二在室九年二月已酉𦵏河南永安縣銘曰於皇神考永世克孝相維宗子駿奔在廟平陽册祝維徳馨香肅恭神人令聞不忘右武衛大將軍嘉州刺史墓誌銘侯諱世職字叔良越懿王徳昭之曾孫彰化軍節度使舒國公惟忠之孫保寧軍節度使楚國安僖公從信之第二十六子母孫氏富陽郡君所生母徐氏太寧縣太君初賜名補率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍右武衛大将軍嘉州刺史侯性警敏髫齔就學宗藩器之年十二安僖公嘗㑹宫傅侯侍坐賔戲之曰聞好讀書有何事侯即對曰資父事君忠孝而已安僖公深嗟賞及長無侈靡玩好之欲聚書至千餘帙名儒碩學之士多從之游趣尚清逺不屑世務志在多識前言往行經籍自娱而已富陽夫人疾亟侍藥衣不解帶灼臂灌頂禱請備至由是崇信佛教深戒殺生居喪哀毁骨立及葬遇大雪跣扶匶行數十里哀感行路晩而好禪宗之學棲心真寂不復茹葷超然有遺俗之意為贊頌至二三百篇曰通明集元祐元年閏二月二十日卒年三十有九支體柔弱如生内外異之娶陳氏南康王洪進之裔右侍禁宗誨之女封夀安縣君自寡居不御脂澤常服大練非祭祀賔客酒肉不陳於前送迎不踰閾能守侯之家法四男長未賜名卒曰令流曰令丙並右班殿直曰令玕左班殿直九女亡者四人第二女適陳寧之次適王正臣第五女適王存皆三班奉職一在室九年二月已酉葬河南永安縣銘曰亹亹東陽敏學而文惟孝惟忠事父事君非茍知之亦行之勤刑于室家壼範有聞右武衛大将軍康州防禦使墓誌銘公諱令㒢字順之昭信軍節度使英國公惟憲之曾孫全州觀察使新興侯從郁之孫䖍州觀察使南康侯世奕之子母王氏河南縣君初賜名補太子右内率府副率歴右監門率府率右千牛衛将軍右監門衛大将軍濵州刺史右武衛大将軍貴州團練使康州防禦使公幼而頴悟喜讀書不好弄動静語黙如成人居父喪哀毁瘠過制事母以孝聞夙夜强學日誦數百言書無所不觀尤工律詩肄業之餘間以習射仁宗嘗試賜弓矢以寵之御家有法閨門嚴肅為人沈厚詳雅趨進應對從容可觀天資清約飲食衣服不事華侈及祭祀賔客則致其豐美素嗜唐史成癖嘗語諸子曰汝曹将補外官當務清白兢慎勿為諂佞貪汙吾每觀李勉林甫之行事正邪如白黑誠宗臣之鑑戒也元祐八年五月壬寅卒年四十有九娶安氏封安福縣君十一男曰子西右監門衛大将軍秀州刺史次未名而卒曰子晉左班殿直曰子噩右班殿直曰子平子貢並早卒曰子亞子霖並三班奉職曰子工子丙子亘皆早夭九女長適左班殿直王冕次適左侍禁張宗晟次適左班殿直王偲次適右班殿直倪圭次適右班殿直張克和次三人早卒一幼在室孫男三人彦國左班殿直彦輔彦廸未仕孫女二人九年二月已酉葬河南永安縣銘曰彬彬公子敏學而藝帝錫弓矢魯邦分器尚論古人以詔子弟厥鑑不逺在唐之世右千牛衛将軍妻劉氏墓誌銘君劉氏開封人曾祖懐懿南作坊副使祖用可閤門祗􅇋贈左千牛衛将軍父漢卿内殿崇班母崇徳縣君趙氏年十五適右千牛衛将軍令振奉舅姑盡婦道事夫以禮閨門雍睦元祐二年正月癸亥卒年二十有一二女皆幼九年二月已酉葬河南永安縣銘曰士㑹適秦其處為劉遥遥厥後有嫁公侯曄曄其榮忽掩諸幽皇城使榮州團練使墓誌銘侯諱仲韠字子儀魏恭憲王元佐之曾孫密國公允信之孫祁國公宗說之子母張氏封清河縣君初賜名補太子右内率府副率歴率府率右千牛衛将軍右監門衛大将軍右武衛大将軍瓊州刺史西作坊使左騏驥使皇城使榮州團練使侯好學不事豪靡為人坦夷睦于宗族博物多能技藝無所不通熈寧中詔宗子服屬疎逺者得補外官授曹州兵馬都監任滿除許州兵馬鈐轄又歴鄆潁二州曹素多盗侯設方計督捕盗發輒得終侯去無留患人賴以安許有殺一家數人而亡去吏不能得侯逐捕指其家執之曰此殺人者也驗之果服在鄆及潁前後守将及部使者以事諉之類得辦治故多薦之者行營場閲軍士㑹天大寒疾作不少輟元祐二年正月癸亥卒於潁之官舍年五十贈密州觀察使追封髙密侯娶劉氏封永安縣君繼室錢氏封仁和縣君八男曰士冰曰士兢皆西京左藏庫使曰士愻荘宅副使曰士訏右侍禁曰士桴左班殿直餘早卒九女長適内殿崇班程保民次適右侍禁彭寅次適西頭供奉官劉公亮次適曹州濟隂縣主簿顔幾道次適三班奉職應發一在室餘早夭孫男十三人不輒不疑皆三班奉職不惑不輕皆三班借職不輟不憖不悔不茹不倦不偏不傳不瑑未仕孫女七人曾孫男一人善孜曾孫女一人皆幼九年二月已酉葬河南永安縣銘曰矯矯公子出而試吏智則有餘莫不辦治夙夜匪懈以身徇公卒為宗藩有賁其終右監門衛大将軍妻王氏墓誌銘君王氏京師人曾祖堯基贈驍衛上将軍祖諤文思副使父曈東頭供奉官母趙氏君端麗聰頴喜讀書善為歌詩精于筆札父嘗竒之年十六適北海郡王之子右監門衛大将軍仲塤内外宗族莫不宜之父監通州酒税君出送悲泣而返數日不食憂思感疾元祐元年四月癸巳卒年二十男女各一人皆夭九年二月已酉𦵏河南永安縣銘曰女子有行逺父母兄弟夫豈不思自約以禮之子于歸出祖其親卒以憂隕觀過知仁定國軍節度觀察畱後追封東陽郡王墓誌銘王諱仲曄字子華曾祖魯恭靖王祖濮安懿王考沂國公宗詠王沂公長子也母杜氏河南郡夫人初賜名授太子右内率府副率歴率府率右千牛衛将軍右監門衛大将軍右武衛大将軍康州刺史忠州團練使濮王三夫人祔濮園預從行還拜潭州觀察使今上即位遷定國軍節度觀察留後初杜夫人娠王七月而生幼多疾不好弄及長儀質端謹性寛而和事上知禮節居家不妄言笑既富且貴奉已尤儉約無聲樂妓妾玩好嗜慾一不以經心平居掃一室終日坐寐其間幽閒閴寂常人所不堪王處之泊如也或勸王曰身為侯伯屬籍親近而所養太薄奚至自苦如此耶王正色曰世人有不免飢寒者吾為宗室賴祖宗之徳致位豐顯其獲温飽為幸厚矣安可為侈汰之事哉每朝廷加官錫賚命既下王憮然曰我不幸有負薪之疾力不足以奉朝請髙爵重禄自取便安死有餘責矣元祐元年七月病劇以聞天子命中貴人挾太醫診治太皇太后撫問尤至癸酉薨年四十有五兩宫傷悼遣内人致奠賻錫加等贈保寧軍節度使追封東陽郡王命入内省供奉官勾當御藥院梁惟簡典治喪事八月已丑具鹵簿鼓吹出殯于城北慶恩佛祠夫人郭氏再娶王氏皆無出終以無嗣九年二月已酉葬河南永安縣銘曰濮國子孫蕃衍而昌沂卒于公以啓東陽猗嗟東陽幼極于病澹泊無欲安以順命寵至而懼居逸而憂流連荒亡爾公爾侯四十五終兩宫所悼孰如王賢而不耉老王雖無子宗不絶世琢石有文以詔来裔太子右内率府副率妻吕氏墓誌銘君吕氏開封人曾祖祐之贈司徒祖士隆贈工部侍郎考䝉吉太子中舍母伊氏適太子右内率府副率子獻事舅彭城公以孝和其夫族以睦嵗時祭祀躬執饌内外親族稱為賢婦彭城公薨居喪盡禮元祐二年六月丁酉卒年二十有三温恭柔恵寡於言笑未嘗以喜怒形顔色精於女工誦書歌詩筆札音律不學而能二子曰伯夷舉進士曰伯通早亡一女亦夭九年二月巳酉𦵏河南永安縣銘曰行潦之藻季女尸之寘諸宗室神實饗之庶聞其風命已亡之三班奉職墓誌銘君諱子琦字韞之宣州觀察使宣城侯從謹之曾孫保寧軍節度使昌國公世享之孫文州團練使令禠之子母平原縣君陳氏以父任為三班借職遷奉職監汝州都作院性孝謹平居深黙似不能言而臨事明敏居官夙夜勤職逺家庭數百里畏慎常若在旁元祐八年七月庚子卒年二十有三娶史氏供奉官永年之女男女各一人九年二月已酉𦵏河南永安縣銘曰其来也孰與之其去也孰奪之宜夀而夭維世之悲三班奉職妻史氏墓誌銘君史氏開封人曾祖逹左金吾衛大将軍祖青右領軍衛大将軍父永年西頭供奉官母王氏年十九歸文州團練使之子三班奉職子琦事舅如父佐夫以法度不敢懈才六月而卒實元祐六年五月癸未九年二月已酉𦵏河南永安縣銘曰母結其褵夫脱其纓如桃之華蕡實未成右金吾衛大将軍袁州防禦使贈安武軍節度觀察留後信都郡公墓誌銘公諱世繁字約之曾祖徳昭越安懿王祖惟正同安郡王考從讜同州觀察使馮翊侯母襄國夫人符氏初賜名補太子右内率府副率歴右監門率府率千牛衛将軍右監門衛大将軍右武衛大将軍嘉州刺史台州團練使右金吾衛大将軍袁州防禦使元祐元年十一月癸酉薨年四十有五公幼孤嶷嶷能自立趣操不羣長而好學嗜書史黄老百家之言無所不觀善歌詩得風人古雅之思嘉祐中上巳仁宗錫宗室燕命射屢中的受賞賚仁宗御書守信義不巧作好碩學精六藝十二字以賜之公持心近厚喜忠孝常戒子弟以燕語無臧否人物當自顧何如爾有以是非言者必艴然郤之或曰豈以為妄邪公曰人之言雖真偽雜出大抵生于愛憎之變吾不願聞也有𨽻卒喪母貧無以𦵏盜公白金以為送具公捕得之置金而釋其罪語人曰吾不欲以金傷孝子之心所受禄均贍族人之孤遺者率常無餘襄國夫人喪既殯與昆弟表乞廬于菆室卒哭而返著忠孝録五巻有歌詩十巻夫人和氏故相凝之後六子曰令閑右武衛大将軍舒州團練使曰令畎太子右内率府副率早亡曰令玧右班殿直次未名卒曰令艟左班殿直次未名卒一女早亡孫男四人子昇承務郎簽書淮康軍節度判官次未名卒子温右班殿直次未名孫女三人長適三班奉職葛逹次早亡次幼九年二月已酉𦵏河南永安縣銘曰王孫嗜學仁祖所知賜札丁寧實寵嘉之東平樂善馬侯戒子寥寥千載公繼其美右監門率府率贈左領軍衛将軍䕶軍天水縣開國子墓誌銘君諱仲靡字和叔魯恭靖王元份之曾孫濮安懿王之孫濟隂郡王宗輔之子母惠國夫人裴氏初賜名補太子右内率府副率遷右監門率府率幼静黙不為遨嬉既長有志于學丁内囏治喪紀奉祭祀盡心竭力不得遂其學問之志繼以育母嬰疾累年躬親藥膳勤苦憂戚傷其生之不幸元祐七年四月戊寅感疾卒年二十有一娶郭氏生二女皆早夭君既殁郭氏服喪盡禮如君之存九年二月已酉葬河南永安縣銘曰濮王之孫濟隂之子志于學問惟才之美濯濯嘉禾方秀而止范太史集巻四十六

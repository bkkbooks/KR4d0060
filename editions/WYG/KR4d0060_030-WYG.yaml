body:
  text: 范太史集巻三十宋范祖禹撰翰林詞草班荆館賜大遼賀坤成節人使回程御筵口宣卿等使華復命郊館留行臨遣近臣特伸飲餞勿辭既醉用副眷懐今差内侍省内西頭供奉官董温之賜卿等御筵想宜知悉班荆館賜大遼賀坤成節人使回程酒果口宣卿等徒馭旋歸山川悠緬抗旃首路柅轄頒恩加錫芳甘式昭勤厚今差内侍省内侍殿頭王祺賜卿等酒果想宜知悉相州賜大遼賀坤成節人使回程御筵口宣卿等壽辰展慶瑞節言歸聊息駕於近藩因肆筵於華館式頒燕衎益示恩榮今差内侍省内侍殿頭梁敦賜卿等御筵想宜知悉賜資政殿學士守吏部尚書胡宗愈乞知揚州不允詔卿昔在先朝素推骾直廼者輔政未幾懇請守藩西蜀宣布流聞甚美以卿舊德宜在朝廷入長天官民望攸屬夫賢人進退繫國重輕而以私恤遽求外補春秋之義不以家事辭王事姑安厥位以副眷懐所請宜不允賜觀文殿大學士集禧觀使蘇頌乞致仕不許詔祖宗以來貴德尚齒鼎槐之老莫不眷留班于大廷表儀百辟卿向由省轄進涖宰司深執勞謙懇求去位置使祠館勉徇雅懐巳退處於丘園尚何殊於田里矧卿筋力克壯聰明不衰中外所瞻足以重國體兹至意無或費辭所請宜不許不允詔古者三公在朝三老在學或坐而論道或就而咨謀身雖佚休不離王室降及後世則異於斯以蟬蛻軒冕為髙以屣遺禄位為潔卿多識前世之載雅意本朝之隆君臣之交禮義相與乞身之請姑務少安所請宜不允賜龍圖閣學士知瀛州曽布乞揚州不允詔卿昔在先朝服休侍從宣力中外靡憚勤勞南臨長沙實濟師役西控青海以威羌戎眷言老成付以北道疆場無事使傳相望緩帯雅歌足以綏靖忽攬封奏欲求便藩尚當勉留以副寄委所請宜不允賜宰相吕大防上劄子乞罷不允詔省所劄子奏重任乆次今兹譴戒所加殆縁臣致伏望獨罷事具悉朕恭聞仁宗皇帝因讀前史嘗諭侍臣漢以災異策免三公莫若罪已以答天眚皇祖有訓禹湯格言朕承宗祧敢不祇服卿位上宰歴年于兹乃以譴戒之來獨祈罷免移過於下非予所聞勉思消復之宜毋重朕之不德所請宜不允賜宰相吕大防等為雨水乞降黜不允詔省所劄子奏伏見雨水過常害及民物皆由充位無補致此災譴伏望特賜降黜事具悉常雨為災厯時不已雖竭精禱未䝉神休隂陽失和衆庶被害側席思咎殆天儆予實頼左右輔臣交修不逮卿等躬任燮理志同憂勞雖引責抗章義深懇惻而遽請避位予何倚毗惟先格王飭已正事不聞歸罪股肱大臣當體至懐共圖救政所請宜不允賜蘇頌第二表乞致仕不許詔昔衛武耋老猶聞箴儆之言方叔壯猷實繄顯允之德卿巳謙避宰席退領祠宫以時造朝精力未艾黄髪在位重於典刑雖嘉知止之風且異尚賢之意勉綏厥服以副眷懐所請宜不許不允詔輔弼之任體貌所隆進退之宜輕重攸繫卿亮采三事施勤四方圖任舊人乆勞於共政賔禮故老尚頼於咨謀而累抗封章願還印紱於卿為美非朕所安所請宜不允賜資政殿學士許將免知揚州乞便鄉一郡不許詔卿自仁皇之末首冠多士宣力中外服在近僚向觧機務出分邊寄及此歸戍改藩東南而累抗奏封懇祈鄉郡過家上冢雖懐桑梓之至情憂國㤀私宜體朝廷之重委往即乃治無或故辭所請宜不許不允詔昔申伯于蕃用寧周室貢禹懐土終老漢廷盖邦家唯欲得賢則人臣豈可自便卿入位丞轄出總戎麾身雖侯方心在王室而近辭淮海逺請甌閩求之故常未有此比祇服成命以副眷懐所請宜不允賜皇叔徐王辭免乘檐子至下馬處不允詔省所劄子奏許乘檐子至下馬處伏望特賜免罷事具悉叔父秉德位冠宗藩入侍慈闈宜有優禮惟予沖人方以孝愛順天下其敢弗欽肩輿造朝矧有故事深執謙退當體眷懐所請宜不允大相國寺大殿上開啓謝晴道塲齋文八月伏以常雨為沴下民其咨祇竭精誠仰祈妙覺天地斂氣山川收雲清風時興白日顯照爰修法㑹庶答慈恩上清儲祥宫開啓謝晴道塲青詞伏以常雨為災厯時不已肅將誠懇仰叩清虛隂沴廓消離明廻照顧惟南畝尚有西成祇案真科用昭靈貺又朱表廼以霖雨害及下民夙夜不寧永思愆咎輙瀝誠懇仰籲穹旻惟神降休時暘協應顧兹寡昧曷動髙明祇建清塲上答鴻施故贈開府儀同三司駙馬都尉李瑋堂祭文十五日惟靈章懿近屬仁祖副車王姬築館蚤膺選尚寵榮福禄累紀於兹旌節在門以侯就第奄終壽考深用䀌傷特設奠筵庶昭恩禮尚饗又下事祭文惟靈外戚藩侯奉車帝壻四朝寵遇遂擁節旄康寧考終奄及襄事褒贈之典視秩三公侑以奠觴慰兹幽穸尚饗又舉靈前一夕祭文惟靈位為戚藩居列主第富貴壽考哀榮始終訃音初聞趣駕臨奠葬期奄至遣使䕶䘮既啓菆塗將及祖載侑以肴醴慰兹營魂尚饗太廟逐室各津漏及滴濕神帳奏告僖祖皇帝等祝文伏以寢廟有嚴威神所宅歳時既乆風雨寖隳攸司庀工揆日祇事敢不䖍告用昭孝誠尚饗賜資政殿學士新除守户部尚書李清臣茶藥口宣卿夙賛鈞衡久臨蕃屏已趨召節入長地官行渉暑塗宜綏福履特加問賚當體眷懐今差入内内侍省内東頭供奉官徐湜賜卿茶藥兼傳宣撫問想宜知悉内外神廟開啓消災祈福道塲祝文二十三日伏以崇慶至仁溥天共戴勤勞成疚治療未平遍欵靈祠仰祈休應所冀祓除災疾降集福祥永庇羣生益隆萬壽尚饗五嶽開啓消災祈福道塲青詞伏以天祚有德神享至誠太皇太后保佑眇躬焦勞庶政偶嬰疢疾未底和平是以夙夜靡遑齋明厯禱惟神望于秩典庇此生民其克相於慈闈永綏安於壽祉太皇太后服藥消災祈福金籙道塲青詞臣夙以眇躬嗣膺大統實頼太皇太后保育冲菲扶持囏危厯年于兹其德惟一至静能乆大公無私天地之所鑒知華夷之所愛戴焦勞遘疾治療未平臣氷淵戰兢夙夜憂慄是用載涓秘殿申敕輔臣案金籙之真科祈琁穹之寳命伏冀三清教父衆聖天宗敷佑宋邦介福文母勿藥有喜獲濟於屯災無疆惟休永綏於壽祉又朱表上帝景命既申鍚於宋邦沖人眇躬實仰頼於文母自總臨於庶政惟思濟於羣生無毫髮之私神天所鑒有惻怛之愛億兆歸心久積憂勤屬嬰疢疾臣夕惕惟厲啓處不遑是用請命皇穹呼窮元父仰惟福善助順棐忱益謙拯其囏厄之虞降以康寧之吉太皇太后服藥奏告天地宗廟社稷祝文伏以太皇太后擁佑眇躬敉寧方夏勤勞遘疾治療未瘳心之憂危靡所底告謹擇良日請命大神伏惟昭鑒精衷曲垂靈貺庶有感格以速和平尚饗皇地祇云請命大祇宗廟云請命宗祊神社稷云請命于故贈永嘉郡夫人王氏堂祭文二十八日惟靈服在内庭奉循法度祗勤夙夜靡有愆違遽殞厥身乃加追命將殯之夕送以奠觴尚饗又墳所祭文惟靈序職宫闈其儀令淑生有禮秩沒有恩榮遣奠菆塗致我誠惻尚饗延福宫穆清殿開啓上祝太皇太后消災集福道塲朱表九月上神孚佑降監孔昭洪造何言至誠必應顧惟眇質獲奉丕基仰繄崇慶之仁大庇羣生之命偶乖和豫實自勤勞是以惕厲薰心齋明滌慮告䖍净宇薦信穹旻延集福祥祓除譴咎所冀勿藥有喜遄底康寧無疆惟休永膺壽考賜諸道州府告諭敕書敕真定府官吏軍員將校僧道百姓等上天降災九月三日大行太皇太后奄棄四海道揚遺命顧念眇躬摧毁荒迷未知所濟咨爾有衆務安厥常以副朕哀諭之意故兹告諭想宜知悉崇慶宫開啓大行太皇太后初七水陸道塲齋文八日伏以功被寰區登真不返法周沙界應供無邊式陳哀薦之誠大啓等慈之㑹冀慿妙界仰奉靈㳺皇帝為大行太皇太后成服祭告祝文昊天降凶四海䘮妣攀號㒺極至痛無文初被縗麻式陳哀薦以今日成服不敢不告尚饗賜文武百僚請聽政第一表不允批答九日旻天降禍大行太皇太后奄棄萬方朕以眇末之身嬛嬛在疚充窮永慕未知攸為而公卿大夫遽以聽事為請夫三年之喪方處苫廬未易縗服乃欲臨便坐見羣臣其可得乎所請宜不允賜文武百僚第三表請聽政不允批答十二日朕遭家不造早失先帝實頼太皇太后保佑眇躬勤勞囏難于兹九載大德未報奄及升遐悼心失圖銜恤在疚卿等乃廹以遺誥奪其哀情雖一日萬幾理難乆曠而終天至痛力未能勝毋遽執於權宜庶獲專於喪紀所請宜不允大行太皇太后二七於崇慶宫設九幽醮青詞十五日伏以慈顔永隔飇馭不留欲報之勤追攀㒺極載嚴禁宇祇建清塲覬慿真聖之靈上濟仙逰之路願回昭鑒深諒精誠賜文武百僚請聽政第五表不允批答昔髙宗三祀亮隂不言滕文五月未有命戒朕自嬰荼苦方此逾旬哀疚在心縗麻在體欲言國政所未忍也而况三事大夫服勞夙夜百司庶尹率由典常官不易方朝無廢事當少伸朕志毋奪喪焉所請宜不允太皇太后山陵務從節儉詔朕恭以大行太皇太后保祖宗之基命定社稷之永圖德參二儀功冠千古憂民惨怛如肌體之有傷克已公清無絲毫之自奉今普天喪恃四海同哀雖築陵髙於泰山備禮殫於萬物顧無以報亦未為多惟遵奉於訓言益光昭於儉德以對在天之盛烈以揚愛物之遺仁縁山陵非乆脩奉深慮有司過有煩勞枉費人力不能仰承遺誥務遵儉省之意其令尚書户部斟酌轉移應副毋得寛剩計置除京西路轉運司自合供辦其諸道非特降毋得妄有進助咨爾中外當體朕懐大行太皇太后殿菆祭告祝文二十一日伏以音容永隔服御如存龜筮協從日月流速爰依正寢祇設菆宫光靈在天攀號㒺極尚饗賜文武百僚請聽政第七表俟終易月之制批答朕惟先王制禮稱情立文君子居喪與易寧戚以日易月斷㤙從權祖宗以來亦未遑改朕外遵遺訓内服通喪雖三年不言仰企前哲而公除聽政抑有舊章卿等叠抗奏封備殫懇欵朕承宗廟之重所不得辭强抑至情興言摧切宜勉從來請俟終易月之制委有司定日施行崇慶宫開啟大行太皇太后三七水陸道塲齋文二十二日伏以真馭不留慈顔永逺仰慿覺力追奉靈㳺祗祓禁塗大陳法㑹庶集無邊之福用資不測之神大行太皇太后大祥祭告祝文二十七日創鉅難任終天永痛祥除奄及易月有期瞻慕几筵式陳哀薦尚饗十月朔資薦大行太皇太后於福聖禪院作水陸道塲齋文伏以仙㳺永逺日御遄流履霜露以增哀想音容之如在仰慿妙覺祗薦真靈恭即仁祠大陳法㑹庶縁勝果用助遐升皇帝逹大行太皇太后與大遼皇帝遺留書十月一日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天佑皇帝闕下閔凶如昨茶苦至深奉慈幄之遺言逹寳鄰之永信特馳使介往致物儀今差龍圖閣直學士左朝散大夫土䕶軍河東縣開國子食邑五百户賜紫金魚袋吕陶西京左藏庫使兼閤門通事舍人上騎都尉太原縣開國伯食邑七百户郝惟立充大行太皇太后遺留禮信使副其禮物具諸别幅專奉書不次謹白大行太皇太后遺賜南平王李乾德衣物示諭敕書敕南平王乾德昊天不弔崇慶上賓廼眷海邦世修藩職奉諱之日銜恤所均申錫遺恩仰承先㫖益肩忠順庸副誠懐今大行太皇太后遺賜卿對衣金腰帯銀絹鞍轡馬等具如别録至可領也賜夏國主告諭遺留詔詔夏國主上天降禍大行太皇太后奄棄宫朝爾自纉世邦早膺恩恤雖畫疆保塞乆未訖於溝封然悔過上章比已馳於使介仰承慈㫖終軫嗣藩緬惟奉諱之辰同切摧情之慕今差供備庫使曹譜齎賜大行太皇太后遺留銀絹具如别録至可領也皇帝賀大遼皇帝正旦書正月一日姪孫大宋皇帝謹致書於叔祖大遼聖文神武全功大畧聰仁睿孝天佑皇帝闕下歳厯更端方春陽之發育鄰邦繼好宜壽祉之綏將善頌所深名言曷既今差左朝散大夫守祕書少監上䕶軍河東縣開國男食邑三百户賜紫金魚袋吕希績供備庫使上騎都尉賛皇縣開國男食邑三百户李昌世充正旦國信使副有少禮物具諸别幅專奉書陳賀不次謹白賜文武百僚請御正殿第二表不允批答朕嗣位以來仰恃崇慶同御便殿端拱䝉成不圖閔凶遽失慈訓哀慕恍惚謦欬如存廹於羣言勉力聽政雖終易月之制方執三年之喪前臨正朝實所未忍興念及此心焉若摧所請宜不允賜文武百僚請御正殿第四表不允批答昔我仁祖神考追孝二后感格天地通於神明垂裕後昆永錫厥類朕庶幾程式率而行之執喪致哀圖報㒺極卿等雖志在家國其亦以禮愛君俾予一人無忝祖考所請宜不允范太史集巻三十

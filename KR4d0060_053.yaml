body:
  text: 范太史集巻五十三宋范祖禹撰皇族追封記故魏王追封記王諱闕英宗皇帝之第四子母宣仁聖烈太皇太后生五嵗仁宗賜名仲格授銀青光禄大夫檢校國子祭酒行太子右内率府副率英宗為皇子王從居慶寧宫英宗即位改賜今諱授金紫光禄大夫檢校太子賔客博州防禦使封太寧郡公進拜耀州觀察使封鄠國公治平元年授檢校太保左衛上将軍二年南郊加檢校太尉神宗嗣位授同中書門下平章事武勝軍節度使封樂安郡王與仲兄今徐王乞解官服英宗喪下有司議不許英宗祔廟畢授興元尹山南西道節度使封髙密郡王熈寧元年出就外傅南郊加特進賜功臣號崇仁保運四年出閤授保信保静軍節度使封嘉王明堂加開府儀同三司功臣號翊戴七年南郊加功臣號同徳十年南郊加功臣號守正後罷功臣號元豐二年加賜公使錢嵗八千緡三年拜司空封曹王今上踐阼拜太保武昌武安軍節度使封荆王贊拜不名五日一朝見于宫中如見大長公主之儀神宗祔廟畢拜太傅武寧鎮海軍節度使元祐元年賜親賢宅以居拜太尉真定江陵尹成徳荆南節度使王自熈寧訖于元豐累請居外第避東宫神宗詔曰朕上承先帝順事兩宫顧豈以子舍之嫌而有間天倫之愛終不許至是懇請今上不得已乃許之三年七月戊申王薨于親賢宅西位之正寝年三十有三比及殯二聖再臨喪再輟朝前五日後一日太常考行守禮執義曰端博聞多能曰獻請以端獻易王名九月甲寅出殯于西門之外王夫人王氏封潭國十男孝哲右驍衛大将軍早卒贈博州防禦使博平侯孝詒孝參孝奕孝騭皆團練使次早卒孝忱孝頴孝愿皆大将軍團練使孝永大将軍七女長封永嘉郡主六人幼王生而秀嶷長而頴異端重明粹孝敬悌順伏膺儒學賔禮宫僚寛仁愛人出于天性在英宗時神宗以長子主器與徐王講學東宫王以幼子日侍宫中神宗既即政上奉兩宫下接二弟怡怡愉愉言必温色必悅賜玉帶玊魚以表異于羣臣天下稱孝友王與徐王居東宫二十年日奉朝請問安兩宫圜丘明堂五陪祼獻動容周旋無不中禮協心同徳蕃屏帝室天下稱賢王今上恭已守成尊禮近屬太皇太后齊家治國内外肅穆王正身潔已慎静而謙無毫髪之私天下稱朝廷至公焉元祐八年九月太皇太后崩天子追惟先后季子之愛哀王之早世薨落将以九年二月已酉從宣仁聖烈之喪𦵏於永厚陵之北命臣祖禹誌王之墓臣承詔既論次王之徳行而銘之矣有司謂當刻石以表神道昭示後世故又取其大畧而書之謹記故鄧國長公主追封記神宗皇帝元豐五年正月乙酉皇太妃朱氏生第八公主于宫邸八年今上即位為同母妹封沂國長公主生而温懿既能言即頴悟性樂閒静如老成人天資孝愛神宗崩乳保初不使主知主覺而固問乃以實吿哀不自勝至忘寝食因感疾十月辛未薨年四嵗時皇太妃䕶神宗靈駕西行聞訃哀其聰哲而降年不永追封鄧國九年二月已酉從宣仁聖烈太皇太后之喪祔于永厚陵昔唐太宗晉陽公主五嵗克孝慧而早夭太宗哀之今鄧國四嵗孺慕繼以薨隕加于晉陽一等矣臣承詔序次本末刻石以表於墓謹記故蔡國長公主追封記神宗皇帝元豐八年正月庚戌後宫武美人生第九公主于禁中今上即位以皇妹封嘉國長公主六嵗慧悟已能弄筆書畫好錦繡女功之事元祐五年正月壬辰薨上輟視朝三日追封蔡國殯奉先資福禪院九年二月已酉從宣仁聖烈太皇太后之喪祔于永裕陵之西原昔宣王考室感熊羆虺蛇之夢生男有室家君王之慶生女無父母詒罹之意以為周徳之隆惟神宗誕受帝祉天屬衆多蔡國始生六年幼有淑質而未及成肅雝之美助召南之化豈非其命也臣承詔既為銘而納諸壙又刻石以表于墓謹記皇族石記右武衛大将軍男墓記右武衛大将軍漳州刺史士鯁第三男贈容州觀察使普寜侯宗儒之曾孫贈同州觀察使馮翊侯仲盤之孫母長夀縣君李氏元祐五年七月庚辰生八年九月癸卯卒九年二月已酉𦵏河南永安縣謹記贈感徳軍節度使惠國敦孝公第三女墓記贈感徳軍節度使惠國敦孝公仲越第三女贈太師信安僖簡王允寜之曾孫贈太尉韓榮思王宗諤之孫母安定縣君楊氏治平四年正月已巳生元祐二年七月甲申卒年二十有一九年二月已酉𦵏河南府永安縣謹記右侍禁女墓記右侍禁士斚長女贈武寧軍節度觀察畱後彭城郡公宗彦之曾孫贈華州觀察使華隂侯仲寂之孫母元氏元祐二年五月丙寅生明年七月丁巳卒始二嵗九年二月己酉𦵏河南府永安縣謹記右内率府副率子右班殿直士捧墓記右内率府副率仲需子士捧贈太師平陽郡王允升之曾孫贈開府儀同三司郯王宗惠之孫母張氏元豐八年六月戊寅生元祐元年三月賜名授右班殿直六年八月甲辰卒始七嵗九年二月已酉𦵏河南府永安縣謹記右監門衛大将軍女墓記右監門衛大将軍士綴第三女贈開府儀同三司郯王宗惠之曾孫右監門衛大将軍榮州團練使仲奚之孫母仁夀縣君馮氏元豐七年七月乙卯生元祐二年正月壬申卒始四嵗九年二月已酉𦵏河南府永安縣謹記右武衛大将軍沂州團練使子三班奉職子淳墓記右武衛大将軍沂州團練使令甄子子淳武勝軍節度觀察留後韓國公從藹之曾孫宻州觀察使世雄之孫母孝義縣君蘇氏熈寜十年十二月壬午生元祐元年遇明堂賜名授三班奉職八年七月乙巳卒年十七九年二月已酉𦵏河南府永安縣謹記右監門衛大将軍女墓記右監門衛大将軍士珥長女贈保寧軍節度使東陽郡王宗悌之曾孫金州觀察使仲微之孫母曰永安縣君黄氏元祐五年十二月戊午生元祐七年七月丙申卒九年二月已酉𦵏河南府永安縣謹記右監門衛大将軍男墓記右監門衛大将軍士謁第二男贈保寜軍節度使東陽郡王宗悌之曾孫金州觀察使仲微之孫母曰夀安縣君李氏元豐三年四月壬寅生元祐三年六月乙酉卒九年二月已酉𦵏河南府永安縣謹記遂州觀察使男墓記遂州觀察使仲碩第六男贈太師平陽郡王允升之曾孫贈保寧軍節度使東陽郡王宗悌之孫母曰遂寜郡君劉氏元祐元年二月癸酉生元祐三年十二月辛巳卒九年二月已酉𦵏河南永安縣謹記右監門衛大将軍女墓記右監門衛大将軍宗漢之女贈鎮江軍節度使追封丹陽郡王守節之曾孫贈鎮海軍節度觀察留後追封北海郡公世符之孫母曰秀容縣君劉氏元豐元年十月十六日生元祐四年五月二十九日卒年一十二嵗九年二月己酉𦵏河南府永安縣謹記右監門率府率第三女墓記右監門率府率仲􅓉之女贈太師尚書令兼中書令追封定王允良之曾孫蘇州觀察使吳國公宗絳之孫母曹氏元祐四年三月十八日生是年八月二十八日夭年一嵗九年二月已酉𦵏河南永安縣謹記右監門衛大将軍女墓記右監門衛大将軍士褒第二女贈華州觀察使華隂侯宗鼎之曾孫贈闕公之孫母長安縣君張氏元豐三年三月甲子生元祐八年九月庚辰卒九年二月已酉𦵏河南永安縣謹記宻州觀察使之女墓記宻州觀察使世雄第十二女贈彰化軍節度使舒國公惟忠之曾孫武勝軍節度觀察留後韓國公從藹之孫母同安郡君錢氏元豐三年二月壬午生元祐四年五月丙子卒九年二月已酉𦵏河南永安縣謹記右千牛衛将軍子右班殿直士瑲墓記右千牛衛将軍仲琨長子士瑲贈太師平陽郡王允升之曾孫贈保寧軍節度觀察留後東陽郡公宗辦之孫母安福縣君沈氏元祐元年六月戊申生其年十一月賜名授右班殿直五年八月已亥卒始五嵗九年二月已酉𦵏河南永安縣謹記右金吾衛大将軍漳州防禦使之女墓記右金吾衛大将軍漳州防禦使令瓊第三女萊州防禦使東萊侯從恪之曾孫武寜軍節度觀察留後魯國公世規之孫母曰延安縣君李氏熈寧三年十二月壬戌生元祐五年十一月已卯卒九年二月已酉𦵏河南永安縣謹記右監門衛大将軍之女墓記右監門衛大将軍令想之長女贈鎮江軍節度使追封丹陽郡王守節之曾孫贈鎮海軍節度觀察留後追封北海郡公世符之孫母曰秀容縣君劉氏元豐元年十月丁巳生元祐四年五月戊戌卒九年二月已酉𦵏河南永安縣謹記右監門率府率之女墓記右監門率府率仲第二女贈太師尚書令兼中書令追封定王允良之曾孫蘇州觀察使吳國公宗絳之孫母曰曹氏元祐四年三月已丑生是年八月乙丑卒九年二月已酉𦵏于河南永安縣謹記右監門衛大将軍之女墓記右監門衛大将軍令想第四女贈鎮江軍節度使追封丹陽郡王守節之曾孫贈鎮海軍節度觀察留後追封北海郡公世符之孫母秀容縣君劉氏元豐八年十月庚辰生元祐三年閏十二月丙寅卒九年二月已酉𦵏于河南永安縣謹記徐王第四男嘉州團練使贈感徳軍節度使永國公墓記皇叔徐王之第四子嘉州團練使贈感徳軍節度使永國公孝錫仁宗皇帝之曾孫英宗皇帝之孫庶母髙氏元豐八年三月丙辰生元祐二年八月乙未卒始三嵗九年二月已酉𦵏河南永安縣謹記徐王第八女墓記皇叔徐王之第八女仁宗皇帝之曾孫英宗皇帝之孫庶母髙氏元豐七年二月戊寅生元祐元年八月已酉卒始三嵗九年二月已酉𦵏河南永安縣謹記太子右内率府副率男墓記太子右内率府副率仲洙長男士虩右班殿直平陽郡王允升之曾孫贈安化軍節度使開府儀同三司髙宻郡王宗逹之孫母郭氏元祐四年九月戊寅生五年八月壬寅卒九年二月已酉𦵏河南永安縣謹記右武衛大将軍康州團練使男墓記右武衛大将軍康州團練使仲杵第五男士鵷右班殿直贈鎮江軍節度使郇國公允誠之曾孫贈静難軍節度使追封新平郡王宗保之孫母長夀縣君李氏元豐五年四月甲子生元祐六年十一月丁未卒九年二月已酉𦵏河南永安縣謹記右武衛大将軍欽州刺史子三班奉職子振墓記右武衛大将軍欽州刺史令穆子子振保寧軍節度使楚安僖公從言之曾孫青州觀察使北海侯世爽之孫母樂夀縣君徐氏熙寧四年五月壬辰生遇明堂賜名授三班借職遷奉職元祐六年十一月丁酉卒年二十九年二月已酉𦵏河南永安縣謹記范太史集巻五十三

body:
  text: 范太史集巻四十宋范祖禹撰墓誌銘檢校司空左武衛上將軍郭公墓誌銘公諱逵字仲通世家鉅鹿國初徙京師後卜葬洛陽因家焉曽祖隱贈太保祖榮贈太傅考斌贈太師中書令曾祖妣何氏祖妣崔氏妣賀氏追封信安永嘉華原三郡太夫人公㓜慷慨喜兵學初以父䕃補北班殿侍寳元康定間元昊擾西陲兄遵為延州西路都廵檢使遇賊死之朝廷優恤其家錄公為三班奉職時范文正公仲淹為陜西都部署公往𨽻麾下范公器之勉以學問待之如子姪延安有募兵十八人號青剛社勇皆絶人一日捕虜誤殺屬羌有司皆論死將刑之公請於范公願赦之以責後效范公亟令毋殺得活者十有三人尹洙為陜西經畧判官趣范公以延州兵取靈武范公召公計議公曰地逺而食不繼城大而兵不多未見其利范公曰君之言然遂決意不復出師洙怒而府中將吏皆誚公未幾涇原任福全軍沒於是向之誚公者以不出師為幸且服公先識陳恭公執中薦公試武藝㑹罷武藝司安撫王文忠公堯臣力薦公材武且有戰功改右班殿直陳公安撫京東屬歳多盗奏請公為駐泊捉賊屯青州陳公嘗謂賔佐曰當今名將無如葛懐敏衆唯唯公曰懐敏易與耳他日必敗朝廷事陳公甚怒後數日謂公曰君何以知懐敏必敗公曰喜功徼倖徒勇無謀可禽也陳公嘆曰君真知兵懐敏今覆軍矣召試入等進右侍禁授真定府兵馬監押㑹保州雲翼軍擁兵馬都監韋貴據州叛安撫使田公況都部署李公昭亮召公往招之公與保州兵馬監押侍其臻嘗同事范公臻為賊所留公馳至城下出紫囊示賊曰此舊物也誰識之者臻應曰臻識之即再拜貴與廵檢史克順亦拜皆曰願君登城相見公乘城徑入開諭禍福皆泣拜請諭衆歸順貴等由此得全然亂兵或疑未肻下且曰或殺降奈何公曰我留城中以為質或殺一人來碎吾身可也衆感激皆請降公悉開所塞諸門以出降兵保州平詔先授閤門祗候然後論功都師嫉之不肯議賞復阬降卒四百餘人公力救之不可求還鎮陽不許俾公守城門不畀以兵不給以食復欲因事中之以法民皆嘆曰完此城者此公也争往饋之乆之方脫去富文忠公弼宣撫河北召公謂之曰保塞之寃盍訴於我公曰賞以閤門職夫復何寃公曰吾知已詳而君不言真長者改雄霸州路沿界河至海口同廵檢又以為定州駐泊兵馬都監進東頭供奉官充環慶路駐泊兵馬都監丁太夫人憂乞觧官三請乃許邊郡武臣小使臣亦許行服自公始服除復授環慶路駐泊兵馬都監大臣薦之乃以為涇原路駐泊兵馬都監兼知鎮戎軍先是夏知漢法不敢過壕每為冦公命邊吏追奔突擊必得所掠而後巳迄公去不敢犯邊皇祐五年秦鳯路通古渭州公受詔以本部兵赴援三戰皆勝遂拔其城擢授禮賔副使尋兼閤門通事舍人改河北路沿邊安撫都監兼同廵檢諸州軍寨搉塲未行選為賀契丹國母生辰副使㑹遼中羣臣上其主尊號請南使同上公與國信使吳公奎固不可遼欲脅之夜聞帷外有兵刃聲公堅卧不起遼人促之急公曰使臣可殺不可屈遼之君臣乃好諭曰北朝盛禮願南使一觀公曰當觀於何所曰立本班公使還報曰不可復命曰立於别次乃入卒觀不賀使還遼人以為言吳公出知壽州公亦降授汾州兵馬都監故相龎公籍鎮并門俾公權知忻州契丹請天池廟以為故疆乆不決龎公委公往議公於故牘得興國中契丹移文天池縣曰遥祀天池廟有應以屬南朝地未敢擅修公以示龎公龎公喜命公自為報命遼遂伏龎公薦管勾河外三州軍馬未受命㑹下溪蠻彭仕羲反加帯御器械充荆湖北路兵馬鈐轄兼知澧州捕得仕羲親信置左右以為小史善遇之乆乃備言山川地形虛實情偽用兵長短嘉祐三年春用小史為鄉導以歩兵進討破羅城峒及賀府等二十餘隘拔新州又銜枚夜進踰旬至仕羲所居桃花州一戰破之仕羲棄城走蠻酋七百餘人仰血乞降公受降以聞賞功拜本司使邵州武岡楊昌透反詔以公為荆湖南路兵馬鈐轄兼知邵州至則潜師夜起徑至賊壘黎明圍數匝昌透登柵大呼公命縱火焚柵斬其將雷鐵城等數軰諭昌透令降昌透曰我平生勇冠諸峒一旦窘此智勇不及施非戰之罪願射公三發不中即降公曰天道助順爾何能為昌透注矢三發皆不中諸蠻驚畏以公為神相率願降并以所領十餘州永輸租賦公受降以聞荆湖南北悉平就差知廣信軍遷六宅使充成都府利州路兵馬鈐轄公曰吾結髮從軍大小戰陣必在其間成都乃享厚禄養資考之地非報國本意固辭不行以六宅使領端州刺史權涇原路馬步軍副都部署明年就加龍神衞四廂都指揮使果州團練使升天武捧日四廂都指揮使加侍衞親軍步軍都虞候惠州防禦使賜號雄勇亮節功臣英宗即位加容州觀察使升侍衞親軍馬軍都虞候馬步軍缺帥詔公入朝兼總二司未幾兼領殿前司上親試田瓊韓存寳武藝不中格皆訴云嘗從郭某涇原有功未賞上命公升殿問之信然乃録用之上顧問邊事公條具方畧以對上甚悦泛論朝廷大事時富公以直諌被讒上問公何如公曰富弼忠亮臣以全家保之上察公可備輔弼治平元年先以公復為涇原路馬步軍副都總管二年正月制授檢校太保同簽書樞宻院事封文水郡開國公改賜推忠佐理功臣及國門公感疾上遣中貴人以國醫來未瘳令平原夫人往視公曰下臣有疾上為天子憂未能造朝而先見家人非禮也令勿下車而返韓忠獻公琦欲寛塘濼之禁同列以為不然論于殿上上甚怒韓公未敢對公進曰臣詳知塘濼利害誠不足恃同列大臣進曰王公設險以守其國豈曰不足恃公曰設險者審權術修法令議制度正綱紀是也未聞止謂塘濼澶淵之役豈無塘濼耶他日誤朝廷守計者必塘濼也歐陽文忠公修進曰郭某之言是也上意遂觧三年領簽書樞宻院事為陕西四路安撫使權涇原路馬步軍都總管經畧司兼判渭州公懇辭樞職上曰初欲授卿宣徽使慮外人以為罷政苐領樞職往重使權公力薦今丞相范公純仁等數人而後行黨羌令征反殺廵檢陳敢朝廷議招懐公以謂始服終叛為梗不已今又殺王官當以威懲之一族既破諸部必降因䋲之以法則邊患當弭遂決意用兵二月師次捺吳川令征挺身來降公不許命執之進師討諸未下者大破之拔䲭鴞訓狐等城乃散諭諸羌俾安心歸業毋若令征自取𠞰絶諸羌畏感争出犒師因駐兵塞外觀覽山川見彊弱利害所在乃城捺吳川又遣諸酋諭青雞川諸部示以威信悉効順又城青雞川二川形勝相恃新附降羌萬餘帳地數百里皆在腹中乃置酒召諸酋犒燕酒酣語之曰汝等今日遂為王臣何以報國諸酋頓首曰惟公命公曰諸羌利牧養而拙耕稼故二川沃壤鞠為荒萊汝等可近山畜牧以閒田來獻諸羌曰謹聞命有吝田者我等為公滅之得良田千餘頃乃下令召弓箭手人受田百畝馬五十匹旬月得壯士千人騎萬匹省屯戍餽運之勞詔奬之賜捺吳川堡曰治平寨青雞川堡曰雞川寨神宗即位加静難軍節度觀察留後復乞觧樞職㑹御史中丞言宰相不押常朝班以為跋扈指公為黨公固請閒郡召還朝至京師闔門待罪上遣中貴人促視事公力辭乃為宣徽南院使充京東西路安撫使判鄆州至州七日拜鄜延路馬步軍都總管經畧安撫使判延州時种諤誘嵬名山降夏人誘知保安軍楊定内殿承制侍其臻右侍禁張時庸殺之邊事方起故命公往初种諤取綏州朝廷以諤擅興生事命公當必棄之公以夏人殺王官而所得綏州復棄徒取輕耳當必留之㑹夏人以衆十餘萬欲復取綏州公遣劉甫屯綏平王雅屯懐寧燕逹守綏州賊攻圍不克而去遣薛宗道同周宗義來告諒祚之喪且請綏州公言不可許又欲納塞門安逺二寨易之朝廷遣今丞相韓公縝故太僕卿劉航來就議公執初議然朝廷曲徇其請許之熙寧二年都囉重進奉誓表以二寨來易朝廷下誓詔予之公曰此正商於之地六百里也韓公問重進曰二寨且獻封界何吝嵬名􅀈寨党移賞浪來交寨公遣機宜官往㑹之夏人欲二寨綏州同日交易公使先交二寨地界然後還綏州夏使曰二寨寨基是也何界之有㑹有詔俾公焚棄綏州公曰一州既失二寨不可得中國為夏人所賣安用守臣為願以死守之藏其詔不出潜訪地界得祥符中西平王檄為驗夏使遂詘而去公以其事聞上大驚顧大臣曰不知綏州今存否亟遣問之大臣皆恐即降詔云某月某日指揮更不行詔至屬僚皆驚曰前詔云何未之見何也公徐出之乃促公焚棄綏州公曰曩遂奉行今則何如將吏皆嘆伏公乃以前詔上且言綏州見存待稽朝命違詔㫖之罪詔褒之曰淵謀秘畧悉中事機有臣如此朕無西顧之憂矣詔數夏國之罪以拒之卒留綏州嵬名山之衆凡一萬二千既降未有以處之公以夏人叵測散居内地或生後患廣務賑貸非可經乆乃户選壯士一人為捉生軍分𨽻蕃將貸以耕具闢延州順安懐寧等曠土以居之夏人欲執景珣來獻以易名山等公上言夏人詐謀不可信若納珣而拒名山則棄前恩生後患異時誰敢嚮化景珣庸人何係輕重朝廷乃拒之初楊定等死公宻詗邊吏得殺定等姓名諜告曰夏人將斬殺定之人於境以謝罪公曰此將斬囚以紿我檄宥州詰之且曰必執李崇貴等來告曰殺之矣公曰崇貴等見存職任狀貌如此何可欺也夏人懼乃歸楊定之子執李崇貴韓道喜以來公遣姪忠紹獻闕下朝廷大臣以秉常初立欲以官爵授其左右任事之人公上疏曰彼主㓜國疑當不受詔借或受之必偽立姓名以邀金繒今既恭順當開布大信以示威靈所加不宜誘之以利果不奉詔如公所料未幾夏以重兵冦邊上手詔賜公曰秉常納欵詞禮恭順朕務來逺以息邊民方降誓詔且備冊命使猶在道兵巳犯塞可具經乆守邊方畧以聞公上言邉人之性不常古無一定之策然乆逺不能易者十事條上之終曰陛下推心委任賢才專意篤行仁義删苛法而寧衆心省重征而安百姓邪佞不聞於耳正直常致於廷天下何憂不和四夷何患不服若攻守方畧應變權宜貴無聲無形不可預言上嘉納之然必欲聞措置大畧遣知河中府蔡公延慶來就議上降問目咨訪利害公具條對附延慶上之明年夏以親軍夾河壯騎侵順安綏平黒水等寨諸將請擊之公曰敵逺來利在速戰其鋒未可當令毋得輕出諜告曰賊糧欲盡矣公稍出兵應之已而綏德城告急曰賊益兵大至定仙山煙火皆滿公曰賊師其遁諸將皆疑公曰鷙鳥之擊必匿其形兵果來豈示人以衆此張虛聲惟庸將乃疑耳終不大出兵賊侵漢地築城鄣暴掠尤甚公曰可矣乃使李安李顒出綏德彭逵出順安燕逹出綏平賈翊出安塞檄宥州及使人諭賊曰夏國違誓詔侵城漢地其罪甚大若能悔過悉聽汝還或不從誅無噍類既而賊棄順安走縱之餘皆拒官軍諸將合攻之斬首數百餘皆棄城遁加檢校太尉改雄武軍節度觀察留後再任秋夏人數十萬聲言將自西路擊延州公遣李顒往東路視之顒未及塞馳還請濟師公復遣往已而賊果自東路由金湯白豹川襲慶州公知秉常在宥州遣燕逵將鋭士悉破夏近邊諸寨聲言擣虛取宥州遣田守度設伏要其歸路吳稹援大順夏人聞之亟還守度要擊敗諸金湯敵衆遁歸韓獻肅公絳宣撫陜西四路种諤帥師將取横山公曰諤狂生耳朝廷以家世用之過矣他日敗國事必此人也韓公與公議出兵公力言不可使幕府與公論難公曰此舉不惟無功恐别生他變為朝廷憂以議不合詔召還朝上問公曰种諤取囉兀撫寧二寨或聞夏人復欲取之當何如公曰願速備撫寧則囉兀無患上曰何也公曰昔夏人取靈武先擊清逺然後靈州失守今撫寧地平而城小戍兵不多萬一用前策則必先取撫寧撫寧破則囉兀隨之上深以為然未及往備撫寧已陷遂棄囉兀明年慶州兵作亂闗中騷然諸郡皆警朝廷憂之拜公永興軍路安撫使兵馬都總管判永興軍至鎮徹警去備追廵邏兵皆還惟以重賞募兵吏入山谷禽盗人情乃安徙判秦州充秦鳯路馬步軍都總管經略安撫使甘谷城通渭寨皆扞西圉甘谷形勢孤絶民不樂業公使増築五城以安民心通渭舊乏水公欲移新城以就水泉黙計城池廣狹功力衆寡召諸將分命之曰趣往治新城期以十日諸將相目莫敢出言公授以方畧亟遣行各至其地則上功攻守之具畢集不踰旬皆成敵駭其神速不敢攻於是邊圉遂固王韶將開熙河依宰相勢多為不法公案其罪韶引邊事以自觧且乞他官覆案朝廷遣大理丞杜純來治先移公判渭州純案韶事皆實宰相怒并坐純更遣御史蔡確來公由是得罪落宣徽南院使知潞州未幾充河東路經略安撫使馬步軍都總管知太原府明年復宣徽南院使時遼人遣蕭禧來議地界上遣吕大忠李舜舉與禧議手詔問公方畧公悉奏之北人有降者衆謂宜納之公曰此得之何益彼或欲交質於我何以拒之頃契丹駙馬劉三賈來歸仍上平燕策朝廷恐以小害大尚且拒之此一番奴欲致我曲耳亟遣之楊復乞河東陜西招懐投來蕃部公奏駮之曰河東扼二敵之交與陜西異誓詔誓書皆以招納為戒今行楊復之議是自求擾也時朝廷有經畧四夷之意於是迎合獻言者甚衆公獨鎮以静重務敦守盟好不求邊功熙寧九年交趾冦廣南陷邕欽亷詔以天章閣待制趙公卨為招討使内侍押班李憲副之已而罷憲更拜公為安南道行營馬步軍都總管經畧招討使兼荆湖南北路廣南東西路宣撫使卨副之公入見上問何以平南公曰兵不可前料願至邊圗上方略上問所須曰願得鄜延河東舊將吏將行宴於便殿賜中軍旗物劒甲以寵之師次潭州遣知欽州任起攻永安州拔之朝廷初降勅牓諭溪峒公以蠻夷不知文告之詞乃直陳八事請散牓郡縣溪峒門州賊將黄金滿岑慶賔來降公遣和斌楊從先將材士數萬戰艦數百艘諸將將九軍及降附諸蠻水陸並進師次邕州遣曲珍討下雷諸峒降之又遣知邕州陶弼集左江諸峒皆㑹於軍次思明州公以謂廣源州咽吭之地兵甲精鋭不先取之則有腹背之患偽觀察使劉應紀為賊謀主不禽應紀則軍聲不振遣燕逹往一戰克之拔其城應紀出降師次決里隘遣張世矩攻之交人以象拒戰公使強弩射之以巨刀斬象鼻象却走自踐其軍大兵乗之賊潰去乘勝拔桄榔縣曲珍攻門州亦拔之溪峒悉降交人伏兵於夾口隘以待王師公知之乃由間道兠頂嶺以進次富良江去交州四十里賊以夾口之計不及施亟以戰艦數百艘先趨富良壁岸下紿告曰和斌楊從先且至軍中皆喜既至則交人數萬鼓譟薄官軍前軍不利公率親兵當之使騎揚言曰大師至矣賊少止麾下士勇百倍公叱騎將張世矩王慜合戰諸伏皆發賊大敗蹙入於江者不可勝數江水為之三日不流斬首數千級殺偽大將洪真禽左郎將阮根乾德大懼奉表詣軍門請降納蘇茂門諒廣源五州之地仍歸所掠子女公與諸將議帥師濟江諸將曰九軍糧盡矣凡征安南兵十萬夫二十餘萬冒暑渉瘴死亡過半存者皆病瘁公曰吾不能覆賊巢俘乾德以報朝廷天也願以一身活十餘萬人命乃班師以乾德降表聞約交人聽㫖公入塞亦疾甚卧䕶諸將城順州及桄榔縣而還詔赦之又罷宣撫司公上章乞閒郡養疾除判潭州朝廷以公不能得交州降授銀青光禄大夫左衞將軍西京安置杜門不出者十年讀書飬氣以自樂今上即位授左屯衞大將軍致仕明年落致仕檢校司空知潞州武功縣男公不敢辭亟就治即告老不許明年復廣州觀察使知河中府徑歸洛陽力請老拜左武衞上將軍提舉西京嵩山崇福宫元祐三年十二月十四日薨於西京嘉慶里第享年六十有七訃聞輟視朝一日贈雄武軍節度使公娶史氏封平原郡夫人六男子忠良左侍禁忠諫左班殿直忠孝承事郎忠臣西頭供奉官忠恕東頭供奉官忠賢左侍禁忠良忠諫皆先公卒忠恕後公踰月而卒女八人通直郎夏大定大理評事錢蕘承務郎胡士修宣義郎吕昭問内殿承制石舜賔承務郎王秉文廣濟主簿范埴皆其壻也一早卒孫男六人孫女三人公初遭母喪慶帥杜杞以邊州金革從事例奪喪聽樂召公强致之公涕泣就坐毁瘠不勝衣遂罷去既詔許觧官行服杞以錢四十萬贈之公謝而不受奉養節儉慕范文正之為人性嚴重不妄言笑為將領宿衞持法不貸下軍政肅然及守邊拊循士卒得其歡心用兵先計而後戰善料敵伐謀戎狄畏其威名節制鄜延夏人嘗㓂秦鳯邊將范愿死之殺掠甚衆公檄宥州索所掠悉得之神宗嘗問公八陣遺法公曰兵無常形八陣特奇正相生之一法耳因為上論之甚詳上大奇之至延安使將吏以八陣教兵久不能成公召諸軍曉金鼔營陣之法者得六十四人使人教一隊頃刻而成先是鄜延雖多屬羌而無法制不足用公擇其勇技出衆者奏官之皆激厲賈勇數萬皆為精鋭兵械犀利為諸路最善用將校每至所部使人人自言所能暇則閲試而記之故所用無失慶州之役主帥歸罪偏裨既斬李信劉甫又治鄜延西路都廵檢使白玉之罪玉見公託以後事且言不得終養老母公惻然哀之曰君苐以我不遣為詞力救之得免明年玉大勝於新寨神宗謂公曰白玉能以功補過今立戰功皆卿之力也公每戰必戒諸將先招懐而後戰鬭故降附多而誅戮少尤愛惜士卒南征既上道有犯罪者或請從便宜誅之公曰若從此殺戮至賊境則我軍將盡矣命一如法令須入賊境乃行便宜殺賊婦女老弱者皆不賞故不以多級為功嘗語其子曰吾用兵隂德多矣公雖以武立名然刻意學問書無所不讀日有程不中程不止自得於聖賢之意者甚多手自錄之曰竹庵精慮又古人言行可師者擬劉向新序編次之以自鑑戒至於隂陽占候百工技藝無不精曉國朝故事四夷名邑用兵地名山川形勢成敗事跡莫不精究喜為詩有五原蘭江二集節制集五巻奏議五十巻經制集五十巻對境圖釋五巻以某年某月某日葬於某鄉某里從太師之兆公在仁宗時有功南海為名將英宗神宗尤深知公遂大用之出入中外常為重輕所至隱然如長城朝廷四方恃以為安論將帥必以公為首及南征困於瘴毒雖不得交州然洪真授首應紀面縛得五州之地全師而返交人畏讋遂不敢動公嘗言曰兵㓙事也必有大獄随之理勢自然無足怪者故公一謫不復振處之怡然晩居洛陽門庭寂如無人治家如官府子弟非冠帯不見及二聖嗣位起公將復用之而公病寖乆無意於世矣年未六十即自有槨棺貯之居第每與客觀之幕府辟士極一時之選趙卨初掌機宜未㡬代公帥鄜延其餘多為名臣世以公為知人初范文正最先知公奬拔之韓忠獻富文忠司馬文正及今丞相范公皆稱公不容口某從祖忠文公嘗曰吾㳺諸公間每見郭公言必及深逺觀知公之人與公之所知雖古之賢將何以加此孤忠孝以銘為請辭不獲乃銘曰惟郭之先受氏自號世有顯庸以踐邦伯桓桓郭公允武允文出入四朝克成厥勲仁宗惟仁天徳不殺疆理南海公初奮伐英宗惟英整肅四方登公樞廷大震氐羌神宗惟神耀我聖武西守南征公為元虎蠢爾交蠻自昔邦讐帝命公往匪亟匪㳺披其五州炎荒是宅功成身危為衆受責釋師十萬躭玩簡編樂以忘憂卒嵗窮年二聖起公將収桑榆公以老告身與疾俱惟其成烈萬夫之特云誰無勇孰如公識不知其人視其所知嗚呼郭公名則不夷范太史集巻四十

body:
  text: 范太史集卷二十三宋范祖禹撰奏議邇英閣奏對劄子元祐七年三月二十七日臣掌國史伏觀仁宗皇帝在位四十二年豐功盛德固不可得而名言所可見者其事有五畏天愛民奉宗廟好學納諌仁宗能行此五者于天下所以為仁也陛下嗣位于今八年昧爽而聽朝旦晝而講學風雨不易寒暑無倦可謂勤于進德矣然而天𠂻淵默聖度髙逺中外之人未知陛下睿意所好如仁宗之五者見于天下羣臣雖欲少禆萬一亦無所自而入方今四海顒顒想望太平臣願陛下深留聖思法象祖宗日新輝光昭示所好以慰答羣生之望則天下幸甚取進止薦陳祥道禮官劄子四月二日臣伏見祕書省正字陳祥道深于禮學用意専精求之諸儒未見其比昨任太常博士上其所著禮書一百五十卷䝉擢置祕省校正之職雖為清流然祥道之學未有所施今太常禮官皆朝廷所選用宜更多得禮學之士則議論有所質正伏望聖慈候禮官有闕員復以祥道充職與理祕書省校正資任如及歲限就除貼職不唯禮官得人亦朝廷器使人才用其所長之意也取進止薦張舉劄子臣伏見前睦州青溪縣尉張舉志趣髙潔詞學清贍治平四年甲科登第以侍親未嘗出官既終養又屏居不仕已二十六年今年四十九歲元祐之初以近臣論薦除潁州教授亦辭不赴臣竊惟朝廷常患士人廉退之風未立無以厲之唯稍奬進安恬之人則奔競者不抑而自息如舉之履行文學豈可使老于巖穴終不收録方明聖在上樂育人材必不其然況前後纍有臣僚論薦不一伏望聖慈特以不次擢置館閣必協士論若以舉未嘗歷官或乞且令校黃本書籍以待任使如䝉朝廷擢用後犯正入已贓臣甘與同罪取進止進家人卦解義劄子五月四日臣近以權住經筵久不進講陛下今月一日巳御邇英又先降聖㫖過端午未住講讀此見陛下好學之至也而臣自五日以後北郊奉祠未獲入侍伏覩中宫初建將行嘉禮實為正始之道王化之基恭惟本朝祖宗家法自三代以還蓋未之有由漢以下皆不及也今陛下納后以承天地以奉祖宗內盡孝養外美風化將以為萬世法臣愚竊為陛下重之謹案周易家人之卦乃聖人所以定天下之端本臣輒不自揆敢撰集所聞先聖先賢之言為解義一篇謹録上進以代奏事伏望聖慈少賜省覽臣無任惶懼激切之至謹進家人卦離下巽上家人臣祖禹曰家人之道以內為主女正則家正矣故其利在女之正彖曰家人女正位乎內謂六二也男正位乎外謂九五也六二以柔得位而居中九五以剛得位而居尊男子居外女子居內男不言內女不言外男女之正莫大于此此天地之義隂陽之分也禮曰天子聽男教后聽女順天子理陽道后治隂德天子聽外治后聽內職教順成俗外內和順國家理治此之謂盛德故天子之與后猶日之與月隂之與陽相須而後成者也其可以不正乎天子者天下之君也諸侯者一國之君也父母者一家之君也君不可以不嚴天子則天下之所嚴也諸侯則一國之所嚴也父母則一家之所嚴也故家人有嚴君焉父母之謂也父得父之道則慈子得子之道則孝兄得兄之道則友弟得弟之道則恭夫得夫之道則義婦得婦之道則聽如此然後家道正推而行之以治天下故正家而天下定矣舜文王是也舜事父母瞽瞍底豫而天下之為父子者定象憂亦憂象喜亦喜而天下之為兄弟者定釐降二女于媯汭嬪于虞而天下之為夫婦者定文王孝于王季太任刑于太姒友干兄弟以御于家邦大學曰心正而後身修身修而後家齊家齊而後國治國治而後天下平象曰風自火出家人何謂也離火也巽風也火在內而風在外家人之道由內以相成故文中子曰明內而齊外也君子之居家也言必有物行必有常所以為家人法也孔子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之所以動天地也可不慎乎初九曰間有家悔亡何謂也處家之初治家之始故必防間之然後悔可亡王弼曰凡教在初而法在始當治之于未變嚴之于未瀆也既變而後治之既瀆而後嚴之則悔矣孟子曰身不行道不行于妻子君子言有物行有常無僻志無淫好所以間家也昔者桀惑于末喜故夏亡紂惑于妲已故商亡幽王惑于褒姒故周亡晉獻公惑于驪姬三世大亂唐髙宗制于武后唐祚中絶中宗制于韋后身陷大禍皆不能間之于初也間之在于人心未變之時故象曰間有家志未變也六二曰無攸遂在中饋正吉何謂也坤之文言曰地道也妻道也臣道也地道無成而代有終也隂不為倡陽不為和故坤道柔順承天而時行妻道無攸遂在中饋則正而吉矣古者女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以供衣服觀于祭祀納酒漿籩豆菹醢禮相助奠后妃在父母家則志在于女功之事恭儉節用服浣濯之衣尊敬師傅故關雎美后妃之德其職在于供荇菜備庶物以奉宗廟又當輔佐君子內有進賢之志而無險詖私謁之心關雎之化行則諸侯之夫人采蘩于沼沚用之公侯之事大夫之妻亦采蘋藻盛之箱筥湘之錡釜以供祭祀之用皆無攸遂在中饋之事也三代之亡皆以孽女亂政不修其職而預外事故武王數紂曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用詩人刺幽王曰哲夫成城哲婦傾城婦有長舌惟厲之階亂匪降自天生自婦人又曰赫赫宗周褒姒滅之皆反此者也九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝何謂也以陽處陽居下卦之上為家人之長剛嚴者也王弼曰行與其慢寧過乎恭家與其瀆寧過乎嚴故家人嗃嗃至于有悔雖危猶不失吉婦子嘻嘻言笑無節終必有吝凡家之道主于嚴敬故象曰家人嗃嗃未失也婦子嘻嘻失家節也六四曰富家大吉何謂也以隂處隂體柔居巽少長有禮各得其序以聽于上故象曰順在位也富者非富于財而已家之富猶人之肥也禮曰父子篤兄弟睦夫婦和家之肥也其大吉不亦宜乎九五曰王假有家勿恤吉何謂也陽居君位以家道治天下者也聖人以天下為一家以中國為一人故視天下如家視百姓如身愛人如愛身治天下如治家孔子曰身以及身子以及子妃以及妃君行此三者則愾乎天下矣太王之道也如此國家順矣孟子曰天下之本在國國之本在家家之本在身修身所以治人正家所以治天下也舜舉八元使布五教于四方父義母慈兄友弟恭子孝內平外成此以家道治天下而四海之內莫不交相愛也詩曰之子干歸宜其家人大學曰宜其家人而後可以教國人先王欲正天下必自家始此家人之盛也故勿恤而吉王弼曰王至斯道以有其家古之人有行之者舜文王是也上九曰有孚威如終吉何謂也以陽居上處家之終誠發于中而著于外人皆信之故曰有孚治家之道初則間之終則嚴之故曰威如間之者制于未變也嚴之者所以長久也孔子曰君子不重則不威傳曰有威可畏謂之威揚雄曰貌重則有威又曰或問何如動而見畏曰畏人何如動而見侮曰侮人夫見畏與見侮無不由已又曰人必其自敬也然後人敬之君子之道本諸身故治家者始于修身終則反諸其身其身正而天下歸之矣身處威敬人亦畏敬之夫如是豈有不終吉者乎故象曰威如之吉反身之謂也舉魏釗劄子臣伏見內殿崇班成都利州路走馬承受公事魏釗資性詳整風力敏彊曽歷邉任所居稱職伏望朝廷更賜考察升擢邉要將領繁難任使以觀其才取進止論求言劄子七月臣聞禹戒舜曰后克囏厥后臣克囏厥臣政乃乂黎民敏德舜曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍已從人不虐無告不廢困窮惟帝時克后克艱厥后者知為君難也臣克囏厥臣者知為臣不易也君知為君之難則不可不求言于臣臣知為臣之難則不可不極言于君如此則政乃治黎民化之敏于為德矣君知為君之難此孔子所謂一言而可以興邦也不知為君之難則所樂者唯其言而人莫豫違也夫為人君出言不善而人莫敢違此孔子所謂一言而喪邦也舜知其如此故答禹曰信如此則嘉言無所隱伏人臣得行其言則天下之士願立于朝故野無遺賢賢人皆在朝則萬國咸寧矣人君能盡天下之善言不遺天下之賢人又動必稽于衆舍已以從人故能不虐無告皆得其所不廢困窮皆得其養惟帝堯能之禹以道陳戒故以此告舜舜以堯為法故以此答禹其要在于聽言用賢從衆愛民而已臣今日所講孟子不敢勸齊王發粟以救饑則與此正相違齊王為民父母坐視齊國饑饉其民將轉死溝壑而孟子不敢復言譬之馮婦摶虎豈得嘉言無所伏哉臣觀齊王不忍一牛之死以羊易之非無仁心也然而不能推愛牛之心而愛民見牛將死則知愛之見民將死則不知愛之是以民饑而不救此所以為不仁也齊人無以仁義與王言者孟子非堯舜之道不敢陳于王前孟子見之時少齊人見之時多譬如萌生之物一日溫之十日寒之雖欲其生豈可得哉此所以為不智也齊王不仁不智由不能聽言用賢也昔仁宗謂輔臣曰如聞州郡嘗于夏秋之際先奏時雨霑足稼穡登茂後或災傷畏罪不敢以聞使民不得免賦租甚非長吏愛民之意乃著令不罪州郡吏而聽除民租又有奏水災過實者有司請加之罪仁宗曰州郡多奏祥瑞至于水旱之災或抑而不聞今守臣自陳墊壞官私廬舍意亦在民豈當加罪也仁宗聖心恤民如此若使孟子遇仁宗之時豈有不言者哉臣願陛下以舜禹之言為法以仁宗之心為心以齊王為戒知為君之難不可不求言求言不可不訪問使嘉言日聞賢人日進則四海生民幸甚仁宗故事伏乞常留聖覽取進止議合祭狀一九月朔日準尚書禮部牒親祠皇地祇三省同奉聖㫖令侍從官尚書侍郎給舍臺諌禮官集議聞奏者右臣等謹案經曰昔者明王事父孝故事天明事母孝故事地察禮曰天子祭天地祭四方祭山川祭五祀歲遍三代之禮天子無不親事天地周禮冬日至祀天于地上之圜丘夏日至祭地于澤中之方丘自玉器牲幣樂舞皆不同由漢以來乃有合祭之文至於國朝踵為故事元豐中神宗皇帝用禮官之議詔定北郊親祀之儀始罷合祭之禮陛下嗣位于今八年將肇祀圜丘而疑于未見地祇欲循祖宗之舊則禮不經見欲如元豐之制則慮北郊或未可行故下有司博議此誠欽崇明祀慎重之至也臣等謹議書曰惟天地萬物父母禮曰地載萬物天垂象取財于地取法于天是以尊天而親地也王者父事天母事地皆不可以不親今三年一郊巳非古典而北郊未有親祠之日若不因見地祇則是尊天而不親地事父而未事母也朝廷審能以夏日至盛禮備物躬祠北郊舉千餘年之墜典此則三王之盛復見于今矣其誰敢以為不然然臣等竊恐北郊之禮未必親行徒崇空文則天子長無親事地之禮亦非聖情之所安也伏請合祭天地如祖宗故事俟將來親行北郊之禮則合祭可罷謹録奏聞太常博士臣張瓛殿中侍御史臣吳立禮之起居郎權給事中臣喬執中權尚書户部侍郎臣蔣奇御史中丞臣李之純户部尚書臣錢協臨翰林侍講學士臣范祖禹臣顧翰林學士兼侍讀二初十日右臣等近于尚書禮部集議親祠皇地祇已具奏聞伏請南郊合祭未聞聖㫖指揮臣等竊以天地特祭經有明文然自漢以來不能行之千有餘年矣昔商因夏禮周因商禮皆有損益孔子曰其或繼周者雖百世可知也可知者亦猶商因于夏周因于商也時異事變不可盡同雖有聖人繼周亦必損益是以先代之禮後代有不相沿前王之禮後王有不相襲唐虞五載一巡守周則十二年豈可謂唐虞非乎蓋周不能行也先帝朝獻景靈宫十一殿一日而遍陛下一歲乃遍亦因時制宜欲可行也合祭之禮臣等不敢逺引前代自太祖建隆四年初郊至于元豐百二十年已成一代之禮後嗣可以遵承天地父母理無不可以並不得言瀆太祖平一海內太宗真宗皆致太平仁宗享國長久英宗神宗紹休聖緒率用此禮神祇饗答非不䝉福報也惟元豐六年用詳定郊廟奉祀禮文所議云殆非所謂以類求神之意遂遷皇地祇之位蓋以地祇當祭于方丘樂以八變不可以升圜丘也夫周之后稷本朝之太祖皆當享于宗廟樂以九變而周公制禮以祖配天未有或非之者也祖可以配則地何為不可以並乎然先帝所以行之者決欲親祠北郊也若先帝能力行之而陛下未能猶當且復其舊況先帝尚未行乎設先帝巳行而復知其難未必不改而從舊也宋興以來太祖郊四太宗郊五真宗郊五仁宗郊九英宗郊一神宗郊三皆合祭不合祭者唯元豐六年一郊耳陛下嗣位八年已再饗明堂當並見天地今初郊祀若循祖宗之舊他日果能行北郊之禮然後罷合祭未為失也今未能用周禮而先罷之他日欲親祠則不果欲合祭則已罷父天母地偏而不備伏恐聖慮未得安也若北郊既不可行而復議合祭則慢神已甚雖燕享賔客猶不可以如此況事大神祇乎臣等不知今欲親祠北郊如之何而可也一年再郊此必不能且夏日之至未易行也减損北郊之儀以就可行是于父母有隆殺也南北郊與明堂間祀則南郊愈疏亦未為得禮也或六年或九年而一郊此豈周禮乎如此則北郊之禮必為空文未有可行之日也今近舍祖宗百餘年已行之禮而欲逺復三代千餘年不舉之祭去所易而就所難守周禮為空文虛地祇之大祀失今不定後必悔之伏望聖慈早以時決無疑于祖宗之舊以昭大孝之隆圜丘合祭依熙寧十年典禮則四海羣生並受其福臣等忝備近臣義不敢默謹録奏聞進合祭故事劄子太祖南郊四合祭太宗南郊五合祭真宗南郊五合祭封禪一昊天上帝皇地祇汾隂一祭后土恭謝一合祭仁宗南郊九合祭明堂二一合祭恭謝一合祭英宗南郊一合祭神宗南郊四三合祭年一罷合祭元豐六右謹進呈范太史集卷二十三

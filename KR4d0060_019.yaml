body:
  text: 范太史集卷十九宋范祖禹撰奏議薦士劄子元祐五年正月十九日臣聞報國之忠莫如薦賢負國之罪莫如蔽賢昔臧文仲知柳下惠之賢而不舉孔子以為竊位又以為不仁臣蒙陛下纍加拔擢置之諌省又遷門下兼職經筵于今纍年受恩深厚無禆毫髮常思竭盡愚慮無有所隱庶幾以此少酬萬一竊慕古人報國以薦賢為忠實懼有臧文仲竊位不仁之罪臣今有劄子四道並乞留中若陛下以臣言薄有可採乞出自聖意處分則臣之幸如以臣言為不然臣不敢避妄言之誅惟陛下裁赦臣無任震懼之至取進止乞留中一臣伏見經筵闕官宜得老成之人以重其選韓維素有鯁直之稱先帝以維東宫之臣眷遇甚厚維與王安石不合以此齟齬不至大用未嘗少屈于安石之黨天下皆以為賢陛下用為門下侍郎中外皆謂得人維于政事雖有執滯不通然其人風節素髙疾惡如讐姦邪畏之前年罷免不聞顯過今義領宫觀乃與章惇為一例甚非宜也先帝東宫之臣唯孫固與維二人見存陛下所宜加禮若召維以經筵之職不唯學識論議足以開益聰明維有人望物論必大以為愜臣竊恐執政以維觸忤陛下故不敢言夫君之于臣如父之于子有過則譴而逐之怒既息則召而使之豈有終怒而不解也陛下嗣位以來言事之臣亦嘗以所言過當上忤陛下或罷其職或出之外任已而皆復召還擢用是以天下皆知陛下聖意至公不以喜怒進退羣臣昔仁宗平生無怒唯是唐介彈文彥博其日仁宗極怒貶介春州别駕尋復悔之改介英州未久復召為御史因此重介剛直驟拔擢至兩制天下皆知仁宗不徇喜怒最為盛德陛下若出聖意復召韓維天下必皆伏陛下之至公此深為聖德之美取進止二臣伏聞翰林學士承旨蘇頌近乞致仕陛下巳降詔不允臣竊見頌博聞強識白首好學至于詳練國朝典故尤非諸臣所及熙寧中王安石用選人李定為御史頌知制詔封還詞頭再三不肻草制坐落職歸班二年方除一郡其後又為姦臣所惡追攝對獄卒無一事恐其進用排斥在外然先帝素重其博洽召令修書眷遇保全以至今日更歷夷險操守不變方今朝臣資望履歷未有先于頌者頌年七十有一精力不減少壯之人陛下左右宜得殫見洽聞之士以備顧問臣竊慮頌别有陳請伏望聖慈且留之經筵取進止三臣伏見知杭州蘇軾文章為時所宗名重海內陛下所自拔擢不待臣言而可知臣竊觀軾忠義許國遇事敢言一心不回無所顧望然其立朝多得謗毁蓋以剛正疾惡力排姦邪尤為王安石呂惠卿之黨所憎騰口于臺諌之門未必非此輩也陛下舉直錯枉别白邪正以致今日之治如軾者豈宜使之久去朝廷況軾在經筵進讀最為有補臣愚伏望聖慈早賜召還今尚書闕官陛下如欲用軾何所不可朝廷選授常患乏才每一官闕久之不補今有一蘇軾而不能用不知更求何者為才也臣竊為陛下惜之取進止四臣伏見刑部侍郎趙君錫孝行書于英宗皇帝實録臣案實録尚書工部侍郎趙良規傳云子君錫甚孝以良規老而酒色不節棄官出入臥起隨之昔周宣王欲得國子之能導訓諸侯者樊穆仲稱魯侯孝宣王乃命之大雅宣王之詩曰侯誰在矣張仲孝友言宣王使文武之臣征伐與孝友之臣處內古之選臣先取其孝蓋孝者人倫之冠百行之首也人君與孝友之人處則德性粹美而風俗淳厚是以輔導人君者宜莫如孝也君錫之孝士大夫所共知為人溫良恭敬動有規矩給事中鄭穆館閣耆儒操守純正中書舍人鄭雍慎靜端潔言行不妄穆雍久在王府清謹無過此三人者皆宜置左右備講讀之職如經筵闕官伏望聖慈于此選擇取進止進無逸講義劄子臣今月七日準入內供奉官李稱傳聖旨今日邇英閣講過無逸義令詳備録進臣今寫録進呈二月八日侍講臣范某劄子傳宣進講義劄子臣等準入內押班梁惟簡傳宣今後邇英閣説過所引證口義令次日别具進呈臣等已知委訖二月八日臣司馬某臣吳某臣范某劄子乞疏決劄子二月十三日臣伏見陛下以久旱疏決在京及三京繫囚聖心焦勞欽恤庶獄祖宗以來赦過宥罪多蒙嘉應然今溥天不雨旱災甚廣恐刑獄寃滯以傷和氣者不止于四京臣伏願陛下因推惠澤以及四方詔諸路轉運提刑司官疾速分詣所屬州縣引問見禁罪人疏理決遣仍先遍行指揮疾速結絶無令淹延深戒官吏務察寃枉使朝廷德意及遠感動人心庶可消弭大異取進止貼黃乞留中特出聖意指揮又祖宗時遣決獄或詔逐路監司疏決其例不一欲乞參酌論支錢和雇修河人夫狀三月六日中書録黃尚書省送到元豐庫狀準敕三月二日同奉聖旨特支賜元豐庫錢二十萬貫和雇人夫令都水監相度分劈與南北丞地分并深州及應係將來取旨緊急須合預先興功去處功役仍不得令州縣科差尚書省看詳元豐庫既無河北路起發上京錢物即難以兑那三省同奉聖旨于河北東西路提刑司封樁舊法坊場免役內特就便支給錢二十萬貫餘依巳降指揮所有令元豐庫支錢指揮更不施行者右臣伏詳二月六日所降聖旨權罷修河放罷人夫衆論皆謂東流故道夫役當罷其北流河水見行地分則當修葺固護以備夏秋水患實不可罷陛下哀憫百姓不欲科差所以今月二日續降聖旨支賜封樁錢二十萬貫和雇人夫自降此指揮外議皆謂南北丞地分并深州合興功役外所有應係將來取旨緊急預先興工去處即是李偉所領東流故道回河之役緣二月六日聖旨內有候今秋取旨之文所以三月二日聖旨又帶下將來取旨去處功役陛下以久旱欲息民勞北流興役蓋不得已而修河權罷未一月東流功役復興竊恐枉費國財重為無益河北百姓見此次第依前惶惶伏望聖慈于今來支提刑司封樁錢指揮內除先降聖旨應係將來取旨緊急須合預先興功去處功役一節更不施行外餘依已降指揮以協中外之心臣已封還李偉請給等録黃乞罷李偉差遣所有今來録黃亦未敢行下謹具封還伏候敕旨乞優恤蔡延慶家劄子臣等伏見故龍圖閣直學士尚書吏部侍郎蔡延慶被遇先朝遍歷華近出守方靣入典京畿宣力中外實著聲迹先出繼伯父故參知政事齊既而歸宗盡推財産以與齊子贍給族人無所吝惜身殁之日家計索然今將歸葬潁昌府陽翟縣聚族衆多並無居止伏望聖慈特依近例優賜賻贈及下潁昌府應副葬事并差蔡河人船津送靈柩家屬并乞領潁昌府差人到出陸處津般至陽翟縣仍許借本縣官屋居住免致孤遺失所以稱朝廷禮待侍從仁恤存歿之意取進止乞車駕所過不毁民屋劄子四月十二日臣伏見祖宗時執政大臣第宅散居諸處或遇亡歿車駕臨奠儀衛簡省雖入隘巷亦不拆毁民屋自熙寧初置東西八位八臣所居近在闕門雖有臨奠更不經歷街巷昨來曹佾之喪二聖臨幸有司毁拆屋舍太過居民不無失所雖百姓多侵街蓋屋毁之不敢有怨然因車駕經過比之他處獨被煩擾恐非陛下仁聖子育萬民之意也今孫固亡殁巳在外第街道甚逺竊慮車駕臨奠有毁拆更多臣愚欲乞先降指揮除大段窄隘處量加撤去外無令過當拆屋庶使聖駕所過小民知恩取進止乞車駕不出劄子臣等今日入侍經筵伏見皇帝陛下氣體清羸猶未復舊適聞來日車駕欲出臨奠孫固緣固家見居石頭巷往來甚逺又方盛暑竊恐聖躬初就康復正當保護未宜衝冒昔唐太宗欲出臨髙士廉之喪長孫無忌伏馬前流涕切諌太宗乃還并檢天聖故事宰臣張知白參知政事魯宗道薨殁兩宫亦不並出臨奠伏望聖慈更與執政大臣詳酌特罷臨幸取進止四月十三日侍講臣司馬康臣范祖禹侍讀臣趙彥若劄子貼黃臣等三人今在實録院更不及與范百祿吳安詩同共聞奏邇英留對劄子五月臣伏見仁宗皇帝慶歷元年七月出御製觀文鑒古圖記以示輔臣皇祐元年十一月御崇政召近臣三館臺諌官及宗室觀三朝訓諌圖臣竊以古之帝王常觀圖史以自戒仁宗皇帝講學之外為圖鑒古不忘針警以養聖心又圖寫三朝事迹欲子孫知祖宗之功烈如目覩之二圖皆嘗頒賜臣僚禁中必有本臣願陛下以永日觀書之暇間覽此圖可以見前代帝王美惡之迹知祖宗創業之艱難不唯有所戒勸易于記省亦好學不倦之一端也取進止乞復降詔恤刑狀六月四日右臣近準中書省録黃節文尚書省檢準元祐敕諸獄暑月五日一次湯刷枷杻其罪人以時沐浴五月二十五日奉聖旨令刑部遍下諸路開封府界今後每歲暑月依上條施行者臣檢會祖宗舊制每歲冬夏降詔恤刑自太宗皇帝雍熙三年以來纍聖遵行未之改至熙寧三年編修中書條例所奏委逐路提點刑獄司每歲于四月十月檢舉牒逐州長吏訖奏臣竊惟祖宗欽恤庶獄特從朝廷降詔蓋當盛暑大冬之月使普天之下至于海隅狴牢囹圄之中皆知聖主深居九重而憫念及之此所以為仁恩也今令刑部遍下諸路雖重于提刑司檢舉然州縣奉承宣布及書之史册猶未若恤刑之詔臣竊惜之欲乞依祖宗舊制令學士院每歲冬夏降詔仍自今年十月為始以副陛下仁恤刑獄之意編孟子節解劄子臣等準入內供奉官徐湜傳宣奉聖旨令講讀官編修孟子節解作一十四卷進呈臣等已知委訖六月八日臣司馬康假臣吳安詩臣范祖禹臣趙彥若臣范百祿劄子乞免館伴狀六月十八日右臣今月十八日閣門告報已降敕命大遼國賀坤成節人使到闕差臣充在京館伴使者伏念臣久苦脾胃之疾經年不愈造朝供職雖粗可勉強竊恐應對使客以病闕事伏望聖慈矜允特賜改差所有敕命臣不敢祇受依奏乞司馬康給俸劄子臣等竊見著作佐郎兼侍講新除左司諌司馬康自今月一日以疾請假尋蒙恩旨給寬假將理準條便合停俸康素清貧加以久病用醫才住請受已見不易伏望聖慈矜恤特降指揮下有司令依熙寧中常秩例特自停給月日依舊支給庶使其家不至窘乏以稱陛下遇康之意取進止六月二十一日侍讀臣范百祿臣趙彥若侍講臣范祖禹臣吳安詩劄子尋有旨給俸舉張咸賢良劄子七月二十二日臣伏見前陵井監仁夀縣令張咸素有履行富于文學元祐三年有近臣舉應賢良方正能直言極諌科蒙召試祕閣以不中第復歸本任臣竊惟朝廷復方正之舉欲求絶異之才若稍誘進則士知嚮慕或自前舉報罷益強于學今官滿赴闕欲就再試而兩制以上所舉人已足逺方孤進無由自逹伏望聖慈特降指揮與免奏舉許令就試庶使寒畯之士不至遺滯取進止舉學官劄子臣伏見朝廷分置學官以教養天下之才近歲增廣員數師儒之任尤難其選寒逺之士無因自進乃如臣輩所當稱舉以待上用也臣竊見左宣德郎劉渙瀛州防禦推官知峽州夷陵縣事李傳新授滄州南皮縣令張景仁皆詞學優長履行修飭為士人所推重並堪充太學博士正録及諸州教授伏望朝廷更賜考察選用以助長育人才取進止乞優恤司馬康家劄子九月七日經筵同入臣等伏見直集賢院提舉西京嵩山崇福宫司馬康操履端方學問深逺士大夫共推其賢以為能繼其父陛下采于人望置在經筵所補實多近擢諌職未克就命不幸疾病遽至亡歿唯有一子承奉郎植才十三歲二女幼稚家世清貧一旦遭喪巳聞窘乏伏望聖慈特優賜賻贈以恤忠賢之後仍乞多差廂軍兵士津送本家一行并差汴河坐船及兵梢載送行李等並至西京候有葬期乞下合屬去處應副取進止乞照管司馬家并留使臣劄子二十五日經筵同入並依奏臣等伏見元祐元年九月司馬光薨十月降聖旨勘會司馬康將來在陜州夏縣墳所仰河南府常與照管本家骨肉及園宅等至十一月又降聖旨司馬光置到西京第宅園池及賜書令司馬康常切照管不得破動今司馬康身亡子植才十三歲本家往陜州夏縣營葬却歸西京居住先有三班借職溫景純係司馬康居父喪日奏留本宅管勾理監當資任合至元祐六年十月任滿緣康妻子孤幼今來居喪營葬更不比康存日欲乞特再降聖旨下河南府令常與照管本家骨肉及園宅等并再降指揮所有西京第宅園池及賜書令本家常切照管不得破動及乞候溫景純滿日特再差管勾一次與理監當資任仍乞下西京帖付溫景純照會遵守昔唐憲宗時魏徵子孫典宅于人淄青節度使李師道進絹請贖之翰林學士白居易上言太宗嘗輟殿材為魏徵起堂今其子孫貧乏自可官中為之收贖不宜令師道掠美憲宗深然之然則褒恤名臣之後貴其施之于上也今司馬光父子忠賢百姓追思不忘而妻子孤幼已蒙聖恩優恤備至其第宅及賜書本家必當保守更乞降一指揮并留一使臣再任則其家始終受賜皆出朝廷伏望聖慈特賜矜察取進止進無逸講義劄子十月二十八日臣近於邇英閣靣奏乞候講尚書畢録無逸全篇講義上進以備聖學溫尋臣等今編寫成一册謹具進呈乞看詳陳祥道禮書劄子十一月二日得旨送兩制看詳臣竊以國家之用典禮為急典禮之學制度尤難太祖皇帝時命國子司業兼太常博士聶崇義考正禮圗采唐張鎰等舊圗凡六本撰成三禮圗二十卷奏之太祖下詔嘉奬令太子詹事尹拙等集儒學三五人更同參議又下工部尚書竇儀裁定其三禮圗畫于國子監講堂臣伏見太常博士陳祥道専意禮學二十餘年近世儒者未見其比著禮書一百五十卷詳究先儒義説比之聶崇義圗尤為精審該洽昨臣僚上言乞朝廷給紙札差書吏畫工付祥道録進今聞巳奏御降付三省臣愚欲乞送學士院及兩制或經筵看詳如可施行即乞付太常寺與聶崇義思相參行用必有補朝廷制作取進止薦曾孝純劄子臣伏見奏議郎曾孝純故太傅公亮之子節操履行皆人所難好學修身深自藏晦年十七歲為殿中丞今三十七歲出官以來並不磨勘熙寧中鎖廳應舉得解省試下第及公亮薨先帝特賜孝純同進士出身孝純以父存日曽許奏一族人而未及奏堅辭出身乞回授族人一官以成父志先帝許之自元豐元年丁父憂服除即乞尋醫至七年先帝持除太常丞以不參吏部乂不就命臣竊以孝純恬尚之節雖在巖穴之士寒逺之臣猶當旌顯以厲風俗而況三公之後勳臣之世豈可有滯才而不用乎伏望聖慈特加不次升擢或處以館閣之職朝廷必有得人之美臣忝備侍從不敢不言乞賜詳察取進止范太史集卷十九

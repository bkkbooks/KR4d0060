body:
  text: 范太史集卷十八宋范祖禹撰奏議論大使臣持服狀元祐四年十二月十五日右臣近準樞密院録白髙陽關路兵馬鈐轄兼河北第六將楊永節為母亡乞解官行服續據本路都總管司奏乞不許本官解官行服所貴得人協力勾當奉聖㫖依髙陽關路總管司所奏者臣檢㑹元祐編敕諸武臣丁憂者若係小使臣及原是軍班换授并見任管軍或充緣邉路分總管鈐轄都監知州縣城都監寨主都同巡檢雖係大使臣並不解官其乞解官行服者除緣邉任使奏候朝㫖外餘並聽臣竊以小使臣不解官行服已損孝治之風朝廷恤小官非俸祿無以養不得已而未之改耳自大使臣以上官既升朝祿亦足養而緣邉任使亦不解官其乞行服者又須奏候朝㫖帥臣因而奏留朝廷重違其請循例奪服唯狄詠是狄青之子帥臣為之奏請特許解官當今緣邉無異內地帥臣遭喪者無不解官自餘將領寄任輕于帥臣非有金革之事而無故奪其喪服全無義理若言藉才則方今武臣常患員多豈至無人可使若恤其貧則在內地者均是人也何獨于緣邉恤之若以解官為優恩必待如狄青之子然後許之則父母之喪無貴賤一也古者庶人有喪三年不從征役豈可仕至升朝以上而不使執親之喪臣愚欲乞今後大使臣以上丁憂者雖係緣邉任使並解官行服如遇有邉事即許本路奏留繫自朝廷指揮庶使武臣皆知禮法有益風教而緩急藉才亦不失金革從權之制如以臣言為然乞下有司修立貼黃臣竊以奪服之禮本非古典祖宗時文武官尚少故因襲前代權制不許解官今承平日久吏員益多宜使人知禮教或遇有邉事藉武臣宣力則奪其喪服亦可乞夏國人使只從密院指揮狀同日右臣近準樞密院録白勘會夏國賀興龍節及正旦人使過界及到延安府日月計程合至某日到京竊慮至時朝見不及並奉聖㫖令引伴官緣路量力蹉程須管于某日到闕者臣竊以西戎陪臣朝賀闕庭自當奔走以赴期會若有稽緩責在有司今煩聖㫖催促行程非所以示朝廷之尊也臣欲乞今後夏國人使過界奏到只從樞密院勘會日數舉行催促訖奏知更不畫降聖㫖庶于事體為允乞進德愛身疏二十三日臣伏見陛下嗣位以來端拱淵默專意學問臣侍經席于今纍年陛下天縱生知聖德純茂接對臣下日日如一未嘗小有差失此實上天眷佑皇家保育生民宗廟社稷無疆之福也恭惟太祖皇帝肇造區夏櫛風沐雨削平僭亂以立子孫萬世之基傳之太宗至于真宗遂致太平仁宗年十三即大位章獻明肅太后安定邦家調護聖性是以四十二年之間德澤深結于民天下至今思慕不忘英宗自藩邸入繼大統四海之內同心愛戴先帝勵精求治宵衣旰食躬勤萬事十有九年不幸早棄天下陛下年始十歲嗣登大位當此之時人心凛凛憂危萬端幸賴太皇太后保佑扶持勤濟囏難斥退凶邪登進忠良詔令所至百姓歡呼鼓舞數年以來中外晏安北狄西戎無不從順此皆太皇太后之德也臣不知陛下將何以報之臣竊思陛下所以報之唯在于進德愛身而巳陛下進德則為太平髙世之主光顯祖宗之烈發揚文母之訓使天下之人皆欣然曰祖宗之德太皇太后之力如此則豈唯皇天祖宗嚮佑陛下太皇太后亦不虛勤勞矣陛下愛身則無疾疢不貽太皇太后之憂武伯問孝孔子曰父母唯其疾之憂夫父母之憂莫切于子孫之有疾疢他日陛下有子當自知之陛下若不進德不愛身雖極四海九州之養亦未足為孝也臣自今秋聞外人言陛下于後宫巳有所近幸臣初聞之不以為信數月以來傳者益多或云巳有懷娠將誕育者言之所起必有其端臣誠至愚不能不惑故敢先事懇切言之陛下內承慈訓外勤聖學方當只畏以事天地誠孝以奉宗廟思六聖之勤勞念帝業之囏難四方之人無不延頸舉踵注目傾耳觀聽陛下德業之光名譽之隆以想望太平陛下可不慎哉今陛下未建中宫而先近幸左右好色伐性傷于太早有損聖德不益聖體此臣之所甚憂也孔子曰君子有三戒少之時血氣未定戒之在色言人少時血氣未定而先傷伐根本則損夀考之福故君子戒之陛下今年十四歲而生于十二月其實猶十三歲也此豈近女色之時乎陛下上承天地宗廟社稷之重守祖宗百三十年基業為億兆之人父母豈可不愛惜聖體哉孟子曰事孰為大事親為大守孰為大守身為大守身所以事親也愛身所以愛天下也陛下上有太皇太后皇太后皇太妃休戚皆繫于陛下之一身豈可不愛惜聖體哉中庸曰君子之道本諸身未有不先愛身而可以進道也陛下方嚮學問躬儒術欲為堯舜禹湯文武成康之君堯舜禹湯文武成康之君未有不勤而成者也昔先帝年十五六講學東宫一言一動天下傳之是以多才多藝羣臣莫及今陛下聖學天下未有所聞而先以嗜欲聞于天下此臣之所甚憂也陛下有上聖之性必行上聖之事有上聖之位必求上聖之名豈可不愛惜聖體哉方今羣臣之心萬民之情正望朝廷如天聖以來所願陛下法則仁宗而已祖宗天下百三十年如寶器之無缺陛下行純德備如美玉之無􅡉臣竊為陛下寶之惜之愛之重之陛下豈可不愛惜聖體哉臣聞仁宗未納皇后以前未嘗近幸後宫是以氣體康實在位最久臣今觀陛下氣怯恐不能如仁宗少時豈可不愛惜聖體哉前世人君多所經歷乃能周知天下之情今陛下生長深宫稼穡囏難未知也人之情僞未見也國家政事未習也六經聖人之言未盡讀也前世興亡之戒未盡閲也天下至大萬事至衆何所不關聖慮豈可不愛惜聖體哉古人有言後宫盛色則賢者隱處佞人用事則諍臣杜口陛下春秋鼎盛方當崇經術邇端士敦尚素朴屏去紛華不宜先留意女色使天下失望以啓小人之心何則陛下如好德則賢人皆動其心欲助陛下之德而圖天下治安故于陛下有益陛下如好色則小人皆動其心欲奉陛下之欲而圖一身富貴故于陛下有損賢人進則治小人進則亂人君所好不唯繫一身損益實繫天下治亂不可不慎也陛下于此二者將何擇焉昔漢成帝自為太子時以好色聞其後逸欲無節終為漢室昏亂之主漢之基業由成帝而壞豈可不慎其細哉唐太宗欲納鄭仁基女魏徵諫而止之憲宗時教坊使稱密詔選良家子納禁中李絳上疏乃悉還之文宗沒李孝本女入宫魏謨諫即出之古之忠臣愛君必拂其邪心防其嗜欲置君于無過之地使天下莫得而非議也人君所愛莫切于身人臣亦莫切于愛君之身臣濫備勸講以輔導聖德為職懷此憂慮已二三年不能言于未然致陛下已有聲聽流聞于外此臣之罪也臣今若猶不言他日陛下或専意聲色委權臣下紀綱壞亂政事荒僻使天下以陛下為逸欲之主則臣之罪豈可勝責雖悔恨萬狀何所及哉伏望陛下察臣之言専精一意强于學問日新德業無時逸豫事親則思孝居處則思敬動作則思禮祭祀則思誠服用則思儉養民則思仁使人則思恕心則思道視則思正當食則思天下之飢當衣則思天下之寒陛下每思及此而强學不已則將以道德為麗以仁義為美豈聲色之可移哉惟陛下抑情制欲以愛養聖體為先則動植之類無不䝉福生靈幸甚臣不勝拳拳愛君之心干冒宸嚴臣無任惶懼俟罪之至上太皇太后乞保護皇帝聖體疏二十五日臣伏見陛下臨御天下于今五年昧爽聽朝親斷萬事所以勞心竭力者凡皆為祖宗社稷億兆人民將以太平天下付之皇帝也臣愚竊謂陛下憂勤天下之事必先憂天下之本愛養四方之民必先愛一人之身夫一人之身天下之本也孟子曰天下之本在國國之本在家家之本在身天下安危繫于人君之一身身安則天下安天下治亂出于人君之一心心正則天下正欲安天下必先安身欲正天下必先正心此二者當今之急務久逺之計慮也陛下內保佑聖躬調護起居外成就睿德勉進學問前此未嘗聞有纎毫之失今之所聞則異于前外議籍籍皆謂皇帝已近女色後宫將有就館者有識聞之無不寒心皇帝今年十四其實猶十三歲耳千金之家有十三歲之子猶不肯使近女色而况于萬乘之主乎陛下愛子孫而不留意于此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉臣嘗見司馬光言章獻明肅太后保護仁宗皇帝最為有法自即位以後未納皇后以前仁宗居處不離章獻臥內所以聖體完實在位歷年長久章獻于仁宗此功最大臣考之國史仁宗在乳褓章獻使章惠太后護視章獻臨朝仁宗起居飲食章惠必與之俱所以保佑扶持恩意勤備然則章惠保護仁宗乃章獻太后之意也今陛下臨朝日有萬幾至于左右護視皇帝臣不知有如章惠者乎若未能如章惠則陛下豈得不留聖意也陛下以朝事責宰相以邉事責將帥人君闕失羣臣邪正責諌官御史皇帝學問責講讀官若朝事不治宰相之罪也邉鄙不寧將帥之罪也人君闕失不知羣臣邪正不分諫官御史之罪也皇帝學問不進臣等之罪也至于皇帝早夜起居之節嗜欲之際此最切身之事豈可無任其責者乎陛下慱覽史册洞知古今古之帝王何嘗不以女色損夀考之福唯傷于太早敗于無節耳思之至此可為切骨之戒臣所以不避誅戮為陛下言之伏望陛下與皇太后皇太妃詳論此事有損聖德不益聖體宜戒敕保傅令一以章惠為法今聖心已有所知雖不能防于未形猶可以止其將然俟中宫既建然後漸廣繼嗣之路則陛下亦可以不勞聖慮矣今若不加止節女色爭進數年之後敗德亂政無所不有陛下雖欲悔之豈可及乎臣竊觀皇帝天質純粹有上聖之資年益長則宜德益進方當嚮學以養聖躬天下引領以望輝光之新傾耳以聽名譽之隆聰明之開發睿智之深逺皆繫于十五六之時不可失也陛下必欲皇帝氣體康强德性成就以為宗社無疆之福莫切于今日矣不宜先以好色聞于天下失衆庶之望臣所以拳拳而不能已也惟陛下深思逺慮察臣狂瞽之言干冒宸嚴臣無任惶懼俟罪之至謝宣諭劄子二十七日臣自今月二十三日為吐瀉腹臟不安請假將理于二十七日參假門見退至門下省見宰臣呂大防諭臣二十四日靣奉聖㫖兩諫議并臣所言後宫御幸無此事者臣自二十三日為病家居當日上皇帝疏至二十四日呂大防令實録院吏語臣如入省即過㕔相見臣以方病未能入至二十五日又上太皇太后疏緣臣二十五日以前未見大防不知已有聖㫖所以更入後來文字今日大防靣諭乃知臣等所聞外議皆是虛傳陛下恕臣狂愚不賜誅責復䝉宣諭令臣具委臣且喜且懼不能自勝實天下幸甚天下幸甚然臣所言皇帝進德愛身所宜常以為戒太皇太后保護皇帝安身正心久逺之慮亦願因而勿忘今外議雖虛亦足為先事之戒也臣竊惟皇帝有上聖之資方養德嚮學涵育仁義臣侍經左右而有聞于道路實懷私憂是以不存舊跡不知忌諱發于誠心愛上不敢避妄言之罪凡亦言于未然則誠為過慮及其已然則又無及雖言無益陛下寧受未然之言勿使臣等有無及之悔因聞虛言以為實戒則四海生靈動植之類永被其福臣䝉寬宥罪戾無任恐懼喜幸之至伏緣聖㫖令大防諭臣合具奏知謹奏貼黃大防令臣諭與本省諌官臣退至門下後省已諭劉安世令安世轉諭朱光庭訖乞留文彥慱劄子五年正月臣伏聞陛下已許文彥慱求退降詔俟至中春議從所欲者彥慱年八十五爵位巳極唯是得解重任歸休私第乃其幸也陛下憫其過老以其纍請而從之為彥慱身計私計則可謂美矣若為朝廷計則臣請試言之彥慱為相四十餘年歷事四朝仁宗時平貝州之亂名聞契丹英宗神宗時為樞密相八九年先帝已加優禮許其致仕陛下嗣位復召而起之蓋藉其威名宿望以為朝廷之重也京師及四方軍民久服彥慱之名以為在朝廷則朝廷必重向若陛下不復召之則亦已矣今既起之則不可使輕去朝廷彥慱雖老精力尚强臥置京師足以為重外則西北二虜必懷畏憚夫以四海之大若常無事則人人皆可為大臣矣豈無萬一非常之慮哉彥慱在朝非謂日日有用蓋備緩急或有時而用之耳當先帝之時足以容彥慱閒退今二聖垂拱委政大臣尤宜得老成之人以服天下之心詩曰雖無老成人尚有典刑言老成之人重于國之典法也蓋以其經歷既多但問以纍朝之事所知尤勝他人況其别有所補哉今舊老唯彥慱一人若去則其餘在朝者皆是後進無復前輩矣老者任用之日不久國家所宜重惜臣自聞陛下許彥慱之去朝夕思慮竊謂陛下若欲彥慱更得優逸但聽其解軍國重事以太師就第留之京師以備訪問不必再除致仕朝廷有貴老尊賢之美足以繫屬天下人心所得實多陛下進退元老臣不當預論議然臣職在侍從茍有益于國不敢不言惟陛下深留聖思更賜裁擇取進止乞留中范太史集卷十八

body:
  text: 范太史集卷三十八宋范祖禹撰墓志銘大理寺丞張君墓志銘君諱淮字次公其先開封人曽大父尚書工部侍郎贈司徒諱去華始居河南大父光祿少卿贈兵部侍郎諱師錫歸老於家教訓子孫世稱為有德君子父尚書職方員外郎諱景伯以孝友篤行推於士大夫至今河南言家法者必先張氏君即職方長子少舉進士長以祖廕為郊社齋郎調廣安軍嶽池尉代還丁其妣長安縣君李氏憂服闋補河南登封尉以薦者得廣信軍判官未幾以職方憂去官外除權杭州觀察推官考滿改衛尉寺丞知壽州六安縣以疾謝歸改大理寺遂卒實熙寧七年七月丁酉年五十二明年九月癸未袝於北邙之先原君事大父母父母盡其孝執喪哀毁有聞於人既孤撫愛諸弟尤篤治家謹嚴能守其先法居官耿介有立佐幕府遇事未嘗茍合而其長亦皆器愛之及當遷秩有司誤降一等有與君同者將訴諸朝君不可曰爵祿命也其可以訟求之耶久之有司以誤聞朝廷復進君秩一等六安邑大事繁前令數以不任職免君至不數月稱治議事於州與州符下邑有不便於民者必力爭之屬疾謁歸民相率詣按察使請留者千餘人又禱祠以幸其疾愈君娶李氏工部尚書莊公兌之女有淑行二子長曰先郊社齋郎次曰兢四女長適祕書省正字司馬康餘皆幼將葬弟涇以河南張君雲卿之狀來謁銘銘曰張氏之顯世不絶書降宅河洛其支扶疏入則孝弟出則忠謹自家及邦父訓子順光祿之懿職方之純澤其子孫宜在於君祿則不厚老亦未及有惠於人止於下邑有弟有子實蕃其宗歸於先邱君子之終虞部郎中司馬君墓志銘司馬氏出於晉安平獻王孚其裔曰征東大將軍楊始居安邑後魏析安邑置夏縣子孫遂為夏縣人自征東至今墳墓在焉君諱京字亢宗曽祖諱珂祖諱皓考諱咨贈衛尉卿妣王氏封福昌縣太君君以從祖太尉公蔭補太廟齋郎調涇州司法參軍又為齊州司法參軍舉監秦州清酒以最改衛尉寺丞轉大理簽書闕州判官通判綿州潞州厯太子中舍殿中丞國子博士虞比駕部三員外郎知趙州未赴改博州遷虞部郎中歲滿代還元豐二年六月戊戌朔以疾終于家年六十八月壬寅袝于先原君為人質直言行無采飾於宗族僚友無隱情在官勤於職業不避寒暑勞辱凡劇務人所難處者君至則立辦而遇下以不欺始為參軍監酒梁丞相守秦州政尚威嚴官屬震栗君嘗白事不可丞相厲色呵之君端立于庭爭之愈強必從乃已丞相無如之何在潞州太守役兵治園亭旬休不得息君直從遣之太守又行伍保法一人有罪輒連坐數家日撻數十人君一切釋去不問太守雖甚怒然以君廉潔周慎卒無以中傷也其知博州值河朔盜賊大起百十為羣所在剽掠晝入縣鎮驅殺官吏君督責討捕歲餘悉平時強盜捕得即承者法皆免死盜倚法為姦益滋君擇其尤無良者諭伍伯悉搒殺之文潞公安撫河北以博州多盜始欲奏劾君或止之曰此介直人也公徐察之宜勿遽已而潞公深知其能乃表薦之君安恬守分不妄圗進取始得州即乞監終南太平宫不遂不得已之官官滿又乞亦未遂而卒君篤於骨肉赴其急難竭力無所愛性儉約自初仕縮衣節食圭銖積俸祿晚年頗優足即散以賙親戚之貧者族人有從之假貸無問多少無所拒既而歸之輒怒曰同家異財此大不義某為也其自奉菲薄如其初時君先娶洋州司户參軍曹識女封仙居縣君生一男四女先君卒再娶西京左藏庫使王懷濟女封長安縣君生四男二女長子曰祀河中虞鄉主簿次曰櫟曰猶曰拒曰㩲長女適左侍禁白昭僅次早卒次適大名夏津主簿劉嗣宗次適乾寧軍判官楊迪簡次二女尚幼銘曰司馬自晉安平枝分承繼綿綿在後之勤君之行已始信邦族仕不蘄進以及州牧儉以居家直以居官不畏不侮在古為難一其所履其終如始納銘墓中以贊實美祕書丞劉君墓碣君諱恕字道原其先京兆萬年人六世祖度唐末為臨川令遇亂不能歸遂葬筠今為筠州人父渙少有髙志年五十為潁上令棄官家廬山之陽今為屯田員外郎道原少頴悟俊拔讀書過目即成誦年四歲坐客有言孔子無兄弟者道原應聲曰以其兄之子妻之一坐驚異十二三謁丞相晏公問以事道原反覆詰難公不能對十八歲試經義説書皆第一釋褐邢州巨鹿主簿陳鄘公帥髙陽召至府重禮之使講春秋丞相親帥官屬往聽遷晉州和川令道原為人重意義急然諾郡守得罪被劾屬吏皆連坐下獄道原獨保證之恤其妻子如已骨肉又面數轉運使以深文峻詆陸介夫帥廣西辟掌機宜道原為人強記紀傳之外閭里小説下至稗官雜説無所不覽其談數千載間事如指諸掌道原終身不治他事故獨以史學髙一時今端明殿學士司馬公受詔修資治通鑑奏請同編修道原於魏晉以後事尤能精詳考證前史差謬司馬公悉委而取決焉道原為人剛毅一毫不挫於人熙寧中執政有與之故舊者欲引修三司條例道原不肯附之且非其所為執政者寖不悅當是時其權震天下人不敢忤而道原憤憤欲與之校面語侵之至變色勃怒而道原不少屈稠人廣坐抗言其失聞者縮頸而道原意氣自若久之亦不自安以親老告歸南康乞監酒稅以就養有詔即官下編修丁母壽安縣君錢氏憂又詔就第續成前書未除喪元豐元年九月癸丑卒年四十七著十國紀年四十二卷資治通鑑外紀十卷包犧至周厲王疑年譜共和至熙寧年略譜各一卷道原娶蔡氏職方郎中巽之女生一女三男曰和仲義叔某道原將殁使其子為書來告曰子其為表若碣以志吾墓銘曰嗚呼道原博學強識海涵地負富有萬物人所難能不降色辭中道而殞鮮克知之精明在上體魄在下刻詩墓前以詔觀者朝奉郎陳君墓志銘君諱知儉字公廙陳氏其先閬州人曾祖諱省華真宗朝為諫議大夫始居開封之管城贈太師尚書令兼中書令封秦國公祖諱堯佐以太子太師致仕是為文惠公贈太師中書令兼尚書令封鄭國公父諱博古大理評事館閣校勘贈比部郎中文惠公相仁宗其兄文忠公任樞密使弟康肅公武寧節度使三人位將相宋興以來言兄弟之貴者以陳氏為盛比部又以學行登文館顯名君生於世家沈厚精敏少孝謹修勵自立既長志欲克紹祖考振奮於時初以祖廕守太常寺太祝纍官大理寺丞英宗嗣極恩遷太子右贊善大夫知常州無錫縣丁母仙居縣太君宋氏憂服除知開封府鄢陵縣以治行聞上即位恩遷殿中丞改國子博士避父諱不拜王荆公執政欲引以修三司條例固辭擢提舉京西常平廣惠倉未幾除權發遣轉運判官行部過汝葉令不治繫囚以百數君取案牘決遣斯須而盡無不當者改權發遣轉運副使轉虞部員外郎徙權發遣河北東路轉運副使改金部員外郎權轉運副使恩州有兄弟遇父與人鬭者共擊殺之弟遁去兄伏殺人有司具獄將行刑君適至州止之曰子救父可憐且庸知非弟乎彼聞兄將死必還捕得果欵服以官吏失入罪及者衆使吏自發舉乃奏讞之兄得釋弟亦免死郡吏鑱石紀其事坐言濬河非是奪金部授知睦州未行已而復其官又坐舉官不當罷睦州復為虞部改朝奉郎元豐三年十一月丁巳卒于洛陽履道坊第年四十六明年二月某日葬管城之先原君性頴悟於書無所不讀至隂陽卜筮道術方外之言皆探其奧好賢喜善出於誠心視當世名公卿大人樂克已就之忠信之士則篤友而不怠故其所知與遊者必一時賢雋今樞密副使吕公端明殿學士司馬公皆嘗薦其才在京西河北治獄多所平反奉法無私而能恕以與人故所至郡縣畏其嚴肅而樂其寬厚舉吏八百餘人娶史氏先卒再娶閭邱氏封壽陽縣君五子曰敦早卒曰崇曰居曰中曰孚尚皆幼一女適大理寺丞馬玿亦先卒君卒之日家無餘財太尉文公留守西都遣吏以幣往治其喪又命某為銘銘曰展矣陳君相國之孫明試以才可紹其門自下而飛未極復止胡不永年俾究其美葬從先兆既固而寧詔於無窮永緘茲銘汾陽郭君墓志郭君諱詢字某其先晉人自唐御史中丞甫從僖宗入蜀避亂遂家廣都子孫今著籍焉於蜀為大家君從父兵部侍郎輔位顯於朝族人以文學蔭補仕進者六七人君獨貧無以養親為人強力感激不恥惡衣糲食積纍纎微以養父母少有矣乃周逰四方以致其贏身處勞辱而父母裕如既孤昆弟姊妹必待君以養晚年有田宅以居則能損己以周人之乏凡有疾病者死喪者必奔走赴救焉有餘者助之力不足者助之財故鄉黨皆稱君為善人長者元豐三年八月某日卒年若干明年八月葬于廣都某鄉里之先原父諱某母某氏娶某氏生一子曰某四女長適范祖元餘皆幼將葬弟子熙以書抵洛求銘余先祖母君之姑也故不得辭乃紀其世系書其行事俾刻石而納諸墓是為銘供備庫副使富君墓志銘君諱紹京字世昌河南人司徒韓國公贈太尉之第二子母晏氏周國夫人以父任為祕書省正字改太常寺太祝熙寧初韓公領鎮海節鎮河陽自大理評事奏換東頭供奉官公還政恩遷內殿崇班監西京窯務轉內殿承制元豐三年上以韓公在仁宗朝首議建儲策勳拜司徒特授君閣門祗候乞監西京都亭驛以年勞轉供備庫副使為人孝弟溫恭事親竭力接人盡禮見之者不知其為貴公子也好讀書史慕忠義死節慨然有志於功名遂請易武爵其授閣門祗候也或勸之起就職答曰吾父母皆垂白豈忍一日離去哉因奏乞管庫以便親上謂宰相曰富某子為親乞管庫宜為速行即日奏下得請蒞官勤恪安於卑冗不待長吏督察事必整治韓公居家動靜如繩矩君能左右循法無違賔客入其門庭見子弟之謹覩𨽻御之肅而公之家政可知蓋成德之君子舉必由禮躬行而教從在邦在家莫不一以正也君以奉親故學醫精究其術凡公飲藥必案視方書考驗衆説論定審察先嘗而後進韓公年八十視聽不衰夫人素羸亦無甚疾雖公與夫人能自養以享康寧人子之至誠篤孝實有賴云六年閏六月韓公薨君纍然執喪其七月丙寅以疾卒年三十有七識與不識皆為之哀娶張氏故相文節公之從孫封長安縣君二子曰定方守祕書省校書郎曰直清守將作監主簿一女未嫁其十一月庚申從韓公葬河南府河南縣南張里皇考秦國公墓次伯氏朝奉紹庭泣謂祖禹曰吾弟不幸早死子其銘之祖禹不得辭銘曰逺矣富氏辰顯于周忠諫死狄義動諸候韓公之生振起風烈入相三朝載其直節哲人之澤宜及後昆懿哉仲子用譽其門涖官居家恪謹克孝蹈襲規矩匪煩告教惟相有子乃君有臣如何方壯亟隕其身北邙之原瞻彼松柏歸從先公萬古是宅工部尚書致仕李莊公許昌郡夫人錢氏墓志銘夫人錢氏其先吳越武肅王之族曾祖師紹祖承德忠懿王之入朝考秀始仕為左侍禁贈左武衛上將軍葬於宛丘遂為陳人妣淮陽郡太君倪氏博通經史訓飭子弟享壽幾百年兄故吏部侍郎象先仁宗朝以經術勸講出入侍從推為名臣夫人性明悟端厚文雅有母兄風年十八歸于故工部尚書李莊公兑孝事舅姑禮接族人長幼疏戚無不得宜迄於沒身內外未嘗有間言自奉儉約衣至十年不易而周給宗族之乏恩施務厚莊公仕寖顯與夫人素相禮重每退朝夫人必從容諷切以古之忠義其出藩於外則勸以尚德緩刑莊公立朝大節不渝而為政寬猛相濟夫人有助焉善為歌詩多或數百言平生所著千餘首讀經史佛道書手不釋卷博聞強記談論清辨自曉音律精於厯數莊公捐館於洛陽夫人治家如公之存而加之以肅其家豐厚愈於故時洛為通邑大都衣冠之族盛於天下夫人雖不出閨門而士大夫交口稱之晚而好理性之學頗自得喜怒憂樂不入於心屬疾預治後事既革又自言終之日時如期而薨實元豐七年十月癸未享年八十三初封福昌縣君纍進延安許昌郡二夫人子男六人曰荀及次四人皆早亡曰宗約前朝奉郎行大理評事女五人長適光祿卿楊璵封同安郡君次適大理寺丞張淮次適長水主簿談洙次適承奉郎孫林次適潁昌府節度判官楊琪孫男二人曰永郊社齋郎曰京孫女二人孤宗約將以明年正月丙申葬夫人於永安縣唐興鄉雙塔里袝莊公之墓使以狀問銘於祖禹既辭不獲乃撰夫人之行而系以銘錢在吳越其顯以國武衛之奮肇服戎職篤生夫人淑哲而文母兄是似惟德之勤自其宜家以至終老天錫之報康寧壽考詩正夫婦禮謹閨門誄行刻辭以告後昆朝議大夫致仕程公墓志銘公諱嗣弼字夢符其先居中山博野自文簡公葬河南伊闕今為河南人曾祖諱贊明太子右贊善大夫贈太師中書令妣吳氏秦國夫人祖諱元白袁州宜春縣令贈太師中書令兼尚書令追封冀國公妣楚氏晉國夫人考諱琳鎮安軍節度使同中書門下平章事是為魏國文簡公妣陳氏魏國夫人文簡公在仁宗朝入輔出藩任兼文武威望赫奕為時名臣有子四人公在仲也以父任為祕書省正字再補將作監丞五遷尚書郎賜五品服官制行自比部郎中易階朝散大夫轉朝請大夫賜三品服自簽書彰信軍節度判官九任知郢州不行改知光州以疾歸京師踰年致仕今天子即位改朝議大夫纍勳至上柱國元祐元年二月甲戌終於武成坊之第享年六十公性孝愛樂易不為畛域而志堅正不可奪幼力學舉進士巳而專奉親治家遇事強敏處心平直文簡公器之凡家之政悉委於公女弟榮國夫人適今中書右丞相韓公初韓公為陜西轉運使榮國病留京師公迎致弟與韓氏二甥朝夕左右召醫嘗藥奉事甚篤伯兄嗣隆終尚書郎無子公擇族人子為之後使主喪且言於朝而官之奉兄喪葬於洛公惟一子方病甚不顧而行人或勸之公曰吾不忍吾兄之孤也其後公子亦良愈程氏自冀公以上先葬鄭墓近水當徙公即辭守郡求為間官力營之合族人之未葬者凡十三喪遷之伊闕公自督役寒暑不息雖大雨猶杖藜芒屩立雨中至暴露感疾乃克葬魏國夫人之族貧不能自存公聚而養之至於終身故人有任郎官而殁者孤女鬻於人公贖而嫁之所至舉職業不為茍簡初為國子監主簿故事收田租以贍學者歲入無法不可會公謹出納省浮費未幾積倉豐溢所贍倍衆在河南幕府神宗即位詔給軍賞帑藏不繼將貸於民公議以轉運司封樁錢給之一日而既軍民皆悅永厚陵役使者委公總領事皆先期而集監司交薦其能英宗大行在塗河梁未固主者不知所出公命積草實橋下而決其上流靈駕以濟民有盜人園果見捕窘迫投礫傷園主吏欲置重法公薄其議杖之而巳熙寧初朝廷更法令上大夫進拔不以次執政以公才可用且與公有舊召之公終不往乃自通判擢守郡又辭不行求管勾嵩山崇福宫杜門靜默貴要罕識其面方衆人趨競而公不動其心獨引避退處雖在市朝聲迹不接於人若山林隱遁之士生於富貴而恬於榮利乃如此其可謂君子矣喜為歌詩效長慶體慕白樂天之為人有文集二十卷先夫人楊氏封崇德縣君河陽三城節度使同平章事恭密公之女後夫人賈氏封壽安縣君丞相魏國文元公之女皆先公而卒子男三人公孫奉議郎刪定門下中書外省擬進格其二幼亡女七人長早世次適朝散郎行太常博士吕希純通直郎晏暉承事郎王􅧓承議郎張恕承事郎馮詡適張氏者亡其次幼亡季在室孫男六人仁問義問皆夭次曰禮問假承務郎智問孚問皆郊社齋郎幼曰廣問女三人柔問早夭幼曰都問平問公與弟朝議大夫嗣恭朝請郎嗣先皆友愛篤睦公主家事如文簡公存時公卒之日朝議方提點梓州路刑獄而朝請為太僕主簿與孤公孫奉公之喪以其年三月從祔于伊闕先原合二夫人之墓將葬使以狀問銘於祖禹謹諾而為銘程自伯休世德既顯以迄於宋大集文簡侃侃惟公孝友溫仁克永其家以禔厥身豈無膴仕不以易志施於邦國百未一試義有可為公則安之利所在焉退縮不窺完其始終人莫我疵刻詩於墓惟後之知范太史集卷三十八

body:
  text: 范太史集卷五十一宋范祖禹撰皇族墓志銘昭信軍節度處州管內觀察處置等使檢校司空開府儀同三司贈太師追封崇王諡孝溫墓志銘王諱宗瑗字君玉太宗之曾孫魯恭靖王之孫濮安懿王第十三子英宗之弟也嫡母王三夫人王氏韓氏任氏所生母耿氏以王貴封德國太夫人仁宗賜名補右監門率府副率歷左清道率府率右監門衛將軍右領軍衛大將軍右驍騎大將軍龔州刺史治平中英宗謂輔臣曰朕自即位罕見都兄弟心實慊然宜以正官奉內朝冀時得顧視遷真州團練使神宗踐阼遷憲州防禦使改雍州觀察使三夫人改葬濮園王護喪如禮還拜鎮寧軍節度觀察留後王兄濟隂郡王薨神宗臨奠因詣濮王祠堂王與昆弟序班祠下神宗勞問甚悉遂下詔曰因謁濮祠顧瞻諸伯叔父形容齒髮皆非昔日深用惻然除崇信軍節度使封漢東郡王今上嗣位授昭信軍節度使檢校司空開府儀同三司王性沈靜喜愠不形於色器質渾厚容止莊肅雖疏賤必冠帶見之而寬大無所不容居室器用不尚華侈衣服純素食無珍異愛人好施振恤急難親族之貧者多賴焉英宗入居儲宫委王調護神宗習之世務意甚勤切德國在堂王祿未豐顯怡顔養志服御玩好凡可以順適其心者罄其所有無所不為英宗雅稱王篤孝德國病逾嵗王晝夜省視席不安寢衣不緩帶灼臂禱請無所不至卒不起居喪哀毁徒跣扶柩以至墓所表乞廬墓終制天子雖奪情不許深嘉嘆之自德國薨不邇聲色獨居靜處出侍妾數十人元豐中從幸瓊林苑命射一發中的神宗稱賞賜與甚厚神宗不豫王處一室憂見于色外人不得入者月餘聞宫車晏駕號慟不食感疾失語踰年稍復自支常追懷神宗眷遇之厚雖久而哀不忘居家嵗時祭享必先期處别室齊潔纍日然後行事恭恪無少惰燕閒諸子侍左右教以忠孝皂𨽻有過必三犯然後罰閨門上下雍睦嚴整宗室親戚多指以為法喜讀左氏春秋厯代史書晚年無疾方食于正寢神色精明如平日忽不語少頃而薨年五十有六實元祐三年五月癸亥訃聞天子震悼輟視朝三日制服苑中哭之百官慰于崇政殿門太皇太后同臨奠恤其孤恩意甚厚歸賵賻别賜金帛加等贈太師追封崇王諡曰孝溫命入內省押班梁惟簡內供奉官劉永年入內省髙品季祁護喪事六月甲午具鹵簿鼓吹出殯于城北乾元福聖佛祠王先娶彭氏武昌軍節度使眷之孫女封英國夫人今正室劉氏昭化軍節度觀察留後與之孫女封嘉國六男曰仲伊右監門率府率早卒曰仲詰右武衛大將軍永州闕譁曰仲􅒲皆右千牛衛將軍十女長夀縣主適東頭供奉官任懷亮太康縣主適內殿崇班徐圭秀容縣主適文思副使程逹卒永寧縣主適西頭供奉官胡天經和義郡君適西頭供奉官周軫卒遂寧郡君適右侍禁夏悅同安郡君適左侍禁彭詬長樂郡君適右侍禁翟士永文安郡君適右班殿直周涇次在室孫男十人士專左班殿直士邁右班殿直士苛士碌皆卒士泳永羅士仇右班殿直四人未名女八人長早亡餘幼九年二月已酉從太皇太后之喪葬於河南永安縣永裕陵之西銘曰太宗諸孫安懿多子英宗承統藩國奉祀於穆崇王宗邸稱賢治平之初有命自天帝曰嗟豫伯仲叔季咸造內朝以慰豫志神宗嗣服濮屬攸尊大啓土宇並王而藩惟是崇王協贊帝德英宗所託神考是翼上之光宅惇敘九宗將旄相印益以附庸生有顯榮沒有令譽從葬西陵利其後嗣楚州防禦使楚國公贈奉國軍節度使夫人宋氏墓志銘夫人宋氏開封人曾祖龜贈太師中書令尚書令祖臯贈太師中書令尚書令譙國公考絪西頭供奉官母張氏伯父綬參知政事年十七歸楚州防禦使楚國公世恩封永康縣君夫人奉舅姑恭順接娣姒以和撫諸子均一元祐八年五月二十四日卒年五十有二八男曰令勔右武衛大將軍濠州刺史次未名而亡曰令􅀈右侍禁曰令㔦曰令覿並左班殿直曰令􅂒右班殿直早卒曰令珸左班殿直曰令剔右班殿直早卒九女長適故右班殿直宋安國次早卒次適右侍禁范湍卒次適陳州司法參軍吳環卒次三人早卒次二人尚幼孫男十二人子裪三班奉職子禋右千牛衛將軍襲封楚國公子禨三班奉職子􅀈早卒子祿子祾子球子禬子琰子禪未仕二人幼孫女十人四人早卒六人幼九年二月已酉葬河南永安縣銘曰遠矣宋氏有商之裔宋在今朝世德孔昭懿哉夫人終始惟一載其令淑有銘斯石左侍禁妻郭氏墓志銘君郭氏開封人後徙家許州今為潁昌人曾祖榮祖澄贈左千牛衛大將軍考瓌左藏庫使母長安縣君李氏君生數嵗已能承順父母顔色既長喪父白其母曰不幸早孤劬勞無所報惟是不嫁以終養母母兄不能抑處室二十三嵗宗室士􅀢聞其孝行嘆曰吾母亦寡居嵗久幼弟未昏若得此女為婦使娣姒共奉甘㫖豈不善歟遣行媒力請于長安君長安君感其意奪君志而嫁之遂適士􅀢弟左侍禁士兟贈䖍州觀察使仲行第三子也入見禁中賜霞帔服君既嫁果能事姑與兄公恭恪盡禮閨門雍穆上下欣悅然未嘗須臾忘母思念感疾元祐三年十一月十一日卒年二十有四一子後三嵗未賜名亦卒九年二月已酉葬河南永安縣銘曰處為孝女歸為孝婦雖則有行終念其母銘以昭之純孝之墓右監門衛大將軍贈洺州防禦使追封廣平侯墓志銘侯諱令攀字子髙贈保靜軍節度觀察留後髙平郡公惟敘之曾孫贈同州觀察使齊國公從貺之孫耀州管內觀察使世逸之子侯幼而竒警記誦文字一見如宿習比既長嚴于禮法動靜周旋容止必肅衣冠必正母和義郡夫人疾篤醫有難色公刲股為羮以進母疾隨愈仁宗為育宗子聞侯幼敏賜以飛白小字宗室榮之初賜名補太子右內率府副率歷右監門率府率千牛衛將軍右監門衛大將軍元祐五年某月甲辰卒年三十有六娶李氏皇城使詵之女封仁夀縣君三男曰子安三班奉職早卒曰子巂右班殿直曰子宏三班奉職四女長適石州司録參軍吳德言三人幼九年二月已酉葬河南永安縣銘曰廣平早慧仁祖所知既長克孝以禮自持玊韞于櫝其卒不施廉州防禦使贈感德軍節度使華國公墓志銘公諱仲歜字子威魯恭靖王之曾孫濮安懿王之孫濟隂榮王宗輔之子母惠國夫人裴氏少自刻厲不狃驕侈翹然秀穎見者不敢待以常兒及長循守法度上下無間言內外莫不加敬事榮王能順顔色怡聲氣喻之于道終王身無過行宗族以為有賢子之助王寢疾藥必嘗而後進病革刲股肉以饋王薨廬于殯卒哭而後返惠國太夫人薨時神宗山陵有日上與太皇太后遣內人弔臨公因復命號訴願與王皆得從葬許之葬歸悉出王餘積陳于庭召諸弟子姓下至妾媵頒之無不滿其意俸廪悉均分孤弱為置師友教育如已子諸子弟矜慎謙儉如寒素之士晚益清約所居一室蕭然終日服用不過繒布元祐七年二月乙卯卒年四十有三娶安定郡君康氏男四人右侍禁士閌右班殿直士􅀈士黍士􅀈九年二月已酉葬河南永安縣銘曰孔氏之門閔子克孝人無間言舉以為教公孝于親以睦族人有聞于宗是謂立身右監門衛大將軍贈蘄州防禦使蘄春侯墓志銘侯諱子買字漢翁萊州防禦使東萊侯從恪之曾孫武寧軍節度觀察留後魯國公世規之孫襄州觀察使襄陽侯令龜之子母和順縣君梁氏初賜名補右監門率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍侯天資挺特不待教而有立初魯公未有冡孫得侯甚喜故極愛之長而好學事親孝敬友于兄弟睦于宗族雖生長富貴而有儒者之風或勉以換官吏部者侯曰余重去親側如不得奉晨昏之養雖日受萬鍾不願元祐五年三月某日卒年三十有七娶杜氏封長夀縣君三男曰伯璵三班奉職二人及三女皆幼九年二月已酉葬河南永安縣銘曰古之求仕不逺千里或以親屈捧檄而喜惟侯之孝不去其親南陔戒養今見其人右監門衛大將軍墓志銘侯諱仲全字端玉曾祖元佐贈魏恭憲王祖允言安逺軍節度使同平章事父宗說池州團練使祁國公母清河縣君張氏初賜名補環衛官纍遷右監門衛大將軍仁宗不豫上表請灼臂以禱仁宗疾愈賜御書以旌之輕財好施治第吹臺之東亭榭池閣雕飾甚麗圗書翰墨環列左右當世知名之士間與往來曉音律尤善奕棋通于工巧技藝之事元祐六年二月庚寅卒年六十二娶陳氏封新安縣君先卒九男曰士雋右武衛大將軍賀州團練使曰士琫右監門衛大將軍曰士貝早亡贈右屯衛大將軍曰士黝右監門衛大將軍曰士儻士遒皆右侍禁士鋭左班殿直餘幼亡十六女長早亡次適左侍禁裴公謹次適內殿崇班周復古次適吉州司理參軍王洌次適台州録事參軍許求次適三班奉職裴阡次適三班奉職曹參三在室六人亡孫男十三人不溢右監門率府率不惑右班殿直不愚未仕不磷三班奉職不怍未仕不諂三班借職不佞不懼不華不危不羣不疑不瀆皆幼孫女十人四早亡曾孫男二人女二人長夭次幼九年二月已酉葬河南永安縣銘曰振振宗子侯多才藝灼肌請命忠簡于帝保其寵位以沒于世詒厥子孫繩繩善繼蔡國長公主墓志銘神宗皇帝之第九女母曰武美人生于元豐八年正月庚戌上即位為皇妹封嘉國薨于元祐五年正月壬辰生六嵗矣上輟視朝三日主性慧悟已能好書畫追封蔡窆奉先資福院九年二月已酉祔永厚陵之西原銘曰易贊帝妹詩美王姫其位在中車服有儀英宗之孫神宗之子何彼穠華未齔而止右監門衛大將軍嘉州刺史妻永安縣君向氏墓志銘君向氏皇太后之姪女曾祖傳正贈太尉祖約贈工部侍郎考宗儒刑部貟外郎君年十五適右監門衛大將軍嘉州刺史仲企性専靜寡言事舅姑勤孝溫謙敬慎族人稱之為皇太后所親愛嵗時賜賚有加及疾日遣中人存問國醫診視元祐三年十一月癸丑卒年三十有四太后遣中使致奠厚賻其喪十男曰士鑈曰士慮曰士焆曰士誃皆左班殿直曰士􅂒次未名餘皆幼亡女八人其壻三班奉職田有嘉施求三女未嫁餘皆幼亡孫男三人孫女三人皆幼九年二月已酉葬河南永安縣銘曰作嬪于宗帝母所親宜其室家子孫詵詵遐不眉夀早世隕身右監門衛大將軍貴州刺史妻永興縣君程氏墓志銘君程氏開封人曾祖懷亮左藏庫副使祖勳父祥供備庫副使歸宗室右監門衛大將軍貴州刺史令話事舅姑循法度以禮自防安素樂儉不喜紛華教子日督程課敦序夫黨勤勞中饋盡斥奩具置書史以助其夫之學有古賢女警戒相成之風元祐六年三月癸亥卒年二十有九二男曰子傳三班奉職曰子仙三女長早夭餘在室九年二月已酉葬河南永安縣銘曰程伯休父宣王司武孌彼宗婦克永其緒敬戒夙夜配古賢女右監門衛大將軍妻仁和縣君曹氏墓志銘君曹氏京師人曾祖詡贈比部郎中祖同文贈朝奉郎父評右奉議郎通判潁州君事父母孝性尚儉素好讀儒者書作五七言詩百有餘篇人多誦之其筆札亦精妙父嘗曰此女所配宜得賢君子年十八歸宗室右監門衛大將軍仲孴濮安懿王之孫南康郡王之子夫婦相敬如賔其夫前室之諸子愛之不異已出者無少不均接內外親族以和莫不宜之元祐四年四月丁巳卒年十有九二男曰士徂左班殿直曰士􅀈右班殿直四女皆在室九年二月巳酉葬河南永安縣銘曰曹出于周叔鐸始封遙遙後裔有嫁于宗方結其縭早閟厥容右侍禁墓志銘君諱士􅕈字子輿鎮江軍節度使兼中書令郇國公允成之曾孫華州觀察使華隂侯宗鼎之孫奉國軍節度使申國良僖公仲嬰之子母金華縣君陳氏繼曰長夀縣君魏氏君事親以孝聞丱嵗知學既長博通羣書善屬文美風儀材武過人尤長于射御初賜名授右班殿直遷左班請補外官監軍器庫門纍遷右侍禁監西京商稅未赴元祐六年五月甲戌卒年二十有六娶曹氏四男二人幼未名二人與二女皆早夭九年二月已酉葬河南永安縣銘曰男子之事禮樂射御詩美魯侯允有文武矯矯公子早終令譽右班殿直妻李氏墓志銘君李氏開封人五世祖昉相太宗曾祖昭述翰林侍讀學士祖正卿贈朝議大夫父士彥朝奉郎母嘉興縣君劉氏君夙喪父嘉興擇壻得其姊之子冀康孝王之雲孫英州防禦使之子右班殿直子翔入見禁中賜霞帔服君性淳和動有法則善書札通音律篤志于女功既嫁以書札音律非婦事絶不復為専奉祭祀勤定省針纊紉縫未嘗不親動必聽于其夫無所敢専隨夫監驛于邢州享年二十元祐八年九月已亥卒于官舍二男皆幼九年二月已酉葬河南永安縣銘曰李氏家法未墜素風捨彼繁聲専此婦功潔薦蘋藻公侯之宫右屯衛大將軍妻吉安縣君楊氏墓志銘君楊氏開封人曾祖全美贈太師中書令兼尚書令邢國公祖崇勳贈太師中書令兼尚書令齊國公考宗識贈左衛大將軍母福昌縣太君趙氏君幼端重容止有法柔靜寡言長適右屯衛大將軍仲參敬其夫如賔事舅姑以孝聞屯衛早世君年始二十母憫其孀獨欲奪志而嫁之君泣而不許母憐其節不强也自是屏簮珥斥鉛華衣服無文采晨起掃一室薰潔誦佛書柔日必齊素終老不厭稚兒未勝衣俾就學學晝誦夜講日課稍怠必嚴顔色而訓之族人或曰夫人有子單子名係屬籍設不使知道學富貴可坐致何苦效寒素家急祿養耶君曰生子不可不教吾獨一兒尤當力學以榮其身惰而愚非吾之志也族人乃服君有兄曰中孚有弟曰中良皆早卒藳殯未葬福昌君以為憂君捐斥奩具珠玊服玩以相其費餘以賙族人之貧者福昌君卒君號慕每哭衄血不止既葬以哀毁感疾病革子孫環泣囑其子曰吾見若成立瞑目無憾矣元祐五年十二月癸丑卒年五十男二人長未名而卒次士侐右武衛大將軍慶州刺史一女早亡孫男四人不器三班奉職不習右班殿直不憂三班奉職次未名孫女四人長適右班殿直寇彥若三人幼九年二月已酉葬于河南永安縣屯衛之墓銘曰衛母七子不安其室邦人刺之凱風是作宋有宗婦二十婺矛牙居之死靡他義殉其夫始為節婦終為賢母千載之後當式其墓范太史集卷五十一

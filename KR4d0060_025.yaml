body:
  text: 范太史集卷二十五宋范祖禹撰奏議乞免節讀漢唐史劄子元祐八年五月講官同入臣等近奉聖㫖令講讀官同將漢唐正史內可以進讀事跡鈔節成篇遇讀日進呈敷演已具劄子奏見欲鈔節繕寫候成卷帙即具進讀臣等竊以經筵故事講官講經讀官讀史仁宗時詔丁度等讀過前後漢書令撰序賜名前史精要止是讀官職事今臣等分講禮記讀官分讀兩朝寶訓若令講讀官同進讀漢唐史書即是講官兼讀官之職名分不正恐非經筵分置講讀官之意也伏乞特降指揮専令讀官鈔節進讀取進止薦張雲卿劄子臣伏見前陳州州學教授張雲卿文學履行稱于鄉黨為西都士人領䄂家貧四壁志操益堅晚得學官専意職業安恬靜默不求人知年踰六十終老未遇朝廷所宜收采以勸多士伏望聖慈特差太學官或三京教授一任取進止辭押賜劄子六月臣今月十三日準敕徐王六月二十九日生日禮物等差臣押賜者臣先于元祐三年任修實録檢討官著作郎兼侍講日巳䝉差押宗晟禮物一次今兹重煩敕命實所不遑臣伏見梁燾任中丞日曽辭押賜伏望聖慈特降指揮許臣依近例辭免改差未經押賜之人臣無任惶懼隕越之至取進止薦龔史尚潁劄子七月十三日臣伏見左宣德郎簽書鎮寧軍節度判官龔史蚤登髙第節操方正新授陳留縣丞尚潁强學力文履行修飭皆宜置之學校伏望聖慈特差充內外學官一次以助長育人才取進止薦馮山張舉劄子八月十五日臣伏見左朝請郎馮山熙寧九年為祕書丞通判梓州御史中丞鄧綰舉充臺官山自以素與鄧綰跡疏又不諳知朝廷事體乞免赴闕辭順義正不為激訐而風節自髙山以母老連任鄉國二十餘年不到京師臣素不識山之靣因修先帝實録見有辭奏而知其賢詢之西南士人稱山之美如出一口山年巳六十三丁母憂服除當赴闕朝參臣又伏見前睦州青溪縣尉張舉自治平四年甲科登第以侍親未嘗出官既終養遂屏居不仕元祐之初近臣論薦除潁州教授亦辭不赴臣于去年四月具劄子奏舉未䝉施行舉有節行文學登科二十七年年已五十不為世用二人者皆可為朝廷惜也伏望聖慈並加不次進擢置之清要以厲風俗必有所補取進止薦曽孝純文居中劄子右臣先于元祐五年十月劄子奏伏見奉議郎曽孝純故太傅公亮之子出官以來並不磨勘自丁父憂服除即乞尋醫先帝特賜孝純進士出身辭不受又除太常丞亦不就乞不次升擢或處以館閣之職未䝉施行臣竊以公亮定䇿勳亞韓琦歷相三朝配享英廟所宜甄録子孫紹續門户孝純不磨勘已二十餘年尋醫已十餘年尤當旌顯臣又伏見太官令文居中太師彥博之子資性端潔行如寒素昨任太常寺奉禮郎以避親嫌改太官令稍為下遷居中不以進退纍心恬然安職方朝廷推廣至公求賢不間逺邇況可用之才出于公相之門此尤不可遺也伏望聖慈並特賜擢用取進止聽政劄子九月十五日同蘇軾上臣等伏以天下不幸大行太皇太后登遐陛下號慕哀毁孝性天至在廷聞者無不摧隕今將總攬庶政延見羣臣四方之民傾耳而聽拭目而視此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也嗚呼可不慎哉可不慎哉臣等久備講讀職在論思首當獻言以助萬一陛下宜先誠意正心推廣聖孝發為德音行為仁政以慰答天下生民之望此在陛下加意而巳非有所難也願陛下循其本而行之則其末可以無難昔周公以成王幼弱故位冢宰治天下七年制禮作樂以致太平其功德至隆周公既沒成王追念周公之勳勞賜魯以天子禮樂使世世祀周公以為非此不足以稱周公之德也成王所以報周公如此故天下莫不歸心漢大將軍霍光尊立宣帝霍光既沒宣帝亦葬以天子之禮帝始親政事又思報大將軍功德夫周公霍光皆人臣也有非常之功故成王宣帝皆報以非常之禮而況太皇太后英宗之配神宗之母陛下之祖母有大功于宗廟社稷有大德于億兆人民于陛下之恩與天地無極豈人臣之比哉然則今陛下所宜先者莫如報太皇太后之德也自仁宗以來三后臨朝皆有大功章獻明肅之于仁宗慈聖光獻之于英宗鞠育扶持勤勞囏難亦未得如太皇太后之于陛下也元豐之末神宗寢疾已不能出號令陛下年始十歲太皇太后內定大䇿擁立陛下儲位遂定陛下之有天下乃得之于太皇大后也聽政之初詔令所下百姓無不歡呼鼓舞自古母后多私外家惟太皇太后未嘗有毫髮假借族人不唯族人而巳徐王魏王皆親子也以朝廷之故疏逺隔絶魏王病既歿然後一往太皇太后疾已革然後徐王得入進退羣臣必從天下人望不以已意為喜怒賞罰故至公無私之德雖匹夫匹婦之口亦能道之臨朝九年未嘗少自娛樂焦勞刻苦以念生民所以如此豈有他求哉凡皆為趙氏社稷宗室宗廟専心一意以保佑陛下也故身當其勞苦而使陛下享其安逸昔章獻明肅時親黨多僥幸濫恩仁宗既親萬幾不免釐革故小人不能無怨今太皇太后自臨朝以來左右請求一切拒絶內外肅然蓋以朝廷不可無紀綱故身當其怨而使陛下坐收肅清之功陛下如欲報太皇太后之德莫若循其法度而謹守之祖宗以來惟以德澤結百姓之心欲四海安靜無事仁宗行之四十二年天下至今思之恭惟太皇太后之政事乃仁宗之政事也然而仁宗聖性寬裕不忍拒人內降濫恩其後亦比比而有惟太皇太后嚴正至靜不可干犯故能外斥逐姦邪以清朝廷內裁抑僥幸以肅宫禁九年之間終始如一故雖德澤深厚結于百姓而小人怨者亦不為少矣今必有小人進言曰太皇太后不當改先帝之政逐先帝之臣此乃離間之言陛下不可不察也當陛下嗣位之初太皇太后同聽政中外臣民上書者以萬數皆言政令有不便者太皇太后因天下人心欲改故與陛下同改之非以已之私意而改也既改其法則作法之人及主其法者有罪當逐陛下與太皇大后亦以衆言而逐之其所逐者皆上負先帝下負萬民天下之所讎疾衆庶所欲同去者也太皇太后豈有憎愛于其間哉顧不如此則天下不安耳惟陛下清心照理辨察是非斥逺佞人深拒邪說有敢以姦言惑聖聽者宜明正其罪付之典刑痛懲一人以警羣慝則帖然無事矣陛下若稍入其語不正其罪則恐姦言邪說繼進不已萬一追報之禮小有不至此于太皇太后聖德無損而于陛下孝道有虧必大失天下人心陛下豈不見司馬光以公忠正直為天下所信服陛下與太皇太后用以為相海內之人無不欣悅光沒之日無不悲哀乃至茶坊酒肆之中亦事其畫像光所以得人心如此者為其能輔佐陛下與太皇太后功及天下也以光之功比之太皇太后止是萬分之一而百姓思之如此而況太皇太后有天地之恩于陛下有父母之德于生民四海愛戴思慕無窮陛下若聽小人讒說或追報有所不至或輕改其政事豈不大失天下人心乎人心離于下則天變見于上陛下雖欲為善以救之改過以補之亦無及矣孝者萬行之本本既不立則其餘何足觀焉夫小人之情非為朝廷之計亦非為先帝之事皆為其身之利也日夜伺候欲逞其憾者久矣今太皇太后新棄天下陛下初攬政事乃小人乘間伺隙之時也故不可不預防之此等既上誤先帝今又欲復誤陛下天下之事豈堪小人再破壞邪臣等恭聞陛下自太皇太后寢疾朝夕不離左右躬親藥膳衣不解帶憂瘁泣涕形于顔色自遭變故以來哀慕毁瘠中外具聞喪服之禮務從至隆又下詔發揚太皇太后盛德推恩髙氏此大孝之極也至親之際無所間然然而臣等猶言及此者竊以小人衆多恐置陛下于有過之地也如臣等所言雖萬萬無之然不敢不慮于未然或有纎芥流聞于外則臣等上負陛下不先言之罪大矣不勝憂國愛君之至唯陛下深留聖思取進止貼黃臣等伏見英宗即位之初小臣中有張唐英者上慎始書預言不宜追尊濮王近臣中唯司馬光先言之其後建議者上誤英宗追尊濮廟舉朝皆以為不可朝廷雖盡逐臺諌而言者不息英宗終不能奪衆論聖意但悒怏而已及神宗即位深悔英宗不從衆言遂擢張唐英為御史而司馬光大被信任今小人進言臣等固未知其有無然不敢不預言者亦慮朝廷既有其端則忠正之士必爭論不已不唯上撓聖懷亦使天下聞而不平人心一離不可復收陛下他日追悔無及臣等憂懼危栗實在于此唯陛下深察第二劄子二十三日臣竊惟太祖受天眷命剗革五代之亂櫛風沐雨為子孫立萬世之基太宗平一海內守之以文由真宗至于神宗皆致太平海內晏安百三十有四年雖三代之盛未有如此其久者也自古創業之君起于細微身歷囏難親履勤勞先有功及民然後享天下之奉故失之者常少守成之主生于深宫不歷囏難不履勤勞無功及民而享天下之奉故失之者常多是以古人有言創業非難守成為難蓋危亡必起于治安禍亂必生于逸豫也今陛下承六聖之遺烈守百三十四年之大業當思天下者祖宗之天下不可一日而怠人民者祖宗之人民不可須臾而忘百官者祖宗之百官不可私非其人府庫者祖宗之府庫不可用非其道常自抑畏警飭聖心一言一動如祖宗臨之在上質之在旁則可以常享天下之奉而不失矣自元豐之末時運囏厄先帝早棄天下陛下嗣位幸賴先太皇太后以大公至正為心罷王安石呂惠卿等所造新法而行祖宗舊政故社稷危而復安人心離而復合乃至契丹主亦與其宰相議曰南朝専行仁宗皇帝政事可敕燕京留守使戒邉吏守約束無生事陛下觀敵國之情如此則中國人心可知也先太皇太后日夜苦心勞力以為陛下立太平之基九年之間安靜無事巳有成效陛下但由此以持循之則成康之隆不難致也臣願陛下守之以靜毫髮無所改為恭巳以臨之虛心以處之詔左右大臣動必循守祖宗法度陛下躬攬于上咨諏善道察納讜言則羣臣邪正萬事是非必皆了了于聖心矣夫水所以能照毛髮而物無所隱其形者至平也鏡所以能鍳妍醜而人無所遁其跡者至明也水所以能平鏡所以能明者至靜也使水鏡自動則雖山嶽不能見也人心亦然唯至公可以見天下之私唯至正可以見天下之邪唯至靜可以見天下之動荀卿曰虛一而靜謂之清明聖人清明燭理生于心之虛一也陛下何不觀先太皇太后自英宗神宗時不出房闥未嘗知天下之事一旦臨朝所行之政上當天意下合人心其故何哉唯至公至正至靜而已夫小人之情専為私故不便于公専為邪故不便于正専好進故不便于靜唯欲人君多所作為朝廷多所變動則已有所希冀于其間矣若朝廷守靜上下各安其分則小人何所望哉今陛下既親萬幾小人必欲有所動搖而懷利者亦皆觀望臣願陛下上念祖宗之囏難先太皇太后之勤勞痛心疾首以聽用小人為刻骨之戒守元祐之政當堅如金石重如山嶽山嶽可移聖政不可改也金石可毁聖心不可變也使讒邪者不能進說觀望者亦皆革心則自今以往朝廷清明必日勝一日歲勝一歲矣陛下如以臣言為然乞因大臣奏事之時明示以聖意所向使中外一心歸于至正則天下幸甚臣久侍帷幄不敢自同于衆人恐有姦言邪說惑誤天聽故近與蘇軾先事上奏必䝉省覽陛下聖學稽古不必逺師前世之事唯是儀刑仁宗法則太皇太后使天下熙熙然至于昆蟲草木各安其生則臣之志願也不勝區區之愚取進止議諡狀十月十日右臣伏聞大行太皇太后擬諡曰宣仁聖烈臣恭以先太皇太后極功全德保佑皇家光越前人冠映千古雖究盡諡法不足以形容盛美上副陛下孝思欲報罔極之意臣竊懷愚見不敢不言謹案諡法聰明睿智曰獻若以獻字易烈字則功烈可從而知又明肅太后上二字曰章獻慈聖太后下二字曰光獻今諡先太皇太后下二字若曰聖獻則于稱號尤美伏望聖慈更與大臣詳酌以慰答神人之望謹録奏聞旌孝劄子十四日臣先修神宗皇帝實録伏見元豐六年資州奏資陽縣民支漸于熙寧中喪母纍年始克葬因廬墓側日三時號慕肘行膝步自負土起墳初有雙白雀徘徊松上明年有一狸馴墳側觀漸上土又明年夏每當午培墳日色炎盛輒有隂雲蔽覆即遇霖雨方負土時亦暫霽止又有異烏一目如丹至漸哭常悲鳴向漸夜有二狐狸呼繞如巡警之狀久之有烏羣集內一白烏獨日至漸培墳處回旋後又有五色雀萬餘隨漸行哭十日而去漸已年七十每號慟涕淚如雨日唯食脫粟飯不盥手濯足所衣苴麻至爛碎鬚髮亦皆斷亂見者為之惻楚所居鄰人勾氏之子自娶妻即棄其親不養觀漸至行因夫婦感慟即日迎其親還舍朝夕侍奉不少懈漸精誠格物諸祥屢至變其里俗乞旌賞之詔賜粟帛臣今因修正史再牒資州㑹問支漸事跡恐有未盡及要見本人存亡據資州今年七月回申資陽縣追到支漸取問漸見年八十與妻阿王同歲夫妻各無疾恙漸自培墳三年歸家後于元祐五年內白髮退落再生黑髮及四齒已落復生今身體輕健二時飲食如舊臣竊謂支漸以匹夫行孝能感天佑助報以夀考康寧之福在于朝廷理宜奬勸况在先帝巳賜粟帛付之史官今漸八十尚存伏望聖慈特授漸一長史助教或更優與名目旌其至行可以激勵風俗有補孝治之化取進止舉學官劄子十一月十一日臣伏見左奉議郎石景略左宣德郎李瑺新知䕫州奉節縣事楊彭皆有文學履行為士大夫所稱伏望聖慈特差充內外學官一次以待任使取進止論召內臣劄子臣近聞陛下召內臣十人而李憲之子亦在其中又召數人而王中正之子亦預其數中外之人以至民庶無不籍籍私議深以為憂皆言執政大臣不能固執置陛下于有過之地自今更有大于此者驟加召用必駭衆聽若大臣又不能固執則是朝廷全無綱紀公議遂廢其于聖德為損不細何者陛下初親庶政今方踰月四海之人傾耳屬目未嘗聞行一美政訪一賢臣先進用內臣如此衆多必謂陛下私于近習人心一失不可復收雖家至户說無以自解臣竊為陛下惜之伏望聖慈更加審慮特賜追改以安中外之心取進止范太史集卷二十五

body:
  text: 范太史集卷一宋范祖禹撰詩樂通神明御試世治興和樂陽來符正聲純能格天地幽可逮神明協氣流無外靈心識太平九歌人鬼享八變地祇迎翕縱多祥集欣歡萬祉生須知勳德大聖作掩英莖春鮪初登錫慶院試風煦陽和候氷消水澤春乘舟施密罟登鮪薦明神大壑翻紅鬛長波失錦鱗味參籩實美羞與澗毛新事異觀棠日時非濫泗辰猗歟潛有頌率職自漁人遊先主祠堂置酒驅車出郊坰涉溪上青岑峰頭野寺不足到先主祠堂猶可尋祠堂之前流水長翠屏重疊搖清光老松窈窕入雲漢五月鬱鬱炎天涼廟中女巫日歌舞神去神來何處所龍吟虎嘯生風雲未似當時臣遇主三分割據霸業開山河氣象皆西來功名烜赫陵宇宙顧盼可使強敵摧西南歷數俄遷改岷峨霸氣今何在萬里浮雲卷壯圗空餘江水東流海山風吹月海上來松間雲氣噓酒杯髙歌且醉一杯酒昔日英雄安在哉此時分散已陳迹何足慘愴令心哀四皓南山石壁陵蒼蒼中有四老眉如霜中原龍虎困格鬭九霄鸞鳯髙飄翔赤精斬蛇入咸陽南極老人轉遁藏一朝相顧下雲巘共為羽翼安儲皇白雲黃鵠髙飛揚雖有矰繳安能傷君王慷慨但飲酒戚姫起舞無輝光古人不見雖已逺吾將杖䇿登崇岡席上探題二首紅蕉花誰植風流太守家爍爍犀燈燃晚雨亭亭蜜炬照晴霞秋夜雨點滴梧桐亂人語幾行寒雁起沙汀萬里漁舟泊煙渚資水資水通巫峽誰家萬里船隨雲排楚氣隱几上吳天神女迷朝雨湘娥泣暮煙何時一飛楫長嘯下牢邊資中八首劒閣橫空鎖蜀門資中巖岫若雲屯天傾白日千山砥峽束長江萬里奔資山巖谷多神仙鸞車鳳馬隨飛煙神女蕭蕭來暮雨浮丘往往下雲軿醮壇髙倚碧天開中有清都白玉臺霧擁霓旌乘月去風吹仙樂下天來五月江流萬賈船迅如飛電擘羣山荆雲峽雨須臾過白帝江陵朝暮間六月炎蒸烈火髙黑雲驅雨駕波濤千崖雪浪飛泉吼萬壑隂雲古木號風定江澄境象間水清波影倒雲山漁舟蕩漾清光裏白鷺驚飛杳靄間夷界荒山幾萬重西窮月窟與天通何時漢使還持節從此乘槎上碧空武侯祠廟遍空山萬古名垂宇宙間昔日南人皆稽首至今歌舞聚夷蠻資州路月山亭軒亭枕蒼峯縹眇視空濶長江翻天去回斡地軸折洪濤破山門崖谷盡爭裂孤雲行無蹤飛鳥去自沒遊子怨路長煩襟此披豁昔觀黃河流浩蕩窺禹穴乾坤何壯觀永歎舊逰絶兹亭雖非匹山水頗秀發茫茫八紘內所歷但毫末安得乘飛颷人寰恣超越資州路東津寺寺有古佛殿唐乾寧元年所建山行無晨暮日暝崖谷昏哀猿落客淚永路驚旅魂慿陵髙山巔俯視大江奔迥環島嶼合縈轉洲渚屯行雲赴楚天飛鳥下蜀門地遐怪物聚寺古深殿存憶昔李氏末煙塵暗中原姦雄競草竊割據窮海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水靜蛟鼉騫臨風獨笑吒浩蕩欲飛翻月夜船行入資州憶昨卧碧山蒼蒼叢桂間白雲為屏石為枕緑蘿長挂明月間忽乘輕舟泛江水山月隨人還在此白鷺驚飛宿靄間青山倒卧滄波砥此時孤棹發中流川后停波聽棹謳不學子猷中夜返欲乘眀月向資州七月五日熱退喜涼資中有懷二十四韻仲夏金火爭隂陽勢相奪乾坤鼓洪爐夸父死奔渴普天無纎雲厚土萬丈裂亭亭太陽午安得日車跌清冷想寒門浩蕩思舞雪嘆彼老農耕有苖不得活乞雨禱潭龍望雲驅旱魃帝車俄回指四序苦飄忽木落天地秋清霜洗空濶涼風破閶闔勢欲捲溟渤衆鳥盡不飛峥嶸見孤鶻登臨滌魂神颯爽動毛骨因懷京洛間車馬填城闕紅塵暗天宇愚智共汩沒出門無所適肝肺為枯竭平生喜林泉瀟灑愛風月滄浪有漁父逸步脫羈紲超然思逺逰萬古訪遺轍安能公侯間俯僂事干謁及來山水縣素志得少豁白石拂雲眠芳蓀乘露擷尋山喜幽勝照水玩澄徹雖無巢許操夙慕夷齊潔庶以保吾真無為事其末文潞公生日天監仁皇德惟時嶽降神英姿備文武賢業富經綸夢賚求巖野于畋載渭濵三朝瞻上宰四海入洪鈞謨烈重光啓樞衡萬化新圭璋扶日月劒履上星辰述職分東陜宣威震北垠長城萬里逺奠枕四夷賔自昔登儲后惟公秉國均川河賴舟楫霜雪見松筠閶闔朝黃道雲龍對紫宸忠勳藏廟祏異禮冠臣鄰風雨王城會煙花洛苑春麾幢近泉石袞繡出埃塵照社祥光盛充閭慶旦臻御爐熏黼黻天廄輟騏驎帝念深元老邦基屬柄臣公雖慕前哲天欲覺斯民左右蕭何手安危晉國身濟時歸夀域遐算等靈椿送趙清憲入蜀上聖隆西眷中朝報巨賢三刀重夢寐四國賴蕃宣自昔方隅逺惟公惠澤偏絃歌初撫字使節再聨翩召父深仁浹文翁美化全南圗回海浪北極上星躔霖雨蘇羣物卿雲被八埏從容方論道引避不居權忠馭何頻叱行帷義一褰漏天開霧雨燒棧掃雲煙玉壘山橫雪羅江水映綿閭閻瞻冕服父老識旌旃清靜嘗能理煩苛冀盡蠲銷兵無吠警含哺但安眠富庶寧加此功名固有焉豈惟私蜀土佇更秉陶甄送聖徒入京兼呈紀常子進二年隔京洛思見亦已久驪駒將戒行姑共一杯酒君來買園林山川既富有顧我猶旅人安排卧林藪不意嵩嶺雲輸君先入手謀生已知拙髙遁慙居後貴富等浮雲名聲似箕斗終當結茅屋鄰舍聞雞狗杖屨作往還過從惟野叟愛君修竹間一水似崖口掃除石上月寒檜搖青帚早賦歸去來無為事奔走前期知非逺同集待諸友寄我思洛詩東風想回首大雪入洛陽昨夜關山雪僕夫晨起驚揮鞭騎紫馬曉入洛陽城川原渺茫茫長嘯視八紘有如乘風馭迢遞奔玉京伊水象天河雲濤向東傾喧然古都市沽酒吹玉笙豫心正浩蕩萬里赴歸程遙望嵩峰頂連天凍峥嶸欲攀玊女窗舉手摩太清思之不可去悵望空含情寄名山李著作劒外雖云逺名山信日聞漏天常泄雨蒙頂半藏雲萬里飛鳬舄三年隱豹文茗芽春後好應許故人分砥柱四首黃河傾落九天來砥柱三山立欲摧崖谷吐吞成霧雨蛟龍戰鬬作風雷巨靈贔屭兩山開東放黃河萬里來地軸橫斜爭斡轉天維欹側恐傾摧禹開砥柱放河奔濁浪軒軒日月昏唯有三門君不見驚波一起動乾坤砥柱初開禹力窮黃河從此去朝宗長鯨一噴連山起岌嶪髙於太華峰望嶽客行西入函關道秀氣東來滿關好北顧黃河天際流回望荆山欲傾倒前瞻太華三峯髙中天屹立爭雄豪羣山朝嶽皆西走勢似長風驅海濤金天殺氣何蕭爽羽駕颷輪應可往安得雲梯倚碧空上拂煙霞看仙掌希夷陳先生祠堂太華朝紫清蓮花開緑煙嘗聞希夷隱欲學南華仙道與寥廓友形隨變化遷餐霞倚八極御氣逰九天靜夜披蘂笈清晨潄瑶泉間臨日谷嘯下拂雲窗眠一朝玉棺墜委體同蛻蟬霓旌自宛轉羽駕何飄翩空餘故館在遺像猶依然嗟吾生已後不得見當年扶搖若可借永謝區中緣望朝元閣昔年曽上閣邊行步步凌霞出太清鶴駕不歸雲縹眇鳳簫空斷目分明秦川錯繡孤煙媚渭水浮銀落日橫惆悵重逰今未遂參差天半望飛甍長安東風吹塵客心起京華去蜀三千里我來踏雪走函關下視秦川坦如坻曉登太華三峯寒慿髙始覺天地寬却惜京華不可見煙花二月過長安長安通衢十二陌出入九州橫八極行人來往但西東莫問興亡與今昔昔人富貴髙臺傾今人歌舞曲池平終南虛繞帝王宅壯氣空蟠佳麗城黃河之水東流海漢家已去唐家改茂陵秋草春更多豪傑今無一人在細觀此事何足愁不如飲酒登髙樓秦王何苦求九鼎魏武空勞營八州當年富貴一時事身後寂寞餘髙丘春風開花不易得一醉何必封公侯過朝天嶺二首夜上朝天曉不極舉頭唯見蒼蒼色回看初日半輪明下視嘉陵千丈黑地拆天開此險成飄蕭毛髮壯心驚人間行路難如此嘆息何時險阻平遊李少師園十題松島孤嶼何亭亭蒼松鬱相對池中蛟龍起天際風雨會芡池向日鋪青蓋浮波散緑盤明珠洛浦珮白玉水仙丹笛竹鳳食實已美龍吟聲更竒惜無蔡雍識那得馬融吹鶴王子吹笙去仙禽下雲端夜棲松月靜朝舞檜風寒水輪崩騰噴雪浪晝夜無停息回旋天磨轉運動日卓側竹徑整整植翠旗森森列羽衛微風羣玉動赫日蒼雲翳蓮池藻荇遍回塘芙蕖出清水紅燈迭照映翠蓋相磨倚月桂天寒桂子墮花發向庭中月華十二滿常照此芳叢雁翅柏髙枝含煙霧密葉張羽翼參差隨風勢慘淡入雲色茅菴結茅深林下開户流水邊曉聽松風坐夜枕雲濤眠和張二十五逰白龍溪甘水谷郊居雜咏七首君家瀟灑住園林更入青山徑路深唯有白雲為得侣祗應流水是知音松姿鶴性自宜間天與幽竒避俗喧謝客風流臨海嶠秦人歌嘯入花源南窗髙卧看雲生日暮回風動紫荆鼓吹不須過野塢青蛙雨後自能鳴田家何所樂野老飯蒿藜沙月鷺投宿松風猿亂啼侵衣青竹冷拂面緑蘿低幽步無車馬唯應杖可攜石徑人行少山雲袖拂看水流情共逺天濶望隨寬笙磬珍禽響龍蛇怪蔓盤洛川回首處煙靄暮漫漫夜靜月明溪水喧先秋風物已蕭然藤蘿作帳雲為枕冷挂絺衣石上眠青山跬步去無由唯有登臨可散憂浮世只知軒冕樂幾人能得少時休西街西街春日永輦道與天通御水橫銀漢仙橋挂綵虹草荒平樂館花發上陽宫擾擾都門路輪蹄日向東和子進六言二首夜靜碧天如水山空明月隨人此興庾公非淺逺逰王子何頻蕭散獨逰何處寂寥四顧無人月露霑衣覺久水風吹面宜頻和子進千春院觀桃花二首西度天津水見沙輕風飛蓋緑楊斜相逢喜到千春寺最後方開第一花富媪英華當間出東君照育想非賖神仙髙格黃裳色安得深根植帝家鳯剎花光照碧霄龍樓栁色暗朱橋夸娥素月人疑近姑射仙山路豈遙琮玉溫姿輕拂拂鞠衣嘉色宛飄飄都人莫怪芳華晚如隔煙霞在泬寥三月十八日雨後訪張二十五以詩見寄次其韻池上魚相樂林間鳥不驚雨餘荷氣濕風動水紋生俗客心猶爽髙人興自清何時作鄰里卜宅剪榛荆又和再寄二首青春忽已過白髮不須驚招隱尋居士論文訪友生到來塵慮息歸去夢魂清尚想穿幽徑楸花間紫荆花落春臺靜鶯啼曉枕驚竹間流水過窗外白雲生襟抱懷氷爽詩篇叩玊清荒唐漆園吏環堵但披荆張三十病愈久不相見以詩寄問公幹清漳卧維摩淨室居作詩心在否問法意何如臺榭花飛盡池塘雨洗初劇談能強起便欲駕柴車和張二十五春日見寄五首綽約花無語間關鳥自吟及時須賞玩風雨不能禁莫恨生華髮唯須不負春風光無老少祗屬有情人來詩云未分生華髮瀟灑幽棲地山嵐日夕昏松風吹緑綺溪月湛清樽白日春臺上歡娛莫訴杯飛花留客醉啼鳥近人來流水家家入修篁處處同城南履道宅白傅有遺風和子進夏日憶寶上人徑蘚鋪蒼錦林花落絳趺山光入戶牖雲氣起瓶盂宴坐期三月迷行有萬途寥寥方丈室一物更應無秋夜月上霜威重煙消霽景分嶺猿寒嘯侣澗鹿夜呼羣天靜纎毫見山空落葉聞此時真吏隱髙卧看浮雲送廷珍殿丞兄通判閬州十年京洛弄殘書喜見西歸别駕車錦里追逰貧莫厭綵衣榮侍樂何如詔條安逺民為本才刃如君地有餘不日還趨宣室召伊川重訪野人廬寄題傅欽之濟源草堂傅公有幽居近在盤山下清濟出其間白石明可把盈科赴溟渤習坎日傾瀉竹色洗娟嬋松姿照蕭灑室有古詩書門無俗車馬公居雖畎畝寤寐惟朝社雲山聊嘯遨魚鳥同遊冶在我本無心羣生繫用捨終當入帝夢肖象求巖野題詩寄林坰俚調慙非雅范太史集卷一

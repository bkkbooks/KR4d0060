body:
  text: 范太史集卷七宋范祖禹撰表代王君貺宣徽北京謝上表偃藩全魏掌籥留都選授所囏寄付尤重中謝伏念臣識非慮逺才不兼人被遇三朝歷年四紀竊隆名於薇省視峻秩於台司往嵗詔自西都日朝法扆宣聖猷而何補尸厚祿以空慙輒貢需章懇祈閒職寬恩從欲蕃錫示慈特置使於祠庭俾即安於私館間者祗奉召節入對邇顔幸陪宗祀之儀獲預駿奔之列天光委照宸眷曲臨特頒渙汗之恩復假北門之守越從散地併總劇權此蓋伏遇皇帝陛下盛德日新至仁天覆責實羣后分治九圍眷朔土之奧區為浚都之巨屏大河斯控重兵所屯常輟元老之臣俾居連帥之職夫何圗舊猥及匪能重念臣久齒近班三領兹任撫綏之要鎮守之宜雖素乏於智謀嘗粗經於心目敢不益堅晚節彌激懦衷勉企前修仰酬洪造謝敕書奬諭賜銀絹表以下代司馬溫公臣某言伏䝉聖慈以臣編修公卿百官年表成書降敕書奬諭仍賜銀一百兩絹一百匹者奏篇甫上褒詔爰頒荷寵若驚省躬無措中謝伏念臣淺才末學苦節孤忠久塵侍從之班曽乏猷為之補頃膺睿㫖俾纂舊章恭惟祖宗創業垂統之難邦國立政任官之要必表年而紀月可鍳古以驗今略舉宏綱庶存成式淹留纍嵗紬次終篇仰稽乙夜之觀方虞曠職之咎敢期溫詔發自淵衷錫外府之貢金加丘園之賁帛載惟虛受罙切靦顔此蓋伏遇皇帝陛下順考百王丕承列聖德剛健而篤實學緝熙於光明眷執簡之微勤形贊書之重奬寵踰華衮既稽首以拜嘉賜厚百朋實無功而冒賞謝再任崇福宫表囊奏上陳實為貪祿黈聰垂聽亟沐頒恩仰荷寬優伏增兢悸伏念臣器非適用學不知方被遇三朝叨塵二禁辱天光之顧問侍經席之從容亦嘗委總憲司訖無報稱擢陪樞府終獲懇辭剖竹雍都蔑聞於治效分臺洛邑幸養於沈痾仍再領於祠庭遂十更於嵗籥頃自受命先帝俾刋舊聞逮陛下之纘圗發德音而繼志而臣攜藁在外奏篇未終蓋簡冊之浩繁致嵗時之淹久雖官守無事慙四體之不勤而史筆專精實寸隂之是惜懼先溝壑以負恩知久去班行顧其他而無補坐糜祿廪常自訟而靡遑尚或無厭曾不知恥輒披私懇輕冒宸嚴豈謂皇帝陛下大德包荒至明燭逺罔責再三之瀆曲垂開可之私蓋特出於異恩故不拘於畫法乾坤至大雖萬物皆遂其生雨露所私或一夫獨被其澤惟顓愚之無狀容僥幸以滋多臣敢不深戒晏安祗勤夙夜畢精撰述圗報生成慰山陵禮畢表臣某言伏覩今月十日慈聖光獻太皇太后山陵禮畢者溥天同軌有嚴聖后之喪卜壤因山備盡孝孫之志寢宫長掩廟祏惟新臣某誠哀誠懼稽首頓首恭惟皇帝陛下行過髙宗念深文母極奉終之大事懷追逺之至哀瞻容衛以如存痛音徽之不返原陵永固與天地以無窮祀享深思惟春秋之匪懈伏望順禮之變卒哭以時加養體之膳羞護如神之志氣上承宗廟下庇羣生凡在臣民不勝懇願臣屬居官次阻覲闕庭瞻望宸極臣無任悲隕激切之至謝四任崇福宫表自天有命如地兼容祗荷寵私伏增汗愧中謝伏念臣性非語上學昧造微仰㑹聖朝繆塵侍從久去近嚴之列曠修臣𨽻之勤荐領祠宫坐貪天祿而年齡逾邁齒髮益衰疾疢交攻形神日耗唯職思於簡冊庶上助於謀猷敢期復霈厚恩俯從私欲此蓋伏遇皇帝陛下大明委照罔間幽遐洪造曲成不遺品物收簮履而未棄憫蒲栁之先凋特加異於常倫俾養痾於散秩顧勤勞之靡效曷報丘山冀撰述之有成少禆毫髮辭免轉正議大夫表中天霈澤近輔書勞亦及罔功豈容虛受伏念臣素無他技唯罄孤忠誤䝉纍聖之知寖服近僚之列終因人乏進二宰司先帝審訓羣臣靡預誓言之末陛下嗣膺大寶曽無翊戴之勤豈弗畏於多言詎敢當於懋寵矧乃方任人而立政惟即命以記功將深戒於官邪宜先從於近始伏望皇帝陛下慎司名器申勸臣鄰收出綍之過恩亮循牆之愚懇爵惟馭貴免上纍於至公賞必及勞庶率由於舊典上太皇太后表仁惟圗舊賞異及勞義所當辭情難冒處伏念臣早緣末學被遇纍朝乏稽古之令猷無致君之逺業入陪經幄久親日月之光出領祠宫實荷雲天之施㑹慈宸之御極登嗣聖以承祧誤膺乏使之求擢預贊襄之列屬寵褒於近弼特序進于文階顧無橫草之勤均被出綸之渥輿情共駭內訟靡遑伏望太皇太后陛下洪造聽卑至明燭隱慎守馭臣之柄無輕出器之名昭示大公輟已行之成命少安遇分息被已之深譏謝表離明繼照兌澤旁流祗受以還震惶無措臣聞以賢詔爵則民興行誼眂功為賞則下絶覬覦故德盛者其位隆力勤者其報厚勸沮斯在授受靡虛伏念臣學不適時才非經世謬塵近列最後諸臣辱體䫉之兼隆竭股肱而無補屬舉懋官之典咸疇衛上之勞績用蔑聞褒章誤及雖危衷之備列終成命之莫回居寵無名在顔有靦此蓋伏遇皇帝陛下馭臣惟禮厚下以仁優其進等之恩責以致身之節乾坤至大均覆載以不遺日月無私委照臨而盡及永圗報塞唯誓糜捐謝太皇太后表明綸誤及渙汗難收弗獲懇辭終慙冒處伏念臣自陪機政無補聖猷雖夙夜以自彊惟事功之匪立每流年之是惜加衰疾之所嬰敢以瘝官復當懋賞是以歷陳故實備述悃誠荐奉詔音兩䊸使節對天威之咫尺煩睿訓之丁寧循走無從彊顔祗受此蓋伏遇太皇太后陛下至仁勤施大德兼容推均一於鳲鳩昭忠厚於行葦體乾坤之覆育品物不遺並日月以照臨光明下濟誓殫駑力仰答鴻私謝起居減拜表伏準閣門告報今月十四日內降以臣與吕公著近各推恩轉官所有將來正謝特令兩拜起居餘免舞蹈仍於執政官班次後别作一班及自今後凡遇前後殿應干大起居特令别作一班止兩拜起居恩出非常禮加異數優假太過慚負愈深中謝臣猥以瑣才預聞機政去春以後疾疹屢生入冬以來飲食漸少逮兹嵗序之首頓覺筋力之衰拜起絶艱朝請殆廢內惟恩紀之重天地所不能踰退思績效之微絲毫未嘗有立欲避位則為罪益大欲就列則强力不前朝夕為衆目所觀啓處無措躬之地敢謂太皇太后陛下仁霑枮朽明燭幽微特虧著定之儀曲遂形骸之便臣詢諸故老或謂有舊章然彼皆位躋宰輔之崇德著耆明之美豈臣么麼所敢比方欲辭則實所不支欲受則自知非分踧踖心悸戰兢汗流惟仰賴於寵靈冀有瘳於藥物病庶遄已禮得如初期於竭忠不敢愛死辭免除右僕射表非常之寵丕降於中天不次之恩驟加於庸品承命震駭顧已靦慙伏念臣起自諸生初無逺業學不足以迪先民之覺才不足以揆當世之宜徒以被遇纍朝服勤庶職荷生成於天地無禆補於涓埃惟知直道之可行勉罄孤忠而自守仰屬繼明之始首膺訪落之求拔自散僚進陪機政苟可利國知無不為期於致身死而後已比嬰衰病纍貢危誠祈解組以即安庶負薪之可愈忽奉告庭之命併叨躐等之榮越從三事之中擢冠百僚之上力小任重居寵思危義所當辭情難冒處伏望皇帝陛下逹聰埀聽劼毖任能灼知三俊之心深慮萬機之委慎名器而不假念后臣之克囏俾逃竊位之譏獲遂循牆之請上太皇太后表誕告外庭眷求同德延登上宰猥屬匪能承命兢惶無所容措臣聞宰相者所以代天理物論道經邦上和隂陽下遂動植權衡賞罰藻鍳賢愚大厦棟梁豈容于撓弱巨川舟楫將濟於囏危苟非得人則必誤國臣早塵顯仕晚玷近司受恩不資竭力無補加以疾雖損而未已老將至而益衰將何以率萬邦黎獻之多居三事大夫之首內附百姓外鎮四夷非薄力之所堪懼瘝官之有咎義當引避情敢冒居矧今俊乂孔多耆碩咸在必有良弼仰當聖心伏望太皇太后陛下考慎其人登庸於位俾熙帝載以亮天工如臣之愚恐不克稱乞回明命以示至公第二表囊奏上陳誠辭既竭綸言申答謨訓未俞臣竊惟自古睿聖之興皇天所祐必有碩輔為時挺生同德協心建功立事故有堯舜之后乃有稷契之臣有成康之君乃有周召之佐用能盛烈格于上下鴻名冠乎古今方冊所稱軌躅可見陛下大明出震至德承祧始在亮隂動循禮法既親典學日就緝熙實惟億世無疆之休兆民咸賴之慶宜得先覺之士老成之人左右有民承弼厥辟同底于道永孚于休如臣之愚曷副兹選而况弗循位序敻越等夷非拙分之所安亦多言之可畏靡遑夙夜如蹈氷淵伏望皇帝陛下鴻造曲成至仁廣施聽輟已行之命免貽非據之災詎敢飾辭恭祈報可上太皇太后表命出非常義無虛受仰勤睿㫖未奉俞音臣伏以在昔仁皇纂圗明肅聽政英祖嗣服慈聖臨朝皆有宗工之臣一德之相誕保皇家之定命發揚文母之徽音是以左右前後罔非正良號令風采咸可稱述克有成烈底於太平民到于今並受其福陛下齊任姒之聖保成康之君坤德靜而直方母教仁而慈愛端拱宸極丕冒海隅敷求哲人式序在位宜得碩輔翼宣大猷臣本非長才又乏逺識誤膺器使進二宰司不以德功超居鼎鉉將何以對揚休命追配前人安海內於覆㿻尊京師而奠枕兹任尤重非臣所堪伏望太皇太后陛下深軫睿慈亟回成命庶少安於過分免上纍於知人謝表君勞求賢實出過聽聖職論相非容懇辭拜命以還靦顔無措伏念臣受才至薄造道匪深無所有以及人唯自信而行已逮事仁祖被遇英皇膺前席之眷知奉邇顔之顧問當熙寧之初政近神考之清光唯知至誠可事明主冀以直道少禆聖時先帝察知不欺聽順所守恩厚侔於天地禮待優於臣鄰思隕首以無從痛上賔之已逺陛下大明繼照庶政惟新祗遹先猷眷求舊物越從散地擢置近司尸厚祿以空慚罄拙謀而無補屬嬰病苦久賜告休宜從䇿免之科乃奉庭揚之命延登揆路進備冡司顧非經世之才實玷代天之任日有萬幾之慎慮身無數器之兼能辭不獲從居之益懼此蓋伏遇皇帝陛下䖍膺駿命誕受丕基永惟立政之囏思致生民之義謂職業粹於羣下故加體貌之隆治亂在於庶官必自股肱之助方恭默以思道將垂拱而責成乃俾瑣才遽當重任臣敢不上體至眷愈堅一心不遺力於餘生庶少酬於鴻造謝太皇太后表成命已行難收渙汗力辭如僞終負靦顔祗受以還震惶無措臣竊以經綸天下之務必得名世之才斟酌元氣之和實惟宰物之任德稱其位古難其人矧當宵旰之勤協濟囏難之治伏念臣早緣末學歷事纍朝徒罄愚忠無禆至化荷天地生成之德䝉山海包納之仁知其一介之無他惟有寸誠而可録陛下睿明臨照旁及幽遐聖政始初眷求耆艾擢居左省參翊大猷豈聞嵗計之有餘未覩時雍之於變卧家嬰疾曠日瘝官猶圗報於君親已分填於溝壑遽奉告庭之命併加躐等之恩承乏宰司秉均揆路越處百僚之上榮升三吏之崇夫何迂拙之人驟被燮和之寄此蓋伏遇太皇太后陛下布昭明德保佑丕基思濟羣生永綏四海惟責成而任下故獨斷而不謀特出淵衷俾司大柄雖自昔君臣之㑹遇如此幾希而當今宗社之安危莫斯為重臣敢不夜以繼日公爾忘私庶圗毫髮之勤上答乾坤之施謝優禮表非常之禮振古未聞不世之恩容身無所伏念臣自嬰疹疾久限朝趨違夙夜匪懈之勤回日月並明之報方祈病免乃被褒升既孚號于大庭仍賜告於私室相臣如此舊典所無欲辭則阻覲於天顔欲拜則不䖍於君命進退維谷戰兢履氷實上賴於寵靈幸小瘳于藥物猶以足瘍為梗體力未勝詔免造朝俾先治事愈弗遑於寧處終獲遂於懇辭復膺眷注之優曲就疲羸之便諒非獲已乃敢欽承肩輿及門百辟駭視給扶入殿兩宫賜存對咫尺之天威幾顛倒於臣節自昔元勳碩輔大老宗公或以詢謀特加異數豈伊庸瑣乃更超踰顧兹綿薄之餘生益恐危亡之無日此蓋伏遇太皇太后陛下覆載侔於天地恩義兼於君親曲垂恤下之仁特越循常之制雖不能陳力就列猶將使同寅協恭慙非論道之才叨被改容之禮極臣鄰之殊遇損著定之彛儀顧雖殺身無以報德斗筲近器螻蟻微誠苟有益於公家唯常致其死力遺表臣聞始則有終物之常理生而必死人之大期垂沒之言哀鳴以敘伏念臣久居散地寖迫頺齡仰被眷知遽當大任伏遇陛下恭默思道垂拱仰成圗庶政之惟艱登衆賢而共濟臣備位上宰總率羣司嬰疾三時卧家纍月殊常之寵曠古罕聞每思糜捐無以報稱常欲竭股肱之力繼之以死圗國家之利知無不為雖喘息之僅存唯憂勤而不已而膏肓之苦藥石難攻將永謝於明時猶瀝陳於愚懇伏望皇帝陛下務學時敏作德日新體堯舜之欽明視祖宗之憲度奉親思孝守位以仁永建無窮之基益隆有大之業臣雖瞑目猶生之年臣無任瞻天戀聖哀切屏營之至上太皇太后表臣聞凡物之生必皆反本忠臣之死猶不忘君敢陳屬纊之言上逹垂帷之聽伏念臣天與愚直性惟拙迂謂古道之可行排衆言而自信常欲省躬而無愧事上以不欺被遇纍朝照知忠藎擢居上宰斷自睿神伏遇陛下思齊任姒之功誕保成康之聖延登衆正共濟多艱而臣受命以來半居病告造朝之際每荷優容蠲其下拜之勤寵以給扶之禮唯知盡瘁以訖微生聖明之時獨先隕越太平之業不逮落成沒身有銜報國無所伏望太皇太后陛下明昭在位保佑有邦御六氣之中和躋羣生於仁夀疇咨哲乂慮憲祖宗汔登濟於成功不惑移於浮議臣雖終螻蟻之壤猶依日月之光永辭聖朝無任瞻天戀聖哀切屏營之至為司馬公休謝賜銀修碑樓表臣康言伏䝉聖慈差管勾修建先臣光碑樓入內供奉官李永言齎賜臣銀二千兩充修碑樓支費者天恩逺臨優賜下逮銜感泣血未知所報伏念先臣歷事四世唯堅一心晚節遭遇得行所學是以夙夜盡瘁不敢愛身勞心役精繼之以死恭惟皇帝陛下天地覆載日月照臨深軫股肱之虧曲流泉壤之澤恤典之厚超越常倫窀穸送終哀榮已極今豐碑之建復加頒賚矜念存歿感格幽明重惟先臣儉約清貧未嘗畜積啓手之日家無餘資聖明燭知俾濟終事伏思前後罕此異恩非臣隕身喪元所可上報待盡丘壟不知所言瞻望天庭臣無任攀戀號殞激切屏營之至為司馬植謝賜錢營葬表右某言伏䝉聖恩差將作監丞張某催黃河運木就管勾先臣康殯葬仍賜錢一千貫已於今月二十四日遷葬了畢者忠如皎日痛親志之永沈德及幽泉戴君仁之下逮伏念臣父康篤行成巳力學傳家二聖以似其先人一旦欲加之顯任而頃因過毁已屬沈痾掩遺恨而莫伸委深恩於不報自初告卧以至喪還賜藥賜珍歸賻歸襚優命沓至常分已踰復因匠屬之鳩材俾過家塋而視堋克襄大事無費秋毫此蓋伏遇皇帝陛下禮遇臣工孝治邦國將為世忠良之勸豈獨臣父祖之私往者不亡當有鬼神之結草微而含氣猶知鳥雀之銜環謝太皇太后表致主之心已淪幽壤飾終之錫更躐舊章兆協卜之以時恩殞身而莫報伏念臣祖光以德業名世嘗擢任於宰衡臣父康以詩禮傳家亦登延於勸講而侈俗方改哀楊綰之已亡太醫遽臨痛桓榮之未老無祿私室荐罹鞠凶自啓手足之初至掩窀穸之際君命屢至賵賜有加復因匠屬之鳩材俾過家塋而視堋殘喘何力秋毫在官此蓋伏遇太皇太后仁深念功禮不遺舊將博勸於士類豈曲私於臣門克意紹先獨自期於忠孝纒哀待盡兩無報於君親范太史集卷七

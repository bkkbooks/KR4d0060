body:
  text: 范太史集卷五十二宋范祖禹撰皇族墓志銘左班殿直妻楊氏墓志銘君楊氏曾祖延福左監門衛上將軍祖忠金吾衛大將軍父永保左侍禁母費氏年十八元祐五年正月適宗室左班殿直士諘十一月丙子卒君性柔和幼敏悟寡言笑在家孝父母愛之及歸趙氏勤共婦道閨門之內上下皆得其歡心姑復愛焉九年二月已酉葬河南永安縣銘曰之子于歸春氷未泮不臘于室良人哀嘆右侍禁墓志銘君諱令注字景相贈彰化軍節度使舒國公惟忠之曾孫贈宣州觀察使從謹之孫貴州防禦使世恬之子母大寧郡君邢氏初賜名授右班殿直遷左班進右侍禁幼不好弄及長靜默寡言笑喜學論語孟子揚雄法言皆略成誦治尚書通大義讀史傳必反復詳洽然後進不貪多務得而涉獵不精間則作詩以自適初調監河南第二草場門公方二十吏卒以其未嘗更事皆易之已而蒞事敏察無敢以欺始大畏服司農卿廉正臣操下嚴急部吏鮮能可其意獨薦君之才文潞公一見器之曰吾讀史愛漢唐宗子之賢子其勉之授光州監酒稅未赴元祐六年十一月乙巳卒年二十有五娶曹氏左藏庫副使備之女二男曰子彀三班借職次未名一女在室君俸入無幾而輟之以延文士者常三之一及卒室無餘資九年二月已酉葬河南永安縣銘曰振振宗子學以入官工欲善事器利且完方升而隕如彼飛翰右武衛大將軍鳳州刺史妻永安縣君郭氏墓志銘君郭氏開封人髙祖從義事漢為燕王曾祖彥升左監門衛大將軍祖遵式左領軍衛將軍父昭簡內殿崇班母長安郡君王氏繼曰長樂縣君王氏君年十六適右武衛大將軍鳳州刺史令緝君在家事父母孝及歸鳳州事舅姑如事父母鳳州昆弟衆多君上奉兄公下待諸叔處娣姒和敬夫族長幼莫不稱之鳯州性疏財君約已儉素奉養有節雖脂澤奩具金珠服玩往往斥以佐用度助家費殆盡不以介懷元祐八年八月癸丑卒年三十有八五男曰子玊前監潁昌府舞陽縣酒稅曰子稱三班奉職曰子懿早卒曰子珮三班奉職一幼未名七女長適三班奉職王仲約次適三班借職潘絳次早卒次在室次夭次二人幼九年二月已酉葬河南永安縣銘曰郭本姬氏二虢之後世有顯人以及宗婦成夫之義不以其富右千牛衛將軍妻崇仁縣君髙氏墓志銘君髙氏曾祖繼忠四方館使榮州團練使贈左金吾衛上將軍祖遵奭內殿承制贈左驍衛將軍考士永文思使君宣仁聖烈太皇太后之姪也年二十歸右千牛衛將軍士紘事舅姑孝敬教子以義方喜讀儒書尤能翰墨千牛力學應科舉家事悉以委君治有條理好賙人之急俸祿隨輒費盡不介其意常若有餘元祐五年二月十一日卒年三十子男四人曰不矜早亡曰不逺三班借職二人幼三女在室九年二月已酉葬河南永安縣銘曰薑任之族馬鄧之家賢淑有聞而夀不遐右屯衛大將軍妻靜安縣君鄭氏墓志銘君鄭氏開封人曾祖守忠贈太師中書令兼尚書令諡安毅祖惟懿贈左衛大將軍父佐內殿承制母趙氏君嫁右屯衛大將軍令音封靜安縣君六年而屯衛卒元祐四年五月十二日君卒年二十有九君歸屯衛為冡婦敬事舅姑如事父母溫和謙謹喜愠不形于色居夫喪晝哭夜止心內慘怛而奉舅姑貌常舒裕見者不知其抱憂戚也三男曰子漸三班奉職次早夭曰子涓三班借職孫男一人九年二月已酉葬河南永安縣銘曰造次用禮企彼敬薑夀弗克永名則不亡右監門衛大將軍妻永安縣君夏侯氏墓志銘君夏侯氏曾祖廷敏不仕祖仁訥安陸尉父緬右侍禁君年十七歸右監門衛大將軍令蛻勤孝儉約夫族宜之封永安縣君元祐元年四月二十日卒年二十有三殯于金輝門外興教佛祠九年二月已酉葬河南永安縣銘曰柔惠且淑宜其公族胡嗇其年弗享終祿右監門衛大將軍妻孫氏墓志銘君孫氏開封府助教惟道之女母張氏適右監門衛大將軍士稷性簡靜奉舅姑敬接娣姒睦長幼稱之嫁六年元祐二年三月二十三日卒年二十有一一男曰不屈三班奉職二女皆幼九年二月已酉葬河南永安縣銘曰坤道柔順隂德靜専無非無儀乃婦之賢台州防禦使贈武康軍節度使追封崇國公墓志銘公諱仲綰字公權魏恭憲王元佐之曾孫懿恭平陽王允升之孫保寧軍節度觀察留後東陽公宗辨之子初賜名授右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍右武衛大將軍雅州刺史侯少願慤寡言有成人風長而機警無他好燕居一室環列書史凝塵滿席淡然終日每嘆曰宗室託肺腑坐糜爵祿無補于時飽食暖衣喪其良心豈不惜哉由是盡心于學専治詩從師受易通大義是時朝廷屢詔選教官以教宗子有能通經術行誼修飭者以名聞公為舉首召試學士院以詩易對義中選拜開州防禦使遷衛州防禦使今上即位遷台州元祐三年二月戊子疾卒享年四十有七夫人王氏封永康郡君十二男曰士託右武衛大將軍汀州刺史曰士仹士舂並左班殿直士併右班殿直卒餘早卒七女第三女適推官任寶賢餘早卒孫男七人曰不諂曰不柔並三班奉職餘幼孫女三人皆幼九年二月已酉葬河南永安縣銘曰維古公族溺于富貴宴安懷毒敗德速戾有斐宗子學以自修詒厥子孫以公以侯贈蔡州觀察使汝南侯墓志銘侯諱令赫字民瞻冀康孝王之曾孫陳州觀察使淮陽侯之孫彰信軍節度觀察留後濟隂公之子太祖元子越王即侯之髙祖康孝王國于冀特命立宫故子孫别而屬于冀母張氏金華縣君侯初賜名授太子右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍右武衛大將軍領龔州刺史幼而秀頴自異于羣兒中或戲之則正色儼然笑語不妄記識敏悟四嵗受孝經六嵗通論語七嵗能為二韻詩喪父哀毁如成人既長涉獵百家書能為文章事母尤篤孝奉諸兄敬順為雁序齋日𨽻學侯每先至及退必最後金華君性嚴治門內有繩法子孫諸婦皆畏憚侯有所規則能寬容而納之元祐元年閏二月戊申卒年三十有九娶王氏封永和縣君一男曰子瑜右班殿直三女皆幼九年二月已酉葬河南永安縣銘曰英宗建宗學廣教官神宗俾宗子得從科舉而公族彬彬益向學矣如侯之美秀而文使之立朝廷豈不為名卿才士大夫哉右監門衛大將軍天水郡開國侯妻新安縣君陳氏墓志銘夫人陳氏曾祖明之尚書駕部郎中祖易祠部員外郎父祐之袁州分宜縣主簿適右監門衛大將軍仲全性儉約衣服不為文繡飲食不務豐備祭祀不親以為不恭四十餘年所求于夫者薄而施于人者衆室無餘資天水公延置門下皆宿師老儒夫人厚具供給故諸子皆以藝業稱而諸孫亦舉進士事母李氏盡其力母年九十有五而終棺槨衣衾如禮元祐四年三月甲午卒年六十有二九男曰士雋右武衛大將軍賀州團練使曰士琫右監門衛大將軍曰士貝早卒贈右屯衛大將軍曰士黝右監門衛大將軍曰士儻士遒皆右侍禁曰士鋭左班殿直餘幼卒十六女長早卒次適左侍禁裴公謹次適內殿崇班周復古次適吉州司理參軍王洌次適台州録事參軍許球次適三班奉職裴阡次適三班奉職曹參三人在室餘六人亡孫男十三人不溢右監門率府率不惑右班殿直不愚未仕不磷三班奉職不怍未仕不諂三班借職不佞不懼不華不危不羣不疑不瀆皆舉進士孫女十人六人幼四早亡曾孫男二人女二長夭次幼九年二月巳酉葬河南永安縣銘曰懿彼令德宜其侯宫浣濯是服粢盛以豐子孫振振詩禮之風右武衛大將軍嘉州刺史妻同安縣君馬氏墓志銘君馬氏京師人曾祖德韜贈左武衛將軍祖崇正贈左金吾衛上將軍父用舟贈右金吾衛將軍母萬年縣太君武氏年十七適右武衛大將軍嘉州刺史士歸君沈厚溫純簡靜嚴潔無侈靡之習姑馮翊君久病侍醫藥積憂成疾未幾姑沒君執喪哀毁疾益侵元祐五年六月己亥卒年三十八一男曰不晦三班奉職七女長適左侍禁王治次適左班殿直宋齊次適太學進士張鉉次適開封進士唐咨三人幼九年二月已酉葬河南永安縣銘曰馬氏之先蓋出司武命姓以官世不絶史惟此宗婦允矣淑人致孝于姑而隕厥身右監門衛大將軍逹州刺史贈真州觀察使追封常山侯墓志銘侯諱令擢字公秀冀康孝王惟吉之曾孫僖穆王守節之孫彭城郡公世延之子母李氏崇仁縣君劉氏德興縣太君初賜名補右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍逹州刺史侯性質端重眉宇軒秀自為兒時彭城公常竒之服公夫人喪號毁過制治家治身皆有法度雖家人未嘗見其喜愠與伯兄濟州防禦使令續友愛極于雍睦輕財重義俸入以賙貧窶不問有無善騎射洞曉音律擊拂博奕皆妙然未嘗縱以為樂書無所不觀觀輒記憶不忘至學官講義則執經就列聳聽難問從橫不窮又復以訓諸子神宗享太廟始擇用宗子執事侯首被其選元祐五年五月乙丑卒年四十有四初娶王氏左藏庫使遵道之女封夀昌縣君繼室曹氏文思使謹之女封長安縣君十男長早夭曰子神右監門率府率曰子縉右班殿直曰子綱三班奉職曰子綸三班借職曰子綬曰子純曰子經曰子繹未仕其一幼亡八女長適右承務郎吳宰次適右班殿直張百常次適三班奉職張格卒餘在室一幼亡九年二月已酉葬河南永安縣銘曰常山彬彬允武允文雖遊於藝惟學之勤早世而隕其行有聞漢州刺史本州防禦使贈保寧軍節度使婺國公墓志銘公諱仲革字景文魏恭憲王元佐之曾孫平陽懿恭王允升之孫崇信軍節度觀察留後漢東郡公宗回之子初賜名補太子右內率府副率三遷右監門衛大將軍右武衛大將軍雅州刺史成州團練使舒州防禦使公性敦厚謙恭喜愠不見于色與人交久而益敬居母隴西郡君李氏喪毁瘠追慕請廬于殯室有司以無往例不許公遣子姪詣相府懇請朝廷憫而從之後遂為例奉朝請四十餘年未嘗有過失疏財好施親識或假貸皆不忍取恐傷其意客有獻詩者許贈以萬錢未與而客死客之子初不知他日召而與之曰是以為祭享之資庶不負我宿心也公無聲色之奉喜畜圖書葺舍館一室翛然左右經史遊息其間仁宗嘗為飛白書又真書其名以賜之元祐五年八月巳酉薨年五十有二娶李氏封同安郡君十三男曰士對右監門率府率卒曰士縱右武衛大將軍隴州刺史曰士憑曰士證皆右監門衛大將軍曰士俹右侍禁曰士翀左班殿直曰士豨右班殿直餘早卒九女長適西頭供奉官董價次適左班殿直王子愈次適左班殿直孟滋卒餘五人亡一人幼孫男十人不愚左班殿直不息不掩不倨不矜並三班奉職餘五人幼孫女十二人長適左班殿直曹暾次適進士董昌言四人早亡餘皆幼九年二月已酉葬河南永安縣銘曰亹亹婺公克顯于宗宗室濟濟婺公愷悌豈無貨色公樂詩書豈無髙位公有令譽延陵繫劒不倍死者公之與人無愧前古年踰知命沒啓國封公多孫子其慶無窮右千牛衛將軍妻夏氏墓志銘君夏氏開封人曾祖竦贈太師中書令鄭國文莊公祖安期龍圗閣學士考伯孫左朝議大夫母永嘉縣君任氏適右監門衛將軍仲珣性溫仁柔克事姑以孝聞宗族宜之屬疾久不愈戒其夫曰毋復以針藥煩我無益也元祐五年正月戊子卒年三十女四人皆幼九年二月已酉葬河南永安縣銘曰有夏之先實維姒氏顯矣其族嬪于宗子令淑有聞弗克永世贈洺州防禦使廣平侯妻王氏墓志銘夫人王氏京師人曾祖貴贈左衛將軍祖振海州團練使父從善內殿承制母長夀縣君張氏年十五適洺州防禦使士頴元祐元年七月已卯卒年二十有一一男右班殿直女一人在室夫人在家孝于父母既嫁又能孝事其姑性溫靜口不言人是非尊屬稱之曰如老成人九年二月已酉葬河南永安縣銘曰婦道之勤如事父母孝敬風成弗克遐夀右侍禁墓志銘君諱令瑹字君寶贈昭信軍節度使英國公惟憲之曾孫榮安僖王從式之孫贈崇信軍節度使譙國公世采之子初賜名補右班殿直再遷右侍禁監陳橋鹽稅勤于吏事元祐七年三月丙申卒年二十有五娶吳氏二男皆幼吳氏守義不嫁九年二月已酉葬河南永安縣銘曰哀哉王孫天不假年躬行于家有婦之賢吉州刺史本州防禦使贈崇信軍節度使譙國公墓志銘公諱世采字徽之曾祖楚康惠王德芳祖英國公惟憲考榮安僖王從式初賜名補太子右內率府副率歷右監門率府率右千牛衛將軍右監門衛大將軍右武衛大將軍髙州刺史右羽林軍大將軍茂州團練使和州防禦使遷吉州性恭肅容貌嚴整每造朝進止可觀奉祠陵廟多被選未嘗有失仁宗嘗書忠孝二字面賜之嫡母髙夫人早卒藳葬英公别塋榮王薨公表請遷祔王墓竭力以奉大事宗室稱孝所生母李氏公未勝衣被出轉徙失其所歸髙夫人喪畢公勤惻哀疚形于寤寐訪求得之封長夀縣太君殁贈安康郡太君姪令磋早夭嗣續不立公為經畫後事躬視細務用度一出于巳人以為難公生于宗邸不喜紛華約身持法好施樂善沒之日家無餘財諸子貸俸以畢襄事元祐四年五月壬午卒年五十娶髙氏供備庫副使遵憲之女封文安縣君卒繼室以慶州經略使遵裕之女封崇安縣君皆太皇太后之從妹也十七男曰令祁成州刺史曰令祛寧州刺史皆右武衛大將軍曰令畫曰令缶皆右監門衛大將軍曰令璋莊宅副使曰令憓右侍禁曰令鯀曰令㻟皆左班殿直曰令箌曰令稻皆右班殿直七人亡曰令祝右內率府副率曰令瑹令駴令騰皆左班殿直曰令瑶餘二人未名而夭女六人適康承益李諒李誼薛恭之管泳並奉職一早夭孫男十一人曰子禮三班奉職早夭曰子圭曰子願曰子思皆右班殿直曰子先曰子行曰子生曰子徊曰子瑡皆三班奉職曰子告曰子􅚇未官孫女十五人九年二月己酉葬河南永安縣銘曰煜煜榮王克大其後公實似之忠孝兩有帝錫之書煥若星斗惟其令名沒而不朽右侍禁妻王氏墓志銘君王氏開封人曾祖克恭贈右監門衛大將軍祖有度文思副使父仲簡供備庫副使母永康縣君趙氏年二十適右侍禁令􅀈不逮事舅事姑勤孝侍禁出補外官得監虢州玊城鎮聞所治在深山窮谷間民居戶不滿百而飲食服用皆無有君勉侍禁以清白泰然能安之元祐七年八月甲戌卒年二十有八四男皆未名二女長女與次男皆早卒九年二月已酉葬河南永安縣銘曰嬪于公族柔惠靜専勉夫以正維婦之賢范太史集卷五十二

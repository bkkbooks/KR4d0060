body:
  text: 范太史集卷三宋范祖禹撰詩和張藝叟左司被賜資治通鑑六世承平有史臣班固稱六世史臣謂司馬遷紬書東洛布成均網羅遺佚三千載採擷精華十九春天作冠篇墳典大上思稽古憲章新烏臺御史辭讐校頭白空餘汗簡人藝叟同校定以執憲先罷送鄭閎中待制提舉洞霄宫成均祭酒出儲胥嘆息東門祖二疏顧我言非韓吏部多公節似孔尚書諸生共惜陽城去三徑重開蔣詡居琳館遙瞻霄漢外秋風一鶴上空虗和吕原明上清宫落成炎厯儲祥億萬年宫成四海共熙然玊虛真境朝羣帝金闕泠風下列仙初日翠華來照耀半天碧瓦欲飛騫已瞻聖孝勤三殿有司定儀本命殿遣官分獻是日有㫖親獻三本命殿更寫歡聲入五絃送李邠州文昌冠劒輟名卿書殿丹青得老成曉日旌旗熊虎動秋郊組練雪霜明邠郊風教農桑國秦帝山河屏翰城竹馬兒童應借問使君攬轡舊澄清和門下相公從駕視學堯天雲漢炳文章親學嚴師款上庠萬乘及門先降輦諸生望日儼成行三雍盛典遵前訓千古元龜鍳逸王儒服觀光真幸㑹為容深愧魯髙堂興龍節傳法院譯經御筵誕聖千年日祈祥億劫尊祕言翻貝葉勝事集祗園寶蓋天香住銀璫詔語溫曾無了義學空愧酌堯樽送文周翰出守陜郊維師謝公衮稷契仰髙躅公子眷庭闈西郊作侯牧飄颻丹穴鳳燦爛文昌宿雅望冠朝端妙年分陜服綵衣照洛水紅斾驅崤谷荆山連太華翠氣堆羣玉長河從天來迥斡卷坤軸東奔觸砥柱北向摧平陸壯哉山河固屛翰神明隩秦人亦勞止生氣日已蹙兵戈困瘡痍賦斂苦敲朴使君得召父庶可飽饘粥耕桑遍南畝禮義興比屋門前長安道日夕擊征轂念昔西徂東經過厭結束爾來卧巖谷十載歸天祿猶如閉樊籠恨未隨鴻鵠隱几思故山側身望喬木何時拂塵衣假道西走蜀駐馬問甘棠歌謡聽淳俗守嵗嵗逐更籌盡春隨斗柄回和風先傍栁薄雪暗驚梅坐對燈花結歡吹酒蟻開莫嗟華髮短且喜一年來和吕子進元夕何處元宵好天街第一坊九重金闕外萬夀綵山旁扈蹕凝祥島十四日迎鑾資善堂十五日帝城燈火滿歸坐若禪房原明官閒以余兼職良苦作詩見勞次韻二首忘言象外已無求應物環中自不憂匠石旁觀傷手斫尚應皮裏有陽秋右原明野性從來麋鹿逰强加冠服秪為憂何時放出樊籠去定似飛鴻上九秋右言志送秦主簿赴仁和我思適吳越懷古意如何太伯振髙風仲雍揚清波緒餘有季子飢食玉山禾山水發竒秀古來英俊多秦君淮海彥文鋒雄太阿早依蘇揚州匠手為礲磨光芒侵星斗氣象奔江河青衫拾科第試邑佐絃歌春水生南國扁舟浮緑羅方將剖蚌璞焜耀隨與和我病久廢詩緬思眄庭柯倣徨戀紫闥嵗月屢蹉跎看君登朝廷奏頌助猗那為我謝蘇公先歸待江沱和錢穆父尚書蔣潁叔侍郎從駕景靈宫二首紫嵩清洛映重闉紫嵩清洛西都二館舊隱荒蕪白髮新麋鹿未能馴野性鸞凰何敢望前塵分班拜舞趨文陛扈蹕賡歌紀慶辰共助成王朝太室慙非史佚奉明禋寢廟威神挾正元天興殿左右門名曰正元初晨天仗下端門寒生碧瓦氣䓤鬱日麗雕輿景晏溫霜露感時知世逺星辰拱極見君尊自憐多病思歸客唯有山川役夢魂子瞻尚書惠㴠星硯月石風林屏作歌以送之賦十二韻以謝端溪千仞㴠明星虢山木古藏隂靈蘇公贈我此二寶使我坐卧瞻雲屏我觀天地間有物皆流形或從清空入幽谷中夜隕石翻階蓂齊諧志怪不能狀欲說但恐同優伶公逰浙江探禹穴長嘯宇宙臨滄溟手攀天河弄星月醉落大筆還微醒故分星月入我室光照窗户風生庭長林偃絶壁晚色寒青𡨕似聞洪濤卷萬木直幹不折當風霆𤣥雲欲落雪夜久孤燈熒報贈愧無青玊案苦吟徒使鬼神聽送蔣潁叔赴熙州詩書謀帥得豪英去擁洮河十萬兵舒卷風雲為號令笑談樽爼是功名胡塵不近彈筝峽漢月長懸細栁營莫謂安邉無上䇿農桑千里見升平和王都尉押髙麗人燕射北園天上星弧日射狼副車衣袂得餘香朔雲曽落雙鵰羽遼海將歸萬里航酒灔堯觴賓已醉春回漢苑漏初長何郎拜舞恩波渥花簇金鞍道路光謝子瞻尚書惠墨端溪硯二首禹平洪流錫𤣥圭班于羣神朝㑹稽遼東飛煙過滄海徂徠古氣臨天齊丹砂化出黃金鼎雄麝焚身何噬臍魚膠清堅豈易致燕支山北隨佩觿雙龍蛇蟠戲缺月吳軍破甲光水犀黑雲如輪起端溪揮灑倐忽奔鯨鯢先生海內文章伯窮年蒿目憂黔黎玉堂新製自心巧想見星象躔寶奎落毫無脛走珠玉雨雹霽止垂虹霓陋儒窮經脣欲腐石室汗簡空沈迷眼昏畫紙僅成字何異月暗投玻瓈唯當藏作篋中寶併荷蓑笠歸鋤犂右墨端溪清冥幾千尺𤣥潭噴雲噓紫石層空飛溜瀉珠璣大古隂崖摧霹靂翦裁巖屏作風字琢磨水鏡成月魄似聞松上颼颼聲一洗塵埃傾七澤先生每思窮禹穴東叱天吳掛帆席山祗水若獻幽寶贈我不啻千金璧玉堂金井汲寒泉坐視青天浸虛碧豈知來從海嶠外鳥道穿雲下絶壁嗟我本是山中人慙無詞藻對卿客鄉人子雲思竒苦終老漢庭長執㦸至今舊宅有墨池何怪著書𤣥尚白行當提攜返敝廬更廣牢愁弔遺迹右端溪硯初到玉堂舊廬風雨暗柴荆丘壑元無紱冕情一紀周南陪太史八年書殿厠桓榮陳編豈待傷麟止藻思那能倚馬成空愧朱衣華髮吏玉堂三世見題名院有老吏嘗引接叔祖忠文公叔父資政今又引接入院翰林寓直雨冷絺衣初覺單清秋寓直玉堂寒濛濛宿霧昏鳷鵲獵獵光風轉蕙蘭蘚積書筠塵不落雲生硯水墨無乾十年曽向伊川卧長憶閒中夢寐安夜直聞御溝聲銀河秋瀉月明中雲卷風吹下碧空終夕玉堂魂夢冷蜀江聲繞水晶宫送陳元輿侍御赴廬江憶昔仁皇憑玉几延和春晝神龍起赭袍黃􅏛放諸生却下紅簾半天裏君為第二驚衆人愧我非才居後塵題名桂籍皆年少有似鶴鴻毛羽新爾來四朝三十載相逢何怪容顔改昭陵拱木鬱參天麟閣名臣幾人在侍從同登白玉除每思夙昔夢華胥君今出作八州牧千里旌旗引舳艫淮陽卧治豈當久宣室夜召終非踈下車先表崔節婦助我汗簡成新書包孝肅公崔節婦居廬江八月十一日夜玉堂對月銀雲櫛櫛王堂明奩鏡初開六合驚天卷纎毫光不隔風收萬籟夜無聲蓬萊想像皆雲氣宫殿虛無盡水精一夕夢飛雙劒外已疑身到雪山清送七主簿赴龍水山行水逶迤鬱屈如盤龍緣溪夾修竹被嶺多長松懸門倚巖石終日對青峰初仕昔為宰讀書過三冬忘機狎鷗鳥勸稼親老農訟庭可羅雀銅印蒼蘚封爾來三十年夢想幽人蹤風塵京洛間邑子或相逢晚歲上玉堂天門深九重緬思寒潭碧一洗我心胸送子西南歸恨無羽翼從為我謝邦人今愧白髮容和子瞻尚書儀曹北軒種栝蘇公滄洲趣日夕懷山隂公堂植珍木寄夢天姥岑亭亭碧玉幹氣象俯喬林雷霆已難拔霜雪何敢侵蒼皮卷鱗甲細葉抽鋒針稍出珊瑚枝中含笙磬音鸞鳯待棲息詎肯容凡禽西風蕩積雨畏日方流金潭潭宗伯府窈窕巖谷深北窗卧羲皇笑語合朋簮蒼生望安石出處本無心萬象入毫端四溟納胸襟文房爼豆列武庫矛㦸森甘棠愛召伯勿使螻蟻尋世俗多貴逺豈知古猶今他年老東山應記梁父吟吏部彭侍郎召㑹馮少師園亭即席賦詩門生猶記鑿龍登載酒東堂命友朋終日清談陪几杖赤松况是坐禪僧多病多病心牢落驚秋鬢颯然風乾桐葉地雨冷菊花天舊隱荒江漢新居俯澗瀍西都長夢想何日賦歸田成都西都也九日寄諸弟白髮宜新酒黃花似去年懷歸雙劒路極望九秋天喬木西山外觚稜北斗邉遙知行樂處藥市隱真仙闕綵斾藍輿訪隱扃雲松雪竹想儀形函關應望真人氣傅野今無處士星猶憶九臯聞鶴唳徒勞雙目送鴻冥將回俗駕頻搔首深愧山文舊勒銘永州作京華驛候逺楚越山川分心馳桂江水夢繞蒼梧雲夕與木石居朝逰麋鹿羣聖治踰繩契皇明軼華勳炎陬暨海表休氣塞無垠羇臣此幽縶何以答恩勤御製太皇太后挽詞四首任姒基王迹塗莘首化風德超千古上治定九年中日月無私照乾坤不宰功寧神登太室永佑宋無窮定䇿元豐末勞謙聖烈光外家深自抑俊德盡明揚恭儉隆三世寬仁覆萬方功成身不處仙駕白雲鄉天祐周邦世世仁篤生文母濟斯民嗣徽慈后光宗祖配極英皇育聖神崇慶垂衣寧寶座延和負扆翊沖人長言永慕遵遺訓要在齊家與正身八荒同軌夀原成雨露俄悲嵗律更曉日曈曨開鳳翣春風縹眇轉龍旌晨朝尚想趨金殿颷馭難留返玉京寶冊形容雖四字誰知盛德莫能名臣奉御寶批撰挽詞四首進入內兩首七言兩首五言謹依聖㫖撰進古今詩體多以五言在前伏乞裁酌太皇太后挽詞二首誕保天基命光開帝永圗軒星臨斗極堯日上雲衢美化形風雅成功入典謨羣生何以報損夀濟寰區授几咨元老垂帷攬衆賢舜功成二十周士得三千德澤流終古規摹遺億年寧唯照彤史石室爛青編又三首九載扶皇業三朝賴母儀成乾功不有並日照無私天上軒星暗人間薤露悲君王自仁孝舊典奉元龜治道初無事齊家與正身練繒躬至儉行葦被深仁受册辭隆禮為霖屬老臣太平遺德在白首泣堯民能助君成聖惟知諫必從徽音推二后盛治見三宗虛扆翔丹鳳仙輴駕玉龍凄凉厚陵路墓木拱髙峰王岐公挽詞三首景運光華際洪鈞十六年文明憲前古禮樂被敷天有美經邦業無成載物權易曰地道無成而代有終君臣時契㑹俯仰逐流川乘雲仙馭逺出震帝圗新百辟瞻元宰繁機仗老臣中天扶日月拱極失星辰終始先朝遇勤勞至沒身王儉風流相岐公博贍資唐相杜祐封岐公敷文成國典亮采作官師劒佩空黃閣音容想赤墀元臣葬禮盛簫吹朔風悲王開府挽詞三首聖厯當千運天庭第一人榮光親日月優寵極臣鄰賈馬推先進䕫龍接後塵藩垣賴耆德宣力至終身康寧五福備出入四朝安劒佩逼台室旌旄登將壇天池將浴鳳雲漢擬驂鸞縹眇凌霞意今成逝水嘆連帥諸侯長維師列爵隆儀刑憲萬國眷禮視三公白日年華盡浮雲世事空九原伊洛上松柏自悲風司馬溫公挽詞五首伊吕為時耦夷齊得聖清精忠貫日月至行格神明微物霑仁澤窮荒服德名須知千載後瞻仰重嵩衡文母扶皇運成王紹慶基蕭公翼左右裴相繫安危共恨登庸晚俄成殄瘁悲旗常紀勳業長與日星垂上相經綸日羣生化育中初開仁夀域重立太平功海㝢還淳俗朝廷復古風英靈在王室應佑宋無窮盡瘁憂民瘼孤忠簡聖心忘身甘首疾報國競分隂天奪楊公速人思召伯深秋風咽笳鼓行路泣成霖自昔龍門峻叨䝉國士知紬書陪太史問學仰宗師一紀依林壑千秋隔履綦餘生愧簮紱無路送靈輀韓獻肅公挽詞三首孝友天生德公忠世象賢八元推亮采四海入陶甄枌社棠隂老槐庭棣萼聨咨詢賴黃髮零落已重泉舜禹勤勞治臯䕫翊贊功秉鈞瞻上宰憲老佚三公夀考登耆耋哀榮備始終凄凉潁川路簫鼓訴南風東閣開無倦西園宴不疲蒼生望安石多士美當時功業歸青史音容閟繐帷烏衣門巷在過客有餘悲李朝議挽詞二首美行商山老髙年渭水翁政留循吏跡家有古人風操几門庭在安車里巷空子孫皆孝養餘慶自無窮解組紅塵外忘機白日遲煙霞隨步武松竹想風姿沇水流清範盤山厚福基鄉人應配社猶恨不期頥鮮于諌議挽詞二首西蜀文章老中朝侍從臣諫垣風烈在書殿寵光新宣室虛前席清漳嘆病身致君才未展青史迹空陳白首方登用忠規溢皂囊仲山違衮職汲黯卧淮陽墓劒知誰掛人琴竟兩亡猶思挺直操松柏凛秋霜哭司馬公休昔在西都日趨庭見伯魚金華同勸講石室共紬書鮑叔深知我顔淵實喪豫衰年哭心友忍復望靈車中書侍郎傅公挽詞巖野為霖後千年復有人纍朝推鯁直二聖倚經綸盡瘁憂民色孤忠許國身徐公德不變可使俗還淳洛社瞻賢躅書筵繼老成公昔免講改侍讀祖禹承乏是職聲容陪夙昔論議想平生節與盤山峻名隨沇水清草堂空舊隱松月為誰明常大夫挽詞禮樂追先哲文名動搢紳忠勤白首節惠愛逺州民石室詩書在天衢日月深九原何所憾有子嗣芳塵王承事挽詞井絡西南奧今無處士星天真養恬漠世纍絶塵冥松菊陶公徑詩書孔氏庭傳家清訓在潛德繼先銘先生考官教蜀郡忠文公為銘范太史集卷三

body:
  text: 范太史集巻三十一宋范祖禹撰翰林詞草崇慶宫開啓資薦大行太皇太后道塲盡七齋文二十一日伏以坤儀永謝日御遄流追㒺極之深㤙修等慈之妙教禁塗載闢法㑹無遮庶慿十力之勝因上濟九天之仙路謹言三陵上宫并諸后位及諸王等神臺值霖雨埿皮脱落下手添修奏告帝后表文伏以神靈所宅陵寢載嚴風雨侵尋塗丹剥落將加完餙㒺敢輒興爰擇吉辰是用䖍告大行太皇太后山陵封山斬草動土興功祭告五帝祝文二十六日恭以大行太皇太后臨朝九年嘉靖四海昊天不弔厭代登遐山陵有期龜筴獻兆爰得吉穴祔於厚陵鳩工使徒將集大事練此時日肇興土功惟神之休降佑在下安固真宅億萬斯年與宋無極敢用䖍告尚饗大行太皇太后山陵封山斬草奏告諸陵帝后表伏以先后在天崇邱卜壤練此吉日作于新宫乃興工徒將啓兆域䖍告陵寢用嚴威神謹差右朝散郎臣邢端奉表奏告以聞故魏王鄧國蔡國公主墳斬草破地祭告五方帝并后土等神祝文伏以先后山陵帝子從祔考卜幽宅圖惟永寧託神之休是用䖍告尚饗皇帝御正殿祭吿大行太皇太后文十一月伏以日月遄流慈顔永逺夙夜哀慕不敢遑寧羣臣抗言統業至重已即便坐躬攬萬幾當臨正朝時見百辟勉從衆論增愴五情臣以今月二日御正殿不敢不告尚饗賜資政殿學士新除知大名府許將辭免不允詔朕以全魏别都國之巨屏大河決溢烝民流離惨怛於心哀此鰥寡思用舊德往拊一方以卿厯典藩垣夙陪機政特輟東南之寄庶無朔易之憂當體眷懐勿為遜避所請宜不允撫問涇原路臣僚口宣卿汝等宣力塞垣服勞王事履兹寒律簡在予衷存問有加眷恩斯厚今差東頭供奉官曹允則傳宣撫問想宜知悉諸路走馬赴闕奏覆回傳宣撫問本路臣寮口宣卿汝等為國蕃宣自公夙夜眷言外服簡在予衷存問有加恩勤斯至今差西頭供奉官張彦孫傳宣撫問想宜知悉賜樞宻直學士簽書樞宻院事劉奉世辭免生日生餼不允詔輔翼之臣禮有慶賜兹為故事不可一日而廢也朕方銜恤而有司舉典夫何足辭所請宜不允白溝驛賜大遼賀興龍節人使御筵口宣卿等載馳原隰適及溝封眷言行李之勤方屬祁寒之候爰加郊勞以示寵私今差某官某賜卿等御筵兼傳宣撫問想宜知悉趙州賜大遼賀興龍節大使茶藥詔皇華將命瑞節在途加異品之榮頒慰祁寒之行役式昭眷寵以助保綏今差入内内侍省内侍殿頭楊珪往趙州賜卿茶藥具如别録至可領也趙州賜大遼賀興龍節副使茶藥詔上介展儀命圭申信眷風霜之嚴洌頒荈劑之珍良慰乃勤勞體予㤙渥今差入内内侍省内侍殿頭楊珪往趙州賜卿茶藥具如别録至可領也賜觀文殿大學士新差知揚州蘇頌再辭免知揚州不允詔朕以東南之寄淮海為重思用舊德惠綏一方與其引逸於祠宫曷若均勞於侯服尹兹揚土以屏王家尚頼仲山之將明庶聞衞武之箴儆所請宜不允賜北京等路臣寮中冬衣襖口宣卿汝等職在外服時方大冬用均安燠之恩以慰勤勞之念欽承寵賚益體眷存今差學士院待詔段從易賜卿汝等中冬衣襖想宜知悉賜安武軍節度使知太原府韓縝進馬詔省所進奉謝南郊禮畢奏薦子孫恩澤馬二匹事具悉卿鼎槐舊老藩閫元侯因推延世之恩來效充庭之貢眷言忠藎良用嘆嘉賜龍圗閣直學士知成都府蔡京進馬詔省所進奉謝恩授龍圖閣直學士馬一匹事具悉卿輟守雍部總麾劍川進陞内閣之華來效外閑之貢眷惟勤藎良用嘆嘉趙州賜大遼賀興龍節使副茶藥口宣卿等恭持信幣方次中途爰有恩頒以慰行役欽承眷渥用助保綏今差入内内侍省内侍殿頭楊珪賜卿等茶藥想宜知悉相州賜大遼賀興龍節使副御筵口宣卿等肅持使節來㑹誕辰涉厯山川少休徒御式頒燕衎用示㤙私今差入内内侍省内侍殿頭關琳賜卿等御筵想宜知悉白溝驛賜大遼賀正旦人使御筵口宣卿等踐修乆好衝涉祁寒興言行役之勤用錫燕休之禮體兹眷寵懋乃使華今差某官某賜卿等御筵兼傳宣撫問想宜知悉撫問太原府代州等路臣寮口宣卿汝等為國蕃宣在公夙夜方冬寒烈言念勤勞當體眷懐俾加存問今差入内内侍省内東頭供奉官裴彦臣傳宣撫問想宜知悉崇慶宫冬至資薦大行太皇太后設醮青詞二十三日伏以日月遄邁霜露荐臻銜追逺之深哀感迎長之新令載嚴禁宇大講科儀庶慿真勝之靈上濟仙逰之駕永垂道䕃常祐寳圖無任懇禱之至撫問接伴大遼賀正旦人使副口宣卿等載馳華隰逺迓使旜蒙犯風霜勤勞夙夜唯宜尚慎以副予懐今差某官某傳宣撫問想宜知悉撫問大遼賀正旦人使口宣卿等踐修乆好來㑹元正川陸塗遥風霜氣烈宜勤調䕶以副眷存今差某官某傳宣撫問想宜知悉賜尚書右僕射范純仁乞除一閒局或小郡不允詔朕宅憂三祀深慮萬幾方倚老成共圖政治卿昔以人望延登宰司召自輔藩復還揆路于兹未幾日竚謀猷乃以前有小言引咎自列弼臣進退為國重輕其亟起就位以副朕簡注之意焉所請宜不允班荆館賜大遼賀興龍節使副到闕御筵口宣卿等載馳華隰已次近郊少憩使旃特頒燕豆勿辭既醉尚體至恩今差内侍省内侍殿頭孫承禧賜卿等御筵想宜知悉就驛賜大遼賀興龍節使副銀鈔鑼唾盂盂子錦被褥等口宣卿等並飭使車方休賔館備精金之用器製華錦之寢衣慰薦良勤眷懐斯厚今差入内内侍省内東頭供奉官鄧友直賜卿等銀鈔鑼唾盂盂子錦被褥等想宜知悉興龍節賜殿前太尉以下罷散道塲香口宣卿等翊衛竭忠誕彌均慶預嚴净㑹以薦壽祺及此告成宜加寵賚今差内侍省内侍髙品衞克忠賜卿等香想宜知悉賜大遼賀興龍節人使朝見訖歸驛御筵口宣卿等肅將瑞節已致慶函方適館以少休特賜筵而示寵兹為勤厚當體眷懐今差入内内侍省内侍殿頭梁隱賜卿等御筵兼差通議大夫知樞宻院事上柱國韓忠彦押伴想宜知悉興龍節賜知樞宻院事以下罷散道塲香口宣卿等樞機之臣社稷是衞夙設人天之供共祈箕翼之祥宜有寵頒用昭眷遇今差内侍省内侍殿頭王祺賜卿等香想宜知悉十二月七日就驛賜大遼賀興龍節人使内中酒果口宣卿等命圭修好信幣展儀頒禁宇之芳甘飾賔筵之燕喜用昭殊遇當體至恩今差入内内侍省内侍殿頭康承錫賜卿等内中酒果想宜知悉賜大遼賀興龍節人使不射弓例物口宣卿等並膺藝選來展使華適當徹樂之辰難舉射侯之禮特加賚予以示眷勤今差入内内侍省内侍殿頭羅宿賜卿等射弓例物想宜知悉就驛賜大遼賀興龍節人使不宴御筵口宣卿等夙駕星軺來趨壽節属在遏音之旦莫伸折爼之儀就錫燕私用昭寵遇今差入内内侍省内侍殿頭羅宿賜卿等御筵兼差樞宻直學士中大夫簽書樞宻院事劉奉世押伴想宜知悉興龍節賜徐王罷散道塲香口宣惟我叔父作藩王家饌蒲塞於祗園祝椿齡於誕日既成法㑹宜有寵頒今差内侍省内侍黄門王備賜卿香想宜知悉賜大遼賀興龍節人使朝辭訖歸驛御筵口宣卿等聘儀已事辭謁言歸少留舍館之安特賜賔筵之寵用將誠意以慰勤勞今差入内内侍省内侍殿頭王佐賜卿等御筵兼差大中大夫守門下侍郎蘇轍押伴想宜知悉班荆館賜大遼賀興龍節人使回程酒果口宣卿等抗旌歸路脂轄近郊念川陸之阻修眷氷霜之嚴烈特頒芳㫖用示恩私今差内侍省内西頭供奉官張翬賜卿等酒果想宜知悉太廟添修石室奏告僖祖宣祖太祖太宗真宗仁宗神宗皇帝祝文十二月於穆清廟列聖在天思齊太任皇祖合食神宫有侐石室肇修䖍遵舊章不敢不告尚饗太廟奏告英宗皇帝祝文伏以祔陵涓日配主有期增廣祖筵奉嚴廟室僝功經始祗率舊章昭鑒在天不敢不告尚饗瀛州賜大遼賀興龍節人使回程御筵口宣卿等聘事告成還車言邁改轅北道弭節近關眷言行役之勤宜有燕私之寵今差内侍省内侍殿頭蔣維恭賜卿等御筵想宜知悉雄州賜大遼賀興龍節人使却回御筵口宣卿等徒御旋歸山川悠緬雖不遑於啓處諒無爽於保頤特錫燕休仍加問勞今差内侍省内侍殿頭孫承禧賜卿等御筵想宜知悉趙州賜大遼賀正旦大使茶藥詔歳厯更端使軺講好眷星霜之夙駕有荈劑之榮頒綏乃冲和副兹優渥今差入内内侍省内侍殿頭馮說往趙州賜卿茶藥具如别録至可領也趙州賜大遼賀正旦副使茶藥詔使華將命介紹展儀眷言行役之勤宜有㤙頒之厚尚綏乃履以副予懐今差入内内侍省内侍殿頭馮説往趙州賜卿茶藥具如别録至可領也班荆館賜大遼弔慰人使到闕御筵口宣卿等夙馳星駕來㑹喪期已次近郊少休賔館特頒燕勞當體誠懐今差内侍省内西頭供奉官石琦賜卿等御筵想宜知悉班荆館賜大遼皇帝祭奠人使酒果口宣卿等載馳原隰來奠宫朝宻邇都城少休郊館特加頒賚用示眷存今差内侍省内西頭供奉官李世長賜卿等酒果想宜知悉班荆館賜大遼祭奠人使到闕御筵口宣卿等肅馳使傳來奠皇儀近望國門少休郊館宜頒燕犒用示寵私今差内侍省内侍殿頭孫承禧賜卿等御筵想宜知悉雄州賜大遼弔慰人使回程御筵口宣卿等奉將使指來展弔儀載整歸驂巳臨邊圉宜頒燕勞用示寵私今差内侍省内侍殿頭王懐敏賜卿等御筵想宜知悉接伴大遼弔慰人使送伴回程沿路與賀大遼正旦使副回相逄傳宣撫問口宣卿等持節出疆抗旜復命䝉犯霜露跋履山川言念勤勞俾加存問今差某官某傳宣撫問想宜知悉接伴大遼弔慰人使送伴回程沿路與大遼賀正旦人使相逄傳宣撫問口宣卿等輶軒將命瑞節講儀䝉犯風霜馳驅原隰俾伸問勞當體眷懐今差某官某傳宣撫問想宜知悉趙州賜大遼賀正旦使副茶藥口宣卿等並驅星駕載涉氷塗乃眷勤勞特加賚予宜膺寵渥用助綏將今差入内内侍省内侍殿頭馮説賜卿等茶藥想宜知悉相州賜大遼賀正旦人使赴闕御筵口宣卿等抗旜逺道弭節近藩少留舍館之安宜有肆筵之寵用昭眷渥以慰勤勞今差入内内侍省内侍殿頭王端賜卿等御筵想宜知悉班荆館賜大遼賀正旦使副到闕酒果口宣卿等驂騑夙駕來修上日之儀醴實時珍往致近郊之勞兹為勤厚當體眷存今差内侍省内西頭供奉官李世長賜卿等酒果想宜知悉班荆館賜大遼賀正旦使副到闕御筵口宣卿等馳驅川陸蒙犯風霜近望都城少休郊館式頒燕衎用示恩私今差内侍省内侍殿頭王祺賜卿等御筵想宜知悉賜大遼賀正旦使副生餼口宣卿等肅持華節巳奉信書方賔館之賜休俾行人之致餼兹為加勞當體渥恩今差入内内侍省内侍殿頭馮説賜卿等生餼想宜知悉大行太皇太后諡號冊寳奏告天地景靈宫等處青詞祝文二十四日伏以議行誄功請於宗廟尊名節惠質之神天乃勒鴻休奉薦寳冊恭舉舊典以今月二十六日上大行太皇太后尊諡曰宣仁聖烈皇后不敢不告尚饗大行太皇太后諡號冊寳奏告宗廟社稷祝文伏以姜任之功社稷是頼受諡於廟配祖在天乃勒鴻名奉薦寳冊䖍遵舊典以今月某日上大行太皇太后尊諡曰云云景靈宫奉安太皇太后神御詔朕惟神宗皇帝大新館御追孝祖宗合原廟之睟容萃景靈之吉壤大行太皇太后每思克巳唯務恤民特於元佑之初預敕永終之制避神皇之宣寢從英祖於治隆仁愛之深與天無極謙光之美振古未聞今將先逺橋山升祔宗祏載嚴像設以奉神㳺敢祇率於訓言用述成於聖志咨爾中外當體朕懐將來景靈宫奉安大行太皇太后神御衣元祐元年正月二十六日手詔施行撫問脩奉官姚麟以下口宣卿等營奉先寢時方大冬䝉犯雪霜勤勞夙夜眷言忠力深軫朕懐臨遣使人往伸存問今差入内内侍省内東頭供奉官許日傳宣撫問想宜知悉賜尚書右僕射范純仁辭免弟純禮樞宻都承㫖不允詔省所劄子奏辭免弟純禮樞宻都承㫖伏望特除在京一閒慢差遣事具悉古者盛治之世惟才是用父子兄弟並列於朝茍存至公不事形跡朕方仰成宰輔推委誠心庶幾君臣不愧古昔純禮承宣樞幄於卿夫復何言載覽來章非予所望勿為疑慮當體眷懐所請宜不允賜新除尚書吏部侍郎王欽臣辭免不允詔天官亞卿古之小宰攝職而授圗惟得人卿以文雅自將厯更省部巳試之效僉曰汝諧疇其乆勞寵以真秩往服成命毋庸遜辭所請宜不允賜新除户部侍郎王覿辭免不允詔朕以六卿之貳難於用人故攝職而授以圖其效考實而進以勸其能卿厯踐臺省嘗参侍從頃由憲部蹔處地官僉言汝諧寵以真秩往服成命勿為謙詞所請宜不允賜禮部侍郎孔武仲乞江淮一郡不允詔卿以履行文學為時名儒剛毅近仁質直好義春官之貳邦禮是司宜在朝廷時聞議論廼引㣲疾遽求外補非所望也姑安厥位以副眷懐所請宜不允范太史集巻三十一

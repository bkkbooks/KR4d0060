body:
  text: 范太史集巻十三宋范祖禹撰奏議論䘮服儉葬疏元豐八年六月七日臣謹案禮䘮服斬衰父傳曰為父何以斬衰也父至尊也諸侯為天子傳曰天子至尊也君傳曰君至尊也先王制禮以君服同於父皆斬衰三年盖恐為人臣者不以父事其君此所以管乎人情也自上世以來未之有改至漢文帝遺詔始令吏民三日羣臣三十六日而除後世又為易月之制二十四日而大祥三日禫而釋服䘮紀之數尤薄於漢焉自漢以來不惟人臣無䘮君之服而人君遂亦不為三年之䘮惟晉武帝以疏素終三年其羣臣多以為非盖諂䛕之人習於流俗而不知禮也唐之人主無有為三年服者而三百年間議者亦未嘗及之盖世無達禮之士而人不知事君之義也惟國朝自祖宗以來外廷雖用易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服故也今君上之服已如古典而臣下之禮猶依漢制是以大行在殯而百官有司皆已復其故常容貌衣服無異於行路之人無哀戚思慕之心豈人之性如此其薄哉由上不為之制禮也夫衰麻哭泣孝子仁人之所以表其衷也賢者無服則無以致其哀不肖者無服則遂忽而忘之是以禮義偷薄忠孝陵遲則由無服以管其情也素冠之詩刺不能三年盖為是矣且其禮之失者臣請得以悉陳之今羣臣易月而人主實行䘮故十二日而小祥朞而又小祥二十四日而大祥再朞而又大祥夫練祥不可以有二也既以日為之又以月為之此禮之無據者也古者再朞而大祥中月而禫禫者祭之名也非服之色也今乃為之縿服三日然後禫此禮之不經者也既除服矣至葬而又服之盖見梓宫不可以無服也祔廟而後即吉纔八月矣去山陵未久也而遽純吉無所不佩此又禮之無漸者也臣伏見大行皇帝之喪自三月十三日服至二十八日而除羣臣衰麻纔十六日遺詔易月因襲故事已行之禮不可追也臣愚以為過山陵宜令羣臣朝服止如今日而未除衰至朞而服之漸除其重者再朞而又服之乃釋衰其餘則君服斯服可也此非有所難行惟存其衰麻而已今之冠服非古之制也至於禫不必為之服惟未純吉以至於祥然後無所不佩則三年之制畧如古矣夫衰裳不可以服勤斷以日月而易朝服以治事誠是也然既葬而遂除之臣竊以為太早矣孔子曰喪事不敢不勉又曰上好禮則民莫敢不恭伏惟皇帝陛下聖政之美四方風動上順天意下順人心書曰今王嗣厥徳㒺不在初於以革千餘嵗之弊正一代之禮教天下使知君臣之義其於風化非小補也如以臣言為然乞下有司考正其禮臣又聞儉葬者聖哲之訓也奢葬者世俗之失也宋華元厚葬其君君子以為不臣漢世山陵多藏金寳故有張釋之之言劉向之論世所明知也武帝在位嵗久茂陵中物無所容霍光不達大體以厚𦵏為愛君無所減損従而益之故西漢之末唯霸陵猶完葬之厚薄禍福可睹矣臣誠知國家山陵送徃儉於前代然猶以為言者欲於儉約之制損之又損使天下知其中無所有見其中無可欲則萬世之利也臣昔者伏見仁宗皇帝葬於昭陵有緘封皮匣納之方中者甚多皆出於禁中人莫得而知也臣竊以為如此之類無益於先帝竊恐沿襲故事猶或藏之推此類以損之必猶有可省者也昔周太祖將終戒世宗曰昔吾西征見唐十八陵無不發掘者此無它惟多藏金玉故也我死當衣以紙衣斂以瓦棺勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝周祖生於五季之末非有前聖之識而其葬乃如太古此其智賢於秦始皇逺矣近事不逺即本朝所代也臣以為周祖懲唐奢葬故以儉薄矯之然以天子之喪而㡬於臝𦵏則太偪而不可以為繼今惟於儉制之中加損約焉可也臣頃在書局未嘗敢越職言朝廷得失今非職而言者竊以先帝之服臣子所同也先帝之𦵏四海所共也臣身服先帝之服預先帝之葬知其不合於禮而不言憂其或過於厚而不以告臣所不能已也臣嘗采唐事為唐鑑數百篇欲獻之先帝屬先帝不豫未及上其中一篇論厚葬一篇論喪服輒不自揆謹録上進庶㡬觀古以知今少禆萬一焉干冒旒扆臣無任惶懼俟罪之至唐鑑二篇太宗正觀十一年二月帝自為終制初文徳皇后疾篤言於帝曰妾生無益於人不可以死害人願勿以邱壟勞費天下因山為墳器用瓦木而已及𦵏帝復為文刻之石稱皇后節儉遺言薄葬以為盗賊之心止求珍貨既無珍貨復何所求朕之本志亦復如此王者以天下為家何必物在陵中乃為已有今因九嵕山為陵鑿石之工纔百餘人數十日而畢不藏金玉人馬器皿皆用土木形具而已庶幾姦盗息心存沒無累當使百世子孫奉以為法至是帝以漢世豫作山陵免子孫倉猝勞費又志在儉𦵏恐子孫從俗奢靡於是自為終制因山為陵容棺而已臣祖禹曰厚𦵏之禍古今之所明知也夫藏金玉於山陵是為大盗積而標示其處也豈不殆哉是以自漢以來無不發之陵後之人主知其有害無益而姑為之以賈禍迹相接而莫之或戒也太宗雖為終制以戒子孫而昭陵之𦵏亦不為儉及唐之末不免暴露之患豈非髙宗之過乎髙宗永徽元年正月太宗女衡山公主應適長孫氏有司以為服既公除欲以今秋成昬于志寜上言漢文立制本為天下百姓公主服本斬衰縦使服隨例除豈可情随例改請俟三年畢成昬帝従之臣祖禹曰書曰三載四海遏宻八音君喪三年自古以來未之有改也漢文率情變禮薄於喪紀始令吏民三日羣臣三十六日釋服雖欲自損以便人而不知風俗實自此壊也自是以後民不知戴君之義而嗣君遂亦不為三年之服唐之人主鮮能謹於禮者故有公除而議昬亮隂而舉樂内無父子外無君臣而欲教化行禮俗成難矣夫君者父道也臣者子道也無君是無父也况人君而可以無父乎若君服於内臣除於外是有父子無君臣也為國家者必務革漢文之薄制遵三代之隆禮教天下以方喪三年則衆著於君臣之義矣再論喪服疏七月九日臣前上疏論大行皇帝䘮服乞令羣臣依典禮三年之制臣之愚見以為過山陵雖易朝服宜存其衰麻而服乗之飾止如今日至朞年而漸變之以至於祥禫然後全吉此非有所難行惟令有司考正之而已今已卒哭山陵有期喪服事重道之隆汙俗之厚薄繫焉不可不早裁定也國家承平百有餘年列聖欽明動循典禮人倫之正朝廷之治考之前世自三代以後未之有也惟是喪服猶依漢制遂使臣居君喪情禮至薄後世或謂本朝無一逹禮之士臣竊惜之且在禮臣子一也今君服於上臣除於下是有父子而未有君臣也天子者天下之共主也故其喪使天下共服之臣伏見朔望之禮羣臣朝服以造於先帝之殯宫是以吉服臨喪也而人主獨以衰服在上上下異禮是以先帝之服為人主之私喪也以吉服臨喪以先帝之服為人主之私喪此皆禮之不安者也臣前所言君服斯服者竊以為君臣當同服也伏惟祖宗以來此禮未改者盖䘮事常出於倉猝而有司惟舉故事因襲而行無所損益焉今欲風天下以忠孝使民徳歸厚莫若先正此禮則衆庶曉然明於君臣之義矣夫居喪之禮衰麻本不可以去身然而朝廷之上異於私家故古者君臣居䘮而行吉禮則釋衰而服冕既終禮則釋冕而服衰今人君素服以聴朝羣臣素服以治事盖亦古之遺法也臣愚以為羣臣燕服亦宜為之制度以齊之吉禮則朝服與燕服皆吉凶禮則朝服與燕服皆凶居喪朝服所以從宜也而燕服有紅紫之飾則何以異於無服者乎聖人所以制服者使民見其服而哀不忘於心也必使之脱去朝服而猶以有䘮者自處則人情不可得而忘矣朞年之内燕服宜純縞素至小祥而漸變之古者練衣黄裏縓縁此練之服也既小祥則燕服亦可以有色而服乗之飾漸加以縁可也書曰三載四海遏宻八音古者禮不下庶人惟遏宻三年所以為君服也詩曰溥天之下莫非王土率土之濵莫非王臣然則民亦臣也今祔廟以後惟羣臣不舉樂而四海之内萬民得以作樂焉此所以不知戴君之重也臣愚以為宜禁民舉樂三年竊惟朝廷所以不循遏宻之制者盖不欲使天下之民三年不樂而為樂工者所在有之恐其失業故寧殺禮以便民也臣以為凡天下之為俗樂者率皆㳺民非良農也使之廢業三年乃所以教之使知為君之有服也彼不為樂必有他業以養其生未必至於困窮也今殺禮以姑息之是使人不知君臣之義也故臣以為禁之合於禮而無傷於俗足以厚天下之情夫為國家者以禮為急不可忽也伏望陛下幸察斷之以禮而勿疑貼黄乞并臣前疏降附尚書省進唐鑑表元祐元年二月二十八日臣竊以自昔下之戒上臣之戒君必以古驗今以前示後禹益之於舜則言其所無于佚于樂傲虐之作防於未然周召之於成王則相古先民歴年墜命日陳於前皆所以進哲徳而養聖功也臣某誠惶誠懼頓首頓首臣昔在先朝承乏書局典司載籍實董有唐嘗于紬次之餘稽其成敗之迹折以義理緝成一書思與庶人傳言百工執藝獻之先帝庶補萬分比臣赴職不幸先帝洮頮被冕遽迫登遐追攀莫及抱恨沒世伏遇皇帝陛下嗣膺大統睿智日躋詳延耆儒啓廸聖學監於前代宜莫如唐儀刑祖宗之典則四方承式萬世永賴臣之此書雖不足以發揮徳業廣助聰明拳拳之忠不能自已苟有所得不敢不告輒以狂愚塵玷日月罪當誅死伏惟清閒之燕少賜省覽其唐鑑十二巻繕寫成六冊謹隨表上進以聞又上太皇太后表臣聞觀古所以知今彰徃所以察來唐於本朝如夏之於商商之於周也厥監不逺著而易見臣頃在書局多歴年所不勤而禄無補聖世神宗皇帝明燭幽逺一物不遺特垂誤恩擢寘秘省臣比及赴職不幸先帝違豫遽棄羣臣不獲一覩清光螻蟻之志無所復伸臣嘗於職事之餘討論唐史摭其行事緝成一書妄以私意而發明之可以稽參得失監觀成敗伏遇太皇太后陛下母臨萬國天覆羣生酌於民言以美聖政臣區區之忠既無及於先帝思報之於陛下是以冒昧自竭不敢隠黙古者史為書瞽為詩百工獻藝庶人傳語思不出職交修於上冀以塵露仰禆崇深臣職文史敢忘斯義竊惟治亂興廢皆起細㣲言之於已然不若防之於未然慮之於未有不若視之於既有故曰前事之不忘後事之師也其唐鑑十二巻繕寫成六册謹随表上進以聞上太皇太后乞崇儉戒奢疏二年四月四日臣濫備勸講夙夜思職愚慮所及不敢不言伏以自先帝厭代諒闇三年今祥禫將終即吉方始服御器用内外一新奢儉之端皆自此始臣愚以為珠璣金玉之飾錦繡纂組之工凡可以蕩心悦目者不宜有加於舊増多於前也皇帝方嚮儒術親學問睿質日長聖性未定覩儉則儉覩奢則奢陛下所以訓導聖徳者宜動皆有法不可不慎也古之聖帝明王莫不以儉為美徳侈為大惡帝堯所居之室土堦三尺茅茨不翦舜稱禹曰克勤于邦克儉于家孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕黻冕祭服也伊尹曰慎乃儉徳惟懐永圗言儉之可以長乆也文王卑服即康功田功周公戒成王以先知稼穡之艱難凡此皆陛下所宜日以啓迪皇帝之志者也東漢明徳馬皇后常服大練左右但衣布帛無香薫之飾欲以身率下前史以為美談臣竊惟陛下聖政度越前古必不使明徳馬后専美漢朝若崇儉敦樸飭正後宫以輔養皇帝之徳使目不視靡曼之色耳不聽淫哇之音非禮不言非禮不動則學問日益聖徳日隆此宗社無疆之福也孔子曰少成若天性習慣如自然老子曰不見可欲使心不亂古語有之曰貴不與驕期而驕自生富不與奢期而奢自至夫少習儉約長猶侈靡少習侈靡長將若何今天下之大生民之衆繫在陛下陛下儉於上則百姓富於下陛下奢於上則百姓貧於下比年以來天災流行年榖不熟國用虚乏百姓困敝幸賴陛下勤恤民隠存養休息視之如子有所不便輒弛禁以利民民方有樂生之意小康之望當今之務宜痛為節約昭示儉樸以率天下自古為國未有不先儉而能致四海富實者也漢文帝身衣弋綈慎夫人衣不曵地帷帳不得文繡以示敦樸為天下先景帝遵業務農訓儉以雕文刻鏤傷農事錦繡纂組害女紅下詔戒之故太倉之粟陳陳相因紅腐而不可食都内之錢貫朽而不可校稱賢君必曰文景以比周之成康及其衰㣲民心思漢而不能忘以文景恭儉徳澤及民者深也臣願陛下上觀帝堯舜禹文王之法考伊尹周公孔子之言下視文景之效則皇帝少而習之長而安之唯知儉約不知侈靡他日海内富庶自今日儉徳為之始生民之類受陛下之賜豈有窮極哉臣竊聞奉宸庫已取珠子至六十斤户部已用金至三千六百兩不為不多矣臣所以先事而言者恐増加無已滋長侈心也唐太宗問禇遂良曰舜造漆器禹雕其俎諫者十餘人何也遂良對曰奢靡之始危亡之漸也漆器不已必金為之金器不已必玉為之古之争臣必諫其漸若事巳横流則無所諫矣是以紂為象筯箕子嘆曰為象筯必為玉杯為玉杯則思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可振也古之人見㣲而防患如此唐明皇開元之初悉取珠玉錦繡服玩之物焚之於庭以示儉徳及其末年猶以窮極奢侈天下敗亂今臣區區之愚竊以皇帝即吉之始若一開侈靡之端恐後日奢費之無已也故願豫為之防止於未然臣愚不識忌諱唯陛下裁赦范太史集巻十三

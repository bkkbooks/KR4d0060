body:
  text: 范太史集卷二十七宋范祖禹撰進故事唐太宗幸洛陽宫苑謂侍臣曰煬帝作此結怨于民今悉為我有正由宇文述之徒內為諂諛外蔽聰明故也可不戒哉臣祖禹曰昔周公召公之相成王一話一言未嘗不以夏桀商紂為戒也其臣危亡之言不絶于口其君危亡之言不絶于耳故天下國家可得而安也唐太宗見隋煬帝亡國故親至其宫苑而以諂諛掩蔽誡羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王所由興也漢昭帝詔曰朕以眇身獲保宗廟戰戰栗栗夙興夜寐修古帝王之事通保傅傳孝經論語尚書未云有明其令三輔太常舉賢良各二人郡國文學髙第各一人臣祖禹謹按大戴禮保傅傳曰昔者周成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅其德義師導之教訓此三公之職也于是為置三少皆上大夫也曰少保少傅少師是與太子宴者也三公三少明孝仁禮義以導習之逐去邪人不使見惡行于是皆選天下之端士孝悌博聞有道術者以輔翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正猶生長于齊不能不齊言也習與不正人居不能無不正猶生長于楚之地不能不楚言也及太子少長則入于學學禮曰帝入東學上親而貴仁則親踈有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不匱矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入太學承師問道退習而端于太傅太傅罰其不則而正其不及則德智長而治道得矣三代之禮天子春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親饋之所以明有孝也行中鸞和步中采齊趨中肆夏所以明有度也其于禽獸見其生不忍見其死聞其聲不忍食其肉故逺庖厨所以長恩且明有仁也明堂位曰篤仁而好學多聞而道慎天子疑則問問則應而不窮者謂之道道者導天子以道也常立于前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志也常立于左是太公也潔廉而切直正過而諌邪者謂之弼弼者拂天子之過也常立于右是召公也博文彊記接給而善對者謂之丞丞者丞天子之遺忘也常立于後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事商周之前所以長久者其輔翼天子有此具也天子不論先聖之德不知國君畜民之道不見禮義之正不察應事之理不博古之典傳不間于威儀之數詩書禮樂無經學業不法凡此其屬太師之任也天子無恩于父母不惠于庶民不禮于大臣不中于刑獄無經于百官不哀于喪不敬于祭不信于諸侯不戒于戎事不誠于賞罰不厚于德不彊于行賜與侈于左右近臣吝于疏逺卑賤不能懲忿窒欲不從太師之言凡此其屬太傅之任也天子處位不端受業不敬言語不序聲音不中律進退節度無禮升降揖讓無容周旋俯仰視瞻無儀凡此其屬太保之任也天子宴廢其學左右之習反其師答逺方諸侯不知文雅之辭應羣臣左右不知巳諾之正簡聞小誦不博不習凡此其屬少師之任也天子居處出入不以禮冠帶衣服不以制御器在側不以度縱上下雜采不以章忿怒悅喜不以義賜與奪讓不以節凡此其屬少傅之任也天子宴私安所易樂而湛飲酒而醉食肉而飽飽而彊飢而婪自取玩好自執器皿凡此其屬少保之任也不知日月之時節不知先王之諱與大國之忌不知風雨雷雹之眚凡此其屬太史之任也昭帝先通保傅傳謂此書也唐太宗縱死囚使歸家期以秋來就死皆如期自詣朝堂上皆赦之臣祖禹以為太宗縱天下死囚皆如期自歸此由至仁愛人至誠感物之所致也書曰好生之德洽于民心太宗之謂矣唐明皇東封還至宋州宴從官于樓上刺史冦泚預焉上謂張說曰嚮者屢遣使臣分巡諸道察吏善惡今因封禪歷諸州乃知使臣負我多矣懷州刺史王丘餼牽之外一無它獻魏州刺史崔沔供帳無錦繡示我以儉濟州刺史裴耀卿表數百言莫非規諫如三人者不勞人以市恩真良吏矣顧謂冦泚曰比亦屢有以酒饌不豐訴于朕者知卿不借譽于左右也自舉酒賜之臣祖禹以為漢武帝好用慘酷之吏故董仲舒以守令未得人為言夫一郡守不得人則千里之地受其害一縣令不得人則百里之地受其害欲天下之民皆得其所莫如選擇守令之為急也唐明皇東封過諸州而懷魏濟宋皆有良守亦足見其時州郡多得人矣豈非姚崇宋璟為相之效乎太宗至道元年正月望夜御乾元樓觀燈召司空致仕李昉賜坐于御榻之側慰撫良久酌御樽酒飲之自取果餌以賜上觀京城繁盛親指前朝坊巷省寺之所今拓為通衢長廊因曰晋髙祖優柔無斷稔成奸惡少主昏䝉卒至亡滅洎至漢朝其政愈亂致蘇逢吉史𢎞肇輩互相猜二李嵩之族枉陷塗炭是時京城人情倉惶殆無生意豈暇營繕都邑乎昉對曰晋漢之事老臣備經今陛下恭勤治道聽政無倦是致四海清晏輦轂繁盛上曰勤政憂民帝王常事耳朕不以繁華為樂蓋以民安為安仁宗嘉祐七年上元御宣德門召近臣宗室觀燈酒行上顧左右曰朕非欲獨為逰觀此因歲時與萬姓同樂耳漢制立春秋日下寬大書制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事月令曰命相布德和令蔡雍曰即此詔之謂也臣祖禹曰闕七行唐舊制雅俗之樂皆𨽻太常明皇精曉音律以太常禮樂之司不應典倡優雜伎開元二年更置左右教坊以教俗樂又選樂工數百人自教法曲于梨園謂之皇帝梨園弟子又教宫女使習之又選妓女置宜春院給賜其家禮部侍郎張庭圭酸棗尉袁楚客皆上疏以為上春秋鼎盛宜崇經術邇端士尚朴素深以悅鄭聲好逰獵為戒上雖不能用欲開言路咸嘉賞之臣祖禹曰昔紂作靡靡之樂北里之舞以亡其國明皇即位之初留意聲樂故其末年耽樂奢侈以致大亂幾亡天下人君所好可不慎哉夫太常掌天地人之禮郊廟之樂舜命伯夷典禮䕫典樂之職也以明皇之好音猶不使雅俗相雜國朝祖宗以來教坊宴樂𨽻宣徽院自宣徽院廢乃屬太常以鄭衛之樂瀆典禮之司此有司官制之失也漢髙祖七年丞相蕭何治未央宫立東闕北闕前殿武庫太倉上見其壯麗甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宫室過度也何曰天下未定故可因以就宫室且夫天子以四海為家非令壯麗無以重威且無令後世有以加也上悅臣祖禹曰禹卑宫室孔子美之曰吾無間然矣周宣王初即位更為儉宫室小宗廟而致中興之功詩人歌之蕭何不能以道佐漢祖乃襲亡秦之奢侈創業之君一言一動子孫視效此乃武帝千門萬戶所以興也臣恭聞太祖皇帝詔宫殿之制准得赤白纍聖遵守不敢有加儉德之美過于漢祖逺矣唐太宗嘗罷朝怒曰㑹須殺此田舍翁文德皇后謂帝曰誰觸忤陛下帝曰魏徵每廷辱我后退具朝服立于廷帝大驚曰皇后何為若是后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀帝乃悅臣祖禹曰詩人美后妃輔佐君子求賢審官國家將興必有淑哲之配警戒以成君子之德若長孫皇后感悟太宗其可謂賢矣後漢建武初任延拜武威太守光武親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝嘆息曰卿言是也唐太宗本以兵定天下雖已治不忘經略四夷也魏徵侍宴奏破陳武德舞則俯首不顧至慶善樂則諦玩無斁舉有所諷切如此慶善樂者文德之舞漢武帝建元三年上始為微行嘗以夜出自稱平陽侯旦明入南山下射虎豕狐兔馳騖禾稼之地民皆號呼罵詈鄠杜令欲執之示以乘輿物乃得免又嘗夜至柏谷投逆旅宿就逆旅主人求漿主人翁曰無漿止有溺耳且疑上為奸盜聚少年欲攻之主人嫗覩上狀貌而異之止其翁曰客非常人也且又有備不可圖也翁不聽嫗飲翁以酒醉而縳之少年皆散走嫗乃殺雞為食以謝客明日上歸召嫗賜金千斤拜其夫為羽林郎臣祖禹曰仁宗皇帝皇祐二年四月御邇英閣讀漢書東方朔傳至武帝微行數出仁宗曰帝王每出須中嚴外辦何容易如此侍讀丁度對曰武帝以承平日久藉文景之資所以窮志極欲仁宗曰若安寧之時常思危亡之戒豈有後悔臣愚竊謂武帝以天子之尊而好狂夫之逰困于逆旅幾至為殆考其行事足為永戒仁宗皇帝特發德音所以垂訓萬世也唐肅宗為太子時常侍膳尚食置熟俎有羊臂臑臂臑肱骨也臑奴到反明皇顧使太子割肅宗既割餘汚墁在刀以餅潔之上熟視不懌肅宗徐舉而啖之上甚悅謂太子曰福祿當如是愛惜臣祖禹曰明皇教太子愛惜福祿不棄一餅可謂知稼穡之艱難矣然于其身窮極奢侈用財物如糞土卒致天下大亂何其明于子而暗于已乎書曰非知之艱行之惟艱明皇之謂矣史記樂書君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣致猶深審也樂由中出故治心也易平易直正直子諒愛信也易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威若善心生則寡于利欲寡于利欲則樂矣志明行成不言而見信如天也不怒而見威如神也致樂以治心者也致禮以治躬者也致禮以治躬則莊敬莊敬則嚴威禮自外作故治身心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯須不莊不敬而慢易之心入之矣易輕易也故樂也者動于內者也禮也者動于外者也樂極和禮極順內和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉德輝動于內而民莫不承聽理發諸外而民莫不承順鄭𤣥曰德輝顔色潤澤也理容貌進止也孫炎曰德輝明惠也理言行也故曰致禮樂之道舉而措之天下無難矣臣祖禹謹案禮記樂記祭儀皆載此語司馬遷取之以為樂書蓋古之君子傳先王之法言論禮樂之本而造于道德之精微孔子之門人祖述而傳之亦猶大學誠意正心齊家治國之說也此學者所當盡心而人君所宜留意臣是以敢獻之唐明皇每酺宴先設太常雅樂坐部立部繼以鼓吹胡樂教坊府縣散樂雜戲又以山車陸船載樂往來又出宫人舞霓裳羽衣又教舞馬百匹銜杯上夀又引犀象入場或拜或舞安祿山見而悅之後祿山反既克長安命搜捕樂工運載樂器舞衣驅舞馬犀象詣洛陽司馬光論曰聖人以道德為麗仁義為樂故雖茅茨土階惡衣菲食不恥其陋唯恐奉養之過以勞民費財明皇恃其承平不思後患殫耳目之玩窮聲技之巧自謂帝王富貴皆不我如欲使前莫能及後無以踰非徒娛已亦以誇人豈知大盜在旁已有窺窬之心卒致鑾輿播遷生民塗炭乃知人君崇華靡以示人適足為大盜之招也史記吳世家吳王僚九年公子光伐楚拔居巢鍾離初楚邉邑卑梁氏之處女與吳邉邑之女爭桑二女家怒相滅兩國邉邑長聞之怒而相攻滅吳之邉邑吳王怒故遂伐楚取兩都而去臣祖禹曰疆場之事常起于細微故兩女子爭桑而吳楚相攻由漢以來守邉之吏或忿爭細故或徼幸功賞以怒鄰敵至兵連禍結而國家受其敗人君不知者多矣可不戒哉漢光武建武八年帝自征隗囂隴右潰囂奔西城遣大司馬吳漢征南大將軍岑彭圍之時公孫述將李育將兵救囂守上邽帝命虎牙大將軍蓋延建威大將軍耿弇攻之潁川盜賊冦沒屬縣河東守守兵亦叛帝自上邽晨夜東馳車駕還宫敕彭書曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白臣祖禹曰漢光武以兵定天下中興漢室是時隗囂據隴公孫述據蜀未得息師光武厭苦軍事雖謀臣猛將衆多猶曰每一發兵頭鬚為白其憂畏如此蓋深知百姓疾苦懲用兵之為天下害也順帝時災異屢見陽嘉二年春郎顗上書其四事曰易傳曰陽無德則旱隂僭陽亦旱陽無德者人君恩澤不施于人也隂僭陽者祿去公室臣下専權也自冬涉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市董仲舒春秋繁露曰春旱以甲乙日為蒼龍一長八尺居中央為小龍七各長四尺于東方皆東向其間相去八尺小童八人皆齊三日服青衣而舞之夏以丙丁日為赤龍服赤衣季夏以戊巳日為黃龍服黃衣秋以庚辛日為白龍服白衣冬以壬癸日為黑龍服黑衣牲各依其方色皆燔雄雞燒豭豬尾于里北門及市中以祈焉禮記歲旱魯穆公問于縣子縣子曰為之徙市不亦可乎臣聞皇天感物不為僞動災變應人要在責已若令雨可請降水可禳止則歲無隔并太平可待然而災害不息者患不在此也不在祈禱立春以來未見朝廷賞録有功表顯有德存問孤寡賑恤貧弱而但見洛陽都官奔車東西收繫纎介牢獄充盈臣聞恭陵火處比有光耀比頻也時恭陵百丈廡災仍有光耀不絶明此天災非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨將害宿麥若一榖不登則饑者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十載之畜者簡稅防災為其方也簡少也方法也願陛下早宣德澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨于今之際未可望也若政變于朝而天不雨則臣為誣上愚不知量分當鼎鑊書奏特詔拜郎中辭病不就即去歸家至四月京師地震遂陷夏大旱秋鮮卑入馬邑城破代郡兵明年西羌冦隴右皆略如顗言臣祖禹曰天人之交相去不逺故漢世儒者各以所學推言災異其言多驗臣恭聞仁宗皇帝最深洪範之學每有變異恐懼修省必求其端近世學者廢而不習人君奉順天道不可不留意也漢文帝時賈誼上書曰三代之禮春朝朝日秋暮夕月所以明有敬也朝日以朝夕月以暮皆迎其初出也下朝直遙反春秋入學坐國老執醬而親饋之所以明有孝也行以鸞和鸞和車上鈴也步中采齊樂詩名也齊或作薺又作茨音才私反趨中肆夏亦樂詩名趨疾步也凡此中者謂與其節相應也音竹仲反所以明有度也其于禽獸見其生不忍其死聞其聲不食其肉故逺庖廚所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也鼂錯上書言人主所以尊顯功名揚于萬世之後者以知術數也故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之臣祖禹曰賈誼之學本于詩禮故欲人君知禮義鼂錯之學本于刑名故欲人君知術數三代之君以禮義治故下以誠應之秦漢之君以術數治故下以詐應之人主臨制羣臣聽言受事錯皆以為術數而不知聖人之道無二唯一以至誠而已唐太宗猶恥以權數接臣下而況于三代之主乎闕臣祖禹曰自唐天寶之亂兵革不息訖于五代後周顯德凡二百十有五年天下分裂為八九生民糜爛于兵周世宗以雄武之才在位六年南征北伐以强中國雖綱紀稍振而大功未成太祖受命削平僭亂然後海內為一蓋天將啓太平之運以授聖人世宗征伐之功實為有宋開創之基也觀周顯德以前治少而亂多然後知本朝百三十餘年中外晏安自三代以來未之有也可不兢兢業業以守之哉闕臣祖禹曰古者至治之世麟鳳在郊藪龜龍遊宫沼河出圖洛出書舜之時簫韶九成鳳凰來儀文王之興鸑鷟鳴于岐山聖人在上則四靈為畜所以謂之瑞也漢武帝幸雍祠五畤獲一角獸若麃然有司以為麟武帝博謀羣臣而終軍上對宜因昭時令日改定告元苴白茅于江淮發嘉號于營丘帝甚異之由是改元為元狩臣竊考元狩之間有淮南衡山之獄坐死者數萬人吏益慘急而法令察武帝方甘心快意結怨于胸奴命衛青霍去病等將兵連歲出征胸奴亦數入為冦于是天下騷然倉庫空虛貧民流徙乃與公卿議白金及皮幣以奪商賈之利取諸侯之財吏民犯法者不可勝數于是酷吏用事多至公卿而繡衣直指之使斬斷于外當此之時生民如處于爐炭之上然則何以致天地之和氣麟曷為出哉昔魯哀公十四年西狩于大野獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之麟于魯出非其時惟聖人識之故春秋書獲麟武帝得一角獸而有司謂之麟終軍因勸以改元封禪甚矣羣臣之諛也後世言帝王窮兵黷武嚴刑峻法者必曰秦皇漢武蓋以始皇無道而武帝亦近似之矣考其行事豈獨武帝之過哉其臣諛佞以成之也孟子曰長君之惡其罪小逢君之惡其罪大漢之羣臣豈不然哉范太史集卷二十七

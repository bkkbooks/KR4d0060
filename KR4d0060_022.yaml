body:
  text: 范太史集巻二十二宋范祖禹撰奏議進幸學故事劄子元祐六年十月太祖建隆元年正月幸國子監二月又幸詔加飾祠宇及塑繪先聖先賢先儒之像帝親製文宣王兗國公二賛四年四月又幸國子監太宗端拱元年八月幸國子監謁文宣王畢命學官李覺講易泰卦淳化五年十一月幸國子監召直講孫奭講尚書説命三篇真宗咸平二年七月幸國學謁先師及覽三禮圖召直講崔偓佺講尚書大禹謨大中祥符元年十一月幸曲阜縣謁文宣王廟廟内外設黄麾仗帝服鞾袍行酌獻之禮初有司定儀止肅揖帝特拜又幸孔林以林木擁道降輿乗馬詣墳拜奠下詔追諡夫子曰元聖文宣王先是帝曰唐明皇褒先聖為王朕欲追諡為帝可乎當令有司檢討故事以聞或言宣父周之陪臣周止稱王不當加以帝號遂止増美名仁宗天聖二年八月幸國子監謁文宣王召從臣升講堂令直講馬龜符説論語一篇已而觀七十二賢讃述閱三禮圗因問侍講馮元三代制度慶歴四年五月幸國子監謁至聖文宣王有司言舊儀止肅揖帝特再拜右謹進呈乞改正先聖冠服劄子臣伏見禮部員外郎楊傑上言唐開元中追諡先聖為文宣王内出王者袞冕之服以衣之今乞用唐故事衣以衮冕之服臣竊惟祖宗褒崇先聖比之前代禮意加隆而冕服未用王者之制此葢有司之誤誠為闕典陛下欽明稽古聖徳日躋臣愚欲乞因駕幸太學酌獻之日親覩先聖服章特降聖㫖命有司改正用三代王者之禮以彰陛下尊師重道崇儒之意此乃一朝之盛典聖學之美事也取進止轉對條上四事狀十一月三十日準御史臺牒十二月一日文徳殿視朝輪當轉對奏事臣有管見謹具如後一臣伏以自祖宗肇造區夏剗削藩鎮分天下為十八路置轉運使副提㸃刑獄有州三百州置守皆得専逹扵朝廷有縣一千二百縣置令皆命扵天子其始也收鄉長鎮將之權悉歸扵縣收縣之權悉歸扵州收州之權悉歸扵監司收監司之權悉歸扵朝廷監司者古州牧連帥之職也郡守者古公侯之國也縣令者古子男附庸之君也自古封建則有强逼之患郡縣則無蕃屏之衛漢法古建侯王終有七國之變郡守權重得専生殺唐世自方鎮至縣令皆有専殺之威不請扵朝廷唯本朝之法上下相維輕重相制如身之使臂臂之使指民自徒罪以上吏自罰金以上皆出扵天子藩方守臣統制列城付以數千里之地十萬之師單車之使尺紙之詔朝召而夕至則為匹夫是以百三十餘年海内晏然謀閉而不興冦竊亂賊而不作舟車所至海隅出日無異近地不唯祖宗仁恩徳澤深結扵民亦由制置郡縣最得其道前此所未有也夫監司付以一路守臣付以一郡縣令付以一縣皆與天子分土而治者也其可以不擇人乎夫一縣令不得人則百里之地受其害一郡守不得人則千里之地受其害監司所以代天子廵狩黜陟功罪進退能否内集財賦外衛封疆者也若不得人則一路可知矣朝廷比年命中外兩制舉監司又出省郎為之亦有意扵慎選矣然監司有善未嘗知也有不善亦未嘗問也夫人之情能者不見異而不能者亦見容則自中人以下幾何而不惰是以議者多言監司職事不舉夫天下之吏患在不奉法令而觀望朝廷之意朝廷之意寛則吏治茍簡遂至扵怠朝廷之意急則吏治慘刻遂至扵苛夫觀望上下以為寛猛者是未得人也賢人君子豈有觀望而為政者哉祖宗以來有考課監司之法神宗時猶行黜陟近歲廢而不舉臣望陛下詔大臣舉行考課之法専考察諸路監司置簿扵中書凡有奏請及功罪皆書之參之以衆言驗之以行事歲終則較其優劣簡其能者亦簡其不能者而廢置之舉天下十八路監司不過數十人欲皆知之亦無難矣夫選天下郡守此大臣之職也古者天子親之漢宣帝曰庶民所以安其田里而無愁怨嘆息之聲者政平訟理也與我共此者其唯良二千石乎以為太守者吏民之本數變易則下不安故二千石有治理效輒以璽書勉勵増秩賜金公卿缺則選諸所表以次用之是以漢世良吏扵兹為盛稱中興焉光武廣求民瘼觀納風謡吏多得人百姓寛息建武永平之治後世莫及唐太宗曰為朕養民者唯在都督刺史朕嘗書其名扵屏風得其善惡之跡皆注扵名下以備黜陟是以貞觀之治幾扵三代明皇開元之初欲重都督刺史選京官才望者為之十二年以山東旱命選臺閣名臣以補刺史十三年帝自選諸司長官有聲望者十一人為刺史又勅京官五品以上外官刺史四府上佐各舉縣令一人視其政善惡為舉者賞罰是以郡縣多得良吏其治幾扵貞觀國朝太宗皇帝嘗語宰相曰朕擇循吏俟選及三百人則天下何憂不理臨御以來郡縣未理由擇人之未當也太宗又嘗選秘書丞楊延慶等十餘人分為諸道知州謂宰相曰刺史之任最為親民非其人則下受其弊審官院上新所選京朝官充知州者二十餘人御前印紙歴子太宗親書以賜之其畧曰惠愛臨民奉法除姦因謂知院錢若水曰所賜戒諭有除姦之語恐不曉者從而生事可諭以除姦之要在乎奉法耳朕盛暑中寫此豈不勞乎葢為官擇人以安百姓也神宗嘗謂執政曰朕思祖宗百戰而得天下今以一郡付之庸人深可痛心自太祖至神宗未嘗不留意親擇郡守今二聖垂拱悉以政事付之大臣然則今日擇郡守乃大臣之職也自京朝官以上功罪善惡無若吏部知之為詳臣愚欲乞先委吏部尚書取當為知州者具其功過舉主而擇其可任者保明之以上三省三省召而審察之凡當召者使之言二事以上如轉對法或前任利害或朝政闕失不唯可以觀其才識亦因以廣言路通下情昔堯之試舜亦詢事考言舜之用人亦敷奏以言明試以功夫欲知其人不過以言與事二者而巳若其言可厎行及有功狀與其舉主多名人則可用無疑矣其不及者以次差之其否者與京府或藩郡通判其罷癃不能任職者與宫觀有罪者自依舊法降監當既定其等然後使御史臺糺其不當者到官則委監司考其課每及一年則以優劣聞而行黜陟焉如此則能者必出不能者必漸退雖未盡善得人必多矣夫有監司則有郡守有郡守則有縣令未有監司郡守得人而縣令可以容貪虐昏闇之人也是故天子任宰相宰相擇監司與郡守監司郡守當擇縣令宰相察監司而已監司察郡守郡守察縣令朝廷據其所察而行賞罰此豈難哉夫有考課而無黜陟與不考同今吏部雖以上中下為等文具而已非有賞罰使人勸沮也臣伏望陛下明諭大臣使慎擇監司而専考之又使大臣代陛下擇郡守其監司郡守考課必行賞罰使監司郡守専察縣令庶使天下官吏漸多得人然後可以言治矣一臣伏見近制舉殿中侍御史監察御史須通判資序實歴任一年以上人充臣嘗受詔與兩制同舉㑹議終日無一資序相當可充選者間有一人應格又衆論未以為允雖由舉者審知人才不廣實亦拘礙資格所以尤難得人緣資格之設本以向者多不拘資序或特除選人故立此法矯枉過正臣愚欲乞參酌前後條制裁處其中應舉監察御史取第二任知縣以上殿中侍御史取初任通判以上更不限實歴一年其寄禄官並以奉議郎以上所貴資序稍寛易得應格兼收衆才益廣言路亦經乆之通法也一臣竊見朝廷常患將帥之才難得其人仁宗時每邉臣闕或自禁近除授試之藩閫然後大用外任則都轉運使待制雜學士可用者常數人選擇而使之未嘗言乏豈人才獨多扵今由朝廷養之有素也將帥之選多出扵監司初為監司者先自逺路漸擢至京東西淮南其資望最深績效尤著者乃擢任陜西河東河北三路及成都路自三路及成都召為三司副使其未可輟者或與理副使資序自副使除待制出為都轉運使夫自初為監司至三路及三司副使者其人年勞已深經歴已多縁邉山川道路甲兵錢穀皆所諳知故帥臣有闕可備任使中才之人亦能勉强朝廷以其經歴亦倚仗而不憂夫人雖有聰明絶人之才若未嘗目覩終不如親歴者所得之多也自王安石用資淺之人為監司使之推行新法其奉法稍寛者則以為不才往往廢斥其苛急聚斂為士民所共疾者乃得在職或不次進擢是故才與不才兩皆廢壊而資序一切不用二聖臨御以來深懲監司刻薄多以罪黜其任用者又未嘗以逺近為之資序每邉帥有闕則不知可用者為誰由朝廷養之無素也臣愚欲乞復祖宗時用監司之法先自逺路漸擢至京東西淮南然後選其能者任三路及成都試之户部司農太府或左右司郎官然後出為都轉運使邉臣有闕扵此選授則可用之才必多矣今監司除授無法或初除即與近路及三路自三路却遷之逺地則人情已不樂在三路者或乆而不遷其才能資望又不足以備邉帥之任此所以人常乏也今若復祖宗三路之法以任轉運使其提㸃刑獄轉運判官亦擇才能者與諸路更互為之使往來出入扵三路者常多則知邉事者必衆矣一臣聞昔季康子患盗問扵孔子孔子對曰茍子之不欲雖賞之不竊季康子又問政扵孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃臣始讀書葢嘗疑之以為聖人之言主扵教化而已行之未必有近效也及觀唐太宗初即位與羣臣論止盗或請重法以禁之太宗哂之曰民之所以為盗者由賦繁役重官吏貪求饑寒切身故不暇顧亷耻耳朕當去奢省費輕徭薄賦選用㢘吏使民衣食有餘則自不為盗安用重法耶自是數年之後海内升平路不拾遺外户不閉商旅野宿焉臣觀太宗之政如此乃始知聖人之言不欺後世行之必有近效也夫以區區之魯國季康子為相孔子猶勸之不欲所以止盗而況天子之為天下乎季康子魯之執政猶不可以言殺當欲善而已而況天子之扵天下乎自古用重法以止盗者莫如五代之漢漢髙祖即位之年患四方盗賊衆多制盗賊無問贓多少皆抵死仍分命使者逐捕宰相蘇逢吉草詔意云應賊盗其本家并四鄰同保皆全族處斬衆以為盗猶不可族況鄰保乎逢吉固争不得已但省去全族二字由是鄆州捕賊使者張令柔殺平隂縣十七村民其法可謂重矣然盗賊不為衰止漢室不四年而亡夫唐太宗之政如彼漢髙祖之法如此有天下者當以盛唐為法乎當以季漢為法乎至周太祖時竊盗賊滿三匹者猶棄市太祖皇帝代虐以寛稍輕盗法累聖仁厚哀矜庶獄遞加减貸故竊盗遂無死刑然今編敕所定盗贓猶重扵律三倍葢承五代刑罰世重减之極輕猶至扵此豈可更増重乎臣伏見熈寧四年中書檢正官奏請開封府東明考城長垣等縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兖鄆沂等州淮陽軍别立盗賊重法其後又有他州奏請乞比東明等處行重法者有重法之地又有重法之民夫普天之下莫非王土食土之毛誰非君民今猶視此州縣如蠻貊異域之人别立盗法自行法以來二十餘年不聞盗賊衰止但聞其愈多耳老子曰法令滋彰盗賊多有又曰民常不畏死奈何以死懼之夫上以善待民乃可望民為善以應上若其不應罪在民也上以惡待民則民為惡以應上乃其理也何足怪其多乎古者開衣食之源立教化之官先之以節儉示之以敦樸倉廩實而知禮節衣食足而知榮辱則自不為盗有邪僻之民然後從之以刑豈有不治其本而専禁其末不清其源而欲塞其流也若以重法為權時之宜行之數年而盗少扵前固當除之復用中典若盗益多扵前則是重法不足止盗甚明其可除去無疑也又重法之地皆舉知縣必擇彊健之吏被此選者奉法除盗視民如讎一切以擊斷為稱職此豈平世所宜為乎臣愚欲乞悉除重法改重法地分為舉知縣地分夫天下縣令皆不可不擇獨此諸縣先已舉吏則不可廢民多奸猾尤須良吏以治之選吏以養民不命吏以敵民也及今四方人情少安改峻法為平法庶可以變惡俗為善俗止用常典足以禁姦其刑亦不輕矣若行重法不已盗賊益多臣將見此數十州之民無樂生之心一有凶年饑饉則為等死之計羣起而為大盗雖有重法又可禁乎惟陛下無以孔子之言為迂無以唐太宗之治為難無以教化為不急無以峻法為足恃則民皆可使為善矣右謹件如前臣智慮短淺闇扵世務待罪班列無補毫分伏遇皇帝陛下明目逹聰推廣言路每因視朔博訪在廷臣輒以狂瞽仰塞明詔干冒天聽敢逃刑命臣無任惶懼隕越之至乞不遷開封府狀七年正月八日右臣準尚書省批送工部狀乞遷開封府扵舊南省令禮工部與將作監同勘當者臣竊以開封府自太祖皇帝開國建置扵此太宗真宗皆嘗尹京潛龍故跡至今存焉昨因廨舍遺火逼近原廟遂有遷改之議若以火而遷則廟之東北皆有民居比之開封尤更不逺火何可防又舊南省已為試院今欲以開封府為試院豈可不嚴火禁乎若以開封敲撲之地不可近原廟則景靈宫在祖宗時巳有列聖神御比之今日輕重亦均若以狹隘而遷則祖宗以來官吏所容亦足以治事且開封非貯火之所但長吏與僚屬住家扵其中爾比之民居孰為難防唯當申嚴火禁或築髙牆以為隔限亦可以備患矣今乃欲改巳成之試院為府廢百三十餘年之府為試院此兩大役營造不小夫土木之功使匠人度之無不言費省而易了及其作之便見費大臣恐枉勞人力虚費國用無大利害不必遷也今若因舊興葺稍徙近南比之兩處營造功費猶小凡官舍數遷改則民心亦不定不若因其故便昔魯人為長府閔子騫曰仍舊貫如之何何必改作孔子稱之葢為國者姑務省事不欲多變革也伏望聖慈更賜詳擇謹錄奏聞范太史集巻二十二

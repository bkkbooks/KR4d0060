body:
  text: 范太史集卷八宋范祖禹撰表狀慰太皇太后梓宫發引表以下代富韓公真馭不留慈顔莫覩奄及祖庭之禮永違夀殿之居恭惟皇帝陛下感創至深哀號難處儼龍輴之將駕攀鳯翼以無從凡在食毛同增隕涕臣退居田里阻覲闕庭瞻望宸極臣無任悲哀隕越之至慰皇太后表山陵備禮儀衛啓行祖載及期真遊永逺恭惟皇太后殿下孝思罔極號慕難居瞻服御以如存望輜軿而不返凡在臣庶同切哀惶臣退老田廬久違京闕不獲奔詣宫庭無任悲殞哀越之至慰梓宫掩皇堂表昊天罔極率土同哀逺日有期因山制禮掩玉衣於柏寢閟金殿於泉扃恭惟皇帝陛下號慕難居孝誠備至痛慈闈之永隔哀真馭之不還億兆之心感涕斯切臣身居田里心在闕庭瞻望宸極臣無任悲戀殞越之至慰皇太后表神山祔卜從先帝以上賔真宅言歸與厚坤而同久恭惟皇太后殿下奉嚴宗廟致孝皇姑想真馭以如疑痛徽音之永逺臣退居田里阻詣宫庭臣無任悲隕之至慰祔廟表三殿問安音容永隔九虞畢祭廟貌惟新恭惟皇帝陛下孝極奉先感深追逺天長地久蒙休佑以無窮春禘秋嘗惟時思而匪懈伏願節哀順變調膳御宜仰奉宗祧俯安區宇臣阻陪慰覲徒切悃誠慰皇太后表仙仗徐還容衣長掩升靈清廟合食宗彝恭惟皇太后殿下追慕增深哀懷罔極惟春秋之孝享感雨露以時思臣不獲奔詣宫庭無任悲殞之至賀同天節表伏以朱火司辰薰風應律當真聖挺生之旦乃皇家纍洽之期罄海宇以傾心望帝宸而獻祝恭惟皇帝陛下躬膺駿命寅御寶圗體乾健以當陽嚮離明而布治流虹紀慶甲觀誕祥文軌所臻華夷胥抃臣叨塵三事親際千齡退老故廬阻趨魏闕處陶唐之俗豈知帝力之深效華封之民但祝聖人之夀乞免赴明堂大禮陪位表合宫蕆事將嚴宗祀之儀宸檢頒恩俾預駿奔之列顧惟衰耄實切兢惶恭惟皇帝陛下聖孝日躋慈仁廣被秩百王之盛典因四海之歡心對越上靈陟配昭考執籩在列拱侯甸以同寅鳴玉造庭儼臣工之率職何圗求舊亦齒陪祠伏念臣自處田廬久嬰疾疢步趨多梗拜伏為囏懼殞越以無堪顧恪恭而難勉徒荷乾坤之施曲回日月之光唯同擊壤之氓預享寧神之福心搖魏闕莫申顯相之容夢想鈞天阻聽我將之頌臣以老疾不獲依詔奔詣闕庭無任瞻天感聖戰汗激切屏營之至謝詔書允所乞表昭事上神特降陪祠之召閔勞黃髮復推從欲之恩祗荷寬優伏增榮悸伏念臣久塵爵位無補聖明雖退老於故廬實繫心於魏闕尚紆宸眷洊沐恩波將嚴享帝之儀俾預造庭之列虔奉自天之命豈當俟駕而行俯念殘年素甘多疾奏囊封而懇惻望宸極以踟蹰莫克駿奔惟懷惕厲伏遇皇帝陛下至仁廣覆大德兼容知其筋力之衰既難為禮免其道路之苦俾遂養痾頒溫詔以撫存荷清衷之矜允禮加舊物風厚寰區冀畢餘生仰酬鴻造賀明堂禮畢表五室奉祠嚴祖宗而陟配諸神受記祚邦國以流光熙事備成普天同慶恭惟皇帝陛下虔恭寶位駿惠先猷澤浸羣生化孚四表建大中而順帝茂馨德以事神載謀載惟祗率精禋之典我將我享式隆孝治之風物采備陳福祥紛委御中天而發號宥率土以均恩書軌所臻動植咸遂臣退居田里阻覲闕庭徒傾就日之誠莫預稱觴之列辭免轉司徒表明緡忽降寵數併加內自省循交深震栗伏念臣本由孤進仰會先朝擢居三事之崇謬處衆賢之列當仁祖御圗之久唯英皇育德之初於時執政之臣肇啓建儲之議計安社稷乃惟報國之宜力贊聖明是亦秉均之職九廟威靈以在上慈闈保佑以居中景命有開大統終集實由天啓諒非人謀敢伐善以稱功期抱忠而沒世年踰二紀事歷三朝退安田里之居俯迫桑榆之景豈意故臣之奏議仰紆當寧之覽觀特簡淵衷遽形褒詔敷聞華夏震聳縉紳渙大號於明廷霈鴻恩於私室發自睿斷匪由僉諧特遷五教之司益重三階之秩顧兹衰朽敢冒寵榮且既往之功復何足録而非常之澤義所當辭伏望皇帝陛下俯亮丹誠慎行過賞聽輟出綸之命免貽據蒺之災重念臣早玷近班素安拙分年將及耄寵則踰涯已竊位於公槐仍兼華於將鉞當知止之日豈叨榮之時雖蒙虞帝之念功曷稱武公之善職由衷之請報可是期謝明堂加恩表世室奉祠明庭渙號鴻恩俯被黃髮為榮伏念臣素乏異能早逢亨會荷三朝之眷遇秉二府之鈞衡徒膺體貌之隆豈有涓埃之補逮引年而遂請蒙佚老之推慈獲偃息於故廬幸優遊於聖日伏遇皇帝陛下講求國典親饗明堂對越上靈嚴配昭考受皇天之篤祐擁宣室之蕃釐麗澤豐融羣生鼓舞薦紳蒙福朽枿回春顧惟殘稿之姿均被厖鴻之渥矧更新於官制特序正於文階圖鼎飪之前勞形贊書之厚奬衰悰感槩舊蓽光華雖居畎畝之微敢忘天地之施謝轉司徒表渙汗難收末由懇避宸章申答重荷褒嘉祗受以還震惶無措伏念臣早緣末學進齒清朝誤蒙仁祖之知擢備宰司之位逮英皇之嗣服長樞府以秉均曽無補於聖猷遂出修於藩職熙寧初載睿哲統天入居論道之司重辱改容之禮屬嬰疹疾靡效毫分幸賴曲全始終久遂休佚豈意登儲之請仰關當寧之懷特追念於前勳俾對揚於休命顧臣何力冒此殊榮此蓋伏遇皇帝陛下駿惠先猷纂隆下武推至仁而求舊舉懋典以記功上昭神祖之明丕承文考之志不遺耄齒猶録微勞雖貪天之功古有明戒而惟帝之念敢不奉承當仁寧負於靦顔追孝實彰於睿德昔為羽翼之助者隱不復顯書龍蛇之詩者死而後知逢時之榮在臣何幸顧迫桑榆之景曷酬天地之仁謝男受閣門祗候表有命自天延賞于世祗奉宸旨弗獲懇辭俯念衰遲豈勝感慰伏念臣本興孤族幸守素風惟忠孝以傳家非公侯之繼世致位上宰席寵三朝何圗退老之時猶被褒功之典中台進秩弱息預榮斷自清衷加於私室此蓋伏遇皇帝陛下天臨萬宇子育黎元追先帝之升儲眷輔臣之定䇿以為固社稷者猶將宥其十世詔爵祿者所以馭於羣臣體虞帝之寬仁法周家之信厚特推懋賞以及二宗因垂勸於將來故深矜於舊物臣敢不知恩所自重義於生雖典謁無能益勵教忠之訓儻析薪克負俾酬及幼之仁辭免册命表君牙拜命祗聖訓以奉承史佚贊辭在臣工而曷稱輒殫悃愊上冒髙明伏念臣起自諸生謬塵三事乏代天之逺用竊浮實之隆榮眷求輔政之初嘗有登儲之請因推懋賞追録微勞矧惟告老之人當避涓辰之禮伏望皇帝陛下特回睿聽俯徇私誠罷法扆之臨軒寢明庭之發册庶安止足之分免昭過溢之尤慰慈聖光獻太皇太后大祥表再期之喪三代所共禮制有限聖情無窮適臨祥事之辰深切永懷之感伏惟皇帝陛下奉先思孝追逺厚民體髙宗之宅憂同大舜之終慕上尊祖統虔遵服重之文仰法天時俯就立中之制淵衷軫念率土同哀臣以告老不獲奔詣闕庭云云遺表臣竊以天地者生成之本故物終必復其初君父者倫類之先故人死不忘其報垂沒之懇泣血以陳伏念臣夙以薄材起於孤族思有為於當世竊志學於古人進會休明寖躋華顯奉使方強之敵馳身不測之淵仰憑宗廟之靈復繼先皇之好仁皇帝以臣粗知忠義嘗冒險囏擢自諸生俾司大政英皇纘服慈后臨朝入長天樞助宣聖化陛下大明繼照濬哲統臨祗遹先猷眷求舊物延登三事委總萬機任遇不殊於兩朝優禮實冠於羣后而臣拙謀無補衰疾有加乏期月之成功辜帝心之妙簡守藩無狀報政蔑聞俄得請以告歸俾養痾而自便曲全終始許遂退休間者聖孝奉先皇明燭隱尚忝䇿勳之拜特遷掌教之司而臣沈瘵日侵頺齡愈迫蓋桑榆之向盡非藥石之可瘳重念臣歷事三朝辭榮一紀年登八十位正三公進則光顯於朝廷退則安佚於田里在臣揣分何啻踰涯故雖喘息之僅存唯抱忠誠而不已臣常思竭股肱之力繼之以死徇國家之急奮不顧身苟蹈義而可為雖沈族而不悔今乃幸終牖下獲盡天年將歸窀穸之墟莫效糜捐之節顧瞻白日眷戀明時受恩不資圗報無所伏望皇帝陛下欽承寶命光宅慶基養氣志以如神憲聰明而作后臨下以簡守位以仁躋俗雍熙之期納民富夀之域臣雖瞑目猶生之年臣永辭聖世無任瞻天戀聖激切屏營之至代范堯夫辭給事中兼侍講表右臣準閣門報已降告命除臣給事中兼侍講者臣竊以門下封駁之職實惟出納之司苟非公忠正直之人無以振舉綱條論議得失選任所重實難其才伏望陛下日親儒臣啓發聖學勸講帷幄敷陳典訓必得經術行誼之士厚重端方之臣緝熙光明陪侍左右臣久去朝廷待罪外官識智暗淺記問涉獵加以衰遲心神耗廢學憂不講經患不明將何以供奉禁密仰承訪逮兼是二職皆非所堪聞命震栗靡所自容又臣與司馬光舊為姻戚臣𨽻左省義亦有嫌伏乞天恩聽許引避亟收誤寵遴簡衆賢必得時髦以副眷委所有告命不敢祗受代楊中散遺表臣聞生則盡忠乃人臣之常守沒猶有戀惟君父之難忘輒陳忍死之言仰瀆蓋髙之聽伏念臣早由科舉進齒仕途慎守詔條悉心民政惟謹廉而潔已闕勤恪以在公未嘗枉道以事上官附勢而取髙位宰司五邑典守三州雖無可紀之能薄有見思之愛徒積勞於嵗閥遂升秩於卿曹洛邑分臺蓋免守麾之責祠庭領職益懷尸祿之慙伏遇宗祀熙成鴻恩普被更新官制敷錫臣工特易文階仍疇封邑而臣頺光已薄衰病內侵杳杳重泉將歸於幽壤昭昭白日永謝於明時顧無論報之因徒切哀鳴之懇伏望皇帝陛下御中和於六氣同長久於二儀聚會百祥覆庇四海臣雖瞑目猶生之年重念臣自歷官途踰五十載未嘗被監司之刺舉煩朝憲之譴訶內揆始終實無愧悔猶希漏澤俯及微宗輒瀝悃誠敢援故實臣今有孫男某粗承家訓未齒官榮伏望聖慈特賜於文資內安排臣永荷及泉之恩敢忘結草之報臣無任瞻天戀聖激切屏營之至代唐通直提點利州路刑獄謝上表中寧頒恩外臺領使載驅傳遽已案部封祗荷甄升伏增震悸伏念臣材資最下術業無聞徒服教於義方遂䇿名於士路備員冗吏絶意榮階蒙召對於燕間獲親聆於謨訓會有嶠南之役俾為湖外之行唯罄忠勤懼辜選使擢參公掾旋屬家艱起哀疚之餘生二轉輸於外計猥惟孤進盡出淵衷當右輔之劇煩顧小材之綿薄一塵官次三換嵗華曽無奏最之能宜被黜幽之典敢期易地仍委案刑叨任使之寖隆荷寵靈之下矚惟岷梁之舊域邇庸蜀之奧區封壤雖遐獄訟素簡俯容䇿勵分職糾虔此蓋伏遇皇帝陛下剛健博臨髙明廣照總核英髦之效不遺疏逺之臣特收轉餉之微勞進備宣條之乏使臣敢不上體欽恤志期肅清俾山谷之遐氓識朝廷之惠澤益殫犬馬之力圗報天地之私臣無任云云代楚待制謝再任崇福宫表宸扆頒恩琳宫分職載循衰朽祗荷寬優伏念臣世緒單平天資暗淺誤膺煩使寖履榮塗曽無尺寸之長諒乏涓埃之補延登天閣久塵侍從之班委總價藩荐被干城之寄自戌歸於外閫獲退領於祠庭屢易嵗華坐糜祿廩及兹滿秩輒復冒聞敢期從欲之仁特遂庇身之請此蓋伏遇皇帝陛下至仁天覆大德海容無一物之遐遺俾羣生之咸若故雖蒲栁之質猶霑雨露之私冀竭微誠仰酬洪造代忠文公遺表臣聞生也有涯卒隨於物化人之將死尤切於情言易簀以正其終視壙而知所息敢忘忠懇仰列睿聰伏念臣起自孤生出逢華旦蚤備諌垣之職誤膺仁祖之知入三朝之禁林侍二帝之經席堅一心而事上冒萬死以進言荷山海之兼容返耕桑而自樂伏遇陛下大明出震盛德承祧延登正人眷求舊物録臣初議進陟峻班逺追尚齒之風特降邇英之召而臣已不任於筋力阻趨覲於威顔既獲懇辭復遂休佚竊惟禮樂之大實繫國家之隆臣在先朝嘗陪末議是敢輒伸所學猶惜餘生克諧金石之音仰備廟堂之奏方志願之永畢迫年齡之已頺儻聖作明述之有成則朝聞夕死而無憾伏望皇帝陛下日躋聖敬時憲聰明畜德新其輝光典學念於終始刑孝風於四海冒仁澤於羣生追堯舜之隆名揚祖宗之大烈臣雖瞑目猶生之年臣永辭聖世無任悲戀激切屏營之至上太皇太后表臣聞自古有死乃前聖之訓言君子曰終亦先賢之志願啓手足而知免視丘原而與歸猶陳垂沒之誠上逹蓋髙之聽伏念臣本由孤進素乏異能被遇仁皇擢居諫省期於死職不敢愛身暨蒙英祖之知再入禁林之直神宗皇帝召從近輔復置邇聨唯堅一心如事二帝辱賜骸骨許歸田廬荷天地之兼容戴丘山而莫報犬馬之齒踰八十年麋鹿同遊幾二十載伏遇陛下翊扶真聖保佑丕基登進羣賢眷求遺老録至和之初議加祕殿之華資仍推延世之恩以及負薪之息召陪經幄起領祠宫特矜枯朽之餘再遂佚休之請得以考正鍾律之法講明禮樂之原莫獲造庭克諧奏御方同百獸之舞未覩三雍之成而臣年已迫於桑榆疾無瘳於藥石將歸黃壤難戀明時方今天人和同夷夏歡悅功莫髙於任姒俗將躋於成康儻制作之有期雖隕越而無恨伏望太皇太后陛下深惟廟社之重仰對祖宗之休澄宸慮於繁機納天和於沖氣加膳玉食頥神法宫永庇蒸民之生益隆萬夀之祉臣永辭聖世無任悲戀激切屏營之至代吕正獻公遺表臣竊以死不忘君乃人臣之常節窮則反本惟生物之大情雖餘喘之至微猶孤忠之未泯伏念臣早由末學進備邇聨重膺纍聖之知克紹前人之烈材力不逮豈期位列於三公氣血早衰敢望年踰於七十伏遇陛下踐盛德之阼擁無疆之休思庶政之惟艱圗舊人而共濟給扶以登文石之陛特班以拜大昕之朝顧未能致主於唐虞躋民於仁夀慚無補衮之效已迫首丘之期伏望皇帝陛下思先帝之緒以遺大投艱奉文母之訓以永世克孝不替詢謀於黃髮勿忘視戒於丹書作德日新務學時敏無為以守至正好問而察邇言崇成聖功永對宗祏臣沒而不朽尚依日月之末光死者有知雖為泉壤而受賜臣無任瞻天戀聖激切屏營之至上太皇太后表臣聞學不羡生古皆有死惟歸全而知免乃得正以告終敢忘垂絶之言上冒蓋髙之聽伏念臣夙聞前訓早服近僚席纍世之弓箕備六朝之鼎鉉升降相與休戚是同伏遇陛下思齊任姒之功誕保成康之聖延登衆正共濟多難而臣入侍經帷進陪冡席獨膺一相之任愧乏三年之成屢陳請老之言歷罄避賢之懇重辱改容之禮特躋論道之司同軍國之謀謨參師保之輔導尚貪天寵往踐世官唯髙位之疾顛矧羸軀之多病僅存殘喘猶抱孤忠雖深軫於慈宸訖無瘳於眩藥伏望太皇太后陛下儲神蠖濩澄慮穆清疇咨哲乂之良顧諟祖宗之憲納民仁夀躋俗雍熙則臣雖委骨於重泉猶銜恩於永世臣無任瞻天戀聖激切屏營之至范太史集卷八

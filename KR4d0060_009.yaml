body:
  text: 范太史集卷九宋范祖禹撰表賀升許州為潁昌府并德音表以下代王樂道侍讀伏覩某月日敕命升許州為潁昌府今月某日德音赦潁昌府管內徒罪以下并蠲放秋稅進士免解賜耆老粟帛祭山川祠廟者太嶽舊封伊昔建旄之地黃圗近輔惟時啓聖之基爰錫嘉名特開新府上奉祖宗之慶俯慰臣民之心當扆顧懷寰區抃蹈臣竊以帝堯光宅肇發於唐邦孝文纂承越從於代邸然未有邇王畿而夾輔固宗子之維城遂升明兩之輝以久太平之運珍圗大定景命有融考濬哲之勃興在册書而絶擬恭惟皇帝陛下大明出震盛德統天丕承五聖之休髙視百王之表惟英考御圗之始席仁皇纍洽之期陛下天授至神地居上嗣溫文夙茂淵懿日躋於時特隆主器之儀初被撫軍之寄疏封東土仗鉞南邦允當四海之宅心奉答皇天之眷命旋膺帝典登踐儲闈歷數在躬謳歌歸啓運屬離明之盛嵗踰星紀之周命式九圍光被四表乃眷興王之舊聿懷追孝之誠冠潁府之大名即許昌之故號合為美稱用協休祥明命惟新鴻恩下霈宥罪寬賦招亡禮神甄録賢能優恤耆老神祗共喜動植交歡況臣被遇青宫觀光朱邸潛躍之始攀附最先仰麗澤之洊加與羣黎而同慶阻預稱觴之列徒傾就日之誠榮幸之私倍萬倫等謝傳宣撫問表今月日入內內侍省內東頭供奉官某乙至西京伏蒙聖慈以大行太皇太后山陵并祔葬事臣幹治悉已辦集傳宣撫問并賜臣茶一銀合者先后在天方飭尊崇之禮尸臣謹職特加撫諭之恩拜以受言感如挾纊恭惟皇帝陛下德齊天地孝格神明銜罔極之深哀嚴送終之大事瞻原陵而感慕知臣子之勤勞臨遣使軺俯傳天問念違離之嵗久憐衰朽之力殫載聽絲言如親咫尺乃頒茗飲俾滌冥煩况臣早翊儲闈今司宫鑰夙夜匪懈惟知勉效於公忠日月有明敢謂特回於私照益當盡瘁仰答見知謝山陵禮畢表今月十日慈聖光獻太皇太后山陵禮畢者雲收仙馭從列祖之威神天作崇丘與厚坤而長久克終襄事幸免瘝官伏以先后扶持保佑之功邦家永賴陛下報復尊崇之志典禮極隆申詔有司恪共大事嗟上賔之遽逺迫同軌之屆期臣夙夜在公寢食俱廢猶懼不及豈敢遑寧資羣吏之鳩功致多儀之肅給此蓋伏遇皇帝陛下大孝格於天地至行感於神明遐邇一心中外畢力靈祗幽贊先寢永寧曲全守土之臣俾逃曠職之咎臣荷恩實厚居守方遙無任瞻天望聖激切屏營之至祔葬禮畢謝表今月十日濮安懿王二夫人祔葬禮畢者寢園祔卜真宅言歸克成三板之封永閟六珈之服訖無曠失苟逭譴訶臣竊以濮王二夫人福慶所基音容久翳未備葬禮實軫聖情因展事於橋山俾制儀於藩國二役並作庶功實繁迫先逺之屆期幸蒸徒之克集此蓋伏遇皇帝陛下孝嚴宗廟敦睦懿親追逺以厚生民送終以當大事禮儀悉備兆宅以安上承英考之聖靈永慰濮園之泉壤惟庀司之官守免獲戾於簡書臣分職留都阻覲宸闕無任瞻天望聖激切屏營之至謝宣賜銀絹表伏準宣命以臣修奉慈聖光獻太皇太后山陵了畢賜臣銀一百五十兩絹一百五十匹者橋山展事曽無述職之能宸扆頒恩猥被賞勞之典載自惟省深積靦慚臣聞以庸制祿則下不覬覦先事後得則人無僥幸故功大者其禮厚力勤者其報優授受靡虛勸沮斯在伏自軒宫掩耀宸極纒哀四海遏音共奉宅憂之政萬邦同軌恪承送往之儀而臣居守都畿典司陵寢固當上體聖孝祗率官常竭臣子之至情奉邦國之大事庀徒僅集卜兆克成皆上稟於睿謨實俯資於衆力凡居執事敢憚服勤至於道路所經次舍之設唯懼不供之獲罪豈謂有勞而可書錫外府之貢金加丘園之賁帛顧兹忝冒深切兢惶此蓋伏遇皇帝陛下大孝格天至仁育物使人不求其備序情而閔其勞上嚴聖后之喪內盡神孫之志務從優厚以稱尊崇顧無補於涓埃亦預霑於寵賚雖賞之寧僭曲存勸善之方而受以無功豈逭伐檀之刺誓殫忠力仰答恩私皇后賜絹謝皇帝表雲軿逺降方展禮於因山星使俯臨遽頒恩於守土宫庭之積私室是充祗受以還兢惶無措伏念臣典司管籥營奉陵園駿奔逺郊迎扈仙蹕屬母儀之屆路修官守以在公曽無供億之勞僅免曠瘝之責已荷內朝之大庀復叨實篚之殊恩仰戴便蕃實為僥冒此蓋伏遇皇帝陛下教先宫壼德御家邦禮尊奉於宗祧惠曲加於臣子體乾坤之覆載品物不遺並日月以照臨光明下濟推恩有自論報何階冀竭愚衷少酬鴻造謝德音表陵寢即安甫終於大事宗祧升祔肅奉於明禋孝惻宸衷恩覃甸服詔音所被蠢類相歡恭惟皇帝陛下祗遹詒謀布昭明德極奉終之盛禮廣立愛之慈仁眷言二宅之郊爰及三城之壤陵土既復役車告休謂真馭之所遊意聖靈之降格哀矜庶獄悉緩於眚災甄序百工特疇其勤績賜田租於農畝蠲屋粟於經塗開釋逋逃之辜申嚴樵採之禁恩被動植德歆神人臣等分職留都叨司陵邑恭陪營奉幸免曠瘝已蒙寬宥於簡書更獲究宣於睿澤感抃踊躍倍百常情慰蜀國長公主薨表臣某言得進奏院狀報今月十七日蜀國長公主薨謝輟朝五日者主第纒哀天支掩秀訃傳中夏慘結輿情伏以故蜀國長公主柔靜宜家肅雍成德鍾先朝之至愛有賢女之令聞姆教弗煩化風自逺早築王姫之館大開蜀土之封宜茂享於修齡永增徽於寶萼而穠華蚤落眩藥無瘳倐為降渚之遊遽終歸妹之祉恭惟皇帝陛下念深同氣愛本篤親趣駕臨喪驚復衣之不返廢朝出令極恤典以追榮况宗祧之升祔猶新昭寢之哀思未逺重此悲惻撓夫睿神伏願推理於難諶割情於無益上釋慈闈之悼念俯安羣下之憂惶臣掌鑰留都違顔法坐莫由慰覲徒切悃誠賀明堂禮畢表饗帝報功極聖人之能事配天嚴考舉有國之盛容熙典備成鴻恩誕布聲名所暨抃蹈攸同恭惟皇帝陛下神智在躬至仁守位法陶唐之稽古専講於舊章放帝嚳之執中丕冒於羣品荷三靈之眷命因四表之歡心練日季秋戒期百執齋宫蠖濩儲精意以致虔清廟顯嚴展孝思而入祼然後御六龍而旋軫躋五室以交神黍稷馨香式昭於明德金石擊拊備薦於和聲辟公顯相以在庭侯衛駿奔而率職靈心昭格景貺洊臻發大號於中天均洪休於率土巽風鼓舞兊澤豐融凡在萌生率同茂遂臣幸班持槖阻預侍祠守籥留都病嘆周南之滯受釐宣室何階前席之榮謝傳宣撫問賜藥差醫官表今月一日某官某乙至西京伏蒙聖慈特賜傳宣撫問并賜臣湯藥一銀合仍差醫官某乙看醫臣所患者王人俯降天語遙臨頒藥品之良俾蠲除於積疢詔醫師之屬就診療於微軀九死之餘再生可望祗荷憫恤伏切兢惶伏念臣自領留都實殫拙力顧久尸於爵祿冀少效於涓埃唯成周分正之郊素稱多事屬先后因山之禮仰迫嚴期夙夜在公寢食俱廢唯知竭節且昧養生甫及暮春已動纍年之病苦載離炎暑復加百體之尫羸寒熱交爭於肺腸瘡痏外毒於肌革精魄飛越蓋積勞而損神視息眇綿嗟鮮食而伏枕藥餌苦口極眩瞑而弗瘳疾痛呼天迫困窮而反本輒傾血懇仰籲宸閽豈謂皇帝陛下曲記舊臣特回睿眷恩深覆育軫父母唯疾之憂德過生成念犬馬至微之命逺馳星使傳諭堯言仍分御劑之珍更委國醫之妙慈仁俯被沈瘵復蘇顧兹望外之所加豈盡生涯之可報臣謹當専精飲藥委命就醫儻肉骨以生存誓沒身而酬補辭觀文殿學士正議大夫表恩惟求舊賞乃及私聞命若驚撫躬無措伏念臣本由孤進仰會先朝遍躋臺閣之榮詎有謀猷之補徒以朴忠少與狷直自將當陛下潛躍之初首東朝翊護之選回淵講學最承訪逮之私內寢問安日奉溫恭之德寖叨誤寵進履亨衢掌右掖之贊書奉西清之密議旋升內閣之直出領全秦之師屬景命之有開方儲闈之肇建亟膺嚴召俾預下僚遽承英馭之賓天幸會飛龍之撫運擢居憲府曽無報稱之能斥守輔藩曲荷保全之力越從舊許入領大農復違去於邇顔尚保釐於西洛守符屢易報政蔑聞俄得請於別臺幸即安於私館衰遲晚節蹭蹬十年已絶望於榮塗唯繫心於魏闕間自淮陽之卧再司鼎邑之繁疲力已殫頺齡浸逼養生素拙多病日侵既歷三時僅存餘喘曠瘝斯久隕越是虞方哀籲於宸閽丐生還於里舍忽奉自天之命特加躐等之恩載自揣循實為僥冒伏望皇帝陛下至明日照洪造天垂延登俊髦慎假名器聽輟出綸之命俾安據蒺之憂况當陛下旰食九重勵精百度憲章前古董正治官曷可無功而進階豈容越次而受職輿情共駭自訟何安重念臣疾疢未瘳醫療方切實懼滿盈之咎敢叨寵數之榮髙位疾顛昔賢明戒由衷之請報可是期謝觀文殿學士正議大夫表渙汗難收絲言俯諭末容懇避徒積兢惶恭惟先朝經始內殿聚典學之古訓延備問之宗儒擇人甚囏其職多闕必踐二府乃居此官未有敻越等夷輒假名器上聖有作百度惟新稽古建官任人立政始定大夫之位以易二卿之聨諒惟考績之明乃預升階之典如臣者識非慮逺學不知方歷事三朝叨塵二禁震闈調護慚無羽翼之能甸服蕃宣屢被股肱之寄素甘多疾久去近班荷大德之包容嗟微生之屯厄自膺睿旨再領留都甫及周星半居病告危衷備列委照曲臨蒙降侍醫俯救殘喘荐被出綸之命併加躐等之恩內揆無功敢當誤賞雖露章之甚苦終賜禮之靡俞祗服寵榮實踰涯分此蓋伏遇皇帝陛下布昭明德保宥羣生承英考之烈光御寰區之泰定謂啓封之地已優復於黔黎賜履之邦亦惠霑於動植追惟潛躍之始猶録攀附之勤因宗祀之休成霈鴻禧而普被方敘勞於庶尹亟興念於遺簮推潁邸之餘恩記儲宫之舊物力排羣議深簡聖衷將特示於寵私故靡循於功次臣敢不益親醫藥強整筋骸冀畢桑榆少酬塵霧謝加開府判大名表以下代韓康公進階極品易鎮别都懇避莫遑冒榮有靦伏念臣才非經濟識昧幾深兩塵鼎鉉之司纍玷節旄之寵頃從詞館起涖洛師迫神考之遺弓奉裕園之復土遽被中天之命再叨朔部之行肆覲闕庭仰祈旒扆冀遂乞身之請靡收渙汗之恩顧殘稿以何堪豈勤勞之敢憚勉祗成命深積愧懷矧乃相印聨華天倫並列逢辰之幸曠古莫儔此蓋伏遇皇帝陛下濬哲統天至仁浹物責成羣后分治九圍圗任舊人特舉懋官之典奄受北國俾修述職之勤誓竭疲駑仰酬覆育謝太皇太后表禮均三事寵冠文階節制諸軍任隆藩閫伏念臣早緣末學進齒近班被遇纍朝歷年四紀雖朴忠之自竭無嘉績之可書夙聞知止之風屢有告歸之請邇者對揚宸陛親奉德音疊貢需章特紆使節懼頻煩於睿旨敢確守於私誠終叨將相之榮尚被腹心之寄顧循朽質深切汗顔此蓋伏遇太皇太后陛下保宥羣生照臨萬國眷求舊物宣布上仁錫以龍光兹及臣工之品倚之屏翰特嚴宫鑰之司唯誓麋捐以圗報稱辭免恩命表恩唯厚下曷可誤加賞異及勞豈容虛受伏念臣早塵上宰出守别都愴神馭之賔天屬橋山之卜壤八荒同軌極喪考之深哀七月戒期嚴送終之大事而臣典司陵邑申畫畿封暨復土之克成乃居官之所職惟虞獲戾敢謂書勞上簡聖衷誕宣庭告進陪多賦衍食真封凛如蹈涉於氷淵敢避瀆煩於旒扆伏望皇帝陛下特回宸聽深亮愚誠亟收出綍之恩俾逭伐檀之刺恭祈報可詎敢飾詞上太皇太后表明綸薦降寵數併加義所當辭情難冒處臣向以典司宫鑰修奉寢園竭臣子之至情嚴邦國之大恤實惟官守非曰事功而况萬國會同百執奔走共奉因山之禮豈繄守土之勤麗澤天垂明庭辰告益疏井賦增食爰田夫何送往之微勞乃預報功之懋典伏望太皇太后陛下曲回睿聽深軫淵衷輟成命於已行慎褒章之或過俾安愚分庶協公言再免恩命表記功惟厚祗寵靡遑恭布危誠未奉俞旨臣竊以慎終追逺以敦教義之風送往事居當竭公忠之力臣備位藩鎮服勞國家何足言功乃蒙推賞伏望皇帝陛下慎司名器深察肺肝特寢過恩免貽公議上太皇太后表宸暉下濟睿澤曲加敢避瀆煩必期俞允臣竊以命書之寵井賦之封表疏爵之隆恩繫馭臣之大柄非其分義雖一介以難加苟有勳勞則萬鍾而可受臣職當居守禮在奉終乃事國之所宜顧何顔而冒處伏望太皇太后陛下俾人浮食慎賞罔功深矜悃愊之誠特輟褒優之命謝表因山制禮奉神考之真遊復土書勞錫尸臣之壤賦弗容懇避唯切兢榮伏念臣席寵纍朝受恩奕世義均休戚任處蕃宣方聖寧之宅憂當臣工之走職共襄大事咸底庶功惟殫夙夜之勤敢期日月之照此蓋伏遇皇帝陛下奉先思孝守位以仁眷惟西屏之臣實司同軌之會爰加懋賞特越常倫益圗報國之忠仰答念功之賜謝太皇太后表命出告庭恩加守土懇辭弗獲祗受尤慚伏念臣傾蒞别都奄承遺訓方切上賔之痛已驚先逺之臨祗率羣司克集大事而况中外咸獻其力遐邇各致其誠豈臣獨勞膺此異數此蓋伏遇太皇太后陛下穆清垂照睿哲宣慈知臣子之服勤重原陵之送往贊書示寵率土知仁誓竭精忠仰酬鴻施北京謝上表分正成周獲辭宫鑰偃藩全魏復總兵符祗荷寵光伏增震悸伏念臣久塵近列仰際先朝委秉洪鈞再司上宰一違鼎鉉纍建節旄引年則過於從心報國唯知於盡力頃從西洛入覲邇顔歷陳匪石之誠願遂歸田之請疊膺睿旨莫奉俞音終叨衮鉞之榮重被翰垣之寄此蓋伏遇皇帝陛下仁如天覆明與日升方庶政之始初飭羣工而勵翼深簡股肱之舊曲加體貌之隆乃登進於文階俾殿臨於巨屏臣敢不上體至眷乃心本朝虔修述職之勤勉企壯猷之效誓堅晚節仰答鴻私謝太皇太后表保釐洛宅曾無分正之勤偃息魏藩更委居留之重方臨舊部祗荷渥恩伏念臣被遇纍朝歷年四紀秉鈞宰席再塵上衮之司授鉞齋壇荐忝元戎之寄唯朴忠而許國無敏智以過人顧迫殘年久司厚祿未遂乞身之請復膺渙汗之恩此蓋伏遇太皇太后陛下懋建大功敷求至治仁惟圗舊道在宣慈眷朔野之奧區為浚都之巨屏洪流蕩析生齒墊昏郛郭阽危耕桑失𨽻責老臣之綏輯分聖寧之憂勤特加三事之宜俾修連帥之職臣敢不恪恭夙夜強勉事為庶圗毫髮之功上答乾坤之施范太史集卷九

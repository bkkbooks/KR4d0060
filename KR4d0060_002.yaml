body:
  text: 范太史集卷二宋范祖禹撰詩和蜀公紫薇花再發寄中書舍人幾年幽獨飽風霜一日榮觀似堵牆地養深根成異産天回淑氣發新陽賔朋須醉千鍾酒蜂蝶爭偷百和香留得青氊真舊物于今鳯閣有名郎和五十四翁登恩第後贈楊君章力穡良農晚嵗收英名初喜動凝旒光如劒氣斗間沒文似河源天上流莫嘆黃金才易帚安知布被不封侯平津侯年六十方對䇿擢第暮年烈士心方壯雙鶻摶風向九秋孫秀才下第暫還京口留别起居邀余和以贈行翔鸞戢翼下層空南浦歸帆逐曉風夢寐蘭陔清露白嘯歌江國火雲紅王畿結綬來無久天漢乘槎去可通莫為淹回銷壯節力行須與古人同和蜀公八十嵗自咏衛武年將百僖公夀有千形方通帝夢兆始見王田白髮髙山雪新詩清水蓮福綏真樂只燕處自超然濁酒中徐聖泠風御列仙徑松臨絶壁獨鶴在青天出處邦之望清虛性所便老謀方眷用微物正思憐漢室求園綺周家重夭顛雖懷箕潁志應未許終焉答孫莘老病中寄謝諸同舍言有逆耳忠藥有苦口利康强本危慮憂患生逸意先生蹈周孔陋巷樂仁義新命登諫垣四方想平治舞雩逐清爽伏枕送炎熾作詩存警戒教告在同志蒼生繫正人丹扆渴髙議矧當敷經訓勸講日嚴侍桓榮大師尊鄭公三鑑備天衢進方亨王路坦無陂告猷補衮職正色伏蒲地陽城可以起醇酒毋數醉春日有懷僕射相公洛陽園闕塞當門外伊流繞舍西松筠不改色桃李自成蹊稚筍穿階迸珍禽拂面棲公歸卧林壑好作釣璜溪和吕龍圗賀僕射相公鼎鉉承家有慶基蒼生翹首聖神知韋賢世德傳經逺衛武年華入相遲霖雨八方隨說命帶河千古誓蕭規行看鳳沼原鴒集莫為旌麾滯朔陲蜀公懇辭經席改領嵩宫賦詩以代獻夀纍詔褒優免造庭兩宫虛竚想儀形千年遼鶴髙華表萬里雲鴻獨杳冥綺皓採芝終佐漢桓榮稽古舊傳經真宫岑寂煙霞外南極光中作夀星和門下侍郎東省夜直寄左丞光祿黃閣訏謨作帝龍門下之職蓋古納言文昌綱轄振邦風羣才藻鑒歸能哲萬事鈞衡仰至公連璧輝光時共美斷金情契昔相同折衝千里精神壯正似山河繞漢宫和子開從駕朝謁景靈宫雨師泛灑霽光勻華蓋香風不起塵億兆歡呼真帝啓謀猷左右盡君陳雲隨仙馭三山逺日出咸池六合新一别都門變桑海來瞻原廟祗悲辛瑶池真氣降東萊營室新臨渭北開載見辟王遐邇至思齊任姒肅雍來龍胡尚泣遺弓劒燧火俄驚變栁槐誰識九重宵旰意中天雲漢望昭回四月三十日慈孝寺山亭席上次韻經父舍人送子敦都運待制赴河北去年使河東飲餞天始秋今年使河北復作蕭寺逰愧我燕居息送公頻按州雍容鵷鷺列環珮鳴琅球豈知勤徒御與國揚王休譬如果適口安問梨與榴此行功名㑹肯使嵗月流載酒都門餞行當迓歸輈同子瞻送子敦赴河北都運次韻顧公涉滄海宇宙觀竒偉十年守沈冥應笑柱下史動靜雖有殊要之蓋棺已邇來拜東臺巖穴彈冠喜昂藏出風塵壯志在千里忽持膚使節急病仁為美翰林出新詩風霆奔落紙朝廷日清明君子慎所履行當繼禹功灑災淡洪水過我伊洛間松風醒俗耳和張給事喜雨玊座焦勞側席居侍臣憂國盡應徐宸心有感先離畢星使分祈未下輿觸石寸雲寰㝢遍稽天巨浸百川趨不才太史那能頌唯待豐年以喜書又和張給事喜雨瞻望昭回每夜分崇朝忽起泰山雲乾坤蕩暑如醒醉江海生波想織紋禁漏深迷天闕曉朝衣凉帶御爐熏時清封奏何妨簡獻納賡歌見愛君席上分韻送天覺使河東以登山臨水送將歸為韻分得臨字唐堯茹藜藿民俗猶憂深晉國壯山川羌虜皆外禽宸心敬折獄使節慎所臨夫君臺閣舊空老翰墨林松柏飽嵗寒鵰鶚候秋隂攬轡上太行北風爽煩襟當令桑棗地愁嘆為謳吟二江帶雙流三峨聳危岑何時早歸耕杖屨日相尋謝賜御書詩五言十韻并序臣今月十五日賜燕東宫伏䝉聖恩就賜御書詩一首臣不揆荒淺謹賦五言詩十韻少謝榮遇之萬一謹隨表上進聖志探淵學皇慈示至仁論經窮古訓錫燕比嘉賓天醴堯觴舉簫韶舜樂陳隆恩均近輔賜札下嚴宸灑墨星辰爛飛毫日月新聰明欽作后氣志儼如神龍馬觀犧迹伏犧氏畫八卦始作書契延陵識聖真孔子親書有吳延陵季子字受藏輝蔀屋榮遇極儒紳方講三王治思還四海淳顧慙愚陋識何所補涓塵殿試覆考和子由侍郎十五年前宿殿廬伊川一紀卧巖居雕蟲尚憶長楊賦汗簡猶殘太史書日月當天瞻法座煙霞落紙看華裾品題幸預諸公末更許追隨侍玊除和子瞻禁林鎖院詔賜燭酒晨入金華暮浴堂聲容不動筆奔忙星間忽降龍銜耀天上重分玉醴香是日早邇英講讀退以風寒賜執政講筵官御酒是夜翰林又被燭酒之賜欲炧寒宵宫漏永半酣歸夢蜀山長起看絳闕銀河曉山立千官拱未央送周思道再知漢州三首千山行盡見平川雞犬相聞俗晏然父老共知仁聖意十年重借使君賢使君昔日撫疲羸曽奏囊封有直詞一卧家山今白首重來猶擁舊旌旗兩川相望各繁華二牧蕃宣出一家衣繡聊為鄉社寵行看召節向天涯送周正孺知梓州先朝直節貫秋霜殿壁於今有諫囊汲黯猶煩卧居郡馮唐何事老為郎山川壯麗開戎幕草木榮華過故鄉青蓋從來宜白髮行看髙步入明光寄題蒲氏清風閣閬山錦屏秀閬水碧玉寒髙閣俯城邑飛甍出雲端惟昔隱君子卜築兹考槃圗書侔藏室一一手自刋山園養松桂庭砌被芝蘭霧深豹文蔚風壯鵬翼摶來為廊廟重歸為里閭歡乃知哲人訓基構自艱難我昔侍先君借書嘗縱觀題詩尚可記手澤想未乾爾來三十載感事一汍瀾側身西南望安得陵風翰久雨中廚屋壞我從山中來安宅豈敢卜窮秋積霖潦陋巷沒車轂環堵不蔽風下牀每塗足竈蛙日已長釡魚時可漉瓦解豈一朝糞土扶朽木中夜若崩山微軀憂壓覆晨炊無尺椽慨嘆食重肉益思反蓬茅終老依松竹雲居䕃薜蘿野性狎麋鹿澗溪可濯飲薇蕨餘肴蔌寧惟此寓館薄宦同旅宿吾食敢求飽民生猶歉腹囊空庶無寇囷竭尚有粟墨突不暇黔誰能憂破屋寄題潁昌王氏巽亭二首危檻跨層城憑髙俗慮醒鵬飛適莽蒼鴻去上青冥隱地臨箕嶺賢逰㑹德星躋攀何日共逺目寄郊坰舊館懷賢躅先朝翊帝圗虹梁引層構血汗出竒駒几杖延鄉老詩書問魯儒南天望雲氣應泣舜蒼梧送道純歸南康平生聞廬嶽夢想入松門京華走塵土嵗月空崩奔眇思放巖壑枕石清心魂羡君歸舊隱山水當髙軒雲林對寢食煙靄變朝昏晴空天池溢瀑布銀河翻竒觀窮宇宙夢澤可以吞少年負志氣海運期鵬鯤晚登桂堂籍燕石笑璵璠飄飄考城吏放浪彭澤園回首出都邑仙禽謝籠樊顧我老文史望天方戴盆俯仰半世間同僚念金昆存亡已永隔風義古所敦寄語謝嵇紹終慚山巨源珍臺閒館切昭回笙鶴應無俗駕陪天浸祥池三島向春迷神囿百花開沙鷗泛泛人相近風燕飛飛隼莫猜清洛故園荒徑在與君何日賦歸來同安誕日賦小詩祝延海上蟠桃方結子月中仙桂欲生枝須知隂德多餘慶仁者從來與夀宜闕又奕世登公衮羣生入化鈞須知盛德後宜有正家人令日垂門帨清風采澗蘋兒孫環坐側嵗嵗祝千春送吕通直致仕南遊歸夀州掞天疇昔阻雄飛未及耆年早拂衣白日浮丘仙袂逺清秋范蠡片帆歸京華嵗月雙奔轂淝上滄浪一釣磯况有孟光為道侣散花諸國叩巖扉答劉中叟十年卧伊洛半世老鉛槧君恩還故棲蠧簡幸窺覘濫陪英雄遊自覺山野僭有美劉夫子相逢樂無厭騰騫入霜臺便若阻城塹朝言渴蹇諤民瘼待針砭清詩叩哀玉孤秀出羣艷伐木激頺風佩蘭起幽念顧我久羈寓來如水鳬泛晨興想三川夕夢越雙劒終當出都門瘦馬搖破韂事業付公等斯言免為玷和劉莘老贈王聖美三子姪補試太學聨中髙等風流江左並淮原王氏衣冠不乏賢文似三珠才競爽名如羣玉氣相連九秋鴻雁方遵陸萬里驊騮始下鞭白髮星郎推雅量似聞折屐喜成顛黃魯直示千葉黃梅余因憶蜀中冬月山行江上聞香而不見花此真梅也魯直然余言曰不得此樂久矣感而賦小詩江上清香隔水聞林間不見雪紛紛春寒忽憶登山屐歸夢猶尋谷口雲水紋扇翦出瀟湘一片秋動搖君手向空流微風自有雲濤氣夢入江天一釣舟寄蜀州吳廷珍太守紅斾前驅一舍間里閭相望俗安閒春風城郭千家栁落日樓臺四面山南畝勸耕丹詔逺北堂侍膳綵衣斑梁園倦客思歸久五馬何時命駕還臘後一日雪晴西郊臘後寒威壯春回嵗律窮薄雲霏小雪愛日解嚴風銀闕千門逈瑶林萬里同誰能拂毫素移入畫屏中寄華州提舉崇福李侍郎洛社曽陪祭酒閒承明復接侍臣班論交晚見松筠操駐景長思氷雪顔純之服兔絲老而有少容華嶽閉門窮簡冊來書云閉門讀書所樂甚多邵堂隱几看河山相逢一笑知何日心逐飛雲出故關李方叔饋潭筍穿雲劚石逺林空來涉烟波幾萬重實比梧桐堪食鳳籜翻風雨便成龍一枝未許塵鞍掛千畝終留渭水封陋巷菜羮知不稱君王玉食願時供和李方叔惠嵩山术煎松黃八公淮水留丹竈四皓商山餘紫芝嵩嶺今成花鍊术周原空詠堇如飴容顔氷雪端能變心肺塵埃信可治多病直疑生羽翼更䊸仙客上清詞右术煎直幹千年老雪霜不隨羣木四時芳冥冥黛色凝寒碧冉冉雲英末嫩黃仙桂一枝聊比德幽蘭九畹幸同香移文應怪歸來晚安石東山興未忘右松黃石耳廬山五老峯下臨大江水絶壁千餘仞青冥洞無底蒸雲自太古流雨灑千里白日照層巔陽崖生石耳採之懸繩梯磴蘚滑屐齒朱門登華筵味敵蓴絲美小人勇趨利所得僅刀匕鴻毛輕軀命一墜即已矣吾思窒羣欲豈獨艮其趾髙深有前戒來者慎所履范太史集卷二

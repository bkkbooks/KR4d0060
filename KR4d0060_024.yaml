body:
  text: 范太史集卷二十四宋范祖禹撰奏議乞節講禮記劄子元祐七年九月十二日講官同入臣等奉聖㫖講禮記伏緣禮記漢儒所集非聖人全經當有去取欲乞除喪禮十三篇不講外如篇中有不須講者亦節講取進止聖㫖依奏再薦章元弼劄子十月十六日臣于去年十月具劄子奏舉新授知潤州録事參軍章元弼乞除太學正録或諸州教授未䝉施行臣伏見元弼履行清修文章華贍可充館閣之選自元豐五年銓試第一得循一資初任未赴以母病乞侍養歲滿調官未赴又丁母憂兩舉賢良方正以丁憂疾病不克赴試實緣留滯未有考第即與初及第未出官人不同臣竊聞林自除太學録田述古鄭州教授皆無歷任伏望聖慈特賜比附林自等例除元弼太學正録一官長育其才勸率學者以增王國多士之美取進止乞除賊盜重法狀二十七日右臣于去年十二月轉對奏事乞除賊盜重法未䝉施行臣聞王者之德如天無不覆地無不載四海之內皆赤子也無有逺邇當視之如一今重法之地獨為匪民一人犯罪連及妻孥沒其家産便同反逆先王制刑必使民得以自新不聞别異州域偏行峻令恐非聖世所宜為也陛下將郊見天地御樓肆赦若于赦文悉除此法一切蕩滌與之更始足以感格人心召致和氣則帝舜好生之德大禹泣辜之仁成湯解網之恩復見于今矣恭惟祖宗無不哀矜庶獄刑罰從寬逺過前代實有隂德上當天心是以承平百年福祚無窮唯自嘉祐七年初立窩藏重法至熙寧中中書檢正官奏請遂為著令皆因有司建議非仁宗神宗本意此乃權時之制不可久行臣前奏論之已詳今因初郊宜以為仁政之始聖人順動雲行雨施刑清民服此其時也伏望聖慈斷而不疑特降睿㫖于將來赦書行下使百姓曉然知二聖天地涵養無私之德不獨視此諸郡如夷貊之人臣將見民之戴恩淪于骨髓則勝殘去殺庶可望矣謹録奏聞貼黃議者必謂一除此法賊盜必熾臣竊以為不然自嘉祐以來行重法至今不聞地分賊盜衰少近元祐編敕比舊法稍輕亦不聞賊盜滋多以此知賊盜多少不繫重法決可除去無疑并乞檢㑹臣前奏施行薦鮮于之武劄子二十八日臣伏見左朝請郎前監東作坊鮮于之武博學能文慎靜有守可備臺閣任使滯于管庫衆論惜之其人年四十以上伏望聖慈特賜差充諸宫教授或內外學官一次漸加試用必有可觀取進止薦張康國劄子臣伏見左宣德郎張康國敏而好學文雅有餘自登科第兩䝉堂除學職今授知鄭州新鄭縣事以父守官東南别無兼侍雖得近邑又已見闕而于私不便恐不能赴官臣竊惟朝廷方長育人才如康國者所宜收采伏望聖慈特賜差充內外學官一任取進止薦王周道劄子二十九日臣伏見翰林醫學王周道博通方術用藥精審伏望朝廷特賜差充太醫局丞一次俾領教導必有補于醫事取進止進郊祀慶成詩狀詩附右臣伏覩今月十四日南郊大禮慶成文學之臣歌頌盛德臣不揆荒斐輒作古詩一章并序謹繕寫隨狀上進雖不足以形容天地之美亦臣子各言爾志之義也干冒宸嚴臣無任惶懼激切屛營之至郊祀慶成詩并序臣伏覩皇帝陛下以冬日至郊見天地臣幸得待罪從官在侍祠之列進俎授嘏攝官承事恭陪大禮迄于慶成目覩嘉應昔所未有歡忭踴躍倍萬于常今兹羣公卿士皆作詩頌鼓舞盛德而臣執經帷幄其職在以先王訓典敷陳勸戒以補萬一其敢無辭昔周之成王郊祀天地其詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之此告神之詩不敢忘戒也羣臣進戒成王其詩曰敬之敬之天惟顯思命不易哉毋曰髙髙在上陟降厥士日監在兹此頌君之詩亦不敢忘戒也君不忘戒以告于神臣不忘戒以告于君此所以能永保天命也恭惟祖宗光有天下百三十餘年陛下纂承聖統恭勤典學實賴文母保佑扶持于今八年海內晏寧再祀明堂肇禋南郊神祇顧饗受祉萬億此乃持盈守成之初居安慮危之際也臣是以敢緣周頌之義作為四言詩一章凡百四十句直叙事實不為侈詞具述陛下祇事天地嚴奉宗廟精一之意傳示中外顯揚盛美因以勸戒其詩曰皇帝嗣位照臨四極恭已八年日慎一日惟我文母振古光越登兹太平誕保元辟再饗合宫無文咸秩未見于郊帝心若愓詢謀卿士作龜告吉祇率舊章無敢有易乃動大輅龍旗黻㦸國容煌煌軍容赫赫謁欵真宫明薦蠲潔乃入太廟用事八室神門降乘齊殿祇栗曽孫孝思風雲慘戚省牲之夕隂翳霏雪日入而霽乾坤開闢列聖在天精誠合莫升自阼階如見容色樂作九變祖考咸格厥明禮成復步而出齊于帷宫百禮既飭輦及內壝卻蓋而入乃命百官勿回班列一意尊神庶幾有懌圓壇中天徹茵登級二儀並位太祖東席蒼璧黃琮陶匏稿秸升煙揚空休氣四塞六合清晏冬回溫律上神來下飈駕欻忽柔只顧饗萬靈咸集登歌再成太史祝册凡此犧牲天民之力凡此粢盛天民之穡天實子民來歆子食帝厚其子其有弗答福祿穰穰既委既積乃整法駕回御丹闕大賚萬方恩施草木釋除逋負瑕垢蕩滌日月所照莫不被澤東夷南蠻西戎北貊服我聲教來覲來覿皇帝至仁惟天是則昆蟲不傷況乃含識黃髮之叟歡呼阡陌曰似仁祖堯舜之質皇帝大孝溫恭朝夕師法文母至公惟一子子孫孫永奉成式天錫皇帝夀考萬億皇帝體道垂拱淵默不言而化萬物自得皇帝秉心清明正直訓于有位無敢頗僻天鍚皇帝多士孔碩皇帝聖學若稽古昔商宗寅畏周文翼翼曰豫一人實懼弗克天人之際不違咫尺毋曰在上視豫動息毋曰蓋髙聽豫于側天命不常惟敬勿失祖宗囏難惟慎毋忽危生于安禍兆于福如執大器傾于滿溢兢兢惟畏涉冰將釋天錫皇帝一謙四益髙明博厚日新其德從臣祖禹古訓是職稽首陳戒惟監無逸邇英留對劄子十二月三日臣伏覩陛下近者郊見天地雪止風和景氣清霽神祇饗答福應尤盛侍祠之臣以為前後未有都城之人瞻望玉色歡呼洋溢皆云陛下克類仁宗臣觀天意人心如此實宗社無疆之福也然臣愚竊以聖人福至而益戒則能長享其福譽美而副之以實則能永保其譽唯兢兢業業不自暇逸乃可以答天休衆之所欲因而從之乃可以副民望若一有滿假之意則今日之福乃他日危亂之基也不能副之以實則今日之譽乃他日怨誹之端也故臣願陛下既受大福又獲民譽益思戒慎惟勤修德修德之實惟法祖宗恭惟一祖五宗畏天愛民後嗣子孫皆當取法惟是仁宗在位最久德澤深厚結于天下是以百姓思慕終古不忘陛下誠能上順天意下順民心専法仁宗則垂拱無為海內晏安成康之隆不難致也臣承乏史官嘗采集仁宗聖政得數百事欲乞撰録成書上進少資睿覽監觀成憲皆舉而行以副羣生之所願則天下幸甚取進止薦陳祥道儀禮解劄子九日臣伏見館閣校勘太常博士陳祥道注解儀禮為三十二卷精詳博洽非諸儒所及臣竊以儀禮為書其文難讀其義難知自古以來學者罕能潛心故為之傳注者至少祥道深于禮學凡二十年乃成此書先王法度如指諸掌昨進禮圗一百五十卷已䝉朝廷藏之祕閣伏望聖慈特降指揮取祥道所注儀禮奏御下兩制看詳并前所進禮圗並付太常以備禮官討論必有補于制作取進止進仁皇訓典劄子八年正月十九日臣昨具劄子乞撰集仁宗聖政靣奉聖㫖令進入臣已編録成書名曰仁皇訓典凡六卷并目録一卷繕寫為七册謹具進呈伏惟清閒之燕特賜省覽干冒宸嚴臣無任惶懼激切屏營之至乞賜故修書官資治通鑑劄子二十一日臣先與故祕書丞劉恕同編修資治通鑑恕在職十餘年臣昨受詔校定板本奏御頒行校對官皆䝉賜書恕有子前池州華容縣尉羲仲見丁母憂有書與臣以不被賜為其先人之辱欲臣奏請義不可抑臣檢㑹故中書舍人劉攽及恕皆自英宗朝開置書局即預編修不幸亡殁不及受賜伏望聖慈特降指揮下國子監印造資治通鑑并目録考異二部賜其家子孫則澤及淵泉存殁榮感他人亦難以援例取進止薦榮輯劄子臣伏見左宣德郎榮輯强學力文履行純茂譽望之美士夫所推自登科以來兩䝉朝廷選充西京潁昌學官元祐四年吏部侍郎傳堯俞銓量堪任文館之士五人輯為之首伏望聖慈特差充太學教官一次以待館閣之選質于公論必謂得人取進止薦常安民劄子二十九日臣伏見左朝奉即致仕常安民前任開封府推官以母喪去職因求葬地往來道路忽得危疾家人憂惶即乞致仕安民文學政事精敏過人操履端方守公盡瘁已經朝廷擢任太常禮官宗正寺丞及佐開封皆有已試之效不幸丁憂暴疾壯年納祿尋得平復今已服除臣竊惜其人才可備侍從之選伏望聖慈特落安民致仕還其舊職稽之公論必以為允取進止畏天劄子三月十三日臣前上仁皇訓典願陛下法則仁宗宜以至誠好學為先今因進講月令聖人奉天之事臣竊以畏天者莫如仁宗故願陛下先誠于事天臣聞聖人之事天也非在于七日戒三日齊執圭幣以饗圓丘之時也天之佑聖人也亦非在于祭則降福之時也聖人無一日而不事天天無一日而不佑聖人昔堯授舜舜授禹皆曰天之歷數在爾躬夫帝王之興受天眷命豈一朝一夕哉由其積行纍功素合于天也堯有聖神文武之德故天命以為天下君孔子曰唯天為大唯堯則之所以事天也元亨利貞乾之四德君子行仁義禮智以法之天地之大德曰生聖人之大德曰仁天叙有典故奉之以五典天秩有禮故奉之以五禮天命有德故奉之以五服天討有罪故奉之以五刑賞有德罰有罪皆天之事非人君所得私也故官謂之天官民謂之天民官不可非其人民不可以失其心易曰大人者先天而天不違後天而奉天時夫能使天不違者奉天之至也仲虺之誥曰天乃錫王勇智聖人聰明淵懿皆天所與豈可不學以奉天乎湯誥曰爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心言人有善巳有過皆天所知不可誣也聖人推此心于天下故其德合于天伊尹曰惟尹躬暨湯咸有一德克享天心夫一者何惟誠而已不誠則有僞故不一不一則無以享天心又曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德天之所佑民之所歸惟誠而已召誥曰今天其命哲命吉凶命歷年命哲則有智有不智故不可不一于學命吉凶則有禍有福故不可不一于德命歷年則有永有不永故不可不一于仁此皆所以事天也詩曰文王陟降在帝左右言文王升降動靜皆合天之意也又曰昊天曰明及爾出王昊天曰旦及爾遊衍言天常與人君出入遊處不可不畏也夫天之與人同一氣耳故民愁則天為之戚民悅則天為之和書曰天視自我民視天聽自我民聽是也恭惟仁宗深體此意是以能誠于事天誠于畏天臣伏見自去冬郊祀以來天人協應風雨時若有豐年之祥此乃皇天嚮佑陛下至誠之所感也而自中春以來暴風雨雪寒氣過甚節令不時豐年之祥復未可必夫天之于人君亦猶人君之于臣下也小過則戒飭之若其不改然後責罰加焉人君覩小異而不警戒則大異將至矣是以洊雷震則君子恐懼修省迅雷風烈孔子必變敬天威怒也惟陛下戒之慎之無忽天地之小異側身修德以消大異于未然則天心常悅人心常和四海幸甚取進止進紀草劄子二十日臣伏見仁宗時蔡襄上真宗所製奉神述摹本仁宗拱立命襄進讀神宗御資政殿史臣進仁宗英宗紀草神宗立聽顧問至讀畢徹案史臣將降階始坐此皆祖宗孝德嚴敬奉先之大禮也臣本院近奉聖㫖二十三日進呈神宗紀草伏緣其日係大宴前一日御集英殿獨看恭惟陛下方覽先帝史册而閲史既畢即觀百戲理似未安伏望聖慈特降指揮罷二十二日獨看以示陛下聖孝欽崇神考大典専一之意取進止舉學官狀四月臣伏見左奉議郎李晰奉寧軍節度推官孫協咸平縣主簿鼂將之皆有文學履行詞章富贍為士人所推伏望聖慈特差充內外學官一任以助長育人才取進止救疾疫劄子五月五日臣竊聞京城逐廂散藥所差使臣止是監醫生給散小民既不知藥所主療醫生亦不看診是何疾病病者妄請醫者妄散故飲藥者多死今疾疫方起又重為藥所誤實可憫傷伏望聖慈特降指揮下太醫局從上差撥學生以代醫生令依先降朝㫖分定地分委使臣同學生就病患之家令學生診切使臣上歷散藥其學生日給食錢二百文仍于步軍司或馬鋪權差借官馬各一匹乘騎免令冒暑奔走困乏實得看醫用藥則救活必衆不誤人命以副二聖惻隱恤民之意取進止貼黃臣訪聞太醫局學生係已試中之人久經治病其醫生是初入學之人未曽試中今乞權暫差撥學生仍與理為差遣一次所貴各肯盡心及聞今所差醫生既無乘騎隨逐使臣不及所以力不能看診須與給借人馬乃可責其治療又緣京師人民至衆欲乞多差學生數人或更添差使臣管勾並乞朝廷詳酌指揮范太史集卷二十四

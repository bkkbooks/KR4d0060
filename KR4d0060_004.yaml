body:
  text: 范太史集卷四宋范祖禹撰表狀劄子辭免兼侍講狀一元祐元年九月右臣準閣門告報除臣兼侍講者臣伏以邇英勸講職參近侍必得耆哲之士端方之人日新輝光仰備顧問臣語學則不足議行則無取承命愧恐不知所為矧今名儒碩德並在左右啓發聖學不無其人而臣自知最為淺陋頻蒙識擢未有報稱輒玷兹選實非所堪恐無補聰明之萬一適足以纍朝廷之公舉乞還誤恩庶厭清議二右臣準尚書省劄子奉聖旨不許臣辭免兼侍講者臣不惟學不稱職恐無以塞責而義有未可不敢不言伏以陛下深居九重不見聲色唯以大公至正身先天下進退黜陟以明好惡將使人知廉恥興禮義也至於風俗厚薄人情美惡則凡為士者皆預其責是以臣之素心官不敢虛受利不欲苟處恐傷廉恥則敗風俗上纍國體罪之大者也而臣擢於小官無尺寸之長期嵗之間荐蒙褒序史闈紀實濫備討論經幄敷言復俾陪侍雖陛下選用義不及私而臣有姻戚之嫌敢不自列臣妻父吕公著方秉國政雖在臣職業所不當避而於臣情分則有未安竊恐仰纍至公下負夙志豈可冒昧先諸儒而進乎伏乞聖慈特賜矜察追寢成命庶使迂拙少安分守臣不勝拳拳之愚謹再具陳免以聞實録院乞避親狀右臣伏睹已降敕命差尚書右僕射吕公著提舉修神宗皇帝實録伏緣公著是臣妻父於條合該回避伏乞罷臣檢討之任謹録奏聞乞給假至潁昌狀二年六月五日右臣伏為臣親叔祖端明殿學士鎮行年八十居潁昌府多苦腹疾近以次子喪亡憂傷尤甚臣之私情實所不安欲望聖慈特賜給假旬日暫往省見不敢久妨職事謹録奏聞謝賜銀狀右臣伏蒙聖慈以臣請假往潁昌府特降中使宣問賜臣銀一百兩臣無任感天荷聖激切屏營之至奏知狀右臣今月十一日入內內侍省內侍髙班李正臣至臣家傳聖旨以臣請假往潁昌府賜臣叔祖鎮實封御前文字一封實封銀合一具令臣齎賜臣已依聖旨收領謹録奏聞奏為將到臣叔祖鎮謝恩表狀七月右臣昨蒙給假往潁昌府準中使傳聖旨賜臣叔祖鎮實封詔書一道龍茶一銀合因令臣宣問臣今將到臣叔祖鎮謝恩表二道詣通進司投進謝講論語畢賜燕表九月聖人之言髙弟所記王者之事大學為先永惟百世之師實首六經之訓顧慙譾陋獲侍清間方逮終篇曲蒙飫賜恭惟皇帝陛下務學時敏作德日新親邇儒臣懋昭聖志以為舉直錯枉則萬民咸服克已復禮則四海歸仁取法於堯必則天之惟大思齊於舜當恭已以無為尊其所聞終之不倦式頒禮食昭示龍光臣等咸備邇聨預霑慈宴屬厭知愧盡瘁為期又謝賜御書詩表宸暉照爛聖札飛騰拜手受藏震驚喜抃臣聞孔子稱堯之德曰煥乎其有文章書稱舜曰濬哲文明詩美文王曰倬彼雲漢為章于天周公多才多藝孔子將聖多能論語曰志於道據於德依於仁遊於藝書即六藝之一也古之聖人莫不以好學為先遊藝為美恭惟皇帝陛下聰明天縱睿智日躋嗣膺大統于今三載間御便殿延對儒臣敷求經訓啓發聖學雖大冬盛夏肄業不輟臣竊觀陛下容止周旋動必中禮垂拱淵默性唯合道終始如一日進無疆四海之人方翹首以望輝光之新傾耳以聽問譽之隆然在廷之臣未有被親札之賜者臣以末學濫備勸講適終篇帙無補涓埃預蒙優恩加賜燕勞忽頒宸翰獲覩飛毫乃知陛下間燕之中留神筆畫研精儲思欲臻其妙臣願陛下篤志學問亦如好書益進道德皆若遊藝則聖神可至事業可成如天之積髙地之積厚廣大深遠不可測也臣不勝拳拳之愚敢以此謝謹當傳之子孫以為永寶夙夜思職少圗報稱謝開實録院賜燕表三年三月十七日編摩云始燕衎遽頒祗荷詳延伏深震懼臣聞繼志嗣訓以為孝記久明逺莫如書先帝之御萬方僅踰七閏信史之示後世動流億年顧以頑疏誤當屬任和鉛就職未知書法之謂何折爼示慈亟荷聖恩之特異均頒肴核詔集搢紳事雖故常寵實優渥此蓋伏遇皇帝陛下紹承先烈祗遹燕謀瞻望西陵永悼威神之不復論著東觀將傳功德於無窮曽未濡毫特先置醴徒重大官之費豈有良史之才思稱所蒙敢忘自竭表裏詩書之䇿為法具存畫繪日月之光強顔何已謝太皇太后表信史誕修恩筵顯設仰膺寵奬內切兢營伏以先帝之盛德成功羣臣之嘉言善行將傳永久爰命討論敢意孱虛遽叨屬任龍湖已逺強圗日月之光鼠技未陳猥被雲雷之施此蓋伏遇太皇太后陛下思光往緒垂裕來昆眷兹傳信之勤加以示慈之厚編摩代匱雖有玷於甄收尊閣視成庶無慙於器使謝開實録院賜銀絹表紬繹信書方謹編研之職分頒厚幣遽霑優渥之恩拜賜無功受藏有靦此蓋伏遇皇帝陛下纂隆下武追孝前文仰惟丕顯之謨莫重不刋之典將以示億年之永久齊列聖之休光顧忝司存誤膺詔委眷開編而首事加實篚以示慈才乏三長方懼曠官之責恩均九式實叨懋賞之私冀竭微勤上酬鴻施謝太皇太后表職當載筆方紬垂世之書賚及有家忽降自天之澤便蕃所被惕厲靡寧此蓋伏遇太皇太后陛下勤治萬方詒謀億載保佑重光之祚緝熙前烈之文申敕攸司發揮大典顧循譾薄誤玷選掄眷兹簡册之初優以金繒之賜先事後得慙勸賞之遽加廣記備言唯服勞而仰報謝開實録院賜硯墨筆紙表典司太史論次新書顧在諸儒已塵盛選遽拜出中之賜罙深載筆之榮此蓋伏遇皇帝陛下茂烈謹於丕承逹孝資乎善繼發揚先帝甚盛之迹圗示萬世無窮之傳以臣等預遊著作之庭並給上方之札抽毫執簡使備於編摩抱槧和鉛適資於潤色將何報稱秖益兢慚思繪畫於乾坤固知不可禆涓塵於海嶽勉竭所能庶集微勞少酬洪造謝太皇太后表伏以發揮天地之功潤色聖神之業自昔文章之用序事尤難方今儒學之官紬書為貴顧慚譾陋輒冒詳延屬藁云初拜嘉有腆此蓋伏遇太皇太后陛下垂精大典貽訓後人發禁省之珍藏循書林之故事隂山堅石之璞上黨芳松之煙妍妙曄光水苔之質圎和正直秋兔之毫曲示優恩併推異數寵靈甚渥報稱謂何誓殫夙夜之勤少答寵光之厚辭免除起居舍人狀一四月右臣今月二十日準閣門告報已降告命特授臣守起居舍人者臣竊惟左右二史選擢尤重文學之士號為顯塗方陛下延登衆賢式序在位臣以非才謬塵書省同時並直前輩猶多而臣幸得執經日備顧問夙夜惟念無補聖學其敢過貪榮寵以速罪戾伏望聖慈收還誤恩旁求俊良副兹慎簡如臣淺陋實無以堪所有告命未敢祗受二右臣準尚書省劄子奉聖旨不許臣辭免起居舍人者承命震恐不知所圗臣以侍經職在左右豈敢過為矯飾煩瀆至於再三直以誠實上干天聽伏念臣賦性朴愚臨事不敏往在書局十有五年不敢有榮進之心述史之餘粗不廢學至於詞藻實非所長是以前此蒙恩除授著作檢討乃至經筵兼職苟可勉強不敢固辭今蒙陛下擢置西省俾之執事記言日侍殿陛臣不唯非才無以當此美職竊聞舊例中書舍人若值假故則以次記注之官當權草制臣實無敏疾應猝之才不敢以所不能貪冒天寵黽勉就命瘝官塞職為罪滋大是敢先事自列不避重誅况臣著作已為史官勸講亦參近侍敷陳經訓以承聖問常懼不足敢有二事以及其他伏望陛下矜察特賜寢罷今來恩命臣謹當窮思竭精専意所職庶有微益不負聖知三右臣近兩具奏辭免除臣起居舍人恩命準尚書省劄子奉聖旨依前降指揮不許辭免者臣非不知煩瀆聖聽稽違君命邦有常刑然臣以才性遲鈍不能及人竊自惟念纍年以來荐蒙褒擢未有報稱今兹進職漸階近侍實懼無以堪任伏望陛下察臣肺肝令臣且守舊職責其報效若臣朴學少有補於聖德在臣所願勝於遷兩省之職多矣所有告命臣必不敢祗受伏乞早賜俞允四右臣準尚書省劄子奉聖旨依纍降指揮不許臣辭免起居舍人者聖恩深厚無有窮已非臣隕首所能上報重念臣實以文字遲澀不工如前所陳乃其平時素心不敢冒昧由此以進臣今若就職將來或未以罪斥則文字之任無説可辭若謂今日可以且受而俟他日堅辭則是臣緣此美職以為進取階梯然後却辭他日差遣懷利事上不唯臣所不敢陛下亦何所用之伏望聖慈察臣至誠實非矯激特賜追還所授免更辭費上瀆睿聰臣無任兢惶迫切之至申三省狀右某近準閣門告報蒙恩除授起居舍人前後已具四奏辭免備述誠懇決難祗受伏乞特賜敷奏早降指揮追還告命免至辭費上瀆朝廷謹具申三省伏候裁旨五月八日三省同奉聖旨依所乞請假往潁川狀元祐四年二月七日右臣有親叔祖故端明殿學士贈右金紫光祿大夫臣鎮不幸考終卜以今年三月一日葬於潁昌府陽翟縣臣欲暫請朝假旬日往赴襄事不敢稽違以妨職業伏望聖慈特賜矜允辭免召試中書舍人狀一三月右臣今月十四日奉聖旨召試中書舍人者聞命震恐不知所從臣以凡才謬塵史職復緣朴學進侍經帷至於文詞實非所工今茲給札以備代言之選大懼無以厭塞士論輝光帝猷兼臣昨已辭起居舍人之職今不由記注直俾試言天恩過隆弗循舊典在臣愚分豈敢克當伏望聖慈特賜寢罷召試指揮臣無任祈天俟命懇切之至二右臣今月十六日奉聖旨不許辭免召試中書舍人者伏念臣昨蒙除起居舍人非敢辭記注之官實以文詞不工竊恐誤被書詔之選故不敢冒昧榮寵乃是辭今日之試也陛下不以臣為非才特降召試之命臣若就試則寧如前日勿辭且前日之辭是則今日之試非今日之試是則前日之辭非前後相違何以事上臣雖至愚實不遑處伏望聖慈察臣懇誠特賜寢罷今來指揮庶安分守敢不畢命以報聖知辭免除中書舍人狀一右臣近兩具奏辭免召試今準閣門告報已降告命除臣中書舍人者非常之恩不試而授震懼殞越無所自容臣伏以祖宗以來用人有序必記言動乃司訓誥舉以次則人不競取以試則下不偷所以示名器之公嚴侍從之選踵為故事未之或渝唯是文章宗工人望久屬館閣舊老士論共推或絶倫之才躐等而進不待試可曽無幾人以臣方之何能為役况乃辭記注而特召辭召試而直除何以厭服人言答揚聖選而復遂格召旨又隳故常啓僥幸之途喪廉隅之節皆自臣始誠何敢當伏望聖慈察臣悃愊追還新命俾安分守免更瀆煩天聽愈重罪戾二右臣近上奏辭免除授中書舍人恩命準尚書省劄子奉聖旨不許辭免者竊以內史文學之選號為清華秉筆之士無不願慕臣逺方孤生讀書仕進心非木石豈不求榮况自臣叔祖臣鎮叔父臣百祿皆由科第歷踐此官今臣非才復被誤恩若一日就職遂為三世掌誥豈非寒族之寵小臣之幸實以詞學荒落才力有限久􅊀修書之職復參勸講之任粗容朴拙黽勉冒居昨蒙選授右史非謂不能記録言動正恐循次而進用承人乏是以先事瀝懇至於數四及召旨期於必辭不圗天恩更越倫等重念臣始辭記注實辭召命既辭召命實辭此職今若祗受自食其言前之所辭皆為虛矯豈唯愚臣心知不可實亦清議皆所不容伏望聖慈矜察本末早賜追還新命辭免除諫議大夫狀四月右臣今月四日準閣門報已降告命授臣試右諫議大夫兼侍講充實録修撰者聞命震恐無所自容臣聞三代之時自公卿至於列士皆有諫職降及後世乃特置官祖宗以來尤慎此選必得忠正之士骨鯁之臣言足以廣君心學足以知治體乃不誤於耳目而有補於聖明苟非其人無以重國臣識智淺陋心力衰疲受恩不資無禆毫髮近蒙選授內史榮參法從臣愚竊欲専勸講之任不敢復兼書詔之職是以不避煩瀆至于懇辭伏蒙天恩曲徇誠請不圗求諫之廣下及芻蕘擢置西省責任愈重大懼無以補衮職之闕塞搢紳之望內自揆省實非所堪伏望聖慈特賜追寢令臣且守舊職所有告命不敢祗受謝諫議表五月從大夫之後以諫為稱近天子之光唯言是職顧慚譾陋深積兢惶伏念臣識智甚愚資才不敏久玷道山之籍獲趨便坐之班入則執經奉一人之典學出而紬史紀先帝之成功非堯舜不敢陳於前庶文武尚未墜于地螢爝無禆於日月涓塵何補于山淵已叨儒者之榮復被爭臣之選付之言責寵以服章俾圗報國之忠未識隕身之所此蓋伏遇皇帝陛下聰明時憲聖敬日躋體軒皇敦敏之仁躬帝嚳靜淵之德思聞讜議深沃清衷兼收一介之微進備七人之列重念臣自陪經席日侍威顔曽無稽古之能每荷虛中之聽唯畢精而竭慮嘗廢寢以忘餐矧今眷遇加隆事責彌重敢不益厲自公之節不移介石之誠冀畢餘生仰酬鴻造謝太皇太后表后從諌則聖俾服在於邇僚臣責難曰恭敢不祗於休命靦顔而受思職惟憂伏念臣遐逖孤生顓愚懵學賜第仁皇之末紬書神考之初天祿三年周書一紀唯弊精於蠧簡敢覬幸於榮塗迄奏終篇召置儒館荷大德之廣覆兼收細微屬睿明之統臨旁燭幽隱史闈記實濫備討論經幄敷言復參陪侍負戴有丘山之重勤勞無毫髮之微擢右史之華資進西垣之近職皆從懇避特出矜容竊希散秩之安乃被爭臣之選朝無幸位義不辭難仍服不稱之衣越處非據之地此蓋伏遇太皇太后陛下母臨萬國坤載羣生思齊任姒之功誕保成康之聖建大公而在上登衆正以交修明目逹聰來直言於逺邇獻可替否圗庶政之中和重念臣爰自下僚以躋近列每膺除命皆出宸衷徒堅報國之心未獲隕身之所冀殫微力上答鴻私舉自代狀右臣伏覩朝散郎守尚書禮部郎中陳軒資性耿介志守廉靜學以為已不求人知使居言責必有所補臣實不如舉以自代范太史集卷四

body:
  text: 范太史集巻三十九宋范祖禹撰墓誌銘永嘉郡夫人富氏墓誌銘太子太保田宣簡公諱況之夫人富氏河南人曾祖處謙祖令荀考言皆贈中書令兼尚書令封鄧韓秦三國公贈祖妣劉氏祖妣趙氏妣韓氏封魯韓秦三國太夫人夫人之兄韓國文忠公與宣簡公為布衣交秦公與太夫人皆竒愛夫人慎擇可妻者素器重宣簡公遂以夫人歸田氏生十九年矣時公已登進士第益務力學夫人總治内事不以豪髮累公之勤已而公舉賢良對策第一遂登侍從位樞宻使而文忠公為丞相對居二府歳時朝謁夫人與秦國太夫人嫂周國夫人偕入世圖之以為盛事宣簡公自樞府以疾謝政夫人奉養扶持竭其力凡六年如一日公薨子㓜夫人葬於潁昌陽翟縣初公買第于洛夫人遂徙家焉乆之夢公告以居室被水如是者再三日夜憂惻筮之如夢使相地者視墓亦協乃往告而發之果有水側其柩夫人臨壙號慟改葬河南壽安縣甘泉鄉龕澗村凡再襄事規畫一出其意所以奉終之禮無不飭備春秋躬濯溉執饌以享田氏之祖考自以未逮事姑每奠姑位容色必戚退告人曰吾恨未嘗一日伸婦禮也元豐中紹修國史夫人命其子旦以宣簡公奏議行事功狀上史官又命旦編次公文章為三十巻上之請藏祕閣夫人性莊静不妄言笑御家嚴整有決閫外敬憚教子以問學取友每聞有賢士大夫至喜見顔色親視膳飲以進客文忠公與親族語治家必以夫人為法元祐二年正月庚辰薨于四都之第年七十二初封德安縣君累進永嘉郡夫人無男子以宣簡公弟之子至安為後公薨至安終太常寺太祝復以公弟之子旦嗣今為承奉郎女一人適鄧州順陽令冦仲宣其三月亦卒孫男三人綬假承務郎縝早夭經尚㓜旦服喪羸毁將以七月葬夫人袝宣簡公墓使以狀來求銘其可辭銘曰懿卜妻田既昌且延以及夫人歸其後賢鵲巢之風碩人之族内外顯融厥聲載肅惟夫暨兄對秉樞鈞象服翟茀一時三人宣簡有行夫人將之宣簡有文夫人章之惟勤惟艱以立厥家匪初之勤其終又嘉汔于有成以詒孫子在後之承無怠無止長樂郡君尹氏墓誌銘夫人尹氏河南人起居舍人直龍圖閣諱洙之女太中大夫集賢殿修撰張公諱景憲之妻起居以文學行義重於一世天下之士稱師魯則知其為尹公夫人事父母莊敬守禮歸于太中張氏西都名族姑李夫人宰相文靖公之女治家尤謹法度夫人奉事常得其歡心太中初為小官仰禄夫人甘淡薄一豪不輒費唯李夫人所欲用不計多寡有無至以笄髲繼之太中寖顯于朝夫人猶菲食惡衣李夫人喜宴集夫人身執爨與羣婢等寢食一有不安節則夫人傍偟不下堂將没執夫人手曰婦孝不可忘也姑既没感慕乆而不衰與太中相待如賔雖子婦不冠不見尹公謫官而卒夫人痛念終身嘗勉其弟曰汝忘而父以讒廢而志不伸乎太中没諸孤歸洛夫人不出閨庭而士大夫皆稱其嚴整有法入其門肅如也其戒諸女曰汝曹事夫如事父敬而有别乃可以乆此吾得於汝外祖之言也晩而好禪學不以事物累其心宴坐終日無所思營及屬纊不戚不亂順受而待以元祐二年正月甲戌終於京師年六十二初封宜芳縣君進封長樂郡君子五人塾承議郎通判莫州量河中府司録參軍監兗州酒税益宣義郎刪定令勅官重承奉郎監察利軍酒税直承奉郎監齊州税女六人長適承議郎石熙次適信安軍判官李毅次適承議郎李士京次適承奉郎韓宗質次許嫁承奉郎富直清次尚㓜孫男三人女四人諸孤奉夫人之喪將以某月某日祔河南府河清縣上官村太中之墓以狀諗於太史氏范祖禹惟古之君子必有賢配儆戒以成其德若太中仕不茍合風節著見於時出入侍從而清貧如素士諸子皆克孝事親盡力務養其志然則夫人所以助其夫訓其子者從可知矣銘曰易正家道詩厚人倫教本於内行反諸身夫人之賢克配君子有徳有言前烈是似直内方外士之所難於穆夫人居之以安歸從皇辟賛有幽刻詒其子孫視此為則朝請郎致仕張公墓誌銘公諱保孫字子逺其先深州束鹿人曾祖光偉贈太子中允祖文質贈尚書左僕射父存以禮部尚書致仕贈特進諡恭安曾祖妣李氏孟氏祖妣王氏贈太原郡太君妣劉氏贈安康郡太君自僕射徙居冀州今為冀州信都人恭安公事真宗仁宗歴踐臺省任龍圗閣直學士吏部侍郎英宗神宗朝累遷尚書碩望重德為時名臣公恭安公之第二子也父任守將作監主簿監冀州酒稅簽書安武軍節度判官以父老不欲為他州官朝廷亦優待恭安公故公三為冀部從事熙寧中大河自棗强西汎寖逼郡城將築隄於東郊占公家田吏議移之民田公不可曰與其損民不若自損卒置隄於其地通判恩州先是御河在郡中元豐四年大河北決自大名徐曲口注御河朝廷議欲遂令黄御河合流以通邊漕都水監都運司調夫修御史度用工二十五萬公上言大河水悍非御河所能容其勢必漲為一州患方今農作重被災害調發至廣仍為甘陵憂甚無謂也不若塞徐曲決口用工少而無後患朝廷從之契丹使過郡守丞餞之南門使曰兩朝通好日乆往來如一家可謂太平守不能對公曰太平無象何但爾邪使者服曰誠名言也七年告老得謝官累朝請郎勲柱國服紫衣金魚八年十一月乙巳卒年七十一公為人醇謹孝弟出於天性事恭安公不冠帯不敢見過庭必趨恭安公夜分不寐不敢退出入第門外上下輿馬自言平生未嘗對父坐恭安公官於四方公未嘗一日離左右及將歸老公始仕為鄉里官年四十餘矣恭安公乆尊顯奉養如意既老閒居夜必蠟炬他費稱是月朔月半宴郡僚必陳樂四方珍羞異味無不備者公損已以率家人積用而致隆於親如是幾二十年不衰居信都者宗族百人開南北二第恭安公居北第餘皆南第凡廪餼絲枲湯沐之用親疏如一而公自奉儉薄敝衣冠菲飲食盖侃如也兄台孫蚤卒視其子與孫踰已生姊適李氏夫亡其家不貧公養姊於家為其甥男女嫁娶恭安公薨終喪不居堂奥㕔事郡人以公篤行皆敬仰則傚之内外宗族事公如事恭安公焉太師司馬文正公之夫人公之女弟也常道公以訓其子弟曰如彼可以為孝矣公好讀書老而不倦見賔客恭敬甚惡言人之過其在甘陵部刺史嘗問公以屬吏能否對曰公自察之終無所毁其為政唯恐人知之不好立名然人皆稱其長者娶楊氏卒贈蓬萊縣君繼室以其妹封壽安縣君子男一人世京太子中舍先公卒女六人長適磁州録事參軍郭郁次初適守將作監主簿皇甫僖再適衛尉寺丞馬鼎次適西頭供奉官李宗彦次適奉議郎校書郎司馬康次不育次適郊社齋郎司馬棫孫男三人克和郊社齋郎克勤永静軍司理參軍克諧未仕曾孫男一人曾孫女五人孤克勤以元祐二年十月葬公於邢州龍岡縣白圭鄉夷儀里祔僕射公之塋司馬校書狀公行事抵史官曰吾舅行如此其可以不銘謹諾而銘曰張氏在冀莫如恭安顯于四朝壽考多盤惟其有人幹父承考孝弟慈祥以至耆老鄉人尊之率化以躬循循唯謹萬石之風豈無多文亦有善辯君子之行唯日可見夷儀之里白圭之原永閟斯銘慶在後昆天章閣待制楊公墓誌銘公諱繪字元素其先出於漢太尉震八世祖珂仕唐為漢州金堂令卒官子膳為國子祭酒從僖宗入蜀葬金堂君於綿竹因家焉遂為綿竹人曾祖諱曄祖諱充考諱宗道有隱德鄉黨尊敬以公貴累贈光禄大夫曾祖妣宇文氏祖妣何氏妣李氏累封廣陵郡太君公㓜聰警雋拔讀書五行俱下老不復忘專治經術工古文尤長於易春秋居无為山著書自號无為子以其學背時好名所居曰自信堂皇祐五年擢進士第二人授大理評事通判荆南府丁光禄憂服除召試學士院改太子中允充集賢校理為開封府推官賜服緋魚權判官庫吏積年盗用官錢因賂守者事覺株連繫獄二百餘人公白尹許詿誤者自陳悉獲免開封繁劇府僚日力不給公從容有餘仁宗知其才欲擢寘侍從執政以公年少抑之改判三司户部勾院以母老求領郡得知眉州奏課第一徙知興元府未期年獄空者二百八十餘日英宗書公姓名於寢殿未及用神宗即位一月召修起居注進知制誥知諫院賜服金紫詔遣押班王昭明管勾御藥院王中正李舜舉使陜西勾當公事公上言君之始年要在端慎方天下拭目傾耳以觀聽新政館閣臺省之臣朝廷所養以待用者豈無一人可使而必用中人乎又言中正妄言邊事欲以固寵請罷近職置之閒地又乞案薛向李肅之擅興种諤髙遵裕矯制取綏州之罪處以典刑宗室以服屬裁䕃子之數立出官之法從之又言向傳範后族不當領京東西路安撫使宜易之以杜外戚僥求之源執政言傳範以累典郡有政績而授非縁外戚與之上曰得諫官如此言甚善可以止其他日妄求也宰相有乘時旱歉多買民田及用所厚善者為修實録檢討官又乞其子判鼓院公累疏論列上為罷檢討鼓院又重進退大臣乃罷公諫職除兼侍讀公力請外任御史中丞滕元發以為言上手詔賜元發曰繪堅求外補及乞明加黜責盖繪未深究朕意繪迹疎逺立朝寡識不畏彊禦知無不為朕一見便知其忠直可信故翌日即擢置言職知之亦甚篤矣今日之除盖難與宰相兩立於輕重之間姑少避之卿可示朕手札諭以此意令早承命公謂諫官不得其言則去經筵非姑息之地卒辭不受不閲月再知諫院以母疾辭丁内艱服除入對面受翰林學士權御史中丞充理檢使時王安石執政臺諫官多以言事罷去闕中丞累月及公執憲士大夫皆想望風采公上言當今舊臣多以疾求退范鎮年六十三吕誨五十八歐陽修六十五而致仕富弼六十八被劾引疾司馬光王陶皆五十而求閒散陛下可不思其然乎又言以經術取士獨不用春秋宜令學者以三傳觧經不必專用左氏之說又言安石不知人提舉常平使者暴横時方行免役法公上言司農寺升畿縣户等而多取緡錢兩浙提㸃刑獄王庭老提舉常平張靚多率役錢至七十萬以是連忤執政罷學士中丞二職以翰林侍讀學士知鄭州未行改亳州徙知應天府兼南京留守司事知杭州兼兩浙西路兵馬鈐轄杭為東南㑹府公始至獄訟多壅剸決悉無留繫時諸路監司多新進輕鋭陵轢郡縣雖藩鎮大臣不敢校㑹旱蝗大起詔遣監司廵案捕蝗官監司坐視不出公移文詰責促其行吏民感之境内蝗皆抱木死幾月公被召受代之明日蝗復生民作歌以思公復拜翰林學士兼侍讀李憲為安南副招討公上疏以唐白居易諫用吐突承璀為言憲卒不行時議加孔子帝號公上言不必追尊又言不宜用大遼厯改閏月悉從之攝開封府數旬有聲從容談笑庭無留事神宗眷益厚㑹有忌公勝已者擠之言公受饋薦人而其人已死公無以自明責授荆南節度副使數月分司南京改提舉江州太平觀謫居七年起知興國軍上嗣位易徐州誣謗始辨復天章閣待制再知杭州時已屬疾視事踰四月卒于州年六十二實元祐三年六月丁丑公為人簡易不事邊幅表裏洞逹一出於誠為文章操紙筆立書其論議必本經術事上竭盡無回忌敏於吏事事至即決而皆得其情實吏民不知所出畏伏如神主於愛利不嚴刑罰待屬官無賛拜禮胥史皂𨽻亦不責其曲謹尤為神宗所知前後皆自除用既坐廢退公亦知命處之泰然曰天也其在京南執政有與公相善者使人致問將辨公無罪公曰吾命未也其如命何及二聖嗣位連起公領藩郡且召用而公不幸以殁豈非命歟其官自太子中允五遷為禮部郎中官制行易朝奉朝散朝請大夫厯知太常禮院判官告院吏部流内銓審官西院三班院太常寺兼禮儀事尚書都省提舉在京諸司庫務初封華隂縣子食邑五百户進封虢郡侯食邑一千户娶李氏封同安郡君子男四人長乆中太廟室長積中黄州司法參軍使中出中皆承務郎女二人長適前利州綿谷主簿李象先次許嫁承務郎范百慮孫女二人有羣經索藴三十巻无為編三十巻西垣集三巻諫疏七巻臺章七巻翰林詞槀七巻公因謫居荆南夫人與諸孤奉公之柩以元祐四年十一月十七日葬荆南江陵縣龍山鄉全家村楊氏范氏為世姻故知公最詳諸孤屬以銘其可辭銘曰自漢太尉楊世顯融從唐狩蜀以迄于公公居旡為學以自信與古為徒匪今之徇坦坦為人矯矯為臣正色于朝不有厥身嘉言忠規日陳于帝亦無沮威亦無避勢諫垣憲府再黜而升乆益知之惟帝之明兩拜翰林入侍經幄帝將庸之君正是屬誣不自辨一謫七年不戚不求曰命于天二聖照臨起公徐方與民所欲再命于杭杭人懽呼如父母懐公昔初去蝗死復飛今公再來以疾卧齊公殁于州老㓜號啼其愛在人其直在史去蜀適荆其在今始承事郎范君墓誌銘君諱百嘉字子豐成都人曾祖諱璲曾祖妣索氏祖諱度贈開府儀同三司祖妣李氏龎氏封榮國昌國太夫人考諱鎮端明殿學士贈右金紫光禄大夫蜀郡忠文公妣李氏某郡君張氏長安郡君忠文公第三子也以䕃為秘書省正字勾當都茶庫中進士第改大理評事以官制易階承事郎用薦為市易司屬官因奏請究其弊詔頷之為其僚所傾坐冒賞奪官累年復承務郎神宗山陵權都糧料已號為稱職司馬文正公當國素知其才且用之侍坐於文正得疾踰年而卒年三十九實元祐二年五月二十五日君性明雋於書無所不讀慨然有志於功名其學天文兵法皆究其㣲為文章亹亹如原泉之流尤喜論當世之務居官善治繁劇他人力不給而君沛然有餘談笑而事集方失官志不少抑益務為學磨礪思有所試卒困不偶豈非命也娶李氏朝奉郎大昕之女再娶曾氏資政殿學士孝寛之女子男三人祖野假承務郎祖恩祖某皆承務郎女二人君卒之明年忠文公薨四年八月從葬汝州襄城縣汝安鄉推賢里其從兄祖禹為之銘曰於戲從父有藴不施如田之菑如室之基弗穫弗茨維後之詒有如不信視此銘詩開封府太康縣主簿范君墓誌銘君諱百歳字子老成都人端明殿學士贈右金紫光禄大夫蜀郡忠文公諱鎮之第四子也母清河郡君張氏長安郡君李氏熙寧中忠文公請老君以明堂恩得試秘書省正字性温良粹美自少至長言行有常忠文公官於京師門生寓館者常十餘人退朝教誨不倦繼之以夜子孫受學皆有家法故君童丱嗜書不待奬勵博通載籍多識國朝故事每講經義為文章公必賞愛之嘗曰此吾家千里駒也二兄皆登進士第君益感慨强學衞州司法參軍試河北轉運司為第一再舉於禮部不中調開封府太康主簿未赴而卒年二十九實元豐闕年闕月闕日忠文公為文祭之甚哀諸名公皆痛惜之娶韓氏直秘閣宗師之女初韓獻肅公與忠文公同埸屋既貴顯約為婚姻獻肅一見君奇之許妻以女已而獻肅女卒以孫女歸之子男三人曰祖闕假承務郎曰祖闕假承奉郎曰祖闕女三人元祐四年八月巳未從忠文公葬汝州襄城縣汝安鄉推賢里銘曰君之為人如玉粹温敏于行而力于文天不畀之年蚤世隕身歸從先公汝水之墳維其繼承在後之勤梁國郡君王氏墓誌銘夫人王氏應天府虞城人曾祖礪贈太師中書令兼尚書令曾祖妣某氏某國太夫人祖渙尚書禮部侍郎致仕贈銀青光禄大夫祖妣某氏某郡太夫人考獻臣殿中丞妣李氏隴西縣君王氏南都望族夫人生而淑懿孝敬慈祥父母愛之慎其所歸年十七適東萊蔡公公諱某初出繼伯父參知政事文忠公夫人事姑備盡婦道内外無間言姑夫人薨公悉以文忠公闕業與其弟延嗣秋毫無所取家貧奉養甚薄夫人安之族人以乏告者必竭所有濟其急常勸公苦學勿恤家有無見公登進士第擢為福建路轉運判官夫人封同安縣君嘉祐八年十月二十三日以疾卒年三十三後十年公為龍圖閣直閣學士追封太原郡君又封梁國元祐五年三月公以吏部侍郎薨于京師十月某日葬潁昌府陽翟縣某鄉某里夫人合祔子男六人惇懌皆右承奉郎悰蚤世惲右承務郎恂蚤世恪右承務郎四子皆孝謹好學能世其家女二人長適和州防禦推官前國子監直講沈闕次適右通直郎提舉三門白波輦運文永世孫二人興孝興宗並假承務郎孫女三人皆㓜銘曰夫人之行宜公偕老天畀淑哲嗇其壽考如彼築室既營弗處如田之菑亦不克庾勤則多矣不享于身惟其慶善以利後人箕潁之隂歸于幽宅刻詞昭美其閟無極范太史集巻三十九

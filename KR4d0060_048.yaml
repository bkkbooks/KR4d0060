body:
  text: 范太史集卷四十八宋范祖禹撰皇族墓志銘贈左領軍衛將軍墓志銘君諱令迤冀康孝王之曾孫僖安公守巽之孫鎮寧軍節度使開府儀同三司遂國公世該之子初賜名補太子右內率府副率遷率府率性孝友謙恭好學刻意于書史文章將求試有司元祐元年七月辛未卒年二十有二娶王氏朝奉郎子淵之女九年二月已酉葬河南永安縣銘曰陋巷之士易以成名公子公孫鮮克有聲惟君力學有志于古如適千里躓于跬步右監門衛大將軍妻孝感縣君王氏墓志銘君王氏曾祖惟志左屯衛大將軍祖凱威武軍節度使贈太尉父大方西京左藏庫使嫁右監門衛大將軍令誠性惠和勤儉甚宜其家元祐元年閏二月已酉卒年二十有三二男長不育次曰子孟三班奉職一女幼九年二月已酉葬河南永安縣銘曰王氏世將于歸公族胡嗇其年不畀遐福右侍禁妻翟氏墓志銘君翟氏開封人曾祖藏之內殿崇班祖儀供備庫副使父元衡右宣德郎君幼端麗勤于女工組紃之事承順父母顔色無違年十五歸相孝定王孫成州防禦使之子右侍禁士掄事舅姑盡婦道從夫之官監武勝軍酒稅元祐四年七月癸巳卒於官舍年十有九九年二月已酉葬河南永安縣銘曰翟氏自周世有顯人之子于歸早隕厥身右侍禁妻鄭氏墓志銘君鄭氏世氏族少卿隨之孫女歸右侍禁令詗事舅姑孝以勤從夫順而正雍容肅慎以禮自防娣姒稱其賢元祐二年九月卒年二十有二九年二月已酉葬河南永安縣銘曰鄭本姬氏來歸公族如春之華其隕何速左班殿直妻錢氏墓志銘君錢氏髙祖吳越忠懿王曾祖惟演英國公祖晦贈定武軍節度使父景祥右宣德郎君年十五嫁宗室左班殿直令愇事舅姑盡婦道處閨門之內肅如也趙君伯叔兄弟最衆多君奉其長以敬待其幼以和下至婢妾皆得其歡心元祐四年六月戊申卒年十有七一女幼九年二月巳酉葬河南永安縣銘曰錢自吳越納其山川女為宗婦圭組蟬聨既克有家而不永年隨州觀察使漢東侯妻陳留郡君吳氏墓志銘夫人吳氏曾祖廷祚永興軍節度使追封燕王祖元慶左羽林衛將軍父守仁西京左藏庫副使母華容縣君髙氏嘗夢羣女鮮服擁旌仗而至有一女跪拜于前父占之曰必有女貴者及生室有紅光家人異之年十七適故隨州觀察使漢東侯宗楷事舅姑盡婦道治家恭勤節儉雖臧獲亦遇之以禮媵妾滿前無妒忌之行主于慈愛有饋生者必育之而不忍殺嵗放禽魚以萬數輕財好施賑貧恤孤侯先娶崔氏有寡妹無子夫人待之如已妹人莫知其非親侯薨夫人教子以義俾開閣延賔客當世名士樂從之遊故子孫以多才顯于宗藩元祐八年六月庚午卒于春明坊之别邸年七十有四九年二月已酉從宣仁聖烈太皇太后之喪葬河南永安縣啓侯之窆而合諸墓男十有五人曰仲臯建州觀察使曰仲俟卒贈密州觀察使曰仲參卒贈右屯衛大將軍曰仲晊右監門率府率曰仲廖右武衛大將軍文州團練使曰仲冉右監門衛大將軍寧州刺史九人未名而卒六女長適西京作坊使張扶封長夀縣君次適東頭供奉官杜宗弼封長安縣君次適內殿承制張瑛封福寧縣君次適左班殿直郭若一封福昌縣君次適左侍禁吳祥封仁夀縣君次適東頭供奉官婁嗣正封永康縣君孫男二十有四人士富右武衛大將軍榮州團練使士極右武衛大將軍吉州刺史士侐右武衛大將軍慶州刺史士鱣右監門衛大將軍士品故左領軍衛將軍士晉右侍禁士贛右監門率府率士聞士許士闛皆右侍禁士葆士堵士蒞士愰士嘻士􅀈皆左班殿直士暇士􅂒士􅀈士侍士㬦皆右班殿直三人未名孫女十有九人長適左侍禁向正卿次適東頭供奉官陳迪次適西頭供奉官康伸次適潤州司法參軍郭弼次適左班殿直李端信次適右班殿直鄭造次適假承務郎李垣次適三班奉職唐公彥次適假承務郎孫公宣次適三班奉職劉璹次適三班奉職張圭次適三班奉職孫思誠餘在室曾孫二十人不剛不器不吝不貪皆三班借職不習右班殿直不求不憂不劌不愆皆三班奉職餘未仕曾孫女二十有二人銘曰宗子宗婦居天屬之貴享天祿之富所不足者為善所可願者永年也如夫人之福祿夀考子孫衆多其為善也可知矣權孟州節度推官妻田氏墓志銘君田氏曾祖承謂贈左驍衛將軍祖紹淵贈右金吾衛將軍父良佐西京左藏庫副使母旌德縣君趙氏君既笄適馮翊侯之子孟州節度推官子櫟初君在提孩趙君祖母柴夫人嘗謂其女旌德君曰我孫子櫟當娶此女後柴夫人卒馮翊侯亦卒君父母以趙君孤幼欲求昏它族察君意不可故卒歸趙氏是時趙君補三班奉職未幾以詞學登科賜進士出身改授文資親族以此多君隨夫寓于博州元祐六年八月卒於博年二十有一男女各一皆幼九年二月已酉葬河南永安縣銘曰鳳得其凰和鳴鏘鏘會日苦短别日苦長右千牛衛將軍妻仙源縣君王氏墓志銘君王氏父詵文州團練使尚越國賢惠大長公主越國養君以為子君既長事所養禮敬不怠越國亦愛之如已出為擇良匹年十七嫁宗室右千牛衛將軍子綸入謝禁中神宗延問進止如禮言對詳而不華神宗嘉嘆優賜金帛兩宫太后遣中使勞問皆有賜焉君事舅姑孝睦夫族曲有禮意居務簡儉專誦釋氏書元豐八年十月庚寅卒年十有九太皇太后賜錢十萬賻其喪一男曰伯益二女皆早卒九年二月已酉葬河南永安縣銘曰英宗之女賢惠有聞女嫁宗子芝蘭染芬右監門衛大將軍妻崇安縣君石氏墓志銘君石氏曾祖保吉太祖朝尚公主祖先普光州團練使考繼勳左藏庫副使幼竒警能讀班大家女戒及笄聰明和靜歸右監門衛大將軍士鄄事皇姑彭城郡君盡婦道執姑喪毁瘠性不妒忌能和其族人元祐三年七月辛亥卒年三十有三三女二早卒季女生七年矣九年二月已酉葬河南永安縣銘曰石氏近世昏姻天屬以及其孫來嫁公族朱輪煌煌彤管煒煒不克偕老中道而止左班殿直妻吳氏墓志銘君吳氏曾祖均贈太子左清道率府率祖世安贈左朝散大夫父沛左朝散郎母伊氏華容縣君天資聰慧柔順善音律年二十歸原州防禦使仲防之子左班殿直士専從姑齊安郡君入謁禁中賜霞帔服事舅姑孝接娣姒睦約于奉已至躬自浣濯元祐五年九月乙亥卒年二十有二二女皆幼九年二月巳酉葬河南永安縣銘曰有吳之先泰伯仲雍慶流苖裔以有延陵女嫁于宗命服是膺早世而隕未克顯承右監門衛大將軍妻夀安縣君張氏墓志銘君張氏曾祖永和贈太尉祖茂則入內內侍省都都知寧國軍節度觀察留後父巽客省副使母夀昌縣君髙氏年十九適右監門衛大將軍士宥性靖淑間于容止奉祭祀無違禮其家宜之事寡姑朝夕不懈元祐五年三月戊辰卒年二十有二一女早夭九年二月已酉葬河南永安縣銘曰瞻彼西陵祖宗之原葬從先后永固萬年右監門衛大將軍妻孫氏墓志銘君孫氏曾祖可度祖成贈左監門衛大將軍父吉左金吾衛大將軍母延安郡君費氏君幼孤鞠養于兄嫂敬服姆教容止有聞年十六適右監門衛大將軍士愫事寡姑盡婦道居家雍睦元祐六年九月辛亥卒年二十有六三男早卒二女皆幼九年二月已酉葬河南永安縣銘曰西陵之原祖宗所宅葬從夫家是謂天屬贈虔州觀察使南康侯墓志銘侯諱世掌字持正越懿王德昭之曾孫彰化軍節度使舒國公惟忠之孫保寧軍節度使安僖公從信之子妣富陽郡夫人孫氏所生母贈太寧縣太君徐氏初賜名補右內率府副率纍遷右監門衛大將軍右武衛大將軍威州刺史光州團練使元祐七年九月辛丑卒年四十有六侯性清約不以紛華盛麗為悅藏書滿室喜與賢士遊親舊急難畢力賙之九年二月已酉葬河南永安縣銘曰與奢寧儉為禮之本好書日益好施日損泛愛親仁其道則逺贈青州觀察使北海侯墓志銘侯諱士倞字子強信安僖簡王允寧之曾孫越州觀察使會稽侯宗敏之孫定武軍節度觀察留後博陵郡公仲仍之子初賜名補太子右內率府副率纍遷台州刺史性謙約厚于族人處其事不啻如已事弟妹幼孤者盡力鞠育以至昏姻皆有成立宗室稱之元祐四年四月乙卯以疾終于正寢享年三十三娶曹氏封仁夀縣君一男曰不惕三班奉職三女長適何興宗次皆幼九年二月已酉葬河南永安縣銘曰君子務本愛始于親幼吾之幼以及他人惟侯之行有志于仁右千牛衛將軍妻崇德縣君郭氏墓志銘君郭氏曾祖慥海州司理參軍祖圭承奉郎父履祥年十八適北海郡王之子右千牛衛將軍仲奒性淡素善書禮勤孝盡婦道與夫相待如賔平居無戲言元祐七年二月甲子卒年二十有一一女早夭九年二月巳酉葬河南永安縣銘曰冀妻饁耨梁婦舉案幽人之正中不自亂家道尚嚴聖哲所嘆右武衛大將軍台州刺史妻仁夀郡君曹氏墓志銘君曹氏開封人曾祖玹贈左屯衛將軍祖僅贈左驍衛大將軍父諤贈左武衛將軍年十五適右武衛大將軍台州刺史士倞治家循理常以奢僭為戒北海侯好義君尤喜之撫諸幼御婢妾皆曲有恩意元祐五年正月壬戌卒年三十有七一男曰不惕三班奉職三女長適何興宗次皆幼九年二月已酉葬河南永安縣銘曰曹氏勳族赫奕后家女適宗子儉而不華凡厥子孫母失之奢欽州防禦使妻安康郡君柴氏墓志銘夫人柴氏世京師人曾祖禹錫贈中書令尚書令祖宗亮贈太子太師父貽憲贈左驍衛大將軍母夀安縣太君張氏夫人在家時事父母孝敬待人寬以和內外親族無長少皆稱之既笄適欽州防禦使世表逮事舅姑如父母皆得其歡心其待欽州循理而順以善相告欽州亮直行已有方嘗曰夫人助我舅姑沒執喪哀毁平居奉佛持齋多蔬食戒殺生賑施孤貧幾五十年終始如一初無疾病一夕勉欽州以自愛重守舊節教子孫元祐六年八月甲午卒年五十有八六男曰令他右內率府副率曰令皛右內率府副率皆早卒曰令甘右武衛大將軍保州團練使曰令椿卒贈右領軍衛將軍曰令航右監門衛大將軍曰令泮右千牛衛將軍三女長早卒次適故侍禁李需次適侍禁張汝弼孫男十一人子平三班借職次子受未官子兆殿直子力奉職次七人未官孫女四人長適奉職張宗璟次適奉職武察二人在室曾孫女二人九年二月已酉葬河南永安縣銘曰柴氏大宗作配于宗率婦之職性孝惟恭從夫之榮大邦啓封慶在後人乃侯乃公右監門衛大將軍贈洺州防禦使廣平侯墓志銘侯諱士穎字濟叔濮安懿王之曾孫寧海軍節度使沂國公宗詠之孫郢州防禦使仲山之子母臨安縣君王氏初賜名補太子右內率府副率三遷至所終官自能言至丱性質和靜為兒戲必陳書帙筆硯七嵗從諸父兄擇師友以經史自課日誦數百言及冠通大義為詞章清警藻贍王家故多前代名帖心想手臨為人書石刻以百數或報以珍玩却而不受風格整秀內融外潤恥為膏粱之飾頂破烏帽䇿欵段馬日奉朝請出入閭巷人莫知其王孫也事母至孝屬疾恐貽親憂忍不治者纍月元祐二年九月丁丑卒年二十有五娶王氏男女各一人九年二月已酉葬河南永安縣銘曰濮國子孫衆多蕃衍廣平好學亦樂為善純素之行雖隱而顯右侍禁妻劉氏墓志銘君劉氏曾祖永崇供備庫使祖允濟贈左驍衛將軍父仲逵供備庫副使母靖安縣君蔡氏年十七適右侍禁士洞容質婉淑性識聰悟巧于女工通文史能為詩奉舅姑孝事夫順族人稱之元祐四年七月戊寅卒年十九九年二月已酉葬河南永安縣銘曰歸于王孫宜其室家三嵗為婦夀胡不遐右班殿直妻林氏墓志銘君林氏曾祖懋祖秀保捷指揮使父澤東頭供奉官母董氏適右班殿直子縉事舅姑孝與娣姒輯睦恭儉溫惠治家有法元祐八年七月丁亥卒年二十有六一男早夭九年二月已酉葬河南永安縣銘曰林氏之先問禮孔門名過泰山千古如存歸于公族不享永祿夀夭自天云何其速賀州團練使妻長安縣君侍其氏墓志銘君侍其氏曾祖某贈左千牛衛上將軍祖溥供備庫副使父㺹右侍禁適右武衛大將軍賀州團練使天水郡公士雋事舅姑孝閨門雍穆無愠色怨言治家有常法飲食衣服器皿不為華侈取適而已元祐元年七月已巳卒年三十有七七男曰不溢右監門率府率曰不惑右班殿直曰不愚不怍未仕餘皆早卒五女二早卒孫男二人女一人九年二月已酉葬河南永安縣銘曰婦之德惟中饋勤于家儉弗侈從西陵利後嗣范太史集卷四十八

body:
  text: 范太史集卷十五宋范祖禹撰奏議正始劄子元祐四年五月十六日臣蒙陛下擢授諫職才力淺薄懼不克勝受命以來夙夜不遑寧處深思天下之事自非大者逺者未之敢先恭惟祖宗受天明命百三十年自三代以來未有承平如此之久纍聖基業付卑子孫成之至難壞之至易是以古之明王欲治天下先正其本其本在于人君一心而已天下治亂出于君心君心一正則萬事無不正孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣易曰正其夲萬事理差之毫釐失以千里臣侍經筵因進講每及人君正心修身之要君子小人繫于治亂之際未嘗不反覆開陳伏計陛下聞之巳熟今有言責不敢忘此竊惟天下之本在于君心臣愚伏望太皇太后陛下日以祖宗之囏難治天下之勤勞萬民之疾苦羣臣之邪正政事之得失説諭皇帝存之於心若皇帝陛下聖心曉然明於邪正是非他日衆説不能惑小人不能進則萬事定矣臣竊熟思莫大于此惟陛下深留聖意以幸天下取進止乞再貶蔡確劄子十七日臣伏見巳責降蔡確分司南京確之罪惡天下不容尚以列卿分務留都未厭衆議伏乞處以典刑更重行竄謫取進止乞降付三省論執政闕官劄子臣伏見自胡宗愈罷闕尚書右丞一員執政繫朝廷重輕自非人望所屬有益于國不可以備位乞陛下精加審擇若聖意未得其人寧且虛此一員亦未至于闕事取進止乞留中乞差實録檢討官劄子臣伏聞曽肇巳除外郡修實録闕官一員昨差司馬康充檢討康以非久書成固辭而罷今來曽肇未了文字須得一人成之欲乞却差康充檢討官不唯史官得人亦公議皆允取進止乞留中出自聖意指揮貼黃著作與修撰檢討文字相通夲不可分今康見在史院修日歷不兼實録職事未得安便乞寬刑劄子二十三日臣伏見蔡確已責降英州别駕新州安置臣知陛下宸謀逺慮斷在不疑除去大姦實為宗廟社稷之計非以陛下一心私喜怒也忍于一人所以不忍于天下之人不愛一人所以愛天下之人也然確以凶德叨竊相位作威作福欺罔先帝屢起大獄排陷善良故聞確名者無不震畏以朝廷名器為巳私物市恩結黨故貪利之士多為確用今佐佑確者不過懷其舊恩嘗與之相濟為惡或畏其復起不敢結怨不然則所見偏謬謂確以詩得罪欲薄其責不出此三者而已臣聞帝堯刑一人而天下服書曰殱厥渠魁脅從罔治古之明王征討叛逆亦不過誅其元惡餘皆赦而不問使之自新若窮治支黨滋蔓不巳懼罪者衆則人情不安必有過刑濫及無辜此先王所深戒也夫聖人之道不過得中天下之事不可極意一時極意後必有悔用刑寧失之于寬不可失之于急寧失之于略不可失之于詳自乾興貶丁謂以來不竄逐大臣六十餘年今年已用大刑四方聞之無不震聳然人無愚智皆以確之得罪為當不宜更有驚駭物聼且丁謂見在相位故朝廷有黨不可不黜然而章獻明肅太后仁宗既黜謂黨即下詔曰內外臣僚凡與謂往還者一切不問所以安人情也今確巳罷相數年陛下所用多非確黨其有素懷姦心為衆所知者固不逃于聖鑒自餘偏見異論者若皆以為黨確而逐之臣恐刑罰之失中人情之不安也又確巳投荒裔不憂不死小人破膽不憂不懾唯當選用忠良力行仁義繼之以善政而巳若因一凶人延及士大夫相繼黜逐不巳則人情震動不安方今朝廷唯宜安靜臣願陛下天地之德包含隱忍容養羣臣不責其全俟有顯過黜逐未晚臣受恩深厚不同他人茍有益于國家不敢隱情臣無任恐懼之至取進止上殿劄子二道辨邪正臣聞邪必害正正必去邪自古以來未有邪正並立而可以為國者也雖堯舜在上未嘗無小人唯能使小人不勝君子所以治也雖桀紂在上未嘗無君子唯使君子不勝小人所以亂也在易內君子而外小人其卦為泰泰者通而治也內小人而外君子其卦為否否者閉而亂也天下治亂未有不由君子小人君子在位必無惡政小人在位必無善政聖人為天下唯能使小人外而不內在野不在位而已非能使天下皆無小人也陛下自初臨政以辨别君子小人為先登進忠良黜退邪惡以致今日之治所進所退天下之人皆以為然雖舜舉十六相去四凶不過如此也而比年以來大臣以兼容小人為寬好惡不明邪正不分所引進者不盡得人夫今日之省寺他日之侍從也今日之侍從他日之輔弼也宰相豈能使之終身不進乎周公作立政以戒成王自準人綴衣虎賁趣馬小尹左右㩦僕藝人表臣百司皆勿以憸人其惟吉士夫憸人在上位則害政事在下位則壞風俗大則傾覆邦國小則戕敗善類朝廷之內何官可不擇人也邪人得志則正人不安正人不安則國無善政宰相以進賢退不肖為職而邪正不分豈不負國書曰惟説式克欽承旁招俊乂列于庶位此相之事也臣伏望陛下戒飭大臣各以公心求賢多引鯁正之人以重朝廷無使小人得在下位為他日之患以副陛下至誠求治之意取進止論城濠臣伏聞開修京城濠日役三四千人雖和雇夫力調發不及民其錢不屬户部然財出于民一也豈可不計校愛惜而枉費用之臣聞開濠深二丈五尺濶二百五十一步廣于汴河三倍自古未聞有此城池也新城周世宗所築太祖因之建都于此百三十年無山川之險可恃所恃者在修德在用人在得民心此三者纍聖所以遺後嗣子孫也神宗時宋用臣提舉修京城大興土功版築過當小人之情唯欲廣用民力多費國財上則徼幸爵賞次則隱盜官物故役無有不大費無有不廣此姦臣之所利本非先帝意也陛下始初聽政散遣修城役夫百姓皆歡呼鼓舞今欲終成前功但完之而已可也何必廣作無益以害有益乎又京城外門正門即為方城偏門即為甕城其外門皆用純鐵裹之此祖宗時所無有也甕城乃邉城之制非所以施于京師今東西南三靣偏門亦欲為甕城臣不知大臣以何見而為此謀也必以為備北朝也使北朝果渝盟南向大臣將坐守此以受敵乎春秋時楚囊瓦為令尹城郢沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城于郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待今大臣不修德政而急于城池此囊瓦城郢之計也唐神龍中張仁願為朔方總管築三受降城不置甕門曲敵戰格或曰邉城無守備可乎仁願曰兵貴攻取賤退守寇至當併力出拒敢回望城者斬何事守備退忸其心哉後常元楷代為總管始築甕門議者益重仁願而輕元楷今于京城為受矢石之備是不如張仁願之守邉城也自修城浚池以來議者皆以為無戎而城無寇而溝公宫此言不可不畏其北門甕城已就改之重勞臣欲乞降指揮東西南三靣偏門止為方城其濠廣濶可減三分之二稍正王城之體以惜民力以省國用取進止論李之純蔡京劄子臣伏聞知成都府李之純除户部侍郎知瀛州蔡京除寶文閣直學士知成都府臣竊以成都兼兩路鈐轄方靣之任最為要重祖宗以來尤慎付與聞之純寬厚簡靜蜀人安之宜且令終任或增秩再任今户部雖欲得人而逺方數千里休戚安危所繫亦不為輕蔡京素附會姦臣蔡確衆所共知雖有才能而年少輕鋭非端厚之士又故事自成都回者多為執政其次猶為三司使知開封府朝廷方當分别邪正如京者在所裁抑不宜崇長今進職逺帥則資任愈隆為他日大用之漸實未允愜伏望且令依舊如必欲召用之純乞别擇人付以逺方取進止二十日批出未得施行二十四日蔡京改江淮發運使李之純候任滿取旨再任論執政闕官劄子七月七日臣伏聞安燾以母病在假孫固以老疾求退聞燾母病已危惙固年踰七十必是筋力漸難支持臣竊慮執政又有員闕不敢不先事而言執政與人主同執天下之權其任至重必有才德公正無邪可保其不欺謾為天下所服者乃可登用不可止以勳舊亦不可止以科第也樞密院必得曉知邉事多所更歷之人門下侍郎資任最隆皆比宰相伏乞深留聖意慎加選擇陛下自去年以前所用執政多協人望其間雖非全德亦有所長可稱唯近日所用二人殊不類前後差除臣昨于簾前奏陳料陛下必盡記憶今若有闕不可更不得人重失天下所望也臣不勝區區之愚取進止乞留中再論城濠劄子十四日臣昨上殿論修城開濠欲乞改東西南三靣偏門甕城曲門為方城直門其濠廣濶可減三分之二稍正王城之體以惜民力以省國用今將兩月未蒙施行臣竊以京城為甕城尤為失體議者必謂可以威服四夷今使外國傳聞天子居枯甕城不足以示威乃所以啓侮此公卿大夫之辱也而大臣以此為守國之計臣愚竊所未諭况當國用窘乏之際計無所出而枉興土功為此無益之費不知紀極假使作之有用不惜費而為之可也今實無用其費豈不可惜又發掘既廣多發人塜墓害及幽明恐傷和氣此皆朝廷所當恤也伏乞檢會臣前奏早降指揮施行取進止論封樁劄子臣伏見近遣户部郎官往京西會計轉運司財用出入之數自來諸路每告乏朝廷詳酌應副其餘則責辦于外計今既遣郎官會計必見闕少實數若其數不多則朝廷可以應副若其數浩大不知朝廷能盡應副邪或止如常歲量事與之也若量事與之則朝廷既見其闕少之實而不盡與無以為説若盡數與之則恐他路援以為例朝廷視天下如一無有厚薄欲悉應副則力或有所不逮不悉應副則轉運司無以為計不刻剝百姓何所取之如此則陛下赤子必受其弊不可不深慮也又朝廷既委轉運使副以一路財計而不信其所言虛實必遣即官然後可信是使諸路使者人人有不自信之心每遇闕少則倚望朝廷遣官會計愈不任責臣以為此不可為後法欲乞自今諸路凡有告乏只委轉運司官會計保明聞奏如有不實即重行黜責其誰敢妄臣竊謂今諸路經費所以不足者由提刑司封樁闕額禁軍請受錢帛斛斗萬數不少此乃户部轉運司本分財計先帝特令封樁以待邉用蓋恐倉猝調發不及故為此權宜之制今朝廷方務安邉息民則封樁之法宜悉蠲除欲乞自熙寧十年初封樁以來已起發上京及今日已前未起發上京數目盡以賜尚書户部諸路轉運司以佐經費今天下諸路例多窮乏而畜其財于無用之所坐視困竭而不為救濟非均通有無足用裕民之政也緣自封樁至今巳十餘年一旦撥還諸路必稍紓緩其利害較然無疑伏乞早降指揮施行取進止貼黃臣恐議者或謂先帝以此備邉今不當變改臣恭聞先帝嘗有弛張之議蓋自古權宜之法多不可久行時異事殊則後人必有更張三代以來無不如此若張而不弛不唯無以濟國家之急亦非先帝聖意論常平劄子二十日臣竊以當今天下之患在于公私俱無畜積無以待水旱凶歉一時不雨則民飢饉流亡昨春夏旱京西陜西艱食尤甚唐鄧人民相食遺棄男女流離道路其存者食犬彘之食飢民羣行劫米坐法配流者係纍相屬幸而得麥民復有生望故大盜不作耳然轉于溝壑與配𨽻逺方者巳不可勝數仁聖在上豈不哀閔而為之計慮哉夫以數月不雨適當青黃不接之際民巳如此若不幸復有方二三千里之水旱將何以救之自中夏以來雨水不至過多秋成可望諸郡雖有被水災之處然約計之收熟之處必多年榖稍豐則公私逋負督迫民間速欲得錢無由貯積必至甚賤此農民所以豐凶皆困也自非朝廷廣謀收糴以時發斂則無以平糴濟民今諸路提刑司積常平錢猶多竊恐自罷散青苖錢以來常平之法尚未修復如舊臣愚欲乞速降指揮諸路提刑司乘今秋豐稔榖賤之時盡以所有之錢增價收糴使不至于甚賤傷農來春榖貴則減價出糶使不至于甚貴傷民若止以常平錢收糴恐亦未廣陛下誠能出內庫金帛數十萬以為糴本専以備水旱凶荒發斂以時則官本存常而民被惠澤無窮濟民之命無大于此祖宗置內藏庫本以備軍旅非常之用仁宗嘗出錢一百萬緡以助常平糴本此仁恩所以深結于民心也夫財出于民復以濟民但使民存不至流亡則今年散之明年復有何患乎無財也前年冬大寒陛下出錢十萬緡散之窮民民苦于寒陛下不忍坐視其死捐以與之誠知民為國本不可不愛惜也况糴本常不動而可以利民止是以內庫之錢借之外路又有先朝故事何憚而不為乎如以臣言為然乞早賜施行取進止再論封樁劄子二十三日臣近上奏乞以熙寧十年以來諸路提刑司封樁闕額禁軍請受錢帛斛斗悉歸之尚書户部諸路轉運司以佐經費以紓困急臣竊以當今之患在于天下空虛朝廷不可不為之計封樁之與經費均出于民皆陛下一家之財也茍可以利國何所愛焉譬如移之于東而還之于西出之于內而歸之于外也昔唐之制天下財賦皆納于左藏庫太府四時以數聞尚書比部覆其出入至代宗之時租賦悉進入大盈內庫以中人主之天子以取給為便遂不復出以天下公賦為人君私藏有司不得窺其多少國家不能計其贏縮殆二十年及德宗即位宰相楊炎頓首于上前曰夫財賦邦國之大本生人之喉命天下理亂輕重皆由焉是以前代歷選重臣主之猶懼不集往往覆敗大計一失則天下搖動先朝權以中人領其職豐儉盈虛雖大臣不得知則無以計天下利害請出之以歸有司如此然後可以議政德宗乃詔凡財賦皆歸左藏庫炎以片言移人主意議者美之以炎知為相之體德宗知為國之務也今封樁之法未至如唐之大盈陛下聽言納諌逺過于唐之德宗若大臣有楊炎之請陛下豈有不從之者乎昔先帝有經略四夷之志是故别貯以待用今陛下垂拱守成志于無為畜聚于此將安用之昔漢髙祖創業老于兵間日不暇給文帝躬修儉節勸課農桑則髙祖之政文帝有所不用也武帝驅攘戎狄無歲不征昭帝輕徭薄賦與民休息遂罷鹽鐵議𣙜酤宣帝總核名實選用郡守則武帝之法昭帝宣帝有所不用也臣前所謂時異事殊則後人必有更張自三代以來無不如此非獨漢唐也今諸路窘乏不可不救若其計窮豈免掊克是奪之于此而取之于民也惟陛下無疑于改先帝權宜之制則天下之民幸甚取進止再論常平劄子同日臣竊以為國之本在于務農務農之本在于貴穀舜咨十二牧曰食哉惟時洪範八政以食為首孔子曰所重民食畜積者邦國之大本生民之大命也臣伏見纍年以來天災流行年穀不熟昨春夏之交天久不雨陛下憂勞昃食于上大臣惶恐請罪于下豈非以倉廩空虛民無所食盜賊並起將有不可知之變哉一朝得雨報賽神祇則君臣釋然慶會不復以民生為念矣夫歲之有豐凶天之常也豐年常少凶年常多水旱之災堯湯所不能免然而國不困民不亡者有畜積以為之備也昨春夏未雨之時民已無復生理幸而得麥出于望外豈可常思僥幸天災之不成也臣訪聞諸路今秋可望大熟民間不唯速欲得錢必至甚賤又小民不為逺慮一熟則輕賤五穀粒米狼戾古之聖王知其如此是故操斂散之術以權之管子曰民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重輕重之權在上則其利不入于兼并之家而農民常得其平此所以家給人足也至于衰世豐不知斂凶不知散故其政荒其民流孟子曰狗彘食人食而不知檢塗有餓莩而不知發如此者其國幾何而不亡也今天下背本趨末民惟視上之所好若朝廷以農為急乃可以使民務本黃金珠玉飢不可食寒不可衣然而人貴之者好之者衆也誠使貴五穀而賤金玉則民豈有不以榖為重者哉布帛不可一日而闕亦皆人力之所為至于五穀天不生地不長則非人力所能致也昔梁武帝享國幾五十年江南久安風俗奢侈不務畜積侯景之亂連年旱蝗富民皆懷金玉衣錦綺相枕籍而死唐末髙駢亂淮南揚州米斗至直錢五十千皆史册所載古有此事安知來世之必無也今夫夏則畜炭冬則藏氷凡民皆能知之至于豐年則不知為凶歲之備蓋以五榖為常有而輕之耳古人旱則備水水則備旱豐登則備凶歉知天時之有必至也惟陛下留意于務農貴穀修常平之政以厚天下取進止范太史集卷十五

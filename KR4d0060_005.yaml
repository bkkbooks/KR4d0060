body:
  text: 范太史集卷五宋范祖禹撰表狀劄子乞避親狀六月八日右臣伏見戶部尚書韓忠彥已除尚書左丞緣臣妻是忠彥妻之堂妹於條合行回避謹録奏聞伏候敕旨十二日內批特不許回避不得為例上殿乞避親劄子十六日進呈延和殿臣近奏乞與左丞韓忠彥避親準尚書省劄子奉聖旨特不許回避者臣竊見近嵗言事官與執政有親不以戚疏近逺例皆回避今蒙陛下待以不疑在臣愚分尤難安處伏望聖慈特依近例許臣回避同吳司諫上殿宣諭云卿等公心必不為親戚不言且為官家文字不須進入辭免中書舍人狀七月八日右臣準閣門告報已降告命除臣中書舍人者臣蒙陛下擢任諫職未及兩月曽無毫分之補職事實未舉修夙夜以思未知所處今蒙進擢西省華要之職在臣愚分深不遑安兼臣自去年蒙恩除起居舍人凡四次辭免今年三月蒙召試及免試除職亦四次辭免前後不避煩瀆天聽實以文字不敏不敢當書詔之職今臣愚執與前無異伏望陛下天地之恩察臣纍辭出於至誠特賜追還告命臣無任惶懼俟命激切屏營之至辭免給事中狀十月八日右臣準閣門告報已降告命除臣試給事中者聞命震恐無所容措臣竊以門下封駁之職最為要塗比虛其員蓋重此選臣自居言責曾無禆補萬分之一今超越西垣擢置左省臣不唯才識愚陋所不敢當在於義分亦不遑處伏緣臣近上言回河不便乞罷修河司實繫生民休戚數路安危未蒙朝廷辨别臣之所言是非若臣言是乞賜施行若臣言非即當顯黜而論列未及纍日遽蒙進官由臣非才不能稱職內省愆咎唯俟譴誅豈敢貪冒復當遷寵伏望聖慈特賜追還新命除臣一外任差遣二十三日臣近奏乞追還除臣試給事中恩命除一外任差遣準尚書省劄子奉聖旨不許辭免者睿恩深厚天地難踰臣義有未安敢避煩瀆伏緣臣近論回河不便乞罷修河司臣所引先帝詔書及陛下昨降罷修河司指揮及中外人言皆以為非便臣不知大臣何以止信一李偉之言遂不用先帝詔書及却改陛下先降指揮一切不恤人言而無故興大役動大衆困擾數十州生靈將來河不可回民不堪役何變不有何事不生為無窮之費又有無窮之害而章奏才出未及纍日遽蒙優遷臣竊惟陛下設置諫官責之以言欲得其忠益若不然其言而復進其官將何以來天下鯁直之論亦非朝廷黜陟之典諫官以言責事陛下職在於救正若忘其職業而唯貪寵利陛下雖不以為罪臣亦何以勝中外四靣之責哉伏望聖慈特賜辨别臣言之是非然後議其升黜則臣之幸所有告命不敢祗受三二十日右臣近兩具奏辭免除臣試給事中恩命準尚書省劄子奉聖旨依前降指揮不許辭免者螻蟻之誠未回天聽伏念臣入侍經幄于今四年擢居諌垣及此纍月毫分無補夙夜不遑遽被誤恩進升左省名品加峻班秩增隆人臣事君誰不求寵臣以有言不效得罪為宜是以倣徨未知所處伏望聖慈特賜追還告命除臣一外任如朝廷姑務含容即乞改授臣京師一間慢差遣二十一日內批依前降指揮不許辭免二十三日受告謝給事中表言責無補宜加詰誅寵典惟行乃被褒進辭不獲命以榮為憂臣聞帝舜命龍作納言夙夜惟允仲山補王之衮職喉舌是司門下之官蓋本於此號令之所出納政刑之所慘舒先帝董正羣司分置二省封駁之任選授尤艱二聖並明萬邦承式職業粹于羣下治亂在于庶官臣以庸虛入侍勸講謬塵法從之末濫備爭臣之聨曾無藥石之言上負耳目之寄遽從西省擢處東臺此蓋伏遇皇帝陛下大學日新至仁天覆淵默守道埀拱視成慮一二之萬機差毫釐於千里罔兼庶慎自爾師虞黎獻共為於帝臣羣僕交修於后德不遺菅蒯俾效涓塵謹當風雨不渝氷霜自厲庶竭餘生之力上酬洪造之私謝太皇太后表備員諌省曾無補衮之勤進職瑣闈誤被出綸之寵祗膺褒序深積兢惶伏念臣才不逮人學非造理惟知竭盡以事上不敢低回而愛身進偶休明擢升侍從濫處七人之列輒希五諫之功終非藥石之良詎有涓埃之益復因人乏冒進官榮升東掖之華資管納言之要地恩無虛授禮有固辭尚不置於嚴誅終莫回於成命靦顔而受居寵惟危此蓋伏遇太皇太后陛下德協勛華功齊任姒建大公而御極守至正以治繁登進羣才緝熙庶績乾坤至大曲成物以無遺日月有明在容光而必照顧臣孱瑣亦預采收益堅匪石之心庶效捐軀之節講筵乞避親狀五年三月二十二日右臣伏見新除臣叔尚書吏部侍郎百祿兼侍讀臣竊以叔姪並侍經筵近世未有此例於臣私門實為榮遇在臣愚分豈敢遑安伏望聖慈許臣回避特罷講職二二十五日右臣近上奏以臣叔百祿兼侍讀乞罷臣講職準尚書省劄子奉聖旨不許回避者臣竊惟陛下置講讀之官以備顧問若稍涉物議則無以輔導聖德今臣叔姪並侍左右求之故事未有此比豈敢貪榮以自取戾伏望聖慈特許回避三四月一日右臣近兩具奏以臣叔百祿兼侍讀臣乞罷講職準尚書省劄子奉聖旨依前降指揮不許回避者臣伏見太學博士吳師仁德行純懿經術淵深修身慎獨非禮不動朝廷起之布衣授以學職宜在左右敷陳前訓伏乞罷臣講職擢用師仁稽之士論必以為允敢望聖慈特降指揮乞避親狀五月二十六日右臣伏見司馬康除左司諫臣有女許嫁康之子承奉郎植於今月二十四日已行定禮準敕官員親戚職事相干並回避今臣與康門下後省及講筵所實録院並職事相干合回避伏乞罷臣職任以協公議乞免館伴狀六月十八日右臣今月十八日閣門告報已降敕命大遼國賀坤成節人使到闕差臣充在京館伴使者伏念臣久苦脾胃之疾經年不愈造朝供職雖粗可勉強竊恐應對使客以病闕事伏望聖慈矜允特賜改差所有敕命臣不敢祗受依奏乞郡狀七月二十四日右臣輒傾愚懇干冒宸嚴仰恃矜容未即誅譴伏念臣自去夏傷冷得脾胃之疾經涉一載有加無瘳又積年苦暑暍之病重以腹疾殆不能勝近纍在假曠廢職業緣臣賦命羇薄受才拙囏誤被奬擢叨塵侍從寵祿已過災病益侵况臣入官以來止為試銜知縣一任自熙寧後専以修書為職未嘗履歷州郡官政民事多所未知伏望聖慈察臣悃誠憫臣尫劣特除臣京西一間郡使之自效因得休養疾病若幸痊愈未填溝壑誓竭犬馬之力圗報天地之恩二八月一日右臣近上奏乞京西一間郡自效因得休養疾病準尚書省劄子奉聖旨不允所乞者臣私懇迫切不能自巳再瀆天聽無所逃罪伏念臣識智凡近學術疏淺陛下過聽誤加收擢入侍經席于今五年記實史闈亦既再閏臣非不知講書將畢修史垂成臣子之心誰不欲久處朝廷長侍左右臣實以脾疾害於飲食氣力羸劣今已彌年竊恐向去更難支持遂成膏肓不愈之疾况門下省經筵實録院皆不可以瘝官曠職數在假告豈敢遑安伏望聖慈察臣至情實非矯飾早賜俞允除臣一郡貼黃如蒙矜允欲乞差臣知襄州一次三四日右臣近以疾病兩具奏乞京西一郡準尚書省劄子奉聖旨依前降指揮不允所乞者睿恩深厚天地難踰非臣隕首所可上報輒瀝危懇重干天聽臣以朴愚久侍經席嘗忝諫職進擢東臺曽無絲毫禆益聖德素餐尸祿為罪已多况復疾疢嬰纒心力減耗大懼廢職而煩刑書伏望陛下曲垂父母之慈不違螻蟻之志特賜矜允除臣知襄州一次乞解給事中狀九日右臣近三上奏乞京西一郡準尚書省劄子奉聖旨依纍降指揮不允所乞者仰瀆天聰每煩睿訓震悸隕越無所自容臣雖疾病虔遵詔旨未敢更乞外任輒有愚懇冒昧陳聞臣伏見仁宗皇帝天聖四年初讀唐書侍讀宋綬乞解勾當三班院以専講勸章獻太后許之神宗皇帝治平四年仁祖實録將成提舉韓琦奏修撰王圭權免學士院諸雜文字吕夏卿宋敏求亦免舍人院輪直専意筆削遂成大典今臣非才豈敢跂望前人而兼門下省講筵實録三職比之同輩過為僥幸加以久病心力俱耗實恐隳廢職業以重罪戾伏望聖慈矜察特解臣給事中之任止令兼講筵實録二職或乞依孫覺近例領在京宫觀一處庶竭愚慮少禆聖學萬一仍得専精史筆蚤成先帝一朝大典臣不勝幸願二十四日右臣近奏乞解給事中之任乞供講筵實録二職或乞領在京宫觀一處準尚書省劄子奉聖旨令臣權免簽書給事中文字候實録書成日依舊者聖恩隆厚曲賜優容天地大德未知所報臣以非才兼領三職罄竭愚短非敢避事止以久病心力減耗雖欲勉強實恐不逮是以冒昧陳情今蒙詔旨權免簽書在臣之私則為僥幸然於事理深所未安伏緣今兩省職事官與昔日知制誥之類職名不同臣豈可居其官而不治其事受其祿而不任其責臣昨奏援引王圭吕夏卿等故事蓋以前輩猶須専一乃得成書臣以疾病止欲比附解罷一職宋綬但以進讀猶許解三班院今講筵實録於臣疏拙職事已不為少伏望聖慈特解臣給事中除一在京宫觀差遣臣願畢力以供二職螻蟻微誠乞賜矜察纍瀆天聽實非得已臣無任惶懼俟命激切屏營之至辭禮部侍郎狀六年九月二十二日右臣準閣門告報已降告命特授臣試尚書禮部侍郎者臣竊以春官亞卿省部清選必得博聞強識之士逹於禮樂制作之原乃可以稽合典常折中論議居是職者古難其人伏念臣學術迂疏識慮卑淺誤被簡拔寖服顯休擢處東臺徒更嵗月雖殫薄力無補萬分加以氣耗早衰體羸多病坐慙尸祿深懼瘝官惟襆被以俟行冀守麾之得請未從譴斥尚荷兼容敢謂眷知復加遷寵伏望聖慈回乾坤之施察螻蟻之誠特寢過恩俾安愚分改授臣一間慢差遣所有告命未敢祗受謝禮部侍郎表備員左省久塵夕拜之班賦政中臺進二春官之長避命弗獲居寵為憂臣竊以舜命九官秩宗典禮周分六職帥屬佐王肅恭神人建保邦國欲稱兹任實難其才伏念臣識智冥頑術業淺陋猥緣末學誤被聖知入侍經帷恍已更於六嵗進參法從方僅及於三秋徒懷愛日之誠曾乏適時之用報國已窮於薄技竊祿實非其本心訖無橫草之勤矧有負薪之疾宜絀居於散地乃升列於清曹此蓋伏遇皇帝陛下懋建大公緝熙庶政責交修於近輔分小治於羣司堯帝欽明咨百工之允理文王陟降思多士以圗寧特收一介之微俾預六卿之亞仍加藩飾以示寵光臣敢不夙夜惟寅服勞匪懈風雨如晦有隕不渝庶效涓埃仰酬覆載舉自代狀十月三日右臣伏覩左朝奉大夫直集賢院兼侍講吳安詩識慮清逺學術淵深嚮在諫垣獻言鯁切入侍經席進講詳明臣實不如今舉自代謝講尚書徹就東宫賜燕表古文畢講徒殫嵗月之勤聖學又新益廣乾坤之業式頒燕衎昭示惠慈竊以虞夏商周之書出於孔氏之壁典謨訓誥之作備見聖人之心歷代之所寶藏人主以為矩範載之行事能自得師恭惟皇帝陛下稟軒皇敦敏之資法堯舜欽明之德順稽古道逺監前王日御西清躬勤典學九仞俄成於覆簣三年遂見於通經優寵儒臣載加禮食肴核惟旅並秩於周筵絲竹之音如聞於魯宅臣等幸陪勸講每愧空餐適當肄業之終更被屬厭之賜謝太皇太后表經幄侍言方訖帝王之大訓宸慈錫宴實為臣子之至榮荷天度之包容叨特恩之厖厚恭惟太皇太后德凝坤載治協離明謹律度以誠身正端源而馭俗申命博帶之士入講華林之庭竊觀聖德之日新殆與古書而契合淵默臨朝則體虞舜無為之化恭儉好禮則稽召公敬德之言庶績其凝九功惟敘固將著見於實效非徒紬繹於多聞臣等妄陳口耳之知曽乏涓塵之補終篇甚幸示惠過隆金奏宣和聽鈞天於夢寐皇華命侑滲湛露於蕭稂深惟稽古之勤罕及逢辰之幸致君有道當取於百篇報上無窮更祈於萬夀進神宗皇帝實録表竊以書契之興以紀天下之事典謨之作乃見聖人之功欲垂法於將來在屬辭於信史適當際會預備討論恭惟神宗皇帝爰自東宫暨升大位孝行同於舜帝友道比於文王極典學之髙明勤治功於旰昃乾健不息日照方中將追三代之風遽損百年之夀惟規摹之宏逺有記注之浩繁太皇太后陛下保佑丕基布昭明德皇帝陛下纂隆下武駿惠先猷申詔儒臣裁成大典臣等誤被聖選愧非史才徒廣記以備言實殫精而竭慮久淹嵗月僅就簡編無以發揮經緯之文髣佛緝熙之烈將陳旒扆若蹈氷淵其新修實録二百卷事目十卷謹隨表上進乞梓州表元祐七年五月十八日臣某言入侍經幄七改嵗華違去鄉邦再終星紀輒傾丹赤上瀆髙明伏念臣生本遐方才非大器猥緣末學獲近清光荷天度之兼容竭秋毫而無補誤膺寵典寖歷顯塗恭遇陛下盛德日新多能天縱藴神明於默識集聖智於大成所宜旁求俊傑之才上奉緝熙之學顧臣淺陋何所發揮大明方中宜收爝火巨浸無際奚取細流况臣氣耗早衰體羸多病目視昏近幾畫字而不成骨節支離殆勝衣而弗克精力殫於簡册夢寐役於松楸恐填壑之無時唯首丘之是念伏望皇帝陛下回乾坤之施察螻蟻之誠特假守於方州俾暫還於里社儻餘生之未泯庶九死而可酬敢望聖慈特除臣知梓州一次乞梓州劄子二十六日臣近上表乞特除臣知梓州一次伏蒙聖恩賜詔不允仰煩謨訓丁寧誨諭震懼隕越無所自容臣子之於君親義無隱情故不敢避再瀆之罪輒復冒昧陳請臣以庸虛久侍經席積日纍月已涉七年陛下天縱聖神日躋睿智髙明之度非可管窺臣之所學竭盡無餘肺肝底裏皆可鑑照顧臣淺陋中無所有繁言復語無禆聖學陛下方躬蹈堯舜壼奧日深宜得儒學之宗道德之老延之西序執經於前敷陳墳素發明聖藴一辭開折百慮洗然乃可以益新輝光奉承濬哲如臣之比實非其人加之疾病連年心力耗廢若不自揆貪戀寵祿失之一發百發皆棄差之毫釐千里為謬陛下雖欲保全庇護亦不可得伏望聖慈以其久在左右特賜矜允則臣之餘生今日以往皆陛下之所賜也臣無任惶懼懇切之至二六月七日臣近上奏再乞知梓州一次準尚書省劄子奉聖旨依前降詔書不允所乞者天髙聽卑未能感動再三為瀆無所逃刑臣伏思元祐以來與臣同時勸講之臣程頥以人言罷黜孫覺病廢死於揚州顔復司馬康皆死京師而臣抱疾纍年日加羸劣形骸若此福祿可知故臣願及罪戾之未聞疾恙之未廢得郡而去一展先臣丘墓庶幾死無遺恨若未先犬馬填溝壑則臣之報國猶有日也今儒學之英皆在左右宜更詳延俊德旁求巖穴博問遐觀益廣聰明如臣已陳之迹已試之效陛下所悉無補可見伏望聖慈察臣愚誠早賜俞允辭免翰林學士第一狀二十日右臣準閣門報已降告命除臣翰林學士者臣近三奏乞知梓州未奉俞允方欲再露誠懇干瀆聖聽忽蒙遷授恩出非常聞命震恐不知所措臣竊以學士近職侍從之首文章議論儒者所宗必得天下英材聲稱第一乃可以厭服人望為國光華臣以朴愚獲侍左右才力綿薄無所堪任使之解經述史粗能勉強至於文詞實非所工是以前不敢當書詔之職已蒙聽許今兹禁林尤為極選重以久嬰疾病形神俱耗豈可強顔秉筆貽朝廷羞在臣之義必難冒處伏望聖慈特垂天恩追寢成命檢會臣纍奏特除知梓州一次二二十五日右臣近上奏辭免翰林學士恩命乞差知梓州伏蒙降詔書不允者睿恩隆厚聖訓丁寧在臣之愚何以堪此臣不惟文學無以過人前已辭書詔之職近又纍乞鄉郡義難祗受兼於國朝故事有不可者伏緣臣叔百祿見任中書侍郎臣竊見仁宗時翰林學士王洙以兄子堯臣參知政事避親改侍講學士昨蘇軾除學士承旨亦以弟轍執政懇請出知潁州今中書政本樞機之地無不統攝臣若就職理實有嫌伏望聖慈許臣依王洙蘇軾近例避免臣未敢更乞川蜀逺州欲乞除臣京西一郡自效誓畢餘生以圗報稱三二十八日右臣近兩奏辭免翰林學士恩命準尚書省劄子奉聖旨依前降詔書指揮不許辭避者稽違詔命邦有常刑然臣子之情不敢不竭盡於君父臣竊以避親故事簡䇿具存方陛下懋建大公以先天下而臣豈敢貪冒榮寵晏然自居雖無人言豈不內疚此臣所以不避誅責至於必辭也伏望聖慈察臣肺肝實非矯飾追還新命特除臣京西一郡誓殫犬馬之力圗報天地之恩所有告命不敢祗受四七月七日右臣近三奏辭免翰林學士恩命乞京西一郡準尚書省劄子奉聖旨依纍降指揮不許辭避者瀆煩天聽非止再三罪不容誅義非得已臣竊以侍從清切莫如禁林儒者之榮孰不願此况臣一門自叔祖臣鎮叔父臣百祿前後相望今臣復蒙遷授是為三世迭居此職臣雖至愚豈不思上奉聖神之眷知下為門戶之光寵力欲祈免殆非人情然臣所以不避誅責必辭不已者伏以朝廷有避親之法實關盛衰蓋將垂永世之規非特為一人之計逺則仁祖之世故事甚明近則神考之時韓維亦避兄絳出守藩郡今陛下訓迪在位未嘗不以至公然則祖宗故常君臣所宜共守臣豈可靦顔居職隳廢舊章天下之人不可户曉竊恐上纍朝廷無私之舉而於臣有貪得幸位之譏此臣之所不敢處也伏望聖慈矜察特賜收還告命除臣京西一郡他日任使臣不敢辭報國之心死而後已范太史集卷五

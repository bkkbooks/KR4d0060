body:
  text: 范太史集卷四十四宋范祖禹撰墓志銘資政殿學士范公墓志銘紹聖元年四月詔以資政殿學士太中大夫知河陽范公知河南府留守西都既拜命閏月壬申以疾薨于河陽府居之正寢年六十有五訃聞上輟視朝一日賻恤有加以右銀青光祿大夫告公第其年七月已酉葬河南偃師縣洛南鄉土中村天池原范氏之先本家長安唐末避亂徙蜀為成都華陽人公諱百祿字子功曽祖諱璲贈太保祖諱度贈太師考諱鍇以衛尉寺丞致仕贈太尉曾祖妣張氏祖妣李氏龎氏妣郭氏追封嘉漢唐昌四國太夫人太尉五子先公中大夫為長公其季也少頴悟秀拔力學不舍晝夜季父忠文公文章為一世所宗太尉攜公入京師忠文竒之曰廊廟器也年十六游太學諸生少之已而文詞聲名在千百人上衆乃驚服舉進士中第釋褐為應天府楚丘主簿渦河役民夫數千人公拊循愛養不一月工畢縣人德之相與為佛事三日為公謝以薦者為懷州武德令丁太尉憂服除調綿州龍安令遷祕書省著作佐郎舉才識兼茂明於體用科治平中京師大水制䇿降問時執政方議尊濮安懿王公對以五行傳簡宗廟廢祭祀則水不潤下昔漢孝哀尊共王而河南潁川大水孝安尊德皇而京師及郡國二十九大水孝桓尊崇皇而六郡地裂水涌井溢又曰大宗隆也小宗殺也天地宗廟之祀重也門內之私輕也宜殺而隆之宜輕而重之則不得於先王之禮不得於先王之禮則不得於人心不得於人心則不合於天意此變異之所從來也又陳十二事以勸上德考官第䇿入三等英宗親覽嘉嘆欲不次用之為執政所惡遷一官以祕書丞知彭州濛陽縣國朝制䇿三等惟吳育蘇軾及公凡三人焉丁昌國憂終喪知開封府咸平縣御史中丞鄧綰舉公御史召對固辭神宗從之擢提㸃江南東路刑獄發運司應詔于江池等州市木修金明池橋梁郡縣以戶等科之民以為患公奏曰陛下勤儉之德出於天縱今有司乃以方土所無有而求市於民恐官吏督責或有不堪其求者矣詔即罷之徙利州路閬州兩稅外有新稅自唐僖宗優山南免其稅移之閬中由是山南輕而閬重公請免新稅歸山南利守用武臣有周永懿者以贓虐敗公又言至道前文臣知利州其後以右職兼監益利兵轄文龍邊界令領郡政名實兩失乞選文臣知州而武臣監路分兵則名分正事任一皆如所請瀘夷犯淯井官軍覆敗選部使者經畫其事徙公梓州路加直集賢院既而檢正官熊本為察訪専節制使者聽于軍所羅箇墓夷數千人窮蹙請命禆將賈昌言貪功欲屠之公諭以殺降之禍未聽亟見本謂之曰活千人者子孫必封彼以窮歸我而君將殱之乎本矍然遣屬官程之元持檄畀昌言受其降召還同知諫院嵗荒民流公三上奏乞以清閒之燕召政府大臣詰其所因使各書以對所以勞徠安輯之䇿又言民方困苦而定令未已有手實告匿之法有保甲給請之制臣謂治務有先後理勢有緩急今不先安民而亟欲行法前日之令固有未便設復為此而至于擾則周之餘黎不殆乎靡有孑遺也哉乞以臣前後奏疏諭大臣使講求今日之急務收還法令之未便者以救將死之民公在言路不為訐激朝廷小事有所不言所言多天下大計上亦以是知之時郡縣常平或不知發或增價與民爭糴或自為閉糴之令河南開封諸邑不恤荒凶而督纍年逋負決河淤田而平原沃壤反有浸灌之害公悉以聞又論手實法曰造簿手實告匿有賞為是法者欲民之均推而行之恐必不如法意而至于騷動此生民治亂之所繫也户令雖有手實之文而未嘗行蓋謂使人自占理必不盡而明許告言則家家有告訐人人為仇怨禮義廉恥其可得乎設若役錢由此暫均而使四維乖失所損孰大其後手實竟罷常平法行郡縣吏有詿誤輒以罪去公奏曰立法之始既要之以謹嚴成物之終宜濟之以寬易請薄其罪使得自新五路兵置三十七將選拔或非其人事任過重且許辟召布衣為參謀公上疏曰今大將未命而已除將佐有以勳䕃恩澤用有以瘝敗收有未嘗歷邊任經戰陳有以故羣盜得官而才無聞有碌碌無他能適以幸㑹有微功而遷官願詳核其素若功與夫舉者當否之實校其所長參而伍之又列其甚無狀者十有四人姓名以上且曰付之新格責以訓練給銅符以備差法賜鎧甲以寵軍容所在長吏不得而預然匪人十數粗暴之才雖一夫之勇但可為人指蹤而未可蒞衆也况又委之辟使臣許以察官吏小人處此必有乖忤識慮無取紀律不明五千之兵何所不至乞依畿縣舊制將佐専部分教閲餘即付之州縣而罷參謀上善其言皆見施行選人鄭俠上書言事語狂悖付諫官御史雜治公請對奏曰連逮者衆或可寬宥願諭治獄之臣戒其延蔓帝覽奏色厲曰俠詈朕公對俠狂生安足為陛下輕重以天地之造誠能容貸適足以增重聖德帝改容嘉納詔趣具獄執政有忌公者絀諫官班以沮之公奏曰國朝兩省官不必正員行其事則立其班所以明分職厲官守今修起居注直舍人院則綴兩省知諫院則絀而不與詔如舊執政愈不悅㑹公與御史治趙居獄妖人李士寧嘗以仁宗御製詩贈居母有后族意及許與刀飾以龍方訊鞫而宰相素與士寧厚善御史徐禧言公鍛鍊士寧罪公奏士寧熒惑愚婦狂童以致不軌當誅無赦禧縱出有罪以媚大臣不可以任風憲朝廷以御史知雜樞密承㫖辨曲直主者直禧公坐落職奪一官監宿州酒稅久之上察其非罪就除提㸃淮南東路刑獄徙知唐州官制行為司門郎中遷吏部元豐七年除起居郎明年召試遷中書舍人司馬溫公議復差役法公謂溫公曰熙寧初某為咸平縣役法之行罷開封牙前數百人而民甚悅其後有司求羡餘務刻剝為法之害今苐減出泉之數以寬民力可也溫公不從及議郡縣吏因差役受賕從重法加等配流公押刑房固執不可且謂鄉民被徭役今日執事而受賕明日罷役復以財遣人既以重法懲之將見當黥衣赭充塞道路矣溫公曰微公言幾為民害遂已之是年冬使遼接伴蕭祐曰南朝皇帝何以樂公曰崇髙富貴復何言哉又曰打圍飛放否公曰無有也上日出視朝近臣奏事百官各以其職進已而御便殿召儒臣講讀經史燕息則覽中外章疏以修政事此所以為樂也祐嘆服次㑹同館說儀制公為右番國信使引左番而不問皇帝聖躬公曰儀未盡也何獨問太皇太后而不及皇帝必正之乃可館伴梁援曰此萬世法不可改公曰是豈可為法者耶反覆詰問敵屈而從之遂兩宣問使還權刑部侍郎有以强盜及故殺鬭殺情可矜者讞於朝法官援例貸免而溫公謂宜論死公請間言之溫公曰强盜可憫也殺人不死則法廢矣公以書辨之曰謂之殺人則可制刑而謂之不疑原情而謂之無可憫則不可今豫之死則二殺之科自是無可疑與可憫者矣天下之獄嵗以萬計如是而殺之則死者不亦多乎溫公復書曰鬭而救死尚可貸也因田稼而殺人牽牛蹊田奪之牛且不可况殺人乎此介甫鵪鶉獄也公又曰昔楚子滅陳而縣之申叔時惡其滅人之國而欲復之也故有蹊田之譬設有此訟不過還之牛而息訟矣今也初無殺之之心非若利于得牛而有之也遂置之死與還之牛豈不異乎恐遂為例則差之毫釐後將噬臍其可得耶溫公不能奪卒從之朝廷以公議獄持平真拜刑部侍郎先是元豐八年冬詔天下奏獄不當讞者案其罪有司重請讞斷刑峻密至有枉情以合法者公奏曰熙寧之令非疑慮與可憫而輒奏者免駮勘至元豐刪去之去年詔書不得用例貸配有不當即奏劾自是官吏畏罪不憚論殺因以元豐六年至元祐二年冬十月終死者貸者之數以聞明年奏獄門下省多駮正當貸者皆欲殺公屢以告不可退又與執政書論之執政不從大理官亦以書勉公從執政意公復書責之執政怒言于上有詔例在有司者收還中書置檢例官二人使議去取閲刑部大理所奏疑慮若可憫情法輕重之狀有異同各以上公自以不得其官三奏乞外任不許上疏極論其事疏奏悉如公請既宥諸囚而例復歸刑部自是中外奏讞無所避如執政前所欲殺者皆得擬例從貸免逮今八年其所活不可勝計矣遷吏部侍郎右選官冗纍嵗乃得調既赴官而宗室許占射成資即罷去為管庫者患之公奏請宗室員外置不獨恩厚公族且使在官無非次替移之怨時患員多無以注公檢索諸路久闕員而州不以報者百餘所亟補之人情悅服外選所以便逺官久而有僥幸公請用集注法人皆以為宜領詳定省寺敕令公患吏胥猥冗議加澄汰以白宰相宰相遽欲廢其半公不可曰失職者衆法必不行莫若以漸銷之自今犯法及死亡皆勿補不數嵗所減過半矣宰相不從於是胥吏之去者怨讟囂然至有棄妻子凍餒而死者吏額書成賜金帛公固辭朝廷從之初元豐四年河決小吳元祐初水官請於北京之南開孫村口引河還故道宰相主之朝論異同不決三年冬命公與給事中趙君錫同行視公歷東西二河觀地形究利害而東流髙仰北流順下河不可回中途即馳奏至黎陽閲舊牘得神宗詔都水使者李立之曰河決小吳東流故道已淤髙理不可塞宜勿復閉決口俟見大河歸納修立隄防公又以所得先帝詔書并陳之時宰相多以回河為便見公奏不悅既還尚書省以詔㫖問利害且謂大河東流為中國之險要自大吳決由界河入海既壞塘濼又界河淤淺則河必北流注敵界失險阻之限公奏曰塘濼雖有限河之名而無禦敵之實今之塘水又異昔時淺足以蹇裳而涉深足以維舟而濟冬寒氷堅尤為坦途如滄州等處商胡之決即已淤澱今四十二年迄無邊陲之警亦無人言以為深憂自回河之議起首以此為辭是欲動朝聽煩聖慮若謂河注敵中失險阻之限是大不然何者大吳初決水未有歸猶不北去今河流八年矣入海遄迅界河益深誠不宜過慮設有此則中國據上游北人豈不慮乘流而擾之乎自古胸奴入漢之路朝那蕭關雲中朔方定襄雁門上郡太原右北平之類無險而不入豈塘濼界河之足限也哉及進對二聖以公之言然退詣政事堂大臣曰河不北去可必否公曰纍章論列如之何不可又十數日而未有定議公再上疏極陳其不可且謂本朝河決必塞巳塞復決未嘗復回於故道也今河行大岯之西至于衡漳北過洚水至於大陸趨徒駭分注木門由閻官道㑹獨流口入界河東歸於海合禹之蹟前人欲為而不可得者也元豐以前未有回河之論八年以後乃有橫議王孝先俞瑾輩緣旁以自進爾臣既案視究見利害而大臣廷議踰月未決臣竊惑之况小吳之決先帝神幾睿斷不下堂而見萬里之外順天地髙卑之性知百川脈絡之理明詔中出藏在有司大略以故道淤髙理不可復更不修塞逺近心服人無異論今一孝先乃敢妄議乞罷修河司以省大費正孝先瑾之罪以明典刑疏入即降付外詰朝執政奏事二聖諭以亟罷河役詔下如公奏初欲為是役調夫費財其用不資縣官所不能給科率調發出於六路百餘州之民欲以冀幸不可必成之功而成之且有後災公獨抗權彊絀衆論其事乃寢以是為吏部久不遷五年三月兼侍讀五月除翰林學士時初詔經筵官邇英講讀畢留對公首進言分别邪正自古所難唯察言觀行考其事實所謂正直之人或天資亮直或家世忠義或有志報國或自立名節所謂奸邪之人或逢迎上意或希合權貴或性識頗僻或冀望寵利凡此二端其情非一不可遍舉於是疏其條目導人主以某事者為公正某事者為奸邪以類相反凡二十條願留聖意推此事類以觀人情則邪正可分而聰明無惑矣上深嘉納公每進讀凡所以啓迪人主皆仁義之意與夫前古治亂安危之迹其說以修身正心任賢容諫慎賞罰重守長勸農桑安邊恤民為要皆見於章疏至於造膝面啓必反覆陳之嵗旱以仁宗寶訓三事進且請詔臣僚直言得失罷五月朔視朝以避正殿詔太官減膳以示貶損又曰因災異求直言仁祖聖謨也陛下即位之始嘗降詔求言逮今五六年一日萬幾四海九州之廣豈無一夫不獲一事失當形于人言從而修之下可以感人心上可以消天變可不務乎髙麗屢入貢所在不無煩擾公奏待之之禮宜損于前俟其欲辭勿復留止且不遣報使使天下曉然知陛下以安逺為令德不以來逺崇虛名知元祐六年貢舉奏罷參詳官除龍圖閣學士權知開封府始視事留獄無慮千人公審核精敏未及月庭無留事凡為開封者多略細務公獨省民事如他州日閲牒訴五百號未盡五月盜賊畏爭訟息獄無繫者僚屬請以圄空言公曰千里之縣而無一人之獄此上德所格豈守臣之功耶固請不聽復召入翰林兼侍讀轉對援祖宗故事幸國子監謁文宣王召儒臣講說請上視學從之七年六月拜中書侍郎既輔政知無不為是嵗郊祀禮官議合祭以昊天有成命為言公曰先帝定南北郊辨天地之祀此三代之禮也奈何復欲合祭於圜丘乎昊天有成命乃祀天祭地皆歌此詩故曰郊祀天地亦如噫嘻春夏祈榖於上帝豈春夏亦合為一祭也哉三省樞府凡八人唯公獨為是說爭論不已公曰非天子不議禮諸公豈可輕變耶久之辨於上前宰執皆言范某之言禮經也然上始郊祀宜並見天地公乃已熙河帥范育纍奏鄂特凌古酷暴且久病族帳怨叛願降附乞招納河南八族開拓數千里之地坐獲數十萬之衆大臣欲從之公力爭言於上曰中國納夷狄之叛理固不順今鄂特凌古未有過溫錫沁輩叛否未可知若發兵應援先伐鄂特凌古降者不能必而無釁者先動矣大臣曰外事不可隃度姑使専之而責其成功公曰此雖漢武聞之亦不為也初公在翰林范育請以趙純忠節度青唐代鄂特凌古如拒抗即討之公奏曰彼自相殘以來求哀當從而綏之示我恩信此守在四夷之道豈可遣人刺候聞有離二遂選置蕃官而代之耶安得聽順而受代也臣恐邉臣之功未必毫髮徒啓夏國唇齒之隙狼子不伏之心及是再請公獨不從其後八族竟無降者而鄂特凌古恭順如前日育又奏進築舒策納密結中龍川三城大臣韙其謀樞府亦欲連書以上公曰此必爭之地我既城之賊馬時出居民豈得安全後欲棄之則城費已甚必不可與邊禍何時而息况版築之初蕃冦衝突勝敗未可知耶公於禦邊不欲生事上多開納水官隂為回河之計增隄防進緷掃公固守前議又奏曰水官壅遏北流嵗月既久洪流湍迅安得不激射奔赴東流而東流不能吞納為禍必轉大不數月東流決清豐復北入內黃而德清軍實被水患如公言公罷政之明年朝廷又命中書舍人吕希純殿中侍御史井亮采同案視亦無以易公之議距公初使凡八年右相蘇公稽留除書以言者罷公曰同省也責不可逭蘇公制下即待罪纍章請補外以資政殿學士知河中府徙知河陽河南寢疾薨士大夫知公者莫不哭之慟公天資純良內剛外和始筮仕慨然有經濟之意及在言職歷侍從位廊廟所言所行必窮盡義理好賢樂善以人才為急聞一善喜若已有性清約好施與自奉養如寒士而親戚族屬之貧者喪葬嫁娶必待而後具與人交始終如一立朝有本末要之至誠而已嘗語人曰吾於朋友未嘗為欺也况事君乎平生不畏彊禦故多忤權勢無左右之助及大用數可否事論議不少貶以是不朞嵗而罷好學終身不釋卷經術尤長於詩文章精醇典麗有古人氣格所著詩傳二十卷文集五十卷內制集五卷外制集三卷奏議十卷娶趙氏屯田郎中贈金紫光祿大夫宗古之女追封蜀郡夫人再娶宋氏職方貟外郎端平之女追封蜀郡夫人七子祖德右宣德郎勾當京東下卸司祖修右承務郎勾當嵩山崇福宫祖述右承奉郎勾當西京糧料院祖羲雄州軍事推官知開封府祥符縣丞皆謹厚而文祖德祖述屢薦試禮部祖羲登進士第祖和右承奉郎祖臨祖言未官皆幼三女長適鄧州司法參軍鮮于羣次未嫁孫男十三人澤湜瀷浹測洌淢渥濈滌液湒激女十一人前葬太學博士杜敏求狀公行事將上之太常史官諸孤請銘諸壙中祖禹少受學於公先公深友愛常曰汝季父所為皆可法上之視學祖禹與勸講邇英及公入侍祖禹固避不獲命父子先後讀講或同進對獻納左右公既輔政祖禹繼召為學士懇避得請公出藩上恩復申前命與公同奉內朝凡五年及出守陜將省公於洛而薨訃至何痛如之惟古之君子論撰其前人之美而銘之後世乃托杜君之狀取其繫朝廷大者傳信紀實不溢不誣哭而銘曰惟我范氏陶唐之裔自蜀成都世顯以儒公來造廷英祖親䇿言人所難帝奬其直入補衮職神考欽明蹇蹇匪躬帝諒其誠置諸左史以遺聖嗣乃贊書命乃議祥刑必本於仁必正於經河決而北朔方其咨二聖命公往視所宜行其無事惟禹是師敷文禁林入侍經幄辨别忠邪以禆聖學中書基命考慎其人登二宰司帝屬良臣公拜稽首惟艱于兹在始慎微庶終不墮事有可否惟獻替之秉義執德匪石不移入輔出藩四國其治天奪之年不究厥位有洛之南實惟土中刻銘幽宫以詔無窮范太史集卷四十四

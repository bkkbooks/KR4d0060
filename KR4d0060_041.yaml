body:
  text: 范太史集卷四十一宋范祖禹撰墓志銘長夀縣太君楊氏墓志銘家退翁居母夫人之喪將葬命其子太學博士彬以左奉議郎黎君持之狀請銘於太史氏謹托其實曰夫人楊氏眉州眉山人曾祖某祖某父某為州著姓母侯氏尤深浮圖氏之學諸講師聞其言皆暗然服自以弗及夫人年十九適家氏贈朝散大夫某其夫也大夫兄弟八人族大口衆皇舅治家嚴整每稱夫人曰吾家順婦夫人性仁孝謹甚雞初鳴立舅姑户外候侍婢問起居已乃趨中饋具飲食滌器皿必手所親睦娣姒怡如也待妾御未嘗厲聲色欣欣如也大夫事親孝居兄弟宗族間友愛夫人有助焉大夫既不仕退居東郊用窶狹二親喪畢分其器服夫人一不取及子朝請更守二郡夫人躬儉素衣至屢浣有敝衾家人請易之不許曰吾方安此卒不易猶其在東郊時也性好施約已以趨親戚之急其待遇之惟恐不至然未嘗伐其德日誦佛書以祝子孫雖寢食不廢自彬及餘慶幼時與俱卧起慈愛甚篤或誦書夜分夫人亦為不寐大夫捐館時夫人治家每夙興以待旦其居處語默皆有法度故子孫以文行稱於鄉黨仕於朝廷夫人之教有自已朝請所至夫人必戒以治獄務仁恕不可以喜怒輕重神宗祀南郊恩封長夀縣太君元祐五年正月某日終于第享年八十有二子定國即退翁為左朝請郎前知懷安軍女二人適孫圭程參孫彬左宣德郎太學博士孫女三人長適某次未嫁而卒次適某曾孫餘慶曾孫女四人七年三月合祔于大夫之墓銘曰天施無親惟彰厥善有淑諸幽必報於顯夫人居家孝敬溫慈仁以為德夀考是宜動則規矩言則教訓有子有孫莫不令問眉山峩峩江水湯湯福基慶源既厚且長宋君夫人史氏墓志銘夫人史氏成都人考諱遜以懿行稱於鄉黨妣張氏夫人溫淑莊靜事親至孝歸宋氏夫諱瑱以文學中鄉舉不第而卒夫人事舅中散公姑夀安郡太君盡婦道宗族無間言事夫以禮教子有法安貧處約未嘗愠嘆元祐四年正月乙亥終于里第年七十其年四月葬金沙合祔其夫四男子曰先曰觀曰允曰充二女子適宇文渭范祖義孫男三人女五人允薦於國學方寓京師求仕夫人訃至乃歸祖禹先妣崇德縣太君夫人姊也余顧念先妣即世而諸舅皆喪獨夫人存今亦亡矣允以銘為請乃銘以寄哀銘曰歸從其辟終古是宅瞻彼鮮原有敏松柏為善白首胡報之嗇子孫其昌視此幽刻同知樞密院趙公神道碑銘元祐三年四月登進輔臣以尚書戶部侍郎趙公為樞密直學士簽書樞密院事明年六月拜中大夫同知院事五年三月丙寅薨于位年七十有二訃聞皇帝太皇太后震悼趣駕臨奠哭之哀輟視朝二日賻襚加等贈右銀青光祿大夫諸孤奉喪歸盩厔詔遣使護之其年九月壬午葬孟兆社先塋中書侍郎傅堯俞誄公行而銘諸墓其孤又以狀請於太史氏將刻之碑祖禹竊惟元祐之初太皇太后保佑皇帝功格于天眷求老成經緯萬事凡所建置必視祖宗之舊與吾民之所欲是以海內歡欣震動頌詠聖德如祖宗時豈有他哉由用得其人也當是時公召自滄州不三嵗登右府人不以為速既在位天下想聞其風所言於上前者人不得而悉知其所可見者寬厚清靜息兵省刑民無勞役四方安枕公既沒而人皆嘆恨以為未盡其用也然則宜以是銘于碑公諱瞻字大觀其先亳州永城人曾祖贈太子太保諱翰曾祖妣昌國夫人王氏祖供備庫使贈司徒諱彬祖妣岐國夫人李氏考太子賔客贈太尉諱剛妣慶國夫人張氏自太尉始徙鳳翔今為盩厔人公少力學以行義髙鄉里登慶厯六年進士第初仕為孟州司戶參軍移河中府萬泉令以圭田修學校鄰邑之士裹糧而至改祕書省著作佐郎知陜州夏縣作八監堂書古賢令長治迹以自為監不煩刑罰而獄訟理父老至今稱頌之以祕書丞知彭州永昌縣築六堰均灌溉以絶水訟民以比召杜改太常博士知威州公以威茂雜夷獠險甚而難守不若合之而建郡于汶川因條著其詳為西山别録及熙寧中朝廷經略西南就公取其書考焉遷尚書屯田員外郎英宗治平元年自都官員外郎除侍御史上疏請攬威柄慎賞罰廣聰明更積弊帝嘉納對垂拱殿稱善久之詔遣內侍王昭明等四人使陜西招撫蕃部公言唐用宦者為觀軍容宣慰等使後世以為至戒宜追還使者責成守臣章三上甚激切㑹文彥博孫沔經略西鄙又遣馮京安撫諸路公請罷京使専委宿將夏人入寇王官慶帥孫長卿不能禦㑹長卿加集賢院學士公言長卿當黜賞罰倒置京東盜賊數起公請易置曹濮守臣之不才者未報乃求對力言乞追昭明等不則受顯逐帝為改容納之二年秋京師大水詔百官言事多留中公請悉出章疏付兩省官詳擇以聞帝從之先是以六月詔議追尊濮安懿王典禮公首上疏論稱親非是願與建議之臣對辨以定邪正章七上又與吕誨等合十餘疏既而皇太后手書尊濮王為皇三夫人並為后公杜門請罪翌日詔令速赴臺公懷侍御史敕告納帝前乞去職詔還其敕告公又上疏以死爭之劾議臣與中人交結惑母后降手書反欲歸過至尊自掩其惡其十月假太常少卿接契丹賀正使入對延和殿帝問濮園議公曰陛下為仁宗子而濮王稱皇考即二父非典禮帝曰卿嘗見朕言欲皇考濮王乎公曰此乃大臣之議陛下未嘗自言也帝曰此中書過議朕自數嵗先帝養以為子豈敢稱濮王為皇考耶公曰臣請退諭中書作詔以曉天下之疑是時連日隂晦帝指天色示公曰天道如此安敢更褒尊濮王乎朕意已決亦無庸宣諭公曰陛下祗畏天戒不以私妨公甚盛德非臣愚所及帝重違大臣又嘉臺官敢直言不決者久之㑹建議者言於帝以為難與言者並立於是吕誨等皆罷公使還待罪乞與誨等同貶不報閣門趣公入對復懇請帝曰卿欲就龍逢比干諫爭之名乎孰若學伊尹傅說留以輔朕之不逮公惶恐退上疏曰臣何敢擬倫前賢亦終不敢奉詔使朝廷有同罪異罰之譏章又十一上遂出通判汾州自是公名重天下神宗即位遷尚書司封員外郎知商州就除提㸃陜西刑獄熙寧三年入為開封府判官奉使契丹因奏事帝問曰卿為監司久當知青苗法便也公曰青苗法唐行之於季世擾攘中掊民財誠便今陛下欲為長久計愛百姓誠不便時用事者以公有人望可藉以為重欲公助已使其徒隂諭公曰當以御史知雜奉待公不應由是不得留京師出為陜西路轉運副使同列欲更置運事與公議異除公知涇州後公之言頗與事酬復以公為轉運副使改永興軍路轉運使以親老請便郡得知同州七年朝廷患錢重欲置交子以權之命公制置公以謂交子恃本錢法乃可行如多出空劵是罔民也轉運使皮公弼議不合章交上朝廷方以事委公弼移公京西南路轉運使以親老不行十年差知陜州未幾請還鄉里除提舉鳳翔府太平宫丁太尉憂服除易朝請大夫知滄州今天子嗣位轉朝議大夫召為太常少卿拜户部侍郎元祐三年請老優詔不允其四月遂輔政封開國侯因進對言機政所急人才而已今臣選武臣難遽盡知請詔諸路安撫轉運使舉使臣科别其才第為三等籍之以備選任自元豐中河決小吳北注界河東入于海先帝詔曰東流故道淤髙理不可回其勿復塞乃開大吳以護北都至是水官請還河故道下執政議公曰開河役夫三十萬用梢木二千萬自河決已八年未有定論而遽興此大役臣竊憂之今朝廷方遣使相視果以東流未便宜亟從之若以為可回宜為數嵗之計以緩民力議者又謂河入界河而北則失中國之險澶淵之役非河為限則契丹不止公曰王者恃德不恃險昔堯舜都蒲冀周漢都咸鎬皆歷年數百不聞以河障契丹澶淵之役蓋廟社之靈章聖之德將相之智勇故邊帥授首豈獨河之力哉後使者以東流非便而水官復請塞北流公固爭之卒詔罷夫役如公所議洮河諸戎以青唐首領寖弱可制欲倚中國兵威以廢之邊臣亟請用師公曰不可御契丹以大信為本朝廷既爵命之矣彼雖失衆心而無犯王略之罪何詞而伐之若其不克則兵端自此復起矣乃止又乞廢渠陽軍紓荆湖之力詔諭西夏使歸永樂遺民夏人聽命公既屬疾猶以邊防為憂及薨太皇太后諭輔臣曰惜哉忠厚君子也公寬仁愛人惟恐傷之色溫而氣和人望之知其長者也其在朝廷義所當為勇若賁育守之不變事君與人一以至誠表裏洞徹如見肺腑故面引廷爭而人主益知其忠未嘗為同而僚友莫之或怨其誠慤素信於人也娶劉氏尚書駕部郎中晃之女賢淑孝敬配德君子治家有法度先公十六年殁追贈益昌郡夫人子四人孝諶瀛州録事參軍獻誠知唐城縣事某早卒彥詒太康主簿皆强學力行是似是宜孫男六人基郊社齊郎垂假承務郎塈右承務郎壁墾堅未仕孫女五人曾孫男二人戭戡公所著春秋論三十卷史記抵牾論五卷唐春秋五十卷奏議十卷文集二十卷西山别録一卷惟公在仁宗之世為循吏事英宗為爭臣神宗朝出處以義二聖從民所望遂大用之而居位未幾功業不究然其著見之效已暴於天下炳於後世列於太常藏之史官考公行事所至可紀今掇其大者揭之神道以詔於無窮銘曰挺挺趙公惇德有容遺我後嗣實自祖宗在仁宗時公始試吏民曰父母來豫攸塈簡于英宗正色匪躬帝欽良臣曰惟汝忠爰暨神考公心如一言有違從不撓其直二聖曰咨汝惟舊臣亟其就位翊我樞鈞元祐之政惟天是若天聽于民惟民是諾公在廟堂四鄙戢兵靡有內外皆吾孩嬰天嚮仁人錫公夀考方終相之不憖一老南山有虧公名永垂過者必式忠厚之碑直集賢院提舉西京嵩山崇福宫司馬君墓志銘元祐五年六月丁酉詔以祕書省著作佐郎兼侍講司馬康為左司諫時已屬疾五辭不許就賜告君奏曰臣不敢拜君命于家疾間當亟起受乃留告閣門以俟詔以君久疾不給俸其自止日續給之君辭不受七月小間將受命疾作不能造朝即奏臣不可以備言職矣願卒辭新命詔遣內侍挾御醫三人診視治療以君清貧命醫毋得受饋俟疾損取㫖八月君奏曰臣之力憊矣言職不宜久虛願領宫觀養疾西都二聖不得已許之除直集賢院提舉西山崇福宫詔曰勿藥有聞即膺吾用遣內侍諭㫖俾留京師就醫藥賜錢三十萬九月丙寅以不起聞明日輔臣對延和殿未及奏事二聖嗟悼不已命優恤其家特贈右諫議大夫遣將作監丞張淳督運木就護殯葬官給錢百萬遣中使弔問妻子賜錢五十萬又賻錢三十萬布帛有加既又遣內侍問行日賜白金五百兩助襄事十一月甲申葬陜州夏縣太師溫國文正公墓次君字公休文正公諱光之子也其先出於晉安平獻王孚歷後魏隋唐以及本朝子孫未嘗去鄉里積厚流逺是生大賢曾祖諱炫試祕書省校書郎知耀州富平縣贈太子太傅祖諱池以清直事仁宗為天章閣待制贈太師追封溫國公曾祖妣皇甫氏祖妣聶氏妣張氏皆封溫國太夫人文正公以道德事四朝進退以天下起相二聖勤勞帝室慰答民望為元祐宗臣君幼端謹不妄言笑事父母至孝出於天性文正公與夫人皆器愛之或當逺出夫人必自挾以往既長入官或數日不返家夫人輒憂思形于寐厭或踰月而後歸則相顧慘然喜欲泣敏學過人博通羣書熙寧三年以明經擢上第釋褐試祕書省校書郎耀州富平縣主簿時文正公為翰林學士奏留國子監聽讀四年奏授守正字五年監西京糧料院遷大理評事文正公以端明殿學士提舉嵩山崇福宫修資治通鑑奏君檢閲文字官制易階承事郎丁母夫人憂勺飲不入口者三日杖而後能起毁幾滅性見者哀之文正公居洛十五年往來陜洛間士之從學於公者退與君語未嘗不有得塗之人見其容止雖不識皆知其為司馬公之子也服除授簽書山南東道節度判官公事元豐八年以韓獻肅公薦擢祕書省正字轉奉議郎元祐元年為校書郎文正公為左僕射力疾入對詔君扶掖上殿賜緋章服公薨執喪如喪夫人哀毁有加焉治喪皆用禮經家法不為世俗事得遺恩悉以豫族人其啓夫人之喪而合祔也號慕如初喪既葬廬于墓凡文正公終事竭誠盡力無一不致其極者三年服除召為著作佐郎兼侍講進講詳明傳經義勸上以進德上必虛已聽之四年為修神宗實録檢討官上疏言王者以民為天民以食為天自古禍亂之興皆由饑饉為國必有九年之畜乃可以備水旱比年以來旱暵為虐民必囏食若今秋不稔則公私困竭盜賊可虞昔魏李悝為平糴之法國以富彊東漢永初以後水旱十年和熹鄧太后臨朝用征和故事徙置饑民於豐熟諸郡躬自減撤以救災厄故天下復平唐太宗貞觀初天下連嵗災害太宗勤而撫之民雖東西就食未嘗嗟怨至四年天下大稔流散者咸歸鄉里米斗不過三四錢自古賢聖之君非無水旱之災惟有以待之則不為甚害如漢唐之䇿已非處處皆有畜積故令民東西就食此䇿之下者也魏文侯舉國四境悉令平糴所在有儲此䇿之中者也三代而上國有九年之畜此䇿之上者也今臣願陛下先為漢唐之下䇿以濟目前之囏俟及豐穰乃為魏文侯之中䇿積以嵗月漸及三代之上䇿乘今秋熟令州縣廣糴民食所餘悉歸於官今冬來春令饑民就食俟鄉土豐穰乃還本土夫國家積貯惟以安國民安則國安故凡為國者一絲一毫皆當愛惜惟於濟民則不當吝陛下誠能捐數十萬金帛以為天下大本則四海幸甚夫實倉廪使百姓足食非獨可以消患太平之化由是而興措刑之本無先於此矣初文正公在相位與吕正獻公及同列共議稍修官制以就簡便令門下中書二省通職事亦先帝詔書本意也草具未上而文正公薨至是君復上舊藳降付三省而朝廷未遑有所行也十月除右正言以執政親嫌辭不就職五年春上疏歷陳前世治少而亂多祖宗創業之艱難積纍之勤勞以勸上及時嚮學守天下大器曰德曰才曰識三者皆由於學又勸太皇太后每於禁中訓導其言切至四月詔講讀官奏對邇英閣君初對勸上自强於學以孝德為治道之先再對又言孟子為書最醇正陳王道尤明白所宜觀覽上曰方讀孟子尋詔講筵官編修孟子節解為十四卷以進君自文正公喪居廬蔬食寢於地遂得腹疾親戚勉以肉食終不肻及免喪毁瘠纍然治療不愈至是益侵纍奏乞留臺宫觀詔不許遣內侍賜御膳勞問後乃豫優告猶力疾解孟子二卷自是疾有加除諫職未受條具諸所當言以待曰得一對極言而死無所恨疾病召醫李積於兗積居野年七十矣鄉民聞之告積曰百姓受司馬公恩深今其子病願速往也來告者日夕不絶積遂行至則疾不可為也沒語妻子以不報國恩為恨享年四十一公卿嗟痛於朝士大夫相弔於家處士相弔於野市井之民無不哀之君篤行內外淳備必欲如古人燕居如對大賔動靜有矩法望之色莊氣和而言厲嚴於祭祀為人潔廉未嘗言財文正公既葬二聖遣使賜白金二千兩立神道碑君以文正公葬皆官給碑已具固辭不許遣家吏如京師納之其事君務責難非堯舜仁義之道不陳於上前待族人委曲周旋唯恐不得其所欲與朋友忠信久而益親有文集十卷初娶張氏朝散郎保孫之女追封真寧縣君再娶張氏大理寺丞淮之女封安仁縣君二子曰植曰桓皆承奉郎桓早夭三女長適假承務郎楊克覲先君卒其二皆幼祖禹與君同修資治通鑑同為正字著作同修實録同侍經筵相與猶一體也君初疾屬以後事其孤請銘嗚呼其可勝哀也夫銘曰烈烈溫公迪我祖宗卒相二聖以成天功公休之賢是學是似民曰幸哉溫公有子溫公有子天子有臣世其休風澤我下民執經帝前日勸帝德帝曰良哉補豫衮職惟其所有訖未一施中道而止天實奪之惟人之生惟德可久沒而民思是謂不朽范太史集卷四十一

body:
  text: 范太史集卷五十四宋范祖禹撰皇族石記右武衛大將軍舒州防禦使第六子墓記右武衛大將軍舒州防禦使仲篤第六子贈太師兼中書令濮安懿王之曾孫贈武寧軍節度使兼侍中彭城郡王宗衮之孫母夀昌縣君李氏元祐二年九月丁丑生四年七月丁闕卒始三嵗九年二月已酉葬河南府永安縣謹記右監門衛大將軍第二子墓記右監門衛大將軍仲戭第二子贈太尉兼中書令濮安懿王之曾孫贈武寧軍節度使兼侍中彭城郡王宗袞之孫母長夀縣君李氏元祐六年正月乙亥生其年九月辛卯卒九年二月已酉葬河南府永安縣謹記右武衛大將軍舒州防禦使第七子墓記右武衛大將軍舒州防禦使仲篤第七子贈太尉兼中書令濮安懿王之曾孫贈武寧軍節度使兼侍中彭城郡王宗袞之孫母夀昌縣君李氏元祐二年十二月丙午生六年閏八月戊寅卒始五嵗九年二月已酉葬河南府永安縣謹記同州觀察使馮翊侯第十二子左班殿直令􅶲墓記同州觀察使馮翊侯世覃第十二子令􅶲贈建安軍節度使同安郡王惟正之曾孫同州觀察使馮翊侯從讜之孫母夀安縣君夏氏熙寧九年二月癸巳生元豐三年遇同天節賜名授右班殿直八年十二月甲子卒始十嵗元祐九年二月已酉葬河南府永安縣謹記右武衛大將軍廉州團練使第三女墓記右武衛大將軍廉州團練使令柯第三女贈陳州觀察使淮陽侯守約之曾孫贈彰信軍節度觀察留後濟隂郡公世長之孫母清河縣君張氏熙寧五年十月丁丑生元祐二年四月壬午卒年一十有六九年二月已酉葬河南府永安縣謹記右武衛大將軍昌州刺史第十三女墓記右武衛大將軍昌州刺史令夫第十三女贈瀘州觀察使廬江侯守度之曾孫贈蘄州防禦使蘄春侯世宏之孫母長夀縣君王氏元祐七年四月辛酉生明年十月癸酉卒始二嵗九年二月已酉葬河南府永安縣謹記前皇城副使長女墓記前皇城副使令耦長女贈武勝軍節度觀察留後韓國公從藹之曾孫贈定國軍節度使南康侯世綱之孫母長安縣君劉氏元豐元年六月丙午生元祐五年七月庚辰卒年十三九年二月已酉葬河南府永安縣謹記右監門率府率子右班殿直士侒墓記右監門率府率仲擴子士侒相孝定王永弼之曾孫司空南陽郡王宗喬之孫母夏氏元祐二年十一月壬子生其年遇興龍節賜名授右班殿直五年六月甲寅卒始四嵗九年二月已酉葬河南永安縣謹記右千牛衛將軍子不矜墓記右千牛衛將軍士紘長子不矜贈安化軍節度使開府儀同三司髙密郡王宗逹之曾孫贈保寧軍節度觀察留後東陽郡公仲烈之孫母崇仁縣君髙氏元豐二年六月丙午生元祐五年七月已丑卒年十二九年二月已酉葬河南府永安縣謹記右武衛大將軍昌州刺史第五子墓記右武衛大將軍昌州刺史士岌第五子贈安化軍節度使開府儀同三司髙密郡王宗逹之曾孫贈保寧軍節度觀察留後東陽郡公仲烈之孫母夀安縣君李氏元祐四年四月癸丑生五年二月已未卒始二嵗九年二月已酉葬河南永安縣謹記右武衛大將軍恩州防禦使第十女墓記右武衛大將軍恩州防禦使仲箎第十女贈鎮江軍節度使兼中書令郇國公允成之曾孫贈䖍州觀察使南康侯宗仁之孫母同安縣君焦氏元豐八年二月已丑生元祐五年九月已卯卒始六嵗九年二月已酉葬河南府永安縣謹記右監門衛大將軍康州刺史第六子墓記右監門衛大將軍康州刺史仲弓第六子贈鎮江軍節度使兼中書令郇國公允成之曾孫贈䖍州觀察使南康侯宗仁之孫母嘉興縣君杜氏元祐二年十月乙酉生六年闕月甲戌卒始五嵗九年二月已酉葬河南府永安縣謹記右監門衛大將軍第二子墓記右監門衛大將軍令簫第二子贈鄧州觀察使南陽侯從贄之曾孫贈保康軍節度觀察留後吳興侯世經之孫母夀安縣君史氏元豐八年七月乙卯生元祐八年十月壬申卒始九歲九年二月已酉葬河南府永安縣謹記右武衛大將軍康州團練使第六男墓記右武衛大將軍康州團練使仲杵之第六子曾祖郇國公允成祖新平郡王宗保母長夀縣君李氏元祐四年九月甲戌生十二月丙辰卒九年二月已酉葬河南永安縣謹記右千牛衛將軍第二女墓記右千牛衛將軍仲鋸之第二女曾祖定王允良祖左金吾衛大將軍雄州防禦使宗藺母崇德縣君魏氏元祐二年十月癸卯生明年閏十二月戊辰卒九年二月已酉葬河南永安縣謹記右監門率府率長女墓記右監門率府率仲􅜃之長女曾祖永嘉郡王允迪祖祁州防禦使宗粹母賈氏元祐五年九月庚辰生七年三月乙未卒始三歲九年二月已酉葬河南永安縣謹記右千牛衛將軍第二女墓記右千牛衛將軍令璯之第二女曾祖贈同州觀察使追封馮翊侯從讜祖贈崇信軍節度使追封榮國公世程母福昌縣君李氏元祐四年五月丙申生五年七月甲戌卒九年二月已酉葬河南永安縣謹記右武衛大將軍舒州防禦使第四女墓記右武衛大將軍舒州防禦使仲篤之第四女濮安懿王之曾孫贈武寧軍節度使兼侍中追封彭城郡王宗衮之孫母夀昌縣君李氏元豐戊午九月丙申生元祐七年四月辛未卒年一十有五九年二月已酉葬河南永安縣謹記潤州觀察使第八男右班殿直墓記潤州管內觀察使仲佺之第八子右班殿直士騎濮安懿王之曾孫贈康王宗朴之孫母安定郡君劉氏元祐元年五月已未生初賜名授右班殿直八年七月甲辰卒僅八嵗九年二月已酉葬河南永安縣謹記潤州觀察使第十一女墓記潤州管內觀察使仲佺之第十一女曾祖濮安懿王祖贈康王宗朴母安定郡君劉氏元豐辛酉四月甲戌生元祐七年六月甲寅卒年一十有二九年二月已酉葬河南永安縣謹記潤州觀察使第十二女墓記潤州管內觀察使仲佺之第十二女濮安懿王之曾孫贈康王宗朴之孫母安定郡君劉氏元豐辛酉十二月庚戌生元祐六年閏八月甲申卒年一十有一九年二月已酉葬河南永安縣謹記英州防禦使第八女墓記英州防禦使令蘧之第八女贈陳州觀察使追封淮陽侯守約之曾孫贈鎮海軍節度觀察留後追封北海郡公世靜之孫母劉氏封德安縣君元祐六年九月癸丑生明年正月癸卯卒九年二月已酉葬河南永安縣謹記右監門衛大將軍英州刺史第六男墓記右監門衛大將軍英州刺史仲弗之第六子曾祖郇國公允成祖䖍州觀察使南康侯宗仁母永和縣君錢氏元祐三年七月丁卯生四年十二月乙丑卒九年二月已酉葬河南永安縣謹記右千牛衛將軍第三男墓記右千牛衛將軍士緌之第三子曾祖武寧軍節度觀察留後宗嚴祖右屯衛大將軍仲商母安福縣君吳氏元豐七年九月戊戌生元祐五年七月癸未卒年七嵗九年二月已酉葬河南永安縣謹記右監門衛大將軍男三班奉職墓記右監門衛大將軍令坰之子子濟字道卿陳州觀察使淮陽侯守約之曾孫鎮海軍節度觀察留後世靜之孫母郭氏永睦縣君君七嵗入小學通孝經論語試升中學十嵗下筆成章句十五通尚書欲舉進士㑹朝廷復詩賦科君晝夜力學至忘寢食誦唐李程日五色賦奮曰吾當如程取宰相供備庫副使髙士華一見竒之愛其好學許妻以女未及娶元祐七年六月戊辰卒年十八嵗一男襁褓九年二月已酉葬河南永安縣謹記右監門衛大將軍男三班奉職墓記右監門衛大將軍令課之子子琦字君玊寧國軍節度觀察留後從審之曾孫安州觀察使世肱之孫母長夀縣君杜氏繼母建昌縣君彭氏以父任為三班奉職始就學論語孟子孝經皆能說其義為文詞有思致律令亦通大槩教官稱之元祐三年四月已丑卒年十有九疾革囑姚氏妹使勉其父母以殺哀節哭已乃自澡潔衣朝服而逝得其遺札如所以語妹者聞者哀之九年二月已酉葬河南永安縣謹記贈崇信軍節度使男右班殿直墓記贈崇信軍節度使譙國公世采之子令駥英國公惟憲之曾孫榮王從式之孫母崇安縣君髙氏初賜名補右班殿直未娶元祐五年七月戊辰卒年二十有一九年二月已酉葬河南永安縣謹記右武衛將軍興州團練使第七女墓記右武衛將軍興州團練使仲旌之第七女贈太師平陽郡王允升之曾孫贈武寧軍節度觀察留後彭城郡公宗彥之孫母和順縣君郭氏元豐八年三月辛酉生元祐七年正月壬辰卒年八嵗九年二月已酉葬河南永安縣謹記右監門率府率長女墓記右監門率府率士讚之長女贈武寧軍節度觀察留後彭城郡公宗彥之曾孫右武衛大將軍全州防禦使仲集之孫母鄭氏元祐元年二月丁卯生二年七月戊辰卒九年二月已酉葬河南永安縣謹記右武衛大將軍文州團練使長女墓記右武衛大將軍文州團練使仲虢之長女贈太師平陽郡王允升之曾孫贈武寧軍節度觀察留後彭城郡公宗彥之孫母長夀縣君康氏元祐二年八月庚寅生四年四月辛丑朔卒年三嵗九年二月已酉葬河南永安縣謹記右武衛大將軍全州防禦使第九女墓記右武衛大將軍全州防禦使仲集之第九女贈太師平陽郡王允升之曾孫贈武寧軍節度觀察留後彭城郡公宗彥之孫母崇安縣君張氏元祐三年十二月丙戌生七年十一月乙未卒年五嵗九年二月己酉葬河南永安縣謹記左侍禁之男墓記左侍禁監蘇門鹽務令寤男子蟠贈宣州觀察使宣城侯從謹之曾孫貴州防禦使世恬之孫母曰張氏年始九嵗元祐七年七月丙午卒九年二月已酉葬河南永安縣謹記右武衛大將軍興州團練使之男墓記右武衛大將軍興州團練使仲厥第五男平江軍節度使兼侍中汝南郡王諡安懿贈太尉兼中書令追封濮王之曾孫寧遠軍節度使鞏國公之孫母曰長樂縣君康氏元祐六年六月壬寅生七年五月丁未卒九年二月已酉葬河南永安縣謹記逹州防禦使之男墓記逹州防禦使仲理第十二男平江軍節度使兼侍中汝南郡王諡安懿贈太尉兼中書令追封濮王之曾孫贈武寧軍節度使兼侍中追封彭城郡王宗衮之孫母曰廣平郡君曹氏元祐二年三月已卯生元祐六年闕月已酉卒九年二月已酉葬河南永安縣謹記逹州防禦使之男墓記逹州防禦使仲理第十二男平江軍節度使兼侍中汝南郡王諡安懿贈太尉兼中書令追封濮王之曾孫贈武寧軍節度使兼侍中追封彭城郡王宗衮之孫母曰廣平郡君曹氏元祐三年三月癸酉生元祐六年闕月丁未卒九年二月已酉葬河南永安縣謹記南陽郡王之女墓記南陽郡王宗喬第五女韓恭懿王元偓之曾孫定王允弼之孫母曰安定郡君魏氏元豐六年二月庚午生元祐五年八月丙午卒九年二月已酉葬河南永安縣謹記右領軍衛將軍男墓記右領軍衛將軍仲䚮之男士遣右班殿直贈太師尚書令兼中書令定王允良之曾孫蘇州觀察使吳國公宗絳之孫母賈氏元豐八年八月壬午生元祐元年七月丙寅卒九年二月已酉葬河南永安縣謹記昭州防禦使女墓記昭州防禦使仲玉第六女贈太師平陽郡王允升之曾孫贈保寧軍節度使東陽郡王宗悌之孫母曰樂平郡君王氏元豐七年十一月壬寅生元祐三年十二月辛巳卒九年二月已酉葬河南永安縣謹記范太史集卷五十四

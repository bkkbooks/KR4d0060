body:
  text: 范太史集卷三十六宋范祖禹撰記龍門山勝善寺藥寮記龍門距洛城十五里其西山有浮屠祠曰勝善興於唐開元而壞於五代迄本朝太平百餘年諸祠稍復葺而勝善尤古未能興之事之興敝存乎其人藥寮者太尉潞國文公之所建也公閔下民之疾苦而不得其療者思有以濟之相其地得勝善祠之下方當闕塞之厄水陸之衝南北之通塗而行旅之所便也其山出泉曰真珠泉公出俸錢命工徒疊石以為址即泉為藥井而建寮於其上十有三楹是嵗熙寧六年也公又以勝善為功德寺擇僧之知醫者為寮主以長之出醫書數百卷家之良藥珍劑貯之寮和藥之器用備焉凡郊野之民無有逺邇與道路之往來有疾病者造寮而請之其施與無窮所及者之衆可知矣寮之上則泉之所出也為堂曰珠淵其南則三嵁為屋以覆大像又其南曰第四嵁亦屋之於是勝善之祠復新人之至者有遊息之所故樂而忘其勞而藥寮之地益加勝矣其東俯視伊水暉光澄徹望香山石樓若屏障圖畫蓋天下奇偉之觀也王公大人建祠宇修福田者有之矣未有濟民拯疾誠意之篤如公者也民受天地之和以生隂陽寒暑之不時飲食動作之不節於是有癘疫之災札瘥之昏聖人為之醫藥以救其夭死三代以後醫師職廢民之有疾者無所控告於其長上有志之士雖或能施而未光也公視人之疾若已赤子建長利圖廣濟前民之患而為救以待之俾民不勞而獲醫不費而飲藥古未有也惟公左右三朝勤施四方隂功顯德被於民物不可遽數其著見於洛邑者如此可謂仁矣古之君子思一夫不獲其所如已推而納之溝中唯能推巳以及人也孟子曰有不忍人之心斯有不忍人之政後之君子觀是寮也則知公之心知公之心則知公之政知公之政則朝廷德澤之厚從可知焉來者守之其勿廢也某嘗侍坐於公公語及藥寮顧曰子為我記之某不敢辭公之命退而書其事云元豐六年十月日奉議郎同編修資治通鑑范某記賜墨記元祐三年三月十七日修神宗皇帝一朝實録於門下後省開局賜李廷圭真墨臣某謹記中使李永言司馬溫公布衾銘記溫國文正公所服之布衾𨽻書百有十字曰景仁惠者端明殿學士范蜀公所贈也曰堯夫銘者右僕射髙平公所作也元豐中公在洛蜀公自許往訪之贈以是衾先是髙平公作布衾銘以戒學者公愛其文義取而書於衾之首及寢疾東府治命斂以深衣而覆以是衾公於物淡無所好唯於德義若利欲其清如水而澄之不已其直如矢而端之不止故其居處必有法動作必有禮其被服如陋巷之士一室蕭然圖書盈几終日靜坐泊如也又以圓木為警枕小睡則枕轉而覺乃起讀書蓋恭儉勤禮出於天性自以為適不勉而能與二范公為心交以直道相與以忠告相益凡皆如此其誠心終始如一將殁而猶不忘某觀公大節與其細行雖不可遽數然本於至誠無欲天下信之故能奮然有為超絶古今居洛十五年若將終身焉一起而功被天下內之嬰童婦女外之蠻夷戎狄莫不敬其德服其名唯至誠故也公兄子宏得公手澤紙本於家屬某序其本末俾後世師公之儉云元祐三年七月壬子范某謹記和樂庵記河南張子京結茅為庵於其所居㑹隱之園元豐中司馬溫文正公為𨽻書以名之取常棣之詩兄弟和樂云後十年子京書與余曰庵得名於溫公近以雨壞復新之溫公歿矣是不可忘也子其為我記之始余以熙寧中入洛溫公方買田於張氏之西北以為獨樂園公賔客滿門其常往來從公游者張氏兄弟四人出處必偕余每見公幅巾深衣坐林間四張多在焉或奕棋投壺飲酒賦詩公又鑿園之東南墉為門開徑以待子京之昆弟杖屨相過於流水修竹之間入乎幽深出乎䕃翳乃得是菴焉美木嘉卉四時之變無一不可喜者賔至則兄弟倒屣怡怡然信所謂和且樂也溫公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒每食少頃則問曰得無饑乎天少冷則拊其背曰衣得無薄乎康伯入洛則二家兄弟日相從遊其名子京之菴不惟以善張氏亦公之志也詩曰凡今之人莫如兄弟外物之娛悅其有可以易此者歟張氏伯曰明叔仲曰才叔次則子京季曰和叔自其先君棄官隱居園池之美為洛之冠子孫不墜其素風而大賢以為鄰有德義之益之可尚也已是菴也其與獨樂之園久而人益愛之宜子京欲為之記而余不得辭也敝又新之其勿替哉大師堂記神宗熙寧六年潞國文公以司徒侍中河東之節自樞府出鎮三城明年留守北都後七年拜太尉保釐洛宅又三年以太師就第今天子嗣位元祐元年起公平章軍國重事元老在朝海內晏寧五年復請老章數十上二聖不得已許之以公位極宗臣無以復加聽解重事以維師舊節歸老于洛六年十二月詔以公之子集賢殿修撰周翰守三城明年二月周翰迎公安輿至河陽父老覩公儀形擁道歡呼如見父母蓋自公去鎮十有八年而公之子繼守是邦流風善政相望不逺公既老而復臨之故邦人皆喜以為不獨公家之光寵亦朝廷之盛美也府舍瀕河地鹵下濕庳陋不葺上雨旁風不足以奉几杖羞㫖甘周翰因其舊廬治而新之榜曰太師之堂朝夕溫凊問安視膳其中公作二詩以識其事逍遙遊燕踰月而後歸洛周翰既以公詩刻之石又以書來曰子為史官為我記之某觀古堯舜之君壽皆過百年其臣亦無不耋老子孫有國數百歲而不絶周公老于豐魯公封于魯凡蔣邢茅胙祭皆為諸候召公相四世其子封于燕成王之封周公也周公拜前魯公拜後所以康周公也傳曰周人之思召公愛其甘棠況其子乎夫其相如此則其君之德可知也惟潞國公光輔四朝功格上下垂五十年事載冊書由今觀之邈若古昔天錫之報壽考康寧八十有七而聰明不衰由漢以來輔相之臣福祿之盛未有如此比者雖三代而上唐虞之際厯選賢哲無幾人焉是以外至四夷敬仰公名或瞻望而嘆息或聞風而獻馬此豈可以聲音笑貌使之然哉蓋其隂德之所被者廣仁聲之所及者逺愛公之深者不獨孟人而已然則斯堂之作其在周翰如魯公之養周公其在孟人如召國之殖甘棠於以勸天下為臣子者之忠孝為人父者之慈訓其永無窮惟後之人勿替引之元祐七年四月丙子試尚書禮部侍郎兼侍講國史院修撰范某記序唐鑑序承議郎著作佐郎臣祖禹受詔與臣光修資治通鑑臣祖禹分職唐史得以考其興廢治亂之所由昔隋氏窮兵暴斂害虐生民其民不忍共起而亡之唐髙祖以一旅之衆取關中不半歲而有天下其成功如此之速者因隋大壞故也以治易亂以寬易暴天下之人歸往而安息之方其君明臣忠外包四荒下遂萬物此其所由興也其子孫忘前人之勤勞天厭於上人離於下宇內圯裂尺地不保此其所由廢也其治未嘗不由君子其亂未嘗不由小人皆布在方策顯不可掩然則今所宜監莫近於唐書曰我不可不監於有夏亦不可不監於有商臣謹采唐得失之跡善惡之效上起髙祖下終昭宣凡三百六篇為十二卷名曰唐鑑唐之事雖不能遍舉而其大略可睹矣元祐元年二月日臣謹上東宫錫燕集序上之元祐二年秋九月壬戌御邇英閣召侍臣講論語畢甲子賜燕於東宫命宰臣主之執政及講讀起居之官預焉遣中使勸侑命卒飲所以寵勞甚厚中燕又遣中使賜御書唐人詩各一首凡十有三人拜賜於庭捧觀皆驚嘆喜忭太師彥博以疾不赴遣中使就第賜之翼日彥博以下上表謝講讀起居之官又進詩以謝於是寫而輯之臣某拜手稽首言曰伏犧氏觀河圖畫八卦始為書以紀萬事昭明天下聖人務焉洪惟祖宗皆好筆札皇帝生知天縱典學日新繼文守成克篤前烈聖作神契得之自然而嗣位以來羣臣未嘗獲覩真迹今兹儒臣首被此賜非夫稽古好學研精儲思丕承列聖之顯謨奉若文母之慈訓則何以躬勤翰墨假寵諸臣如此其至乎其所輯題曰東宫錫燕置于資善俾有司掌之以為故事既又各藏其副以傳之子孫元祐二年九月臣某謹序古文孝經說序古文孝經二十二章與尚書論語同出於孔氏壁中厯世諸儒疑眩莫能明故不列於學官今文十八章自唐明皇為之注遂行於世二書雖大同而小異然得其真者古文也臣今竊以古為據而申之以訓說雖不足以明先王之道庶幾有萬一之補焉元祐三年八月日臣謹上仁皇訓典序臣竊以語聖人之德必以甚盛者為稱觀先王之治必以所多者為尚堯以仁舜以孝禹以功文王以文皆其甚盛者也夏之政忠商之政質周之政文皆其所多者也三代以後其德不極其治不純然而亦必有盛多者焉漢孝文之恭儉唐太宗之功烈考之三王抑其次也惟我有宋受天眷命太祖無心於有天下而神器歸之至仁如天神武不殺終捨其子以授大聖堯舜傳賢不是過也太宗繼文海內為一真宗守成治致太平至於仁宗當勝殘去殺之運制禮作樂之㑹光有天下四十二年宋興以來享國最久修身於一堂之上而置天下於太山之安端拱於法宫之中而躋一世於仁壽之域舟車所通日月所照無思不服威靈在天既三十年仁深澤厚淪浹海㝢流風未息故老猶存窮山窟穴之民言之則流涕被髮左袵之俗聞之則稽首用能光大纍聖無前之烈恢建後嗣無窮之基昔周公作無逸本之太王王季以及文王追配三宗四人迪哲多稱文王之德以勸成王取其可以為者也昔漢自髙祖至於肅宗非無賢君而漢世之治獨稱孝文唐自髙祖至於宣宗亦非無令主而唐世之治獨稱太宗皆取其子孫可守以為成憲也洪惟本朝祖宗以聖繼聖其治尚仁而仁宗得其粹焉古者史為書以勸戒人君唐史官吳兢作貞觀政要仁宗時命史臣編三朝寶訓神宗時亦論次兩朝之事陛下又命臣以神宗之訓上繼五朝以備邇英進讀日陳於前考自三代以來未有六聖相承其德克類者也恭惟仁宗言為謨訓動為典則實守成之規矩致治之準繩臣謹録天禧以來訖於嘉祐五十年之事凡三百十有七篇為六卷名其書曰仁皇訓典以助睿覽庶有萬一之補焉元祐八年正月日臣祖禹昧死謹上銘義塜銘并序余叔父故通直郎舉夫人故華陽縣君宇文氏捨田於成都東郭之外以給死之無葬者戒子孫使勿廢其事子龍水主簿祖亮請余記之余名之曰義塜而揭之以銘曰吾嘗觀於北邙之原聖賢所藏嘆萬古之同此究終始其何鄉物生於土而反於土惟人之化欲人之不覩是以聖人教民葬之中野太古不墳厚衣以薪末世厚葬澆風變淳君子之於天下不忍一物不得其所故已有餘則推以及人鄉人有死葬於何所縣曰華陽鄉曰積善里曰東廟白土之間范氏之田松柏丸丸骨復於土魄化為泉誰謂無歸於此終焉其無忘吾叔之德而返汝魂氣於天書答劉仙尉書某啓人至辱書承令叔令弟相繼淪謝想悲痛可勝言耶嘗謂道純氣節不减先正惜其一病遂廢不為世用今又止此甚可嘆也讀足下所為亡弟述又怪天賦其才如此而不豫之壽豈所謂難諶者哉足下史學足以繼先正譬如美木已有千尺凌雲之勢在所長養以待他日之用耳足下勉之無以悲傷摧損其志古之人困窮而通有憂患而啓發事業者多矣劉氏門户所繫惟在足下可不念哉寄示先正墓碣石刻甚精十國紀年序欲求張左司書已面懇許諾溫公之文張固不惜書也近資治通鑑印本奏御因思同時修書之人墓木已拱存者唯僕尤可感嘆人生㑹歸於此但有先後耳足下所寄紀年留此甚久京師殊苦少暇方將寫本校正蜀中求人刻板猶須一二年乃可成唯不訝其緩春暄千萬厚愛不宣某頓首答鼂教授書某頓首教授鼂君足下某聞足下之名久矣以未得見為恨承過京師乃辱示書將先屈致顧某無似何以當之某始聞足下於司馬公休又黃魯直道足下為揚子雲别傳公休魯直皆某心慕而畏服者其稱道足下不容口是某已得足下於二君矣然子雲别傳亦未之見也譬如工人聞一美木賈人聞一至寶欲見之意何如哉恨以拘出入之禁不得走館舍然幸識尊公風采有家世之舊且與校書聫職事羣從獲見者非一也古人或相望於千里或相得於異世未識其面往往已知其心况今相因巳如是乎或車從尚少留休日不鄙如書所戒幸甚幸甚某再拜傳康節先生傳邵雍字堯夫衛州人家世貧賤雍刻厲為學夜不就席者數年雍嘗適吳楚過齊魯客梁晋而歸徙居於洛蓬蓽環堵躬㸑以養父母講學於家不彊以語人而就問者日衆士人道洛者必過其廬雍與人言必依於孝悌忠信樂道人之善不及其惡故賢不肖無不親之病畏寒暑常以春秋時乘小車二人挽之行遊城中所過倒屣迎致居洛三十年洛人共為買田宅士大夫多助之者雍皆受而不辭為人坦夷無表襮防畛不為絶俗之行其學自天地運化隂陽消長以數推之逆知其變自以為有師授世無能曉之者而雍內以自樂浩如也有書十二卷曰皇極經世詩二千篇曰擊壤集雍初舉遺逸試將作監主簿熙寧初以為潁州團練推官與常秩同召雍卒不起卒年六十七知河南府賈昌衡言雍行義聞於鄉里乞贈恤吳充請於上贈袐書省著作郎賜粟帛韓絳守洛言雍隱德邱園聲聞顯著賜諡曰康節王延嗣傳唐宋間延平郡有隱君子姓王氏諱延嗣字季先光州固始人也世為州里豪右從父潮審知俱以勇俠霸於一鄉唐末之亂四方豪傑競起大者以王小者以伯壽春王緒攻陷光州得潮兄弟相持大喜曰恨相得之晚因留軍中計事將為誅巢之舉時秦宗權約㑹兵討賊審知語於緒曰此何足以成事哉遂逗留不進宗權為巢敗走大怒以兵攻緒乃闕南奔入閩有衆數萬而緒以猜刻失將佐士卒心一夕為亂軍所斃推潮為主帥遂奄有福建景福元年唐拜潮福建觀察使審知為副使潮卒審知代立乾寧四年唐升福州為威武軍拜審知節度使纍遷同中書門下平章事封琅琊王君幼失怙恃養於審知為兒童時謹願端慤如成人未嘗戲笑事審知如父晨昏侍左右彌謹審知寢疾躬奉湯劑未始須臾離庭闈雖甚勞苦不見有倦色審知亦以是器而憐之撫如已子審知諸子豪氣相髙日以馳馬試劒為事君獨泊然無欲惟喜耽玩書史夜以繼日手不釋卷寢食為之幾廢故多識前言往行褆身行已每以古人自期儒冠書服雍容委折似不能言者然邦有大政國有大疑將就謀焉則引古驗今抵掌議論凛凛風生不可尚已審知嘗戲謂之曰此吾家措大兒也審知既撫有全閩將欲録君以官君聞之力辭懇免至於三四不聽乃稱疾不出者踰月審知使人往訊之因手書以上審知其略云春秋傳載孔子之言曰唯名與器不可以假人蓋以名器者國家礪世之具茍上有私授之失則下啓奸覦之心居平世猶之可也况今天子播遷大盜蜂起跡其所由正緣朝廷政出多門刑賞滋濫大王親舉義兵為國平亂軋於賊臣決策入閩士卒將佐棄鄉井墳墓捨父母妻子從王南征何所圗哉志於立功名耳今師旅暴露日久大勳未集大王膺茅土之封領節鉞之寄肅將明命作鎮於閩尚未班爵策勳以旌戰士而首欲以爵命猥及無知之私親將士觀望解體必矣昔衛懿公好寉寉有乘軒者及狄伐衛授甲者皆曰使寉寉實有祿位僕雖愚瞢粗靈於寉倘或僥榮冒祿偷安利已以陷王於衛君之地雖粉骨糜肌亦不足以贖其過審知以其言切利害益器重之然終不能奪其志稍寢其命曰姑俟他日而巳未幾唐亡梁太祖拜審知中書令封閩王仍升福州為大都督府命至閩審知將拜賜焉君力諫之曰吾家本田舍郎二父䝉國厚恩迭秉節旄朱全忠賊臣固嘗與我比肩事主徒以挾穿窬之資逞豺狼之暴肆虐流毒盜有神器人神共憤其能久有此土我縱不能如留侯為韓復仇沛公為義帝發喪其忍北面以事之義不帝秦此其時也審知俯首久之曰此特腐儒陳言無補實用知彼不知已兵法所大忌彼雖僣逆然既巳南面朝諸侯加之堅甲利兵半於天下東征西伐草折卵碎我慿數州之地輒嬰其鋒是自取顛仆安能成大事哉君曰是大不然梁雖弒逆僣舉大號而外窘於晋日夕支梧方且不暇重以楊行密方據江淮實吾之外屏似出天造以限南北梁人雖欲襲我得乎此正所謂風馬牛不相及也况彼以新造之梁雄據中原大統未一內怨外叛腹背受敵尤其甚者與晋相持雌雄未决其能越大江度修嶺以與我角耶故司勳杜牧有言上策莫如自治誠能於此鋭意自治內以修政外以治軍使府庫充實兵革犀鋭如小白之於齊勾踐之于越國勢日張霸圖日盛近約吳越逺結江淮外連荆楚仗義合兵為國討賊其誰敢不從孔子曰如有用我者吾其為東周乎反覆條陳數百言審知竟不能用其策君拂膺太息私竊嘆曰大丈夫以氣為主氣先索矣無能為也審知歲時遣使朝貢於梁阻於江淮道不能通乃航海從登萊入汴使者入海覆溺大半君聞之愀然因復為審知厯陳梁無足畏之狀勿傷財損人以自詘且言治亂之機常隱於冥冥而自古觀人之國則每預見而前知者蓋勝負之形已分矣如齊仲孫知魯之未可動房𤣥齡謂隋之必將亡莫不若合符節以今形勢觀之則朱梁決不能為我患萬無足畏然異時作難當在江表吳越之間其後果然審知初不甚領略其意自是君始浩然有隱遁巖穴全身逺害之志而牽於審知有鞠育之恩於已念未有以報之不忍遽遂翩然初潮卒審知代立疑外議有未甚服從者㑹僚屬有獻言請以威嚴繩下之不從令者審知始用其言乃務以誅戮為事君言於審知曰書云臨下以簡御衆以寬語云寬則得衆信則民任焉敏則有功公則說此萬世治國齊家君天下之大法也小人中無逺慮乃導王以苛虐為政不亦悖乎王緒之失實本於是覆轍在前王所目擊可不戒哉審知亦為之改容君每侍審知左右覺微有怒色必怡聲軟語進說以解釋其意前後有犯顔垂死復活者蓋千餘人識者固已知君隂德之必有後也閩俗喜佛而審知亦溺於浮屠氏之說窮極土木之功以興佛宇財力殆困君力言於審知曰書云不作無益害有益功乃成浮屠氏本物外之人以寂滅為宗非有益於人之國今乃蠧民財損民力以從事於斯是謂作無益以害有益也古之人君自謂善於其事者無出梁朝之武帝及其終也卒無補於侯景之亂殷鑒不逺在夏后之世矧夫今日方欲以取威定霸其可崇此不急之務以蠧國傷民耶審知卒不悟自此帑藏日虛民力日困矣審知本武夫初不省禮樂詩書之教其後折節下士開學館育人才故唐賢士大夫避難南來者皆厚禮延納之招來蕃舶綏懷海上諸蠻貿易交通閩俗康阜皆君有以啓之審知諸子皆不肖服飾車騎侈異相勝視君敝衣緼袍薾然率皆非笑有從而諷君者君正色徐以語之曰傳不云乎儉德之共也侈惡之大也以漢文之賢君而衣弋綈以公孫之賢相而用布被後世以為美談況處多虞之世雖萬乘之尊三公之貴尤當以漢文公孫為法顧豫何人既無汗馬之功復無籌幄之佐徒藉季父之貴得依餘庥不耕而食不織而衣優遊卒嵗無所用心日夕兢惕尚虞滿盈以速禍敗矧敢不衷其服自菑厥身諸子為之忸怩審知雖起於任俠之徒而天性純儉自奉甚薄聞君此言嘉嘆不已時自朱梁篡唐之後强藩巨鎮相次僣號改元審知王閩日久驕心日滋屢有效顰之意君極口切諫其不可曰自古帝王之興莫不皆有大功德著於天下故天命有歸人心胥附然後應天順人起而君之固非細事當紂之時西伯躬盛德大業三分天下已有其二而服事殷曹孟德剗平禍亂威震天下挾天子以令諸侯盜㺯神器於掌股間漢之為漢特位號耳而猶終於其世不敢登尊履極蓋以天命人心之有在耳今王雖聰明英武出於萬夫之上然功未著於中原威未加於海內蕞爾之閩地不大於吳楚兵不加於梁晋而輒欲謀此大事諸鎮聞之稱兵而南則師直為壯我復何辭是乃操無益之虛名享必然之實禍僕嘗諫王勿臣朱梁且王以僕言為不知彼已而今日不意復為此圖其可謂知彼已乎誠於此時檢身修德惟懷永圖敦好睦鄰以大桓文之業則生享方面之尊殁存忠義之名以垂裕後昆無有窮已不其韙歟今乃不此之思而謀為劉聰石勒之舉縱使諸侯未暇致討得以偷安假息一旦有真主出其能赦我哉審知雖不樂其言然志之於心終其身不失臣節君之力也審知諸子君素惡之而獨與延政善及審知卒延翰竊立君謂其所親曰此真沭猴冠耳延翰聞而憾之君因約延政同隱延政唯諾然志於得國不行一日延翰取司馬遷史記閩越王無諸傳示諸將吏曰閩自古王國也吾今不王何待軍府將吏因勸進君曰是可為也孰不可為也此子能自免乎使在先王之世豫固當以死爭然斯人也何足與語吾族其血矣乎我雖不能餓死首陽然亦豈可延頸待戮因潜隨賈舟逸去將欲遵海濱而處偶值閩使者自海上還遇君迫之以歸至黃崎君乃捨舟宵遁田間道草宿露行旬日始抵建平因愛其佳山水遂有終焉之意乃易姓唐以字為名蓋以唐與王音韻相近而亦自謂唐之遺民於是隱焉時延平人物凋零鄉無校家無孰士風不振青襟之徒散之城闕君始以五經教授學徒人皆以唐五經呼之未幾國亂骨肉自相屠戮繼而南唐兵取閩王氏族屬靡有孑遺皆如所料僅脫於難者惟君一人自非明哲保身其能爾耶君初聞閩滅乃衰絰出郊東望故國一酬先王大慟而還曰天作孽猶可違自作孽不可逭王氏之滅非天也亦自取之爾復何言哉始李景之滅閩也乃以富沙延平劍浦三縣為劍州刺史陳誨將欲興建黌館以延多士初聞唐五經之名始議表君教授俊造君聞之曰昔孟軻氏不以三公易其介使富貴如我所欲則冠貂蟬秉節旄久矣惟夫不以易其介所以遁世而無悶遂以廢疾謝絶賔客終日杜門雖比鄰亦莫得見其面環堵蕭然卒於大宋乾德四年壽九十有四娶黃氏先卒於閩晚得一子曰玠有賢行秀而不實娶鄭氏有子一人曰餘慶治家有法輕財重義鄉閭之人皆以仁厚長者歸之娶邱氏有男六人女二人二女皆適士人男曰說曰詢曰綬曰端曰靖季子早亡餘皆業儒端一舉中嘉祐八年進士第今為河陽節度推官有文有守不忝厥祖施諸政事所至皆有仁聲娶魏氏卒而無子繼室徐氏生二女一男皆幼稚男曰淮先是君之寢疾也呼其子玠而屬之曰古者士踰月而葬葬言其藏也令人不可復見爾近世流俗之葬孝子慈孫欲榮其親者墓惟恐其不大馬鬛惟恐其不髙而又旁揭豐碑褒揚盛美彌亘道左是皆無益於亡者適所以為冦盜發掘之標唐末之亂王公貴人賢士大夫例遭此禍路旁每見為之動心可不戒哉我病且死汝則埋之切勿徇俗以隂陽風水吉凶為拘忌但擇髙明爽塏之地免卑濕沮洳足矣不封不樹勿為標識銘志碑碣之具聽人耕種其上芻蕘雉兔往來勿禁慎毋蹈衰世餘習自貽後悔及君卒其子玠葬君於水雲村之原一如治命及玠之卒也子餘慶方在襁褓玠始病篤因自取針刺其姓於餘慶之右臂及封乃祖遺書數卷留以付之喪服既除其妻持孤子適他族洎餘慶長而母亡惟見臂字遺書而已迄莫辨其祖所葬之地日月既邁詢之鄉老亦無有能知之者至今子孫春秋拜掃展省合祀於其子玠之墓耳嗚呼如君之全身逺害也何其慎終惟始而其長慮却顧又何其逺也世之小人嗜利亡軀朝不謀夕其視於君為何如哉祖禹嘉祐中就試禮部始識君之曽孫端於京師逆旅中與之語喜其有誠明自得之學不入時輩每親炙之是年端登進士丙科而祖禹亦幸塵忝自入仕契濶二十餘年一日邂逅於河陽幕府雖其淹回沮抑而氣未嘗少衰於曩時儻非以其所學充其所養能爾邪祖禹近參訂唐史事有疑似者數條質之於端悉能援引他傳雜說并唐文士碑銘書疏之類以决其疑莫不皆有證據豫深德之而且嘆其博洽端因發蠧篋出乃祖遺録相示曰曽大父生於晚唐長於五代而卒於國朝之初經厯甚多閲世甚久惜其晦迹不仕不得託名於一代史書前輩已往知者絶少苐恐將遂湮沒為子孫者不得無罪吾子其能為我發潜德之幽光乎祖禹曰唯謹以君出處遺事而次苐之以為家傳直述其言與其所行耳不敢置一字褒貶於其間庶幾子孫稍得其實後之君子尚論古人者見其傳而得其人則是非美惡於是有在固非祖禹所得專也傳成歸之於端俾藏祖廟以為無窮之傳云贊曰甚哉出處君子之大致也五季之亂極矣聞人奇士不幸生於其世未有不被其汙衊者求之於傳蓋無完人君獨能歸潔其身視軒冕若將凂焉彼其克享眉夀始終名節垂裕後昆在當時豈不謂之難得哉况乎議論磊落本乎純正有晉叔向唐陸贄遺風尤非五代間諸臣所能到使之一旦立人之朝食人之祿想其正色凛凛臨大節而不可奪惜其埋光匿影其在當年猶不可得而見况後世乎是知自昔英雄豪傑義夫節婦跡不踐於中朝名不登於太史聲名文采與草木俱腐者可勝計哉司馬子長謂伯夷叔齊微孔子則西山之餓夫耳渠不信然范太史集卷三十六
